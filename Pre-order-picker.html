}
/* เช็คครบ — สั่ง (scanMeta) vs ยิง (scanPicked รวมต่อสินค้า) */
function scanReconcileHtml(){
  const meta=(MODEL&&MODEL.scanMeta)||{}, keys=Object.keys(meta);
  if(!keys.length) return '';
  const scanned={};
  for(const p of scanPicked){ const prod=DATA.prodIdx[p.barcode]; const pk=prod?(prod.codeCS||prod.name):p.barcode; scanned[pk]=(scanned[pk]||0)+(parseInt(p.qty)||0); }
  const remain=keys.filter(pk=>(scanned[pk]||0) < (meta[pk].orderedEA||0))
    .map(pk=>({name:meta[pk].name,ordered:meta[pk].orderedEA||0,scanned:scanned[pk]||0,eaPerCS:meta[pk].eaPerCS,eaPerPA:meta[pk].eaPerPA}))
    .sort((a,b)=>(b.ordered-b.scanned)-(a.ordered-a.scanned));
  const done=keys.length-remain.length;
  const head=`<div class="recon ${remain.length?'':'ok'}">
    <span><b>เช็คครบ ${done}/${keys.length} สินค้า</b>${remain.length?` · เหลือ <b style="color:var(--red)">${remain.length}</b> ยังไม่ครบ`:' ✅ ยิงครบทุกตัวแล้ว'}</span>
    ${remain.length?`<button class="ico-btn" onclick="toggleScanRemain()">${scanShowRemain?'ซ่อน':'ดูที่ยังไม่ครบ'}</button>`:''}</div>`;
  if(!(scanShowRemain && remain.length)) return head;
  const rows=remain.slice(0,300).map(r=>`<tr><td>${esc(r.name)}</td><td class="num">${esc(fmtFromEA(r.ordered,r.eaPerCS,r.eaPerPA))}</td><td class="num">${r.scanned?esc(fmtFromEA(r.scanned,r.eaPerCS,r.eaPerPA)):'<span class="muted">-</span>'}</td><td class="num"><b style="color:var(--red)">${esc(fmtFromEA(r.ordered-r.scanned,r.eaPerCS,r.eaPerPA))}</b></td></tr>`).join('');
  return head+`<div class="tbl-wrap" style="max-height:240px;margin-bottom:10px"><table class="alloc-tbl"><thead><tr><th>สินค้า</th><th class="num">สั่ง</th><th class="num">ยิงแล้ว</th><th class="num">เหลือ</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function toggleScanRemain(){ scanShowRemain=!scanShowRemain; renderScanList(); }
function toggleScanJob(){
  if(!scanClosed){ if(!confirm('ปิดงาน? เช็คเสร็จแล้ว — ยิงเพิ่มไม่ได้จนกว่าจะกดเปิดงานต่อ')) return; scanClosed=true; if(scanCamOn) stopScanCam(); toast('🔒 ปิดงานแล้ว — ยิงเพิ่มไม่ได้'); }
  else { if(!confirm('เปิดงานต่อ เพื่อยิงเพิ่ม?')) return; scanClosed=false; toast('🔓 เปิดงานต่อ — ยิงได้'); }
  saveScanLS(); renderScanList();

async function saveScan(silent){
  if(!CONFIG.gasUrl){ if(!silent) toast('ยังไม่ได้ตั้ง gasUrl'); return; }
  if(!scanPicked.length){ if(!silent) toast('ไม่มีรายการ'); return; }
  if(!silent) loading(true,'กำลังบันทึกลงชีท…');
  try{
    const rows=[];
    scanPicked.forEach(p=>{
      if(p.alloc && p.alloc.length) p.alloc.forEach(a=> rows.push([p.barcode,p.name,a.salesman||'',a.store||'',fmtFromEA(a.give,p.eaPerCS,p.eaPerPA),p.ts||'']));
      else rows.push([p.barcode,p.name,'','',fmtFromEA(p.qty,p.eaPerCS,p.eaPerPA),p.ts||'']);
    });
    const transferRows=scanPicked.filter(p=>p.transfer).map(p=>[p.barcode,p.name,fmtFromEA(p.qty,p.eaPerCS,p.eaPerPA),p.ts||'']);
    const payload={action:'saveCheck', tab:'เช็คสินค้าออก', header:['Barcode','ชื่อ','เซล','ร้าน','จำนวน','วันเวลาที่ยิง'], rows,
      transferTab:'โอนย้าย', transferHeader:['Barcode','ชื่อ','จำนวน','วันเวลาที่ยิง'], transferRows};
    const res=await fetch(CONFIG.gasUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const txt=(await res.text()).trim(); let j={}; try{ j=JSON.parse(txt); }catch(e){}
    if(j.ok){ scanDirty=false; saveScanLS(); renderScanList(); if(!silent) toast(`✅ บันทึก ${j.saved} แถว`+(j.transfer?` · โอนย้าย ${j.transfer}`:'')); }
    else throw new Error(j.error||txt||'บันทึกไม่สำเร็จ');
  }catch(e){ console.error(e); if(!silent) toast('❌ '+(e.message||'บันทึกไม่สำเร็จ')); else { scanDirty=true; renderScanList(); } }
  finally{ if(!silent) loading(false); }
}

  if(!scanPicked.length){ toast('ไม่มีรายการ'); return; }
  const wb=XLSX.utils.book_new();
  const head=['Barcode','ชื่อ','เซล','ร้าน','จำนวน','วันเวลาที่ยิง'], rows=[];

  const ws=XLSX.utils.aoa_to_sheet([head,...rows]); ws['!cols']=[{wch:16},{wch:30},{wch:10},{wch:24},{wch:16},{wch:16}]; forceText(ws,rows.length,[0]);
  XLSX.utils.book_append_sheet(wb,ws,'เช็คสินค้าออก');

/* ใบโอนย้าย bplus (15 คอลัมน์) — จากตัวที่ติดธง 🔁 · เลือกคลังต้นทาง→ปลายทาง */
function exportTransferBplus(){
  const trh=scanPicked.filter(p=>p.transfer);
  if(!trh.length){ toast('ไม่มีรายการโอนย้าย (ติดธง 🔁)'); return; }
  const g=id=>(document.getElementById(id)||{}).value||'';
  const from=g('tfFrom'), to=g('tfTo'), doc=g('tfDoc'), note=g('tfNote');
  if(!from||!to){ toast('เลือกคลังต้นทาง/ปลายทางก่อน'); return; }
  if(from===to){ toast('คลังต้นทางกับปลายทางต้องไม่ซ้ำกัน'); return; }
  const iso=g('tfDate')||todayBKK(), docDate=toBuddhistDMY(iso);
  const TF_HEADER=['วันที่เอกสาร','เลขที่เอกสาร','รหัสสาขา','รหัสแผนก','รหัสโครงการ','ราคาที่แสดง','หมายเหตุ','รหัสซื้อขาย','จำนวน','ราคาต่อหน่วย','น้ำหนักต่อหน่วย','เลขล็อต','เลขกำกับ','ตำแหน่งเก็บ','ย้ายไปตำแหน่งเก็บ'];
  const rows=trh.map(p=>[docDate,doc,'0','SP01','0','0',note,p.barcode,String(p.qty),'0','','','',from,to]);
  const ws=XLSX.utils.aoa_to_sheet([TF_HEADER,...rows]);
  forceText(ws, rows.length, [1,7,13,14]);   // เลขเอกสาร·บาร์โค้ด·ต้นทาง·ปลายทาง → TEXT
  ws['!cols']=TF_HEADER.map((h,i)=>({wch:i===1?16:i===6?14:i===7?15:10}));
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'BplusData');
  XLSX.writeFile(wb,`โอนย้าย_${from}-${to}_${iso}.xlsx`);
  toast(`✅ ใบโอนย้าย ${rows.length} รายการ (${from}→${to})`);
}
/* กล้อง html5-qrcode (config เดียวกับ Stock C4 / SMR) */
function toggleScanCam(){ scanCamOn?stopScanCam():startScanCam(); }
async function startScanCam(){
  if(!window.Html5Qrcode){ toast('กล้องยังโหลดไม่เสร็จ ลองใหม่'); return; }
  try{
    scanCam=new Html5Qrcode('mp-qr-reader',{verbose:false,experimentalFeatures:{useBarCodeDetectorIfSupported:true}});
    const F=Html5QrcodeSupportedFormats;
    const config={fps:25,qrbox:{width:320,height:180},aspectRatio:1.7777,
      videoConstraints:{facingMode:{ideal:'environment'},width:{ideal:1920,min:1280},height:{ideal:1080,min:720},advanced:[{focusMode:'continuous'},{zoom:1.5}]},
      formatsToSupport:[F.EAN_13,F.EAN_8,F.UPC_A,F.UPC_E,F.CODE_128,F.CODE_39,F.CODE_93,F.ITF,F.QR_CODE]};
    await scanCam.start({facingMode:'environment'},config,onScanCode,()=>{});
    scanCamOn=true; const b=document.getElementById('scanCamBtn'); if(b){ b.textContent='⏹ ปิดกล้อง'; b.classList.add('gray'); }
  }catch(e){ console.error(e); toast('เปิดกล้องไม่ได้ — ใช้ช่องพิมพ์แทน'); stopScanCam(); }
}
async function stopScanCam(){
  try{ if(scanCam){ await scanCam.stop(); await scanCam.clear(); } }catch(e){}
  scanCam=null; scanCamOn=false; const b=document.getElementById('scanCamBtn'); if(b){ b.textContent='📷 เปิดกล้อง'; b.classList.remove('gray'); }
}
function onScanCode(code){
  const now=Date.now(); code=String(code||'').trim();
  if(code===scanLast.code && now-scanLast.t<1500) return;
  scanLast={code,t:now}; scanLookup(code);
}
function beep(){ try{ const a=new (window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain(); o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.value=.07;o.start(); setTimeout(()=>{o.stop();a.close();},120);}catch(e){} }
function vibrate(){ try{ navigator.vibrate&&navigator.vibrate(60);}catch(e){} }

/* ================= export xlsx ================= */
function sheetName(raw, used){
  let n=String(raw).replace(/[\[\]\:\*\?\/\\]/g,' ').trim().slice(0,28);
  let base=n, i=1; while(used.has(n)){ n=base.slice(0,25)+'_'+(i++); } used.add(n); return n;
}
function exportXlsx(){
  if(!MODEL||!MODEL.bplus.length){ toast('ไม่มีข้อมูลให้ export — เลือกบิลก่อน'); return; }
  const _ids=Object.keys(MODEL.docNoByOrder||{});
  const _doneIds=_ids.filter(id=>DONE[id]), _new=_ids.length-_doneIds.length;   // จัดแล้ว = export ซ้ำ · ที่เหลือ = มาร์คใหม่
  const _bmap={}; buildBills().forEach(b=>{ _bmap[b.orderId]=b.store||''; });
  let _msg=`จะ Export ${_ids.length} บิล (${MODEL.bplus.length} รายการ)\n`;
  if(_doneIds.length){
    _msg+=`\n⚠️ มี ${_doneIds.length} บิลที่ "จัดแล้ว" แล้ว → จะ export ซ้ำ (สถานะคงเดิม):\n`;
    _msg+=_doneIds.slice(0,15).map(id=>`   • ${_bmap[id]||'(ไม่ทราบร้าน)'} — ${id}`).join('\n');
    if(_doneIds.length>15) _msg+=`\n   …และอีก ${_doneIds.length-15} บิล`;
    _msg+=`\n`;
  }
  if(_new) _msg+=`\n✅ อีก ${_new} บิล จะถูกทำเครื่องหมาย "จัดแล้ว" อัตโนมัติ`;
  _msg+=`\n\nยืนยัน Export?`;
  if(!confirm(_msg)) return;
  const wb=XLSX.utils.book_new(); const used=new Set();

  // 1) ออเดอร์ทั้งหมด (bplus)
  const bHead=['วันที่เอกสาร','เลขที่เอกสาร','รหัสลูกหนี้','ส่วนลดท้ายบิล','รหัสสาขา','รหัสแผนก','รหัสโครงการ',
    'รหัสพนักงานขาย','หมายเหตุ','วันที่ส่งของ','รหัสซื้อขาย','จำนวน','แถม','ราคาต่อหน่วย','ส่วนลดต่อหน่วย',
    'น้ำหนักต่อหน่วย','เลขล็อต','เลขกำกับ','ตำแหน่งเก็บ','วันที่คีย์','ชื่อร้าน','ชื่อสินค้า','ยอดรวม'];
  const bRows=MODEL.bplus.map(r=>[r.docDate,r.docNo,r.debtor,r.endDisc,r.branch,r.dept,r.project,r.salesman,
    r.note,r.delivDate,r.barcode,r.qty,r.free,r.unitPrice,r.discUnit,r.weightUnit,r.lot,r.invNo,r.loc,
    r.keyDate,r.store,r.product,r.total]);
  const wsB=XLSX.utils.aoa_to_sheet([bHead,...bRows]);
  wsB['!cols']=bHead.map((h,i)=>({wch:[10,16,12,8,8,8,8,12,12,11,15,7,5,11,9,9,7,7,8,11,22,28,11][i]||10}));
  forceText(wsB, bRows.length, [1,2,7,10,18]);   // docNo,debtor,salesman,barcode,loc → text
  XLSX.utils.book_append_sheet(wb,wsB,sheetName('ใบจองสินค้า',used));

  // 2) แบบ1 — ใบจัดเต็มลัง (รายเซล) : CS · บาร์=CS · เรียง CAT GROUP+BRAND · 1 ชีท/เซล
  (MODEL.fmt1||[]).forEach(s=>{
    const head=['บาร์โค้ด','หน่วย','สินค้า','จำนวน','สต็อก '+s.wh];
    const rows=s.rows.map(r=>[String(r.barcode).slice(-6), r.unit, r.product, r.qty, Math.round(r.stockOwn||0)]);
    const title=`จัดเต็มลัง (CS) · ${s.salesman} · ${s.name||''} · ${s.roleLab} · คลัง ${s.wh} · เล่ม ${s.book||'(ยังไม่มี)'}`;
    const ws=XLSX.utils.aoa_to_sheet([[title],head,...rows]);
    ws['!cols']=[{wch:10},{wch:7},{wch:34},{wch:7},{wch:11}];
    forceText(ws, rows.length, [0]);   // บาร์โค้ด → TEXT
    XLSX.utils.book_append_sheet(wb,ws,sheetName(s.salesman+' '+(s.name||''),used));
  });

  // 3) แบบ2 — เอาเศษมารวม : EA/PA/BP/CS · บาร์=ตัว EA · เรียง CAT GROUP+BRAND
  if((MODEL.fmt2||[]).length){
    const head=['Barcode','หน่วย','ชื่อสินค้า','EA','PA','BP','CS','สต็อก C4','สต็อก W4'];
    const rows=MODEL.fmt2.map(x=>[String(x.barcode).slice(-6), x.barUnit, x.product, x.ea||'', x.pa||'', x.bp||'', x.cs||'', Math.round(x.stockC4||0), Math.round(x.stockW4||0)]);
    const ws=XLSX.utils.aoa_to_sheet([head,...rows]);
    ws['!cols']=[{wch:10},{wch:7},{wch:34},{wch:6},{wch:6},{wch:6},{wch:6},{wch:10},{wch:10}];
    forceText(ws, rows.length, [0]);
    XLSX.utils.book_append_sheet(wb,ws,sheetName('เอาเศษมารวม',used));
  }

  // 4) ออเดอร์ถูกตัดออก = บิลที่เลือกไม่เอาทั้งบิล (ไม่เกี่ยวกับรออนุมัติ) — โครงเดียวกับใบจองสินค้า · เลขที่เอกสารเว้นว่าง
  if((MODEL.excluded||[]).length){
    const xRows=MODEL.excluded.map(r=>[r.docDate,r.docNo,r.debtor,r.endDisc,r.branch,r.dept,r.project,r.salesman,
      r.note,r.delivDate,r.barcode,r.qty,r.free,r.unitPrice,r.discUnit,r.weightUnit,r.lot,r.invNo,r.loc,
      r.keyDate,r.store,r.product,r.total]);
    const wsX=XLSX.utils.aoa_to_sheet([bHead,...xRows]);
    wsX['!cols']=bHead.map((h,i)=>({wch:[10,16,12,8,8,8,8,12,12,11,15,7,5,11,9,9,7,7,8,11,22,28,11][i]||10}));
    forceText(wsX, xRows.length, [1,2,7,10,18]);   // docNo,debtor,salesman,barcode,loc → TEXT (เหมือนใบจองสินค้า)
    XLSX.utils.book_append_sheet(wb,wsX,sheetName('ออเดอร์ถูกตัดออก',used));
  }

  XLSX.writeFile(wb, `จัดของ-${MODEL.date}.xlsx`);
  toast('✅ ดาวน์โหลด Excel แล้ว');
  // Export = "จัดบิลพวกนี้แล้ว" → mark done หลังบ้าน (พรุ่งนี้ไม่ขึ้นซ้ำ · ทุกเครื่องเห็นตรงกัน)
  const _exp = Object.keys((MODEL&&MODEL.docNoByOrder)||{});
  if(_exp.length) markDoneBackend(_exp).then(n=>{ if(n){ toast('🟢 ทำเครื่องหมาย '+n+' บิลว่าจัดแล้ว'); process(); render(); } });
}
/* force selected column indices to TEXT (กันบาร์โค้ด/รหัสเป็น scientific notation) */
function forceText(ws, dataRows, colIdxs){
  const ref=XLSX.utils.decode_range(ws['!ref']);
  for(let r=1;r<=ref.e.r;r++){
    for(const c of colIdxs){
      const addr=XLSX.utils.encode_cell({r,c}); const cell=ws[addr];
      if(cell && cell.v!=null && cell.v!==''){ cell.t='s'; cell.v=String(cell.v); cell.z='@'; }
    }
  }
}
