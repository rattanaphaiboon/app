<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rattana Pre-order Picker v1.40</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --navy:#0d1b3e; --navy2:#13245a; --gold:#c9a84c; --gold-d:#a8862f; --green:#16a34a; --green-d:#15803d;
    --bg:#f4f6fb; --card:#ffffff; --border:#e2e7f0; --muted:#64748b;
    --text:#1e293b; --ok:#15803d; --warn:#b45309; --red:#dc2626;
    --w1:#FBBF24; --w2:#0EA5E9; --w3:#EF4444; --w4:#15803D; --c4:#4ADE80; --hq:#C9A84C;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}

  /* ---------- Login ---------- */
  #loginScreen{position:fixed;inset:0;background:linear-gradient(160deg,var(--navy),#1e3a8a);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .login-card{background:#fff;border-radius:18px;padding:34px 28px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .login-logo{width:64px;height:64px;border-radius:16px;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px;font-weight:700}
  .login-card h1{font-size:19px;color:var(--navy);margin-bottom:4px}
  .login-card .sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  #googleSignInBtn{display:flex;justify-content:center;margin-bottom:14px}
  .login-bypass{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:11px 18px;width:100%;font-size:14px;font-weight:600}
  .login-bypass:hover{background:var(--navy2)}
  #loginError{display:none;background:#fef2f2;color:var(--red);border:1px solid #fecaca;border-radius:10px;padding:10px;font-size:13px;margin-top:12px;text-align:left}
  #loginSpinner{display:none;margin-top:14px;color:var(--muted)}
  .login-ver{margin-top:16px;color:var(--muted);font-size:12px}

  /* ---------- App shell ---------- */
  #app{display:none}
  .topbar{position:sticky;top:0;z-index:50}
  header.appbar{background:var(--navy);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px}
  header.appbar .title{font-weight:700;font-size:16px;display:flex;align-items:center;gap:8px}
  header.appbar .ver{background:var(--gold);color:var(--navy);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
  header.appbar .spacer{flex:1}
  header.appbar .who{font-size:12px;color:#cbd5e1;text-align:right;line-height:1.3}
  .hub-btn{background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:7px 12px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:5px;text-decoration:none}
  .hub-btn:hover{background:#d9bd6a}

  /* ---------- Filter bar (sticky) ---------- */
  .filterbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .fld{display:flex;flex-direction:column;gap:3px}
  .fld label{font-size:11px;color:var(--muted);font-weight:600}
  .fld input,.fld select{font-family:inherit;font-size:14px;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;outline:none;min-width:120px}
  .fld input:focus,.fld select:focus{border-color:var(--gold)}
  .chk{display:flex;align-items:center;gap:6px;font-size:13px;padding-bottom:8px}
  .btn-load{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:600;font-size:14px;height:38px}
  .btn-load:hover{background:var(--navy2)}
  .btn-export{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;border:none;border-radius:8px;padding:8px 18px;font-weight:700;font-size:14px;height:38px;display:flex;align-items:center;gap:6px}
  .btn-export:hover{filter:brightness(1.05)}
  .btn-export:disabled{opacity:.5;cursor:not-allowed}
  .chipgrp{display:flex;gap:4px;align-items:center}
  .chipgrp .lbl{font-size:11px;color:var(--muted);font-weight:700;margin-right:2px}
  .chip{background:#eef1f7;border:none;border-radius:20px;padding:6px 13px;font-size:13px;font-weight:600;color:#475569;cursor:pointer;white-space:nowrap;font-family:inherit}
  .chip:hover{background:#e2e7f0}
  .chip.on{background:var(--navy);color:#fff}

  /* ---------- Content ---------- */
  .wrap{padding:16px 16px 84px;max-width:1400px;margin:0 auto}
  .bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--navy);display:flex;box-shadow:0 -2px 12px rgba(0,0,0,.22)}
  .bottomnav .bn{flex:1;background:none;border:none;color:#cbd5e1;padding:7px 4px 8px;font-family:inherit;font-size:12px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:3px solid transparent}
  .bottomnav .bn span{font-size:21px;line-height:1}
  .bottomnav .bn.active{color:#fff;border-top-color:var(--gold);background:rgba(255,255,255,.07)}
  /* ===== 🚚 จัดรถ (jadrot) ===== */
  .jr-head{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:12px}
  .jr-whlock{display:inline-flex;align-items:center;gap:6px;color:#fff;font-weight:700;border-radius:8px;padding:6px 12px;font-size:13px}
  .jr-day{font-size:12.5px;color:var(--muted);font-weight:600}
  .jr-banner{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:10px;padding:9px 13px;font-size:13px;font-weight:600;margin-bottom:12px}
  .jr-grid{display:grid;grid-template-columns:minmax(0,44%) minmax(0,56%);gap:14px;align-items:start}
  @media(max-width:980px){ .jr-grid{grid-template-columns:1fr} }
  .jr-right{position:sticky;top:8px;max-height:calc(100vh - 96px);overflow:auto}
  @media(max-width:980px){ .jr-right{position:static;max-height:none;overflow:visible} }
  .jr-pane h3{font-size:14px;color:var(--navy);font-weight:700;margin:2px 0 8px;display:flex;align-items:center;gap:6px}
  .jr-truck{background:var(--card);border:1px solid var(--border);border-left:5px solid var(--navy);border-radius:12px;margin-bottom:11px;overflow:hidden}
  .jr-truck.sel{box-shadow:0 0 0 2px var(--navy)}
  .jr-truck.pool{border-left-color:var(--warn);border-style:dashed}
  .jr-thead{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer}
  .jr-tname{font-weight:700;color:var(--navy);font-size:15px}
  .jr-rt{font-size:11.5px;background:#e0e7ff;color:#3730a3;border-radius:20px;padding:1px 9px;font-weight:700}
  .jr-truckkind{font-size:11.5px;color:var(--muted);background:#f1f5f9;border-radius:5px;padding:1px 7px;font-weight:700}
  .jr-nstore{margin-left:auto;font-size:12px;color:var(--muted);font-weight:600}
  .jr-mini{display:flex;gap:6px;padding:0 13px 8px;flex-wrap:wrap}
  .jr-mini .m{flex:1;min-width:62px;background:#f8fafc;border-radius:8px;padding:6px 8px;text-align:center}
  .jr-mini .m .mv{font-weight:700;color:var(--navy);font-size:14px}
  .jr-mini .m .ml{font-size:10px;color:var(--muted)}
  .jr-mini .m.bad .mv{color:var(--red)}
  .jr-bars{padding:0 13px 10px}
  .jr-bar .bl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:2px;font-weight:600}
  .jr-bar .bt{height:8px;background:#eef1f7;border-radius:6px;overflow:hidden}
  .jr-bf{height:100%;border-radius:6px}
  .jr-bf.g{background:var(--green)} .jr-bf.o{background:#f59e0b} .jr-bf.r{background:var(--red)}
  .jr-tact{display:flex;gap:6px;padding:0 13px 11px;flex-wrap:wrap}
  .jr-tbtn{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;color:var(--text);font-family:inherit}
  .jr-tbtn.map{border-color:var(--navy);color:var(--navy)}
  .jr-stops{border-top:1px dashed var(--border);padding:8px 13px 10px;display:none}
  .jr-truck.open .jr-stops{display:block}
  .jr-stop{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
  .jr-stop:last-child{border:none}
  .jr-seqdot{width:22px;height:22px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .jr-stop .sn{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .jr-stop .km{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}
  .jr-stop .km.far{color:var(--red);font-weight:700}
  .jr-pill{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:700;background:#eef1f7;color:#475569;white-space:nowrap}
  .jr-ff{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:20px;white-space:nowrap}
  .jr-ff.ok{background:#dcfce7;color:#166534} .jr-ff.part{background:#fef3c7;color:#92400e} .jr-ff.out{background:#fee2e2;color:var(--red)}
  .jr-search{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;position:sticky;top:0;background:var(--bg);padding:4px 0;z-index:5}
  .jr-search select{font-family:inherit;font-size:13px;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;outline:none;flex:1;min-width:120px;max-width:220px}
  .jr-row{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 11px;margin-bottom:6px;cursor:pointer}
  .jr-row:hover{border-color:var(--navy)}
  .jr-row.act{box-shadow:0 0 0 2px var(--navy)}
  .jr-row .rstore{font-weight:700;color:var(--navy);font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .jr-row .rmeta{font-size:11px;color:var(--muted)}
  .jr-mapwrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
  .jr-mapbar{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .jr-mapbar .mt{font-weight:700;color:var(--navy);font-size:13px}
  .jr-thr{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600}
  .jr-thr input{width:56px;font-family:inherit;font-size:13px;padding:5px 7px;border:1.5px solid var(--border);border-radius:8px;text-align:center}
  .jr-mstat{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
  .jr-mstat .s{font-size:12px;font-weight:700;border-radius:8px;padding:4px 10px}
  .jr-mstat .s.tot{background:#eef1f7;color:var(--navy)} .jr-mstat .s.far{background:#fee2e2;color:var(--red)}
  #jrMap{height:400px;width:100%;background:#e8eef5}
  @media(max-width:980px){ #jrMap{height:300px} }
  .jr-legend{display:flex;gap:12px;padding:8px 12px;font-size:11px;color:var(--muted);flex-wrap:wrap;border-top:1px solid var(--border)}
  .jr-legend i{display:inline-block;width:20px;height:3px;border-radius:2px;vertical-align:middle;margin-right:4px}
  .jr-pinnum{color:#fff;border:2px solid #fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;box-shadow:0 1px 4px rgba(0,0,0,.35)}
  .jr-pinhome{background:var(--navy);color:var(--gold);border:2px solid #fff;border-radius:7px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,.4)}
  .jr-leglbl{background:#fff;border:1px solid var(--border);border-radius:11px;padding:0 6px;font-size:10.5px;font-weight:700;color:var(--muted);box-shadow:0 1px 3px rgba(0,0,0,.18);white-space:nowrap}
  .jr-leglbl.far{color:#fff;background:var(--red);border-color:var(--red)}
  .jr-stocktab{border:1px solid var(--border);border-radius:8px;overflow:auto;font-size:12px}
  .jr-stocktab table{width:100%;border-collapse:collapse}
  .jr-stocktab th,.jr-stocktab td{padding:5px 9px;text-align:left;border-bottom:1px solid #f1f5f9;white-space:nowrap}
  .jr-stocktab th{background:#f8fafc;color:var(--navy);font-size:11px;font-weight:700;position:sticky;top:0}
  .jr-stocktab td.r{text-align:right;font-variant-numeric:tabular-nums}
  .jr-miss{color:var(--red);font-weight:700} .jr-got{color:var(--green);font-weight:700}
  .tiles{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
  .tile{flex:1 1 0;min-width:92px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 11px;white-space:nowrap}
  .tile .v{font-size:17px;font-weight:700;color:var(--navy)}
  .tile .l{font-size:10.5px;color:var(--muted);margin-top:1px}
  .tile.warn .v{color:var(--red)}
  .tile.ok .v{color:var(--ok)}

  .tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:14px;flex-wrap:wrap}
  .tab{background:none;border:none;padding:9px 16px;font-size:14px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px}
  .tab.active{color:var(--navy);border-bottom-color:var(--gold)}
  .panel{display:none}
  .panel.active{display:block}

  .tbl-wrap{overflow:auto;max-height:max(260px, calc(100vh - 340px));background:var(--card);border:1px solid var(--border);border-radius:12px}
  table{border-collapse:collapse;width:100%;font-size:13px;white-space:nowrap}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
  th{background:#f8fafc;color:var(--navy);font-weight:600;position:sticky;top:0;z-index:5;font-size:12px}
  tr:hover td{background:#fbfcff}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .cut-row td{background:#fff7ed}
  .pill{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .pill.ปลีก{background:#dbeafe;color:#1d4ed8}
  .pill.ส่ง{background:#dcfce7;color:#166534}
  .pill.cut{background:#fee2e2;color:var(--red)}
  .whc{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .sec-head{font-weight:700;color:var(--navy);margin:18px 0 8px;font-size:15px;display:flex;align-items:center;gap:8px}
  .scrap-line{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;line-height:1.6}
  .scrap-line .prod{font-weight:700;color:var(--navy)}
  .scrap-line .cs{background:var(--gold);color:var(--navy);font-weight:700;padding:1px 9px;border-radius:6px;margin:0 8px}
  .scrap-line .st{display:inline-block;margin:2px 6px 2px 0;color:#334155}
  .muted{color:var(--muted)}
  .empty{text-align:center;padding:40px;color:var(--muted)}
  .note{font-size:12px;color:var(--muted);margin:6px 2px}
  .row-sel{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  #loadOverlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:60;align-items:center;justify-content:center;flex-direction:column;gap:14px}
  .spinner{width:42px;height:42px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;z-index:80;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.3);display:none}

  /* ---------- 📷 Scan tab (เช็คสินค้า) ---------- */
  #mp-qr-reader{width:100%;max-width:440px;margin:0 auto 12px}
  #mp-qr-reader:empty{margin:0}
  .scan-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .scan-row #scanInput{flex:1;min-width:160px;font-size:16px;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;outline:none}
  .scan-row #scanInput:focus{border-color:var(--gold)}
  .scan-btn{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:600;font-size:14px;font-family:inherit}
  .scan-btn:hover{filter:brightness(1.08)}
  .scan-btn:disabled{opacity:.45;cursor:not-allowed}
  .scan-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--navy)}
  .scan-btn.green{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff}
  .scan-btn.gray{background:#64748b}
  .mini-btn{font-family:inherit;font-size:11px;font-weight:600;padding:3px 8px;border:none;border-radius:6px;background:#e2e8f0;color:var(--navy);cursor:pointer;margin-left:6px;white-space:nowrap}
  .mini-btn.done{background:var(--green);color:#fff}
  .mini-btn.ghost{background:#fff;border:1px solid var(--border);color:var(--muted);font-weight:600}
  .mini-btn:hover{filter:brightness(1.06)}
  .done-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--green);background:#dcfce7;border-radius:6px;padding:2px 7px;margin-right:4px}
  .pend-tag{display:inline-block;font-size:11px;font-weight:600;color:var(--muted);background:#f1f5f9;border:1px solid var(--border);border-radius:6px;padding:2px 7px;margin-right:4px}
  .status-toggle{font-family:inherit;font-size:12.5px;font-weight:700;padding:5px 12px;border:none;border-radius:8px;cursor:pointer;white-space:nowrap}
  .status-toggle.done{background:var(--green);color:#fff}
  .status-toggle.pending{background:#e2e8f0;color:#475569}
  .status-toggle:hover{filter:brightness(1.05);box-shadow:0 1px 5px rgba(0,0,0,.18)}
  .scan-card{background:var(--card);border:2px solid var(--gold);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 8px 24px rgba(201,168,76,.18);max-width:480px}
  .scan-card .pname{font-size:18px;font-weight:700;color:var(--navy)}
  .scan-card .pbar{font-size:12.5px;color:var(--muted);margin:2px 0 10px}
  .scan-card .ord{background:#eef1f7;border-radius:8px;padding:9px 12px;font-size:14px;margin-bottom:12px}
  .recv-box{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .recv-box .stp{width:46px;height:48px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-size:24px;font-weight:700;flex:none}
  .recv-box #scanQty{flex:1;text-align:center;font-size:26px;font-weight:700;padding:6px;border:2px solid var(--gold);border-radius:10px;font-family:inherit;color:var(--navy);outline:none;min-width:80px}
  .scan-stat{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;margin-left:6px}
  .scan-stat.dirty{background:#fef3c7;color:var(--warn)}
  .scan-stat.saved{background:#dcfce7;color:var(--ok)}
  .tbadge{background:var(--gold);color:var(--navy);font-size:11px;font-weight:700;padding:1px 6px;border-radius:6px}
  .ico-btn{background:#fff;border:1px solid var(--border);border-radius:7px;padding:3px 9px;cursor:pointer;font-size:14px}
  .ico-btn:hover{background:#f1f5f9}
  .dist{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin-bottom:12px}
  .dist-h{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px}
  .dist-row{display:flex;flex-wrap:wrap;gap:8px;align-items:baseline;padding:4px 0;border-top:1px dashed #e8edf5;font-size:13px}
  .dist-row:first-of-type{border-top:none}
  .dist-row.pool{border-top:1px solid var(--border);margin-top:4px;padding-top:6px}
  .dist-sm{font-weight:600;color:#334155}
  .dist-amt{font-weight:700;color:var(--ok)}
  .dist-st{color:var(--muted);font-size:12px}

<script>
/* ================= CONFIG ================= */
const CONFIG = {
  version: 'v2.2',   // ชื่อแอป: Pre-order Picker — v2.0 แท็บจัดรถ · v2.1 เลือกคลังส่ง · v2.2 map ในแต่ละคัน + accordion + ขวา sticky
  clientId: '615875645128-gasjjvkt6lu8g449cbnhl40k1pu25r0b.apps.googleusercontent.com',
  backendId: '1dAxF4Mz-zhJIVbuJ_Ql126gt08qvVS1wndJD50pqCZI',
  orderGid: '691743937',
  customerGid: '256406184',   // tab Customer (ร้านค้า) ใน backend — join storeCode==รหัสบีพลัส (จัดรถ)
  truckSheetId: '1Zf_HFiccd7nSswAdOkN-GAEIre3_MRo3hKIEjjvPzvg', truckGid: '0',   // master รถ: Vehicle_type / KG (จัดรถ)
  usersId: '1M6HdISsLN684qRWyQ73CA4AmUzmYtZaOlffDJXZZIXQ',
  usersTab: 'Rattana Users for apps',
  productId: '16mYDqAqqJma-_0vCIAajy6bcjdOZ7F6VagxkdkqAB2I',
  productTab: 'PDDT',
  minRole: 5,                 // เข้าได้ถ้า Role ≥ minRole หรือ อยู่แผนกใน adminDepts
  adminDepts: ['ธุรการขาย'],  // แผนก "แอดมิน" ที่เข้าได้แม้ Role < 5 (Surat เพิ่มแผนกที่นี่ได้)
  docBookId: '1aIJPHRGG07xEusXZ6qCUDmaQOg5ScmZwDjyr6VWz8Kg',  // ชีทมาสเตอร์: คอลัมน์ SLMN_CODE → B_CODE (รหัสเซล → เล่มเอกสาร) — Surat แก้ที่มาสเตอร์
  docBookGid: '642869655',
  gasUrl: 'https://script.google.com/macros/s/AKfycbxAYxAA9WJ4H-T9t2ADc7HML6B1BKNkaIFpYSufS8UG37zocz9i5Gk8vVXqfocGHXeV/exec',  // /exec จาก Code.gs (เช็คสินค้า/โอนย้าย)
};

/* order column indices (positional — กันชื่อคอลัมน์ซ้ำ) */
const OC = { date:0,time:1,email:2,name:3,salesman:4,wh:5,store:6,storeCode:7,type:8,
  barcode:9,product:10,cancel:11,qty:12,unit:13,price:14,total:15,orderId:16,note:17,
  whSend1:18,salesman2:19,whSend2:20,dueDate:21,apprStatus:22,
  promoUsed:29, lineId:30, dataIncomplete:31, billId:32, done:33, doneBy:34, doneDate:35, doneTime:36 };   // AD=โปรที่ใช้ · AE=lineId · AF=ข้อมูลไม่ครบ · AG=billId · AH=สถานะจัด · AI=แอดมินจัด · AJ=วันสั่งจัด · AK=เวลาสั่งจัด (แอปนี้เขียนเอง)

const WH_COLOR = {W1:'#FBBF24',W2:'#0EA5E9',W3:'#EF4444',W4:'#15803D',C4:'#4ADE80',HQ:'#C9A84C'};

/* เล่มเอกสาร bplus ต่อเซลล์ — lookup ด้วย "รหัสเซลล์" เสมอ (อย่ายึดชื่อ · เผื่อคนออก/เปลี่ยนคน รหัส+เล่มคาที่เดิม)
   ที่มา: tab "ห้องเอกสาร" ของชีทตัวอย่าง · เพิ่ม/แก้ที่นี่เมื่อมีเซลล์ใหม่ */
const DOC_BOOKS = {
  PMW101:'BV12', PMW102:'BV13', PMW104:'BV26', PMW105:'BV11',
  PMW301:'BV17', PMW304:'BV18', PMW401:'BV22', PMW402:'BV23',
  PMW404:'BV25', RPBC01:'BV41', RPBC02:'BV40', HSW403:'BK09'
};
let BOOK_MAP = {...DOC_BOOKS};                       // live (จากชีท) ทับ fallback ด้านบน
function docBook(code){ return BOOK_MAP[String(code||'').trim()] || ''; }
async function loadDocBooks(){
  try{
    const {matrix} = await gvizFetch(CONFIG.docBookId,{gid:CONFIG.docBookGid, headers:0});  // headers=0 → ไม่กินแถวแรก
    const isBook = s=>/^B[A-Z]\d{1,4}$/i.test(String(s||'').trim());                   // BV11, BK09, BO01 — รับทุก prefix B+ตัวอักษร
    const isCode = s=>/^[A-Za-z]{2,4}\d{2,4}$/.test(String(s||'').trim()) && !isBook(s); // PMW304, HSW403, TTW101
    const m={};
    // 1) ชีทมาสเตอร์: อ่านด้วยชื่อคอลัมน์ SLMN_CODE → B_CODE (2 คอลัมน์ไม่ติดกัน)
    const hdr=(matrix[0]||[]).map(h=>String(h).trim());
    const cc=hdr.indexOf('SLMN_CODE'), bc=hdr.indexOf('B_CODE');
    if(cc>=0 && bc>=0){
      for(let i=1;i<matrix.length;i++){
        const code=String(matrix[i][cc]||'').trim(), book=String(matrix[i][bc]||'').trim();
        if(isCode(code) && isBook(book)) m[code]=book;
      }
    }
    // 2) fallback layout เก่า: หาคู่ (รหัส, เล่ม) ที่อยู่ติดกัน
    if(!Object.keys(m).length){
      for(const r of matrix){
        for(let c=1;c<r.length;c++){
          const book=String(r[c]||'').trim(), code=String(r[c-1]||'').trim();
          if(isBook(book) && isCode(code)) m[code]=book;
        }
      }
    }
    if(Object.keys(m).length) BOOK_MAP = {...DOC_BOOKS, ...m};
    console.log('[docBooks] live:', Object.keys(m).length, 'เล่ม');
  }catch(e){ console.warn('[docBooks] live load failed — ใช้ fallback', e); }
}

let currentUser = null;
let DATA = { orders:[], prodIdx:{}, usersByCode:{}, custByCode:{}, trucks:[] };   // raw loaded (custByCode/trucks = จัดรถ)
let MODEL = null;                                        // processed result
let selectedBills = new Set();                           // ตะกร้าบิลที่เลือก (ข้ามวันได้)
let fSalesmen = new Set();                               // กรองชื่อเซล (ว่าง=ทั้งหมด · เลือกได้หลายคน)
let billsInitialized = false;                            // auto-เลือกเมื่อวานครั้งแรก
let DONE = {};                                            // บิลที่จัดแล้ว (orderId → {date,by,salesman,store}) จากหลังบ้าน แชร์ทุกเครื่อง
let doneView = 'pending';                                 // มุมมองแท็บเลือกบิล: pending=ยังไม่จัด(default) · done=จัดแล้ว · all=ทั้งหมด
let WH_LOCK = null;                                       // ถ้าตั้ง = ล็อกคลัง (admin/role<6 เห็นเฉพาะคลังส่งตัวเอง)

/* ================= helpers ================= */
function normalizeEmail(e){ return String(e||'').trim().toLowerCase(); }
function todayBKK(){
  return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Bangkok',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
}
function yesterdayBKK(){ const d=new Date(todayBKK()+'T12:00:00Z'); d.setUTCDate(d.getUTCDate()-1); return d.toISOString().slice(0,10); }
function dateMinus(iso,n){ const d=new Date((iso||todayBKK())+'T12:00:00Z'); d.setUTCDate(d.getUTCDate()-n); return d.toISOString().slice(0,10); }
let _dateMode='y';
function setDate(mode, fromInput){
  if(mode) _dateMode=mode; else mode=_dateMode;
  const from=document.getElementById('fDateFrom'), to=document.getElementById('fDateTo');
  if(mode==='r3'){ from.value=dateMinus(todayBKK(),2); to.value=todayBKK(); from.style.display=to.style.display='none'; }   // 3 วันล่าสุด (วันนี้ + ย้อน 2)
  else if(mode==='y'){ from.value=to.value=yesterdayBKK(); from.style.display=to.style.display='none'; }
  else if(mode==='t'){ from.value=to.value=todayBKK(); from.style.display=to.style.display='none'; }
  else if(mode==='yt'){ from.value=yesterdayBKK(); to.value=todayBKK(); from.style.display=to.style.display='none'; }
  else if(mode==='c'){ from.style.display=to.style.display='inline-block'; if(!fromInput){ if(!from.value) from.value=todayBKK(); if(!to.value) to.value=from.value; } }
  else if(mode==='all'){ from.value=to.value=''; from.style.display=to.style.display='none'; }   // ทุกวัน = ไม่กรองวัน
  document.querySelectorAll('#dateChips .chip').forEach(c=>c.classList.toggle('on', c.dataset.d===mode));
  if(DATA.orders.length){ process(); render(); }
}
/* เลือกบิลทั้งหมดทุกวัน (เคลียร์กรองวัน → เลือกทั้งหมด) */
function selectAllDays(){ setDate('all'); selectAllBills(true); }
function setRole(v){ document.getElementById('fRole').value=v; document.querySelectorAll('#roleChips .chip').forEach(c=>c.classList.toggle('on', c.dataset.r===v)); if(DATA.orders.length){ process(); render(); } }
function setWh(v){ if(WH_LOCK) v=WH_LOCK;   // ล็อกคลังตัวเอง (admin คลังเดียว)
  document.getElementById('fWh').value=v;
  document.querySelectorAll('#whChips .chip').forEach(c=>{ const on=c.dataset.w===v; c.classList.toggle('on',on); c.style.background=(on&&WH_COLOR[v])?WH_COLOR[v]:''; c.style.color=on?'#fff':''; });
  if(DATA.orders.length){ buildSmDrop(); process(); render(); }   // เปลี่ยนคลัง → rebuild dropdown เซล (cascade)
}
/* multi-select ชื่อเซล */
function buildSmDrop(){
  const drop=document.getElementById('smDrop'); if(!drop) return;
  const fWh=(document.getElementById('fWh')||{}).value||'all';        // cascade: กรองเซลตามคลังที่เลือก
  const map={};
  for(const o of DATA.orders){ const c=String(o.salesman||'').trim(); if(!c) continue;
    if(fWh!=='all' && o.wh!==fWh) continue;
    if(!(c in map)) map[c]=(DATA.usersByCode[c]&&DATA.usersByCode[c].name)||o.name||''; }
  const codes=Object.keys(map).sort();
  [...fSalesmen].forEach(c=>{ if(!(c in map)) fSalesmen.delete(c); });   // ตัดเซลที่ไม่อยู่ในคลังนี้ออก
  drop.innerHTML = `<label class="sm-all"><input type="checkbox" id="smAllChk" ${fSalesmen.size?'':'checked'} onchange="toggleSmAll(this.checked)"> ทั้งหมด (${codes.length} เซล${fWh!=='all'?' · คลัง '+fWh:''})</label>`
    + (codes.length? codes.map(c=>`<label><input type="checkbox" value="${esc(c)}" ${fSalesmen.has(c)?'checked':''} onchange="toggleSm('${esc(c)}',this.checked)"> <b>${esc(c)}</b> ${esc(map[c]||'')}</label>`).join('') : '<label style="color:var(--muted)">— ไม่มีเซลในคลังนี้ —</label>');
  updateSmBtn();
}
function toggleSmDrop(e){ if(e) e.stopPropagation(); const d=document.getElementById('smDrop'); if(!d) return;
  const open=d.classList.toggle('open');
  if(open){ const close=ev=>{ if(!d.contains(ev.target) && ev.target.id!=='smBtn'){ d.classList.remove('open'); document.removeEventListener('click',close); } }; setTimeout(()=>document.addEventListener('click',close),0); }
}
function toggleSm(code,on){ if(on) fSalesmen.add(code); else fSalesmen.delete(code); const a=document.getElementById('smAllChk'); if(a) a.checked=(fSalesmen.size===0); updateSmBtn(); if(DATA.orders.length){ process(); render(); } }
function toggleSmAll(on){ if(on){ fSalesmen.clear(); document.querySelectorAll('#smDrop input[value]').forEach(c=>c.checked=false); updateSmBtn(); if(DATA.orders.length){ process(); render(); } } else { const a=document.getElementById('smAllChk'); if(a) a.checked=true; } }
function updateSmBtn(){ const b=document.getElementById('smBtn'); if(b){ b.textContent=(fSalesmen.size? fSalesmen.size+' เซล':'ทั้งหมด')+' ▾'; b.classList.toggle('on', fSalesmen.size>0); } }
function initChips(){ setDate('r3'); setRole('all'); setWh('all'); }
function toISO(d){ return String(d||'').replace(/\//g,'-').slice(0,10); }   // 2026/06/03 → 2026-06-03
/* keyTS — รองรับเวลาชั่วโมงหลักเดียว "7:17" (Date.parse ISO ต้องการ 2 หลัก ไม่งั้น NaN → เรียงมั่ว) */
function keyTSof(o){ const base=Date.parse(toISO(o.date)+'T00:00:00')||0; const m=String(o&&o.time||'').match(/(\d{1,2}):(\d{2})/); return base + (m? (+m[1])*3600000+(+m[2])*60000 : 0); }
function toBuddhistDMY(iso){ const [y,m,d]=toISO(iso).split('-'); return `${d}/${m}/${(+y)+543}`; }
function num(v){ const n=parseFloat(String(v).replace(/,/g,'')); return isFinite(n)?n:0; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function show(el,on){ document.getElementById(el).style.display = on?'flex':'none'; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2600); }
function loading(on,msg){ document.getElementById('loadMsg').textContent=msg||'กำลังโหลด…'; show('loadOverlay',on); }

/* parse unit string: "ลังx50(CS)" / "แพ็คx6(PA)" / "ชิ้นx1(EA)" / "แพ็คx10(CS)"  → ยึด code ในวงเล็บ */
function parseUnit(u){
  const m = String(u||'').match(/x\s*(\d+)\s*\(([A-Za-z]+)\)/i);   // จับเลข + โค้ดในวงเล็บ (รองรับ BPA/BP-A/โค้ดแปลก)
  if (m){ const c=m[2].toUpperCase(); const level=/CS/.test(c)?'CS':/BP/.test(c)?'BP':/PA/.test(c)?'PA':'EA'; return { eaPer:parseInt(m[1],10)||1, level }; }
  if (/ลัง/.test(u)) return { eaPer:1, level:'CS' };
  if (/แพ็ค/.test(u)) return { eaPer:1, level:'PA' };
  return { eaPer:1, level:'EA' };
}
function unitThai(level){ return level==='CS'?'ลัง':level==='PA'?'แพ็ค':level==='BP'?'Big Pack':'ชิ้น'; }
function fmtTriple(cs,pa,ea){
  const p=[]; if(cs)p.push(cs+' ลัง'); if(pa)p.push(pa+' แพ็ค'); if(ea)p.push(ea+' ชิ้น');
  return p.length?p.join(' '):'0';
}
function roleLabel(r){ return r===4?'ส่ง':r===3?'ปลีก':('R'+r); }
function cleanName(s){ return String(s||'').replace(/^[A-Za-z0-9]+@/,'').trim(); }   // ตัด prefix รหัส "BKCC@..."

/* ================= gviz fetch ================= */
async function gvizFetch(sheetId, opt){
  const sel = (opt.gid!=null&&opt.gid!=='') ? `gid=${opt.gid}` : `sheet=${encodeURIComponent(opt.sheet)}`;
  const hdr = (opt.headers!=null) ? opt.headers : 1;
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&${sel}&headers=${hdr}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('โหลดชีทไม่สำเร็จ ('+res.status+')');
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
  const cols = (json.table.cols||[]).map(c=>c.label||c.id||'');
  const rows = json.table.rows||[];
  const cv = c => {
    if(!c) return '';
    if(c.f!=null && c.f!=='') return String(c.f).trim();
    let v=c.v; if(v==null) return '';
    if(typeof v==='string' && /^Date\(/.test(v)){
      const m=v.match(/Date\((-?\d+),(\d+),(\d+)/);
      if(m) return `${+m[1]}/${String(+m[2]+1).padStart(2,'0')}/${String(+m[3]).padStart(2,'0')}`;
    }
    return String(v).trim();
  };
  const matrix = rows.map(r => (r.c||[]).map(cv));
  return { cols, matrix };
}
function asObjects({cols,matrix}){
  return matrix.map(r=>{ const o={}; cols.forEach((h,i)=>{ if(h&&o[h]===undefined) o[h]=r[i]||''; }); return o; });
}

const AUTH_KEY='mp_auth_v1', AUTH_TTL=30*864e5;
function saveAuth(u){ try{ localStorage.setItem(AUTH_KEY,JSON.stringify({u,ts:Date.now()})); }catch(e){} }
function loadAuth(){ try{ const o=JSON.parse(localStorage.getItem(AUTH_KEY)||'null'); if(o&&o.u&&o.ts&&(Date.now()-o.ts<AUTH_TTL)) return o.u; }catch(e){} return null; }

/* เข้าได้ถ้า Role ≥ minRole หรือ อยู่แผนกแอดมิน (adminDepts) */
function passesGate(u){ const role=parseInt(u&&u.role)||0; const dept=String((u&&u.dept)||'').trim(); return role>=CONFIG.minRole || (CONFIG.adminDepts||[]).includes(dept); }
function initGoogleSignIn(){

async function handleGoogleCredential(resp){
  document.getElementById('loginSpinner').style.display='block';
  document.getElementById('loginError').style.display='none';
  try{
    const p = JSON.parse(atob(resp.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    const email = normalizeEmail(p.email);
    if(!email) throw new Error('ไม่พบ email จาก Google');
    const users = asObjects(await gvizFetch(CONFIG.usersId,{sheet:CONFIG.usersTab}));
    const u = users.find(x=>normalizeEmail(x['E-mail']||x['Email']||'')===email);
    if(!u) throw new Error(`ไม่พบบัญชี ${email} ในระบบ\nติดต่อผู้ดูแลเพื่อเพิ่มอีเมล`);
    const role = parseInt(u['User Role'])||3;
    const dept = String(u['แผนก']||'').trim();
    const cu = { email, name:u['ชื่อ - สกุล']||email, role, wh:u['คลังส่ง']||u['W']||'', dept };
    if(!passesGate(cu)) throw new Error(`สิทธิ์ไม่พอ (Role ${role}${dept?' · '+dept:''})\nแอปนี้สำหรับ Role ${CONFIG.minRole}+ หรือแผนก ${(CONFIG.adminDepts||[]).join('/')}`);
    currentUser = cu;
    saveAuth(currentUser);
    enterApp();
  }catch(e){
    showLoginError(e.message||'เข้าสู่ระบบไม่สำเร็จ');
    document.getElementById('loginSpinner').style.display='none';
  }
}

  const byCode = {};
  for(const r of rows){
    const code = String(r['รหัส บีพลัส']||'').trim();
    if(!code) continue;
    let lat=null,lng=null; const m=String(r['Location']||'').match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);

      code, name:String(r['ชื่อร้านค้า']||'').trim(), addr:String(r['ที่อยู่']||'').trim(),
      tambon:String(r['ต.,อ.,จ. ขอพร']||'').trim(), phone:String(r['เบอร์โทร']||'').trim(), lat, lng,
      type:String(r['ประเภทร้านค้าขอพร']||'').trim(), wh:String(r['WH']||'').trim().toUpperCase(),
      route:String(r['ชื่อรูท']||'').trim(), routeTambon:String(r['ชื่อรูท-ตำบล']||'').trim(),
      salesman:String(r['เซลล์ผู้ดูแล']||'').trim(), stopSeq:num(r['ลำดับร้าน']),
      deliverDay:String(r['วันส่ง']||'').trim(), avg3m:num(r['ยอดขายเฉลี่ย3เดือน']), postcode:String(r['รหัสไปรษณีย์']||'').trim()

/* 1 รหัสมีหลายแถว (ต่าง WH/เซล) → เลือก: WH+เซลตรง+มีพิกัด > WH+พิกัด > เซล+พิกัด > WH > มีพิกัด > แถวแรก */
function matchCustomer(code, wh, salesman){
  const rows = DATA.custByCode[String(code||'').trim()];
  if(!rows||!rows.length) return null;
  if(rows.length===1) return rows[0];
  const W=String(wh||'').trim().toUpperCase(), S=String(salesman||'').trim();
  return rows.find(r=>r.wh===W&&r.salesman===S&&r.lat!=null) || rows.find(r=>r.wh===W&&r.lat!=null)
      || rows.find(r=>r.salesman===S&&r.lat!=null) || rows.find(r=>r.wh===W) || rows.find(r=>r.lat!=null) || rows[0];
}

/* ================= บิลที่จัดแล้ว (done) — เขียนคอลัมน์ "สถานะจัด" (AH) ใน Order tab เอง · ทุกเครื่องเห็นตรงกัน ================= */
/* mark/unmark — optimistic update local DONE ก่อน แล้ว POST ให้ GAS เขียน 'จัดแล้ว'/ล้าง ใน Order tab (match ที่ orderId) */
async function markDoneBackend(orderIds){
  orderIds = (orderIds||[]).filter(id=> id && !DONE[id]);
  if(!CONFIG.gasUrl || !orderIds.length) return 0;
  const by=(currentUser&&currentUser.name)||'', ns=nowStamp(), date=(ns.split(' ')[0]||''), time=(ns.split(' ')[1]||'');
  orderIds.forEach(id=>{ DONE[id]={orderId:id, by, date, time}; });        // optimistic (วัน/เวลา server เป็นตัวจริง · อ่านกลับตอน reload)
  selectedBills.forEach(id=>{ if(DONE[id]) selectedBills.delete(id); });   // จัดแล้ว = เอาออกจากตะกร้า
  try{ await fetch(CONFIG.gasUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'markDone',billIds:orderIds,by})}); }
  catch(e){ console.warn('markDone fail', e); }
  return orderIds.length;
}
async function unmarkDoneBackend(orderIds){
  orderIds = (orderIds||[]).filter(id=> id && DONE[id]);
  if(!CONFIG.gasUrl || !orderIds.length) return 0;
  orderIds.forEach(id=>{ delete DONE[id]; });                              // optimistic
  try{ await fetch(CONFIG.gasUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'unmarkDone',billIds:orderIds})}); }
  catch(e){ console.warn('unmarkDone fail', e); }
  return orderIds.length;
}

/* ================= core processing ================= */
function process(){
  let fFrom = document.getElementById('fDateFrom').value, fTo = document.getElementById('fDateTo').value;
  if(fFrom && fTo && fFrom>fTo){ const t=fFrom; fFrom=fTo; fTo=t; }   // กันใส่สลับ
  const fStore = document.getElementById('fStore').value.trim().toLowerCase();
  const fRole  = document.getElementById('fRole').value;
  const fWh    = document.getElementById('fWh').value;

  const runDate = todayBKK();
  const _rd=runDate.split('-'); const bvDate = String((+_rd[0])+543).slice(-2)+_rd[1]+_rd[2];   // YYMMDD พ.ศ.2หลัก เช่น 690609
  const bplusFields = (o,docNo)=>{
    const isFree = /แถม/.test(o.type);   // คอลัมน์ I: "ขาย"→ช่องจำนวน · "แถม"→ช่องแถม (อีกช่องเป็น 0)
    return {
      docDate:toBuddhistDMY(runDate), docNo, debtor:o.storeCode, endDisc:'',
      branch:'0', dept:'SP01', project:'0', salesman:o.salesman, note:[o.note, o.promo?('โปร: '+o.promo):''].filter(Boolean).join(' · '),
      delivDate:o.dueDate?toBuddhistDMY(o.dueDate):'', barcode:o.barcode, qty:isFree?'0':o.qty, free:isFree?o.qty:'0',
      unitPrice:o.price, discUnit:'', weightUnit:'', lot:'', invNo:'', loc:o.wh, keyDate:String(o.date).replace(/-/g,'/'),
      store:o.store, product:o.product, total:o.total
    };
  };
  // "ตัดออก" = บิลที่อยู่ในมุมมองนี้ (buildBills กรองวันที่/คลัง/role/เซล/ค้นหา + ตัด "ยกเลิก" แล้ว) แต่แอดมิน "ไม่เลือก & ยังไม่จัด" = เลือกไม่เอาเองทั้งบิล (ไม่เกี่ยวกับรออนุมัติ)
  const cutBillIds = new Set();
  buildBills().forEach(b=>{ if(!selectedBills.has(b.orderId) && !DONE[b.orderId]) cutBillIds.add(b.orderId); });

  // 1) filter → บิลที่เลือก = บิลหลัก (lines) · บิลที่ตัดออกทั้งบิล = excluded
  const lines = [], excluded = [];
  for(const o of DATA.orders){
    if(/ยกเลิก/.test(o.cancel)) continue;              // บรรทัดที่เซลยกเลิกเอง → ข้าม (ไม่จัด · ไม่ใช่ "ตัดออก")
    if(o.qty<=0 || !o.barcode) continue;

    if(cutBillIds.has(o.orderId)){                     // บิลถูกตัดออกทั้งบิล (แอดมินเลือกไม่เอา)
      const rl=(DATA.usersByCode[o.salesman]||{}).role||0;
      excluded.push({role:rl, roleLab:roleLabel(rl), ...bplusFields(o,'')});
      continue;
    }

    if(!selectedBills.has(o.orderId)) continue;        // เฉพาะบิลที่เลือก (ตะกร้า ข้ามวันได้)
    if(fStore && !((o.store+' '+o.storeCode+' '+o.product+' '+o.barcode).toLowerCase().includes(fStore))) continue;
    const u = DATA.usersByCode[o.salesman] || {};
    const role = u.role || 0;
    if(fRole!=='all' && String(role)!==fRole) continue;
    if(fSalesmen.size && !fSalesmen.has(o.salesman)) continue;
    if(fWh!=='all' && o.wh!==fWh) continue;

    const pu = parseUnit(o.unit);
    const prod = DATA.prodIdx[o.barcode] || null;
    const eaPerCS = prod ? prod.qtyCS : (pu.level==='CS'? pu.eaPer : 0);
    const eaPerPA = prod && prod.qtyPA ? prod.qtyPA : (pu.level==='PA'? pu.eaPer : 0);
    const eaPerBP = prod && prod.qtyBP ? prod.qtyBP : 0;
    const productKey = prod ? (prod.codeCS || prod.name) : o.barcode;

    lines.push({
      ...o, role, roleLab:roleLabel(role),
      level:pu.level, eaPer:pu.eaPer, eaTotal:o.qty*pu.eaPer,
      eaPerCS, eaPerPA, eaPerBP, productKey,
      productName: prod?cleanName(prod.name):o.product, productShort: prod?cleanName(prod.short):o.product,
      codeCS: prod?prod.codeCS:'', codeBP: prod?prod.codeBP:'', codePA: prod?prod.codePA:'', codeEA: prod?prod.codeEA:o.barcode,
      stockOwn: prod?((prod.stock||{})[String(o.wh||'').trim()]||0):0, stockW4: prod?prod.stockW4:0, stockC4: prod?prod.stockC4:0, catGroup: prod?prod.catGroup:'', catBrand: prod?prod.catBrand:'',
      keyTS: keyTSof(o),
      storeKey: o.storeCode||o.store
    });
  }

  // 2) ก. เต็มลังรายเซลล์ (cell) — ① CS  ② เต็มลังจากเศษตัวเอง  ③ EA-only(น้ำตาล/ข้าว) · เศษจริง → pool (ข.)
  const cellMap = {};   // salesman|store|productKey → ก. row
  const cellKey = (s,st,pk)=> s+'|'+st+'|'+pk;
  function cell(l){
    const k=cellKey(l.salesman,l.storeKey,l.productKey);
    if(!cellMap[k]) cellMap[k]={salesman:l.salesman,salesmanName:l.name,role:l.role,roleLab:l.roleLab,
      wh:l.wh,store:l.store,storeKey:l.storeKey,productKey:l.productKey,productName:l.productName,productShort:l.productShort,
      eaPerCS:l.eaPerCS,eaPerPA:l.eaPerPA,directCS:0,selfCases:0,eaOnlyEA:0};
    return cellMap[k];
  }
  // สะสมเศษ case-hierarchy ต่อ เซลล์|ร้าน|สินค้า ก่อน เพื่อหักเต็มลังของตัวเอง
  const looseSSP={};
  for(const l of lines){
    if(l.level==='CS'){ cell(l).directCS += l.qty; continue; }                  // ① CS = เต็มลัง → ก.
    if(!l.eaPerCS || l.eaPerCS<=1){ cell(l).eaOnlyEA += l.eaTotal; continue; }   // ③ EA-only → ก.
    const k=cellKey(l.salesman,l.storeKey,l.productKey);                         // ② เศษ case-hierarchy → สะสม
    if(!looseSSP[k]) looseSSP[k]={l, ea:0};
    looseSSP[k].ea += l.eaTotal;
  }

  // 2b) ต่อ เซลล์|ร้าน|สินค้า: เต็มลังจากเศษตัวเอง→ก. · ที่เหลือ→pool (รวมข้ามเซลต่อคลัง)
  const pool={}, pvCut={};   // pvCut = เศษที่ "ตัด" จริง (ไม่ครบลัง) ต่อเซล — ใช้ทำ pivot สรุปเศษตัด
  for(const k in looseSSP){
    const {l, ea}=looseSSP[k];
    const fullCases=Math.floor(ea/l.eaPerCS), rem=ea - fullCases*l.eaPerCS;
    if(fullCases>0) cell(l).selfCases += fullCases;
    if(rem>0){
      const gk=l.role+'|'+l.wh+'|'+l.productKey;
      if(!pool[gk]) pool[gk]={role:l.role,roleLab:l.roleLab,wh:l.wh,productKey:l.productKey,
        productName:l.productName,productShort:l.productShort,eaPerCS:l.eaPerCS,eaPerPA:l.eaPerPA,codeCS:l.codeCS,stores:{},poolEA:0};
      const g=pool[gk];
      if(!g.stores[l.storeKey]) g.stores[l.storeKey]={store:l.store,storeKey:l.storeKey,salesman:l.salesman,salesmanName:l.name,wh:l.wh,role:l.role,ea:0,keyTS:0};
      const s=g.stores[l.storeKey]; s.ea+=rem; s.keyTS=Math.max(s.keyTS,l.keyTS); g.poolEA+=rem;
    }
  }

  // 3) รวมเศษข้ามเซล (ต่อคลัง) → ลังเต็ม (→ "เต็มลังรวม") + เศษไม่ครบลัง → ตัด (ร้านคีย์ทีหลังก่อน)
  const scrap=[], cuts=[];
  for(const gk in pool){
    const g=pool[gk]; const stores=Object.values(g.stores);
    const shipCases=Math.floor(g.poolEA/g.eaPerCS);
    let cutEA=g.poolEA - shipCases*g.eaPerCS;
    stores.sort((a,b)=> b.keyTS-a.keyTS || (a.storeKey<b.storeKey?1:-1));
    for(const s of stores){
      const take=Math.min(s.ea,cutEA); s.cutEA=take; s.finalEA=s.ea-take; cutEA-=take;
      if(take>0){ cuts.push({wh:g.wh,role:g.role,roleLab:g.roleLab,salesman:s.salesman,salesmanName:s.salesmanName,
        store:s.store,product:g.productName,orig:fmtFromEA(s.ea,g.eaPerCS,g.eaPerPA),got:fmtFromEA(s.finalEA,g.eaPerCS,g.eaPerPA),cut:fmtFromEA(take,g.eaPerCS,g.eaPerPA)});
        (pvCut[s.salesman]=pvCut[s.salesman]||{})[g.productKey]=(pvCut[s.salesman][g.productKey]||0)+take; }   // เศษที่ตัด → pivot สรุปเศษตัด
    }
    if(shipCases>0){ const pPA=g.eaPerPA||1;
      scrap.push({wh:g.wh,role:g.role,roleLab:g.roleLab,productKey:g.productKey,productName:g.productName,productShort:g.productShort,
        codeCS:g.codeCS,shipCases,eaPerPA:g.eaPerPA,eaPerCS:g.eaPerCS,
        stores:stores.filter(s=>s.finalEA>0).map(s=>({store:s.store,salesman:s.salesman,salesmanName:s.salesmanName,pa:Math.floor(s.finalEA/pPA),ea:s.finalEA%pPA,finalEA:s.finalEA}))});
    }
  }

  // 4) bplus rows (เฉพาะที่อนุมัติ) — เลขที่เอกสาร = เล่มราย "เซลล์" (lookup ด้วยรหัส) + วันที่ + รันต่อเซลล์
  // จับกลุ่มราย billId(orderId): lines บิลเดียวกัน "ต่อกัน" + เลขเอกสารเดียวกัน · เรียงกลุ่มตาม line แรกที่คีย์ (กันบิลที่เพิ่มรายการทีหลัง seq กระจาย)
  const billMinSeq={}; lines.forEach(l=>{ if(billMinSeq[l.orderId]===undefined || l.seq<billMinSeq[l.orderId]) billMinSeq[l.orderId]=l.seq; });
  const sortedLines = [...lines].sort((a,b)=> (billMinSeq[a.orderId]-billMinSeq[b.orderId]) || (a.seq-b.seq) || a.orderId.localeCompare(b.orderId));
  const bvByOrder={}, seqBySalesman={}, unmappedBooks=new Set();
  const bplus = sortedLines.map(l=>{
    if(bvByOrder[l.orderId]===undefined){
      let book = docBook(l.salesman);
      if(!book){ book='NA-'+l.salesman; unmappedBooks.add(l.salesman); }   // ยังไม่มีเล่ม → flag
      seqBySalesman[l.salesman] = (seqBySalesman[l.salesman]||0)+1;
      bvByOrder[l.orderId] = book + bvDate + '/' + String(seqBySalesman[l.salesman]).padStart(3,'0');
    }
    return bplusFields(l, bvByOrder[l.orderId]);
  });

  // 5) ก. per-salesman — เต็มลัง (CS + เต็มลังจากเศษตัวเอง) + EA-only
  const salesmen={};
  for(const k in cellMap){
    const c=cellMap[k];
    const cases=c.directCS + c.selfCases;
    if(cases===0 && c.eaOnlyEA===0) continue;
    const sk=c.salesman||'?';
    if(!salesmen[sk]) salesmen[sk]={salesman:sk,name:c.salesmanName,book:docBook(sk),role:c.role,roleLab:c.roleLab,wh:c.wh,rows:[]};
    const parts=[]; if(cases) parts.push(cases+' ลัง'); if(c.eaOnlyEA) parts.push(c.eaOnlyEA+' ชิ้น');
    salesmen[sk].rows.push({store:c.store,product:c.productName,pick:parts.join(' + ')||'0'});
  }
  Object.values(salesmen).forEach(s=> s.rows.sort((a,b)=> a.product.localeCompare(b.product) || a.store.localeCompare(b.store)));

  // 6) สรุปเศษตัด pivot — เฉพาะที่ "ตัด" (ไม่ครบลัง) × เซลล์
  const codeName={}, prodMeta={};
  lines.forEach(l=>{ if(!codeName[l.salesman]) codeName[l.salesman]=l.name||l.salesman;
    if(!prodMeta[l.productKey]) prodMeta[l.productKey]={name:l.productShort||l.productName, eaPerPA:l.eaPerPA}; });
  const pvMap={}, pvCodes=new Set();
  for(const sm in pvCut){ for(const pk in pvCut[sm]){ const rem=pvCut[sm][pk]; if(rem<=0) continue;
    if(!pvMap[pk]){ const m=prodMeta[pk]||{}; pvMap[pk]={name:m.name||pk, eaPerPA:m.eaPerPA||0, by:{}, totalEa:0}; }
    pvMap[pk].by[sm]=(pvMap[pk].by[sm]||0)+rem; pvMap[pk].totalEa+=rem; pvCodes.add(sm);
  }}
  const pivotCodes=[...pvCodes].sort();
  const pivotNames=pivotCodes.map(c=>codeName[c]||c);
  const pivot=Object.values(pvMap).sort((a,b)=>a.name.localeCompare(b.name)).map(p=>({
    name:p.name, total:fmtLoose(p.totalEa,p.eaPerPA),
    cells:pivotCodes.map(c=> p.by[c]? fmtLoose(p.by[c],p.eaPerPA):'')
  }));

  // stats
  const orderIds=new Set(lines.map(l=>l.orderId));
  const stats={
    orders:orderIds.size, lines:lines.length,
    salesmen:Object.keys(salesmen).length, stores:new Set(lines.map(l=>l.storeKey)).size,
    products:new Set(lines.map(l=>l.productKey)).size,
    baht:lines.reduce((s,l)=>s+l.total,0),
    fullCases:Object.values(cellMap).reduce((a,c)=>a+c.directCS+c.selfCases,0),
    casesScrap:scrap.reduce((s,x)=>s+x.shipCases,0), cuts:cuts.length, excluded:excluded.length, excludedBills:cutBillIds.size, bills:selectedBills.size
  };

  excluded.sort((a,b)=> String(a.salesman).localeCompare(String(b.salesman)) || String(a.note).localeCompare(String(b.note)));

  // scan reference — ยอดสั่งรวม (EA) + รายร้าน (พร้อม keyTS) ต่อสินค้า (ใช้แสดง "สั่งไว้" + allocate รายร้านในแท็บเช็คสินค้า)
  const scanMeta={};
  for(const l of lines){
    if(!scanMeta[l.productKey]) scanMeta[l.productKey]={name:l.productShort||l.productName, eaPerCS:l.eaPerCS, eaPerPA:l.eaPerPA, orderedEA:0, stores:{}};
    const m=scanMeta[l.productKey]; m.orderedEA += l.eaTotal;
    const sk=l.storeKey||l.store;
    if(!m.stores[sk]) m.stores[sk]={salesman:l.salesman,salesmanName:l.name,store:l.store,storeKey:sk,ea:0,keyTS:l.keyTS||0};
    m.stores[sk].ea += l.eaTotal;
    if(l.keyTS && (!m.stores[sk].keyTS || l.keyTS<m.stores[sk].keyTS)) m.stores[sk].keyTS=l.keyTS;   // คีย์เร็วสุด = ได้ก่อน
  }

  // scan distribution — "ยิงแล้วไปเซลไหน": เต็มลังรายเซล (cellMap) + เต็มลังรวมแบ่งกลับ (scrap)
  const scanDist={};
  const sdGet=(pk,f)=>{ if(!scanDist[pk]) scanDist[pk]={name:f.name,eaPerCS:f.eaPerCS,eaPerPA:f.eaPerPA,rows:[],shipCases:0}; return scanDist[pk]; };
  for(const k in cellMap){ const c=cellMap[k]; const cs=c.directCS+c.selfCases;
    if(cs===0 && c.eaOnlyEA===0) continue;
    sdGet(c.productKey,{name:c.productShort||c.productName,eaPerCS:c.eaPerCS,eaPerPA:c.eaPerPA})
      .rows.push({type:'sm',salesman:c.salesman,name:c.salesmanName,store:c.store,cases:cs,eaOnly:c.eaOnlyEA});
  }
  for(const x of scrap){ const d=sdGet(x.productKey,{name:x.productShort||x.productName,eaPerCS:x.eaPerCS,eaPerPA:x.eaPerPA});
    d.shipCases+=x.shipCases;
    x.stores.forEach(s=> d.rows.push({type:'pool',salesman:s.salesman,name:s.salesmanName,store:s.store,pa:s.pa,ea:s.ea}));
  }

  // ===== Export 2 แบบ =====
  const catSort=(a,b)=> String(a.catGroup||'~').localeCompare(String(b.catGroup||'~')) || String(a.catBrand||'~').localeCompare(String(b.catBrand||'~')) || String(a.product).localeCompare(String(b.product));
  // แบบ1 — ใบจัดเต็มลัง (รายเซล): CS สำหรับลังได้ + EA สำหรับ EA-only (ข้าว/น้ำตาล = ของเต็ม ไม่ใช่เศษ) · รวมทุกร้านต่อสินค้า · เรียง CAT
  const f1={};
  for(const l of lines){
    const sk=l.salesman||'?';
    if(!f1[sk]) f1[sk]={salesman:sk,name:l.name,book:docBook(sk),role:l.role,roleLab:l.roleLab,wh:l.wh,prod:{}};
    const P=f1[sk].prod;
    if(!P[l.productKey]) P[l.productKey]={product:l.productShort||l.productName,
      eaPerCS:l.eaPerCS, codeCS:l.codeCS,codeBP:l.codeBP,codePA:l.codePA,codeEA:l.codeEA,
      ea:0, stockOwn:l.stockOwn, catGroup:l.catGroup, catBrand:l.catBrand};
    P[l.productKey].ea += l.eaTotal;
  }
  const fmt1 = Object.values(f1).map(s=>({ salesman:s.salesman,name:s.name,book:s.book,role:s.role,roleLab:s.roleLab,wh:s.wh,
      rows:Object.values(s.prod).map(x=>{
        const caseable=x.eaPerCS>1, unit=caseable?'CS':'EA';
        const qty=caseable?Math.floor(x.ea/x.eaPerCS):x.ea;       // ลังได้=ลัง · EA-only=ชิ้น
        const code=caseable?x.codeCS:x.codeEA;
        return {product:x.product, unit, qty, barcode:code||x.codeCS||x.codeBP||x.codePA||x.codeEA, fb:!code, stockOwn:x.stockOwn, catGroup:x.catGroup, catBrand:x.catBrand};
      }).filter(x=>x.qty>0).sort(catSort)
    })).filter(s=>s.rows.length).sort((a,b)=> String(a.salesman).localeCompare(String(b.salesman)));

  // แบบ2 — เอาเศษมารวม: เฉพาะ "เศษของลังได้" (หลังหักลังรายเซล) · EA-only ไปแบบ1 แล้ว · รวมทุกเซลต่อสินค้า → แตก CS/BP/PA/EA · บาร์=ตัว EA
  const smProd={};
  for(const l of lines){ if(!l.eaPerCS || l.eaPerCS<=1) continue;   // EA-only → แบบ1 (ของเต็ม ไม่ใช่เศษ)
    const k=l.salesman+'|'+l.productKey; if(!smProd[k]) smProd[k]={l,ea:0}; smProd[k].ea+=l.eaTotal; }
  const rem={};
  for(const k in smProd){ const {l,ea}=smProd[k];
    const remEA = ea % l.eaPerCS;     // เศษหลังหักลังของเซลนั้น
    if(remEA<=0) continue;
    if(!rem[l.productKey]) rem[l.productKey]={product:l.productShort||l.productName,
      barcode:l.codeEA||l.codePA||l.codeBP||l.codeCS, barUnit:l.codeEA?'EA':(l.codePA?'PA':(l.codeBP?'BP':'CS')),
      eaPerCS:l.eaPerCS,eaPerBP:l.eaPerBP,eaPerPA:l.eaPerPA, stockC4:l.stockC4, stockW4:l.stockW4, catGroup:l.catGroup, catBrand:l.catBrand, remEA:0};
    rem[l.productKey].remEA += remEA;
  }
  const fmt2 = Object.values(rem).map(x=>{ let r=x.remEA, cs=0,bp=0,pa=0,ea=0;
    if(x.eaPerCS>1){ cs=Math.floor(r/x.eaPerCS); r%=x.eaPerCS; }
    if(x.eaPerBP>1){ bp=Math.floor(r/x.eaPerBP); r%=x.eaPerBP; }
    if(x.eaPerPA>1){ pa=Math.floor(r/x.eaPerPA); r%=x.eaPerPA; }
    ea=r;
    return {barcode:x.barcode,barUnit:x.barUnit,product:x.product,ea,pa,bp,cs,stockC4:x.stockC4,stockW4:x.stockW4,catGroup:x.catGroup,catBrand:x.catBrand};
  }).filter(x=> x.ea||x.pa||x.bp||x.cs ).sort(catSort);

  MODEL = { bplus, salesmen:Object.values(salesmen), scrap, cuts, excluded, pivot, pivotNames, stats, date:runDate, unmapped:[...unmappedBooks], scanMeta, scanDist, docNoByOrder:bvByOrder, fmt1, fmt2 };
}
/* รวมเศษ → แพ็ค+ชิ้น (ไม่ roll เป็นลัง) */
function fmtLoose(ea, eaPerPA){
  if(!ea) return '';
  if(eaPerPA>0){ const pa=Math.floor(ea/eaPerPA), e=ea%eaPerPA; return [pa?pa+' แพ็ค':'', e?e+' ชิ้น':''].filter(Boolean).join(' ')||'0'; }
  return ea+' ชิ้น';
}
/* express EA back into CS/PA/EA text */
function fmtFromEA(ea, eaPerCS, eaPerPA){
  let r=ea, cs=0,pa=0;
  if(eaPerCS>0){ cs=Math.floor(r/eaPerCS); r%=eaPerCS; }
  if(eaPerPA>0){ pa=Math.floor(r/eaPerPA); r%=eaPerPA; }
  return fmtTriple(cs,pa,r);
}

/* ================= render ================= */
function render(){
  if(!MODEL) return;
  const s=MODEL.stats;
  document.getElementById('exportBtn').disabled = s.lines===0;
  document.getElementById('tiles').innerHTML = [
    ['เลือกบิล', s.bills||0, 'ok'], ['ออเดอร์', s.orders], ['รายการ', s.lines], ['เซลล์', s.salesmen],
    ['ร้านค้า', s.stores], ['สินค้า', s.products],
    ['ยอดรวม', '฿'+s.baht.toLocaleString('th-TH',{maximumFractionDigits:0})],
    ['เต็มลัง(เซล)', s.fullCases||0, 'ok'], ['เต็มลังรวม', s.casesScrap, 'ok'], ['ตัดเศษ', s.cuts, s.cuts?'warn':''],
    ['บิลตัดออก', s.excludedBills||0, (s.excludedBills?'warn':'')]
  ].map(([l,v,cl])=>`<div class="tile ${cl||''}"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');
  renderBillSelect(); renderOrders(); renderSales(); renderScrap(); renderCut(); renderExcl(); renderPivot(); renderScan();
}
function renderPivot(){
  const pv=MODEL.pivot||[], names=MODEL.pivotNames||[];
  if(!pv.length){ document.getElementById('panel-pivot').innerHTML='<div class="empty">✅ ไม่มีเศษถูกตัด — ลงลังหมดทุกตัว</div>'; return; }
  const cap=300;
  const head=['สินค้า','รวม',...names];
  const body=pv.slice(0,cap).map(r=>`<tr><td>${esc(r.name)}</td><td><b>${esc(r.total)}</b></td>${r.cells.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('');
  document.getElementById('panel-pivot').innerHTML=
    `<div class="note">เศษที่ "ตัด" (ไม่ครบลัง ไม่ได้ส่ง) ต่อสินค้า แยกตามเซล — แสดง ${Math.min(cap,pv.length)}/${pv.length} แถว · Export ครบ</div>
     <div class="tbl-wrap"><table><thead><tr>${head.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function renderExcl(){
  const ex=MODEL.excluded||[];
  if(!ex.length){ document.getElementById('panel-excl').innerHTML='<div class="empty">✅ ไม่มีบิลตัดออก — เลือกครบทุกบิลในมุมมองนี้</div>'; return; }
  const nBills=(MODEL.stats||{}).excludedBills||new Set(ex.map(r=>r.store+'|'+r.debtor)).size;
  const head=['พนง.ขาย','ร้าน','หมายเหตุ','บาร์โค้ด','สินค้า','จำนวน','แถม','ราคา','คลัง','วันที่คีย์'];
  const body=ex.slice(0,400).map(r=>`<tr class="cut-row">
    <td>${esc(r.salesman)}</td><td>${esc(r.store)}</td><td>${esc(r.note)}</td><td>${esc(r.barcode)}</td><td>${esc(r.product)}</td>
    <td class="num">${r.qty}</td><td class="num">${r.free}</td><td class="num">${(r.unitPrice||0).toLocaleString()}</td>

function buildBills(){
  const fFrom=document.getElementById('fDateFrom').value, fTo=document.getElementById('fDateTo').value;
  const fStore=document.getElementById('fStore').value.trim().toLowerCase();
  const fRole=document.getElementById('fRole').value, fWh=document.getElementById('fWh').value;
  const bills={};
  for(const o of DATA.orders){
    if(fFrom && o.date<fFrom) continue;
    if(fTo && o.date>fTo) continue;
    if(/ยกเลิก/.test(o.cancel)) continue;
    const u=DATA.usersByCode[o.salesman]||{}; const role=u.role||0;
    if(fRole!=='all' && String(role)!==fRole) continue;
    if(fSalesmen.size && !fSalesmen.has(o.salesman)) continue;
    if(fWh!=='all' && o.wh!==fWh) continue;
    if(fStore && !((o.store+' '+o.storeCode+' '+o.product+' '+o.barcode).toLowerCase().includes(fStore))) continue;
    if(!o.orderId) continue;
    if(!bills[o.orderId]) bills[o.orderId]={orderId:o.orderId,date:o.date,time:o.time||'',salesman:o.salesman,salesmanName:o.name,store:o.store,wh:o.wh,lines:0,total:0,keyTS:0,seq:Infinity};
    const b=bills[o.orderId]; const ts=keyTSof(o);
    if(ts>=b.keyTS){ b.keyTS=ts; if(o.time) b.time=o.time; }
    if(o.seq<b.seq) b.seq=o.seq;
    b.lines++; b.total+=o.total;
  }
  return Object.values(bills).sort((a,b)=> a.seq-b.seq || a.orderId.localeCompare(b.orderId));   // เรียงตามลำดับที่คีย์เข้าแอป (เก่า→ใหม่)
}

/* ================= 🚚 จัดรถ — จัดกลุ่มร้านตาม "รหัสเซล" + allocate สต็อก + แผนที่เส้นทาง ================= */
const WH_DEPOT={W1:{lat:13.4098,lng:100.0023},W2:{lat:14.4745,lng:100.1218},W3:{lat:13.5362,lng:99.8174},W4:{lat:13.8196,lng:100.0644},C4:{lat:13.6592,lng:100.6068},HQ:{lat:13.6592,lng:100.6068}};

function haversine(a,b){const R=6371,toR=x=>x*Math.PI/180;const dLat=toR(b.lat-a.lat),dLng=toR(b.lng-a.lng);const s=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));}
function kgPerEA(prod){const w=(prod&&prod.weightCS>0)?prod.weightCS:10;const cs=(prod&&prod.qtyCS>0)?prod.qtyCS:1;return w/cs;}   // GOODS_WEIGHT kg/ลัง (0→10) → kg/ชิ้น
function roleChan(sm){const r=(DATA.usersByCode[sm]||{}).role||0;return r===4?'ส่ง':r===3?'ปลีก':'';}
function depotOf(wh){return WH_DEPOT[String(wh||'').toUpperCase()]||{lat:13.7,lng:100.5};}
function jrThrVal(){const e=document.getElementById('jrThr');return e?(+e.value||15):15;}
function csFmt(cs){return (Math.round(cs*10)/10).toLocaleString();}
function ffMini(ff){return ff==='ok'?'<span class="jr-ff ok">ครบ</span>':ff==='part'?'<span class="jr-ff part">ขาด</span>':'<span class="jr-ff out">หมด</span>';}
function nnOrder(bills,depot){const pts=bills.filter(b=>b.lat!=null),rest=bills.filter(b=>b.lat==null);const out=[];let cur=depot;const pool=[...pts];while(pool.length){let bi=0,bd=Infinity;pool.forEach((b,i)=>{const d=haversine(cur,b);if(d<bd){bd=d;bi=i;}});const nx=pool.splice(bi,1)[0];out.push(nx);cur=nx;}return [...out,...rest];}

    catch(e){ p.innerHTML='<div class="empty">❌ โหลดข้อมูลจัดรถไม่สำเร็จ — '+esc(e.message||e)+'</div>'; return; }
  }
  buildTrucks(); renderTruckTab();
}

function buildTrucks(){
  const swhOf=o=>String(o.whSend1||o.wh||'').trim().toUpperCase();   // คลังส่งจริง (col S) — W3 ส่วนใหญ่ส่งจาก W1 (สต็อกอยู่คลังนี้)
  const selAll=[];
  for(const o of DATA.orders){ if(!selectedBills.has(o.orderId)) continue; if(/ยกเลิก/.test(o.cancel)) continue; if(o.qty<=0||!o.barcode) continue; selAll.push(o); }
  const swhSet=[...new Set(selAll.map(swhOf))].filter(Boolean).sort();   // คลังส่งที่มีในบิลที่เลือก
  if(WH_LOCK && swhSet.includes(WH_LOCK)) jrWh=WH_LOCK;                  // role<6 + มีคลัง → ล็อกคลังตัวเอง
  else if(!jrWh || !swhSet.includes(jrWh)){ const cnt={}; selAll.forEach(o=>{const w=swhOf(o);cnt[w]=(cnt[w]||0)+1;}); jrWh=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a])[0]||WH_LOCK||''; }   // ไม่ล็อก → default คลังส่งหลัก (role≥6 เปลี่ยนเองได้)
  const sel = jrWh ? selAll.filter(o=>swhOf(o)===jrWh) : selAll;        // จัดรถทีละคลังส่ง (รถออกจากคลังเดียว)
  const prodOf=o=>DATA.prodIdx[o.barcode]||null;
  const pkOf=o=>{const p=prodOf(o);return p?(p.codeCS||p.name):o.barcode;};
  const eaOf=o=>{const pu=parseUnit(o.unit);return o.qty*(pu.eaPer||1);};
  /* allocate สต็อก ต่อ (คลังส่ง|สินค้า) — keyTS asc คีย์ก่อนได้ก่อน */
  const ag={}; for(const o of sel){const k=swhOf(o)+'|'+pkOf(o);(ag[k]=ag[k]||[]).push(o);}
  const give={}, shortAgg={};
  for(const k in ag){
    const lines=ag[k], prod=prodOf(lines[0]), wh=swhOf(lines[0]);
    const stockEA=prod?((prod.stock||{})[wh]||0):0;
    lines.sort((a,b)=>(keyTSof(a)-keyTSof(b))||(a.seq-b.seq));
    let left=stockEA, demand=0;
    for(const o of lines){const need=eaOf(o);demand+=need;const g=Math.max(0,Math.min(need,left));left-=g;give[o.seq]=g;}
    const eaPerCS=prod&&prod.qtyCS>0?prod.qtyCS:1;
    shortAgg[k]={wh,name:prod?cleanName(prod.short||prod.name):(lines[0].product||k),demandCS:demand/eaPerCS,stockCS:stockEA/eaPerCS,shortCS:Math.max(0,demand-stockEA)/eaPerCS,
      stores:[...new Set(lines.filter(o=>eaOf(o)>(give[o.seq]||0)+0.001).map(o=>o.store))],
      shortBaht:lines.reduce((a,o)=>{const need=eaOf(o);const sh=need-(give[o.seq]||0);return a+(need>0?o.total*sh/need:0);},0)};
  }
  /* รวมรายบิล */
  const bm={};
  for(const o of sel){
    if(!bm[o.orderId]){ const c=matchCustomer(o.storeCode,o.wh,o.salesman);   // o.wh(โซน)=customer.WH ใช้ match ร้าน · wh ที่เก็บ=คลังส่งจริง
      bm[o.orderId]={orderId:o.orderId,store:o.store,storeCode:o.storeCode,wh:swhOf(o),zone:o.wh,salesman:o.salesman,salesmanName:(DATA.usersByCode[o.salesman]||{}).name||'',chan:roleChan(o.salesman),
        route:c?c.route:'',stopSeq:c?c.stopSeq:0,lat:c?c.lat:null,lng:c?c.lng:null,phone:c?c.phone:'',addr:c?c.addr:'',type:c?c.type:'',
        keyTS:keyTSof(o),baht:0,allocBaht:0,shortBaht:0,kg:0,lm:{}}; }
    const b=bm[o.orderId],prod=prodOf(o),need=eaOf(o),g=give[o.seq]||0,pk=pkOf(o),eaPerCS=prod&&prod.qtyCS>0?prod.qtyCS:1;
    b.baht+=o.total; b.allocBaht+=need>0?o.total*g/need:0; b.shortBaht+=need>0?o.total*(need-g)/need:0; b.kg+=g*kgPerEA(prod);
    if(!b.lm[pk]) b.lm[pk]={name:prod?cleanName(prod.short||prod.name):(o.product||pk),orderEA:0,giveEA:0,eaPerCS};
    b.lm[pk].orderEA+=need; b.lm[pk].giveEA+=g;
  }
  const bills=Object.values(bm).map(b=>{ const ls=Object.values(b.lm);
    const anyShort=ls.some(l=>l.giveEA<l.orderEA-0.001), allOut=ls.every(l=>l.giveEA<=0.001);
    b.ff=allOut?'out':anyShort?'part':'ok';
    b.shortLines=ls.map(l=>({name:l.name,orderCS:l.orderEA/l.eaPerCS,gotCS:l.giveEA/l.eaPerCS,shortCS:Math.max(0,l.orderEA-l.giveEA)/l.eaPerCS})).filter(l=>l.shortCS>0.001);
    return b; });
  /* group ตาม รหัสเซล */
  const gm={}; for(const b of bills){ const sm=b.salesman||'(ไม่ระบุเซล)'; (gm[sm]=gm[sm]||{sm,smName:b.salesmanName,wh:b.wh,bills:[]}).bills.push(b); }
  const trucks=[...(DATA.trucks||[])].sort((a,b)=>a.kg-b.kg);
  const sugg=kg=>trucks.find(t=>t.kg>=kg)||null;
  const grps=Object.values(gm).map(g=>{
    const ws=g.bills.filter(b=>b.stopSeq>0).sort((a,b)=>a.stopSeq-b.stopSeq||a.keyTS-b.keyTS);
    const ns=nnOrder(g.bills.filter(b=>!(b.stopSeq>0)),depotOf(g.wh));
    const ordered=[...ws,...ns]; ordered.forEach((b,i)=>b.stop=i+1);
    const totalKg=g.bills.reduce((a,b)=>a+b.kg,0),totalBaht=g.bills.reduce((a,b)=>a+b.allocBaht,0),shortBaht=g.bills.reduce((a,b)=>a+b.shortBaht,0),shortN=g.bills.filter(b=>b.ff!=='ok').length;
    const tk=sugg(totalKg);
    return {...g,bills:ordered,totalKg,totalBaht,shortBaht,shortN,truck:tk,overCap:!tk,hasGeo:g.bills.some(b=>b.lat!=null)};
  }).sort((a,b)=>b.totalKg-a.totalKg);
  const shortage=Object.values(shortAgg).filter(s=>s.shortCS>0.001).sort((a,b)=>b.shortBaht-a.shortBaht);
  TRUCK_MODEL={wh:jrWh,whOptions:swhSet,groups:grps,shortage,stamp:nowStamp(),
    stats:{trucks:grps.length,bills:bills.length,kg:grps.reduce((a,g)=>a+g.totalKg,0),baht:grps.reduce((a,g)=>a+g.totalBaht,0),shortBaht:shortage.reduce((a,s)=>a+s.shortBaht,0),noGeo:bills.filter(b=>b.lat==null).length}};
  if((!jrSel||!grps.find(g=>g.sm===jrSel))&&grps.length) jrSel=grps[0].sm;
  if(!jrOpenSm||!grps.find(g=>g.sm===jrOpenSm)) jrOpenSm=jrSel;   // การ์ดที่กางอยู่ (accordion) = ที่โชว์แผนที่
}

function jrGroup(sm){ return (TRUCK_MODEL.groups||[]).find(g=>g.sm===sm)||null; }
function jrTruckLabel(g){ return g.truck?(g.truck.type+' ('+g.truck.kg.toLocaleString()+'kg)'):'เกิน 10ล้อ — ต้องแบ่งคัน'; }

  const whCtl = WH_LOCK
    ? `<span class="jr-whlock" style="background:${whc}">🔒 จัดรถ คลัง ${esc(M.wh||'-')}</span>`

  let h=`<div class="jr-head">
    ${whCtl}
    <span class="jr-day">🗓️ วันส่ง ${todayBKK()} · สต็อก ณ ${esc((M.stamp||'').split(' ')[1]||'')}</span>
    <button class="btn-load" style="padding:7px 13px;height:auto" onclick="buildTrucks();renderTruckTab()">🔄 จัดรถใหม่</button>
    <button class="btn-load" style="padding:7px 13px;height:auto;background:${jrShortOpen?'var(--red)':'#64748b'}" onclick="jrShortOpen=!jrShortOpen;renderTruckTab()">❗ ของที่ขาด (${M.shortage.length})</button>
    <button class="btn-export" style="padding:7px 13px;height:auto" onclick="exportTrucks()">⬇️ Export ใบจัดรถ</button>
  </div>
  <div class="tiles">
    <div class="tile ok"><div class="v">${s.trucks}</div><div class="l">🚚 คัน (ตามเซล)</div></div>
    <div class="tile"><div class="v">${s.bills}</div><div class="l">บิล/ร้าน</div></div>
    <div class="tile"><div class="v">${Math.round(s.kg).toLocaleString()}</div><div class="l">น้ำหนักรวม kg</div></div>
    <div class="tile"><div class="v">฿${Math.round(s.baht).toLocaleString()}</div><div class="l">มูลค่าขึ้นรถ</div></div>
    <div class="tile ${s.shortBaht?'warn':''}"><div class="v">฿${Math.round(s.shortBaht).toLocaleString()}</div><div class="l">มูลค่าที่ขาด</div></div>
    <div class="tile ${s.noGeo?'warn':''}"><div class="v">${s.noGeo}</div><div class="l">📍 ไม่มีพิกัด</div></div>
  </div>`;
  if(!M.groups.length){ p.innerHTML=h+'<div class="empty">ยังไม่ได้เลือกบิล — ไปแท็บ "เลือกบิล" ติ๊กบิลที่จะจัด แล้วกลับมาแท็บนี้</div>'; return; }
  if(jrShortOpen) h+=jrShortageHtml();
  h+=`<div class="jr-grid">
    <div class="jr-pane jr-left"><h3>🚚 คันตามเซล (${M.groups.length}) — กดหัวการ์ดเพื่อกาง/พับ · แผนที่อยู่ในคันที่กาง (รถใครรถมัน)</h3><div id="jrTruckList">${M.groups.map(jrTruckCard).join('')}</div></div>
    <div class="jr-pane jr-right"><h3>🧾 บิล/ร้าน — กดเพื่อดูบนแผนที่</h3>${jrSearchHtml()}<div id="jrBillList">${jrBillRows()}</div></div>
  </div>`;
  p.innerHTML=h;
  jrInitMap();
}

    <div class="jr-mapbar">

function jrTruckCard(g){
  const whc=WH_COLOR[g.wh]||'#0d1b3e';
  const capKg=g.truck?g.truck.kg:15000, pct=Math.min(100,Math.round(g.totalKg/capKg*100)), cls=g.overCap?'r':pct>=85?'o':'g';
  const isOpen=g.sm===jrOpenSm, hostSm=jrOpenSm||(TRUCK_MODEL.groups[0]&&TRUCK_MODEL.groups[0].sm), hasMap=g.sm===hostSm;
  let prev=depotOf(g.wh), stops='';
  g.bills.forEach(b=>{ const here=b.lat!=null?{lat:b.lat,lng:b.lng}:null; const d=here?haversine(prev,here):null;
    stops+=`<div class="jr-stop"><div class="jr-seqdot" style="background:${whc}">${b.stop}</div>
      <div class="sn">${esc(b.store)} ${ffMini(b.ff)}</div>
      <div class="km ${d!=null&&d>jrThrVal()?'far':''}">${d!=null?d.toFixed(1)+' กม.':'📍-'}</div></div>`;
    if(here) prev=here; });
  return `<div class="jr-truck ${g.sm===jrSel?'sel':''} ${isOpen?'open':''} ${g.sm==='(ไม่ระบุเซล)'?'pool':''}" data-sm="${esc(g.sm)}">
    <div class="jr-thead" onclick="jrToggleCard('${esc(g.sm)}')">
      <span style="font-size:18px">🚚</span><span class="jr-tname">เซล ${esc(g.sm)}</span>
      ${g.smName?`<span class="jr-rt">${esc(g.smName)}</span>`:''}
      <span class="jr-truckkind">${g.overCap?'⚠️ ':''}${jrTruckLabel(g)}</span>
      <span class="jr-nstore">${g.bills.length} ร้าน ▾</span>
    </div>
    <div class="jr-mini">
      <div class="m"><div class="mv">${g.bills.length}</div><div class="ml">ร้าน</div></div>
      <div class="m"><div class="mv">${Math.round(g.totalKg).toLocaleString()}</div><div class="ml">kg</div></div>
      <div class="m"><div class="mv">฿${(g.totalBaht/1000).toFixed(0)}k</div><div class="ml">มูลค่า</div></div>
      <div class="m ${g.shortN?'bad':''}"><div class="mv">${g.shortN?('❗'+g.shortN):'0'}</div><div class="ml">บิลขาด</div></div>
    </div>
    <div class="jr-bars"><div class="jr-bar"><div class="bl"><span>น้ำหนัก vs ${g.truck?g.truck.type:'รถใหญ่สุด'}</span><span>${Math.round(g.totalKg).toLocaleString()}/${capKg.toLocaleString()} kg · ${pct}%</span></div><div class="bt"><div class="jr-bf ${cls}" style="width:${pct}%"></div></div></div></div>
    <div class="jr-tact">
      <button class="jr-tbtn map" onclick="event.stopPropagation();jrSelect('${esc(g.sm)}')">🗺️ ดูเส้นทาง</button>
      <button class="btn-export" style="padding:6px 10px;height:auto" onclick="event.stopPropagation();exportTrucks('${esc(g.sm)}')">📋 ใบจัดคันนี้</button>
    </div>
    <div class="jr-stops">${hasMap?mapHostHtml(g):''}${stops}</div>
  </div>`;
}

function jrSearchHtml(){
  const M=TRUCK_MODEL;
  const smOpt=['<option value="">— ทุกเซล —</option>'].concat(M.groups.map(g=>`<option value="${esc(g.sm)}" ${jrFsm===g.sm?'selected':''}>เซล ${esc(g.sm)}${g.smName?' · '+esc(g.smName):''} (${g.bills.length})</option>`)).join('');
  const pool=jrFsm?(jrGroup(jrFsm)?jrGroup(jrFsm).bills:[]):M.groups.flatMap(g=>g.bills);
  const stOpt=['<option value="">— ทุกร้าน —</option>'].concat(pool.map(b=>`<option value="${esc(b.orderId)}" ${jrFstore===b.orderId?'selected':''}>${esc(b.store)}</option>`)).join('');
  return `<div class="jr-search">
    <select onchange="jrFsm=this.value;jrFstore='';renderTruckTab()">${smOpt}</select>
    <select onchange="if(this.value)jrPickStore(this.value);else{jrFstore='';renderTruckTab();}">${stOpt}</select>
    <button class="chip ${jrUnloc?'on':''}" style="cursor:pointer" onclick="jrUnloc=!jrUnloc;renderTruckTab()">📍 ไม่มีพิกัด ${M.stats.noGeo}</button>
  </div>`;
}

function jrBillRows(){
  const M=TRUCK_MODEL; let bills=M.groups.flatMap(g=>g.bills.map(b=>({b,sm:g.sm})));
  if(jrFsm) bills=bills.filter(x=>x.sm===jrFsm);
  if(jrFstore) bills=bills.filter(x=>x.b.orderId===jrFstore);
  if(jrUnloc) bills=bills.filter(x=>x.b.lat==null);
  if(!bills.length) return '<div class="empty">ไม่มีบิลตามตัวกรอง</div>';
  return bills.map(({b,sm})=>`<div class="jr-row ${b.orderId===jrFstore?'act':''}" data-oid="${esc(b.orderId)}" onclick="jrPickStore('${esc(b.orderId)}')">
    <span class="jr-pill">เซล ${esc(sm)}</span>
    <div style="flex:1;min-width:0"><div class="rstore">${esc(b.store)} ${b.lat==null?'📍':''}</div>
    <div class="rmeta">${b.route?('🛣️ '+esc(b.route)+' · จอด#'+b.stop):'ไม่มีรูท'} · ${Math.round(b.kg)}kg · ฿${Math.round(b.allocBaht).toLocaleString()}${b.shortBaht>1?' · ขาด ฿'+Math.round(b.shortBaht).toLocaleString():''}</div></div>
    ${ffMini(b.ff)}</div>`).join('');
}

function jrShortageHtml(){
  const sh=TRUCK_MODEL.shortage; if(!sh.length) return '<div class="jr-banner">✅ ไม่มีของขาด — สต็อกพอทุกตัวที่เลือก</div>';
  const rows=sh.slice(0,200).map(s=>`<tr><td>${esc(s.name)}</td><td class="r">${csFmt(s.demandCS)}</td><td class="r">${csFmt(s.stockCS)}</td><td class="r jr-miss">${csFmt(s.shortCS)}</td><td class="r jr-miss">฿${Math.round(s.shortBaht).toLocaleString()}</td><td>${esc(s.stores.slice(0,3).join(', '))}${s.stores.length>3?' +'+(s.stores.length-3):''}</td></tr>`).join('');
  return `<div class="jr-stocktab" style="margin-bottom:12px;max-height:280px"><table><thead><tr><th>สินค้าที่ขาด (คีย์ก่อนได้ก่อน)</th><th class="r">สั่ง(ลัง)</th><th class="r">สต็อก</th><th class="r">ขาด</th><th class="r">มูลค่าขาด</th><th>กระทบร้าน</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

async function jrInitMap(){
  const el=document.getElementById('jrMap');
  if(!el){ if(jrMap){ try{jrMap.remove();}catch(e){} jrMap=null; } return; }   // ไม่มีคันกาง = ไม่มีแผนที่
  if(!await ensureLeaflet()){ el.innerHTML='<div class="empty" style="padding:30px">โหลดแผนที่ไม่ได้ (ออฟไลน์?) — ดูลำดับจอด/ระยะในการ์ดแทน</div>'; return; }
  if(jrMap){ try{jrMap.remove();}catch(e){} jrMap=null; }
  const g=jrGroup(jrOpenSm)||jrGroup(jrSel), dep=depotOf(g?g.wh:TRUCK_MODEL.wh);
  jrMap=L.map('jrMap',{zoomControl:true}).setView([dep.lat,dep.lng],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(jrMap);
  jrLayer=L.layerGroup().addTo(jrMap);
  setTimeout(()=>{ if(jrMap){ jrMap.invalidateSize(); jrRenderRoute(); } },80);   // invalidateSize กัน map bug (tiles เพี้ยน/เทา ตอน layout ยังไม่นิ่ง)
}
function jrRenderRoute(){
  if(!jrMap||!jrLayer) return;
  jrLayer.clearLayers();
  const g=jrGroup(jrSel); if(!g) return;
  const thr=jrThrVal(), dep=depotOf(g.wh), whc=WH_COLOR[g.wh]||'#0d1b3e';
  L.marker([dep.lat,dep.lng],{icon:L.divIcon({className:'',html:'<div class="jr-pinhome">🏠</div>',iconSize:[28,28],iconAnchor:[14,14]})}).addTo(jrLayer).bindPopup('<b>คลัง '+(g.wh||'')+'</b><br>จุดเริ่ม (พิกัดประมาณ)');
  let prev=dep,total=0,far=0; const pts=[[dep.lat,dep.lng]];
  g.bills.filter(b=>b.lat!=null).forEach(b=>{
    const d=haversine(prev,b); total+=d; const isFar=d>thr; if(isFar)far++; pts.push([b.lat,b.lng]);
    L.polyline([[prev.lat,prev.lng],[b.lat,b.lng]],{color:isFar?'#dc2626':'#2563eb',weight:isFar?5:3,opacity:.85,dashArray:isFar?'8,6':null}).addTo(jrLayer);
    const mid=[(prev.lat+b.lat)/2,(prev.lng+b.lng)/2];
    L.marker(mid,{icon:L.divIcon({className:'',html:`<div class="jr-leglbl ${isFar?'far':''}">${d.toFixed(1)} กม.</div>`,iconSize:[44,16],iconAnchor:[22,8]})}).addTo(jrLayer);

/* ================= 📷 เช็คสินค้า (scan → log Barcode·ชื่อ·จำนวน) ================= */
let scanPicked=[];          // [{barcode,name,qty,transfer}]
let scanDirty=false;
let scanCur=null;           // ผลยิงปัจจุบัน

function restoreScanLS(){ try{ const o=JSON.parse(localStorage.getItem(scanKey())||'null'); if(o){ if(Array.isArray(o.picked)){ scanPicked=o.picked; scanDirty=!!o.dirty; } scanClosed=!!o.closed; } }catch(e){} }

function scanLookup(raw){
  const code=String(raw||'').trim(); if(!code) return;
  if(scanClosed){ beep(true); vibrate([200]); toast('🔒 ปิดงานแล้ว — กด "เปิดงานต่อ" ก่อนยิง'); const _i=document.getElementById('scanInput'); if(_i) _i.value=''; return; }
  const prod=DATA.prodIdx[code]||null;
  const pk=prod?(prod.codeCS||prod.name):code;
  const meta=(MODEL&&MODEL.scanMeta&&MODEL.scanMeta[pk])||null;
  if(!meta || meta.orderedEA<=0){          // ❌ ไม่อยู่ในบิลที่เลือก → ไม่รับ (เหมือน SMR)
    scanCur=null;
    beep(true); vibrate([200]);
    const r=document.getElementById('scanResult');
    if(r) r.innerHTML=`<div class="scan-reject">❌ ไม่อยู่ในบิลที่เลือก: <b>${esc(code)}</b><br><span>ยิงได้เฉพาะสินค้าที่อยู่ในบิลที่ติ๊กไว้</span></div>`;
    const i=document.getElementById('scanInput'); if(i){ i.value=''; i.focus(); }
    toast('❌ ไม่อยู่ในบิล: '+code);
    return;
  }
  const name=prod?cleanName(prod.short||prod.name):meta.name;
  const eaPerCS=prod?(prod.qtyCS||0):(meta.eaPerCS||0);
  const eaPerPA=prod?(prod.qtyPA||0):(meta.eaPerPA||0);
  const orderedEA=meta.orderedEA;
  const stores=Object.values(meta.stores||{});
  const ex=scanPicked.find(p=>p.barcode===code);
  scanCur={barcode:code,name,orderedEA,eaPerCS,eaPerPA,stores,dup:!!ex,_capped:false,qty:(ex?ex.qty:orderedEA),transfer:ex?!!ex.transfer:false};  // default = ครบตามสั่ง
  beep(); vibrate();
  const i=document.getElementById('scanInput'); if(i) i.value='';
  renderScanResult();
}
/* เฉลี่ยรายร้าน — ร้านคีย์ก่อนได้ก่อน · ของไม่พอตัดร้านที่คีย์ทีหลังสุด (กฎเดียวกับตัดเศษ) */
function allocByKey(stores, received){
  const sorted=[...(stores||[])].sort((a,b)=> (a.keyTS||0)-(b.keyTS||0) || String(a.store).localeCompare(String(b.store)));
  let left=Math.max(0,Math.round(received||0));
  return sorted.map(s=>{ const give=Math.min(s.ea,left); left-=give; return {salesman:s.salesman,salesmanName:s.salesmanName,store:s.store,ea:s.ea,give}; });
}
function allocTableHtml(c){
  if(!c.stores || !c.stores.length) return '';
  const alloc=allocByKey(c.stores, c.qty);
  const rows=alloc.map(s=>`<tr class="${s.give===0?'cut-row':''}"><td>${esc(s.salesman||'')} ${esc(s.store)}</td><td class="num">${esc(fmtFromEA(s.ea,c.eaPerCS,c.eaPerPA))}</td><td class="num">${s.give? '<b>'+esc(fmtFromEA(s.give,c.eaPerCS,c.eaPerPA))+'</b>' : '<span class="alloc-cut">✂ ตัด</span>'}</td></tr>`).join('');
  return `<div class="dist"><div class="dist-h">📍 จัดให้ร้านไหน <span class="muted" style="font-weight:400">(คีย์ก่อนได้ก่อน · ไม่พอตัดร้านคีย์ทีหลัง)</span></div>
    <div class="tbl-wrap" style="max-height:240px"><table class="alloc-tbl"><thead><tr><th>เซล · ร้าน</th><th class="num">สั่ง</th><th class="num">จัดให้</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function nowStamp(){ try{ return new Intl.DateTimeFormat('sv-SE',{timeZone:'Asia/Bangkok',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(new Date()).replace('T',' '); }catch(e){ return ''; } }
function renderScanResult(){
  const r=document.getElementById('scanResult'); if(!r) return;

  const ord = `${esc(fmtFromEA(c.orderedEA,c.eaPerCS,c.eaPerPA))} <span class="muted">(${c.orderedEA} ชิ้น)</span>`;
  const dupNote = c.dup ? `<div class="dup-note">⚠️ ยิงซ้ำ! สินค้านี้เพิ่มไปแล้ว — แก้จำนวนได้</div>` : '';

    <div class="recv-box">

    <div id="scanCapWarn" class="cap-warn" style="display:${c._capped?'block':'none'}">⚠️ รับเกินยอดสั่งไม่ได้ — สูงสุด ${c.orderedEA}</div>
    <div style="display:flex;gap:6px;margin:8px 0 10px;flex-wrap:wrap">
      <button class="chip" onclick="scanRecvSet(${c.orderedEA})">ครบตามสั่ง (${c.orderedEA})</button>

    </div>
    <button class="scan-btn ${c.transfer?'gold':'gray'}" onclick="toggleScanTransfer()" style="width:100%;margin-bottom:8px">${c.transfer?'✓ โอนย้าย (กดเพื่อยกเลิก)':'🔁 สินค้านี้ต้องโอนย้ายด้วย'}</button>
    <div style="display:flex;gap:8px">
      <button class="scan-btn gold" style="flex:1" onclick="confirmScan()">✓ เพิ่มลงใบเช็ค</button>
      <button class="scan-btn gray" onclick="cancelScan()">ยกเลิก</button>
    </div></div>`;
  setTimeout(()=>{ const q=document.getElementById('scanQty'); if(q){ q.focus(); q.select(); } },50);
}
function scanClamp(v){ let n=parseInt(v); if(!isFinite(n)||n<0) n=0; const max=(scanCur&&scanCur.orderedEA)||0; if(max&&n>max){ n=max; if(scanCur) scanCur._capped=true; } else if(scanCur) scanCur._capped=false; return n; }
function scanQtyInput(el){ if(!scanCur) return; scanCur.qty=scanClamp(el.value); if(scanCur._capped) el.value=scanCur.qty; const w=document.getElementById('scanCapWarn'); if(w) w.style.display=scanCur._capped?'block':'none'; const a=document.getElementById('scanAlloc'); if(a) a.innerHTML=allocTableHtml(scanCur); }
function scanRecvStep(d){ if(!scanCur) return; scanCur.qty=scanClamp((parseInt(scanCur.qty)||0)+d); renderScanResult(); }
function scanRecvSet(v){ if(!scanCur) return; scanCur.qty=scanClamp(v); renderScanResult(); }
function toggleScanTransfer(){ if(!scanCur) return; scanCur.transfer=!scanCur.transfer; renderScanResult(); }
function confirmScan(){
  if(!scanCur) return;
  const qty=scanClamp(scanCur.qty);    // กันเกินยอดสั่ง
  if(qty<=0){ toast('ใส่จำนวนก่อน'); return; }
  const alloc=allocByKey(scanCur.stores||[], qty).filter(s=>s.give>0);   // เฉลี่ยรายร้าน คีย์ก่อนได้ก่อน
  const i=scanPicked.findIndex(p=>p.barcode===scanCur.barcode);
  const row={barcode:scanCur.barcode,name:scanCur.name,qty,eaPerCS:scanCur.eaPerCS,eaPerPA:scanCur.eaPerPA,alloc,ts:nowStamp(),transfer:!!scanCur.transfer};
  if(i>=0) scanPicked[i]=row; else scanPicked.push(row);
  scanDirty=true; scanCur=null; saveScanLS(); renderScanResult(); renderScanList();
  if(CONFIG.gasUrl) saveScan(true);   // auto-save ทันที (เงียบ)
  toast('✓ เพิ่มแล้ว — ยิงตัวต่อไปได้เลย');
  const inp=document.getElementById('scanInput'); if(inp) inp.focus();
}
function cancelScan(){ scanCur=null; renderScanResult(); }
function editScanPick(i){ const p=scanPicked[i]; if(p) scanLookup(p.barcode); }
function delScanPick(i){ scanPicked.splice(i,1); scanDirty=true; saveScanLS(); renderScanList(); }
function clearScan(){ if(!confirm('ล้างใบเช็คทั้งหมด?')) return; scanPicked=[]; scanDirty=true; saveScanLS(); renderScanList(); }

  const body=scanPicked.map((p,i)=>`<tr><td>${i+1}</td><td>${esc(p.barcode)}</td>
    <td>${esc(p.name)}${p.transfer?' <span class="tbadge">🔁</span>':''}${p.alloc&&p.alloc.length?` <span class="muted">(${p.alloc.length} ร้าน)</span>`:''}</td>
    <td class="num"><b>${esc(fmtFromEA(p.qty,p.eaPerCS,p.eaPerPA))}</b></td>
