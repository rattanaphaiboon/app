<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bottle Counter v1.0</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1b3e; color: #fff; min-height: 100vh; overflow: hidden; }

  .header { position: fixed; top: 0; left: 0; right: 0; padding: 12px 16px; background: rgba(13, 27, 62, 0.85); backdrop-filter: blur(10px); z-index: 100; display: flex; align-items: center; justify-content: space-between; }
  .title { font-size: 16px; font-weight: 600; color: #c9a84c; }
  .version { font-size: 11px; color: #888; }

  .camera-container { position: relative; width: 100vw; height: 100vh; background: #000; }
  video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

  .controls { position: fixed; top: 56px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; z-index: 99; padding: 0 12px; }
  .btn { background: rgba(13, 27, 62, 0.85); color: #fff; border: 1px solid #c9a84c; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; backdrop-filter: blur(10px); }
  .btn:active { background: #c9a84c; color: #0d1b3e; }
  .btn.active { background: #c9a84c; color: #0d1b3e; }

  .stats { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(13, 27, 62, 0.92); backdrop-filter: blur(10px); padding: 16px 16px 24px; z-index: 100; max-height: 45vh; overflow-y: auto; }
  .count-big { font-size: 64px; font-weight: 700; color: #c9a84c; text-align: center; line-height: 1; }
  .count-label { font-size: 13px; text-align: center; color: #aaa; margin-top: 4px; }
  .breakdown { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .chip { background: rgba(201, 168, 76, 0.15); border: 1px solid #c9a84c; padding: 4px 10px; border-radius: 12px; font-size: 12px; color: #fff; }
  .fps { position: fixed; top: 50px; right: 12px; background: rgba(0,0,0,0.6); color: #4ade80; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-family: monospace; z-index: 99; }

  .loading, .error { position: fixed; inset: 0; background: #0d1b3e; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 1000; padding: 32px; text-align: center; }
  .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #c9a84c; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: #aaa; font-size: 14px; max-width: 300px; line-height: 1.5; }
  .error h2 { color: #ef4444; margin-bottom: 12px; font-size: 18px; }
  .error p { color: #aaa; font-size: 13px; line-height: 1.5; max-width: 340px; }
  .error code { background: #1f2937; padding: 2px 6px; border-radius: 4px; color: #c9a84c; }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">กำลังเริ่มต้น...</div>
</div>

<div class="error" id="errorBox" style="display: none;">
  <div>
    <h2 id="errorTitle">เกิดข้อผิดพลาด</h2>
    <p id="errorMsg"></p>
  </div>
</div>

<div class="header">
  <div class="title">Bottle Counter</div>
  <div class="version">v1.0 · COCO-SSD</div>
</div>

<div class="controls">
  <button class="btn" id="pauseBtn">⏸ หยุดนับ</button>
  <button class="btn" id="allBtn">แสดงทุก object</button>
</div>

<div class="fps" id="fps">-- fps</div>

<div class="camera-container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<div class="stats">
  <div class="count-big" id="countBig">0</div>
  <div class="count-label" id="countLabel">ขวด (bottle) ที่เห็นในเฟรม</div>
  <div class="breakdown" id="breakdown"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const countBig = document.getElementById('countBig');
const countLabel = document.getElementById('countLabel');
const breakdown = document.getElementById('breakdown');
const loading = document.getElementById('loading');
const loadingText = document.getElementById('loadingText');
const errorBox = document.getElementById('errorBox');
const errorMsg = document.getElementById('errorMsg');
const errorTitle = document.getElementById('errorTitle');
const fpsEl = document.getElementById('fps');
const pauseBtn = document.getElementById('pauseBtn');
const allBtn = document.getElementById('allBtn');

let model = null;
let paused = false;
let showAll = false;
let lastTime = performance.now();
let frames = 0;

pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶ เริ่มนับ' : '⏸ หยุดนับ';
  pauseBtn.classList.toggle('active', paused);
});

allBtn.addEventListener('click', () => {
  showAll = !showAll;
  allBtn.classList.toggle('active', showAll);
  countLabel.textContent = showAll ? 'object ทั้งหมด (เน้นขวด)' : 'ขวด (bottle) ที่เห็นในเฟรม';
});

async function init() {
  try {
    loadingText.textContent = 'กำลังขอเปิดกล้อง...';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });
    video.srcObject = stream;

    await new Promise(resolve => {
      if (video.readyState >= 2) resolve();
      else video.onloadedmetadata = resolve;
    });

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    loadingText.textContent = 'กำลังโหลดโมเดล AI (ครั้งแรก ~10-20 วิ ต้องโหลดเน็ต)...';
    model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });

    loading.style.display = 'none';
    detect();
  } catch (err) {
    loading.style.display = 'none';
    errorBox.style.display = 'flex';

    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      errorTitle.textContent = 'ต้องอนุญาตให้เข้าถึงกล้อง';
      errorMsg.innerHTML = 'กด <code>Allow</code> เมื่อเบราว์เซอร์ถาม<br>ถ้ากด Block ไปแล้ว ล้าง permission แล้วเปิดใหม่';
    } else if (location.protocol === 'file:') {
      errorTitle.textContent = 'ต้องใช้ HTTPS หรือ localhost';
      errorMsg.innerHTML = 'เปิดผ่าน <code>file://</code> ไม่ได้ — กล้องต้องการ HTTPS<br><br>วิธีรันที่เครื่องตัวเอง:<br><code>python -m http.server 8080</code><br>แล้วเปิด <code>http://localhost:8080/bottle-counter.html</code>';
    } else {
      errorTitle.textContent = 'เปิดกล้องไม่ได้';
      errorMsg.textContent = err.message || 'ลองใช้ Chrome หรือ Safari ใหม่ๆ';
    }
  }
}

async function detect() {
  if (!paused) {
    const predictions = await model.detect(video);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const counts = {};
    let bottleCount = 0;

    predictions.forEach(pred => {
      if (pred.score < 0.4) return;

      counts[pred.class] = (counts[pred.class] || 0) + 1;
      if (pred.class === 'bottle') bottleCount++;

      const isBottle = pred.class === 'bottle';
      if (!showAll && !isBottle) return;

      const [x, y, w, h] = pred.bbox;
      const color = isBottle ? '#c9a84c' : '#0ea5e9';

      ctx.strokeStyle = color;
      ctx.lineWidth = isBottle ? 4 : 2;
      ctx.strokeRect(x, y, w, h);

      ctx.fillStyle = color;
      ctx.font = 'bold 14px sans-serif';
      const label = `${pred.class} ${Math.round(pred.score * 100)}%`;
      const tw = ctx.measureText(label).width;
      ctx.fillRect(x, y - 22, tw + 8, 22);
      ctx.fillStyle = isBottle ? '#000' : '#fff';
      ctx.fillText(label, x + 4, y - 6);
    });

    countBig.textContent = bottleCount;

    breakdown.innerHTML = '';
    Object.entries(counts).sort((a, b) => b[1] - a[1]).forEach(([cls, count]) => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = `${cls}: ${count}`;
      breakdown.appendChild(chip);
    });

    frames++;
    const now = performance.now();
    if (now - lastTime >= 1000) {
      fpsEl.textContent = `${frames} fps`;
      frames = 0;
      lastTime = now;
    }
  }

  requestAnimationFrame(detect);
}

init();
</script>

</body>
</html>
