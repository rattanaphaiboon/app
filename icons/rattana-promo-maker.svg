<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C77A"/>
      <stop offset="48%" stop-color="#C49B3E"/>
      <stop offset="100%" stop-color="#9C7521"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B23842"/>
      <stop offset="100%" stop-color="#982030"/>
    </linearGradient>
    <radialGradient id="cardShade" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#F8EDD4"/>
      <stop offset="100%" stop-color="#EBDEB8"/>
    </radialGradient>
    <filter id="tagShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="4" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Crimson background (iOS continuous corner approx) -->
  <rect width="1024" height="1024" rx="225" fill="url(#redGrad)"/>

  <!-- Ivory inner card -->
  <rect x="76" y="76" width="872" height="872" rx="168" fill="url(#cardShade)"/>

  <!-- Gold pinstripe frame -->
  <rect x="104" y="104" width="816" height="816" rx="148"
        fill="none" stroke="#C49B3E" stroke-width="3.5" opacity="0.62"/>

  <!-- Price tag (rotated, with shadow) -->
  <g transform="translate(525 515) rotate(-11)" filter="url(#tagShadow)">
    <!-- Tag silhouette: pentagon (left point + right body) -->
    <path d="M -340 -8 L -188 -198 L 282 -198 L 282 202 L -188 202 Z"
          fill="url(#goldGrad)"
          stroke="#82601A" stroke-width="3" stroke-linejoin="round"/>
    <!-- String hole -->
    <circle cx="-228" cy="-128" r="22" fill="#F2E8D0" stroke="#82601A" stroke-width="3"/>
    <!-- Brushed-gold horizontal subtle lines -->
    <g opacity="0.18" stroke="#FFFFFF" stroke-width="1.5" fill="none">
      <line x1="-150" y1="-150" x2="270" y2="-150"/>
      <line x1="-180" y1="-100" x2="270" y2="-100"/>
      <line x1="-180" y1="-50" x2="270" y2="-50"/>
      <line x1="-180" y1="50" x2="270" y2="50"/>
      <line x1="-180" y1="100" x2="270" y2="100"/>
      <line x1="-150" y1="150" x2="270" y2="150"/>
    </g>
    <!-- Italic serif R (in crimson) -->
    <text x="65" y="115"
          font-family="Georgia, 'Times New Roman', 'Noto Serif', serif"
          font-size="340" font-weight="700" font-style="italic"
          text-anchor="middle" fill="#982030">R</text>
  </g>
</svg>
