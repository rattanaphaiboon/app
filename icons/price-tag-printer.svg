<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Rattana Price Tag Printer">
  <title>Rattana Price Tag Printer</title>

  <defs>
    <linearGradient id="navyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#152560"/>
      <stop offset="1" stop-color="#0a1838"/>
    </linearGradient>
    <linearGradient id="goldG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e2c474"/>
      <stop offset="0.55" stop-color="#c5a04a"/>
      <stop offset="1" stop-color="#967530"/>
    </linearGradient>
    <radialGradient id="creamG" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#f8f0d8"/>
      <stop offset="1" stop-color="#e8dcbe"/>
    </radialGradient>
    <filter id="tagShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer navy with iOS continuous-corner approximation -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#navyG)"/>

  <!-- Cream inner panel -->
  <rect x="80" y="80" width="864" height="864" rx="140" ry="140" fill="url(#creamG)"/>

  <!-- Thin gold border line inside cream panel -->
  <rect x="115" y="115" width="794" height="794" rx="115" ry="115"
        fill="none" stroke="#c9a04a" stroke-width="3" opacity="0.55"/>

  <!-- Price tag, tilted slightly, with soft shadow -->
  <g transform="rotate(-2 512 540)" filter="url(#tagShadow)">
    <!-- Tag body: notched left + rounded right corners -->
    <path d="M 290,290
             L 740,290
             Q 790,290 790,340
             L 790,740
             Q 790,790 740,790
             L 290,790
             L 140,540
             Z"
          fill="url(#goldG)"/>

    <!-- Hole punch -->
    <circle cx="245" cy="540" r="30" fill="#f5ecd5" stroke="#a8843a" stroke-width="2.5"/>

    <!-- Barcode (navy bars) -->
    <g fill="#0a1838" transform="translate(335 360)">
      <rect x="0"   width="14" height="280"/>
      <rect x="22"  width="6"  height="280"/>
      <rect x="34"  width="10" height="280"/>
      <rect x="52"  width="4"  height="280"/>
      <rect x="62"  width="8"  height="280"/>
      <rect x="76"  width="6"  height="280"/>
      <rect x="90"  width="14" height="280"/>
      <rect x="110" width="4"  height="280"/>
      <rect x="120" width="10" height="280"/>
      <rect x="136" width="6"  height="280"/>
      <rect x="150" width="8"  height="280"/>
      <rect x="166" width="4"  height="280"/>
      <rect x="178" width="12" height="280"/>
      <rect x="196" width="6"  height="280"/>
      <rect x="210" width="10" height="280"/>
      <rect x="226" width="4"  height="280"/>
      <rect x="236" width="8"  height="280"/>
      <rect x="252" width="6"  height="280"/>
      <rect x="266" width="14" height="280"/>
      <rect x="286" width="4"  height="280"/>
      <rect x="296" width="10" height="280"/>
      <rect x="314" width="8"  height="280"/>
      <rect x="330" width="6"  height="280"/>
      <rect x="344" width="12" height="280"/>
      <rect x="362" width="6"  height="280"/>
      <rect x="376" width="10" height="280"/>
      <rect x="394" width="4"  height="280"/>
      <rect x="404" width="8"  height="280"/>
      <rect x="420" width="6"  height="280"/>
    </g>

    <!-- Italic serif R -->
    <text x="555" y="752" font-family="Georgia, 'Times New Roman', 'Cambria', serif"
          font-style="italic" font-weight="700" font-size="120"
          fill="#0a1838" text-anchor="middle">R</text>
  </g>
</svg>
