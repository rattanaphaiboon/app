<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="60%" stop-color="#1a2f5e"/>
      <stop offset="100%" stop-color="#243b73"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c86a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.75" cy="0.25" r="0.7">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Top accent line (gold) -->
  <rect x="0" y="0" width="256" height="6" fill="url(#gold)"/>

  <!-- Dashboard gauge — semi-circle arc -->
  <g transform="translate(128 152)">
    <!-- Arc background -->
    <path d="M -68 0 A 68 68 0 0 1 68 0" fill="none" stroke="#243b73" stroke-width="14" stroke-linecap="round"/>
    <!-- Arc filled — 80% (good zone) -->
    <path d="M -68 0 A 68 68 0 0 1 60 -32" fill="none" stroke="url(#gold)" stroke-width="14" stroke-linecap="round"/>
    <!-- Needle -->
    <line x1="0" y1="0" x2="40" y2="-44" stroke="#e8c86a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="9" fill="#e8c86a"/>
    <circle cx="0" cy="0" r="4" fill="#0d1b3e"/>
  </g>

  <!-- Score number "84" -->
  <text x="128" y="100" font-family="Arial, sans-serif" font-size="64" font-weight="900" text-anchor="middle" fill="#e8c86a" letter-spacing="-2">84</text>

  <!-- Bottom label -->
  <text x="128" y="222" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="2">COCKPIT</text>
</svg>
