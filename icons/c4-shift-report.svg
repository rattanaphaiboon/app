<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#1a2d5f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6c878"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf5e6"/>
      <stop offset="100%" stop-color="#ece2c8"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect x="10" y="10" width="492" height="492" fill="none" stroke="url(#gold)" stroke-width="6" rx="92"/>

    <g transform="translate(256 268) rotate(-4)">
      <path d="M -140 -180 L 140 -180 L 140 180 L 121 200 L 102 180 L 83 200 L 64 180 L 45 200 L 26 180 L 7 200 L -12 180 L -31 200 L -50 180 L -69 200 L -88 180 L -107 200 L -126 180 L -140 192 Z"
            fill="#000" opacity="0.25" transform="translate(10 14)"/>
      <path d="M -140 -180 L 140 -180 L 140 180 L 121 200 L 102 180 L 83 200 L 64 180 L 45 200 L 26 180 L 7 200 L -12 180 L -31 200 L -50 180 L -69 200 L -88 180 L -107 200 L -126 180 L -140 192 Z"
            fill="url(#paper)"/>

      <rect x="-140" y="-180" width="280" height="60" fill="#0d1b3e"/>
      <text x="0" y="-138" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
            font-size="34" font-weight="800" fill="url(#gold)" letter-spacing="6">RATTANA</text>
      <text x="0" y="-105" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
            font-size="16" font-weight="600" fill="#0d1b3e" letter-spacing="6" opacity="0.7">DAILY SUMMARY</text>

      <line x1="-115" y1="-78" x2="115" y2="-78" stroke="#0d1b3e" stroke-width="2" stroke-dasharray="3 3" opacity="0.4"/>

      <g font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#0d1b3e">
        <text x="-115" y="-50" opacity="0.85">CASH</text>
        <text x="115" y="-50" text-anchor="end" opacity="0.85">฿</text>
        <text x="-115" y="-22" opacity="0.85">TRANSFER</text>
        <text x="115" y="-22" text-anchor="end" opacity="0.85">฿</text>
        <text x="-115" y="6" opacity="0.85">CREDIT</text>
        <text x="115" y="6" text-anchor="end" opacity="0.85">฿</text>
      </g>

      <line x1="-115" y1="22" x2="115" y2="22" stroke="#0d1b3e" stroke-width="2"/>
      <text x="-115" y="74" font-family="Inter, system-ui, sans-serif"
            font-weight="900" font-size="48" fill="#0d1b3e">TOTAL</text>

      <g transform="translate(95 60)">
        <circle r="48" fill="url(#gold)" stroke="#0d1b3e" stroke-width="3"/>
        <text y="20" text-anchor="middle" font-family="Georgia, serif"
              font-weight="900" font-size="62" fill="#0d1b3e">฿</text>
      </g>

      <g transform="translate(0 130)">
        <circle r="26" fill="#16a34a"/>
        <path d="M -12 0 L -3 9 L 13 -8" fill="none" stroke="#fff" stroke-width="6"
              stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>
</svg>
