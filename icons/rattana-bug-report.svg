<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#1a2d5f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6c878"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" fill="none" stroke="url(#gold)" stroke-width="6" rx="80"/>

  <!-- legs -->
  <g stroke="url(#gold)" stroke-width="15" stroke-linecap="round" fill="none">
    <path d="M158 244 L78 200"/>
    <path d="M150 304 L66 304"/>
    <path d="M158 364 L78 408"/>
    <path d="M354 244 L434 200"/>
    <path d="M362 304 L446 304"/>
    <path d="M354 364 L434 408"/>
  </g>

  <!-- antennae -->
  <g stroke="url(#gold)" stroke-width="13" stroke-linecap="round" fill="none">
    <path d="M232 116 L198 66"/>
    <path d="M280 116 L314 66"/>
  </g>
  <circle cx="194" cy="60" r="13" fill="url(#gold)"/>
  <circle cx="318" cy="60" r="13" fill="url(#gold)"/>

  <!-- head -->
  <circle cx="256" cy="152" r="48" fill="url(#gold)"/>
  <circle cx="236" cy="148" r="9" fill="#0d1b3e"/>
  <circle cx="276" cy="148" r="9" fill="#0d1b3e"/>

  <!-- body -->
  <ellipse cx="256" cy="306" rx="118" ry="138" fill="url(#gold)"/>

  <!-- wing split -->
  <line x1="256" y1="200" x2="256" y2="436" stroke="#0d1b3e" stroke-width="13" stroke-linecap="round"/>

  <!-- spots -->
  <g fill="#0d1b3e">
    <circle cx="208" cy="252" r="19"/>
    <circle cx="304" cy="252" r="19"/>
    <circle cx="198" cy="322" r="16"/>
    <circle cx="314" cy="322" r="16"/>
    <circle cx="222" cy="384" r="13"/>
    <circle cx="290" cy="384" r="13"/>
  </g>
</svg>
