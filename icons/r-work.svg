<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="rwfBg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#5483FF"/>
      <stop offset="55%" stop-color="#3A66F2"/>
      <stop offset="100%" stop-color="#1F49CC"/>
    </linearGradient>
    <radialGradient id="rwfGloss" cx="32%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square (iOS-style ~23% radius) -->
  <rect x="0" y="0" width="512" height="512" rx="118" fill="url(#rwfBg)"/>
  <rect x="0" y="0" width="512" height="512" rx="118" fill="url(#rwfGloss)"/>

  <!-- Workflow arcs above and below the R -->
  <path d="M 132 170 Q 256 92 380 170"
        stroke="#ffffff" stroke-width="7" fill="none"
        opacity="0.55" stroke-linecap="round"/>
  <path d="M 132 360 Q 256 438 380 360"
        stroke="#ffffff" stroke-width="7" fill="none"
        opacity="0.55" stroke-linecap="round"/>

  <!-- 4 corner connection dots -->
  <circle cx="132" cy="170" r="13" fill="#ffffff" opacity="0.95"/>
  <circle cx="380" cy="170" r="13" fill="#ffffff" opacity="0.95"/>
  <circle cx="132" cy="360" r="13" fill="#ffffff" opacity="0.95"/>
  <circle cx="380" cy="360" r="13" fill="#ffffff" opacity="0.95"/>

  <!-- R glyph: stem + bowl (with hole via evenodd) + leg -->
  <g fill="#ffffff">
    <!-- Stem (full-height vertical bar on the left) -->
    <rect x="148" y="128" width="60" height="264"/>

    <!-- Bowl with inner hole — evenodd cuts out the inner D-shape -->
    <path fill-rule="evenodd" d="
      M 148 128
      H 286
      C 332 128 360 154 360 184
      C 360 214 332 240 286 240
      H 148
      Z
      M 208 168
      H 286
      C 308 168 320 175 320 184
      C 320 193 308 200 286 200
      H 208
      Z
    "/>

    <!-- Leg (diagonal trapezoid from bowl-stem junction down-right) -->
    <path d="M 208 240 L 256 240 L 384 392 L 320 392 Z"/>
  </g>
</svg>
