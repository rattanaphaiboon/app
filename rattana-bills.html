<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rattana Bills v1.5</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --navy:#0d1b3e;--navy-mid:#1a2f5e;--navy-light:#243b73;--gold:#c9a84c;--gold-light:#e8c86a;
  --success:#2ecc71;--danger:#e74c3c;--warning:#f39c12;--info:#3498db;
  --bg:#f4f6fb;--text:#0d1b3e;--card-bg:#ffffff;--border:#dde3f0;--muted:#6b7896;--row-alt:#fafbfd;
  --space-sm:8px;--space-md:16px;--space-lg:24px;
  --radius-sm:6px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);--shadow-md:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(13,27,62,.12);
}
body.dark{--bg:#05080f;--text:#ffffff;--card-bg:#0d1b3e;--border:#1f3563;--muted:#b8c2dc;--row-alt:#0a1226;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;font-size:14px;line-height:1.5;min-height:100dvh;overflow-x:hidden;background:var(--bg);color:var(--text);transition:background .25s,color .25s}
button{font-family:inherit;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input{font-family:inherit;font-size:16px}

/* Header */
header{background:var(--navy);color:#fff;padding:12px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;border-bottom:3px solid var(--gold);padding-top:max(12px,env(safe-area-inset-top))}
.logo-text{font-weight:700;letter-spacing:1px;font-size:17px;color:#fff;flex:1}
.logo-text span{color:var(--gold)}
.icon-btn{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.2);width:38px;height:38px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.icon-btn:hover{background:rgba(255,255,255,.12)}
.hub-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:var(--radius-sm);padding:5px 9px;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;min-height:38px}
.hub-btn:hover{background:rgba(255,255,255,.18)}

/* Tabs */
.tab-nav{display:flex;background:var(--navy);border-bottom:3px solid var(--gold);padding:0 6px;gap:4px;overflow-x:auto;scrollbar-width:none;position:sticky;top:62px;z-index:99}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{background:transparent;border:none;color:rgba(255,255,255,.6);padding:11px 16px;font-size:13px;font-weight:600;border-bottom:3px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .18s;margin-bottom:-3px;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.tab-btn.active{color:var(--navy);background:var(--gold);font-weight:700}

/* Company filter bar */
.comp-bar{display:flex;gap:6px;max-width:640px;margin:0 auto;padding:11px 12px 0}
.comp-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 8px;border-radius:var(--radius-md);font-size:13px;font-weight:700;border:1.5px solid var(--border);background:var(--card-bg);color:var(--muted);min-height:40px;transition:all .15s}
.comp-btn:active{transform:scale(.98)}
.comp-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:var(--shadow-sm)}
.comp-btn .ct{font-size:11px;font-weight:600;opacity:.85}

/* Month picker */
.mpick{display:flex;align-items:center;gap:10px;background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:8px 10px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.mpick button{width:40px;height:40px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mpick button:active{transform:scale(.95)}
.mpick button:disabled{opacity:.3;cursor:not-allowed}
.mpick .mlabel{flex:1;text-align:center;font-size:15px;font-weight:700}
.mpick .mlabel small{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}
.mpick .mtoday{font-size:11px;font-weight:700;color:var(--navy);background:var(--gold);border-radius:14px;padding:4px 10px;border:none;width:auto;height:auto}
body.dark .mpick .mtoday{color:#05080f}

/* Summary progress */
.prog{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.prog-top .pct{font-size:22px;font-weight:700;color:var(--success)}
.prog-top .plbl{font-size:12px;color:var(--muted);font-weight:600}
.prog-bar{height:10px;border-radius:6px;background:var(--border);overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--success),#27ae60);border-radius:6px;transition:width .4s}
.prog-amts{display:flex;gap:8px;margin-top:10px}
.prog-amts>div{flex:1;text-align:center;padding:7px;border-radius:var(--radius-sm);background:var(--bg)}
.prog-amts .pa-n{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
.prog-amts .pa-t{font-size:10px;color:var(--muted);margin-top:1px}
.prog-amts .paid .pa-n{color:var(--success)}
.prog-amts .unpaid .pa-n{color:var(--danger)}

.wrap{max-width:640px;margin:0 auto;padding:14px 12px calc(40px + env(safe-area-inset-bottom))}

/* Summary */
.sumcard{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;border-radius:var(--radius-lg);padding:18px;border-top:4px solid var(--gold);box-shadow:var(--shadow-lg);margin-bottom:14px}
.sumcard .lbl{font-size:12px;color:var(--gold-light);font-weight:600;letter-spacing:.5px}
.sumcard .big{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;margin:2px 0 4px;line-height:1.1}
.sumcard .big .cur{font-size:15px;color:var(--gold-light);font-weight:600}
.sumrow{display:flex;gap:8px;margin-top:14px}
.sumpill{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:var(--radius-md);padding:9px 10px;text-align:center}
.sumpill .n{font-size:20px;font-weight:700;line-height:1}
.sumpill .t{font-size:11px;color:rgba(255,255,255,.7);margin-top:3px}
.sumpill.ok .n{color:var(--success)}
.sumpill.no .n{color:var(--gold-light)}

/* Day group header */
.daygrp{margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.daygrp .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0}
.daygrp h3{font-size:14px;font-weight:700}
.daygrp .cnt{font-size:11px;color:var(--muted);margin-left:auto;font-weight:600}
.sec-overdue .dot{background:var(--danger)}

/* Bill card */
.bill{background:var(--card-bg);border-radius:var(--radius-md);border:1px solid var(--border);box-shadow:var(--shadow-sm);padding:13px 14px;margin-bottom:9px;border-left:4px solid var(--gold);transition:opacity .2s,border-color .2s}
.bill.paid{opacity:.6;border-left-color:var(--success)}
.bill.overdue{border-left-color:var(--danger)}
.bill-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.bill-name{font-size:14px;font-weight:600;line-height:1.35}
.bill-amt{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;text-align:right}
.bill-amt .cur{font-size:11px;color:var(--muted);font-weight:500}
.bill-amt.txt{font-size:13px;color:var(--warning);font-weight:600}
.bill-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:9px}
.chan{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.chan-scan{background:#e3f0fd;color:#1a6fb8}
.chan-debit{background:#fdeede;color:#a8631a}
.chan-transfer{background:#e8f7ee;color:#1e8449}
.chan-remind{background:#fdecea;color:#c0392b}
.chan-other{background:#eef0f5;color:#56627d}
body.dark .chan-scan{background:#16314d;color:#86c4ff}
body.dark .chan-debit{background:#3a2a14;color:#f0b86a}
body.dark .chan-transfer{background:#163524;color:#7be0a3}
body.dark .chan-remind{background:#3a1a17;color:#ff8a7e}
body.dark .chan-other{background:#1c2740;color:#aab6d4}
.acct{font-size:11px;color:var(--muted);font-weight:500}
.dleft{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.dleft.today{background:var(--danger);color:#fff}
.dleft.soon{background:#fef3d7;color:#a87800}
.dleft.later{background:#eef0f5;color:#56627d}
.dleft.over{background:#c0392b;color:#fff}
body.dark .dleft.soon{background:#3a2e15;color:#e8c86a}
body.dark .dleft.later{background:#1c2740;color:#aab6d4}

.bill-foot{margin-top:11px;display:flex;gap:8px;align-items:center}
.paybtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;min-height:42px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;border:1.5px solid var(--border);background:var(--card-bg);color:var(--text);transition:all .15s}
.paybtn:active{transform:scale(.98)}
.paybtn.is-paid{background:var(--success);color:#fff;border-color:var(--success)}
.paybtn.is-unpaid{background:transparent;color:var(--muted)}
.paybtn.is-unpaid:hover{border-color:var(--gold);color:var(--text)}

.searchbar{position:relative;margin-bottom:6px}
.searchbar input{width:100%;height:44px;padding:0 14px 0 40px;border-radius:var(--radius-md);border:1.5px solid var(--border);background:var(--card-bg);color:var(--text);outline:none}
.searchbar input:focus{border-color:var(--gold)}
.searchbar::before{content:"🔍";position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.6}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ic{font-size:46px;margin-bottom:8px}
.empty .t{font-size:15px;font-weight:600}
.empty .s{font-size:12px;margin-top:4px}

.notice{font-size:11px;color:var(--muted);text-align:center;padding:8px;margin-top:6px}
.notice a{color:var(--info)}
.foot{text-align:center;font-size:11px;color:var(--muted);padding:18px 0 0}

/* Spinner */
.spinner-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,.55);align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(3px)}
.spinner-overlay.show{display:flex}
.spinner-box{background:var(--card-bg);border-radius:var(--radius-lg);padding:28px 36px;text-align:center;border-top:4px solid var(--gold)}
.spinner-ring{width:44px;height:44px;border:5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:var(--radius-md);color:#fff;z-index:9999;font-weight:600;font-size:13px;box-shadow:var(--shadow-lg);max-width:90vw;opacity:0;transition:opacity .25s,transform .25s}
.toast.show{opacity:1}
.toast-success{background:var(--success)}.toast-info{background:var(--navy-mid);border-left:3px solid var(--gold)}.toast-warning{background:var(--warning);color:var(--navy)}

/* Login */
#loginScreen{display:none;min-height:100dvh;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;background:linear-gradient(160deg,var(--navy),#05080f)}
#loginScreen .lg-logo{font-size:26px;font-weight:700;color:#fff;letter-spacing:1px;margin-bottom:6px}
#loginScreen .lg-logo span{color:var(--gold)}
#loginScreen .lg-sub{color:rgba(255,255,255,.65);font-size:13px;margin-bottom:30px}
#loginScreen .lg-card{background:var(--card-bg);border-radius:var(--radius-lg);padding:28px 22px;border-top:4px solid var(--gold);box-shadow:var(--shadow-lg);width:100%;max-width:340px}
#loginScreen .lg-card h2{font-size:17px;margin-bottom:18px}
#loginErr{color:var(--danger);font-size:12px;margin-top:14px;min-height:16px}
</style>
</head>

</div>

/* ===== Channel detection ===== */
function channel(note){
  const n=(note||'').toLowerCase();
  if(/สแกน|แสกน|promptpay/.test(n)) return {cls:'chan-scan',ic:'📱',label:'สแกนจ่าย'};
  if(/รบกวน|เตือน/.test(n))         return {cls:'chan-remind',ic:'🔔',label:'เตือนให้จ่ายเอง'};
  if(/ตัด|debit/.test(n))           return {cls:'chan-debit',ic:'💳',label:'ตัดบัญชีอัตโนมัติ'};
  if(/โอน|ตั้งโอน/.test(n))         return {cls:'chan-transfer',ic:'🏦',label:'โอน / ตั้งโอน'};
  return {cls:'chan-other',ic:'📋',label:'อื่นๆ'};
}

/* ===== Build items from rows ===== */
function normCo(s){const v=(s||'').trim();if(/RPB/i.test(v))return 'RPB';if(/รัตน|RTN/i.test(v))return 'รัตน';return v||'อื่น';}
/* stable id from content so paid-status survives data refresh / row reordering */
function stableId(name,d,m,co,amt,seen){
  let base='r_'+[name,d,m,co,(amt==null?'':amt)].join('~');
  let id=base,k=1;while(seen[id]){k++;id=base+'#'+k;}seen[id]=1;return id;
}
function normalize(rows){
  const seen={};
  return rows.map((r)=>{
    const amt=(r.amt===null||r.amt===undefined||r.amt==='')?null:Number(r.amt);
    const a=isNaN(amt)?null:amt;
    const name=r.n||'(ไม่มีชื่อ)';const co=normCo(r.co);const d=+r.d,m=+r.m;
    return {id:stableId(name,d,m,co,a,seen),name,amt:a,amtText:r.amtText||null,
            note:(r.note||'').trim(),type:(r.type||'รายเดือน').trim(),co,d,m};
  }).filter(x=>x.name && x.d);
}
/* next occurrence on/after ref; monthly uses day, yearly uses month+day */
function occ(item,ref,dir){ // dir:'next' (>=ref) or 'prev' (<=ref)
  const d=item.d, mth=item.m;
  if(item.type==='รายปี'){
    const years=dir==='prev'?[ref.getFullYear(),ref.getFullYear()-1]:[ref.getFullYear(),ref.getFullYear()+1];
    for(const y of years){const dd=Math.min(d,daysInMonth(y,mth));const c=new Date(y,mth-1,dd);c.setHours(0,0,0,0);
      if(dir==='prev'?c<=ref:c>=ref)return c;}
    return null;
  } else {
    let y=ref.getFullYear(),m=ref.getMonth()+1;
    for(let k=0;k<14;k++){const dd=Math.min(d,daysInMonth(y,m));const c=new Date(y,m-1,dd);c.setHours(0,0,0,0);
      if(dir==='prev'?c<=ref:c>=ref)return c;
      if(dir==='prev'){m--;if(m<1){m=12;y--;}}else{m++;if(m>12){m=1;y++;}}}
    return null;
  }
}

function loadPaid(){try{return JSON.parse(localStorage.getItem(PAID_KEY))||{};}catch{return{};}}
function savePaid(o){localStorage.setItem(PAID_KEY,JSON.stringify(o));}
function paidKey(item,due){return item.id+'|'+dateKey(due);}
function isPaid(item,due){return !!loadPaid()[paidKey(item,due)];}
function togglePaid(id,dueIso){
  const item=ITEMS.find(x=>x.id===id);if(!item)return;
  const due=new Date(dueIso);const p=loadPaid();const k=paidKey(item,due);
  if(p[k]){delete p[k];toast('ยกเลิกการชำระแล้ว','warning');}else{p[k]={ts:Date.now()};toast('บันทึกว่าชำระแล้ว ✓','success');}
  savePaid(p);render();
}

/* ===== Bill card HTML ===== */
function billHtml(item,due,overdue){
  const paid=isPaid(item,due);
  const ch=channel(item.note);
  const diff=Math.round((due-today())/86400000);
  let dl,dlc;
  if(overdue){dl='เลยกำหนด '+Math.abs(diff)+' วัน';dlc='over';}
  else if(diff===0){dl='วันนี้';dlc='today';}
  else if(diff===1){dl='พรุ่งนี้';dlc='soon';}
  else if(diff<=3){dl='อีก '+diff+' วัน';dlc='soon';}
  else{dl='อีก '+diff+' วัน';dlc='later';}
  const amtHtml=item.amt!=null
    ? '<div class="bill-amt">'+fmtBaht(item.amt)+' <span class="cur">฿</span></div>'
    : '<div class="bill-amt txt">'+(item.amtText||'ตามจริง')+'</div>';
  const acct=item.note?'<span class="acct">• '+escapeHtml(item.note)+'</span>':'';
  return '<div class="bill'+(paid?' paid':'')+(overdue?' overdue':'')+'">'
    +'<div class="bill-top"><div class="bill-name">'+escapeHtml(item.name)+'</div>'+amtHtml+'</div>'
    +'<div class="bill-meta"><span class="dleft '+dlc+'">'+dl+'</span>'
    +'<span class="chan '+ch.cls+'">'+ch.ic+' '+ch.label+'</span>'+acct+'</div>'
    +'<div class="bill-foot"><button class="paybtn '+(paid?'is-paid':'is-unpaid')+'" onclick="togglePaid(\''+jsArg(item.id)+'\',\''+due.toISOString()+'\')">'
    +(paid?'✅ ชำระแล้ว':'⬜ ยังไม่จ่าย — กดเมื่อจ่ายแล้ว')+'</button></div></div>';
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
/* escape a value for use inside a single-quoted JS string in an onclick attribute */
function jsArg(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

    overdue.forEach(x=>h+=billHtml(x.item,x.due,true));
  }

  if(!upcoming.length && !overdue.length){
    h+='<div class="empty"><div class="ic">🎉</div><div class="t">ไม่มีรายการใน 7 วันข้างหน้า</div><div class="s">ยังไม่มีค่าใช้จ่ายที่ครบกำหนดเร็วๆ นี้</div></div>';
  } else {
    let lastKey='';
    upcoming.forEach(x=>{
      const k=dateKey(x.due);
      if(k!==lastKey){lastKey=k;
        const dayList=upcoming.filter(y=>dateKey(y.due)===k);
        h+='<div class="daygrp"><span class="dot"></span><h3>'+fmtThaiDate(x.due)+'</h3><span class="cnt">'+fmtBahtShort(sumAmt(dayList))+' ฿</span></div>';}
      h+=billHtml(x.item,x.due,false);
    });
  }
  h+=dataNotice();
  $('content').innerHTML=h;
}

function renderMonth(){
  const t=today();const y=t.getFullYear(),mo=t.getMonth();
  const first=new Date(y,mo,1);const last=new Date(y,mo+1,0);
  const list=[];
  for(const item of filteredItems()){
    let c=occ(item,first,'next');
    if(c && c>=first && c<=last)list.push({item,due:c});
  }
  list.sort((a,b)=>a.due-b.due||(b.item.amt||0)-(a.item.amt||0));
  const total=sumAmt(list);
  const paidCnt=list.filter(x=>isPaid(x.item,x.due)).length;
  let h='<div class="sumcard"><div class="lbl">ยอดรวมทั้งเดือน '+TH_MONTHS[mo+1]+' '+(y+543)+'</div>'
    +'<div class="big">'+fmtBahtShort(total)+' <span class="cur">บาท</span></div>'
    +'<div class="sumrow">'
    +'<div class="sumpill"><div class="n">'+list.length+'</div><div class="t">รายการ</div></div>'
    +'<div class="sumpill no"><div class="n">'+(list.length-paidCnt)+'</div><div class="t">ยังไม่จ่าย</div></div>'
    +'<div class="sumpill ok"><div class="n">'+paidCnt+'</div><div class="t">จ่ายแล้ว</div></div>'
    +'</div></div>';
  if(!list.length){h+='<div class="empty"><div class="ic">📭</div><div class="t">ไม่มีรายการในเดือนนี้</div></div>';}
  else{
    let lastKey='';
    list.forEach(x=>{
      const k=dateKey(x.due);
      if(k!==lastKey){lastKey=k;
        const dayList=list.filter(y=>dateKey(y.due)===k);
        h+='<div class="daygrp"><span class="dot"></span><h3>'+x.due.getDate()+' '+TH_MONTHS[x.due.getMonth()+1]+'</h3><span class="cnt">'+fmtBahtShort(sumAmt(dayList))+' ฿</span></div>';}
      const overdue=x.due<t && !isPaid(x.item,x.due);
      h+=billHtml(x.item,x.due,overdue);
    });
  }
  h+=dataNotice();
  $('content').innerHTML=h;
}

/* ===== Summary tab (per-month paid/unpaid reconciliation) ===== */
function initSummaryMonth(){
  if(sumYear===null){const t=today();sumYear=t.getFullYear();sumMonth=t.getMonth();}
}
function shiftMonth(delta){
  initSummaryMonth();
  let m=sumMonth+delta,y=sumYear;
  while(m<0){m+=12;y--;}while(m>11){m-=12;y++;}
  sumMonth=m;sumYear=y;render();
}
function gotoThisMonth(){const t=today();sumYear=t.getFullYear();sumMonth=t.getMonth();render();}
/* mark unpaid from summary -> bounces item back to the alert/unpaid list */
function unmarkPaid(id,dueIso){
  const item=ITEMS.find(x=>x.id===id);if(!item)return;
  const due=new Date(dueIso);const p=loadPaid();delete p[paidKey(item,due)];savePaid(p);
  toast('ย้ายกลับเป็น “ยังไม่จ่าย” แล้ว ↩︎','warning');render();
}
/* compact row used in summary lists */
function sumRowHtml(item,due,paid){
  const ch=channel(item.note);
  const amtHtml=item.amt!=null?fmtBaht(item.amt)+' ฿':(item.amtText||'ตามจริง');
  const d=due.getDate()+' '+TH_MONTHS[due.getMonth()+1];
  const btn=paid
    ? '<button class="paybtn is-paid" style="flex:none;min-width:118px" onclick="unmarkPaid(\''+jsArg(item.id)+'\',\''+due.toISOString()+'\')">↩︎ ยังไม่จ่าย</button>'
    : '<button class="paybtn is-unpaid" style="flex:none;min-width:118px" onclick="togglePaid(\''+jsArg(item.id)+'\',\''+due.toISOString()+'\')">⬜ จ่ายแล้ว</button>';
  return '<div class="bill'+(paid?' paid':'')+'" style="border-left-color:'+(paid?'var(--success)':'var(--gold)')+'">'
    +'<div class="bill-top"><div class="bill-name">'+escapeHtml(item.name)
    +'<div class="bill-meta" style="margin-top:6px"><span class="dleft later">'+d+'</span>'
    +'<span class="chan '+ch.cls+'">'+ch.ic+' '+ch.label+'</span>'
    +(item.note?'<span class="acct">• '+escapeHtml(item.note)+'</span>':'')+'</div></div>'
    +'<div style="text-align:right"><div class="bill-amt'+(item.amt==null?' txt':'')+'">'+amtHtml+'</div></div></div>'
    +'<div class="bill-foot">'+btn+'</div></div>';
}
function renderSummary(){
  initSummaryMonth();
  const t=today();
  const y=sumYear,mo=sumMonth;
  const first=new Date(y,mo,1);const last=new Date(y,mo+1,0);
  const isThis=(y===t.getFullYear()&&mo===t.getMonth());
  // build occurrences in this month from current company filter
  const list=[];
  for(const item of filteredItems()){
    const c=occ(item,first,'next');
    if(c && c>=first && c<=last)list.push({item,due:c,paid:isPaid(item,c)});
  }
  list.sort((a,b)=>a.due-b.due||(b.item.amt||0)-(a.item.amt||0));
  const paid=list.filter(x=>x.paid), unpaid=list.filter(x=>!x.paid);
  const sum=arr=>arr.reduce((s,x)=>s+(x.item.amt||0),0);
  const totalAmt=sum(list),paidAmt=sum(paid),unpaidAmt=sum(unpaid);
  const pct=list.length?Math.round(paid.length/list.length*100):0;

  // month picker
  let h='<div class="mpick">'
    +'<button onclick="shiftMonth(-1)">‹</button>'
    +'<div class="mlabel">'+TH_MONTHS[mo+1]+' '+(y+543)+'<small>'+(isThis?'เดือนปัจจุบัน':'')+'</small></div>'
    +(isThis?'':'<button class="mtoday" onclick="gotoThisMonth()">เดือนนี้</button>')
    +'<button onclick="shiftMonth(1)">›</button></div>';

  // progress card
  h+='<div class="prog"><div class="prog-top"><span class="pct">'+pct+'%</span>'
    +'<span class="plbl">จ่ายแล้ว '+paid.length+' / '+list.length+' รายการ</span></div>'
    +'<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'
    +'<div class="prog-amts">'
    +'<div class="paid"><div class="pa-n">'+fmtBahtShort(paidAmt)+'</div><div class="pa-t">✅ จ่ายแล้ว (฿)</div></div>'
    +'<div class="unpaid"><div class="pa-n">'+fmtBahtShort(unpaidAmt)+'</div><div class="pa-t">⬜ ค้างจ่าย (฿)</div></div>'
    +'<div><div class="pa-n">'+fmtBahtShort(totalAmt)+'</div><div class="pa-t">รวมทั้งเดือน (฿)</div></div>'
    +'</div></div>';

  if(!list.length){
    h+='<div class="empty"><div class="ic">📭</div><div class="t">ไม่มีรายการในเดือนนี้</div><div class="s">ลองเลือกเดือนอื่น หรือบริษัทอื่น</div></div>';
    h+=dataNotice();$('content').innerHTML=h;return;
  }
  // unpaid first (ยังค้าง), then paid
  h+='<div class="daygrp sec-overdue"><span class="dot"></span><h3 style="color:var(--danger)">⬜ ยังไม่จ่าย</h3><span class="cnt">'+unpaid.length+' รายการ</span></div>';
  if(unpaid.length)unpaid.forEach(x=>h+=sumRowHtml(x.item,x.due,false));
  else h+='<div class="notice" style="padding:14px">🎉 จ่ายครบทุกรายการในเดือนนี้แล้ว</div>';

  h+='<div class="daygrp"><span class="dot" style="background:var(--success)"></span><h3 style="color:var(--success)">✅ จ่ายแล้ว</h3><span class="cnt">'+paid.length+' รายการ</span></div>';
  if(paid.length)paid.forEach(x=>h+=sumRowHtml(x.item,x.due,true));
  else h+='<div class="notice" style="padding:14px">ยังไม่มีรายการที่กดว่าจ่ายแล้ว</div>';

  h+=dataNotice();
  $('content').innerHTML=h;
}

let searchQ='';
function renderAll(){
  const t=today();
  const FI=filteredItems();
  let list=FI.map(item=>({item,due:occ(item,t,'next')})).filter(x=>x.due);
  if(searchQ){const q=searchQ.toLowerCase();list=list.filter(x=>(x.item.name+' '+x.item.note).toLowerCase().includes(q));}
  list.sort((a,b)=>a.due-b.due);
  const total=FI.reduce((s,x)=>s+(x.amt||0),0);
  let h='<div class="searchbar"><input type="text" placeholder="ค้นหารายการ / ธนาคาร..." value="'+escapeHtml(searchQ)+'" oninput="searchQ=this.value;renderAll()"></div>';
  h+='<div class="sumcard"><div class="lbl">ค่าใช้จ่ายทั้งหมดที่ติดตาม</div>'
    +'<div class="big">'+fmtBahtShort(total)+' <span class="cur">บาท / รอบ</span></div>'
    +'<div class="sumrow"><div class="sumpill"><div class="n">'+FI.length+'</div><div class="t">รายการทั้งหมด</div></div>'
    +'<div class="sumpill"><div class="n">'+list.length+'</div><div class="t">แสดงผล</div></div></div></div>';
  if(!list.length){h+='<div class="empty"><div class="ic">🔍</div><div class="t">ไม่พบรายการ</div></div>';}
  else list.forEach(x=>h+=billHtml(x.item,x.due,false));
  h+=dataNotice();
  $('content').innerHTML=h;
}

function dataNotice(){
  return '<div class="notice">'+(dataLive?'🟢 ข้อมูลสดจาก Google Sheet':'🟡 ใช้ข้อมูลสำรอง (เชื่อมต่อชีทไม่ได้ — เปิดสิทธิ์ดู “ทุกคนที่มีลิงก์” เพื่อซิงก์สด)')
    +' · <a href="'+SHEET_URL+'" target="_blank">เปิดชีท</a></div>'
    +'<div class="foot">Rattana Bills v1.5 · 2026-06-01 · คำนวณวันครบกำหนดอัตโนมัติ</div>';
}

/* ===== Company filter (uses column E "บริษัท") ===== */
function filteredItems(){
  if(companyFilter==='all')return ITEMS;
  return ITEMS.filter(it=>it.co===companyFilter);
}
function updateCompanyCounts(){
  const r=ITEMS.filter(it=>it.co==='รัตน').length;
  const p=ITEMS.filter(it=>it.co==='RPB').length;
  const setT=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v?(' ('+v+')'):'';};
  setT('ct-ratn',r);setT('ct-rpb',p);setT('ct-all',ITEMS.length);
}
function setCompany(c){companyFilter=c;document.querySelectorAll('.comp-btn').forEach(b=>b.classList.toggle('active',b.dataset.comp===c));window.scrollTo(0,0);render();}

function setTab(tab){currentTab=tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));window.scrollTo(0,0);render();}

/* ===== CSV / Sheets ===== */
function parseCsv(text){
  if(!text)return[];if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const rows=[];let row=[],cell='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){if(ch==='"'){if(text[i+1]==='"'){cell+='"';i++;}else q=false;}else cell+=ch;}
    else{if(ch==='"')q=true;else if(ch===','){row.push(cell);cell='';}else if(ch==='\r'){}
      else if(ch==='\n'){row.push(cell);rows.push(row);row=[];cell='';}else cell+=ch;}}
  if(cell.length||row.length){row.push(cell);rows.push(row);}
  return rows;
}
const cl=s=>String(s||'').replace(/[\u200B-\u200D\uFEFF]/g,'').replace(/\u00A0/g,' ').trim();
async function fetchSheet(){
  const url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(SHEET_NAME);
  const res=await fetch(url);if(!res.ok)throw new Error('fetch failed');
  const rows=parseCsv(await res.text());
  // columns: 0 date,1 name,2 amount,3 note,4 บริษัท(company),5 ประเภท(type),6 blank,7 day,8 month,...
  const out=[];
  for(let i=1;i<rows.length;i++){const r=rows[i];if(!r||r.length<9)continue;
    const name=cl(r[1]).replace('📢','').trim();const day=parseInt(cl(r[7]));const month=parseInt(cl(r[8]));
    if(!name||!day||!month)continue;
    const amtRaw=cl(r[2]).replace(/,/g,'');const num=parseFloat(amtRaw);
    out.push({n:name,amt:isNaN(num)?null:num,amtText:(isNaN(num)&&amtRaw&&amtRaw!=='-')?cl(r[2]):null,
              note:cl(r[3]),co:cl(r[4]),type:cl(r[5])||'รายเดือน',d:day,m:month});}
  if(out.length<5)throw new Error('too few rows');
  return out;
}
async function loadData(initial){
  try{
    const rows=await fetchSheet();
    ITEMS=normalize(rows);dataLive=true;
    localStorage.setItem('rattana_bills_cache',JSON.stringify({ts:Date.now(),rows}));
    if(!initial)toast('ซิงก์ข้อมูลสดสำเร็จ ✓','success');
  }catch(e){
    dataLive=false;
    let rows=null;
    try{const c=JSON.parse(localStorage.getItem('rattana_bills_cache'));if(c&&c.rows)rows=c.rows;}catch{}
    ITEMS=normalize(rows||SNAPSHOT);
    if(!initial)toast('เชื่อมต่อชีทไม่ได้ — ใช้ข้อมูลสำรอง','warning');
  }
  render();
}
async function refreshData(){showSpinner('กำลังซิงก์ข้อมูล...');await loadData(false);hideSpinner();}

/* ===== Auth (Rattana SSO) ===== */
function checkRattanaSession(){
  try{const raw=localStorage.getItem('rattana_session');if(!raw)return null;
    const p=JSON.parse(raw);if(!p?.data?.email||!p.exp||Date.now()>p.exp)return null;return p.data;}catch{return null;}}
function saveSharedSession(d){const payload={data:d,exp:Date.now()+30*24*60*60*1000};
  localStorage.setItem('rattana_session',JSON.stringify(payload));localStorage.setItem('rattanaUser',JSON.stringify(payload));}
function decodeJwtPayload(token){const p=String(token||'').split('.');if(p.length<2)throw new Error('jwt');
  let b=p[1].replace(/-/g,'+').replace(/_/g,'/');const pad=(4-b.length%4)%4;if(pad)b+='='.repeat(pad);
  const bin=atob(b);const by=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)by[i]=bin.charCodeAt(i);
  return JSON.parse(new TextDecoder('utf-8').decode(by));}
const normalizeEmail=s=>String(s||'').replace(/[\u200B-\u200D\uFEFF]/g,'').replace(/\s+/g,'').toLowerCase();
let currentUser=null;
async function handleGoogleLogin(r){
  showSpinner('กำลังตรวจสอบ...');
  try{
    const email=normalizeEmail(decodeJwtPayload(r.credential).email);
    let users=[];
    try{const u='https://docs.google.com/spreadsheets/d/'+AUTH_CONFIG.usersSheetId+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(AUTH_CONFIG.usersSheetName);
      const res=await fetch(u);const rows=parseCsv(await res.text());const hd=rows[0].map(cl);
      users=rows.slice(1).map(rr=>Object.fromEntries(hd.map((k,i)=>[k,cl(rr[i])])));}catch(e){users=[];}
    const payload=decodeJwtPayload(r.credential);
    const user=users.find(u=>normalizeEmail(u['E-mail'])===email);
    if(users.length){
      if(!user){$('loginErr').textContent='ไม่พบอีเมลนี้ในระบบ ติดต่อแอดมิน';hideSpinner();return;}
      if(String(user['Status']||'').trim().toLowerCase()!=='active'){$('loginErr').textContent='บัญชีถูกระงับ ติดต่อแอดมิน';hideSpinner();return;}
      currentUser={email,name:user['ชื่อ - สกุล']||payload.name||'',role:parseInt(user['User Role'])||1,dept:user['แผนก']||'',company:user['บริษัท']||'',warehouse:user['W']||'',empId:user['รหัสพนักงาน']||'',picture:payload.picture||''};
    } else {
      currentUser={email,name:payload.name||'',role:1,picture:payload.picture||''};
    }
    saveSharedSession(currentUser);
    enterApp();
  }catch(e){$('loginErr').textContent='เกิดข้อผิดพลาด ลองใหม่อีกครั้ง';}
  finally{hideSpinner();}
}
function enterApp(){$('loginScreen').style.display='none';$('appScreen').style.display='block';loadData(true);}
function boot(){
  const s=checkRattanaSession();
  if(s){currentUser=s;enterApp();}
  else{$('loginScreen').style.display='flex';$('appScreen').style.display='none';}
}
window.addEventListener('load',boot);
</script>
