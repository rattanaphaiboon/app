// RFC-4180 compliant CSV parser (handles quoted fields with commas/newlines/quotes)
function parseCsv(text) {
  if (!text) return [];
  const rows = [];
  let row = [], field = '', inQuotes = false, i = 0;
  while (i < text.length) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += c; i++;
    } else {
      if (c === '"') { inQuotes = true; i++; continue; }
      if (c === ',') { row.push(field); field = ''; i++; continue; }
      if (c === '\r') { i++; continue; }
      if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; i++; continue; }
      field += c; i++;
    }
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(v => v !== ''));
}

// Convert CSV rows array → array of objects keyed by header row
function csvToObjects(rows) {
  if (rows.length < 1) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(r => {
    const o = {};
    headers.forEach((h, i) => { o[h] = (r[i] ?? '').trim(); });
    return o;
  });
}

// "+66 86 363 8123" / "0863638123" / "66863638123" → "0863638123"
function normalizePhone(input) {
  if (!input) return '';
  let s = String(input).replace(/\D/g, '');
  if (s.startsWith('66') && s.length === 11) s = '0' + s.slice(2);  // 66XXXXXXXXX → 0XXXXXXXXX
  if (s.startsWith('0066')) s = '0' + s.slice(4);                    // 0066XXX → 0XXX
  return s;
}

function isValidThaiMobile(input) {
  const s = normalizePhone(input);
  return s.length === 10 && (s.startsWith('06') || s.startsWith('08') || s.startsWith('09'));
}

function fmtBaht(n) {
  if (n == null || isNaN(n)) return '0';
  return Number(n).toLocaleString('en-US', {
    minimumFractionDigits: n % 1 ? 2 : 0,
    maximumFractionDigits: 2,
  });
}

function fmtThaiDate(d) {
  const date = d instanceof Date ? d : new Date(d);
  if (isNaN(date)) return '';
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear() + 543}`;
}

// Tier price lookup — pick the highest min_qty <= qty
function unitPrice(product, qty) {
  if (!product?.tiers?.length) return 0;
  const sorted = [...product.tiers].sort((a, b) => b.qty - a.qty);
  for (const t of sorted) if (qty >= t.qty) return Number(t.price);
  return Number(product.tiers[0].price);
}

// Generic gviz CSV fetch
async function fetchSheetCsv(tabName) {
  if (!SHEET_ID || SHEET_ID === 'YOUR_SHEET_ID') {
    throw new Error('SHEET_ID ยังไม่ตั้งค่า');
  }
  const url = `https://docs.google.com/spreadsheets/d/${encodeURIComponent(SHEET_ID)}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`โหลด ${tabName} ไม่สำเร็จ (${res.status})`);
  const text = await res.text();
  return csvToObjects(parseCsv(text));
}

/* ============================================================
   API LAYER
   ============================================================ */

const API = {
  async listCategories() {
    const rows = await fetchSheetCsv(TABS.categories);
    return rows
      .filter(r => String(r.active).toUpperCase() !== 'FALSE')
      .map(r => ({
        id: r.id,
        th: r.th_name,
        en: r.en_name,
        glyph: r.glyph,
        sort: parseInt(r.sort_order) || 0,
      }))
      .sort((a, b) => a.sort - b.sort);
  },

  async listProducts() {
    const [productsRows, tiersRows] = await Promise.all([
      fetchSheetCsv(TABS.products),
      fetchSheetCsv(TABS.tiers),
    ]);
    // Group tiers by product_id
    const tierMap = {};
    tiersRows.forEach(t => {
      const pid = t.product_id;
      if (!tierMap[pid]) tierMap[pid] = [];
      tierMap[pid].push({ qty: parseInt(t.min_qty) || 1, price: Number(t.price) || 0 });
    });
    Object.keys(tierMap).forEach(pid => tierMap[pid].sort((a, b) => a.qty - b.qty));

    return productsRows
      .filter(r => String(r.active).toUpperCase() !== 'FALSE')
      .map(r => ({
        id: r.id,
        name: r.name,
        brand: r.brand,
        size: r.size,
        unit: r.unit,
        bundle: r.bundle,
        category: r.category_id,
        image_url: r.image_url,
        tagline: r.tagline,
        color: r.color || '#0b1838',
        accent: r.accent || '#fdf6e3',
        promo: String(r.is_promo).toUpperCase() === 'TRUE',
        recommended: String(r.is_recommended).toUpperCase() === 'TRUE',
        stock: parseInt(r.stock) || 0,
        tiers: tierMap[r.id] || [{ qty: 1, price: 0 }],
      }));
  },

  async listPromotions() {
    try {
      const rows = await fetchSheetCsv(TABS.promotions);
      return rows
        .filter(r => String(r.active).toUpperCase() !== 'FALSE')
        .map(r => ({
          title: r.title,
          subtitle: r.subtitle,
          product_id: r.product_id,
          badge: r.badge,
          sort: parseInt(r.sort_order) || 0,
        }))
        .sort((a, b) => a.sort - b.sort);
    } catch (e) {
      console.warn('Promotions tab not found, returning empty', e);
      return [];
    }
  },

  async findCustomer(phone) {
    const target = normalizePhone(phone);
    if (!target) return null;
    const rows = await fetchSheetCsv(TABS.customers);
    const row = rows.find(r =>
      normalizePhone(r.phone) === target &&
      String(r.active).toUpperCase() !== 'FALSE'
    );
    if (!row) return null;
    return {
      phone: target,
      name: row.name || '',
      shopName: row.shop_name || '',
      address: row.address || '',
      tier: (row.tier || 'standard').toLowerCase(),
    };
  },

  // v1.1 จะเชื่อม Apps Script Web App; v1.0 เก็บ localStorage ก่อน
  async placeOrder(payload) {
    const orderId = 'RT' + String(Date.now()).slice(-8);
    const order = {
      id: orderId,
      ...payload,
      status: 'pending',
      created_at: new Date().toISOString(),
    };
    if (APPS_SCRIPT_URL) {
      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'placeOrder', order }),
        });
        const data = await res.json();
        if (data.ok) return { ...order, id: data.id || order.id };
        throw new Error(data.error || 'Apps Script returned failure');
      } catch (e) {
        console.warn('Apps Script failed, saving local only:', e);
      }
    }
    // Fallback: เก็บ local จนกว่า Apps Script จะพร้อม
    const existing = JSON.parse(localStorage.getItem(ORDERS_LOCAL_KEY) || '[]');
    existing.unshift(order);
    localStorage.setItem(ORDERS_LOCAL_KEY, JSON.stringify(existing));
    return order;
  },

  async listMyOrders(phone) {
    // v1.0: read from localStorage. v1.1 will hit Apps Script
    try {
      const all = JSON.parse(localStorage.getItem(ORDERS_LOCAL_KEY) || '[]');
      return all.filter(o => normalizePhone(o.customer_phone) === normalizePhone(phone));
    } catch {
      return [];
    }
  },
};

/* ============================================================
   SESSION (localStorage with TTL)
   ============================================================ */
const Session = {
  save(customer) {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ customer, ts: Date.now() }));
  },
  load() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      if (!raw) return null;
      const { customer, ts } = JSON.parse(raw);
      if (!ts || Date.now() - ts > SESSION_TTL_MS) {
        localStorage.removeItem(SESSION_KEY);
        return null;
      }
      return customer;
    } catch { return null; }
  },
  clear() { localStorage.removeItem(SESSION_KEY); },
};

const CartStore = {
  save(cart) {
    // ProductTile needs full product; we serialize it as-is
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
  },
  load() {
    try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); }
    catch { return []; }
  },
  clear() { localStorage.removeItem(CART_KEY); },
};

/* ============================================================
   PRODUCT TILE  (placeholder graphic when no image)
   ============================================================ */
function ProductTile({ product, size = 96, rounded = 12 }) {
  const widthPx = typeof size === 'number' ? size + 'px' : size;
  if (product?.image_url) {
    return (
      <div style={{
        width: widthPx, height: widthPx, borderRadius: rounded,
        background: product.accent || '#fdf6e3', overflow: 'hidden', flexShrink: 0,
        position: 'relative',
      }}>
        <img src={product.image_url} alt={product.name}
          style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}
          onError={e => { e.target.style.display = 'none'; }}
        />
      </div>
    );
  }
  // numeric brand-stamp fallback
  const sNum = typeof size === 'number' ? size : 96;
  return (
    <div style={{
      width: widthPx, height: widthPx, borderRadius: rounded,
      background: product?.accent || '#fdf6e3',
      position: 'relative', overflow: 'hidden', flexShrink: 0,
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      border: '1px solid ' + (product?.color || '#0b1838') + '22',
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        background: 'repeating-linear-gradient(135deg, transparent 0 8px, ' + (product?.color || '#0b1838') + '08 8px 9px)',
      }} />
      <div style={{
        width: '62%', minHeight: '52%', borderRadius: 6,
        background: product?.color || '#0b1838', opacity: 0.85,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: '#fff', fontWeight: 700, fontSize: Math.max(9, sNum * 0.11),
        fontFamily: 'var(--mono)',
        textAlign: 'center', padding: 4, letterSpacing: 0.3,
        position: 'relative', zIndex: 1,
      }}>
        {product?.brand || ''}
      </div>
      <div style={{
        marginTop: 4, fontSize: Math.max(8, sNum * 0.085),
        color: product?.color || '#0b1838', fontWeight: 600,
        fontFamily: 'var(--mono)',
        position: 'relative', zIndex: 1,
      }}>
        {product?.size || ''}
      </div>
    </div>
  );
}


function Btn({ children, onClick, variant = 'primary', size = 'md', disabled, icon, style = {}, full = false }) {
  const sizes = {
    sm: { h: 34, px: 14, fs: 12, gap: 6, r: 8 },
    md: { h: 44, px: 18, fs: 14, gap: 8, r: 10 },
    lg: { h: 52, px: 22, fs: 15, gap: 10, r: 12 },
  }[size];
  const variants = {
    primary: { bg: 'linear-gradient(160deg, #15265c, #0b1838)', color: '#ffffff', border: 'transparent', shadow: '0 8px 20px -6px rgba(11,24,56,0.35)' },
    accent:  { bg: 'linear-gradient(135deg, #e6b95c 0%, #d4a548 100%)', color: '#0b1838', border: 'transparent', shadow: '0 10px 22px -6px rgba(212,165,72,0.55)' },
    ghost:   { bg: 'transparent', color: 'var(--ink)', border: 'var(--line)', shadow: 'none' },
    soft:    { bg: 'var(--bg-sunken)', color: 'var(--ink)', border: 'transparent', shadow: 'none' },
    dark:    { bg: '#0b1838', color: '#ffffff', border: 'transparent', shadow: 'none' },
    sale:    { bg: 'linear-gradient(135deg, #ff6b6b, #e53e3e)', color: '#ffffff', border: 'transparent', shadow: '0 8px 20px -6px rgba(229,62,62,0.45)' },
  }[variant];
  return (
    <button onClick={onClick} disabled={disabled} style={{
      height: sizes.h, padding: '0 ' + sizes.px + 'px',
      background: variants.bg, color: variants.color,
      border: '1px solid ' + variants.border,
      borderRadius: sizes.r, fontWeight: 700, fontSize: sizes.fs,
      letterSpacing: 0.1,
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: sizes.gap,
      opacity: disabled ? 0.4 : 1,
      transition: 'transform 0.12s, box-shadow 0.12s, opacity 0.12s',
      width: full ? '100%' : 'auto',
      boxShadow: variants.shadow,
      fontFamily: 'inherit',
      ...style,
    }}
    onMouseDown={e => { if (!disabled) e.currentTarget.style.transform = 'scale(0.97)'; }}
    onMouseUp={e => { e.currentTarget.style.transform = 'scale(1)'; }}
    onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; }}
    >
      {icon}{children}
    </button>
  );
}

    info:    { bg: 'var(--primary-tint)', fg: 'var(--primary)',   border: 'rgba(11,24,56,0.15)' },

  return (

      </div>
      {action}
    </div>
  );
}

function LoginScreen({ onLogin, bootLoading, bootError, isDemo, onRetryBoot }) {
  const [phone, setPhone] = useState('');
  const [focused, setFocused] = useState(false);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  const valid = isValidThaiMobile(phone);

  async function handleSubmit(demoBypass) {
    if (busy) return;
    setBusy(true);
    setError('');
    try {
      // Demo mode → don't hit Sheet, just match against DEMO_CUSTOMER's phone
      if (isDemo || demoBypass) {
        const target = normalizePhone(demoBypass ? DEMO_CUSTOMER.phone : phone);
        if (target === DEMO_CUSTOMER.phone) {
          Session.save(DEMO_CUSTOMER);
          onLogin(DEMO_CUSTOMER);
          return;
        }
        setError('โหมด Demo: ใช้เบอร์ 086-363-8123 เท่านั้น (ยังไม่ได้ตั้ง SHEET_ID)');
        return;
      }
      if (!valid) return;
      const customer = await API.findCustomer(phone);
      if (customer) {
        Session.save(customer);
        onLogin(customer);
      } else {
        setError('ไม่พบเบอร์ในระบบ — ติดต่อฝ่ายขาย 0803-897-765 เพื่อสมัครสมาชิก');

      setError('เกิดข้อผิดพลาดในการเชื่อมต่อ — ' + (e.message || 'ลองอีกครั้ง'));

            border: '1px solid rgba(212,165,72,0.3)',
            display: 'flex', alignItems: 'baseline', gap: 10,
          }}>
            <div style={{ fontSize: 11, color: 'var(--accent-deep)', fontWeight: 600 }}>เริ่มต้น</div>
            <div style={{ fontSize: 28, fontWeight: 900, color: 'var(--accent-deep)', letterSpacing: -1 }}>
              ฿{fmtBaht(minPrice)}
            </div>
            {savings > 0 && (
              <div style={{ fontSize: 13, color: '#7a86a3', textDecoration: 'line-through' }}>฿{fmtBaht(basePrice)}</div>
            )}
            <div style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--accent-deep)', fontWeight: 600 }}>/{product.unit}</div>
          </div>
        </div>

        <div style={{ padding: '20px 18px 0', background: 'var(--bg-card)' }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10, letterSpacing: -0.2, display: 'flex', alignItems: 'center', gap: 8, color: 'var(--ink)' }}>
            ราคาตามจำนวน
            <span style={{ fontSize: 10, fontWeight: 600, padding: '2px 7px', background: 'var(--primary-tint)', color: 'var(--primary)', borderRadius: 6 }}>ยิ่งซื้อเยอะ ยิ่งถูก</span>
          </div>
          <div style={{
            background: 'var(--bg-card)', borderRadius: 14, overflow: 'hidden',
            border: '1px solid var(--line-soft)',
          }}>
            {product.tiers.map((t, i) => {
              const active = qty >= t.qty && (i === product.tiers.length - 1 || qty < product.tiers[i + 1].qty);
              return (
                <div key={i} style={{
                  padding: '12px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                  borderTop: i === 0 ? 'none' : '1px solid var(--line-soft)',
                  background: active ? 'linear-gradient(135deg, #fdf6e3, #f5e6c0)' : 'transparent',
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{
                      width: 26, height: 26, borderRadius: 999,
                      background: active ? 'linear-gradient(135deg, #e6b95c, #d4a548)' : 'var(--bg-sunken)',
                      color: active ? '#0b1838' : 'var(--ink-muted)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 11, fontWeight: 800,
                    }}>{i + 1}</div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: active ? '#0b1838' : 'var(--ink)' }}>
                      {t.qty}+ {product.unit}
                    </div>
                  </div>
                  <div style={{ fontSize: 17, fontWeight: 800, color: active ? 'var(--accent-deep)' : 'var(--ink)', letterSpacing: -0.3 }}>
                    ฿{fmtBaht(t.price)}<span style={{ fontSize: 11, fontWeight: 500, color: 'var(--ink-muted)', marginLeft: 4 }}>/{product.unit}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {product.bundle && (
          <div style={{ padding: '20px 18px 0', background: 'var(--bg-card)' }}>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10, color: 'var(--ink)' }}>หน่วย</div>
            <div style={{ display: 'flex', gap: 8 }}>
              {[product.unit, product.bundle].filter(Boolean).map(u => (
                <button key={u} onClick={() => setUnit(u)} style={{
                  padding: '10px 18px', borderRadius: 12,
                  background: unit === u ? 'linear-gradient(160deg, #15265c, #0b1838)' : 'var(--bg-card)',
                  color: unit === u ? '#fff' : 'var(--ink)',
                  border: '1.5px solid ' + (unit === u ? 'var(--primary)' : 'var(--line)'),
                  fontSize: 13, fontWeight: 600,
                }}>{u}</button>
              ))}
            </div>
          </div>
        )}

        <div style={{ padding: '20px 18px 0', background: 'var(--bg-card)' }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10, color: 'var(--ink)' }}>จำนวน</div>
          <div style={{
            display: 'flex', alignItems: 'center',
            background: 'var(--bg-card)', borderRadius: 14, overflow: 'hidden',
            border: '1.5px solid var(--line)',
          }}>
            <button onClick={() => setQty(q => Math.max(1, q - 1))} style={{
              width: 52, height: 52, background: 'var(--bg-sunken)', color: 'var(--ink)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}><Icon.Minus/></button>
            <input
              type="number"
              value={qty}
              onChange={e => setQty(Math.max(1, parseInt(e.target.value) || 1))}
              style={{
                flex: 1, border: 0, outline: 'none', background: 'transparent',
                fontSize: 22, fontWeight: 800, textAlign: 'center', letterSpacing: -0.3,
                color: 'var(--ink)',
              }}
            />
            <button onClick={() => setQty(q => q + 1)} style={{
              width: 52, height: 52,
              background: 'linear-gradient(160deg, #15265c, #0b1838)', color: '#fff',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}><Icon.Plus/></button>
          </div>
        </div>

        {suggest.length > 0 && (
          <div style={{ marginTop: 24, paddingTop: 18, paddingBottom: 4, background: 'var(--bg)' }}>
            <div style={{ padding: '0 18px 12px', display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--ink)' }}>สินค้าที่คล้ายกัน</div>
              <div style={{ fontSize: 11, color: 'var(--ink-muted)' }}>{suggest.length} รายการ</div>
            </div>
            <div style={{ display: 'flex', gap: 10, overflowX: 'auto', padding: '0 18px 12px' }} className="no-scrollbar">
              {suggest.map(s => (
                <button key={s.id} onClick={() => onOpenProduct(s)} style={{
                  width: 130, flexShrink: 0, background: 'var(--bg-card)',
                  padding: 8, borderRadius: 12,
                  border: '1px solid var(--line-soft)',
                  boxShadow: 'var(--shadow-sm)',
                  textAlign: 'left', display: 'flex', flexDirection: 'column', gap: 6,
                  color: 'var(--ink)',
                }}>
                  <ProductTile product={s} size={114} rounded={10} />
                  <div style={{ fontSize: 11.5, fontWeight: 600, lineHeight: 1.3, overflow: 'hidden', textOverflow: 'ellipsis', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', minHeight: 30 }}>{s.name}</div>
                  <div style={{ fontSize: 13, fontWeight: 800, color: 'var(--accent-deep)' }}>฿{fmtBaht(s.tiers[0].price)}</div>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      <div style={{
        position: 'sticky', bottom: 0,
        padding: '14px 16px max(16px, env(safe-area-inset-bottom))',
        background: 'var(--bg-card)',
        borderTop: '1px solid var(--line-soft)',
        boxShadow: '0 -10px 24px rgba(11,24,56,0.06)',
        display: 'flex', alignItems: 'center', gap: 12,
      }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, color: 'var(--ink-muted)' }}>{qty} × {unit}</div>
          <div style={{ fontSize: 22, fontWeight: 900, color: 'var(--accent-deep)', letterSpacing: -0.5 }}>
            ฿{fmtBaht(total)}
          </div>
        </div>
        <Btn size="lg" variant="accent" onClick={() => onAddToCart(product, qty, unit)} icon={<Icon.Cart size={18}/>}>
          เพิ่มลงตะกร้า
        </Btn>
      </div>
    </div>
  );
}

/* ============================================================
   CART SCREEN
   ============================================================ */
function CartScreen({ cart, setCart, note, setNote, deliveryMethod, setDeliveryMethod, onBack, onCheckout, onNav }) {
  const updateQty = (id, unit, delta) => {
    setCart(c => c.map(it => it.product.id === id && it.unit === unit
      ? { ...it, qty: Math.max(1, it.qty + delta) } : it));
  };
  const remove = (id, unit) => {
    setCart(c => c.filter(it => !(it.product.id === id && it.unit === unit)));
  };

  const subtotal = cart.reduce((s, it) => s + unitPrice(it.product, it.qty) * it.qty, 0);
  const total = subtotal;
  const totalUnits = cart.reduce((s, it) => s + it.qty, 0);

  return (
    <div style={{ minHeight: '100dvh', display: 'flex', flexDirection: 'column', background: 'var(--bg)' }}>
      <AppHeader onBack={onBack} title="ตะกร้าสินค้า" subtitle={`${cart.length} รายการ · ${totalUnits} ชิ้น`} />

      {cart.length === 0 ? (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 40, paddingBottom: 120 }}>
          <div style={{
            width: 96, height: 96, borderRadius: 28,
            background: 'linear-gradient(160deg, #15265c, #0b1838)', color: '#fff',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 16px 30px -10px rgba(11,24,56,0.4)',
          }}><Icon.Cart size={36}/></div>
          <div style={{ fontSize: 20, fontWeight: 800, marginTop: 22, letterSpacing: -0.3, color: 'var(--ink)' }}>ตะกร้ายังว่าง</div>
          <div style={{ fontSize: 13, color: 'var(--ink-muted)', marginTop: 6, textAlign: 'center' }}>
            เลือกสินค้าจากแคตตาล็อก แล้วเพิ่มลงตะกร้าได้เลย
          </div>
          <div style={{ marginTop: 22 }}>
            <Btn variant="accent" onClick={() => onNav('catalog')} icon={<Icon.Grid size={16}/>}>ดูสินค้าทั้งหมด</Btn>
          </div>
        </div>
      ) : (
        <>
          <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px 20px' }} className="no-scrollbar">
            <div style={{
              padding: '12px 14px', borderRadius: 14, marginBottom: 14,
              background: 'linear-gradient(135deg, #fdf6e3 0%, #f5e6c0 100%)',
              border: '1px solid rgba(212,165,72,0.35)',
              display: 'flex', alignItems: 'center', gap: 12,
            }}>
              <div style={{
                width: 36, height: 36, borderRadius: 10,
                background: 'linear-gradient(135deg, #e6b95c, #d4a548)', color: '#0b1838',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}><Icon.Truck size={18}/></div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--accent-deep)' }}>ส่งฟรีทุกออเดอร์</div>
                <div style={{ fontSize: 11, color: 'var(--accent-deep)', opacity: 0.8, marginTop: 1 }}>ไม่มีขั้นต่ำ · จัดส่งภายใน 2-3 วัน</div>
              </div>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {cart.map((it) => {
                const up = unitPrice(it.product, it.qty);
                const line = up * it.qty;
                return (
                  <div key={it.product.id + it.unit} style={{
                    background: 'var(--bg-card)', borderRadius: 14, padding: 12,
                    border: '1px solid var(--line-soft)',
                    boxShadow: 'var(--shadow-sm)',
                    display: 'flex', gap: 12,
                  }}>
                    <ProductTile product={it.product} size={70} rounded={10} />
                    <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, lineHeight: 1.3, flex: 1, color: 'var(--ink)' }}>
                          {it.product.name}
                        </div>
                        <button onClick={() => remove(it.product.id, it.unit)} style={{
                          width: 26, height: 26, color: 'var(--ink-muted)', background: 'var(--bg-sunken)',
                          borderRadius: 8,
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          flexShrink: 0,
                        }}><Icon.Trash size={13}/></button>
                      </div>
                      <div style={{ fontSize: 11, color: 'var(--ink-muted)', marginTop: 3 }}>
                        {it.product.size} · {it.unit}
                      </div>
                      <div style={{ flex: 1 }}/>
                      <div style={{
                        marginTop: 8, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10,
                      }}>
                        <div style={{
                          display: 'flex', alignItems: 'stretch',
                          background: 'var(--bg-sunken)', borderRadius: 10,
                          height: 30, padding: 2,
                        }}>
                          <button onClick={() => updateQty(it.product.id, it.unit, -1)} style={{
                            width: 28, display: 'flex', alignItems: 'center', justifyContent: 'center',
                            color: 'var(--ink)', background: 'var(--bg-card)', borderRadius: 8,
                          }}><Icon.Minus size={12}/></button>
                          <div style={{ minWidth: 32, padding: '0 8px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, color: 'var(--ink)' }}>{it.qty}</div>
                          <button onClick={() => updateQty(it.product.id, it.unit, 1)} style={{
                            width: 28, display: 'flex', alignItems: 'center', justifyContent: 'center',
                            background: 'linear-gradient(160deg, #15265c, #0b1838)', color: '#fff', borderRadius: 8,
                          }}><Icon.Plus size={12}/></button>
                        </div>
                        <div style={{ textAlign: 'right' }}>
                          <div style={{ fontSize: 10, color: 'var(--ink-muted)' }}>฿{fmtBaht(up)}/{it.product.unit}</div>
                          <div style={{ fontSize: 16, fontWeight: 800, color: 'var(--accent-deep)', letterSpacing: -0.3 }}>฿{fmtBaht(line)}</div>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Delivery method — เลือกก่อนกดสั่งซื้อ */}
            <div style={{ marginTop: 16 }}>
              <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 8, color: 'var(--ink-soft)' }}>วิธีรับสินค้า</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <DeliveryOption
                  selected={deliveryMethod === 'truck'}
                  onSelect={() => setDeliveryMethod('truck')}
                  icon={<Icon.Truck/>}
                  title="รัตนส่ง"
                  desc="ส่งฟรี · ภายใน 2-3 วันทำการ"
                />
                <DeliveryOption
                  selected={deliveryMethod === 'pickup'}
                  onSelect={() => setDeliveryMethod('pickup')}
                  icon={<Icon.Store/>}
                  title="รับที่รัตน"
                  desc="ฟรี · พร้อมรับวันถัดไป"
                />
              </div>
            </div>

            <div style={{ marginTop: 16 }}>
              <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 6, color: 'var(--ink-soft)' }}>หมายเหตุถึงร้าน</div>
              <textarea
                value={note}
                onChange={e => setNote(e.target.value)}
                placeholder="เช่น ส่งก่อน 10 โมง, แยกบิล"
                style={{
                  width: '100%', minHeight: 64, padding: 12, borderRadius: 12,
                  border: '1.5px solid var(--line)', background: 'var(--bg-card)',
                  fontSize: 13, resize: 'none', outline: 'none', fontFamily: 'inherit',
                  color: 'var(--ink)',
                }}
              />
            </div>
          </div>

          <div style={{
            background: 'var(--bg-card)',
            borderTop: '1px solid var(--line-soft)',
            padding: '14px 16px max(24px, env(safe-area-inset-bottom))',
            boxShadow: '0 -10px 24px rgba(11,24,56,0.06)',
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
              <span style={{ fontSize: 12, color: 'var(--ink-muted)' }}>ยอดสินค้า</span>
              <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink)' }}>฿{fmtBaht(subtotal)}</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 10 }}>
              <span style={{ fontSize: 12, color: 'var(--ink-muted)' }}>{deliveryMethod === 'pickup' ? 'รับที่รัตน' : 'รัตนส่ง'}</span>
              <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--success)' }}>ฟรี</span>
            </div>
            <div style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
              padding: '12px 0', borderTop: '1px dashed var(--line)',
              marginBottom: 12,
            }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--ink)' }}>ยอดชำระทั้งหมด</span>
              <span style={{ fontSize: 24, fontWeight: 900, color: 'var(--accent-deep)', letterSpacing: -0.5 }}>฿{fmtBaht(total)}</span>
            </div>
            <Btn full size="lg" variant="accent" onClick={onCheckout} icon={<Icon.ArrowRight size={18}/>}>
              ดำเนินการสั่งซื้อ
            </Btn>
          </div>
        </>
      )}
    </div>
  );
}

/* ============================================================
   CHECKOUT SCREEN
   ============================================================ */
function CheckoutScreen({ cart, user, note, deliveryMethod, onBack, onConfirm, busy }) {
  const subtotal = cart.reduce((s, it) => s + unitPrice(it.product, it.qty) * it.qty, 0);
  const total = subtotal;
  const isPickup = deliveryMethod === 'pickup';

  return (
    <div style={{ minHeight: '100dvh', display: 'flex', flexDirection: 'column', background: 'var(--bg)' }}>
      <AppHeader onBack={onBack} title="ยืนยันคำสั่งซื้อ" />
      <div style={{ flex: 1, overflowY: 'auto', padding: '12px 16px 20px' }} className="no-scrollbar">
        {/* Delivery method (display, locked from cart selection) */}
        <SectionCard title="วิธีรับสินค้า"
          action={<button onClick={onBack} style={{ fontSize: 11, fontWeight: 600, color: 'var(--primary)', padding: '4px 10px', borderRadius: 8, background: 'var(--primary-tint)' }}>เปลี่ยน</button>}>
          <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
            <div style={{
              width: 38, height: 38, borderRadius: 10,
              background: 'linear-gradient(160deg, #15265c, #0b1838)', color: '#fff',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              flexShrink: 0,
            }}>{isPickup ? <Icon.Store size={18}/> : <Icon.Truck size={18}/>}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--ink)' }}>
                {isPickup ? 'รับที่รัตน' : 'รัตนส่ง'}
              </div>
              <div style={{ fontSize: 11.5, color: 'var(--ink-muted)', marginTop: 2 }}>
                {isPickup ? 'ฟรี · พร้อมรับวันถัดไป' : 'ส่งฟรี · ภายใน 2-3 วันทำการ'}
              </div>
            </div>
          </div>
        </SectionCard>

        {/* Address (only when delivery) */}
        {!isPickup && (
          <SectionCard title="ที่อยู่จัดส่ง">
            <div style={{ display: 'flex', gap: 12 }}>
              <div style={{
                width: 38, height: 38, borderRadius: 10, background: 'var(--primary-tint)',
                color: 'var(--primary)', display: 'flex', alignItems: 'center', justifyContent: 'center',
                flexShrink: 0,
              }}><Icon.Pin size={16}/></div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--ink)' }}>{user.name || user.shopName}</div>
                <div style={{ fontSize: 11, color: 'var(--ink-muted)', marginTop: 2 }}>0{user.phone.slice(1)}</div>
                <div style={{ fontSize: 12.5, color: 'var(--ink-soft)', marginTop: 6, lineHeight: 1.5 }}>{user.address || '— ไม่มีที่อยู่ในระบบ —'}</div>
              </div>
            </div>
          </SectionCard>
        )}

        {/* Pickup info */}
        {isPickup && (
          <SectionCard title="จุดรับสินค้า">
            <div style={{ display: 'flex', gap: 12 }}>
              <div style={{
                width: 38, height: 38, borderRadius: 10, background: 'var(--accent-tint)',
                color: 'var(--accent-deep)', display: 'flex', alignItems: 'center', justifyContent: 'center',
                flexShrink: 0,
              }}><Icon.Store size={16}/></div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--ink)' }}>บริษัท รัตนไพบูลย์ สมุทรสงคราม 2555 จำกัด</div>

                  จันทร์-เสาร์ 08:00-17:00 น. · โทร 0803-897-765
                </div>
              </div>
            </div>
          </SectionCard>
        )}

        <SectionCard title="รายการสินค้า" subtitle={`${cart.length} รายการ`}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {cart.map((it, i) => {
              const up = unitPrice(it.product, it.qty);
              return (
                <div key={it.product.id + it.unit} style={{
                  display: 'flex', gap: 10, alignItems: 'center',
                  padding: '6px 0',
                  borderBottom: i < cart.length - 1 ? '1px dashed var(--line-soft)' : 'none',
                }}>
                  <ProductTile product={it.product} size={42} rounded={8}/>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12.5, fontWeight: 600, lineHeight: 1.3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', color: 'var(--ink)' }}>
                      {it.product.name}
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--ink-muted)', marginTop: 2 }}>
                      {it.qty} × ฿{fmtBaht(up)}

                  </div>
                  <div style={{ fontSize: 13.5, fontWeight: 700, color: 'var(--ink)' }}>฿{fmtBaht(up * it.qty)}</div>

              );
            })}

          <SectionCard title="หมายเหตุ">
            <div style={{ fontSize: 12.5, color: 'var(--ink-soft)', lineHeight: 1.5 }}>{note}</div>
          </SectionCard>
        )}

        <div style={{
          marginTop: 12, padding: 16, borderRadius: 14,
          background: 'linear-gradient(160deg, #15265c, #0b1838)',
          color: '#fff',
          boxShadow: '0 14px 30px -12px rgba(11,24,56,0.35)',
        }}>
          <div style={{ fontSize: 11, opacity: 0.7, marginBottom: 8, fontWeight: 600 }}>สรุปยอด</div>
          <Line label="ยอดสินค้า" value={'฿' + fmtBaht(subtotal)} />
          <Line label={isPickup ? 'รับที่รัตน' : 'รัตนส่ง'} value="ฟรี" green />

function OrderDetailScreen({ order, onBack, onReorder }) {
  const meta = STATUS_META[order.status] || STATUS_META.pending;
  const items = order.items || [];
  const subtotal = items.reduce((s, it) => s + unitPrice(it.product, it.qty) * it.qty, 0);
  const fee = (order.total || 0) - subtotal;

  const steps = [
    { id: 'pending', label: 'รอยืนยัน' },
    { id: 'confirmed', label: 'ยืนยันแล้ว' },
    { id: 'shipping', label: 'กำลังจัดส่ง' },
    { id: 'delivered', label: 'ส่งสำเร็จ' },
  ];
  const reached = { pending: 0, confirmed: 1, shipping: 2, delivered: 3 }[order.status] ?? 0;

  return (
    <div style={{ minHeight: '100dvh', display: 'flex', flexDirection: 'column', background: 'var(--bg)' }}>
      <AppHeader onBack={onBack} title={'#' + order.id} subtitle={fmtThaiDate(order.created_at)} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 16px 24px' }} className="no-scrollbar">
        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 14 }}>
          <div style={{
            padding: '6px 14px', background: meta.bg, color: meta.fg,
            borderRadius: 999, fontSize: 12.5, fontWeight: 700,
            display: 'flex', alignItems: 'center', gap: 6,
          }}>
            <div style={{ width: 7, height: 7, borderRadius: 999, background: meta.dot }}/>
            {meta.label}
          </div>
        </div>

        <div style={{
          background: 'var(--bg-card)', borderRadius: 14, padding: '18px 14px',
          border: '1px solid var(--line-soft)', marginBottom: 14,
          boxShadow: 'var(--shadow-sm)',
        }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', position: 'relative' }}>
            {steps.map((s, i) => {
              const done = i <= reached;
              return (
                <div key={s.id} style={{ flex: 1, position: 'relative', textAlign: 'center' }}>
                  {i < steps.length - 1 && (
                    <div style={{
                      position: 'absolute', top: 12, left: '50%', right: '-50%',
                      height: 2, background: i < reached ? 'var(--accent)' : 'var(--line)',
                    }}/>
                  )}
                  <div style={{
                    width: 26, height: 26, borderRadius: 999, margin: '0 auto',
                    background: done ? 'linear-gradient(135deg, #e6b95c, #d4a548)' : 'var(--bg-sunken)',
                    color: done ? '#0b1838' : 'var(--ink-muted)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    border: done ? 'none' : '2px solid var(--line)',
                    position: 'relative', zIndex: 1,
                    boxShadow: done ? '0 4px 10px -2px rgba(212,165,72,0.5)' : 'none',
                  }}>{done && <Icon.Check size={13}/>}</div>
                  <div style={{
                    fontSize: 10.5, fontWeight: done ? 700 : 500, marginTop: 6,
                    color: done ? 'var(--ink)' : 'var(--ink-muted)',
                  }}>{s.label}</div>
                </div>
              );
            })}
          </div>
        </div>

        <SectionCard title="วิธีรับสินค้า">
          <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
            <div style={{
              width: 38, height: 38, borderRadius: 10, background: 'var(--primary-tint)',
              color: 'var(--primary)', display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>{order.delivery_method === 'pickup' ? <Icon.Store size={18}/> : <Icon.Truck size={18}/>}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--ink)' }}>
                {order.delivery_method === 'pickup' ? 'รับที่รัตน — ที่ บริษัท รัตนไพบูลย์ฯ' : 'รัตนส่ง — ส่งถึงร้านลูกค้า'}
              </div>
              <div style={{ fontSize: 11, color: 'var(--ink-muted)', marginTop: 2 }}>
                {order.delivery_method === 'pickup' ? 'พร้อมรับวันถัดไป' : 'ภายใน 2-3 วันทำการ'}
              </div>
            </div>
          </div>
        </SectionCard>

        <SectionCard title="รายการสินค้า" subtitle={items.length + ' รายการ'}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {items.map((it, i) => {
              const up = unitPrice(it.product, it.qty);
              return (
                <div key={i} style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                  <ProductTile product={it.product} size={48} rounded={10}/>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12.5, fontWeight: 600, lineHeight: 1.3, color: 'var(--ink)' }}>{it.product.name}</div>
                    <div style={{ fontSize: 11, color: 'var(--ink-muted)', marginTop: 2 }}>
                      {it.qty} × ฿{fmtBaht(up)} · {it.product.size}
                    </div>
                  </div>
                  <div style={{ fontSize: 13.5, fontWeight: 700, color: 'var(--ink)' }}>฿{fmtBaht(up * it.qty)}</div>
                </div>
              );
            })}
          </div>
        </SectionCard>

        {order.note && (
          <SectionCard title="หมายเหตุ">
            <div style={{ fontSize: 12.5, color: 'var(--ink-soft)', lineHeight: 1.5 }}>{order.note}</div>
          </SectionCard>
        )}

        <div style={{
          marginTop: 14, padding: 16, borderRadius: 14,
          background: 'var(--bg-card)', border: '1px solid var(--line-soft)',
          boxShadow: 'var(--shadow-sm)',
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0' }}>
            <span style={{ fontSize: 12, color: 'var(--ink-muted)' }}>ยอดรวมสินค้า</span>
            <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink)' }}>฿{fmtBaht(subtotal)}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0' }}>
            <span style={{ fontSize: 12, color: 'var(--ink-muted)' }}>ค่าจัดส่ง</span>
            <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--success)' }}>{fee <= 0 ? 'ฟรี' : '฿' + fmtBaht(fee)}</span>
          </div>
          <div style={{ height: 1, background: 'var(--line-soft)', margin: '10px 0' }}/>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--ink)' }}>ยอดชำระ</span>
            <span style={{ fontSize: 22, fontWeight: 900, color: 'var(--accent-deep)', letterSpacing: -0.5 }}>฿{fmtBaht(order.total)}</span>
          </div>
        </div>
      </div>

      <div style={{
        padding: '14px 16px max(26px, env(safe-area-inset-bottom))', display: 'flex', gap: 10,
        background: 'var(--bg-card)', borderTop: '1px solid var(--line-soft)',
        boxShadow: '0 -10px 24px rgba(11,24,56,0.06)',
      }}>
        <Btn variant="ghost" onClick={onBack} style={{ flex: 1 }}>กลับ</Btn>
        <Btn variant="accent" onClick={onReorder} style={{ flex: 1 }}>สั่งซ้ำ</Btn>
      </div>
    </div>
  );
}
function App() {
  const [route, setRoute] = useState({ name: 'login' });
  const [customer, setCustomer] = useState(null);

  // Server data
  const [products, setProducts] = useState([]);
  const [categories, setCategories] = useState([]);
  const [promotions, setPromotions] = useState([]);
  const [bootError, setBootError] = useState('');
  const [loading, setLoading] = useState(true);

  // Cart + orders
  const [cart, setCart] = useState(() => CartStore.load());
  const [note, setNote] = useState('');
  const [deliveryMethod, setDeliveryMethod] = useState('truck');  // 'truck' | 'pickup'
  const [localOrders, setLocalOrders] = useState([]);
  const [placingOrder, setPlacingOrder] = useState(false);
  const [flashAdd, setFlashAdd] = useState(null);

  // Dark mode
  const [dark, setDark] = useState(() => localStorage.getItem(DARK_KEY) === '1');

  // === Boot: load data + restore session ===
  const loadAllData = useCallback(async () => {
    setBootError('');
    setLoading(true);

    // No SHEET_ID set → run with demo data so user can see the UI
    if (!isSheetConfigured()) {
      setCategories(DEMO_CATEGORIES);
      setProducts(DEMO_PRODUCTS);
      setPromotions(DEMO_PROMOTIONS);
      setBootError('DEMO');  // sentinel — shown as info banner, not error
      setLoading(false);
      return;
    }

    try {
      const [cats, prods, promos] = await Promise.all([
        API.listCategories(),
        API.listProducts(),
        API.listPromotions(),
      ]);
      setCategories(cats);
      setProducts(prods);
      setPromotions(promos);
    } catch (e) {
      console.error('Boot data load failed:', e);
      setBootError(e.message || 'โหลดข้อมูลไม่สำเร็จ');
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadAllData(); }, [loadAllData]);

  // Restore session
  useEffect(() => {
    const saved = Session.load();
    if (saved) {
      setCustomer(saved);
      setRoute({ name: 'home' });
      // Load any orders for this customer
      API.listMyOrders(saved.phone).then(setLocalOrders).catch(() => {});
    }
  }, []);

  // Persist cart
  useEffect(() => { CartStore.save(cart); }, [cart]);

  // Apply dark mode
  useEffect(() => {
    document.body.classList.toggle('dark', dark);
    localStorage.setItem(DARK_KEY, dark ? '1' : '0');
  }, [dark]);

  // === Routing helpers ===
  const go = useCallback((name, payload) => setRoute({ name, ...(payload || {}) }), []);
  const nav = useCallback((tab, catId) => {
    if (tab === 'home') go('home');
    else if (tab === 'catalog') go('catalog', { initialCategory: catId || 'all' });
    else if (tab === 'cart') go('cart');
    else if (tab === 'profile') go('profile');
    else if (tab === 'orders') go('orders');
  }, [go]);

  const handleLogin = useCallback((c) => {
    setCustomer(c);
    go('home');
    API.listMyOrders(c.phone).then(setLocalOrders).catch(() => {});
  }, [go]);

  const handleLogout = useCallback(() => {
    Session.clear();
    CartStore.clear();
    setCustomer(null);
    setCart([]);
    setNote('');
    setLocalOrders([]);
    setRoute({ name: 'login' });
  }, []);

  const addToCart = useCallback((product, qty, unit) => {
    setCart(c => {
      const existing = c.find(it => it.product.id === product.id && it.unit === unit);
      if (existing) return c.map(it => it === existing ? { ...it, qty: it.qty + qty } : it);
      return [...c, { product, qty, unit }];
    });
    setFlashAdd({ name: product.name });
    setTimeout(() => setFlashAdd(null), 1800);
    go('cart');
  }, [go]);

  const placeOrder = useCallback(async ({ total }) => {
    if (placingOrder) return;
    setPlacingOrder(true);
    try {
      const order = await API.placeOrder({
        customer_phone: customer.phone,
        customer_name: customer.name,
        shop_name: customer.shopName,
        delivery_method: deliveryMethod,
        delivery_address: customer.address,
        subtotal: total,
        total,
        note,
        items: cart.map(it => ({
          product_id: it.product.id,
          product_name: it.product.name,
          unit: it.unit,
          qty: it.qty,
          unit_price: unitPrice(it.product, it.qty),
          line_total: unitPrice(it.product, it.qty) * it.qty,
          // keep snapshot for offline display
          product: it.product,
        })),
      });
      setLocalOrders(o => [order, ...o]);
      setCart([]);
      setNote('');
      go('success', { total, orderId: order.id, lastOrder: order });
    } catch (e) {
      alert('เกิดข้อผิดพลาด: ' + (e.message || 'ลองอีกครั้ง'));
    } finally {
      setPlacingOrder(false);
    }
  }, [cart, customer, note, deliveryMethod, placingOrder, go]);

  const reorder = useCallback((order) => {
    setCart((order.items || []).map(it => ({ product: it.product, qty: it.qty, unit: it.unit })));
    go('cart');
  }, [go]);

  // === Render ===
  const authed = !!customer;
  const tabMap = { home: 'home', catalog: 'catalog', cart: 'cart', profile: 'profile', orders: 'orders' };
  const tab = tabMap[route.name] || 'home';
  const showTabs = authed && ['home', 'catalog', 'profile', 'orders'].includes(route.name);
  const cartCount = cart.length;  // จำนวน SKU (รายการ), ไม่ใช่จำนวนชิ้นรวม

  let screen;
  const isDemo = bootError === 'DEMO';

  if (!authed) {
    // Login renders immediately — never blocked by data load
    screen = <LoginScreen
      onLogin={handleLogin}
      bootLoading={loading}
      bootError={isDemo ? '' : bootError}
      isDemo={isDemo}
      onRetryBoot={loadAllData} />;
  } else if (loading) {
    screen = (
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16, background: 'var(--bg)', padding: 30 }}>
        <div style={{
          width: 56, height: 56, border: '3px solid rgba(212,165,72,0.25)',
          borderTopColor: '#d4a548', borderRadius: '50%',
          animation: 'spin 1s linear infinite',
        }}/>
        <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--ink)' }}>กำลังโหลดข้อมูลสินค้า…</div>
        <div style={{ fontSize: 11, color: 'var(--ink-muted)' }}>v{VERSION} · {BUILD_DATE}</div>
      </div>
    );
  } else if (bootError && !isDemo) {
    screen = (
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16, background: 'var(--bg)', padding: 30, textAlign: 'center' }}>
        <div style={{ width: 64, height: 64, borderRadius: 18, background: 'var(--signal-soft)', color: 'var(--signal)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 28, fontWeight: 800 }}>!</div>
        <div style={{ fontSize: 16, fontWeight: 800, color: 'var(--ink)' }}>โหลดข้อมูลไม่สำเร็จ</div>
        <div style={{ fontSize: 12.5, color: 'var(--ink-muted)', maxWidth: 280, lineHeight: 1.5 }}>{bootError}</div>
        <Btn variant="accent" onClick={loadAllData}>ลองใหม่</Btn>
        <Btn variant="ghost" onClick={handleLogout}>กลับไปหน้า Login</Btn>
      </div>
    );
  } else {
    switch (route.name) {
      case 'home':
        screen = <HomeScreen user={customer} cart={cart} products={products} categories={categories} promotions={promotions}
          onNav={nav} onOpenProduct={p => go('product', { product: p, from: 'home' })} />;
        break;
      case 'catalog':
        screen = <CatalogScreen products={products} categories={categories}
          onBack={() => go('home')} onOpenProduct={(p, cat) => go('product', { product: p, from: 'catalog', fromCategory: cat })}
          initialCategory={route.initialCategory} onNav={nav} />;
        break;
      case 'product':
        screen = <ProductScreen product={route.product} products={products}
          onBack={() => route.from === 'catalog'
            ? go('catalog', { initialCategory: route.fromCategory || 'all' })
            : go('home')}
          onAddToCart={addToCart}
          onOpenProduct={p => go('product', { product: p, from: route.from, fromCategory: route.fromCategory })} />;
        break;
      case 'cart':
        screen = <CartScreen cart={cart} setCart={setCart} note={note} setNote={setNote}
          deliveryMethod={deliveryMethod} setDeliveryMethod={setDeliveryMethod}
          onBack={() => go('home')} onCheckout={() => go('checkout')} onNav={nav} />;
        break;
      case 'checkout':
        screen = <CheckoutScreen cart={cart} user={customer} note={note}
          deliveryMethod={deliveryMethod}
          busy={placingOrder}
          onBack={() => go('cart')} onConfirm={placeOrder} />;
        break;
      case 'success':
        screen = <SuccessScreen orderId={route.orderId} total={route.total}
          onDone={() => go('home')}
          onViewOrder={() => route.lastOrder ? go('orderDetail', { order: route.lastOrder }) : go('orders')} />;
        break;
      case 'orders':
        screen = <OrdersScreen orders={localOrders} onBack={() => go('home')}
          onReorder={reorder}
          onOpenOrder={o => go('orderDetail', { order: o })} />;
        break;
      case 'orderDetail':
        screen = <OrderDetailScreen order={route.order} onBack={() => go('orders')}
          onReorder={() => reorder(route.order)} />;
        break;
      case 'profile':
        screen = <ProfileScreen user={customer} orders={localOrders}
          dark={dark} onToggleDark={() => setDark(d => !d)}
          onNav={nav} onLogout={handleLogout} />;
        break;
      default:
        screen = <HomeScreen user={customer} cart={cart} products={products} categories={categories} promotions={promotions}
          onNav={nav} onOpenProduct={p => go('product', { product: p })} />;
    }
  }

  return (
    <div className="app-wrapper">
      <button className="dark-toggle" onClick={() => setDark(d => !d)}
        title={dark ? 'โหมดสว่าง' : 'โหมดมืด'}>
        {dark ? <Icon.Sun size={16}/> : <Icon.Moon size={16}/>}
      </button>

      {screen}

      {showTabs && <BottomNav active={tab} onNav={nav} cartCount={cartCount} />}

      {flashAdd && (
        <div style={{
          position: 'fixed',
          top: 16, left: '50%', transform: 'translateX(-50%)',
          maxWidth: 440, width: 'calc(100% - 32px)',
          padding: '10px 12px',
          background: 'linear-gradient(160deg, #15265c, #0b1838)',
          color: '#fff',
          borderRadius: 12, display: 'flex', alignItems: 'center', gap: 10,
          animation: 'slideUp 0.3s', zIndex: 999,
          boxShadow: '0 14px 30px -10px rgba(11,24,56,0.45)',
          border: '1px solid rgba(212,165,72,0.3)',
        }}>
          <div style={{
            width: 26, height: 26, borderRadius: 8,
            background: 'linear-gradient(135deg, #e6b95c, #d4a548)', color: '#0b1838',
            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
          }}><Icon.Check size={14}/></div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 10, fontWeight: 600, opacity: 0.7, color: 'var(--accent-hi)' }}>เพิ่มลงตะกร้าแล้ว</div>
            <div style={{ fontSize: 13, fontWeight: 700, marginTop: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
              {flashAdd.name}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
