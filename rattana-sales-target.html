<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rattana Sales vs Target v1.3</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#0d1b3e;--navy-mid:#1a2f5e;--navy-light:#243b73;--gold:#c9a84c;--gold-light:#e8c86a;
  --success:#2ecc71;--danger:#e74c3c;--warning:#f39c12;--info:#3498db;
  --bg:#f4f6fb;--text:#0d1b3e;--card-bg:#fff;--border:#dde3f0;--muted:#6b7896;--row-alt:#fafbfd;
  --space-sm:8px;--space-md:16px;--space-lg:24px;
  --radius-sm:6px;--radius-md:12px;--radius-lg:16px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);--shadow-md:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(13,27,62,.12);
}
body.dark{--bg:#05080f;--text:#fff;--card-bg:#0d1b3e;--border:#1f3563;--muted:#b8c2dc;--row-alt:#0a1226}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;font-size:14px;line-height:1.5;min-height:100dvh;overflow-x:hidden;background:var(--bg);color:var(--text);transition:background .25s,color .25s}
button{font-family:inherit;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input,select{font-family:inherit;font-size:16px}
a{color:inherit}

header{background:var(--navy);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--gold);padding-top:max(12px,env(safe-area-inset-top))}
.logo-text{font-weight:700;letter-spacing:1px;font-size:17px;color:#fff;line-height:1.1}
.logo-text span{color:var(--gold)}
.logo-text small{display:block;font-size:10px;font-weight:400;letter-spacing:.5px;color:#aebbd8}
.head-spacer{flex:1}
.ver{font-size:10px;color:#8b9bc4;align-self:flex-end;margin-bottom:1px}
.icon-btn{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.2);width:38px;height:38px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .15s}
.icon-btn:hover{background:rgba(255,255,255,.12)}
.hub-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:var(--radius-sm);padding:5px 10px;font-size:13px;font-weight:600;text-decoration:none;transition:background .15s;white-space:nowrap;min-height:38px}
.hub-btn:hover{background:rgba(255,255,255,.18)}

.content{flex:1;padding:12px;max-width:1200px;margin:0 auto;width:100%}
@media(min-width:640px){.content{padding:18px}}

.filter-bar{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);padding:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px}
.field label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;text-transform:uppercase}
.input{height:42px;padding:0 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card-bg);color:var(--text);font-size:15px;outline:none;width:100%;transition:border-color .15s}
.input:focus{border-color:var(--gold)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;border:1px solid transparent;min-height:42px;transition:opacity .15s,transform .1s}
.btn:hover{opacity:.88}.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-primary{background:var(--navy);color:#fff}

.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:640px){.stat-grid{grid-template-columns:repeat(5,1fr);gap:14px}}
.stat-card{background:var(--card-bg);border-radius:var(--radius-md);padding:14px;border:1px solid var(--border);border-top:3px solid var(--gold)}
.stat-card .s-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.3px;margin-bottom:5px}
.stat-card .s-value{font-size:20px;font-weight:700;line-height:1.2;font-variant-numeric:tabular-nums}
.stat-card .s-sub{font-size:11px;color:var(--muted);margin-top:3px}
.stat-card.success{border-top-color:var(--success)}.stat-card.success .s-value{color:var(--success)}
.stat-card.danger{border-top-color:var(--danger)}.stat-card.danger .s-value{color:var(--danger)}
.stat-card.info{border-top-color:var(--info)}.stat-card.info .s-value{color:var(--info)}

.card{background:var(--card-bg);border-radius:var(--radius-md);border:1px solid var(--border);box-shadow:var(--shadow-md);margin-bottom:14px;overflow:hidden}
.card-gold{border-top:3px solid var(--gold)}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:13px 16px;border-bottom:1px solid var(--border);background:linear-gradient(to right,rgba(201,168,76,.07),transparent)}
.card-head h3{font-size:15px;font-weight:700}
.card-body{padding:16px}
.chart-wrap{position:relative;width:100%;height:360px}

.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;min-width:680px}
.tbl thead{background:var(--navy);color:#fff}
.tbl thead th{padding:10px;text-align:left;font-size:12px;font-weight:600;white-space:nowrap;border-bottom:2px solid var(--gold);cursor:pointer;user-select:none}
.tbl thead th:hover{background:var(--navy-mid)}
.tbl thead th.num,.tbl td.num{text-align:right}
.tbl tbody tr{border-bottom:1px solid var(--border);transition:background .12s;cursor:pointer}
.tbl tbody tr:nth-child(even){background:var(--row-alt)}
.tbl tbody tr:hover{background:rgba(201,168,76,.1)}
.tbl td{padding:9px 10px;font-size:13px;vertical-align:middle}
.tbl td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:500}
.tbl .empty-row td{text-align:center;padding:42px 20px;color:var(--muted);cursor:default}
.rank{font-weight:700;color:var(--gold);width:34px}
.pbar{position:relative;height:18px;background:var(--border);border-radius:9px;overflow:hidden;min-width:90px}
.pbar>span{position:absolute;left:0;top:0;height:100%;border-radius:9px}
.pbar small{position:absolute;left:8px;top:0;line-height:18px;font-size:10px;font-weight:700;color:var(--text);z-index:2}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-ok{background:#e8f7ee;color:#1e8449}.badge-warn{background:#fef3d7;color:#a87800}.badge-danger{background:#ffd5d0;color:#c0392b}
body.dark .badge-ok{background:#1a3a25;color:#7be0a3}body.dark .badge-warn{background:#3a2e15;color:#e8c86a}body.dark .badge-danger{background:#3a1a17;color:#ff8a7e}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,.65);z-index:9000;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px);overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--card-bg);border-radius:var(--radius-lg);max-width:560px;width:100%;max-height:90dvh;overflow-y:auto;border-top:4px solid var(--gold);animation:slideUp .22s ease}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card-bg)}
.modal-head h3{font-size:16px;font-weight:700}
.modal-close{background:transparent;font-size:24px;color:var(--muted);padding:2px 8px;line-height:1}
.modal-body{padding:18px}
.mini-tbl{width:100%;border-collapse:collapse}
.mini-tbl th{text-align:left;font-size:11px;color:var(--muted);padding:6px;border-bottom:1px solid var(--border)}
.mini-tbl th.num,.mini-tbl td.num{text-align:right}
.mini-tbl td{padding:6px;font-size:12.5px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}

.toast{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));right:16px;padding:12px 18px;border-radius:var(--radius-md);color:#fff;z-index:9999;animation:slideIn .3s ease;font-weight:500;box-shadow:var(--shadow-lg);max-width:90vw;font-size:13px}
.toast-success{background:var(--success)}.toast-error{background:var(--danger)}.toast-info{background:var(--navy-mid);border-left:3px solid var(--gold)}
.spinner-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,.55);align-items:center;justify-content:center;z-index:99999;backdrop-filter:blur(3px)}
.spinner-overlay.show{display:flex}
.spinner-box{background:var(--card-bg);border-radius:var(--radius-lg);padding:30px 38px;text-align:center;border-top:4px solid var(--gold);min-width:230px}
.spinner-ring{width:46px;height:46px;border:5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
.btt{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:16px;width:46px;height:46px;border-radius:50%;background:var(--gold);color:var(--navy);font-size:20px;display:none;align-items:center;justify-content:center;box-shadow:var(--shadow-lg);z-index:90}
.btt.show{display:flex}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.foot{text-align:center;color:var(--muted);font-size:11px;padding:18px 0 30px}
.muted{color:var(--muted)}.bold{font-weight:700}
</style>
</head>
<body>

<header>
  <div class="logo-text">RATTANA <span>SALES</span><small>สรุปยอดขายเทียบเป้าต่อเดือน</small></div>
  <span class="ver">v1.3</span>

  <button class="icon-btn" id="themeBtn" title="สลับโหมด">🌙</button>
  <button class="icon-btn" id="refreshBtn" title="โหลดใหม่">↻</button>

<div class="content">

    <div class="tbl-wrap">
      <table class="tbl" id="mainTbl">

          <th>#</th>

</div>

<button class="btt" id="bttBtn">↑</button>
<div class="modal-overlay" id="modal"><div class="modal">
  <div class="modal-head"><h3 id="mTitle">รายละเอียด</h3><button class="modal-close" id="mClose">×</button></div>
  <div class="modal-body" id="mBody"></div>
</div></div>
<div class="spinner-overlay" id="spinner"><div class="spinner-box"><div class="spinner-ring"></div><div id="spinTxt">กำลังโหลดข้อมูล…</div></div></div>

<script>
const CONFIG = {
  sheetId: '1MnsiIYjehMwo_vH1nxLvhgiuzEQ_BOAXB_bLXM_9y8M',
  sheetName: 'สรุปยอดขายเทียบเป้าต่อเดือน',
  gid: '2123647087',
  cacheKey: 'rattana_sales_target_cache',
  ttl: 5*60*1000
};
let lastErr='';
// ชื่อเป้าหมายที่มีคำเหล่านี้ = ไม่นำมาคำนวณ (ทุกส่วน: KPI, ตาราง, กราฟ, drill-down, export)
const EXCLUDE_TARGETS = ['ความร่วมมือ'];

/* ---------- utils ---------- */
const $ = s => document.querySelector(s);
const fmt = n => (n||0).toLocaleString('th-TH',{maximumFractionDigits:0});
const fmtB = n => '฿'+fmt(n);
function toast(msg,type='info'){const t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3200);}
function spin(on,txt){const s=$('#spinner');if(txt)$('#spinTxt').textContent=txt;s.classList.toggle('show',on);}
function num(s){if(s==null)return null;const v=String(s).replace(/[,฿\s]/g,'').replace(/[^\d.\-]/g,'');if(v===''||v==='-')return null;const f=parseFloat(v);return isNaN(f)?null:f;}

/* แยก"มิถุนายน 2569" -> {name,year,ord} เพื่อกรองตามปี/เดือนและเรียงตามเวลา */
const THMON={'มกราคม':1,'กุมภาพันธ์':2,'มีนาคม':3,'เมษายน':4,'พฤษภาคม':5,'มิถุนายน':6,'กรกฎาคม':7,'สิงหาคม':8,'กันยายน':9,'ตุลาคม':10,'พฤศจิกายน':11,'ธันวาคม':12};
function splitMonth(m){
  const p=(m||'').trim().split(/\s+/);
  const year=p.length>1?p[p.length-1]:'';
  const name=p.length>1?p.slice(0,-1).join(' '):(p[0]||'');
  return {name,year,ord:(parseInt(year)||0)*100+(THMON[name]||0)};
}

/* RFC-4180 CSV parser */
function parseCsv(text){
  if(!text)return[];
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const rows=[];let row=[],cell='',inQ=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(inQ){if(ch==='"'){if(text[i+1]==='"'){cell+='"';i++;}else inQ=false;}else cell+=ch;}
    else{if(ch==='"')inQ=true;else if(ch===','){row.push(cell);cell='';}else if(ch==='\r'){}else if(ch==='\n'){row.push(cell);rows.push(row);row=[];cell='';}else cell+=ch;}
  }
  if(cell.length||row.length){row.push(cell);rows.push(row);}
  if(!rows.length)return[];
  const clean=s=>String(s||'').replace(/[\u200B\u200C\u200D\uFEFF]/g,'').replace(/\u00A0/g,' ').trim();
  const headers=rows[0].map(clean);
  return rows.slice(1).filter(r=>r.some(c=>clean(c))).map(r=>Object.fromEntries(headers.map((k,i)=>[k,clean(r[i])])));
}
/* BOM-safe key lookup */
function pickKey(obj,...cands){
  const keys=Object.keys(obj);
  for(const c of cands){const hit=keys.find(k=>k.replace(/\s+/g,'')===c.replace(/\s+/g,''));if(hit)return hit;}
  for(const c of cands){const hit=keys.find(k=>k.includes(c));if(hit)return hit;}
  return null;
}

/* ---------- data ---------- */
let RAW=[];        // raw rows {wh,month,name,nick,targetName,unit,target,actual}
let AGG=[];        // aggregated per person (current filter)
let chart=null;

async function loadFromSheets(){
  const base=`https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/gviz/tq?tqx=out:csv&`;
  const tries=[
    {by:'ชื่อแท็บ', url:base+'sheet='+encodeURIComponent(CONFIG.sheetName)},
    {by:'gid',     url:base+'gid='+CONFIG.gid}
  ];
  let err=null;
  for(const t of tries){
    try{
      const res=await fetch(t.url);
      const text=await res.text();
      if(!res.ok){err=new Error('HTTP '+res.status+' ('+t.by+')');continue;}
      const head=text.slice(0,600);
      if(/<!DOCTYPE|<html|accounts\.google\.com|ServiceLogin|Sign in/i.test(head)){
        err=new Error('ได้หน้า login แทนข้อมูล — ชีทถูกจำกัดเฉพาะองค์กร rattanaphaiboon.com');
        continue;
      }
      const rows=parseCsv(text);
      if(rows.length)return rows;
      err=new Error('แท็บว่าง ('+t.by+')');
    }catch(e){err=e;}
  }
  throw err||new Error('โหลดไม่สำเร็จ');
}
function normalize(rows){
  if(!rows.length)return[];
  const s=rows[0];
  const kWh=pickKey(s,'คลัง'), kMon=pickKey(s,'เดือน'), kName=pickKey(s,'ชื่อ สกุล'),
        kNick=pickKey(s,'ชื่อเล่น'), kCompose=pickKey(s,'ชื่อ สกุล เดือน'),
        kTgtName=pickKey(s,'ชื่อเป้าหมาย'),
        kTgt=pickKey(s,'เป้าหมายขาย','เป้าหมาย'), kAct=pickKey(s,'ทำได้จริง');
  const out=[];
  for(const r of rows){
    let name=(r[kName]||'').trim();
    if((!name||name==='ชื่อ สกุล') && kCompose){ name=(r[kCompose]||'').split('-')[0].trim(); } // recover from "name-month"
    const wh=(r[kWh]||'').trim();
    if(!name||name==='ชื่อ สกุล')continue;
    if(!/^(W\d|สเตชั่น)/.test(wh)&&wh!=='')continue;
    const tn=(r[kTgtName]||'').trim();
    if(EXCLUDE_TARGETS.some(x=>tn.includes(x)))continue; // ตัดหัวข้อที่ไม่ต้องการ
    let unit=tn.includes('-')?tn.split('-').pop().trim():tn;
    unit=unit.split('#')[0].trim(); // 'บาท#Step' -> 'บาท'
    out.push({
      wh, month:(r[kMon]||'').trim(), name, nick:(r[kNick]||'').trim(),
      targetName:tn, unit,
      target:num(r[kTgt]), actual:num(r[kAct])
    });
  }
  return out;
}

/* ---------- filters & aggregation ---------- */
function applyFilters(){
  const y=$('#fYear').value, mn=$('#fMonth').value, w=$('#fWh').value, q=$('#fSearch').value.trim().toLowerCase();
  const rows=RAW.filter(r=>{
    const sm=splitMonth(r.month);
    if(y&&sm.year!==y)return false;
    if(mn&&sm.name!==mn)return false;
    if(w&&r.wh!==w)return false;
    if(q&&!(r.name.toLowerCase().includes(q)||r.nick.toLowerCase().includes(q)))return false;
    return true;
  });
  // aggregate per person — money (บาท) only for headline
  const map={};
  for(const r of rows){
    const key=r.wh+'|'+r.name;
    if(!map[key])map[key]={name:r.name,nick:r.nick,wh:r.wh,target:0,actual:0,detail:[]};
    const isBaht=r.unit==='บาท';
    if(isBaht){if(r.target)map[key].target+=r.target;if(r.actual)map[key].actual+=r.actual;}
    map[key].detail.push(r);
  }
  AGG=Object.values(map).map(p=>{
    p.gap=p.actual-p.target;
    p.pct=p.target>0?(p.actual/p.target*100):null;
    return p;
  });
  render();
}
function statusOf(pct){
  if(pct==null)return['—','badge-warn'];
  if(pct>=100)return['บรรลุเป้า','badge-ok'];
  if(pct>=80)return['ใกล้เป้า','badge-warn'];
  return['ต่ำกว่าเป้า','badge-danger'];
}

/* ---------- render ---------- */
let sortKey='pct',sortDir=-1;
function render(){
  // KPI
  const totT=AGG.reduce((a,p)=>a+p.target,0), totA=AGG.reduce((a,p)=>a+p.actual,0);
  const withTgt=AGG.filter(p=>p.pct!=null);
  const achieved=withTgt.filter(p=>p.pct>=100).length;
  const overall=totT>0?(totA/totT*100):0;
  $('#statGrid').innerHTML=[
    {l:'จำนวนพนักงาน',v:AGG.length,s:'คน',c:'info'},
    {l:'เป้ารวม',v:fmtB(totT),s:'บาท',c:''},
    {l:'ทำได้จริงรวม',v:fmtB(totA),s:'บาท',c:overall>=100?'success':''},
    {l:'% ทำได้รวม',v:overall.toFixed(1)+'%',s:(totA-totT>=0?'+':'')+fmt(totA-totT)+' บาท',c:overall>=100?'success':'danger'},
    {l:'บรรลุเป้า',v:achieved+'/'+withTgt.length,s:'คน (≥100%)',c:'success'}
  ].map(k=>`<div class="stat-card ${k.c}"><div class="s-label">${k.l}</div><div class="s-value">${k.v}</div><div class="s-sub">${k.s}</div></div>`).join('');

  // table
  const tb=$('#mainBody');
  const sorted=[...AGG].sort((a,b)=>{
    let av,bv;
    if(sortKey==='name'){av=a.name;bv=b.name;return sortDir*av.localeCompare(bv,'th');}
    if(sortKey==='wh'){av=a.wh;bv=b.wh;return sortDir*av.localeCompare(bv,'th');}
    if(sortKey==='status'){av=a.pct??-1;bv=b.pct??-1;}
    else{av=a[sortKey]??-Infinity;bv=b[sortKey]??-Infinity;}
    return sortDir*(av-bv);
  });
  $('#rowCount').textContent=sorted.length+' คน';
  if(!sorted.length){tb.innerHTML='<tr class="empty-row"><td colspan="8">ไม่มีข้อมูลตามเงื่อนไข</td></tr>';}
  else{
    tb.innerHTML=sorted.map((p,i)=>{
      const[st,cls]=statusOf(p.pct);
      const pct=p.pct;
      const barCol=pct==null?'var(--muted)':pct>=100?'var(--success)':pct>=80?'var(--warning)':'var(--danger)';
      const barW=pct==null?0:Math.min(100,pct);
      return `<tr data-key="${p.wh}|${p.name}">
        <td class="rank">${i+1}</td>
        <td><div class="bold">${p.name}</div>${p.nick?`<div class="muted" style="font-size:11px">${p.nick}</div>`:''}</td>
        <td>${p.wh}</td>
        <td class="num">${fmt(p.target)}</td>
        <td class="num">${fmt(p.actual)}</td>
        <td class="num" style="color:${p.gap>=0?'var(--success)':'var(--danger)'}">${p.gap>=0?'+':''}${fmt(p.gap)}</td>
        <td class="num"><div class="pbar"><span style="width:${barW}%;background:${barCol}"></span><small>${pct==null?'—':pct.toFixed(0)+'%'}</small></div></td>
        <td><span class="badge ${cls}">${st}</span></td>
      </tr>`;
    }).join('');
    tb.querySelectorAll('tr[data-key]').forEach(tr=>tr.onclick=()=>openDetail(tr.dataset.key));
  }
  renderChart();
}

function renderChart(){
  const sortBy=$('#chartSort').value;
  let data=AGG.filter(p=>p.target>0||p.actual>0);
  data.sort((a,b)=>{
    if(sortBy==='actual')return b.actual-a.actual;
    if(sortBy==='gap')return b.gap-a.gap;
    return (b.pct??-1)-(a.pct??-1);
  });
  data=data.slice(0,20);
  const labels=data.map(p=>p.name);
  const ctx=$('#barChart');
  const dark=document.body.classList.contains('dark');
  const grid=dark?'rgba(255,255,255,.08)':'rgba(0,0,0,.06)';
  const txt=dark?'#cfd8ee':'#41506f';
  if(chart)chart.destroy();
  chart=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[
      {label:'เป้าหมาย',data:data.map(p=>p.target),backgroundColor:'rgba(201,168,76,.45)',borderColor:'#c9a84c',borderWidth:1,borderRadius:4},
      {label:'ทำได้จริง',data:data.map(p=>p.actual),backgroundColor:data.map(p=>p.pct==null?'#95a5a6':p.pct>=100?'#2ecc71':p.pct>=80?'#f39c12':'#e74c3c'),borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:txt,font:{family:'Sarabun'}}},
        tooltip:{callbacks:{title:items=>data[items[0].dataIndex].name,
          label:c=>c.dataset.label+': ฿'+fmt(c.raw),
          afterbody:items=>{const p=data[items[0].dataIndex];return p.pct!=null?['% ทำได้: '+p.pct.toFixed(1)+'%']:[];}}}},
      scales:{x:{ticks:{color:txt,font:{family:'Sarabun',size:11},maxRotation:70,minRotation:50,autoSkip:false,
            callback:function(v){const l=this.getLabelForValue(v);return l.length>16?l.slice(0,15)+'…':l;}},grid:{display:false}},
        y:{ticks:{color:txt,font:{family:'Sarabun'},callback:v=>v>=1e6?(v/1e6)+'M':v>=1e3?(v/1e3)+'K':v},grid:{color:grid}}}}
  });
}

/* ---------- detail modal ---------- */
function openDetail(key){
  const p=AGG.find(x=>(x.wh+'|'+x.name)===key);
  if(!p)return;
  $('#mTitle').textContent=p.name+(p.nick?' ('+p.nick+')':'');
  // group detail by unit
  const byUnit={};
  for(const d of p.detail){if(!byUnit[d.unit])byUnit[d.unit]=[];byUnit[d.unit].push(d);}
  let html=`<div style="margin-bottom:14px" class="muted">คลัง ${p.wh} · ยอดบาท: เป้า ${fmtB(p.target)} · ทำได้ ${fmtB(p.actual)} · ${p.pct!=null?p.pct.toFixed(1)+'%':'—'}</div>`;
  const order=['บาท','ลัง','SKU','ร้าน','Point','วัน'];
  const units=Object.keys(byUnit).sort((a,b)=>(order.indexOf(a)+1||99)-(order.indexOf(b)+1||99));
  for(const u of units){
    const rows=byUnit[u].filter(d=>d.target||d.actual);
    if(!rows.length)continue;
    html+=`<div class="bold" style="margin:12px 0 4px;color:var(--gold)">หน่วย: ${u||'-'}</div>`;
    html+=`<table class="mini-tbl"><thead><tr><th>เป้าหมาย</th><th class="num">เป้า</th><th class="num">จริง</th><th class="num">%</th></tr></thead><tbody>`;
    for(const d of rows){
      const short=d.targetName.split('-').slice(0,-1).join('-')||d.targetName;
      const pc=d.target?(d.actual/d.target*100):null;
      html+=`<tr><td>${short}</td><td class="num">${fmt(d.target)}</td><td class="num">${fmt(d.actual)}</td><td class="num" style="color:${pc==null?'var(--muted)':pc>=100?'var(--success)':'var(--danger)'}">${pc==null?'—':pc.toFixed(0)+'%'}</td></tr>`;
    }
    html+=`</tbody></table>`;
  }
  $('#mBody').innerHTML=html;
  $('#modal').classList.add('open');
}

/* ---------- export ---------- */
function exportExcel(){
  if(!AGG.length){toast('ไม่มีข้อมูลให้ส่งออก','error');return;}
  const m=(($('#fYear').value||'')+($('#fMonth').value||'')).replace(/\s/g,'')||'ทั้งหมด';
  const rows=[...AGG].sort((a,b)=>(b.pct??-1)-(a.pct??-1)).map((p,i)=>({
    'อันดับ':i+1,'พนักงานขาย':p.name,'ชื่อเล่น':p.nick,'คลัง':p.wh,
    'เป้า (บาท)':p.target,'ทำได้จริง (บาท)':p.actual,'ส่วนต่าง':p.gap,
    '% ทำได้':p.pct!=null?+p.pct.toFixed(1):'','สถานะ':statusOf(p.pct)[0]
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'สรุปยอดขาย');
  XLSX.writeFile(wb,`Rattana_SalesTarget_${m.replace(/\s/g,'')}.xlsx`);
  toast('ส่งออก Excel แล้ว','success');
}

/* ---------- populate filters ---------- */
function buildMonthOptions(year){
  const names=[...new Set(RAW.map(r=>splitMonth(r.month)).filter(s=>s.name&&(!year||s.year===year)).map(s=>s.name))]
    .sort((a,b)=>(THMON[a]||0)-(THMON[b]||0));
  const cur=$('#fMonth').value;
  $('#fMonth').innerHTML='<option value="">ทุกเดือน</option>'+names.map(n=>`<option>${n}</option>`).join('');
  if(names.includes(cur))$('#fMonth').value=cur;
}
function populateFilters(){
  const parsed=RAW.map(r=>splitMonth(r.month)).filter(s=>s.name);
  const years=[...new Set(parsed.map(s=>s.year).filter(Boolean))].sort((a,b)=>b-a);
  const whs=[...new Set(RAW.map(r=>r.wh).filter(Boolean))].sort();
  $('#fYear').innerHTML='<option value="">ทุกปี</option>'+years.map(y=>`<option>${y}</option>`).join('');
  $('#fWh').innerHTML='<option value="">ทุกคลัง</option>'+whs.map(w=>`<option>${w}</option>`).join('');
  // หาเดือนล่าสุดที่มียอดจริง (บาท) เพื่อตั้งเป็นค่าเริ่มต้น แทนเดือนล่าสุดที่อาจยังไม่กรอกยอด
  const actByMonth={};
  RAW.forEach(r=>{if(r.unit==='บาท'&&r.actual)actByMonth[r.month]=(actByMonth[r.month]||0)+r.actual;});
  let best=null;
  Object.keys(actByMonth).forEach(k=>{if(actByMonth[k]>0){const o=splitMonth(k).ord;if(!best||o>best.ord)best={k,ord:o};}});
  const def=best?splitMonth(best.k):(parsed.length?parsed.sort((a,b)=>b.ord-a.ord)[0]:null);
  if(def){$('#fYear').value=def.year;buildMonthOptions(def.year);$('#fMonth').value=def.name;}
  else buildMonthOptions('');
}

/* ---------- init ---------- */
async function init(showSpin=true){
  if(showSpin)spin(true,'กำลังโหลดข้อมูล…');
  try{
    const rows=await loadFromSheets();
    RAW=normalize(rows);
    if(!RAW.length)throw new Error('ดึงได้ '+rows.length+' แถวแต่ parse ไม่พบข้อมูลพนักงาน');
    localStorage.setItem(CONFIG.cacheKey,JSON.stringify({ts:Date.now(),data:RAW}));
    populateFilters(); applyFilters();
    if(showSpin)toast('โหลดข้อมูล '+RAW.length+' แถว','success');
  }catch(e){
    try{const c=JSON.parse(localStorage.getItem(CONFIG.cacheKey));if(c&&c.data&&c.data.length){RAW=c.data;populateFilters();applyFilters();toast('ใช้ข้อมูลแคช (โหลดสดไม่สำเร็จ)','info');return;}}catch{}
    const msg=e.message||'ไม่ทราบสาเหตุ';
    toast('โหลดไม่สำเร็จ: '+msg,'error');
    $('#mainBody').innerHTML=`<tr class="empty-row"><td colspan="8" style="text-align:left;padding:24px">
      <div class="bold" style="color:var(--danger);margin-bottom:8px">โหลดข้อมูลไม่ได้</div>
      <div style="margin-bottom:10px">สาเหตุ: ${msg}</div>
      <div class="muted" style="line-height:1.7">วิธีแก้:<br>
      1. เปิดชีท → แชร์ → "ทุกคนที่มีลิงก์" เป็น <b>ผู้ดู</b> (ถ้าโดเมนบังคับเฉพาะองค์กร ต้องใช้ Apps Script)<br>
      2. หรือทำ Apps Script Web App (doGet) คืน JSON แล้วบอกผม จะต่อ backend ให้</div></td></tr>`;
  }finally{spin(false);}
}

/* events */
$('#fYear').onchange=()=>{buildMonthOptions($('#fYear').value);applyFilters();};
$('#fMonth').onchange=applyFilters; $('#fWh').onchange=applyFilters;
$('#fSearch').oninput=()=>{clearTimeout(window._st);window._st=setTimeout(applyFilters,250);};
$('#chartSort').onchange=renderChart;
$('#exportBtn').onclick=exportExcel;
$('#refreshBtn').onclick=()=>init(true);
$('#mClose').onclick=()=>$('#modal').classList.remove('open');
$('#modal').onclick=e=>{if(e.target===$('#modal'))$('#modal').classList.remove('open');};
document.querySelectorAll('#mainTbl thead th[data-k]').forEach(th=>th.onclick=()=>{
  const k=th.dataset.k;
  if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==='name'||k==='wh')?1:-1;}
  render();
});
$('#themeBtn').onclick=()=>{
  document.body.classList.toggle('dark');
  const dark=document.body.classList.contains('dark');
  $('#themeBtn').textContent=dark?'☀️':'🌙';
  localStorage.setItem('rattana_theme',dark?'dark':'light');
  if(chart)renderChart();
};
if(localStorage.getItem('rattana_theme')==='dark'){document.body.classList.add('dark');$('#themeBtn').textContent='☀️';}
window.onscroll=()=>$('#bttBtn').classList.toggle('show',window.scrollY>400);
$('#bttBtn').onclick=()=>window.scrollTo({top:0,behavior:'smooth'});

init();
</script>
