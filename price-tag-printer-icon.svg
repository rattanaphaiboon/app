<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Rattana Price Tag Generator">
  <title>Rattana Price Tag Generator</title>

  <defs>
    <linearGradient id="tagFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DDBE6A"/>
      <stop offset="100%" stop-color="#C09F44"/>
    </linearGradient>
    <linearGradient id="tagMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5A248"/>
      <stop offset="100%" stop-color="#A4853A"/>
    </linearGradient>
    <linearGradient id="tagBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A6863A"/>
      <stop offset="100%" stop-color="#866A2C"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Crimson background, iOS continuous-corner approximation -->
  <rect width="1024" height="1024" rx="225" ry="225" fill="#B91C2E"/>

  <!-- Back tag (most rotated) -->
  <g transform="translate(512 470) rotate(-22) translate(-280 -180)" filter="url(#softShadow)">
    <path d="M 100 0 L 560 0 L 560 360 L 0 360 L 0 100 Z" fill="url(#tagBack)"/>
    <circle cx="65" cy="65" r="24" fill="#B91C2E"/>
  </g>

  <!-- Middle tag -->
  <g transform="translate(512 510) rotate(-12) translate(-280 -180)" filter="url(#softShadow)">
    <path d="M 100 0 L 560 0 L 560 360 L 0 360 L 0 100 Z" fill="url(#tagMid)"/>
    <circle cx="65" cy="65" r="24" fill="#B91C2E"/>
  </g>

  <!-- Front tag with barcode + italic R -->
  <g transform="translate(512 550) rotate(-3) translate(-280 -180)" filter="url(#softShadow)">
    <path d="M 100 0 L 560 0 L 560 360 L 0 360 L 0 100 Z" fill="url(#tagFront)"/>
    <circle cx="65" cy="65" r="24" fill="#B91C2E"/>

    <!-- Barcode (oxblood bars) -->
    <g fill="#6B0F1A" transform="translate(155 80)">
      <rect x="0"   width="10" height="160"/>
      <rect x="18"  width="4"  height="160"/>
      <rect x="30"  width="8"  height="160"/>
      <rect x="46"  width="4"  height="160"/>
      <rect x="58"  width="12" height="160"/>
      <rect x="78"  width="4"  height="160"/>
      <rect x="90"  width="6"  height="160"/>
      <rect x="104" width="10" height="160"/>
      <rect x="122" width="4"  height="160"/>
      <rect x="134" width="8"  height="160"/>
      <rect x="150" width="6"  height="160"/>
      <rect x="164" width="12" height="160"/>
      <rect x="184" width="4"  height="160"/>
      <rect x="196" width="8"  height="160"/>
      <rect x="212" width="6"  height="160"/>
      <rect x="226" width="10" height="160"/>
      <rect x="244" width="4"  height="160"/>
      <rect x="256" width="8"  height="160"/>
      <rect x="272" width="12" height="160"/>
      <rect x="292" width="4"  height="160"/>
      <rect x="304" width="8"  height="160"/>
      <rect x="320" width="6"  height="160"/>
      <rect x="334" width="10" height="160"/>
      <rect x="352" width="6"  height="160"/>
      <rect x="366" width="8"  height="160"/>
    </g>

    <!-- Italic serif R -->
    <text x="330" y="320" font-family="Georgia, 'Times New Roman', 'Cambria', serif"
          font-style="italic" font-weight="700" font-size="110"
          fill="#6B0F1A" text-anchor="middle">R</text>
  </g>
</svg>
