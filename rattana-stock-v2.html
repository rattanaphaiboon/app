<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rattana Stock">
<meta name="theme-color" content="#0d1b3e">
<title>Rattana Stock Count v1.1</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --navy:#0d1b3e;--navy-mid:#1a2f5e;--navy-light:#243b73;
  --gold:#c9a84c;--gold-light:#e8c86a;
  --success:#2ecc71;--danger:#e74c3c;--warning:#f39c12;--info:#3498db;
  --bg:#f4f6fb;--text:#0d1b3e;--card-bg:#fff;--border:#dde3f0;--muted:#6b7896;--row-alt:#fafbfd;
  --radius-sm:6px;--radius-md:12px;--radius-lg:16px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);--shadow-md:0 2px 8px rgba(0,0,0,.08);
  --shadow-lg:0 8px 24px rgba(13,27,62,.12);--shadow-gold:0 4px 12px rgba(201,168,76,.35);
}
body.dark{--bg:#0a1020;--text:#e8eaf0;--card-bg:#111c35;--border:#243b73;--muted:#8a98b8;--row-alt:#0f1830}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Kanit',sans-serif;min-height:100dvh;overflow-x:hidden;background:var(--bg);color:var(--text);transition:background .25s,color .25s;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input,select,textarea{font-family:inherit;font-size:16px}

/* Header */
header{background:var(--navy);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;border-bottom:3px solid var(--gold);padding-top:max(12px,env(safe-area-inset-top))}
.ab-logo{width:38px;height:38px;background:linear-gradient(135deg,#2f6df0,#5b8cf5);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;flex-shrink:0}
.hd-main{flex:1;min-width:0}
.hd-title{font-size:17px;font-weight:700;line-height:1.2}
.hd-ver{font-size:11px;opacity:.7;font-weight:500;margin-left:4px}
.hd-sub{font-size:11px;opacity:.72;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hd-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.icon-btn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s}
.icon-btn:hover{background:rgba(255,255,255,.22)}
.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:background .3s,box-shadow .3s}
.status-dot.ok{background:#2ecc71;box-shadow:0 0 6px #2ecc71}
.status-dot.syncing{background:#f39c12;animation:dotPulse 1s ease-in-out infinite}
.status-dot.error{background:#e74c3c;box-shadow:0 0 6px #e74c3c}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.25}}

.content{padding:12px;max-width:900px;margin:0 auto;width:100%}
@media(min-width:640px){.content{padding:16px}}

/* Tab nav */
.tab-nav{display:flex;gap:6px;margin-bottom:10px}
.tab-btn{flex:1;background:rgba(13,27,62,.06);border:none;color:var(--navy);padding:13px 8px;font-family:inherit;font-size:14px;font-weight:700;border-radius:16px;cursor:pointer;transition:all .15s;min-height:48px}
.tab-btn:hover{background:rgba(13,27,62,.1)}
.tab-btn.active{background:var(--gold);color:#fff;box-shadow:var(--shadow-gold)}
body.dark .tab-btn{background:rgba(255,255,255,.06);color:var(--gold-light)}
body.dark .tab-btn.active{background:var(--gold);color:var(--navy)}

/* Cards */
.card{background:var(--card-bg);border-radius:var(--radius-md);border:1px solid var(--border);box-shadow:var(--shadow-md);margin-bottom:12px}
.card-gold{border-top:3px solid var(--gold)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--border);background:linear-gradient(to right,rgba(201,168,76,.07),transparent)}
.card-head h3{font-size:14px;font-weight:700}
.card-body{padding:14px 15px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid transparent;min-height:40px;transition:opacity .15s,transform .1s}
.btn:hover{opacity:.88}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-gold{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.btn-gold:hover{background:var(--gold-light)}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px;min-height:30px}
.btn-lg{padding:13px 20px;font-size:15px;min-height:52px;border-radius:var(--radius-md)}
.btn-block{width:100%;justify-content:center}
.btn:disabled{opacity:.45;cursor:not-allowed}

.input{height:44px;padding:0 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card-bg);color:var(--text);font-size:16px;outline:none;width:100%;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.input:focus{border-color:var(--gold)}
.input-sm{height:36px;font-size:14px}

.pill{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.pok{background:#e8f7ee;color:#1e8449}
.pbad{background:#ffd5d0;color:#c0392b}
.pwarn{background:#fef3d7;color:#a87800}
body.dark .pok{background:#1a3a25;color:#7be0a3}
body.dark .pbad{background:#3a1a17;color:#ff8a7e}
body.dark .pwarn{background:#3a2e15;color:#e8c86a}

#toast{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));right:16px;padding:12px 18px;border-radius:var(--radius-md);color:#fff;z-index:9999;font-weight:500;box-shadow:var(--shadow-lg);max-width:90vw;font-size:13px;animation:slideIn .3s ease;display:none}
#toast.show{display:block}
.ts{background:var(--success)}.te{background:var(--danger)}.tw{background:var(--warning);color:var(--navy)}.ti{background:var(--navy-mid);border-left:3px solid var(--gold)}
#spin{display:none;position:fixed;inset:0;background:rgba(13,27,62,.55);align-items:center;justify-content:center;z-index:99999;backdrop-filter:blur(3px)}
#spin.show{display:flex}
.sbox{background:var(--card-bg);border-radius:var(--radius-lg);padding:30px 36px;text-align:center;border-top:4px solid var(--gold);min-width:220px}
.sring{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
.smsg{font-size:13px;color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

#loginScreen{display:none;position:fixed;inset:0;background:linear-gradient(150deg,var(--navy),var(--navy-mid));align-items:center;justify-content:center;padding:20px;z-index:200}
#loginScreen.show{display:flex}
.lbox{background:var(--card-bg);border-radius:20px;border-top:4px solid var(--gold);padding:32px 24px;max-width:360px;width:100%;text-align:center;box-shadow:var(--shadow-lg)}
.llogo{width:58px;height:58px;border-radius:50%;margin:0 auto 14px;object-fit:contain}
.ltitle{font-size:21px;font-weight:700}.ltitle span{color:var(--gold)}
.lsub{font-size:13px;color:var(--muted);margin:6px 0 20px}
.lerr{display:none;background:#ffd5d0;color:#c0392b;font-size:12px;padding:9px 12px;border-radius:9px;margin-bottom:14px;font-weight:600}
.lerr.show{display:block}

#appScreen{display:none}
#appScreen.show{display:block}

/* Barcode dock — fixed bottom on mobile, sticky top on desktop */
.bc-dock{position:fixed;bottom:0;left:0;right:0;display:flex;gap:10px;padding:10px 14px;background:var(--card-bg);border-top:1px solid var(--border);box-shadow:0 -4px 16px rgba(11,31,74,.12);padding-bottom:max(10px,env(safe-area-inset-bottom));z-index:80;align-items:center}
.bc-dock .input{flex:1;height:50px;font-size:16px;border-radius:12px}
.cam-btn{width:50px;height:50px;border-radius:12px;background:var(--gold);color:var(--navy);border:none;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow-gold)}
.cam-btn:active{transform:scale(.95)}
#modeCount{padding-bottom:calc(90px + env(safe-area-inset-bottom))}
@media(min-width:768px){
  .bc-dock{position:sticky;top:calc(60px + env(safe-area-inset-top));bottom:auto;left:auto;right:auto;border:1px solid var(--border);border-top:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-md);padding:12px;margin-bottom:10px;padding-bottom:12px}
  #modeCount{padding-bottom:0}
}
.wh-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);padding:8px 10px}
.wh-bar label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.wh-bar .input{flex:1;height:38px;font-size:14px}

/* Pending card — match old app */
.pb-card{background:var(--card-bg);border:2px solid var(--navy-mid);border-radius:16px;box-shadow:0 10px 26px rgba(29,59,110,.2);padding:14px;margin-bottom:12px;animation:slideUp .2s ease}
.pb-flag{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:800;color:var(--navy-mid);margin-bottom:10px}
.pb-top{display:flex;align-items:center;gap:11px}
.pb-thumb{width:48px;height:48px;border-radius:10px;background:rgba(13,27,62,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.pb-thumb img{width:100%;height:100%;object-fit:cover}
.pb-info{flex:1;min-width:0}
.pb-name{font-size:15px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb-sub{font-size:12px;color:var(--muted);margin-top:2px;font-family:ui-monospace,monospace}
.pb-x{background:rgba(13,27,62,.06);border:none;color:var(--muted);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;flex-shrink:0}
.pb-unit-row{display:flex;align-items:center;gap:10px;margin-top:14px;padding:10px 12px;background:var(--bg);border-radius:14px;border:1.5px dashed var(--border)}
.pb-unit-l{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.pb-unit-pill{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:14px;color:#fff;flex-shrink:0;box-shadow:0 4px 10px rgba(29,59,110,.18)}
.pb-unit-code{font-size:22px;font-weight:900;letter-spacing:.5px;line-height:1}
.pb-unit-eq{margin-left:auto;font-size:12.5px;color:var(--muted);font-weight:600;white-space:nowrap;text-align:right}
.pb-unit-eq b{color:var(--navy-mid);font-size:15px;font-weight:800;margin:0 2px}
body.dark .pb-unit-eq b{color:var(--gold-light)}
.pb-unit-CS{background:linear-gradient(135deg,#2f6df0,#5b8cf5)}
.pb-unit-BP{background:linear-gradient(135deg,#a87800,#cf8400)}
.pb-unit-PA{background:linear-gradient(135deg,#1f9d57,#3bb277)}
.pb-unit-EA{background:linear-gradient(135deg,#1d3b6e,#274a86)}
.pb-row{display:flex;align-items:center;gap:10px;margin-top:12px}
.pb-qty{flex:1;min-width:0;height:58px;border:1.5px solid var(--navy-mid);border-radius:14px;text-align:center;font-size:30px;font-weight:800;color:var(--text);font-family:inherit;outline:none;background:var(--card-bg);-moz-appearance:textfield;-webkit-appearance:none;appearance:none}
.pb-qty:focus{box-shadow:0 0 0 3px rgba(29,59,110,.14)}
.pb-qty::-webkit-outer-spin-button,.pb-qty::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.step-btn{width:56px;height:58px;border-radius:14px;background:rgba(29,59,110,.1);color:var(--navy-mid);display:flex;align-items:center;justify-content:center;border:none;font-size:28px;font-weight:700;cursor:pointer;flex-shrink:0}
.step-btn:active{background:rgba(29,59,110,.2)}
body.dark .step-btn{background:rgba(122,171,255,.15);color:var(--gold-light)}
.pb-add{margin-top:14px;min-height:52px;font-size:16px;font-weight:800}

/* Count rows */
.livebar{display:block}
.dsk-n{background:var(--navy);color:#fff;font-size:12px;font-weight:800;padding:1px 9px;border-radius:10px;margin-left:4px}
.crow{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--border);border-radius:12px;margin-bottom:6px;background:var(--card-bg);box-shadow:var(--shadow-sm);cursor:pointer;transition:border-color .15s}
.crow:hover{border-color:var(--navy-mid)}
.crow.open{border-color:var(--gold);border-radius:12px 12px 0 0;margin-bottom:0}
.cthumb{width:44px;height:44px;border-radius:10px;background:rgba(13,27,62,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.cthumb img{width:100%;height:100%;object-fit:cover;display:none}
.cthumb img.ld{display:block}
.cinfo{flex:1;min-width:0}
.cname{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cqty{font-size:12px;color:var(--muted);margin-top:2px}
.cright{display:flex;align-items:center;gap:5px;flex-shrink:0}
.cdel{background:none;border:none;color:var(--danger);font-size:17px;cursor:pointer;padding:4px}
.cchev{font-size:16px;color:var(--muted);transition:transform .18s}
.crow.open .cchev{transform:rotate(90deg)}
.lp{border:1px solid var(--gold);border-top:none;border-radius:0 0 12px 12px;background:var(--row-alt);padding:12px 13px;margin-bottom:6px}
.lp-hd{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px}
.li{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px}
.li-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.lbadge{font-size:11px;font-weight:800;color:var(--navy);background:rgba(201,168,76,.18);padding:2px 8px;border-radius:7px;border:1px solid rgba(201,168,76,.4)}
body.dark .lbadge{color:var(--gold-light)}
.ldel{background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:0 4px}
.urow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.urow:last-of-type{border-bottom:none}
.ulbl{font-size:12px;font-weight:700;width:34px;flex-shrink:0}
.ustepper{display:flex;align-items:center;gap:5px}
.sbtn{width:32px;height:32px;border-radius:8px;background:rgba(13,27,62,.06);border:1px solid var(--border);font-size:18px;font-weight:700;color:var(--text)}
.sin{width:46px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:#fff;text-align:center;font-size:15px;font-weight:700;color:var(--text);outline:none;-moz-appearance:textfield;-webkit-appearance:none}
.sin:focus{border-color:var(--gold)}
.sin::-webkit-outer-spin-button,.sin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
body.dark .sin{background:var(--card-bg)}
.exp-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.exp-lbl{font-size:11px;color:var(--muted);white-space:nowrap}

/* Camera overlay (UNCHANGED) */
#camOv{display:none;position:fixed;inset:0;background:#000;z-index:500;flex-direction:column}
#camOv.show{display:flex}
#camV{width:100%;flex:1;object-fit:cover;display:block}
#camFrame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:65vw;height:65vw;max-width:280px;max-height:280px;border:2px solid var(--gold);border-radius:14px;box-shadow:0 0 0 100vmax rgba(0,0,0,.52);pointer-events:none}
.cam-hdr{background:rgba(0,0,0,.7);color:#fff;padding:12px 14px;padding-top:max(12px,env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;z-index:2}
.cam-title{flex:1;font-size:15px;font-weight:700}
.cam-x{background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center}
.cam-ft{background:rgba(0,0,0,.7);color:#fff;padding:12px 14px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:2}
.cam-hint{font-size:12px;color:rgba(255,255,255,.65)}
.torch-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;display:none}

/* Summary */
.stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stile{border-radius:12px;padding:14px 8px;text-align:center;border:1.5px solid;border-top-width:3px}
.stile .sv{font-size:26px;font-weight:800;line-height:1}
.stile .sl{font-size:12px;font-weight:600;margin-top:4px}
.sok{background:#e8f7ee;border-color:#bfe8cf;color:#1e8449}
.sbad{background:#ffd5d0;border-color:#f5cdc7;color:#c0392b}
.swarn{background:#fef3d7;border-color:#ecd9a8;color:#a87800}
.srow{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card-bg);border:1px solid var(--border);border-left:3px solid;border-radius:11px;margin-bottom:6px}
.srok{border-left-color:var(--success)}.srbad{border-left-color:var(--danger)}.srwarn{border-left-color:var(--warning)}
.srm{flex:1;min-width:0}
.srn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srs{font-size:12px;color:var(--muted);margin-top:2px}
.srs b{color:var(--text)}

/* History */
.hchip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card-bg);color:var(--navy);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
body.dark .hchip{color:var(--gold-light)}
.hchip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.hrow{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.hrow:hover{background:var(--row-alt)}
.hrow:last-child{border-bottom:none}
.hrd{font-weight:700;font-size:14px}
.hrm{font-size:12px;color:var(--muted);margin-top:2px}

/* Modal */
.mov{display:none;position:fixed;inset:0;background:rgba(13,27,62,.65);z-index:9000;align-items:flex-start;justify-content:center;padding:12px;backdrop-filter:blur(3px);overflow-y:auto}
.mov.open{display:flex}
.mo{background:var(--card-bg);border-radius:18px;max-width:680px;width:100%;margin:auto;border-top:4px solid var(--gold);animation:slideUp .22s ease}
.mo-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card-bg);border-radius:18px 18px 0 0;z-index:2}
.mo-hd h3{font-size:15px;font-weight:700}
.mo-x{background:none;border:none;font-size:24px;color:var(--muted);cursor:pointer}
.mo-body{padding:14px 16px}
.mo-ft{padding:11px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card-bg)}
.drow{background:var(--card-bg);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;margin-bottom:6px}
.drow.open{border-color:var(--gold)}
.drm{display:flex;align-items:center;gap:10px;padding:11px 13px}
.dri{flex:1;min-width:0}
.drn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drs{font-size:11px;color:var(--muted);margin-top:1px}
.dright{display:flex;align-items:center;gap:5px;flex-shrink:0}
.drch{font-size:15px;color:var(--muted);transition:transform .18s}

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>
const SHEET_ID = '16mYDqAqqJma-_0vCIAajy6bcjdOZ7F6VagxkdkqAB2I';
const CACHE_KEY = 'rattana_stock_v4';
const CACHE_TTL = 60000;
const AUTH_CFG = { sheetId:'1M6HdISsLN684qRWyQ73CA4AmUzmYtZaOlffDJXZZIXQ', sheetName:'Rattana Users for apps' };
const SAVE_URL = 'https://script.google.com/macros/s/AKfycbw39tCzfOxpg9XayXPlWL1QCw2rjd32FbpofggeErJh-hcjMFa64yEl4cV3UtRoaEVj/exec';
const APP_VER = 'v1.1';
const ALL_ROLE = 4;
const WH_LIST = ['W1','W2','W3','W4','C4'];
const WH_NAMES = {W1:'สมุทรสงคราม',W2:'สุพรรณบุรี',W3:'ราชบุรี',W4:'นครปฐม',C4:'รัตนมาร์ท'};
const UNITS = ['EA','PA','BP','CS'];
const NEEDED = 'A,B,C,D,E,F,G,H,I,J,K,L,M,N,O,P,Q,BC,BD,BE,BM,BN,BO,BP,BQ,BR,CP,CQ,CR,CS,CT,CU';

let cUser=null,visWh=[],allUsers=[],cPick=null;
let allProds=[],bcIdx={},prodByKey={};
let session=null;
let histData=[],histWh='all',histLoaded=false;
let curPage='count';
let zxing=null,camStream=null,torchOn=false,lastCode='',lastCodeTime=0;
let draftTimer=null,dataTimer=null,syncDebounce=null;
const recentSaved={};

const $=id=>document.getElementById(id);
function toast(msg,type='i',dur=2500){const t=$('toast');t.textContent=msg;t.className='show t'+type;clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);}
function showSpin(m='กำลังโหลด...'){$('spinMsg').textContent=m;$('spin').classList.add('show');}
function hideSpin(){$('spin').classList.remove('show');}
function dot(s){const d=$('sdot');d.className='status-dot '+s;}
function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('rdk',document.body.classList.contains('dark')?'1':'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(ms){const d=new Date(ms||0);return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;}
function fmtTime(ms){const d=new Date(ms||0);return `${String(d.getHours()).padStart(2,'0')}.${String(d.getMinutes()).padStart(2,'0')}`;}

function parseCsv(text){
  if(!text)return [];if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const rows=[];let row=[],cell='',inQ=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(inQ){if(ch==='"'){if(text[i+1]==='"'){cell+='"';i++;}else inQ=false;}else cell+=ch;}
    else{if(ch==='"')inQ=true;else if(ch===','){row.push(cell);cell='';}else if(ch==='\r'){}else if(ch==='\n'){row.push(cell);rows.push(row);row=[];cell='';}else cell+=ch;}
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  if(!rows.length)return [];
  const clean=s=>String(s||'').replace(/[​‌‍﻿]/g,'').replace(/ /g,' ').trim();
  const hdr=rows[0].map(clean);
  return rows.slice(1).filter(r=>r.some(c=>clean(c))).map(r=>Object.fromEntries(hdr.map((k,i)=>[k,clean(r[i]||'')])));
}

function parseStock(val){
  const s=String(val||'0').replace(/,/g,'').replace(/[^\d.]/g,'').trim();
  if(!s||s==='.')return {cs:0,ea:0};
  const dot=s.indexOf('.');
  if(dot===-1)return {cs:parseInt(s)||0,ea:0};
  return {cs:parseInt(s.slice(0,dot))||0,ea:parseInt(s.slice(dot+1))||0};
}
function piecesToCSEA(pieces,fcs){
  if(!fcs||fcs<=0)return `${pieces} EA`;
  const cs=Math.trunc(pieces/fcs);const ea=Math.abs(pieces%fcs);
  if(cs===0)return `${ea} EA`;
  if(ea===0)return `${cs} CS`;
  return `${cs} CS ${ea} EA`;
}

const getCache=()=>{try{const c=JSON.parse(localStorage.getItem(CACHE_KEY));return c&&Date.now()-c.ts<CACHE_TTL?c.d:null;}catch{return null;}};
const setCache=d=>{try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),d}));}catch{}};

async function fetchSheet(){
  const tq=encodeURIComponent(`select ${NEEDED}`);
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&tq=${tq}`;
  const r=await fetch(url,{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);
  return parseCsv(await r.text());
}
function buildIdx(data){
  allProds=data;bcIdx={};prodByKey={};
  data.forEach(p=>{
    UNITS.forEach(u=>{const c=String(p[`CODE ${u}`]||'').trim();if(c&&c!=='0'&&c!=='-'&&c.length>3){if(!bcIdx[c])bcIdx[c]={product:p,unit:u};}});
    prodByKey[prodKey(p)]=p;
  });
}
function prodKey(p){for(const u of ['CS','BP','PA','EA']){const c=String(p[`CODE ${u}`]||'').trim();if(c&&c.length>3&&c!=='0'&&c!=='-')return c;}return p['PRODUCT NAME']||'?';}
function unitFactor(p,u){if(u==='EA')return 1;const q=parseFloat(p[`QTY ${u}`]);return(!isNaN(q)&&q>0)?q:1;}
function stockPieces(p,wh){const s=parseStock(p[`STOCK ${wh}`]);return s.cs*unitFactor(p,'CS')+s.ea;}

async function loadData(force=false){
  if(!force){const c=getCache();if(c){buildIdx(c);dot('ok');updateSub();fetchAndUpdate();return;}}
  dot('syncing');
  try{const d=await fetchSheet();if(d&&d.length){setCache(d);buildIdx(d);dot('ok');updateSub();}else dot('error');}
  catch{dot('error');toast('โหลดข้อมูลไม่ได้','e');}
}
async function fetchAndUpdate(){
  dot('syncing');
  try{const d=await fetchSheet();if(d&&d.length){setCache(d);buildIdx(d);dot('ok');updateSub();}else dot('error');}catch{dot('error');}
}
async function refreshData(){
  const b=$('bRefresh');b.style.transition='transform .6s';b.style.transform='rotate(360deg)';
  localStorage.removeItem(CACHE_KEY);await fetchAndUpdate();
  setTimeout(()=>{b.style.transform='';b.style.transition='';},650);
  toast('อัปเดตแล้ว ✓','s');
}
function updateSub(){
  const who=(cPick&&(cPick.nick||cPick.name))||cUser?.nick||cUser?.name||'';
  $('hdSub').textContent=`${who} · ${fmtTime(Date.now())} น.`;
}
function startPoll(){
  stopPoll();
  draftTimer=setInterval(()=>{if(!document.hidden&&navigator.onLine!==false)pullDraft();},5000);
  dataTimer=setInterval(()=>{if(!document.hidden&&navigator.onLine!==false)fetchAndUpdate();},60000);
  document.addEventListener('visibilitychange',onVis);
  window.addEventListener('online',fetchAndUpdate);
}
function stopPoll(){clearInterval(draftTimer);clearInterval(dataTimer);document.removeEventListener('visibilitychange',onVis);window.removeEventListener('online',fetchAndUpdate);}
function onVis(){if(!document.hidden){pullDraft();fetchAndUpdate();}}

function decodeJwt(t){let b=t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');const p=(4-b.length%4)%4;if(p)b+='='.repeat(p);return JSON.parse(new TextDecoder().decode(new Uint8Array(Array.from(atob(b)).map(c=>c.charCodeAt(0)))));}
const normEmail=s=>String(s||'').replace(/[​‌‍﻿]/g,'').replace(/\s+/g,'').toLowerCase();

async function handleGoogleLogin(resp){
  showSpin('ตรวจสอบสิทธิ์...');
  try{
    const email=normEmail(decodeJwt(resp.credential).email);
    const users=await fetchUsers();
    const rows=users.filter(u=>normEmail(u['E-mail'])===email);
    if(!rows.length){showLoginErr(`ไม่พบอีเมล: ${email}`);return;}
    if(String(rows[0]['Status']||'').trim().toLowerCase()!=='active'){showLoginErr('บัญชีถูกระงับ');return;}
    const u=rows[0];
    cUser={email,name:String(u['ชื่อ - สกุล']||'').trim(),nick:String(u['ชื่อเล่น']||'').trim(),
      hasName:!!(String(u['ชื่อ - สกุล']||'').trim()||String(u['ชื่อเล่น']||'').trim()),
      role:parseInt(u['User Role'])||1,wh:String(u['W']||'').trim().toUpperCase(),empId:String(u['รหัสพนักงาน']||'')};
    allUsers=users;
    try{cPick=JSON.parse(localStorage.getItem('rCPick_'+email)||'null');}catch{cPick=null;}
    localStorage.setItem('rUser',JSON.stringify({d:cUser,exp:Date.now()+30*86400000}));
    enterApp();
  }catch(e){console.error(e);showLoginErr('เกิดข้อผิดพลาด');}finally{hideSpin();}
}
async function fetchUsers(){
  const url=`https://docs.google.com/spreadsheets/d/${AUTH_CFG.sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(AUTH_CFG.sheetName)}`;
  const r=await fetch(url);if(!r.ok)throw new Error('users fetch failed');
  allUsers=parseCsv(await r.text());return allUsers;
}
function showLoginErr(m){const e=$('loginErr');e.textContent=m;e.classList.add('show');}
function checkSession(){
  try{const raw=localStorage.getItem('rUser');if(!raw){showLogin();return;}
    const {d,exp}=JSON.parse(raw);if(Date.now()>exp){localStorage.removeItem('rUser');showLogin();return;}
    cUser=d;try{cPick=JSON.parse(localStorage.getItem('rCPick_'+(cUser.email||''))||'null');}catch{cPick=null;}
    enterApp();
  }catch{showLogin();}
}
function showLogin(){$('loginScreen').classList.add('show');}
function enterApp(){
  visWh=cUser.role>=ALL_ROLE?[...WH_LIST]:(WH_LIST.includes(cUser.wh)?[cUser.wh]:[]);
  $('loginScreen').classList.remove('show');$('appScreen').classList.add('show');
  if(localStorage.getItem('rdk')==='1')document.body.classList.add('dark');
  initWhPicker();setupCounterBar();
  loadData().then(()=>{loadSession(selWh());renderList();startPoll();});
  setPage('count');
}
function initWhPicker(){
  const sel=$('cWh');sel.innerHTML=visWh.map(w=>`<option value="${w}">${w} — ${WH_NAMES[w]}</option>`).join('');
  if(cUser.wh&&visWh.includes(cUser.wh))sel.value=cUser.wh;
}
function selWh(){return $('cWh')?.value||visWh[0]||'W1';}
function doLogout(){if(!confirm('ออกจากระบบ?'))return;localStorage.removeItem('rUser');location.reload();}

async function setupCounterBar(){
  if(cUser.hasName){$('cBar').style.display='none';return;}
  if(!allUsers.length)try{await fetchUsers();}catch{}
  const opts=buildCounterOpts();
  $('cOpts').innerHTML=opts.map(o=>`<option value="${esc(o.name)}"></option>`).join('');
  window._cMap=Object.fromEntries(opts.map(o=>[o.name,o]));
  $('cSel').value=cPick?.name||'';
  $('cBar').style.display=opts.length?'flex':'none';
  if(!cPick&&opts.length)toast('กรุณาเลือกชื่อผู้นับ','w');
}
function buildCounterOpts(){
  const seen=new Map();
  allUsers.forEach(u=>{const w=String(u['W']||'').trim().toUpperCase();if(!visWh.includes(w))return;
    const name=String(u['ชื่อ - สกุล']||'').trim();if(!name)return;
    const empId=String(u['รหัสพนักงาน']||'').trim();const nick=String(u['ชื่อเล่น']||'').trim();
    const k=name+'|'+empId;if(!seen.has(k))seen.set(k,{name,empId,nick,w});});
  return [...seen.values()].sort((a,b)=>a.name.localeCompare(b.name,'th'));
}
function onCounterChange(){
  const v=String($('cSel').value||'').trim();if(!v)return;
  const m=window._cMap||{};if(!(v in m))return;
  const o=m[v];if(cPick?.name===v)return;
  cPick={name:o.name,empId:o.empId,nick:o.nick};
  try{localStorage.setItem('rCPick_'+(cUser.email||''),JSON.stringify(cPick));}catch{}
  loadSession(selWh());renderList();toast(`ผู้นับ: ${o.nick||o.name}`,'s');
}
function clearCounter(){cPick=null;try{localStorage.removeItem('rCPick_'+(cUser.email||''));}catch{}$('cSel').value='';toast('ล้างแล้ว','i');}
function counterTag(){const t=(cPick&&(cPick.empId||cPick.name))||cUser?.empId||cUser?.email||'';return String(t).toLowerCase().replace(/[^a-z0-9ก-๙_]+/gi,'_');}

const storeKey=wh=>`rSession_${wh}_${counterTag()}`;
function loadSession(wh){
  try{const r=JSON.parse(localStorage.getItem(storeKey(wh)));session=(r&&r.wh===wh)?r:null;}catch{session=null;}
  if(!session)session={wh,startedAt:Date.now(),items:{},lastEdit:0};
}
function saveSession(){
  if(!session)return;
  session.lastEdit=Date.now();
  try{localStorage.setItem(storeKey(session.wh),JSON.stringify(session));}catch{}
  clearTimeout(syncDebounce);syncDebounce=setTimeout(pushDraft,400);
}
async function pushDraft(){
  if(!SAVE_URL||!cUser||!session)return;
  try{await fetch(SAVE_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'saveDraft',userKey:counterTag(),email:cUser.email,empId:cPick?.empId||cUser.empId||'',warehouse:session.wh,sessionStart:session.startedAt,items:session.items})});
    session.syncedAt=Date.now();try{localStorage.setItem(storeKey(session.wh),JSON.stringify(session));}catch{}
  }catch{}
}
async function pullDraft(){
  if(!SAVE_URL||!cUser||!session||curPage!=='count')return;
  const wh=session.wh;if(recentSaved[wh]&&Date.now()-recentSaved[wh]<30000)return;
  try{
    const r=await fetch(`${SAVE_URL}?action=draft&userKey=${encodeURIComponent(counterTag())}&warehouse=${encodeURIComponent(wh)}`,{cache:'no-store'});
    const j=await r.json();if(!j.ok||!j.draft?.items)return;
    const remote=j.draft;const remoteEdit=new Date(remote.updatedAt||0).getTime();
    if(remoteEdit>(session.lastEdit||0)){
      session={wh,startedAt:remote.sessionStart||session.startedAt,items:remote.items,lastEdit:remoteEdit,syncedAt:remoteEdit};
      try{localStorage.setItem(storeKey(wh),JSON.stringify(session));}catch{}renderList();
    }
  }catch{}
}
async function forcePull(){
  const wh=selWh();showSpin('กำลังดึงรายการ...');
  try{delete recentSaved[wh];
    const r=await fetch(`${SAVE_URL}?action=draft&userKey=${encodeURIComponent(counterTag())}&warehouse=${encodeURIComponent(wh)}`,{cache:'no-store'});
    const j=await r.json();
    if(!j.ok||!j.draft?.items||!Object.keys(j.draft.items).length){toast('ไม่มีรายการค้างไว้','i');return;}
    if(Object.keys(session?.items||{}).length&&!confirm(`พบ ${Object.keys(j.draft.items).length} รายการ — แทนที่?`))return;
    session={wh,startedAt:j.draft.sessionStart||Date.now(),items:j.draft.items,lastEdit:new Date(j.draft.updatedAt||0).getTime()};
    try{localStorage.setItem(storeKey(wh),JSON.stringify(session));}catch{}
    renderList();toast(`โหลด ${Object.keys(session.items).length} รายการ ✓`,'s');
  }catch{toast('โหลดไม่สำเร็จ','e');}finally{hideSpin();}
}
function onWhChange(){const wh=selWh();$('pending').innerHTML='';loadSession(wh);renderList();pullDraft();}

function doManualScan(){const inp=$('manualInput');const code=(inp.value||'').trim();if(!code)return;inp.value='';processCode(code);}
function processCode(code){const hit=bcIdx[code];if(!hit){toast(`ไม่พบ: ${code}`,'e',3000);return;}if(navigator.vibrate)navigator.vibrate(80);showPending(hit.product,hit.unit,code);}

function showPending(prod,unit,code){
  const factor=unitFactor(prod,unit);
  const name=prod['PRODUCT NAME']||'-';
  const img=prod['IMAGE DRIVE ID']||prod['IMG']||'';
  $('pending').innerHTML=`
    <div class="pb-card">
      <div class="pb-flag">▸ สแกนแล้ว · ใส่จำนวนที่นับได้</div>
      <div class="pb-top">
        <div class="pb-thumb">${img?`<img src="https://drive.google.com/thumbnail?id=${img}&sz=w96" alt="">`:'📦'}</div>
        <div class="pb-info">
          <div class="pb-name">${esc(name)}</div>
          <div class="pb-sub">${esc(code)}</div>
        </div>
        <button class="pb-x" onclick="cancelPending()" title="ยกเลิก">✕</button>
      </div>
      <div class="pb-unit-row">
        <div class="pb-unit-l">หน่วยที่ยิง</div>
        <div class="pb-unit-pill pb-unit-${unit}"><span class="pb-unit-code">${unit}</span></div>
        <div class="pb-unit-eq">1 ${unit} = <b>${factor}</b> ชิ้น</div>
      </div>
      <div class="pb-row">
        <button class="step-btn" onclick="adjQty(-1)" type="button">−</button>
        <input id="qIn" class="pb-qty" type="text" inputmode="numeric" value="1" onfocus="this.select()">
        <button class="step-btn" onclick="adjQty(1)" type="button">+</button>
      </div>
      <button class="btn btn-primary btn-block pb-add" onclick="confirmAdd()" type="button">✓ เพิ่มเข้ารายการ</button>
    </div>`;
  const q=$('qIn'); if(q){q.addEventListener('keydown',e=>{if(e.key==='Enter')confirmAdd();});q.focus();q.select();}
  window._pending={prod,unit,code};
}
function adjQty(d){const i=$('qIn');if(i)i.value=Math.max(0,(parseInt(i.value)||0)+d);}
function cancelPending(){$('pending').innerHTML='';window._pending=null;}
function confirmAdd(){
  const {prod,unit}=window._pending||{};if(!prod)return;
  const qty=parseInt($('qIn')?.value)||0;if(qty===0){toast('กรุณาใส่จำนวน','w');return;}
  const key=prodKey(prod);
  if(!session.items[key]){
    session.items[key]={name:prod['PRODUCT NAME']||'-',imgId:prod['IMAGE DRIVE ID']||prod['IMG']||'',
      factors:Object.fromEntries(UNITS.map(u=>[u,unitFactor(prod,u)])),counts:{EA:0,PA:0,BP:0,CS:0},lots:[],savedAt:Date.now()};
  }
  session.items[key].counts[unit]=(session.items[key].counts[unit]||0)+qty;
  session.items[key].savedAt=Date.now();
  cancelPending();saveSession();renderList();
  toast(`เพิ่ม ${prod['PRODUCT NAME']} ${qty} ${unit} ✓`,'s');
}

function renderList(){
  const entries=session?Object.entries(session.items):[];
  $('cN').textContent=entries.length;
  if(!entries.length){$('cListWrap').style.display='none';$('cEmpty').style.display='block';return;}
  $('cListWrap').style.display='block';$('cEmpty').style.display='none';
  $('cList').innerHTML=entries.map(([k,it])=>rowHtml(k,it)).join('');
}
function rowHtml(k,it){
  const bd=Object.entries(it.counts).filter(([,n])=>n>0).map(([u,n])=>`${n} ${u}`).join(' · ');
  const lots=it.lots?.length?`<span style="font-size:10px;background:rgba(201,168,76,.18);color:var(--navy);padding:1px 6px;border-radius:6px;margin-left:4px">${it.lots.length} LOT</span>`:'';
  const img=it.imgId?`<img src="https://drive.google.com/thumbnail?id=${it.imgId}&sz=w80" onload="this.classList.add('ld')" alt="">`:'';
  return `<div class="crow" id="cr-${k}" onclick="toggleRow('${k}')">
      <div class="cthumb">${img||'📦'}</div>
      <div class="cinfo"><div class="cname">${esc(it.name)}</div><div class="cqty">${bd||'ยังไม่ระบุ'}${lots}</div></div>
      <div class="cright"><button class="cdel" onclick="event.stopPropagation();rmItem('${k}')" title="ลบ">✕</button><span class="cchev">›</span></div>
    </div>
    <div class="lp" id="lp-${k}" style="display:none">${lotPanelHtml(k,it)}</div>`;
}
function lotPanelHtml(k,it){
  const lots=it.lots||[];
  const lotsHtml=lots.length?lots.map((lot,i)=>`
    <div class="li">
      <div class="li-hd"><span class="lbadge">LOT ${i+1}</span><button class="ldel" onclick="rmLot('${k}',${i})">✕</button></div>
      ${UNITS.map(u=>`<div class="urow"><span class="ulbl">${u}</span><div class="ustepper"><button class="sbtn" onclick="adjLot('${k}',${i},'${u}',-1)">−</button><input class="sin" type="number" value="${lot.counts?.[u]||0}" min="0" inputmode="numeric" onchange="setLotVal('${k}',${i},'${u}',this.value)"><button class="sbtn" onclick="adjLot('${k}',${i},'${u}',1)">+</button></div></div>`).join('')}
      <div class="exp-row"><span class="exp-lbl">หมดอายุ</span><input type="date" class="input input-sm" style="flex:1" value="${lot.expiryDate||''}" onchange="setLotExp('${k}',${i},this.value)"></div>
    </div>`).join(''):'<div style="font-size:12px;color:var(--muted);padding:4px 0">ยังไม่มี lot</div>';
  const totHtml=`<div class="li" style="margin-bottom:8px">
    <div class="li-hd"><span class="lbadge">ยอดรวม</span></div>
    ${UNITS.map(u=>`<div class="urow"><span class="ulbl">${u}</span><div class="ustepper"><button class="sbtn" onclick="adjTotal('${k}','${u}',-1)">−</button><input class="sin" type="number" id="tot-${k}-${u}" value="${it.counts?.[u]||0}" min="0" inputmode="numeric" onchange="setTotal('${k}','${u}',this.value)"><button class="sbtn" onclick="adjTotal('${k}','${u}',1)">+</button></div></div>`).join('')}
  </div>`;
  return `<div class="lp-hd">จัดการยอดและ Lot</div>${totHtml}<div class="lp-hd" style="margin-top:8px">Lot (ตามวันหมดอายุ)</div>${lotsHtml}<button class="btn btn-outline btn-sm mt8" onclick="addLot('${k}')">+ เพิ่ม Lot</button>`;
}
function toggleRow(k){const row=$('cr-'+k),p=$('lp-'+k);if(!row||!p)return;const o=row.classList.contains('open');row.classList.toggle('open',!o);p.style.display=o?'none':'block';if(!o)p.innerHTML=lotPanelHtml(k,session.items[k]);}
function rmItem(k){if(!confirm('ลบสินค้านี้?'))return;delete session.items[k];saveSession();renderList();}
function addLot(k){if(!session.items[k].lots)session.items[k].lots=[];session.items[k].lots.push({counts:{EA:0,PA:0,BP:0,CS:0},expiryDate:''});saveSession();const p=$('lp-'+k);if(p)p.innerHTML=lotPanelHtml(k,session.items[k]);}
function rmLot(k,i){session.items[k].lots.splice(i,1);saveSession();const p=$('lp-'+k);if(p)p.innerHTML=lotPanelHtml(k,session.items[k]);}
function adjLot(k,i,u,d){const lot=session.items[k].lots[i];lot.counts=lot.counts||{};lot.counts[u]=Math.max(0,(lot.counts[u]||0)+d);saveSession();const p=$('lp-'+k);if(p)p.innerHTML=lotPanelHtml(k,session.items[k]);}
function setLotVal(k,i,u,v){if(!session?.items[k]?.lots[i])return;session.items[k].lots[i].counts=session.items[k].lots[i].counts||{};session.items[k].lots[i].counts[u]=Math.max(0,parseInt(v)||0);saveSession();}
function setLotExp(k,i,v){if(!session?.items[k]?.lots[i])return;session.items[k].lots[i].expiryDate=v;saveSession();}
function adjTotal(k,u,d){const inp=$(`tot-${k}-${u}`);const v=Math.max(0,(parseInt(inp?.value)||0)+d);if(inp)inp.value=v;setTotal(k,u,v);}
function setTotal(k,u,v){if(!session?.items[k])return;session.items[k].counts[u]=Math.max(0,parseInt(v)||0);saveSession();renderList();}
function clearAll(){if(!confirm('ล้างทั้งหมด?'))return;session={wh:session.wh,startedAt:Date.now(),items:{},lastEdit:0};try{localStorage.removeItem(storeKey(session.wh));}catch{}renderList();}

function zxHints(){if(!window.ZXingBrowser?.DecodeHintType)return undefined;const H=ZXingBrowser.DecodeHintType,F=ZXingBrowser.BarcodeFormat;const m=new Map();m.set(H.TRY_HARDER,true);if(H.ALSO_INVERTED)m.set(H.ALSO_INVERTED,true);if(H.POSSIBLE_FORMATS&&F)m.set(H.POSSIBLE_FORMATS,[F.EAN_13,F.EAN_8,F.UPC_A,F.UPC_E,F.CODE_128,F.CODE_39,F.ITF].filter(Boolean));return m;}
async function openCam(){
  $('camOv').classList.add('show');
  try{
    zxing=new ZXingBrowser.BrowserMultiFormatReader(zxHints(),{delayBetweenScanAttempts:80});
    const vid=$('camV');
    const cons={video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080},frameRate:{ideal:30}}};
    let controls;
    try{controls=await zxing.decodeFromConstraints(cons,vid,(r)=>r&&onCode(r.getText()));}
    catch{controls=await zxing.decodeFromConstraints({video:{facingMode:{ideal:'environment'}}},vid,(r)=>r&&onCode(r.getText()));}
    camStream=vid.srcObject;
    const [trk]=camStream?.getVideoTracks()||[];
    if(trk?.getCapabilities?.()?.torch)$('torchBtn').style.display='';
    window._camCtrl=controls;
  }catch(e){toast('เปิดกล้องไม่ได้: '+(e.message||e),'e');closeCam();}
}
function onCode(code){const now=Date.now();if(code===lastCode&&now-lastCodeTime<1500)return;lastCode=code;lastCodeTime=now;if(navigator.vibrate)navigator.vibrate(80);closeCam();processCode(code);}
function closeCam(){
  $('camOv').classList.remove('show');
  if(window._camCtrl){try{window._camCtrl.stop();}catch{}window._camCtrl=null;}
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  torchOn=false;$('torchBtn').style.display='none';
}
async function toggleTorch(){const [trk]=camStream?.getVideoTracks()||[];if(!trk)return;torchOn=!torchOn;try{await trk.applyConstraints({advanced:[{torch:torchOn}]});}catch{torchOn=false;}$('torchBtn').textContent=torchOn?'🔦 ปิดไฟ':'🔦 เปิดไฟ';}

function setPage(page){
  curPage=page;
  ['count','summary','history'].forEach(p=>{
    const M=$('mode'+p[0].toUpperCase()+p.slice(1));if(M)M.style.display=(p===page?'block':'none');
    const T=$('tab'+p[0].toUpperCase()+p.slice(1));if(T)T.classList.toggle('active',p===page);
  });
  $('fab').classList.toggle('show',page==='count');
  if(page==='summary')renderSummary();
  if(page==='history')loadHistory(false);
}

function renderSummary(){
  const entries=session?Object.entries(session.items):[];
  const act=$('sumAct'),body=$('sumBody');
  if(!entries.length){body.innerHTML=`<div class="center muted" style="padding:32px 0;font-size:14px">ยังไม่มีรายการนับ<br><br><button class="btn btn-primary mt8" onclick="setPage('count')">← ไปนับสต็อก</button></div>`;act.style.display='none';return;}
  act.style.display='block';
  const wh=session.wh;let ok=0,bad=0,warn=0;const rows=[];
  entries.forEach(([k,it])=>{
    const prod=prodByKey[k];const fcs=it.factors?.CS||1;
    const counted=Object.entries(it.counts).reduce((s,[u,n])=>s+(n||0)*(it.factors?.[u]||1),0);
    const sysP=prod?stockPieces(prod,wh):0;const diff=counted-sysP;
    let cls='ok',plbl='✓ ตรง';
    if(diff<0){cls='bad';plbl='↓ ขาด';}else if(diff>0){cls='warn';plbl='↑ เกิน';}
    if(cls==='ok')ok++;else if(cls==='bad')bad++;else warn++;
    const cStr=piecesToCSEA(counted,fcs),sStr=piecesToCSEA(sysP,fcs);
    const dStr=diff===0?'<span style="color:var(--success);font-weight:700">✓ ตรง</span>':diff<0?`<span style="color:var(--danger);font-weight:700">↓ ${piecesToCSEA(Math.abs(diff),fcs)}</span>`:`<span style="color:var(--warning);font-weight:700">↑ ${piecesToCSEA(diff,fcs)}</span>`;
    rows.push({cls,html:`<div class="srow sr${cls}"><div class="srm"><div class="srn">${esc(it.name)}</div><div class="srs">นับ <b>${cStr}</b> · ระบบ <b>${sStr}</b> · ${dStr}</div></div><span class="pill p${cls}">${plbl}</span></div>`});
  });
  const sort=[...rows.filter(r=>r.cls==='bad'),...rows.filter(r=>r.cls==='warn'),...rows.filter(r=>r.cls==='ok')];
  body.innerHTML=`<div class="stat3"><div class="stile sok"><div class="sv">${ok}</div><div class="sl">✓ ตรง</div></div><div class="stile sbad"><div class="sv">${bad}</div><div class="sl">↓ ขาด</div></div><div class="stile swarn"><div class="sv">${warn}</div><div class="sl">↑ เกิน</div></div></div>${sort.map(r=>r.html).join('')}`;
}

async function saveToSheet(){
  if(!session||!Object.keys(session.items).length){toast('ไม่มีข้อมูล','w');return;}
  showSpin('กำลังบันทึก...');
  try{
    await fetch(SAVE_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'saveCount',userKey:counterTag(),empId:cPick?.empId||cUser.empId||'',name:cPick?.name||cUser.name||'',warehouse:session.wh,startedAt:session.startedAt,savedAt:Date.now(),items:session.items})});
    const hist=JSON.parse(localStorage.getItem('rHist')||'[]');
    hist.unshift({wh:session.wh,savedAt:Date.now(),startedAt:session.startedAt,empId:cPick?.empId||cUser.empId||'',name:cPick?.name||cUser.name||'',items:{...session.items}});
    localStorage.setItem('rHist',JSON.stringify(hist.slice(0,200)));
    recentSaved[session.wh]=Date.now();
    hideSpin();toast('บันทึกสำเร็จ ✓','s',3000);
    session={wh:session.wh,startedAt:Date.now(),items:{},lastEdit:0};
    try{localStorage.removeItem(storeKey(session.wh));}catch{}
    renderList();
  }catch(e){hideSpin();toast('บันทึกไม่สำเร็จ','e');}
}

async function loadHistory(force=false){
  if(histLoaded&&!force)return;
  $('hBody').innerHTML='<div class="center muted" style="padding:24px;font-size:13px">กำลังโหลด...</div>';
  dot('syncing');
  try{const r=await fetch(`${SAVE_URL}?action=getHistory&empId=${encodeURIComponent(cUser.empId||cUser.email||'')}`,{cache:'no-store'});const j=await r.json();histData=j.sessions||[];}
  catch{histData=JSON.parse(localStorage.getItem('rHist')||'[]');}
  histLoaded=true;dot('ok');renderHistChips();renderHist();
}
function renderHistChips(){const whs=['all',...new Set(histData.map(s=>s.wh||s.warehouse||''))];$('hChips').innerHTML=whs.map(w=>`<button class="hchip${histWh===w?' on':''}" onclick="setHistWh('${w}')">${w==='all'?'ทั้งหมด':w+' '+(WH_NAMES[w]||'')}</button>`).join('');}
function setHistWh(w){histWh=w;renderHistChips();renderHist();}
function renderHist(){
  const list=histWh==='all'?histData:histData.filter(s=>(s.wh||s.warehouse)===histWh);
  if(!list.length){$('hBody').innerHTML='<div class="center muted" style="padding:24px;font-size:13px">ไม่มีประวัติ</div>';return;}
  $('hBody').innerHTML=list.map(s=>`<div class="hrow" onclick="openHistDetail(${histData.indexOf(s)})">
    <div style="flex:1;min-width:0"><div class="hrd">${fmtDate(s.savedAt||s.startedAt)} · ${s.wh||s.warehouse||'-'}</div>
    <div class="hrm">${s.name||s.empId||'-'} · ${Object.keys(s.items||{}).length} สินค้า · ${fmtTime(s.savedAt||s.startedAt)} น.</div></div></div>`).join('');
}
function openHistDetail(i){
  const s=histData[i];if(!s)return;
  const wh=s.wh||s.warehouse||'';
  $('histMoTitle').textContent=`${fmtDate(s.savedAt||s.startedAt)} · ${wh} · ${s.name||s.empId||'-'}`;
  const items=Object.entries(s.items||{});
  if(!items.length){$('histMoBody').innerHTML='<div class="center muted" style="padding:24px">ไม่มีข้อมูล</div>';}
  else{
    $('histMoBody').innerHTML='<div style="display:flex;flex-direction:column;gap:6px">'+items.map(([k,it])=>{
      const prod=prodByKey[k];const fcs=it.factors?.CS||unitFactor(prod||{},'CS')||1;
      const counted=Object.entries(it.counts||{}).reduce((sum,[u,n])=>sum+(n||0)*((it.factors||{})[u]||1),0);
      const sysP=prod?stockPieces(prod,wh):0;const diff=counted-sysP;
      const cls=diff<0?'bad':diff>0?'warn':'ok';const lots=it.lots||[];
      return `<div class="drow" onclick="this.classList.toggle('open')">
        <div class="drm"><div class="dri"><div class="drn">${esc(it.name)}</div><div class="drs">นับ ${piecesToCSEA(counted,fcs)} · ระบบ ${piecesToCSEA(sysP,fcs)}</div></div>
        <div class="dright"><span class="pill p${cls}">${cls==='ok'?'✓ ตรง':cls==='bad'?'↓ ขาด':'↑ เกิน'}</span><span class="drch">›</span></div></div>
        <div class="dlots">${lots.length?lots.map((lot,li)=>`<div class="dlotrow"><div><span class="lbadge">LOT ${li+1}</span> <span style="font-size:11px;color:var(--muted)">${lot.expiryDate||'ไม่ระบุวันหมดอายุ'}</span></div><div style="font-size:11px;color:var(--muted);margin-top:3px">${UNITS.filter(u=>(lot.counts?.[u]||0)>0).map(u=>`${lot.counts[u]} ${u}`).join(' · ')||'ไม่มีข้อมูล'}</div></div>`).join(''):'<div class="dlotrow muted" style="font-size:12px">ไม่มีข้อมูล Lot</div>'}</div></div>`;
    }).join('')+'</div>';
  }
  $('histMov').classList.add('open');
}
function closeHist(){$('histMov').classList.remove('open');}

window.addEventListener('scroll',()=>{$('btt').classList.toggle('show',window.scrollY>300);});
document.addEventListener('DOMContentLoaded',()=>{
  checkSession();
  let buf='',bufTimer=null;
  document.addEventListener('keydown',e=>{
    if($('camOv').classList.contains('show'))return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA')return;
    if(e.key==='Enter'){if(buf.length>3){processCode(buf);buf='';clearTimeout(bufTimer);}return;}
    if(e.key.length===1){buf+=e.key;clearTimeout(bufTimer);bufTimer=setTimeout(()=>{buf='';},200);}
  });
});
</script>
</body>
</html>
