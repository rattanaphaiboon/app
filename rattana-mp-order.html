<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rattana จัดของ Pre-Order v0.8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --navy:#0d1b3e; --navy2:#13245a; --gold:#c9a84c; --gold-d:#a8862f;
    --bg:#f4f6fb; --card:#ffffff; --border:#e2e7f0; --muted:#64748b;
    --text:#1e293b; --ok:#15803d; --warn:#b45309; --red:#dc2626;
    --w1:#FBBF24; --w2:#0EA5E9; --w3:#EF4444; --w4:#15803D; --c4:#4ADE80; --hq:#C9A84C;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}

  /* ---------- Login ---------- */
  #loginScreen{position:fixed;inset:0;background:linear-gradient(160deg,var(--navy),#1e3a8a);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .login-card{background:#fff;border-radius:18px;padding:34px 28px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .login-logo{width:64px;height:64px;border-radius:16px;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px;font-weight:700}
  .login-card h1{font-size:19px;color:var(--navy);margin-bottom:4px}
  .login-card .sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  #googleSignInBtn{display:flex;justify-content:center;margin-bottom:14px}
  .login-bypass{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:11px 18px;width:100%;font-size:14px;font-weight:600}
  .login-bypass:hover{background:var(--navy2)}
  #loginError{display:none;background:#fef2f2;color:var(--red);border:1px solid #fecaca;border-radius:10px;padding:10px;font-size:13px;margin-top:12px;text-align:left}
  #loginSpinner{display:none;margin-top:14px;color:var(--muted)}
  .login-ver{margin-top:16px;color:var(--muted);font-size:12px}

  /* ---------- App shell ---------- */
  #app{display:none}
  .topbar{position:sticky;top:0;z-index:50}
  header.appbar{background:var(--navy);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px}
  header.appbar .title{font-weight:700;font-size:16px;display:flex;align-items:center;gap:8px}
  header.appbar .ver{background:var(--gold);color:var(--navy);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
  header.appbar .spacer{flex:1}
  header.appbar .who{font-size:12px;color:#cbd5e1;text-align:right;line-height:1.3}
  .hub-btn{background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:7px 12px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:5px;text-decoration:none}
  .hub-btn:hover{background:#d9bd6a}

  /* ---------- Filter bar (sticky) ---------- */
  .filterbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .fld{display:flex;flex-direction:column;gap:3px}
  .fld label{font-size:11px;color:var(--muted);font-weight:600}
  .fld input,.fld select{font-family:inherit;font-size:14px;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;outline:none;min-width:120px}
  .fld input:focus,.fld select:focus{border-color:var(--gold)}
  .chk{display:flex;align-items:center;gap:6px;font-size:13px;padding-bottom:8px}
  .btn-load{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:600;font-size:14px;height:38px}
  .btn-load:hover{background:var(--navy2)}
  .btn-export{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--navy);border:none;border-radius:8px;padding:8px 18px;font-weight:700;font-size:14px;height:38px;display:flex;align-items:center;gap:6px}
  .btn-export:hover{filter:brightness(1.05)}
  .btn-export:disabled{opacity:.5;cursor:not-allowed}
  .chipgrp{display:flex;gap:4px;align-items:center}
  .chipgrp .lbl{font-size:11px;color:var(--muted);font-weight:700;margin-right:2px}
  .chip{background:#eef1f7;border:none;border-radius:20px;padding:6px 13px;font-size:13px;font-weight:600;color:#475569;cursor:pointer;white-space:nowrap;font-family:inherit}
  .chip:hover{background:#e2e7f0}
  .chip.on{background:var(--navy);color:#fff}

  /* ---------- Content ---------- */
  .wrap{padding:16px;max-width:1400px;margin:0 auto}
  .tiles{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
  .tile{flex:1 1 0;min-width:92px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 11px;white-space:nowrap}
  .tile .v{font-size:17px;font-weight:700;color:var(--navy)}
  .tile .l{font-size:10.5px;color:var(--muted);margin-top:1px}
  .tile.warn .v{color:var(--red)}
  .tile.ok .v{color:var(--ok)}

  .tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:14px;flex-wrap:wrap}
  .tab{background:none;border:none;padding:9px 16px;font-size:14px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px}
  .tab.active{color:var(--navy);border-bottom-color:var(--gold)}
  .panel{display:none}
  .panel.active{display:block}

  .tbl-wrap{overflow:auto;max-height:max(280px, calc(100vh - 280px));background:var(--card);border:1px solid var(--border);border-radius:12px}
  table{border-collapse:collapse;width:100%;font-size:13px;white-space:nowrap}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
  th{background:#f8fafc;color:var(--navy);font-weight:600;position:sticky;top:0;z-index:5;font-size:12px}
  tr:hover td{background:#fbfcff}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .cut-row td{background:#fff7ed}
  .pill{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .pill.ปลีก{background:#dbeafe;color:#1d4ed8}
  .pill.ส่ง{background:#dcfce7;color:#166534}
  .pill.cut{background:#fee2e2;color:var(--red)}
  .whc{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .sec-head{font-weight:700;color:var(--navy);margin:18px 0 8px;font-size:15px;display:flex;align-items:center;gap:8px}
  .scrap-line{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;line-height:1.6}
  .scrap-line .prod{font-weight:700;color:var(--navy)}
  .scrap-line .cs{background:var(--gold);color:var(--navy);font-weight:700;padding:1px 9px;border-radius:6px;margin:0 8px}
  .scrap-line .st{display:inline-block;margin:2px 6px 2px 0;color:#334155}
  .muted{color:var(--muted)}
  .empty{text-align:center;padding:40px;color:var(--muted)}
  .note{font-size:12px;color:var(--muted);margin:6px 2px}
  .row-sel{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  #loadOverlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:60;align-items:center;justify-content:center;flex-direction:column;gap:14px}
  .spinner{width:42px;height:42px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;z-index:80;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.3);display:none}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">📦</div>
    <h1>จัดของ Pre-Order</h1>
    <div class="sub">รัตนไพบูลย์ · ดึงออเดอร์เซลล์มาจัดลงลัง</div>
    <div id="googleSignInBtn"></div>
    <button class="login-bypass" onclick="bypassLogin()">เข้าดูข้อมูล (พรีวิว/ทดสอบ)</button>
    <div id="loginSpinner">⏳ กำลังเข้าสู่ระบบ…</div>
    <div id="loginError"></div>
    <div class="login-ver">เวอร์ชัน v0.8</div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="topbar">
  <header class="appbar">
    <div class="title">📦 จัดของ Pre-Order <span class="ver">v0.8</span></div>
    <div class="spacer"></div>
    <div class="who" id="whoBox"></div>
    <a class="hub-btn" href="https://rattanaphaiboon.github.io/app/rattana-hub.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Hub
    </a>
  </header>

  <div class="filterbar">
    <div class="chipgrp" id="dateChips">
      <span class="lbl">วัน</span>
      <button type="button" class="chip" data-d="y" onclick="setDate('y')">เมื่อวาน</button>
      <button type="button" class="chip" data-d="t" onclick="setDate('t')">วันนี้</button>
      <button type="button" class="chip" data-d="c" onclick="setDate('c')">📅</button>
      <input type="date" id="fDateFrom" style="display:none;font-family:inherit;padding:5px 8px;border:1.5px solid var(--border);border-radius:8px" onchange="setDate('c',1)">
      <input type="date" id="fDateTo" style="display:none;font-family:inherit;padding:5px 8px;border:1.5px solid var(--border);border-radius:8px" onchange="setDate('c',1)">
    </div>
    <div class="chipgrp" id="roleChips">
      <span class="lbl">เซล</span>
      <button type="button" class="chip" data-r="all" onclick="setRole('all')">ทั้งหมด</button>
      <button type="button" class="chip" data-r="3" onclick="setRole('3')">ปลีก</button>
      <button type="button" class="chip" data-r="4" onclick="setRole('4')">ส่ง</button>
    </div>
    <div class="chipgrp" id="whChips">
      <span class="lbl">คลัง</span>
      <button type="button" class="chip" data-w="all" onclick="setWh('all')">ทั้งหมด</button>
      <button type="button" class="chip" data-w="W1" onclick="setWh('W1')">W1</button>
      <button type="button" class="chip" data-w="W2" onclick="setWh('W2')">W2</button>
      <button type="button" class="chip" data-w="W3" onclick="setWh('W3')">W3</button>
      <button type="button" class="chip" data-w="W4" onclick="setWh('W4')">W4</button>
      <button type="button" class="chip" data-w="C4" onclick="setWh('C4')">C4</button>
    </div>
    <input type="hidden" id="fRole" value="all">
    <input type="hidden" id="fWh" value="all">
    <input type="text" id="fStore" list="storeList" placeholder="🔍 ร้านค้า" style="min-width:140px;font-family:inherit;font-size:14px;padding:7px 12px;border:1.5px solid var(--border);border-radius:20px;outline:none">
    <datalist id="storeList"></datalist>
    <label class="chk"><input type="checkbox" id="fPending"> รออนุมัติ</label>
    <button class="btn-load" onclick="reload()">🔄 โหลด</button>
    <div class="spacer" style="flex:1"></div>
    <button class="btn-export" id="exportBtn" onclick="exportXlsx()" disabled>⬇️ Export Excel</button>
  </div>
  </div>

  <div class="wrap">
    <div class="tiles" id="tiles"></div>

    <div class="tabs">
      <button class="tab active" data-tab="bills" onclick="switchTab('bills')">☑️ เลือกบิล</button>
      <button class="tab" data-tab="orders" onclick="switchTab('orders')">📋 ใบจองสินค้า</button>
      <button class="tab" data-tab="sales" onclick="switchTab('sales')">🚚 รายเซลล์</button>
      <button class="tab" data-tab="scrap" onclick="switchTab('scrap')">📦 เศษ → ลัง</button>
      <button class="tab" data-tab="pivot" onclick="switchTab('pivot')">📊 รวมเศษ</button>
      <button class="tab" data-tab="cut" onclick="switchTab('cut')">✂️ ตัดเศษ</button>
      <button class="tab" data-tab="excl" onclick="switchTab('excl')">🚫 ตัดออก/ไม่อนุมัติ</button>
    </div>

    <div class="panel active" id="panel-bills"></div>
    <div class="panel" id="panel-orders"></div>
    <div class="panel" id="panel-sales"></div>
    <div class="panel" id="panel-scrap"></div>
    <div class="panel" id="panel-pivot"></div>
    <div class="panel" id="panel-cut"></div>
    <div class="panel" id="panel-excl"></div>
  </div>
</div>

<div id="loadOverlay"><div class="spinner"></div><div id="loadMsg" class="muted">กำลังโหลด…</div></div>
<div class="toast" id="toast"></div>

<script>
/* ================= CONFIG ================= */
const CONFIG = {
  version: 'v0.8',
  clientId: '615875645128-gasjjvkt6lu8g449cbnhl40k1pu25r0b.apps.googleusercontent.com',
  backendId: '1dAxF4Mz-zhJIVbuJ_Ql126gt08qvVS1wndJD50pqCZI',
  orderGid: '691743937',
  usersId: '1M6HdISsLN684qRWyQ73CA4AmUzmYtZaOlffDJXZZIXQ',
  usersTab: 'Rattana Users for apps',
  productId: '16mYDqAqqJma-_0vCIAajy6bcjdOZ7F6VagxkdkqAB2I',
  productTab: 'PDDT',
  minRole: 5,                 // ต่ำกว่านี้เข้าแอปไม่ได้ (จัดของ = supervisor+)
  docBookId: '1lT3-s_dr1txAermNhq79aAA0Fnbi1WDeeiSiqxHp-A8',  // ชีทเล่มเอกสาร: รหัสเซล → รหัสเลขเอกสาร — Surat แก้เล่มได้เอง
  docBookGid: '1194322066',
};

/* order column indices (positional — กันชื่อคอลัมน์ซ้ำ) */
const OC = { date:0,time:1,email:2,name:3,salesman:4,wh:5,store:6,storeCode:7,type:8,
  barcode:9,product:10,cancel:11,qty:12,unit:13,price:14,total:15,orderId:16,note:17,
  whSend1:18,salesman2:19,whSend2:20,dueDate:21,apprStatus:22 };

const WH_COLOR = {W1:'#FBBF24',W2:'#0EA5E9',W3:'#EF4444',W4:'#15803D',C4:'#4ADE80',HQ:'#C9A84C'};

/* เล่มเอกสาร bplus ต่อเซลล์ — lookup ด้วย "รหัสเซลล์" เสมอ (อย่ายึดชื่อ · เผื่อคนออก/เปลี่ยนคน รหัส+เล่มคาที่เดิม)
   ที่มา: tab "ห้องเอกสาร" ของชีทตัวอย่าง · เพิ่ม/แก้ที่นี่เมื่อมีเซลล์ใหม่ */
const DOC_BOOKS = {
  PMW101:'BV12', PMW102:'BV13', PMW104:'BV26', PMW105:'BV11',
  PMW301:'BV14', PMW304:'BV15', PMW401:'BV22', PMW402:'BV23',
  PMW404:'BV25', RPBC01:'BV41', RPBC02:'BV40', HSW403:'BK09'
};
let BOOK_MAP = {...DOC_BOOKS};                       // live (จากชีท) ทับ fallback ด้านบน
function docBook(code){ return BOOK_MAP[String(code||'').trim()] || ''; }
async function loadDocBooks(){
  try{
    const {matrix} = await gvizFetch(CONFIG.docBookId,{gid:CONFIG.docBookGid, headers:0});  // headers=0 → ไม่กินแถวแรก
    const isBook = s=>/^B[VK]\d{1,4}$/i.test(String(s||'').trim());                    // BV11, BK09
    const isCode = s=>/^[A-Za-z]{2,4}\d{2,4}$/.test(String(s||'').trim()) && !isBook(s); // PMW304, HSW403
    const m={};
    for(const r of matrix){                          // หา (รหัส, เล่ม) ที่อยู่ติดกัน — รองรับหลาย layout
      for(let c=1;c<r.length;c++){
        const book=String(r[c]||'').trim(), code=String(r[c-1]||'').trim();
        if(isBook(book) && isCode(code)) m[code]=book;
      }
    }
    if(Object.keys(m).length) BOOK_MAP = {...DOC_BOOKS, ...m};
    console.log('[docBooks] live:', Object.keys(m).length, 'เล่ม');
  }catch(e){ console.warn('[docBooks] live load failed — ใช้ fallback', e); }
}

let currentUser = null;
let DATA = { orders:[], prodIdx:{}, usersByCode:{} };   // raw loaded
let MODEL = null;                                        // processed result
let selectedBills = new Set();                           // ตะกร้าบิลที่เลือก (ข้ามวันได้)
let billsInitialized = false;                            // auto-เลือกเมื่อวานครั้งแรก

/* ================= helpers ================= */
function normalizeEmail(e){ return String(e||'').trim().toLowerCase(); }
function todayBKK(){
  return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Bangkok',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
}
function yesterdayBKK(){ const d=new Date(todayBKK()+'T12:00:00Z'); d.setUTCDate(d.getUTCDate()-1); return d.toISOString().slice(0,10); }
let _dateMode='y';
function setDate(mode, fromInput){
  if(mode) _dateMode=mode; else mode=_dateMode;
  const from=document.getElementById('fDateFrom'), to=document.getElementById('fDateTo');
  if(mode==='y'){ from.value=to.value=yesterdayBKK(); from.style.display=to.style.display='none'; }
  else if(mode==='t'){ from.value=to.value=todayBKK(); from.style.display=to.style.display='none'; }
  else if(mode==='yt'){ from.value=yesterdayBKK(); to.value=todayBKK(); from.style.display=to.style.display='none'; }
  else if(mode==='c'){ from.style.display=to.style.display='inline-block'; if(!fromInput){ if(!from.value) from.value=todayBKK(); if(!to.value) to.value=from.value; } }
  document.querySelectorAll('#dateChips .chip').forEach(c=>c.classList.toggle('on', c.dataset.d===mode));
  if(DATA.orders.length){ process(); render(); }
}
function setRole(v){ document.getElementById('fRole').value=v; document.querySelectorAll('#roleChips .chip').forEach(c=>c.classList.toggle('on', c.dataset.r===v)); if(DATA.orders.length){ process(); render(); } }
function setWh(v){ document.getElementById('fWh').value=v;
  document.querySelectorAll('#whChips .chip').forEach(c=>{ const on=c.dataset.w===v; c.classList.toggle('on',on); c.style.background=(on&&WH_COLOR[v])?WH_COLOR[v]:''; c.style.color=on?'#fff':''; });
  if(DATA.orders.length){ process(); render(); }
}
function initChips(){ setDate('y'); setRole('all'); setWh('all'); }
function toISO(d){ return String(d||'').replace(/\//g,'-').slice(0,10); }   // 2026/06/03 → 2026-06-03
function toBuddhistDMY(iso){ const [y,m,d]=toISO(iso).split('-'); return `${d}/${m}/${(+y)+543}`; }
function num(v){ const n=parseFloat(String(v).replace(/,/g,'')); return isFinite(n)?n:0; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function show(el,on){ document.getElementById(el).style.display = on?'flex':'none'; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2600); }
function loading(on,msg){ document.getElementById('loadMsg').textContent=msg||'กำลังโหลด…'; show('loadOverlay',on); }

/* parse unit string: "ลังx50(CS)" / "แพ็คx6(PA)" / "ชิ้นx1(EA)" / "แพ็คx10(CS)"  → ยึด code ในวงเล็บ */
function parseUnit(u){
  const m = String(u||'').match(/x\s*(\d+)\s*\((CS|PA|BP|EA)\)/i);
  if (m) return { eaPer:parseInt(m[1],10)||1, level:m[2].toUpperCase() };
  if (/ลัง/.test(u)) return { eaPer:1, level:'CS' };
  if (/แพ็ค/.test(u)) return { eaPer:1, level:'PA' };
  return { eaPer:1, level:'EA' };
}
function unitThai(level){ return level==='CS'?'ลัง':level==='PA'?'แพ็ค':level==='BP'?'Big Pack':'ชิ้น'; }
function fmtTriple(cs,pa,ea){
  const p=[]; if(cs)p.push(cs+' ลัง'); if(pa)p.push(pa+' แพ็ค'); if(ea)p.push(ea+' ชิ้น');
  return p.length?p.join(' '):'0';
}
function roleLabel(r){ return r===4?'ส่ง':r===3?'ปลีก':('R'+r); }
function cleanName(s){ return String(s||'').replace(/^[A-Za-z0-9]+@/,'').trim(); }   // ตัด prefix รหัส "BKCC@..."

/* ================= gviz fetch ================= */
async function gvizFetch(sheetId, opt){
  const sel = (opt.gid!=null&&opt.gid!=='') ? `gid=${opt.gid}` : `sheet=${encodeURIComponent(opt.sheet)}`;
  const hdr = (opt.headers!=null) ? opt.headers : 1;
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&${sel}&headers=${hdr}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('โหลดชีทไม่สำเร็จ ('+res.status+')');
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
  const cols = (json.table.cols||[]).map(c=>c.label||c.id||'');
  const rows = json.table.rows||[];
  const cv = c => {
    if(!c) return '';
    if(c.f!=null && c.f!=='') return String(c.f).trim();
    let v=c.v; if(v==null) return '';
    if(typeof v==='string' && /^Date\(/.test(v)){
      const m=v.match(/Date\((-?\d+),(\d+),(\d+)/);
      if(m) return `${+m[1]}/${String(+m[2]+1).padStart(2,'0')}/${String(+m[3]).padStart(2,'0')}`;
    }
    return String(v).trim();
  };
  const matrix = rows.map(r => (r.c||[]).map(cv));
  return { cols, matrix };
}
function asObjects({cols,matrix}){
  return matrix.map(r=>{ const o={}; cols.forEach((h,i)=>{ if(h&&o[h]===undefined) o[h]=r[i]||''; }); return o; });
}

async function handleGoogleCredential(resp){

/* ================= core processing ================= */
function process(){
  let fFrom = document.getElementById('fDateFrom').value, fTo = document.getElementById('fDateTo').value;
  if(fFrom && fTo && fFrom>fTo){ const t=fFrom; fFrom=fTo; fTo=t; }   // กันใส่สลับ
  const fStore = document.getElementById('fStore').value.trim().toLowerCase();
  const fRole  = document.getElementById('fRole').value;
  const fWh    = document.getElementById('fWh').value;
  const includePending = document.getElementById('fPending').checked;

  const runDate = todayBKK();
  const _rd=runDate.split('-'); const bvDate = String((+_rd[0])+543).slice(-2)+_rd[1]+_rd[2];   // YYMMDD พ.ศ.2หลัก เช่น 690609
  const bplusFields = (o,docNo)=>({
    docDate:toBuddhistDMY(runDate), docNo, debtor:o.storeCode, endDisc:'',
    branch:'0', dept:'SP01', project:'0', salesman:o.salesman, note:o.orderId,
    delivDate:o.dueDate?toBuddhistDMY(o.dueDate):'', barcode:o.barcode, qty:o.qty, free:'0',
    unitPrice:o.price, discUnit:'', weightUnit:'', lot:'', invNo:'', loc:o.wh, keyDate:String(o.date).replace(/-/g,'/'),
    store:o.store, product:o.product, total:o.total
  });
  // สถานะที่ "ไม่เข้าบิลหลัก" → เก็บแยกชีทออเดอร์ถูกตัดออก
  const orderStatus = o => {
    if(/ยกเลิก/.test(o.cancel)) return 'ยกเลิก';
    if(/ปฏิเสธ|ไม่อนุมัติ/.test(o.apprStatus)) return 'ไม่อนุมัติราคา';   // ซุปไม่อนุมัติราคา
    if(/^รอ/.test(o.apprStatus)) return 'รออนุมัติ';
    return '';
  };

  // 1) filter → แยก approved (บิลหลัก) vs excluded (ยกเลิก/ไม่อนุมัติ/รออนุมัติ)
  const lines = [], excluded = [];
  for(const o of DATA.orders){
    if(!selectedBills.has(o.orderId)) continue;        // เฉพาะบิลที่เลือก (ตะกร้า ข้ามวันได้)
    if(fStore && !((o.store+' '+o.storeCode).toLowerCase().includes(fStore))) continue;
    const u = DATA.usersByCode[o.salesman] || {};
    const role = u.role || 0;
    if(fRole!=='all' && String(role)!==fRole) continue;
    if(fWh!=='all' && o.wh!==fWh) continue;
    if(o.qty<=0 || !o.barcode) continue;

    const st = orderStatus(o);
    if(st && !(st==='รออนุมัติ' && includePending)){ excluded.push({status:st, role, roleLab:roleLabel(role), ...bplusFields(o,'')}); continue; }

    const pu = parseUnit(o.unit);
    const prod = DATA.prodIdx[o.barcode] || null;
    const eaPerCS = prod ? prod.qtyCS : (pu.level==='CS'? pu.eaPer : 0);
    const eaPerPA = prod && prod.qtyPA ? prod.qtyPA : (pu.level==='PA'? pu.eaPer : 0);
    const productKey = prod ? (prod.codeCS || prod.name) : o.barcode;

    lines.push({
      ...o, role, roleLab:roleLabel(role),
      level:pu.level, eaPer:pu.eaPer, eaTotal:o.qty*pu.eaPer,
      eaPerCS, eaPerPA, productKey,
      productName: prod?cleanName(prod.name):o.product, productShort: prod?cleanName(prod.short):o.product,
      codeCS: prod?prod.codeCS:'',
      keyTS: Date.parse((o.date+'T'+(o.time||'00:00')).replace(/\//g,'-')) || 0,
      storeKey: o.storeCode||o.store
    });
  }

  // 2) ก. เต็มลังรายเซลล์ (cell) — ① CS  ② เต็มลังจากเศษตัวเอง  ③ EA-only(น้ำตาล/ข้าว) · เศษจริง → pool (ข.)
  const cellMap = {};   // salesman|store|productKey → ก. row
  const cellKey = (s,st,pk)=> s+'|'+st+'|'+pk;
  function cell(l){
    const k=cellKey(l.salesman,l.storeKey,l.productKey);
    if(!cellMap[k]) cellMap[k]={salesman:l.salesman,salesmanName:l.name,role:l.role,roleLab:l.roleLab,
      wh:l.wh,store:l.store,storeKey:l.storeKey,productName:l.productName,productShort:l.productShort,
      eaPerCS:l.eaPerCS,eaPerPA:l.eaPerPA,directCS:0,selfCases:0,eaOnlyEA:0};
    return cellMap[k];
  }
  // สะสมเศษ case-hierarchy ต่อ เซลล์|ร้าน|สินค้า ก่อน เพื่อหักเต็มลังของตัวเอง
  const looseSSP={};
  for(const l of lines){
    if(l.level==='CS'){ cell(l).directCS += l.qty; continue; }                  // ① CS = เต็มลัง → ก.
    if(!l.eaPerCS || l.eaPerCS<=1){ cell(l).eaOnlyEA += l.eaTotal; continue; }   // ③ EA-only → ก.
    const k=cellKey(l.salesman,l.storeKey,l.productKey);                         // ② เศษ case-hierarchy → สะสม
    if(!looseSSP[k]) looseSSP[k]={l, ea:0};
    looseSSP[k].ea += l.eaTotal;
  }

  // 2b) ต่อ เซลล์|ร้าน|สินค้า: เต็มลังจากเศษตัวเอง→ก. · ที่เหลือ→pool (ข.)
  const pool={}, pvRem={};
  for(const k in looseSSP){
    const {l, ea}=looseSSP[k];
    const fullCases=Math.floor(ea/l.eaPerCS), rem=ea - fullCases*l.eaPerCS;
    if(fullCases>0) cell(l).selfCases += fullCases;
    if(rem>0){
      const gk=l.role+'|'+l.wh+'|'+l.productKey;
      if(!pool[gk]) pool[gk]={role:l.role,roleLab:l.roleLab,wh:l.wh,productKey:l.productKey,
        productName:l.productName,productShort:l.productShort,eaPerCS:l.eaPerCS,eaPerPA:l.eaPerPA,codeCS:l.codeCS,stores:{},poolEA:0};
      const g=pool[gk];
      if(!g.stores[l.storeKey]) g.stores[l.storeKey]={store:l.store,storeKey:l.storeKey,salesman:l.salesman,salesmanName:l.name,wh:l.wh,role:l.role,ea:0,keyTS:0};
      const s=g.stores[l.storeKey]; s.ea+=rem; s.keyTS=Math.max(s.keyTS,l.keyTS); g.poolEA+=rem;
      (pvRem[l.salesman]=pvRem[l.salesman]||{})[l.productKey]=(pvRem[l.salesman][l.productKey]||0)+rem;
    }
  }

  // 3) ข. รวมเศษทุกเซล → ลัง + แยกร้าน + ตัด (ร้านคีย์ทีหลังก่อน)
  const scrap=[], cuts=[];
  for(const gk in pool){
    const g=pool[gk]; const stores=Object.values(g.stores);
    const shipCases=Math.floor(g.poolEA/g.eaPerCS);
    let cutEA=g.poolEA - shipCases*g.eaPerCS;
    stores.sort((a,b)=> b.keyTS-a.keyTS || (a.storeKey<b.storeKey?1:-1));
    for(const s of stores){
      const take=Math.min(s.ea,cutEA); s.cutEA=take; s.finalEA=s.ea-take; cutEA-=take;
      if(take>0) cuts.push({wh:g.wh,role:g.role,roleLab:g.roleLab,salesman:s.salesman,salesmanName:s.salesmanName,
        store:s.store,product:g.productName,orig:fmtFromEA(s.ea,g.eaPerCS,g.eaPerPA),got:fmtFromEA(s.finalEA,g.eaPerCS,g.eaPerPA),cut:fmtFromEA(take,g.eaPerCS,g.eaPerPA)});
    }
    if(shipCases>0){ const pPA=g.eaPerPA||1;
      scrap.push({wh:g.wh,role:g.role,roleLab:g.roleLab,productName:g.productName,productShort:g.productShort,
        codeCS:g.codeCS,shipCases,eaPerPA:g.eaPerPA,eaPerCS:g.eaPerCS,
        stores:stores.filter(s=>s.finalEA>0).map(s=>({store:s.store,pa:Math.floor(s.finalEA/pPA),ea:s.finalEA%pPA,finalEA:s.finalEA}))});
    }
  }

  // 4) bplus rows (เฉพาะที่อนุมัติ) — เลขที่เอกสาร = เล่มราย "เซลล์" (lookup ด้วยรหัส) + วันที่ + รันต่อเซลล์
  const sortedLines = [...lines].sort((a,b)=> String(a.salesman).localeCompare(String(b.salesman)) || (a.keyTS-b.keyTS) || a.orderId.localeCompare(b.orderId));
  const bvByOrder={}, seqBySalesman={}, unmappedBooks=new Set();
  const bplus = sortedLines.map(l=>{
    if(bvByOrder[l.orderId]===undefined){
      let book = docBook(l.salesman);
      if(!book){ book='NA-'+l.salesman; unmappedBooks.add(l.salesman); }   // ยังไม่มีเล่ม → flag
      seqBySalesman[l.salesman] = (seqBySalesman[l.salesman]||0)+1;
      bvByOrder[l.orderId] = book + bvDate + '/' + String(seqBySalesman[l.salesman]).padStart(3,'0');
    }
    return bplusFields(l, bvByOrder[l.orderId]);
  });

  // 5) ก. per-salesman — เต็มลัง (CS + เต็มลังจากเศษตัวเอง) + EA-only
  const salesmen={};
  for(const k in cellMap){
    const c=cellMap[k];
    const cases=c.directCS + c.selfCases;
    if(cases===0 && c.eaOnlyEA===0) continue;
    const sk=c.salesman||'?';
    if(!salesmen[sk]) salesmen[sk]={salesman:sk,name:c.salesmanName,book:docBook(sk),role:c.role,roleLab:c.roleLab,wh:c.wh,rows:[]};
    const parts=[]; if(cases) parts.push(cases+' ลัง'); if(c.eaOnlyEA) parts.push(c.eaOnlyEA+' ชิ้น');
    salesmen[sk].rows.push({store:c.store,product:c.productName,pick:parts.join(' + ')||'0'});
  }
  Object.values(salesmen).forEach(s=> s.rows.sort((a,b)=> a.product.localeCompare(b.product) || a.store.localeCompare(b.store)));

  // 6) รวมเศษ pivot — เศษจริง (remainder หลังหักเต็มลัง) × เซลล์
  const codeName={}, prodMeta={};
  lines.forEach(l=>{ if(!codeName[l.salesman]) codeName[l.salesman]=l.name||l.salesman;
    if(!prodMeta[l.productKey]) prodMeta[l.productKey]={name:l.productShort||l.productName, eaPerPA:l.eaPerPA}; });
  const pvMap={}, pvCodes=new Set();
  for(const sm in pvRem){ for(const pk in pvRem[sm]){ const rem=pvRem[sm][pk]; if(rem<=0) continue;
    if(!pvMap[pk]){ const m=prodMeta[pk]||{}; pvMap[pk]={name:m.name||pk, eaPerPA:m.eaPerPA||0, by:{}, totalEa:0}; }
    pvMap[pk].by[sm]=(pvMap[pk].by[sm]||0)+rem; pvMap[pk].totalEa+=rem; pvCodes.add(sm);
  }}
  const pivotCodes=[...pvCodes].sort();
  const pivotNames=pivotCodes.map(c=>codeName[c]||c);
  const pivot=Object.values(pvMap).sort((a,b)=>a.name.localeCompare(b.name)).map(p=>({
    name:p.name, total:fmtLoose(p.totalEa,p.eaPerPA),
    cells:pivotCodes.map(c=> p.by[c]? fmtLoose(p.by[c],p.eaPerPA):'')
  }));

  // stats
  const orderIds=new Set(lines.map(l=>l.orderId));
  const stats={
    orders:orderIds.size, lines:lines.length,
    salesmen:Object.keys(salesmen).length, stores:new Set(lines.map(l=>l.storeKey)).size,
    products:new Set(lines.map(l=>l.productKey)).size,
    baht:lines.reduce((s,l)=>s+l.total,0),
    fullCases:Object.values(cellMap).reduce((a,c)=>a+c.directCS+c.selfCases,0),
    casesScrap:scrap.reduce((s,x)=>s+x.shipCases,0), cuts:cuts.length, excluded:excluded.length, bills:selectedBills.size
  };

  excluded.sort((a,b)=> String(a.salesman).localeCompare(String(b.salesman)) || String(a.note).localeCompare(String(b.note)));
  MODEL = { bplus, salesmen:Object.values(salesmen), scrap, cuts, excluded, pivot, pivotNames, stats, date:runDate, unmapped:[...unmappedBooks] };
}
/* รวมเศษ → แพ็ค+ชิ้น (ไม่ roll เป็นลัง) */
function fmtLoose(ea, eaPerPA){
  if(!ea) return '';
  if(eaPerPA>0){ const pa=Math.floor(ea/eaPerPA), e=ea%eaPerPA; return [pa?pa+' แพ็ค':'', e?e+' ชิ้น':''].filter(Boolean).join(' ')||'0'; }
  return ea+' ชิ้น';
}
/* express EA back into CS/PA/EA text */
function fmtFromEA(ea, eaPerCS, eaPerPA){
  let r=ea, cs=0,pa=0;
  if(eaPerCS>0){ cs=Math.floor(r/eaPerCS); r%=eaPerCS; }
  if(eaPerPA>0){ pa=Math.floor(r/eaPerPA); r%=eaPerPA; }
  return fmtTriple(cs,pa,r);
}

/* ================= render ================= */
function render(){
  if(!MODEL) return;
  const s=MODEL.stats;
  document.getElementById('exportBtn').disabled = s.lines===0;
  document.getElementById('tiles').innerHTML = [
    ['เลือกบิล', s.bills||0, 'ok'], ['ออเดอร์', s.orders], ['รายการ', s.lines], ['เซลล์', s.salesmen],
    ['ร้านค้า', s.stores], ['สินค้า', s.products],
    ['ยอดรวม', '฿'+s.baht.toLocaleString('th-TH',{maximumFractionDigits:0})],
    ['เต็มลัง ก.', s.fullCases||0, 'ok'], ['ลังจากเศษ ข.', s.casesScrap, 'ok'], ['ตัดเศษ', s.cuts, s.cuts?'warn':''],
    ['ตัดออก/ไม่อนุมัติ', s.excluded||0, (s.excluded?'warn':'')]
  ].map(([l,v,cl])=>`<div class="tile ${cl||''}"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');
  renderBillSelect(); renderOrders(); renderSales(); renderScrap(); renderCut(); renderExcl(); renderPivot();

function renderPivot(){
  const pv=MODEL.pivot||[], names=MODEL.pivotNames||[];
  if(!pv.length){ document.getElementById('panel-pivot').innerHTML='<div class="empty">ไม่มีเศษ (ชิ้น/แพ็ค) ในช่วงที่กรอง</div>'; return; }
  const cap=300;
  const head=['สินค้า','รวม',...names];
  const body=pv.slice(0,cap).map(r=>`<tr><td>${esc(r.name)}</td><td><b>${esc(r.total)}</b></td>${r.cells.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('');
  document.getElementById('panel-pivot').innerHTML=
    `<div class="note">รวมเศษ (ชิ้น+แพ็ค+BP) ต่อสินค้า แยกคอลัมน์ตามเซลล์ — แสดง ${Math.min(cap,pv.length)}/${pv.length} แถว · Export ครบ</div>
     <div class="tbl-wrap"><table><thead><tr>${head.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function renderExcl(){
  const ex=MODEL.excluded||[];
  if(!ex.length){ document.getElementById('panel-excl').innerHTML='<div class="empty">✅ ไม่มีออเดอร์ยกเลิก/ไม่อนุมัติ</div>'; return; }
  const head=['สถานะ','พนง.ขาย','หมายเหตุ','บาร์โค้ด','สินค้า','ร้าน','จำนวน','ราคา','คลัง','วันที่คีย์'];
  const body=ex.slice(0,400).map(r=>`<tr class="cut-row"><td><span class="pill cut">${esc(r.status)}</span></td>
    <td>${esc(r.salesman)}</td><td>${esc(r.note)}</td><td>${esc(r.barcode)}</td><td>${esc(r.product)}</td>
    <td>${esc(r.store)}</td><td class="num">${r.qty}</td><td class="num">${r.unitPrice.toLocaleString()}</td>
    <td>${esc(r.loc)}</td><td>${esc(r.keyDate)}</td></tr>`).join('');
  document.getElementById('panel-excl').innerHTML=
    `<div class="note">ออเดอร์ที่ไม่เข้าบิลหลัก เก็บแยก (ยกเลิก / ซุปไม่อนุมัติราคา / รออนุมัติ) · เลขที่เอกสารเว้นว่าง · แสดง ${Math.min(400,ex.length)}/${ex.length}</div>
     <div class="tbl-wrap"><table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>`;
}

function buildBills(){
  const fFrom=document.getElementById('fDateFrom').value, fTo=document.getElementById('fDateTo').value;
  const fStore=document.getElementById('fStore').value.trim().toLowerCase();
  const fRole=document.getElementById('fRole').value, fWh=document.getElementById('fWh').value;
  const bills={};
  for(const o of DATA.orders){
    if(fFrom && o.date<fFrom) continue;
    if(fTo && o.date>fTo) continue;
    if(/ยกเลิก/.test(o.cancel)) continue;
    const u=DATA.usersByCode[o.salesman]||{}; const role=u.role||0;
    if(fRole!=='all' && String(role)!==fRole) continue;
    if(fWh!=='all' && o.wh!==fWh) continue;
    if(fStore && !((o.store+' '+o.storeCode).toLowerCase().includes(fStore))) continue;
    if(!o.orderId) continue;
    if(!bills[o.orderId]) bills[o.orderId]={orderId:o.orderId,date:o.date,salesman:o.salesman,salesmanName:o.name,store:o.store,wh:o.wh,lines:0,total:0};
    bills[o.orderId].lines++; bills[o.orderId].total+=o.total;
  }
  return Object.values(bills).sort((a,b)=> b.date.localeCompare(a.date) || String(a.salesman).localeCompare(String(b.salesman)) || a.orderId.localeCompare(b.orderId));
}
function renderBillSelect(){
  const bills=buildBills();
  const head=`<div class="row-sel">
    <button class="btn-load" style="padding:6px 12px;height:auto" onclick="selectAllBills(true)">✔ เลือกทั้งหมดที่แสดง</button>
    <button class="btn-load" style="padding:6px 12px;height:auto;background:#64748b" onclick="selectAllBills(false)">✖ ไม่เลือกที่แสดง</button>
    <span class="muted">แสดง ${bills.length} บิล · <b style="color:var(--navy)">เลือกแล้ว ${selectedBills.size} บิล</b> (จะจัด + Export)</span></div>`;
  if(!bills.length){ document.getElementById('panel-bills').innerHTML=head+'<div class="empty">ไม่มีบิลในวันที่เลือก — ลองสลับชิป "วัน"</div>'; return; }
  const rows=bills.map(b=>`<tr class="${selectedBills.has(b.orderId)?'':'cut-row'}">
    <td style="text-align:center"><input type="checkbox" ${selectedBills.has(b.orderId)?'checked':''} onchange="toggleBill('${esc(b.orderId)}',this.checked)" style="width:17px;height:17px;cursor:pointer"></td>
    <td>${esc(b.date)}</td><td>${esc(b.salesman)} ${esc(b.salesmanName||'')}</td><td>${esc(b.store)}</td>
    <td>${esc(b.wh)}</td><td>${esc(b.orderId)}</td><td class="num">${b.lines}</td><td class="num">${b.total.toLocaleString()}</td></tr>`).join('');
  document.getElementById('panel-bills').innerHTML= head +
    `<div class="note">ติ๊กบิลที่จะจัด — สลับชิป "วัน" เพื่อหยิบข้ามวัน (เมื่อวานทั้งหมด + เลือกบางบิลของวันนี้) · เฉพาะบิลที่ติ๊กเท่านั้นไป ก./ข./Export</div>
     <div class="tbl-wrap"><table><thead><tr><th>✓</th><th>วันคีย์</th><th>เซล</th><th>ร้าน</th><th>คลัง</th><th>orderId</th><th>รายการ</th><th>ยอด</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function toggleBill(id,on){ if(on) selectedBills.add(id); else selectedBills.delete(id); process(); render(); }
function selectAllBills(on){ buildBills().forEach(b=>{ if(on) selectedBills.add(b.orderId); else selectedBills.delete(b.orderId); }); process(); render(); }

    <td>${esc(r.barcode)}</td><td>${esc(r.product)}</td><td>${esc(r.store)}</td>

function renderScrap(){
  const sc=MODEL.scrap;
  if(!sc.length){ document.getElementById('panel-scrap').innerHTML='<div class="empty">ไม่มีเศษที่รวมเป็นลังได้</div>'; return; }
  // group by wh+role
  const groups={};
  sc.forEach(x=>{ const k=x.roleLab+'|'+x.wh; (groups[k]=groups[k]||[]).push(x); });
  let html='<div class="note">รวมแพ็ค/ชิ้นทั้งคลัง (ตาม role) ให้ลงลัง — แต่ละบรรทัดบอกว่าร้านไหนได้กี่แพ็ค</div>';
  for(const k in groups){
    const [rl,wh]=k.split('|');
    html+=`<div class="sec-head"><span class="whc" style="background:${WH_COLOR[wh]||'#999'}"></span>คลัง ${esc(wh)} <span class="pill ${rl}">${esc(rl)}</span></div>`;
    groups[k].sort((a,b)=>a.productName.localeCompare(b.productName)).forEach(x=>{
      const stores=x.stores.map(s=>`<span class="st">${esc(s.store)} <b>${s.pa}${s.ea?'.'+s.ea:''}</b>${s.ea?' (แพ็ค.ชิ้น)':' แพ็ค'}</span>`).join(' ');
      html+=`<div class="scrap-line"><span class="prod">${esc(x.productShort||x.productName)}</span>
        <span class="cs">${x.shipCases} ลัง</span> ${stores}</div>`;
    });
  }
  document.getElementById('panel-scrap').innerHTML=html;
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===t));
  document.querySelectorAll('.panel').forEach(x=>x.classList.toggle('active',x.id==='panel-'+t));
}

/* ================= export xlsx ================= */
function sheetName(raw, used){
  let n=String(raw).replace(/[\[\]\:\*\?\/\\]/g,' ').trim().slice(0,28);
  let base=n, i=1; while(used.has(n)){ n=base.slice(0,25)+'_'+(i++); } used.add(n); return n;
}
function exportXlsx(){
  if(!MODEL||!MODEL.bplus.length){ toast('ไม่มีข้อมูลให้ export'); return; }
  const wb=XLSX.utils.book_new(); const used=new Set();

  // 1) ออเดอร์ทั้งหมด (bplus)
  const bHead=['วันที่เอกสาร','เลขที่เอกสาร','รหัสลูกหนี้','ส่วนลดท้ายบิล','รหัสสาขา','รหัสแผนก','รหัสโครงการ',
    'รหัสพนักงานขาย','หมายเหตุ','วันที่ส่งของ','รหัสซื้อขาย','จำนวน','แถม','ราคาต่อหน่วย','ส่วนลดต่อหน่วย',
    'น้ำหนักต่อหน่วย','เลขล็อต','เลขกำกับ','ตำแหน่งเก็บ','วันที่คีย์','ชื่อร้าน','ชื่อสินค้า','ยอดรวม'];
  const bRows=MODEL.bplus.map(r=>[r.docDate,r.docNo,r.debtor,r.endDisc,r.branch,r.dept,r.project,r.salesman,
    r.note,r.delivDate,r.barcode,r.qty,r.free,r.unitPrice,r.discUnit,r.weightUnit,r.lot,r.invNo,r.loc,
    r.keyDate,r.store,r.product,r.total]);
  const wsB=XLSX.utils.aoa_to_sheet([bHead,...bRows]);
  wsB['!cols']=bHead.map((h,i)=>({wch:[10,16,12,8,8,8,8,12,12,11,15,7,5,11,9,9,7,7,8,11,22,28,11][i]||10}));
  forceText(wsB, bRows.length, [1,2,7,10,18]);   // docNo,debtor,salesman,barcode,loc → text
  XLSX.utils.book_append_sheet(wb,wsB,sheetName('ใบจองสินค้า',used));

  // 2) per salesman
  MODEL.salesmen.forEach(s=>{
    const head=['สินค้า','ร้าน','จัด'];
    const rows=s.rows.map(r=>[r.product,r.store,r.pick]);
    const title=`ก. จัดเต็มลัง · ${s.salesman} · ${s.name||''} · ${s.roleLab} · คลัง ${s.wh} · เล่ม ${s.book||'(ยังไม่มี)'}`;
    const ws=XLSX.utils.aoa_to_sheet([[title],head,...rows]);
    ws['!cols']=[{wch:30},{wch:24},{wch:18}];
    XLSX.utils.book_append_sheet(wb,ws,sheetName(s.salesman+' '+(s.name||''),used));   // ชื่อชีท = รหัสนำหน้า (ยึดรหัส)
  });

  // 3) เศษ (per wh+role)
  const scrapGroups={};
  MODEL.scrap.forEach(x=>{ const k=x.roleLab+'|'+x.wh; (scrapGroups[k]=scrapGroups[k]||[]).push(x); });
  for(const k in scrapGroups){
    const [rl,wh]=k.split('|');
    const head=['สินค้า','รหัสลัง','รวม(ลัง)','รายละเอียดร้าน (ร้าน = แพ็ค)'];
    const rows=scrapGroups[k].sort((a,b)=>a.productName.localeCompare(b.productName)).map(x=>[
      x.productShort||x.productName, x.codeCS, x.shipCases,
      x.stores.map(s=>`${s.store}=${s.pa}${s.ea?'.'+s.ea:''}`).join('  ')
    ]);
    const ws=XLSX.utils.aoa_to_sheet([head,...rows]);
    ws['!cols']=[{wch:26},{wch:16},{wch:9},{wch:80}];
    forceText(ws, rows.length, [1]);
    XLSX.utils.book_append_sheet(wb,ws,sheetName('เศษ-'+rl+'-'+wh,used));
  }

  // 4) ออเดอร์ถูกตัดออก (ยกเลิก / ไม่อนุมัติราคา / รออนุมัติ) — เก็บแยก ไม่เข้าบิลหลัก
  if((MODEL.excluded||[]).length){
    const xHead=['สถานะ',...bHead];
    const xRows=MODEL.excluded.map(r=>[r.status,r.docDate,r.docNo,r.debtor,r.endDisc,r.branch,r.dept,r.project,
      r.salesman,r.note,r.delivDate,r.barcode,r.qty,r.free,r.unitPrice,r.discUnit,r.weightUnit,r.lot,r.invNo,
      r.loc,r.keyDate,r.store,r.product,r.total]);
    const wsX=XLSX.utils.aoa_to_sheet([xHead,...xRows]);
    wsX['!cols']=[{wch:13}].concat(bHead.map((h,i)=>({wch:[10,16,12,8,8,8,8,12,12,11,15,7,5,11,9,9,7,7,8,11,22,28,11][i]||10})));
    forceText(wsX, xRows.length, [2,3,9,12,20]);   // docNo,debtor,salesman,barcode,loc (เลื่อน +1 จากคอลัมน์สถานะ)
    XLSX.utils.book_append_sheet(wb,wsX,sheetName('ออเดอร์ถูกตัดออก',used));
  }

  // 5) ตัดเศษไม่ลงลัง
  const cHead=['คลัง','ประเภท','เซลล์','ร้าน','สินค้า','สั่ง','ได้จริง','ตัด','เหตุผล'];
  const cRows=MODEL.cuts.map(x=>[x.wh,x.roleLab,x.salesmanName||x.salesman,x.store,x.product,x.orig,x.got,x.cut,'ไม่ลงลัง (คีย์ทีหลัง)']);
  const wsC=XLSX.utils.aoa_to_sheet([cHead,...(cRows.length?cRows:[['—','','','','ไม่มีการตัด','','','','']])]);
  wsC['!cols']=[{wch:7},{wch:8},{wch:18},{wch:22},{wch:26},{wch:14},{wch:14},{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb,wsC,sheetName('ตัดเศษไม่ลงลัง',used));

  // 6) รวมเศษ (pivot สินค้า × เซลล์ · คอลัมน์เพิ่มตามจำนวนเซลล์)
  if((MODEL.pivot||[]).length){
    const pHead=['สินค้า','รวม',...MODEL.pivotNames];
    const pRows=MODEL.pivot.map(r=>[r.name,r.total,...r.cells]);
    const wsP=XLSX.utils.aoa_to_sheet([pHead,...pRows]);
    wsP['!cols']=[{wch:28},{wch:12}].concat(MODEL.pivotNames.map(()=>({wch:13})));
    XLSX.utils.book_append_sheet(wb,wsP,sheetName('รวมเศษ',used));
  }

  XLSX.writeFile(wb, `จัดของ-${MODEL.date}.xlsx`);
  toast('✅ ดาวน์โหลด Excel แล้ว');
}
/* force selected column indices to TEXT (กันบาร์โค้ด/รหัสเป็น scientific notation) */
function forceText(ws, dataRows, colIdxs){
  const ref=XLSX.utils.decode_range(ws['!ref']);
  for(let r=1;r<=ref.e.r;r++){
    for(const c of colIdxs){
      const addr=XLSX.utils.encode_cell({r,c}); const cell=ws[addr];
      if(cell && cell.v!=null && cell.v!==''){ cell.t='s'; cell.v=String(cell.v); cell.z='@'; }
    }
  }
}
