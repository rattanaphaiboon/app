<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1b3e">
<title>Rattana Work Management v2.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═════════════════════════════════════════════════════════════
   Rattana Work — v2.2 redesign
   Design tokens + components per DESIGN-BRIEF + hand-off
══════════════════════════════════════════════════════════════ */
:root {
  --navy: #0d1b3e; --navy-mid: #1a2f5e; --navy-light: #243b73;
  --gold: #c9a84c; --gold-light: #e8c86a; --gold-soft: #f3e6b8;
  --status-todo: #94a3b8; --status-doing: #3498db; --status-review: #f39c12; --status-done: #2ecc71;
  --status-todo-soft: #e2e8f0; --status-doing-soft: #dbeafe; --status-review-soft: #fef3c7; --status-done-soft: #d1fae5;
  --prio-high: #e74c3c; --prio-med: #f39c12; --prio-low: #3498db;
  --bg: #d6deef; --bg-elev: #ffffff;
  --text: #0d1b3e; --text-muted: #6b7896; --text-soft: #94a3b8;
  --card-bg: #ffffff; --border: #b8c4dc; --border-soft: #c5d0e6;
  --shadow-sm: 0 1px 2px rgba(13,27,62,0.06);
  --shadow-md: 0 4px 14px rgba(13,27,62,0.08);
  --shadow-lg: 0 12px 32px rgba(13,27,62,0.16);
  --shadow-gold: 0 6px 18px rgba(201,168,76,0.32);
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 18px; --radius-xl: 24px;
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px; --space-6: 24px;
}
.rw-app.dark {
  --bg: #05080f; --bg-elev: #0a1226;
  --text: #ffffff; --text-muted: #8a99bf; --text-soft: #5a6a8f;
  --card-bg: #0d1b3e; --border: #1f3563; --border-soft: #142348;
  --status-todo-soft: rgba(148,163,184,.15); --status-doing-soft: rgba(52,152,219,.18);
  --status-review-soft: rgba(243,156,18,.18); --status-done-soft: rgba(46,204,113,.18);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.4); --shadow-md: 0 4px 14px rgba(0,0,0,.5); --shadow-lg: 0 12px 32px rgba(0,0,0,.6);
  --gold-soft: rgba(201,168,76,.18);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
input, select, textarea { font-family: inherit; font-size: 16px; color: inherit; }
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }

/* ── App shell ── */
.rw-app {
  font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px; line-height: 1.5;
  color: var(--text); background: var(--bg);
  height: 100dvh; width: 100%;
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
  max-width: 600px; margin: 0 auto;
}
@media(min-width:601px) and (max-width:1023px) { .rw-app { box-shadow: 0 0 60px rgba(0,0,0,.15); } }
@media(min-width:1024px) {
  .rw-app { max-width: 1600px; box-shadow: none; }
  body { background: var(--bg); }
}

/* ── PC Kanban (Trello-style) ── */
.rw-kan-pc { display: none; }
@media (min-width: 1024px) {
  .rw-kan-mobile { display: none !important; }
  .rw-kan-pc {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 12px 14px 24px;
    height: 100%;
    align-items: start;
    min-height: 400px;
  }
  .rw-kan-col-pc {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    min-height: 240px;
    max-height: calc(100dvh - 240px);
    transition: background .15s, border-color .15s, box-shadow .15s;
    box-shadow: var(--shadow-sm);
  }
  .rw-kan-col-pc.drag-over {
    background: var(--gold-soft);
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,.25);
  }
  .rw-kan-col-pc[data-status="Todo"] { border-top: 3px solid var(--status-todo); }
  .rw-kan-col-pc[data-status="Doing"] { border-top: 3px solid var(--status-doing); }
  .rw-kan-col-pc[data-status="Review"] { border-top: 3px solid var(--status-review); }
  .rw-kan-col-pc[data-status="Done"] { border-top: 3px solid var(--status-done); }
  .rw-kan-col-head-pc {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 800;
    font-size: 13px;
    color: var(--text);
    flex-shrink: 0;
  }
  .rw-kan-col-head-pc .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .rw-kan-col-head-pc .dot.status-Todo { background: var(--status-todo); }
  .rw-kan-col-head-pc .dot.status-Doing { background: var(--status-doing); }
  .rw-kan-col-head-pc .dot.status-Review { background: var(--status-review); }
  .rw-kan-col-head-pc .dot.status-Done { background: var(--status-done); }
  .rw-kan-col-head-pc .nm { flex: 1; }
  .rw-kan-col-head-pc .cnt { background: var(--bg); color: var(--text-muted); padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; }
  .rw-kan-col-body-pc {
    padding: 8px;
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .rw-kan-col-body-pc::-webkit-scrollbar { width: 6px; }
  .rw-kan-col-body-pc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .rw-col-empty {
    padding: 24px 12px; text-align: center; color: var(--text-soft); font-size: 11px; font-style: italic;
    border: 1.5px dashed var(--border-soft); border-radius: 10px; margin: 8px 0;
  }
  .rw-kan-pc .rw-task-card { cursor: grab; }
  .rw-kan-pc .rw-task-card:active { cursor: grabbing; }
  .rw-kan-pc .rw-task-card.is-dragging { opacity: 0.4; transform: rotate(-2deg); }
  .rw-kan-pc .rw-task-card.locked-drag { cursor: not-allowed; opacity: .7; }
  .rw-kan-pc-hint {
    grid-column: 1 / -1;
    background: var(--gold-soft); border: 1px dashed rgba(201,168,76,.5); border-radius: 8px;
    padding: 6px 12px; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 6px;
    cursor: pointer;
  }
}

/* ── Header ── */
.rw-header {
  background: var(--navy); color: #fff;
  padding: max(10px, env(safe-area-inset-top)) 14px 12px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 3px solid var(--gold); flex-shrink: 0;
}
.rw-logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 13px; letter-spacing: .8px; }
.rw-logo-mark {
  width: 24px; height: 24px; border-radius: 6px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  display: flex; align-items: center; justify-content: center;
  color: var(--navy); font-weight: 800; font-size: 12px;
}
.rw-logo .accent { color: var(--gold); }
.rw-ver { background: var(--gold); color: var(--navy); font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; letter-spacing: .5px; }
.rw-h-spacer { flex: 1; }
.rw-h-btn {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-size: 14px; position: relative;
}
.rw-h-btn:active { background: rgba(255,255,255,.18); }
.rw-h-btn.notif::after {
  content: ''; position: absolute; top: 5px; right: 5px;
  width: 7px; height: 7px; background: var(--gold);
  border: 2px solid var(--navy); border-radius: 50%;
}
.rw-hub {
  display: flex; align-items: center; gap: 4px;
  background: var(--gold); color: var(--navy);
  padding: 5px 9px; border-radius: 8px;
  font-size: 11px; font-weight: 800; letter-spacing: .3px;
}

/* ── User strip ── */
.rw-user-strip {
  background: var(--card-bg); padding: 8px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border-soft); flex-shrink: 0;
  gap: 8px;
}
.rw-user-chip { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; min-width: 0; }
.rw-user-chip .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.rw-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--gold); color: var(--navy);
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 11px; flex-shrink: 0;
}
.rw-role-badge { background: var(--navy); color: var(--gold); font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; letter-spacing: .3px; }
.rw-app.dark .rw-role-badge { background: var(--bg); }
.rw-user-strip .rw-count { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.rw-user-strip .rw-count b { color: var(--gold); font-weight: 800; }
.rw-strip-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* ── Projects chip ── */
.rw-projects-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--gold-soft); border: 1px solid rgba(201,168,76,.4);
  color: var(--text); font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 999px; cursor: pointer;
}
.rw-projects-chip:active { transform: scale(.96); }
.rw-projects-chip b { color: var(--gold); font-weight: 800; }

/* ── Filter bar ── */
.rw-filter {
  background: var(--card-bg); padding: 8px 12px 10px;
  display: flex; gap: 6px; align-items: center;
  border-bottom: 1px solid var(--border-soft); flex-shrink: 0;
  position: relative; z-index: 5; transition: box-shadow .2s, border-color .2s;
}
.rw-filter.is-elevated { box-shadow: 0 6px 16px -10px rgba(13,27,62,.25); border-bottom-color: var(--border); }
.rw-app.dark .rw-filter.is-elevated { box-shadow: 0 6px 16px -8px rgba(0,0,0,.7); }
.rw-search-wrap { flex: 1; position: relative; }
.rw-search-wrap::before {
  content: '⌕'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-soft); font-size: 16px; pointer-events: none; font-weight: 700;
}
.rw-search {
  width: 100%; height: 38px;
  padding: 0 12px 0 32px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  font-size: 14px !important; outline: none;
}
.rw-search:focus { border-color: var(--gold); }
.rw-filter-btn {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  position: relative;
}
.rw-filter-btn .dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: var(--gold); }
.rw-new-btn {
  height: 38px; padding: 0 14px; border-radius: 10px;
  background: var(--gold); color: var(--navy); font-weight: 800; font-size: 13px;
  display: flex; align-items: center; gap: 4px; white-space: nowrap;
}
.rw-new-btn:active { transform: scale(.96); }

/* ── Content ── */
.rw-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--bg); position: relative; }
.rw-content::-webkit-scrollbar { width: 0; }

/* ── Bottom tabs ── */
.rw-tabs {
  background: var(--card-bg); border-top: 1px solid var(--border);
  display: grid; grid-template-columns: 1fr 1fr 1fr 60px;
  padding: 6px 8px max(12px, env(safe-area-inset-bottom));
  flex-shrink: 0; position: relative; z-index: 5;
}
.rw-tab {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  padding: 6px 0; color: var(--text-muted); font-size: 10px; font-weight: 700; position: relative;
}
.rw-tab .ic { font-size: 20px; line-height: 1; opacity: .65; transition: all .15s; }
.rw-tab.active { color: var(--navy); }
.rw-app.dark .rw-tab.active { color: var(--gold); }
.rw-tab.active .ic { opacity: 1; transform: scale(1.05); }
.rw-tab .badge {
  position: absolute; top: 2px; right: 50%; transform: translateX(18px);
  min-width: 16px; height: 16px; padding: 0 4px;
  background: var(--prio-high); color: #fff; border-radius: 8px;
  font-size: 9px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; line-height: 1;
}
.rw-tab-new {
  display: flex; align-items: center; justify-content: center; align-self: center;
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--gold); color: var(--navy);
  margin: -8px auto 0; font-size: 28px; font-weight: 300;
  box-shadow: var(--shadow-gold);
}
.rw-tab-new:active { transform: scale(.94); }

/* ── Chips / pills ── */
.rw-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--bg); border: 1px solid var(--border-soft);
  color: var(--text); padding: 2px 8px; border-radius: 999px;
  font-size: 10.5px; font-weight: 600; white-space: nowrap; line-height: 1.5;
}
.rw-chip.is-project { background: var(--gold-soft); border-color: rgba(201,168,76,.4); color: var(--text); }
.rw-chip.is-due { background: var(--status-doing-soft); border-color: rgba(52,152,219,.3); }
.rw-chip.is-overdue { background: rgba(231,76,60,.12); border-color: rgba(231,76,60,.4); color: var(--prio-high); }
.rw-chip.is-urgent { background: rgba(192,30,30,.14); border-color: rgba(192,30,30,.5); color: #b71c1c; font-weight: 700; }
.rw-app.dark .rw-chip.is-urgent { background: rgba(255,90,90,.18); border-color: rgba(255,90,90,.5); color: #ff7878; }
.rw-chip.is-soon { background: rgba(255,193,7,.18); border-color: rgba(255,193,7,.55); color: #8a5a00; font-weight: 700; }
.rw-app.dark .rw-chip.is-soon { color: #ffd54f; }
.rw-status-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 999px;
  font-size: 10.5px; font-weight: 700; color: #fff; white-space: nowrap; line-height: 1.6;
}
.rw-status-pill.Todo { background: var(--status-todo); }
.rw-status-pill.Doing { background: var(--status-doing); }
.rw-status-pill.Review { background: var(--status-review); }
.rw-status-pill.Done { background: var(--status-done); }
.rw-status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.7); }
.rw-prio-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.rw-prio-dot.High { background: var(--prio-high); box-shadow: 0 0 0 3px rgba(231,76,60,.18); }
.rw-prio-dot.Med  { background: var(--prio-med);  box-shadow: 0 0 0 3px rgba(243,156,18,.18); }
.rw-prio-dot.Low  { background: var(--prio-low);  box-shadow: 0 0 0 3px rgba(52,152,219,.18); }

/* ── Section title ── */
.rw-section-title { font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin: 14px 14px 8px; }

/* ── Empty state ── */
.rw-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; gap: 12px; }
.rw-empty-art { width: 120px; height: 120px; opacity: .9; }
.rw-empty-title { font-size: 15px; font-weight: 700; color: var(--text); }
.rw-empty-sub { font-size: 12px; color: var(--text-muted); max-width: 240px; line-height: 1.6; }
.rw-empty-cta { margin-top: 8px; background: var(--gold); color: var(--navy); padding: 9px 18px; border-radius: 10px; font-weight: 800; font-size: 12px; }

/* ── Task Card ── */
.rw-task-wrap { position: relative; overflow: hidden; border-radius: 12px; }
.rw-swipe-reveal {
  position: absolute; inset: 0;
  display: flex; align-items: center; padding-left: 16px;
  color: #fff; font-weight: 800; font-size: 12px;
  opacity: 0; transition: opacity .15s; border-radius: 12px;
  pointer-events: none;
}
.rw-swipe-reveal.next-Doing { background: linear-gradient(90deg, var(--status-doing) 0%, var(--status-doing) 70%, transparent 100%); }
.rw-swipe-reveal.next-Review { background: linear-gradient(90deg, var(--status-review) 0%, var(--status-review) 70%, transparent 100%); }
.rw-swipe-reveal.next-Done { background: linear-gradient(90deg, var(--status-done) 0%, var(--status-done) 70%, transparent 100%); }
.rw-task-card {
  background: var(--card-bg); border-radius: 12px;
  padding: 10px 12px 11px; display: flex; flex-direction: column; gap: 6px;
  border: 1px solid var(--border-soft); box-shadow: var(--shadow-sm);
  position: relative; cursor: pointer; user-select: none; -webkit-user-select: none;
  touch-action: pan-y;
}
.rw-task-card.prio-High  { border-left: 3px solid var(--prio-high); padding-left: 11px; }
.rw-task-card.prio-Med   { border-left: 3px solid var(--prio-med);  padding-left: 11px; }
.rw-task-card.prio-Low   { border-left: 3px solid var(--prio-low);  padding-left: 11px; }
.rw-task-card.is-overdue { background: linear-gradient(180deg, rgba(231,76,60,.04), transparent 60%); }
.rw-app.dark .rw-task-card.is-overdue { background: linear-gradient(180deg, rgba(231,76,60,.10), transparent 60%); }
.rw-task-card:active { transform: scale(.985); }
.rw-task-row { display: flex; align-items: center; gap: 6px; font-size: 10.5px; color: var(--text-muted); flex-wrap: wrap; }
.rw-task-id { font-weight: 800; font-size: 10px; letter-spacing: .4px; color: var(--text-muted); }
.rw-new-pill { background: var(--gold); color: var(--navy); font-weight: 800; font-size: 9px; padding: 1px 6px; border-radius: 999px; letter-spacing: .2px; }
.rw-sub-pill { display: inline-flex; align-items: center; gap: 3px; background: var(--bg); color: var(--text-muted); font-weight: 700; font-size: 9px; padding: 2px 6px; border-radius: 999px; border: 1px solid var(--border); }
.rw-sub-pill.locked { background: rgba(243,156,18,.15); border-color: rgba(243,156,18,.4); color: #b66c00; }
.rw-app.dark .rw-sub-pill.locked { color: #ffd54f; }
.rw-task-title { font-size: 13.5px; font-weight: 700; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; margin: 0; }
.rw-task-title.clamp-1 { -webkit-line-clamp: 1; }
.rw-task-title.clamp-2 { -webkit-line-clamp: 2; }
.rw-task-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.rw-task-cover { display: flex; gap: 4px; margin-top: 6px; border-radius: 8px; overflow: hidden; }
.rw-task-cover .one { flex: 1; height: 80px; background-size: cover; background-position: center; background-color: var(--bg); position: relative; }
.rw-task-cover .one.more::after { content: attr(data-more); position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(13,27,62,.55); color: #fff; font-weight: 800; font-size: 16px; }

/* ── Kanban segmented switcher ── */
.rw-kan-segctrl {
  display: flex; gap: 4px; background: var(--card-bg);
  padding: 6px; margin: 12px 12px 8px;
  border-radius: 12px; border: 1px solid var(--border-soft);
  position: relative; box-shadow: var(--shadow-sm);
}
.rw-kan-seg {
  flex: 1; padding: 8px 4px; border-radius: 8px;
  font-size: 11px; font-weight: 700; color: var(--text-muted);
  text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2px;
  transition: all .15s; position: relative;
}
.rw-kan-seg .cnt { font-size: 16px; font-weight: 800; line-height: 1; color: var(--text); }
.rw-kan-seg .nm { font-size: 10px; letter-spacing: .3px; }
.rw-kan-seg.is-active { color: #fff; }
.rw-kan-seg.is-active .cnt { color: #fff; }
.rw-kan-seg.is-active[data-status="Todo"] { background: var(--status-todo); }
.rw-kan-seg.is-active[data-status="Doing"] { background: var(--status-doing); }
.rw-kan-seg.is-active[data-status="Review"] { background: var(--status-review); }
.rw-kan-seg.is-active[data-status="Done"] { background: var(--status-done); }
.rw-kan-seg .indot { width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 6px; right: 6px; }
.rw-kan-seg[data-status="Todo"] .indot { background: var(--status-todo); }
.rw-kan-seg[data-status="Doing"] .indot { background: var(--status-doing); }
.rw-kan-seg[data-status="Review"] .indot { background: var(--status-review); }
.rw-kan-seg[data-status="Done"] .indot { background: var(--status-done); }
.rw-kan-seg.is-active .indot { display: none; }
.rw-kan-hint { margin: 0 12px 8px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); background: var(--gold-soft); padding: 6px 10px; border-radius: 8px; border: 1px dashed rgba(201,168,76,.5); cursor: pointer; }
.rw-kan-list { padding: 0 12px 100px; display: flex; flex-direction: column; gap: 8px; }
.rw-kan-toolbar { display: flex; justify-content: space-between; align-items: center; margin: 0 12px 8px; }
.rw-kan-toolbar .count { font-size: 11px; color: var(--text-muted); font-weight: 600; }
.rw-kan-toolbar .count b { color: var(--text); font-weight: 800; }
.rw-density-tog { display: inline-flex; background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: 999px; padding: 3px; gap: 2px; }
.rw-density-tog button { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; color: var(--text-muted); }
.rw-density-tog button.is-active { background: var(--navy); color: #fff; }
.rw-app.dark .rw-density-tog button.is-active { background: var(--gold); color: var(--navy); }

/* ── Calendar ── */
.rw-cal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 14px 6px; background: var(--bg); }
.rw-cal-header .month { font-size: 17px; font-weight: 800; color: var(--text); }
.rw-cal-header .nav { display: flex; gap: 6px; }
.rw-cal-header .nav button { width: 32px; height: 32px; border-radius: 10px; background: var(--card-bg); border: 1px solid var(--border-soft); color: var(--text); display: inline-flex; align-items: center; justify-content: center; }
.rw-cal-today-btn { font-size: 11px; font-weight: 800; padding: 0 12px; height: 32px; border-radius: 10px; background: var(--gold); color: var(--navy); }
.rw-week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 12px 6px; background: var(--bg); }
.rw-wd { display: flex; flex-direction: column; align-items: center; padding: 8px 0 6px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border-soft); cursor: pointer; position: relative; }
.rw-wd .dow { font-size: 9.5px; font-weight: 700; color: var(--text-muted); letter-spacing: .5px; text-transform: uppercase; }
.rw-wd .day { font-size: 16px; font-weight: 800; color: var(--text); margin-top: 2px; line-height: 1.2; }
.rw-wd .dots { display: flex; gap: 2px; margin-top: 4px; height: 5px; }
.rw-wd .dots i { width: 4px; height: 4px; border-radius: 50%; display: inline-block; }
.rw-wd.today { border-color: var(--gold); background: var(--gold-soft); }
.rw-wd.today .day { color: var(--navy); }
.rw-app.dark .rw-wd.today .day { color: var(--gold); }
.rw-wd.selected { background: var(--navy); border-color: var(--navy); }
.rw-wd.selected .dow, .rw-wd.selected .day { color: #fff; }
.rw-wd.selected.today { background: var(--gold); border-color: var(--gold); }
.rw-wd.selected.today .dow, .rw-wd.selected.today .day { color: var(--navy); }
.rw-cal-tabs { display: flex; gap: 4px; margin: 0 12px 10px; background: var(--card-bg); border-radius: 10px; padding: 3px; border: 1px solid var(--border-soft); }
.rw-cal-tab { flex: 1; padding: 7px 0; border-radius: 7px; font-size: 11px; font-weight: 700; color: var(--text-muted); }
.rw-cal-tab.active { background: var(--gold); color: var(--navy); }
.rw-day-group { margin: 0 12px 14px; }
.rw-day-group-head { display: flex; align-items: baseline; gap: 8px; margin: 14px 0 8px; }
.rw-day-group-head .dnum { font-size: 22px; font-weight: 800; color: var(--navy); line-height: 1; }
.rw-app.dark .rw-day-group-head .dnum { color: var(--gold); }
.rw-day-group-head .dword { font-size: 12px; color: var(--text-muted); font-weight: 600; }
.rw-day-group-head .cnt { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--text-muted); }
.rw-day-group .rw-tasks { display: flex; flex-direction: column; gap: 8px; }
.rw-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--card-bg); margin: 0 12px 12px; border-radius: 14px; overflow: hidden; border: 1px solid var(--border-soft); }
.rw-cal-dow { text-align: center; font-size: 10px; font-weight: 800; color: var(--text-muted); padding: 8px 0 6px; letter-spacing: .5px; text-transform: uppercase; background: var(--bg); }
.rw-cal-day { aspect-ratio: 1; padding: 6px; display: flex; flex-direction: column; font-size: 12px; font-weight: 600; color: var(--text); border-top: 1px solid var(--border-soft); border-left: 1px solid var(--border-soft); position: relative; }
.rw-cal-day:nth-child(7n+8) { border-left: none; }
.rw-cal-day.other { color: var(--text-soft); background: var(--bg); }
.rw-cal-day.today { background: var(--gold-soft); font-weight: 800; }
.rw-cal-day.selected { background: var(--navy); color: #fff; }
.rw-cal-day.selected.today { background: var(--gold); color: var(--navy); }
.rw-cal-day .dots { margin-top: auto; display: flex; gap: 2px; }
.rw-cal-day .dots i { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }
.rw-cal-day .num { font-size: 11px; font-weight: 800; background: var(--prio-high); color: #fff; padding: 0 4px; border-radius: 999px; align-self: flex-end; min-width: 16px; text-align: center; line-height: 1.4; }

/* ── Dashboard ── */
.rw-dash { padding: 14px 12px 100px; }
.rw-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.rw-stat-card { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: 14px; padding: 12px; display: flex; flex-direction: column; gap: 4px; position: relative; overflow: hidden; }
.rw-stat-card .label { font-size: 10px; font-weight: 800; color: var(--text-muted); letter-spacing: .5px; text-transform: uppercase; }
.rw-stat-card .value { font-size: 28px; font-weight: 800; line-height: 1; color: var(--text); }
.rw-stat-card .sub { font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }
.rw-stat-card .ic { position: absolute; top: 10px; right: 10px; width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; }
.rw-stat-card.info .ic { background: var(--status-doing); } .rw-stat-card.info .value { color: var(--status-doing); }
.rw-stat-card.success .ic { background: var(--status-done); } .rw-stat-card.success .value { color: var(--status-done); }
.rw-stat-card.danger .ic { background: var(--prio-high); } .rw-stat-card.danger .value { color: var(--prio-high); }
.rw-stat-card.warning .ic { background: var(--status-review); } .rw-stat-card.warning .value { color: var(--status-review); }
.rw-card { background: var(--card-bg); border: 1px solid var(--border-soft); border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
.rw-card-head { padding: 12px 14px 10px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-soft); }
.rw-card-head h3 { font-size: 13px; font-weight: 800; margin: 0; flex: 1; }
.rw-card-head .sub { font-size: 11px; color: var(--text-muted); }
.rw-card-body { padding: 12px 14px; }
.rw-dash-chart { display: flex; align-items: flex-end; gap: 6px; height: 120px; padding: 16px 14px 4px; }
.rw-bar { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 6px; }
.rw-bar .col { width: 100%; background: linear-gradient(180deg, var(--gold), var(--gold-light)); border-radius: 6px 6px 0 0; position: relative; min-height: 4px; transition: height .4s ease; }
.rw-bar.today .col { background: linear-gradient(180deg, var(--navy), var(--navy-light)); }
.rw-bar .col .v { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 800; color: var(--text); }
.rw-bar .lbl { font-size: 10px; font-weight: 700; color: var(--text-muted); }
.rw-bar.today .lbl { color: var(--text); font-weight: 800; }
.rw-dash-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-soft); cursor: pointer; }
.rw-dash-row:last-child { border-bottom: none; }
.rw-dash-row .body { flex: 1; min-width: 0; }
.rw-dash-row .title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.rw-dash-row .meta { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.rw-workload-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border-soft); }
.rw-workload-row:last-child { border-bottom: none; }
.rw-workload-info { flex: 1; min-width: 0; }
.rw-workload-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
.rw-workload-head .name { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rw-workload-head .counts { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
.rw-workload-head .counts b { color: var(--text); font-weight: 800; }
.rw-workload-head .counts .overdue { color: var(--prio-high); font-weight: 700; }
.rw-workload-bar { height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-bottom: 5px; border: 1px solid var(--border-soft); }
.rw-workload-bar .fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--prio-high)); transition: width .3s; }
.rw-workload-breakdown { display: flex; gap: 6px; flex-wrap: wrap; font-size: 10px; font-weight: 700; }
.rw-workload-breakdown .seg { padding: 1px 6px; border-radius: 6px; }
.rw-workload-breakdown .seg.doing { background: var(--status-doing-soft); color: var(--status-doing); }
.rw-workload-breakdown .seg.review { background: rgba(243,156,18,.15); color: #b66c00; }
.rw-app.dark .rw-workload-breakdown .seg.review { color: #ffb84d; }
.rw-workload-breakdown .seg.done { background: rgba(46,204,113,.15); color: var(--status-done); }

/* ── Bottom sheet ── */
.rw-sheet-backdrop { position: fixed; inset: 0; background: rgba(13,27,62,.45); z-index: 100; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); animation: rw-fade-in .2s ease; }
@keyframes rw-fade-in { from { opacity: 0; } to { opacity: 1; } }
.rw-sheet { background: var(--card-bg); width: 100%; max-width: 600px; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; overflow: hidden; animation: rw-sheet-up .26s cubic-bezier(.2,.7,.3,1.1); border-top: 3px solid var(--gold); max-height: 100dvh; }
@keyframes rw-sheet-up { from { transform: translateY(60px); opacity: .4; } to { transform: translateY(0); opacity: 1; } }
.rw-sheet-grip { width: 36px; height: 4px; background: var(--border); border-radius: 999px; margin: 8px auto 0; flex-shrink: 0; }
.rw-sheet-head { padding: 8px 16px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-soft); flex-shrink: 0; }
.rw-sheet-head h3 { flex: 1; font-size: 15px; font-weight: 800; margin: 0; color: var(--text); }
.rw-sheet-close { width: 32px; height: 32px; border-radius: 50%; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; font-weight: 600; }
.rw-sheet-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.rw-sheet-body::-webkit-scrollbar { width: 0; }

/* ── Task Detail sheet ── */
.rw-td-cover { background: linear-gradient(135deg, var(--navy), var(--navy-mid)); color: #fff; padding: 14px 16px 16px; position: relative; }
.rw-td-id-row { display: flex; align-items: center; gap: 8px; font-size: 10.5px; color: rgba(255,255,255,.7); font-weight: 700; letter-spacing: .5px; margin-bottom: 6px; }
.rw-td-title { font-size: 18px; font-weight: 800; line-height: 1.3; color: #fff; margin: 0 0 10px; }
.rw-td-cover .chips { display: flex; flex-wrap: wrap; gap: 5px; }
.rw-td-cover .rw-chip { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.18); color: #fff; }
.rw-td-cover .rw-chip.is-overdue { background: rgba(231,76,60,.25); color: #fff; border-color: rgba(231,76,60,.6); }
.rw-td-tabs { display: flex; gap: 0; background: var(--card-bg); border-bottom: 1px solid var(--border-soft); position: sticky; top: 0; z-index: 2; }
.rw-td-tab { flex: 1; padding: 12px 0; font-size: 12px; font-weight: 700; color: var(--text-muted); position: relative; }
.rw-td-tab.active { color: var(--navy); }
.rw-app.dark .rw-td-tab.active { color: var(--gold); }
.rw-td-tab.active::after { content: ''; position: absolute; left: 20%; right: 20%; bottom: 0; height: 2.5px; background: var(--gold); border-radius: 2px 2px 0 0; }
.rw-td-tab .ct { background: var(--bg); color: var(--text-muted); border-radius: 999px; padding: 0 6px; margin-left: 4px; font-size: 10px; font-weight: 800; }
.rw-td-section { padding: 14px 16px; }
.rw-td-section h4 { font-size: 10px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase; color: var(--text-muted); margin: 0 0 8px; }
.rw-td-desc { font-size: 13.5px; line-height: 1.6; color: var(--text); white-space: pre-wrap; }
.rw-td-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; padding: 14px 16px; background: var(--bg); border-radius: 12px; margin: 0 16px; }
.rw-td-meta-grid .it { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.rw-td-meta-grid .lbl { font-size: 9.5px; font-weight: 800; color: var(--text-muted); letter-spacing: .5px; text-transform: uppercase; }
.rw-td-meta-grid .val { font-size: 12.5px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 5px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rw-td-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.rw-td-gallery .one { aspect-ratio: 1; background-size: cover; background-position: center; background-color: var(--bg); border-radius: 8px; cursor: pointer; }
.rw-td-cta { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 12px; background: var(--gold); color: var(--navy); border-radius: 12px; font-weight: 800; font-size: 14px; box-shadow: var(--shadow-gold); }
.rw-td-cta:active { transform: scale(.98); }
.rw-td-cta.is-Doing { background: var(--status-doing); color: #fff; }
.rw-td-cta.is-Done { background: var(--status-done); color: #fff; }
.rw-td-locked { display: flex; align-items: center; gap: 10px; padding: 14px; background: rgba(243,156,18,.08); border: 1.5px dashed rgba(243,156,18,.5); border-radius: 12px; color: var(--text-muted); font-size: 12px; }
.rw-td-link { display: inline-flex; align-items: center; gap: 6px; background: rgba(52,152,219,.12); color: var(--status-doing); padding: 8px 14px; border-radius: 10px; font-weight: 700; font-size: 12px; }

/* Timeline */
.rw-tl { position: relative; padding-left: 24px; }
.rw-tl::before { content: ''; position: absolute; left: 9px; top: 6px; bottom: 6px; width: 2px; background: var(--border); }
.rw-tl-item { position: relative; padding: 8px 0 12px; }
.rw-tl-item::before { content: ''; position: absolute; left: -18px; top: 12px; width: 10px; height: 10px; border-radius: 50%; background: var(--gold); border: 2.5px solid var(--card-bg); box-shadow: 0 0 0 1px var(--gold); }
.rw-tl-head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.rw-tl-author { font-weight: 800; font-size: 12px; color: var(--text); }
.rw-tl-time { font-size: 10.5px; color: var(--text-muted); }
.rw-tl-change { background: var(--gold-soft); color: var(--navy); font-size: 10px; font-weight: 800; padding: 1px 6px; border-radius: 4px; letter-spacing: .2px; }
.rw-app.dark .rw-tl-change { color: var(--gold); }
.rw-tl-msg { font-size: 13px; line-height: 1.6; color: var(--text); white-space: pre-wrap; }
.rw-tl-thumb { width: 80px; height: 80px; background-size: cover; background-position: center; border-radius: 8px; margin-top: 6px; cursor: pointer; border: 1px solid var(--border); }
.rw-update-bar { position: sticky; bottom: 0; background: var(--card-bg); border-top: 1px solid var(--border); padding: 10px 14px max(10px, env(safe-area-inset-bottom)); display: flex; align-items: center; gap: 8px; z-index: 3; }
.rw-update-bar input { flex: 1; height: 38px; padding: 0 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); font-size: 13px !important; outline: none; color: var(--text); }
.rw-update-bar .ic-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; font-size: 16px; }
.rw-update-bar .send { background: var(--gold); color: var(--navy); }

/* Subtasks */
.rw-subtask-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.rw-subtask-add { display: inline-flex; align-items: center; gap: 4px; background: var(--gold); color: var(--navy); border-radius: 999px; padding: 5px 12px 5px 10px; font-size: 12px; font-weight: 800; box-shadow: var(--shadow-gold); }
.rw-subtask-add:active { transform: scale(.95); }
.rw-subtask-empty { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; background: var(--gold-soft); border: 1.5px dashed rgba(201,168,76,.5); color: var(--text-muted); cursor: pointer; transition: background .15s; }
.rw-subtask-empty:hover { background: rgba(201,168,76,.18); }
.rw-subtask-progress { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.rw-subtask-progress .bar { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
.rw-subtask-progress .fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--status-done)); transition: width .3s; }
.rw-subtask-progress .pct { font-size: 11px; font-weight: 800; color: var(--text-muted); letter-spacing: .3px; min-width: 32px; text-align: right; }
.rw-subtask-list { display: flex; flex-direction: column; gap: 6px; }
.rw-subtask-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; }
.rw-subtask-row:hover { border-color: var(--gold); }
.rw-subtask-row:active { transform: scale(.99); }
.rw-subtask-row .info { flex: 1; min-width: 0; }
.rw-subtask-row .t { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rw-subtask-row .t.done { text-decoration: line-through; opacity: .6; }
.rw-subtask-row .m { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
.rw-check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; background: var(--card-bg); font-size: 11px; font-weight: 800; }
.rw-check.is-done { background: var(--status-done); border-color: var(--status-done); }

/* ── New Task / Form fields ── */
.rw-field { margin-bottom: 12px; }
.rw-field label { font-size: 10px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 5px; }
.rw-field input, .rw-field select, .rw-field textarea { width: 100%; height: 42px; padding: 0 12px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
.rw-field textarea { height: auto; padding: 10px 12px; min-height: 72px; font-size: 14px !important; resize: vertical; }
.rw-field input:focus, .rw-field select:focus, .rw-field textarea:focus { border-color: var(--gold); }
.rw-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.rw-prio-tog, .rw-status-tog { display: flex; gap: 6px; }
.rw-prio-tog button, .rw-status-tog button { flex: 1; height: 38px; border-radius: 10px; font-size: 11.5px; font-weight: 700; background: var(--bg); border: 1.5px solid var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 6px; }
.rw-prio-tog button.is-active.High { background: rgba(231,76,60,.12); border-color: var(--prio-high); color: var(--prio-high); }
.rw-prio-tog button.is-active.Med { background: rgba(243,156,18,.14); border-color: var(--prio-med); color: #b66c00; }
.rw-prio-tog button.is-active.Low { background: rgba(52,152,219,.12); border-color: var(--prio-low); color: var(--prio-low); }
.rw-app.dark .rw-prio-tog button.is-active.Med { color: var(--prio-med); }
.rw-status-tog button.is-active { background: var(--navy); color: #fff; border-color: var(--navy); }
.rw-app.dark .rw-status-tog button.is-active { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.rw-chip-picker { display: flex; flex-wrap: nowrap; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 2px 2px 4px; margin: 0 -2px; }

function decodeJwtPayload(token) {
  const parts = String(token||'').split('.');
  if (parts.length < 2) throw new Error('JWT format invalid');
  let b64 = parts[1].replace(/-/g,'+').replace(/_/g,'/');
  const pad = (4 - b64.length % 4) % 4;
  if (pad) b64 += '='.repeat(pad);
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return JSON.parse(new TextDecoder('utf-8').decode(bytes));
}
function normalizeEmail(s) { return String(s||'').replace(/[​‌‍﻿]/g,'').replace(/\s+/g,'').toLowerCase(); }

function parseCsv(text) {
  if (!text) return [];
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = []; let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i+1]==='"'){cell+='"';i++;} else inQ=false; }
      else cell += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(cell); cell=''; }
      else if (ch === '\r') {}
      else if (ch === '\n') { row.push(cell); rows.push(row); row=[]; cell=''; }
      else cell += ch;
    }
  }
  if (cell.length || row.length) { row.push(cell); rows.push(row); }
  if (!rows.length) return [];
  const clean = s => String(s||'').replace(/[​‌‍﻿]/g,'').replace(/ /g,' ').trim();
  const headers = rows[0].map(clean);
  return rows.slice(1).filter(r => r.some(c => clean(c))).map(r => Object.fromEntries(headers.map((k,i) => [k, clean(r[i])])));
}

  showSpinner('กำลังตรวจสอบ…');
  try {
    const email = normalizeEmail(decodeJwtPayload(r.credential).email);
    const url = `https://docs.google.com/spreadsheets/d/${CFG.usersSheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(CFG.usersSheetName)}`;
    const res = await fetch(url);
    const users = parseCsv(await res.text());
    const user = users.find(u => normalizeEmail(u['E-mail']) === email);
    if (!user) { showLoginError('Email ไม่พบใน Users Sheet — แจ้ง Admin'); return; }
    if (String(user['Status']||'').trim().toLowerCase() !== 'active') { showLoginError('Account suspended — แจ้ง Admin'); return; }
    APP.user = {
      email,
      name: user['ชื่อ - สกุล'] || '',
      role: parseInt(user['User Role']) || 1,
      dept: user['แผนก'] || '',
      warehouse: user['W'] || '',
    };
    saveSession(APP.user);
    enterApp();
  } catch (e) {
    console.error(e);
    showLoginError('Error: ' + e.message);
  } finally {
    hideSpinner();
  }
}

function saveSession(u) {
  const payload = { data: u, exp: Date.now() + 30*24*60*60*1000 };
  localStorage.setItem(SESSION_KEY, JSON.stringify(payload));
  localStorage.setItem(LEGACY_SESSION_KEY, JSON.stringify(payload));
}

function checkSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY) || localStorage.getItem(LEGACY_SESSION_KEY);
    if (!raw) return null;
    const { data, exp } = JSON.parse(raw);
    if (!data?.email || !exp || Date.now() > exp) {
      localStorage.removeItem(SESSION_KEY);
      localStorage.removeItem(LEGACY_SESSION_KEY);
      return null;
    }
    return data;
  } catch { return null; }
}

function logout() {
  localStorage.removeItem(SESSION_KEY);
  localStorage.removeItem(LEGACY_SESSION_KEY);
  location.reload();
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 6000);
}

function enterApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  loadAllUsers();
  loadData();
}

async function loadAllUsers() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${CFG.usersSheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(CFG.usersSheetName)}`;
    const res = await fetch(url);
    const rows = parseCsv(await res.text());
    APP.allUsers = rows
      .filter(r => String(r['Status']||'').trim().toLowerCase() === 'active')
      .map(r => {
        const email = normalizeEmail(r['E-mail']);
        return {
          email,
          name: (r['ชื่อ - สกุล'] || '').trim() || email.split('@')[0],
          role: parseInt(r['User Role']) || 1,
          dept: (r['แผนก'] || '').trim(),
          warehouse: (r['W'] || '').trim(),
        };
      })
      .filter(u => u.email)
      .sort((a, b) => a.name.localeCompare(b.name, 'th'));
  } catch (e) {
    console.error('loadAllUsers failed', e);
    APP.allUsers = [];
  }
}

/* ═════════════════════════════════════════════════════════════
   GAS CALL
═════════════════════════════════════════════════════════════ */
async function callGas(action, extra = {}) {
  if (CFG.gasUrl.startsWith('PASTE_')) throw new Error('ยังไม่ได้ตั้ง gasUrl ใน CONFIG');
  const body = JSON.stringify({ action, email: APP.user.email, ...extra });
  const res = await fetch(CFG.gasUrl, {
    method: 'POST',
    body,
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    redirect: 'follow',
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'unknown error');
  return json;
}

async function loadData() {
  showSpinner('โหลดข้อมูล…');
  try {
    const r = await callGas('list');
    APP.tasks = r.tasks || [];
    APP.updates = r.updates || [];
    render();
    showToast(`โหลด ${APP.tasks.length} งาน · ${APP.updates.length} updates`);
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    hideSpinner();
  }
}

async function refreshData() {
  const b = document.getElementById('btnRefresh');
  b.disabled = true; b.style.transform = 'rotate(360deg)'; b.style.transition = 'transform .6s';
  await loadData();
  setTimeout(() => { b.disabled = false; b.style.transform = ''; b.style.transition = ''; }, 600);
}

/* ═════════════════════════════════════════════════════════════
   HELPERS
═════════════════════════════════════════════════════════════ */
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function ymd(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function dueLabel(d) {
  if (!d) return null;
  const s = String(d).slice(0,10);
  const [y,m,day] = s.split('-').map(Number);
  if (!y) return s;
  return `${y}/${String(m).padStart(2,'0')}/${String(day).padStart(2,'0')}`;
}
function daysUntil(d) {
  if (!d) return null;
  const a = new Date(String(d).slice(0,10)+'T00:00:00');
  return Math.round((a - TODAY) / 86400000);
}
function isOverdue(t) {
  const d = t['Due Date'];
  return d && String(d).slice(0,10) < todayStr() && t['Status'] !== 'Done';
}
function dueMeta(t) {
  const d = t['Due Date'];
  if (!d) return null;
  if (t['Status'] === 'Done') return { label: dueLabel(d), cls: '' };
  const diff = daysUntil(d);
  if (diff < 0) return { label: `เลย ${Math.abs(diff)} วัน`, cls: 'is-overdue' };
  if (diff === 0) return { label: 'วันนี้', cls: 'is-urgent' };
  if (diff === 1) return { label: 'พรุ่งนี้', cls: 'is-urgent' };
  if (diff <= 3) return { label: `${dueLabel(d)} · อีก ${diff} วัน`, cls: 'is-urgent' };
  if (diff <= 7) return { label: `${dueLabel(d)} · อีก ${diff} วัน`, cls: 'is-soon' };
  return { label: dueLabel(d), cls: 'is-due' };
}
function formatThaiDateTime(input) {
  if (!input) return '-';
  const d = input instanceof Date ? input : new Date(input);
  if (isNaN(d)) return String(input);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = d.getFullYear() + 543;
  const hh = String(d.getHours()).padStart(2,'0');
  const mn = String(d.getMinutes()).padStart(2,'0');
  return `${dd}/${mm}/${yy} ${hh}.${mn}`;
}
function nextStatus(s) { return STATUSES[Math.min(STATUSES.indexOf(s) + 1, 3)]; }

function canEdit(t) {
  if (APP.user.role >= 5) return true;
  return [t['Assignee'], t['Created By'], t['Project Owner']].some(e => normalizeEmail(e) === APP.user.email);
}
function canApprove(t) { return APP.user.role >= 6; }
function isLocked(t) {
  const need = ACTION_MIN_ROLE[t['Status']] || 1;
  return APP.user.role < need;
}

// Decorate a user with initials + stable color
function decorateUser(u) {
  const e = u.email || '';
  const initials = (u.name || e.split('@')[0]).slice(0,2);
  let hash = 0; for (const ch of e) hash = (hash * 31 + ch.charCodeAt(0)) | 0;
  const color = AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
  return { ...u, initials, color };
}

// All known users — prefer Users sheet (full directory); fallback to people seen in tasks
function getUserList() {
  if (APP.allUsers && APP.allUsers.length > 0) {
    return APP.allUsers.map(decorateUser);
  }
  // Fallback: derive from tasks
  const map = new Map();
  APP.tasks.forEach(t => {
    [t['Assignee'], t['Project Owner'], t['Created By']].forEach(e => {
      if (e && !map.has(e)) {
        map.set(e, decorateUser({ email: e, name: e.split('@')[0], role: 0, dept: '', warehouse: '' }));
      }
    });
  });
  if (APP.user && !map.has(APP.user.email)) {
    map.set(APP.user.email, decorateUser({ email: APP.user.email, name: APP.user.name || APP.user.email, role: APP.user.role || 0, dept: APP.user.dept || '', warehouse: APP.user.warehouse || '' }));
  }
  return [...map.values()];
}

// Outcomes helper
function outcomesOf(t) {
  return String(t['Outcome Category']||'').split(',').map(s => s.trim()).filter(Boolean).filter(k => OUTCOMES[k]);
}

function userOf(email) {
  if (!email) return { email: '', name: '', initials: '?', color: '#94a3b8' };
  const list = getUserList();
  return list.find(u => normalizeEmail(u.email) === normalizeEmail(email)) || { email, name: email.split('@')[0], initials: (email[0]||'?').toUpperCase(), color: '#94a3b8' };
}

function avatarHtml(email, size = 24) {
  const u = userOf(email);
  return `<span class="rw-avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.42)}px;background:${u.color};color:#fff">${escapeHtml(u.initials)}</span>`;
}

function coverImgUrl(url) {
  if (!url) return '';
  const m = String(url).match(/drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?(?:export=view&)?id=|thumbnail\?id=)([^/?&]+)/);
  if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;
  return url;
}

function imagesOf(t) {
  const raw = t['Images'] || '';
  return String(raw).split(',').map(s => s.trim()).filter(Boolean);
}

function subtasksOf(parentId) {
  return APP.tasks.filter(t => t['Parent'] === parentId);
}

/* ═════════════════════════════════════════════════════════════
   FILTERS
═════════════════════════════════════════════════════════════ */
function filteredTasks() {
  const q = APP.query.toLowerCase().trim();
  return APP.tasks.filter(t => {
    if (t['Parent']) return false; // hide subtasks from top-level views
    if (APP.filterOutcome) {
      if (!outcomesOf(t).includes(APP.filterOutcome)) return false;
    }
    if (APP.filterProject && t['Project'] !== APP.filterProject) return false;
    if (q) {
      const hay = `${t['Title']} ${t['Description']} ${t['Project']} ${t['Assignee']} ${t['Tags']} ${t['Measurement']}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function projectsList() {
  return [...new Set(APP.tasks.map(t => t['Project']).filter(Boolean))].sort();
}

function activeFilterCount() {
  return (APP.filterOutcome ? 1 : 0) + (APP.filterProject ? 1 : 0);
}

function onSearch(v) {
  APP.query = v;
  render();
}

/* ═════════════════════════════════════════════════════════════
   RENDER — top-level
═════════════════════════════════════════════════════════════ */
function render() {
  renderUserStrip();
  renderFilterDot();
  renderBadges();
  document.querySelectorAll('.rw-tab[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === APP.view));
  if (APP.view === 'kanban') renderKanban();
  else if (APP.view === 'calendar') renderCalendar();
  else if (APP.view === 'dashboard') renderDashboard();
}

function renderUserStrip() {
  const u = APP.user;
  const filtered = filteredTasks();
  const projects = projectsList();
  const filterLabel = activeFilterCount() > 0 ? ` · ${activeFilterCount()} filter` : '';
  document.getElementById('userStrip').innerHTML = `
    <span class="rw-user-chip">
      ${avatarHtml(u.email, 26)}
      <span class="name">${escapeHtml(u.name || u.email)}</span>
      <span class="rw-role-badge">R${u.role}</span>
    </span>
    <span class="rw-strip-right">
      <button class="rw-projects-chip" onclick="openProjects()">📁 <b>${projects.length}</b> projects</button>
      <span class="rw-count"><b>${filtered.length}</b> งาน${filterLabel}</span>
    </span>

}

function renderFilterDot() {
  const dot = document.getElementById('filterDot');
  dot.style.display = activeFilterCount() > 0 ? 'block' : 'none';
}

function renderBadges() {
  const overdue = APP.tasks.filter(t => !t['Parent'] && isOverdue(t)).length;
  const b = document.getElementById('badge-kanban');
  if (overdue > 0) { b.textContent = overdue; b.style.display = 'flex'; }

function setView(v) {
  APP.view = v;
  render();
  document.getElementById('content').scrollTo({ top: 0, behavior: 'smooth' });
}

/* ═════════════════════════════════════════════════════════════
   KANBAN
═════════════════════════════════════════════════════════════ */
function setKanbanCol(s) { APP.kanbanCol = s; renderKanban(); }
function setDensity(d) { APP.density = d; localStorage.setItem(DENSITY_KEY, d); renderKanban(); }
function dismissHint() {
  APP.showHint = false;
  localStorage.setItem(KAN_HINT_KEY, '1');
  renderKanban();
}

const _mqPc = window.matchMedia('(min-width: 1024px)');
_mqPc.addEventListener('change', () => { if (APP.view === 'kanban') renderKanban(); });

function renderKanban() {
  const filtered = filteredTasks();
  const byStatus = { Todo: [], Doing: [], Review: [], Done: [] };
  filtered.forEach(t => { (byStatus[t['Status']] || byStatus.Todo).push(t); });
  if (_mqPc.matches) renderKanbanPc(byStatus);
  else renderKanbanMobile(byStatus);
}

function renderKanbanMobile(byStatus) {
  const col = APP.kanbanCol;
  const list = byStatus[col];

  const segs = STATUSES.map(s => `
    <button class="rw-kan-seg ${col === s ? 'is-active' : ''}" data-status="${s}" onclick="setKanbanCol('${s}')">
      <span class="indot"></span>
      <span class="cnt">${byStatus[s].length}</span>
      <span class="nm">${STATUS_LABEL[s]}</span>
    </button>
  `).join('');

  const hint = APP.showHint && col !== 'Done' && list.length > 0 ? `
    <div class="rw-kan-hint" onclick="dismissHint()">
      <span>👉</span>
      <span>ปัดการ์ดไปขวาเพื่อ <b>${NEXT_ACTION[col]}</b></span>
      <span style="margin-left:auto;color:var(--text-muted);font-size:14px">×</span>
    </div>
  ` : '';

  const cards = list.length === 0
    ? emptyState(col === 'Done' ? 'done' : 'tasks',
        col === 'Done' ? 'ยังไม่มีงานที่เสร็จ' : `ยังไม่มีงานใน ${STATUS_LABEL[col]}`,
        col === 'Todo' ? 'สร้างงานใหม่ — มอบหมายให้ทีม' : 'งานจะมาที่นี่เมื่อสถานะถูกเปลี่ยน',
        col === 'Todo' ? '+ สร้างงานใหม่' : null,
        col === 'Todo' ? 'openNewTask()' : null
      )
    : list.map((t, i) => taskCardHtml(t, { density: APP.density, idx: i, swipe: true })).join('');

  document.getElementById('content').innerHTML = `
    <div id="kanWrap" class="rw-kan-mobile">
      <div class="rw-kan-segctrl">${segs}</div>
      <div class="rw-kan-toolbar">
        <span class="count"><b>${list.length}</b> งานใน <b>${STATUS_LABEL[col]}</b></span>
        <div class="rw-density-tog">
          <button class="${APP.density === 'compact' ? 'is-active' : ''}" onclick="setDensity('compact')">กะทัดรัด</button>
          <button class="${APP.density === 'comfortable' ? 'is-active' : ''}" onclick="setDensity('comfortable')">ปกติ</button>
        </div>
      </div>
      ${hint}
      <div class="rw-kan-list">${cards}</div>
    </div>
  `;

  list.forEach(t => {
    const card = document.querySelector(`[data-card-id="${t['ID']}"]`);
    if (card) attachSwipe(card, t);
  });
  attachColSwipe(document.getElementById('kanWrap'));
}

function renderKanbanPc(byStatus) {
  const cols = STATUSES.map(s => {
    const list = byStatus[s];
    const cards = list.length === 0
      ? '<div class="rw-col-empty">— ว่าง —</div>'
      : list.map(t => taskCardHtml(t, { density: APP.density, swipe: false })).join('');
    return `
      <div class="rw-kan-col-pc" data-status="${s}"
        ondragover="onColDragOver(event)" ondragleave="onColDragLeave(event)" ondrop="onColDrop(event)">
        <div class="rw-kan-col-head-pc">
          <span class="dot status-${s}"></span>
          <span class="nm">${STATUS_LABEL[s]}</span>
          <span class="cnt">${list.length}</span>
        </div>
        <div class="rw-kan-col-body-pc">${cards}</div>
      </div>
    `;
  }).join('');

  const hint = APP.showHint ? `
    <div class="rw-kan-pc-hint" onclick="dismissHint()">
      <span>🖱️</span>
      <span>ลากการ์ดข้าม column เพื่อเปลี่ยน status (Trello-style)</span>
      <span style="margin-left:auto;color:var(--text-muted);font-size:14px">×</span>
    </div>
  ` : '';

  document.getElementById('content').innerHTML = `
    <div class="rw-kan-pc">
      ${hint}
      ${cols}
    </div>
  `;

  // Attach drag handlers
  document.querySelectorAll('.rw-kan-pc [data-card-id]').forEach(card => {
    const id = card.dataset.cardId;
    const task = APP.tasks.find(t => t['ID'] === id);
    if (!task) return;
    const need = ACTION_MIN_ROLE[task['Status']] || 1;
    const locked = task['Status'] === 'Done' || APP.user.role < need;
    if (locked) {
      card.classList.add('locked-drag');
      return;
    }
    attachDrag(card, task);
  });
}

function attachDrag(card, task) {
  card.draggable = true;
  card.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', task['ID']);
    e.dataTransfer.effectAllowed = 'move';
    card.classList.add('is-dragging');
  });
  card.addEventListener('dragend', () => card.classList.remove('is-dragging'));
}

function onColDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onColDragLeave(e) {
  if (e.currentTarget === e.target || !e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}
function onColDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const taskId = e.dataTransfer.getData('text/plain');
  const newStatus = e.currentTarget.dataset.status;
  const task = APP.tasks.find(t => t['ID'] === taskId);
  if (!task || task['Status'] === newStatus) return;
  const need = ACTION_MIN_ROLE[task['Status']] || 1;
  if (APP.user.role < need) {
    showToast(`⛔ ต้องเป็น R${need}+ จึงจะอนุมัติได้`, 'warn');
    return;
  }
  quickMove(taskId, newStatus, task['Status']);
}

function taskCardHtml(t, opts = {}) {
  const { density = 'comfortable', swipe = false, showStatus = false } = opts;
  const compact = density === 'compact';
  const due = dueMeta(t);
  const overdue = isOverdue(t);
  const locked = isLocked(t);
  const imgs = imagesOf(t);
  const cover = t['Cover Image URL'];
  const showCover = !compact && (imgs.length > 0 || cover);
  const allImgs = imgs.length > 0 ? imgs : (cover ? [cover] : []);
  const subs = subtasksOf(t['ID']);
  const subsDone = subs.filter(s => s['Status'] === 'Done').length;
  const outs = outcomesOf(t);
  const primary = outs[0] || '';
  const meas = String(t['Measurement']||'').trim();

  const reveal = swipe && t['Status'] !== 'Done' && !locked ? `
    <div class="rw-swipe-reveal next-${nextStatus(t['Status'])}" data-reveal>
      → ${NEXT_ACTION[t['Status']]}
    </div>
  ` : '';

  const assigneeName = userOf(t['Assignee']).name;

  return `
    <div class="rw-task-wrap">
      ${reveal}
      <article class="rw-task-card ${overdue ? 'is-overdue' : ''} ${primary ? 'out-' + primary : ''}"
        data-card-id="${escapeHtml(t['ID'])}"
        onclick="openTaskDetail('${escapeHtml(t['ID'])}')">
        <div class="rw-task-row">
          <span class="rw-task-id">${escapeHtml(t['ID'])}</span>
          ${outs.length > 0 ? outs.map(k => `<span class="rw-chip rw-out rw-out-${k}" title="${OUTCOMES[k].label}">${OUTCOMES[k].icon}</span>`).join('') : ''}
          ${subs.length > 0 ? `<span class="rw-sub-pill" title="งานย่อย">🌿 ${subsDone}/${subs.length}</span>` : ''}
          ${allImgs.length > 0 ? `<span class="rw-sub-pill" title="รูปประกอบ">📷 ${allImgs.length}</span>` : ''}
          ${locked && t['Status'] === 'Review' ? `<span class="rw-sub-pill locked" title="ต้องผู้จัดการอนุมัติ">🔒 รออนุมัติ</span>` : ''}
          ${showStatus ? `<span style="margin-left:auto"><span class="rw-status-pill ${escapeHtml(t['Status'])}"><span class="dot"></span>${STATUS_LABEL[t['Status']]}</span></span>` : ''}
        </div>
        <h4 class="rw-task-title ${compact ? 'clamp-1' : 'clamp-2'}">${escapeHtml(t['Title'])}</h4>
        ${showCover && allImgs.length > 0 ? `
          <div class="rw-task-cover">
            ${allImgs.slice(0,3).map((src, i) => `
              <div class="one ${i === 2 && allImgs.length > 3 ? 'more' : ''}"
                data-more="+${allImgs.length - 3}"
                style="background-image:url('${escapeHtml(coverImgUrl(src))}')"></div>
            `).join('')}
          </div>
        ` : ''}
        ${!compact && meas ? `<div class="rw-task-meas"><span class="icon">📊</span> ${escapeHtml(meas.slice(0,80))}${meas.length>80?'…':''}</div>` : ''}
        ${!compact ? `
          <div class="rw-task-meta">
            ${t['Project'] ? `<span class="rw-chip is-project">📁 ${escapeHtml(t['Project'])}</span>` : ''}
            <span class="rw-chip">${avatarHtml(t['Assignee'], 14)} ${escapeHtml(assigneeName)}</span>
            ${due ? `<span class="rw-chip ${due.cls}">📅 ${escapeHtml(due.label)}</span>` : ''}
          </div>
        ` : `
          <div class="rw-task-meta">
            ${avatarHtml(t['Assignee'], 16)}
            ${due ? `<span class="rw-chip ${due.cls}" style="font-size:10px">${escapeHtml(due.label)}</span>` : ''}
          </div>
        `}
      </article>
    </div>
  `;
}

/* ── Swipe-to-advance on cards ─────────────────────────────── */
function attachSwipe(card, task) {
  if (task['Status'] === 'Done' || isLocked(task)) return;
  const reveal = card.parentElement.querySelector('[data-reveal]');
  let startX = 0, startY = 0, dragging = false, dx = 0, suppress = false;

  const down = (e) => {
    const p = e.touches ? e.touches[0] : e;
    startX = p.clientX; startY = p.clientY; dragging = false; dx = 0; suppress = false;
    card.style.transition = 'none';
  };
  const move = (e) => {
    if (!startX && startX !== 0) return;
    const p = e.touches ? e.touches[0] : e;
    const ndx = p.clientX - startX;
    const ndy = p.clientY - startY;
    if (!dragging) {
      if (Math.abs(ndx) > 8 && Math.abs(ndx) > Math.abs(ndy)) dragging = true;
      else return;
    }
    e.preventDefault && e.preventDefault();
    dx = Math.max(-20, Math.min(180, ndx));
    card.style.transform = `translateX(${dx}px)`;
    if (reveal) reveal.style.opacity = dx > 12 ? '1' : '0';
    if (dragging) suppress = true;
  };
  const up = () => {
    if (!dragging) { startX = 0; return; }
    card.style.transition = 'transform .22s ease';
    if (dx > 90) {
      card.style.transform = 'translateX(380px)';
      const ns = nextStatus(task['Status']);
      setTimeout(() => { card.style.transform = ''; quickMove(task['ID'], ns, task['Status']); }, 220);
    } else {
      card.style.transform = '';
      if (reveal) reveal.style.opacity = '0';
    }
    startX = 0; dragging = false;
  };

  // Block click after a successful swipe
  card.addEventListener('click', (e) => { if (suppress) { e.stopPropagation(); suppress = false; } }, true);

  card.addEventListener('touchstart', down, { passive: true });
  card.addEventListener('touchmove', move, { passive: false });
  card.addEventListener('touchend', up);
  card.addEventListener('mousedown', down);
  card.addEventListener('mousemove', (e) => { if (startX) move(e); });
  card.addEventListener('mouseup', up);
  card.addEventListener('mouseleave', () => { if (startX) up(); });
}

function attachColSwipe(wrap) {
  if (!wrap) return;
  let startX = 0, startY = 0, locked = null;
  wrap.addEventListener('touchstart', (e) => {
    const p = e.touches[0]; startX = p.clientX; startY = p.clientY; locked = null;
  }, { passive: true });
  wrap.addEventListener('touchmove', (e) => {
    if (!startX) return;
    const p = e.touches[0];
    const dx = p.clientX - startX, dy = p.clientY - startY;
    if (!locked && (Math.abs(dx) > 12 || Math.abs(dy) > 12)) {
      locked = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
    }
  }, { passive: true });
  wrap.addEventListener('touchend', (e) => {
    if (!startX) return;
    const p = e.changedTouches[0];
    const dx = p.clientX - startX;
    if (locked === 'x' && Math.abs(dx) > 80) {
      // only when the touch started on segctrl area (not on cards — they handle their own swipe)
      const tgt = e.target;
      if (tgt.closest('.rw-task-card') == null && tgt.closest('.rw-kan-list') == null) {
        const idx = STATUSES.indexOf(APP.kanbanCol);
        if (dx < 0 && idx < 3) setKanbanCol(STATUSES[idx + 1]);
        else if (dx > 0 && idx > 0) setKanbanCol(STATUSES[idx - 1]);
      }
    }
    startX = 0; startY = 0; locked = null;
  });
}

async function quickMove(taskId, newStatus, oldStatus) {
  const need = ACTION_MIN_ROLE[oldStatus] || 1;
  if (APP.user.role < need) {
    showToast(`⛔ ต้องเป็น R${need}+ จึงจะอนุมัติได้`, 'warn');
    return;
  }
  try {
    await callGas('changeStatus', { id: taskId, status: newStatus });
    const t = APP.tasks.find(x => x['ID'] === taskId);
    if (t) t['Status'] = newStatus;
    render();
    showToast(`${NEXT_ACTION[oldStatus]} ✓`);
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

/* ═════════════════════════════════════════════════════════════
   CALENDAR — week strip + agenda
═════════════════════════════════════════════════════════════ */
function calPrev() {
  APP.calRef = new Date(APP.calRef.getFullYear(), APP.calRef.getMonth(), APP.calRef.getDate() - 7);
  renderCalendar();
}
function calNext() {
  APP.calRef = new Date(APP.calRef.getFullYear(), APP.calRef.getMonth(), APP.calRef.getDate() + 7);
  renderCalendar();
}
function calToday() {
  APP.calRef = new Date();
  APP.calSelected = todayStr();
  renderCalendar();
}
function calSelectDay(d) { APP.calSelected = d; renderCalendar(); }

function renderCalendar() {
  const filtered = filteredTasks();
  const tasksByDate = {};
  filtered.forEach(t => {
    const d = String(t['Due Date']||'').slice(0,10);
    if (d) (tasksByDate[d] = tasksByDate[d] || []).push(t);
  });

  // week strip
  const ref = APP.calRef;
  const weekStart = new Date(ref);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const days = Array.from({length:7}, (_, i) => { const d = new Date(weekStart); d.setDate(d.getDate()+i); return d; });
  const monthLabel = `${THAI_MONTHS[ref.getMonth()]} ${ref.getFullYear() + 543}`;

  const weekHtml = days.map((d, i) => {
    const k = ymd(d);
    const items = tasksByDate[k] || [];
    const isToday = k === todayStr();
    const isSel = k === APP.calSelected;
    // count tasks by primary outcome — dots show which outcome categories have tasks today
    const seen = new Set();
    items.forEach(t => { const o = outcomesOf(t)[0]; if (o) seen.add(o); });
    const dots = [...seen].slice(0, 3).map(k => `<i style="background:${OUTCOMES[k].color}"></i>`).join('');
    return `
      <div class="rw-wd ${isToday?'today':''} ${isSel?'selected':''}" onclick="calSelectDay('${k}')">
        <span class="dow">${DOWS_SHORT[i]}</span>
        <span class="day">${d.getDate()}</span>
        <span class="dots">${dots || (items.length > 0 ? '<i style="background:var(--text-soft)"></i>' : '')}</span>
      </div>
    `;
  }).join('');

  // agenda from selected day, 14 days forward
  const startSel = APP.calSelected || todayStr();
  const sd = new Date(startSel + 'T00:00:00');
  const groups = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date(sd); d.setDate(d.getDate() + i);
    const k = ymd(d);
    const items = tasksByDate[k] || [];
    if (items.length > 0 || i === 0) groups.push({ date: k, dateObj: d, items });
  }
  const allEmpty = groups.every(g => g.items.length === 0);
  const agendaHtml = allEmpty
    ? emptyState('calendar', 'ไม่มีงาน due ใน 14 วันข้างหน้า', 'คุณคุมจังหวะดี — ใช้เวลานี้สะสางงานค้าง')
    : groups.filter(g => g.items.length > 0).map(g => dayGroupHtml(g)).join('');

  document.getElementById('content').innerHTML = `
    <div class="rw-cal-header">
      <div class="month">${monthLabel}</div>
      <div class="nav">
        <button onclick="calPrev()">‹</button>
        <button class="rw-cal-today-btn" onclick="calToday()">วันนี้</button>
        <button onclick="calNext()">›</button>
      </div>
    </div>
    <div class="rw-week-strip">${weekHtml}</div>
    <div style="padding-bottom:100px">${agendaHtml}</div>
  `;

  // attach card click only (no swipe in calendar to keep scroll clean)
}

function dayGroupHtml(g) {
  const d = g.dateObj;
  const isToday = g.date === todayStr();
  const isPast = g.date < todayStr();
  return `
    <div class="rw-day-group">
      <div class="rw-day-group-head">
        <span class="dnum" ${isPast ? 'style="color:var(--prio-high)"' : ''}>${d.getDate()}</span>
        <div style="display:flex;flex-direction:column">
          <span style="font-size:12px;font-weight:700;color:var(--text)">${THAI_MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()+543}${isToday?'<span style="color:var(--gold);margin-left:6px">· วันนี้</span>':''}</span>
          <span class="dword">${DOWS_LONG[d.getDay()]}</span>
        </div>
        <span class="cnt">${g.items.length} งาน</span>
      </div>
      <div class="rw-tasks">
        ${g.items.map(t => taskCardHtml(t, { showStatus: true })).join('')}
      </div>
    </div>
  `;
}

function renderDashboard() {

  const today = scope.filter(t => String(t['Due Date']||'').slice(0,10) === todayStr() && t['Status'] !== 'Done').length;

  // Done last 7 days from Updated At
  const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - 7); weekStart.setHours(0,0,0,0);
  const doneWeek = scope.filter(t => t['Status'] === 'Done' && new Date(t['Updated At']) >= weekStart).length;

  // 7-day bar chart of completion
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i); d.setHours(0,0,0,0);
    const k = ymd(d);
    const c = scope.filter(t => t['Status'] === 'Done' && String(t['Updated At']||'').slice(0,10) === k).length;
    days.push({ label: DOWS_SHORT[d.getDay()], date: k, count: c, isToday: k === todayStr() });
  }
  const maxV = Math.max(1, ...days.map(d => d.count));

  // Team workload (managers only)
  const workload = isManager ? buildWorkload(allTasks) : null;

  // Due this week
  const wEnd = new Date(); wEnd.setDate(wEnd.getDate() + 7);
  const dueWeek = scope.filter(t => {
    const d = String(t['Due Date']||'').slice(0,10);
    return d && d >= todayStr() && d <= ymd(wEnd) && t['Status'] !== 'Done';
  }).sort((a,b) => String(a['Due Date']).localeCompare(String(b['Due Date'])));

  // Recent updates (scope-aware)
  const visibleIds = new Set(scope.map(t => t['ID']));
  const recentUpd = (isManager ? APP.updates : APP.updates.filter(u => normalizeEmail(u['User Email']) === me))
    .filter(u => visibleIds.has(u['Task ID']))
    .slice().sort((a,b) => String(b['Timestamp']).localeCompare(String(a['Timestamp']))).slice(0, 8);

  const greeting = `สวัสดี ${escapeHtml((APP.user.name || APP.user.email.split('@')[0]).split(' ')[0])} 👋`;
  const subtitle = isManager
    ? `มุมมอง <b>ทั้งทีม</b> · ${allTasks.length} งาน · ${new Set(allTasks.map(t => t['Assignee']).filter(Boolean)).size} คน`
    : `มุมมอง <b>ของฉัน</b> · ${scope.length} งานที่รับผิดชอบ`;

  document.getElementById('content').innerHTML = `
    <div class="rw-dash">
      <div style="margin-bottom:14px">
        <div style="font-size:17px;font-weight:800;color:var(--text)">${greeting}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${subtitle}</div>
      </div>

      <div class="rw-stat-grid">
        <div class="rw-stat-card info">
          <div class="ic">📋</div>
          <div class="label">งานเปิด${isManager?' (ทีม)':''}</div>
          <div class="value">${open}</div>
          <div class="sub">${today} วันนี้</div>
        </div>
        <div class="rw-stat-card danger">
          <div class="ic">⚠</div>
          <div class="label">เกินกำหนด</div>
          <div class="value">${overdue}</div>
          <div class="sub">${overdue > 0 ? 'ต้องเร่ง' : 'ไม่มี'}</div>
        </div>
        <div class="rw-stat-card warning">
          <div class="ic">🕘</div>
          <div class="label">Due วันนี้</div>
          <div class="value">${today}</div>
          <div class="sub">${today > 0 ? 'ใกล้กำหนด' : 'ว่าง'}</div>
        </div>
        <div class="rw-stat-card success">
          <div class="ic">✓</div>
          <div class="label">เสร็จ 7 วัน</div>
          <div class="value">${doneWeek}</div>
          <div class="sub">งาน</div>
        </div>
      </div>

      ${isManager && workload && workload.length > 0 ? `
        <div class="rw-card">
          <div class="rw-card-head"><h3>👥 ภาระงานทีม</h3><span class="sub">${workload.length} คน</span></div>
          <div class="rw-card-body" style="padding:6px 14px 10px">
            ${workload.map(w => `
              <div class="rw-workload-row">
                ${avatarHtml(w.email, 32)}
                <div class="rw-workload-info">
                  <div class="rw-workload-head">
                    <span class="name">${escapeHtml(w.name)}</span>
                    <span class="counts"><b>${w.open}</b> เปิด ${w.overdue > 0 ? `· <span class="overdue">${w.overdue} เลย</span>` : ''}</span>
                  </div>
                  <div class="rw-workload-bar"><div class="fill" style="width:${(w.open / Math.max(1, workload[0].open)) * 100}%"></div></div>
                  <div class="rw-workload-breakdown">
                    ${w.doing > 0 ? `<span class="seg doing">🔧 ${w.doing}</span>` : ''}
                    ${w.review > 0 ? `<span class="seg review">🔎 ${w.review}</span>` : ''}
                    ${w.done > 0 ? `<span class="seg done">✓ ${w.done}</span>` : ''}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}

      <div class="rw-card">
        <div class="rw-card-head"><h3>📈 งานเสร็จ 7 วันล่าสุด</h3></div>
        <div class="rw-dash-chart">
          ${days.map(d => `
            <div class="rw-bar ${d.isToday ? 'today' : ''}">
              <div class="col" style="height:${(d.count / maxV) * 100}%">
                ${d.count > 0 ? `<span class="v">${d.count}</span>` : ''}
              </div>
              <span class="lbl">${d.label}</span>

      <div class="rw-card">

        <div class="rw-card-body">
          ${dueWeek.length === 0 ? '<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:14px">ไม่มีงาน due สัปดาห์นี้ 🎉</div>' :
            dueWeek.slice(0, 8).map(t => `
              <div class="rw-dash-row" onclick="openTaskDetail('${escapeHtml(t['ID'])}')">
                ${(() => {
                  const o = outcomesOf(t)[0];
                  return isManager ? avatarHtml(t['Assignee'], 28) : (o ? `<span style="font-size:18px">${OUTCOMES[o].icon}</span>` : '<span style="width:18px;display:inline-block"></span>');
                })()}
                <div class="body">
                  <div class="title">${escapeHtml(t['Title'])}</div>
                  <div class="meta">${t['Project'] ? `📁 ${escapeHtml(t['Project'])} · ` : ''}<span class="${dueMeta(t)?.cls || ''}" style="font-weight:700">${escapeHtml(dueMeta(t)?.label || '')}</span></div>
                </div>
              </div>
            `).join('')}
        </div>
      </div>

      <div class="rw-card">
        <div class="rw-card-head"><h3>📝 Updates ล่าสุด${isManager?' (ทีม)':''}</h3></div>
        <div class="rw-card-body">
          ${recentUpd.length === 0 ? '<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:14px">ยังไม่มี update</div>' :
            recentUpd.map(u => {
              const t = APP.tasks.find(x => x['ID'] === u['Task ID']);
              return `
              <div class="rw-dash-row" onclick="openTaskDetail('${escapeHtml(u['Task ID'])}')">
                ${avatarHtml(u['User Email'], 28)}
                <div class="body">
                  <div class="title">${escapeHtml((u['Message']||'').slice(0,80))}</div>
                  <div class="meta">${t ? escapeHtml(t['Title']) + ' · ' : ''}${escapeHtml(formatThaiDateTime(u['Timestamp']))}</div>
                </div>
              </div>
            `;}).join('')}
        </div>
      </div>
    </div>
  `;
}

function buildWorkload(tasks) {
  const map = new Map();
  tasks.forEach(t => {
    const a = t['Assignee'];
    if (!a) return;
    if (!map.has(a)) {
      const u = userOf(a);
      map.set(a, { email: a, name: u.name, open: 0, doing: 0, review: 0, done: 0, overdue: 0 });
    }
    const w = map.get(a);
    if (t['Status'] !== 'Done') w.open++;
    if (t['Status'] === 'Doing') w.doing++;
    if (t['Status'] === 'Review') w.review++;
    if (t['Status'] === 'Done') w.done++;
    if (isOverdue(t)) w.overdue++;
  });
  return [...map.values()].sort((a,b) => b.open - a.open);
}

function openSheet(title, bodyHtml, opts = {}) {
  const { height = '92%', onClose } = opts;

  ov.innerHTML = `
    <div class="rw-sheet-backdrop" onclick="if(event.target===this)closeSheet()">

          </div>
        ` : ''}
        <div class="rw-sheet-body" id="sheetBody">${bodyHtml}</div>
      </div>
    </div>
  `;
  document.body.style.overflow = 'hidden';

function closeSheet() {
  const ov = document.getElementById('sheetOverlay');
  if (ov._onClose) try { ov._onClose(); } catch(e){}
  ov.innerHTML = '';
  ov._onClose = null;
  document.body.style.overflow = '';

  if (_sheetStack.length > 0) {
    const fn = _sheetStack.pop();
    setTimeout(() => { try { fn(); } catch(e){} }, 0);
  }
}
