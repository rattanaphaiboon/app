<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1b3e">
<title>Rattana Work Management v1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1b3e;--navy-mid:#1a2f5e;--navy-light:#243b73;
  --gold:#c9a84c;--gold-light:#e8c86a;
  --success:#2ecc71;--danger:#e74c3c;--warning:#f39c12;--info:#3498db;
  --bg:#f4f6fb;--text:#0d1b3e;--card-bg:#fff;--border:#dde3f0;--muted:#6b7896;--row-alt:#fafbfd;
  --space-xs:4px;--space-sm:8px;--space-md:16px;--space-lg:24px;--space-xl:32px;
  --radius-sm:6px;--radius-md:12px;--radius-lg:16px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);--shadow-md:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(13,27,62,.12);
  --shadow-gold:0 4px 12px rgba(201,168,76,.35);
  --status-todo:#94a3b8;--status-doing:#3498db;--status-review:#f39c12;--status-done:#2ecc71;
  --kan-strip-bg:linear-gradient(135deg,rgba(201,168,76,.08),transparent);
}
body.dark{
  --bg:#05080f;--text:#fff;--card-bg:#0d1b3e;--border:#1f3563;--muted:#b8c2dc;--row-alt:#0a1226;
  --kan-strip-bg:transparent;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;font-size:14px;line-height:1.5;min-height:100dvh;overflow-x:hidden;background:var(--bg);color:var(--text);transition:background .25s,color .25s}
button{font-family:inherit;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input,select,textarea{font-family:inherit;font-size:16px}
a{color:inherit;text-decoration:none}

/* ── Header ── */
header{background:var(--navy);color:#fff;padding:10px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:8px;border-bottom:3px solid var(--gold);padding-top:max(10px,env(safe-area-inset-top))}
.logo-text{font-weight:700;letter-spacing:1px;font-size:15px;color:#fff;white-space:nowrap}
.logo-text span{color:var(--gold)}
.ver-chip{background:var(--gold);color:var(--navy);font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;letter-spacing:.5px}
.grow{flex:1}
.icon-btn{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.2);width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s;flex-shrink:0}
.icon-btn:hover{background:rgba(255,255,255,.12)}
.hub-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:var(--radius-sm);padding:5px 8px;font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;transition:background .15s;white-space:nowrap;min-height:36px;flex-shrink:0}
.hub-btn:hover{background:rgba(255,255,255,.18)}

/* ── User strip ── */
.user-strip{background:var(--card-bg);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)}
.user-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);padding:3px 8px;border-radius:10px;color:var(--text);font-weight:600;font-size:11px}
.role-badge{background:var(--gold);color:var(--navy);font-size:10px;font-weight:700;padding:1px 5px;border-radius:6px;margin-left:2px}

/* ── Tab nav ── */
.tab-nav{display:flex;background:var(--navy);padding:0 4px;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:calc(36px + env(safe-area-inset-top) + 20px);z-index:90;border-bottom:3px solid var(--gold)}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{background:transparent;border:none;color:rgba(255,255,255,.6);padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .18s;margin-bottom:-3px;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.tab-btn:hover{color:#fff;background:rgba(255,255,255,.06)}
.tab-btn.active{color:var(--navy);background:var(--gold);font-weight:700}

/* ── Filter bar (sticky) ── */
.filter-bar{position:sticky;top:calc(36px + env(safe-area-inset-top) + 20px + 47px);z-index:80;background:var(--card-bg);border-bottom:1px solid var(--border);padding:10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow-sm)}
.filter-bar .search-input{flex:1 1 100%;min-width:0;height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text);font-size:14px;outline:none;transition:border-color .15s}
.filter-bar .search-input:focus{border-color:var(--gold)}
.filter-bar select{flex:1;min-width:120px;height:36px;padding:0 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px;outline:none}
.filter-bar .btn{height:36px;padding:0 14px;flex-shrink:0}
@media(min-width:768px){
  .filter-bar .search-input{flex:2;min-width:200px}
  .filter-bar select{flex:1;max-width:180px}
}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;min-height:38px;transition:opacity .15s,transform .1s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.btn:hover{opacity:.88}.btn:active{transform:scale(.97)}
.btn-primary{background:var(--navy);color:#fff}.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:var(--gold-light)}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-danger{background:var(--danger);color:#fff}.btn-success{background:var(--success);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px;min-height:30px}
.btn-block{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* ── Content ── */
.content{padding:12px;max-width:1400px;margin:0 auto}
.view-pane{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Kanban ── */
.kanban-tabs{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.kanban-tabs::-webkit-scrollbar{display:none}
.kanban-tab{flex:1;min-width:90px;background:var(--card-bg);color:var(--muted);border:1.5px solid var(--border);padding:8px 10px;font-size:12px;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;white-space:nowrap;transition:all .15s}
.kanban-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.kanban-tab[data-status="Todo"].active{background:var(--status-todo);border-color:var(--status-todo)}
.kanban-tab[data-status="Doing"].active{background:var(--status-doing);border-color:var(--status-doing)}
.kanban-tab[data-status="Review"].active{background:var(--status-review);border-color:var(--status-review)}
.kanban-tab[data-status="Done"].active{background:var(--status-done);border-color:var(--status-done)}
@media(min-width:1024px){.kanban-tabs{display:none}}

.kanban-board{display:flex;flex-direction:column;gap:12px}
@media(min-width:1024px){
  .kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start}
}
.kan-col{display:none}
.kan-col.active{display:block}
@media(min-width:1024px){.kan-col{display:block}}

.kan-col-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card-bg);border-radius:var(--radius-sm) var(--radius-sm) 0 0;border:1px solid var(--border);border-bottom:none;border-top:3px solid var(--gold);font-weight:700;font-size:13px}
.kan-col[data-status="Todo"] .kan-col-head{border-top-color:var(--status-todo)}
.kan-col[data-status="Doing"] .kan-col-head{border-top-color:var(--status-doing)}
.kan-col[data-status="Review"] .kan-col-head{border-top-color:var(--status-review)}
.kan-col[data-status="Done"] .kan-col-head{border-top-color:var(--status-done)}
.kan-col-count{background:var(--bg);color:var(--text);font-size:11px;padding:2px 7px;border-radius:10px;font-weight:700}
.kan-col-body{background:var(--card-bg);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);padding:8px;min-height:80px;display:flex;flex-direction:column;gap:8px}

.task-card{background:var(--card-bg);border:1px solid var(--border);border-left:3px solid var(--muted);border-radius:var(--radius-sm);padding:10px;cursor:pointer;transition:transform .12s,box-shadow .12s;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow-sm)}
.task-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.task-card.prio-High{border-left-color:var(--danger)}
.task-card.prio-Med{border-left-color:var(--warning)}
.task-card.prio-Low{border-left-color:var(--info)}
.task-card.overdue{background:rgba(231,76,60,.04)}
body.dark .task-card.overdue{background:rgba(231,76,60,.08)}
.tc-title{font-weight:700;font-size:13px;line-height:1.35;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tc-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;font-size:11px;color:var(--muted)}
.tc-chip{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--text);padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;white-space:nowrap}
.tc-chip.due{background:rgba(52,152,219,.12);border-color:rgba(52,152,219,.3)}
.tc-chip.overdue{background:rgba(231,76,60,.15);border-color:rgba(231,76,60,.4);color:var(--danger)}
.tc-chip.assignee{background:rgba(46,204,113,.12);border-color:rgba(46,204,113,.3)}
.tc-img{width:100%;height:80px;object-fit:cover;border-radius:4px;background:var(--bg)}
.tc-actions{display:flex;gap:4px;margin-top:2px;border-top:1px solid var(--border);padding-top:6px}
.tc-actions button{flex:1;background:transparent;border:1px solid var(--border);color:var(--text);font-size:11px;padding:4px 6px;border-radius:4px;cursor:pointer;font-weight:600;transition:all .12s}
.tc-actions button:hover{background:var(--navy);color:#fff;border-color:var(--navy)}

.empty{text-align:center;color:var(--muted);font-size:12px;padding:24px 12px;font-style:italic}

/* ── Calendar ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:10px 4px;font-weight:700;font-size:15px}
.cal-header button{background:var(--card-bg);border:1px solid var(--border);width:36px;height:36px;border-radius:var(--radius-sm);font-size:18px;font-weight:700;color:var(--text);cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:2px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:6px 2px;text-transform:uppercase;letter-spacing:.5px}
.cal-day{aspect-ratio:1;background:var(--bg);border-radius:4px;padding:4px;display:flex;flex-direction:column;justify-content:space-between;font-size:12px;cursor:pointer;transition:background .15s;position:relative;min-height:42px}
.cal-day:hover{background:rgba(201,168,76,.1)}
.cal-day.other-month{opacity:.3}
.cal-day.today{background:rgba(201,168,76,.15);font-weight:700;border:1.5px solid var(--gold)}
.cal-day.selected{background:var(--navy);color:#fff;font-weight:700}
.cal-day.has-tasks::after{content:'';position:absolute;bottom:4px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--danger)}
.cal-day-tasks{margin-top:12px}
.cal-day-tasks .empty{padding:20px}

@media(min-width:768px){
  .cal-day{min-height:64px;font-size:13px}
}

/* ── Dashboard ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:0}
@media(min-width:768px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--card-bg);border-radius:var(--radius-md);padding:14px;border:1px solid var(--border);border-top:3px solid var(--gold)}
.stat-card.danger{border-top-color:var(--danger)}.stat-card.danger .s-value{color:var(--danger)}
.stat-card.success{border-top-color:var(--success)}.stat-card.success .s-value{color:var(--success)}
.stat-card.info{border-top-color:var(--info)}.stat-card.info .s-value{color:var(--info)}
.s-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.s-value{font-size:22px;font-weight:700;line-height:1.2}
.s-sub{font-size:11px;color:var(--muted);margin-top:2px}

.card{background:var(--card-bg);border-radius:var(--radius-md);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--kan-strip-bg)}
.card-head h3{font-size:14px;font-weight:700}
.card-body{padding:12px 14px}

.dash-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:8px}
.dash-row:last-child{border-bottom:none}
.dash-row .title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dash-row .meta{font-size:11px;color:var(--muted)}

#dashChart{width:100%;height:140px}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,.65);z-index:9000;align-items:flex-start;justify-content:center;padding:20px 12px;backdrop-filter:blur(4px);overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--card-bg);border-radius:var(--radius-lg);max-width:520px;width:100%;border-top:4px solid var(--gold);animation:slideUp .22s ease;margin:auto 0}
.modal-lg{max-width:680px}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card-bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;z-index:1}
.modal-head h3{font-size:15px;font-weight:700;flex:1;padding-right:8px}
.modal-close{background:transparent;border:none;font-size:22px;color:var(--muted);cursor:pointer;padding:2px 8px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:16px 18px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card-bg);border-radius:0 0 var(--radius-lg) var(--radius-lg)}

.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;text-transform:uppercase}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.input{height:42px;padding:0 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card-bg);color:var(--text);font-size:16px;outline:none;width:100%;transition:border-color .15s}
.input:focus{border-color:var(--gold)}
textarea.input{height:auto;padding:10px 12px;resize:vertical;min-height:70px;font-size:14px}

/* Task detail modal */
.td-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;font-size:12px}
.td-meta .tc-chip{padding:3px 8px;font-size:11px}
.td-desc{background:var(--bg);padding:10px;border-radius:var(--radius-sm);font-size:13px;color:var(--text);white-space:pre-wrap;margin-bottom:12px;line-height:1.55}
.td-img{width:100%;max-height:240px;object-fit:contain;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:12px}
.td-link{display:inline-block;background:rgba(52,152,219,.12);color:var(--info);padding:6px 12px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;text-decoration:none;margin-bottom:12px}
.td-link:hover{background:rgba(52,152,219,.2)}

.timeline{margin:14px 0;padding-left:14px;border-left:2px solid var(--border)}
.tl-item{position:relative;padding:8px 0 12px 14px;margin-left:-2px;border-left:2px solid transparent}
.tl-item::before{content:'';position:absolute;left:-7px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--gold);border:2px solid var(--card-bg)}
.tl-head{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:var(--muted);margin-bottom:4px;flex-wrap:wrap}
.tl-author{font-weight:700;color:var(--text);font-size:12px}
.tl-msg{font-size:13px;white-space:pre-wrap;line-height:1.5}
.tl-img{width:80px;height:80px;object-fit:cover;border-radius:4px;margin-top:6px;cursor:pointer;border:1px solid var(--border)}
.tl-status-change{display:inline-block;background:rgba(243,156,18,.15);color:var(--warning);padding:1px 6px;border-radius:6px;font-size:10px;font-weight:700;margin-left:4px}

.update-form{background:rgba(201,168,76,.06);border:1.5px solid rgba(201,168,76,.3);border-radius:var(--radius-sm);padding:12px;margin-top:14px}
body.dark .update-form{background:rgba(201,168,76,.04)}
.update-form h4{font-size:13px;margin-bottom:8px;color:var(--text)}

/* ── Status select ── */
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;color:#fff}
.status-pill.Todo{background:var(--status-todo)}
.status-pill.Doing{background:var(--status-doing)}
.status-pill.Review{background:var(--status-review)}
.status-pill.Done{background:var(--status-done)}

/* ── Login screen ── */
#loginScreen{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,var(--navy),var(--navy-mid))}
.login-box{background:#fff;padding:32px 24px;border-radius:var(--radius-lg);text-align:center;max-width:380px;width:100%;border-top:4px solid var(--gold);box-shadow:var(--shadow-lg)}

.login-box h1{font-size:22px;color:var(--navy);letter-spacing:1.5px;margin-bottom:4px}
.login-box h1 span{color:var(--gold)}
.login-box p{color:var(--muted);margin-bottom:16px;font-size:13px}
.version-tag{color:var(--gold);font-weight:700;font-size:12px;margin-top:14px;letter-spacing:.5px}
#loginError{background:#fee;color:#c0392b;padding:10px;border-radius:8px;margin-top:10px;font-size:13px;display:none}
.g-signin-row{display:flex;justify-content:center;margin:10px 0}

/* ── Spinner + Toast ── */
.spinner-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,.55);align-items:center;justify-content:center;z-index:99999;backdrop-filter:blur(3px)}
.spinner-overlay.show{display:flex}
.spinner-box{background:#fff;border-radius:var(--radius-lg);padding:28px 36px;text-align:center;border-top:4px solid var(--gold);min-width:220px}
.spinner-ring{width:44px;height:44px;border:5px solid #dde3f0;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
body.dark .spinner-box{background:var(--card-bg)}
.toast{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));right:16px;padding:11px 18px;border-radius:var(--radius-md);color:#fff;z-index:9999;animation:slideIn .3s ease;font-weight:500;box-shadow:var(--shadow-lg);max-width:90vw;font-size:13px}
.toast-success{background:var(--success)}.toast-error{background:var(--danger)}.toast-warning{background:var(--warning);color:var(--navy)}.toast-info{background:var(--navy-mid);border-left:3px solid var(--gold)}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

#backToTop{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));right:max(16px,env(safe-area-inset-right));background:var(--gold);color:var(--navy);border:none;border-radius:50%;width:44px;height:44px;display:none;align-items:center;justify-content:center;box-shadow:var(--shadow-gold);z-index:90;font-size:17px;font-weight:700;cursor:pointer}
#backToTop.show{display:flex}
</style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo"></div>
    <h1>RATTANA <span>WORK</span></h1>
    <p>Work Management System</p>
    <div class="g-signin-row">
      <div id="g_id_onload"
        data-client_id="615875645128-gasjjvkt6lu8g449cbnhl40k1pu25r0b.apps.googleusercontent.com"
        data-callback="handleGoogleLogin"
        data-auto_prompt="false"></div>
      <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular"></div>
    </div>
    <div id="loginError"></div>
    <p class="version-tag">v1.0</p>
  </div>
</div>

<!-- ── App Screen ── -->
<div id="appScreen" style="display:none">
  <header>
    <span class="logo-text">RATTANA <span>WORK</span></span>
    <span class="ver-chip">v1.0</span>
    <span class="grow"></span>
    <button class="icon-btn" id="btnRefresh" onclick="refreshData()" title="Refresh">🔄</button>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Theme">🌙</button>
    <button class="icon-btn" onclick="logout()" title="Logout">⏻</button>
    <a href="https://rattanaphaiboon.github.io/app/rattana-hub.html" class="hub-btn" title="กลับ Hub">
      <span class="hub-btn-icon"></span><span class="hub-btn-text">Hub</span>
    </a>
  </header>

  <div class="user-strip">
    <span class="user-chip" id="userChip">-</span>
    <span id="taskCount">0 งาน</span>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-view="kanban" onclick="showView('kanban')">📋 Kanban</button>
    <button class="tab-btn" data-view="calendar" onclick="showView('calendar')">📅 Calendar</button>
    <button class="tab-btn" data-view="dashboard" onclick="showView('dashboard')">📊 Dashboard</button>
  </div>

  <div class="filter-bar">
    <input class="search-input" id="searchInput" placeholder="🔍 ค้นหางาน, project, ผู้รับผิดชอบ..." oninput="applyFilters()">
    <select id="projectFilter" onchange="applyFilters()"><option value="">ทุก Project</option></select>
    <select id="priorityFilter" onchange="applyFilters()">
      <option value="">ทุก Priority</option>
      <option value="High">🔴 High</option>
      <option value="Med">🟡 Med</option>
      <option value="Low">🔵 Low</option>
    </select>
    <select id="assigneeFilter" onchange="applyFilters()" style="display:none">
      <option value="">ทุกผู้รับผิดชอบ</option>
    </select>
    <button class="btn btn-gold" onclick="openNewTask()">+ งานใหม่</button>
  </div>

  <div class="content">
    <!-- KANBAN -->
    <div id="view-kanban" class="view-pane">
      <div class="kanban-tabs" id="kanbanTabs">
        <button class="kanban-tab active" data-status="Todo" onclick="setKanbanCol('Todo')">📌 Todo <span id="cnt-Todo">0</span></button>
        <button class="kanban-tab" data-status="Doing" onclick="setKanbanCol('Doing')">🔧 Doing <span id="cnt-Doing">0</span></button>
        <button class="kanban-tab" data-status="Review" onclick="setKanbanCol('Review')">🔎 Review <span id="cnt-Review">0</span></button>
        <button class="kanban-tab" data-status="Done" onclick="setKanbanCol('Done')">✅ Done <span id="cnt-Done">0</span></button>
      </div>
      <div class="kanban-board" id="kanbanBoard"></div>
    </div>

    <!-- CALENDAR -->
    <div id="view-calendar" class="view-pane" style="display:none">
      <div class="cal-header">
        <button onclick="calPrev()">‹</button>
        <span id="calTitle">เดือนนี้</span>
        <button onclick="calNext()">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-day-tasks" id="calDayTasks"></div>
    </div>

    <!-- DASHBOARD -->
    <div id="view-dashboard" class="view-pane" style="display:none">
      <div class="stat-grid" id="dashStats"></div>
      <div class="card" style="margin-top:12px">
        <div class="card-head"><h3>📈 7 วันที่ผ่านมา (งานที่เสร็จ)</h3></div>
        <div class="card-body"><svg id="dashChart" viewBox="0 0 360 140" preserveAspectRatio="none"></svg></div>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="card-head"><h3>⏰ งานคุณ Due สัปดาห์นี้</h3></div>
        <div class="card-body" id="dashDueList"><div class="empty">ไม่มีงาน</div></div>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="card-head"><h3>📝 Updates ล่าสุดของคุณ</h3></div>
        <div class="card-body" id="dashUpdatesList"><div class="empty">ยังไม่มี update</div></div>
      </div>
    </div>
  </div>
  <button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
</div>

<!-- ── Task Detail Modal ── -->
<div class="modal-overlay" id="taskModal" onclick="if(event.target===this)closeTaskModal()">
  <div class="modal modal-lg">
    <div class="modal-head">
      <h3 id="tdTitle">งาน</h3>
      <button class="modal-close" onclick="closeTaskModal()">×</button>
    </div>
    <div class="modal-body" id="tdBody"></div>
    <div class="modal-foot">
      <button class="btn btn-outline" id="btnDelTask" onclick="deleteCurrentTask()" style="display:none">🗑️ ลบ</button>
      <button class="btn btn-outline" onclick="openEditTask()">✏️ แก้ไข</button>
      <button class="btn btn-primary" onclick="closeTaskModal()">ปิด</button>
    </div>
  </div>
</div>

<!-- ── New / Edit Task Modal ── -->
<div class="modal-overlay" id="newTaskModal" onclick="if(event.target===this)closeNewTaskModal()">
  <div class="modal">
    <div class="modal-head">
      <h3 id="ntTitle">+ งานใหม่</h3>
      <button class="modal-close" onclick="closeNewTaskModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>ชื่องาน *</label>
        <input class="input" id="ntName" placeholder="เช่น: เตรียมรายงานยอดขาย">
      </div>
      <div class="field">
        <label>รายละเอียด</label>
        <textarea class="input" id="ntDesc" rows="3" placeholder="อธิบายงาน..."></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Project</label>
          <input class="input" id="ntProject" placeholder="ชื่อโปรเจค" list="projectList">
          <datalist id="projectList"></datalist>
        </div>
        <div class="field">
          <label>Priority</label>
          <select class="input" id="ntPriority">
            <option value="Low">🔵 Low</option>
            <option value="Med" selected>🟡 Med</option>
            <option value="High">🔴 High</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>เจ้าของโปรเจค (email)</label>
          <input class="input" id="ntOwner" placeholder="manager@..." list="userList">
        </div>
        <div class="field">
          <label>ผู้รับผิดชอบ (email)</label>
          <input class="input" id="ntAssignee" placeholder="staff@..." list="userList">
        </div>
      </div>
      <datalist id="userList"></datalist>
      <div class="field-row">
        <div class="field"><label>วันเริ่ม</label><input class="input" id="ntStart" type="date"></div>
        <div class="field"><label>กำหนดส่ง</label><input class="input" id="ntDue" type="date"></div>
      </div>
      <div class="field">
        <label>Status</label>
        <select class="input" id="ntStatus">
          <option value="Todo">📌 Todo</option>

function decodeJwtPayload(token) {
  const parts = String(token||'').split('.');
  if (parts.length < 2) throw new Error('JWT format invalid');
  let b64 = parts[1].replace(/-/g,'+').replace(/_/g,'/');
  const pad = (4 - b64.length % 4) % 4;
  if (pad) b64 += '='.repeat(pad);
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return JSON.parse(new TextDecoder('utf-8').decode(bytes));
}
const normalizeEmail = s => String(s||'').replace(/[​‌‍﻿]/g,'').replace(/\s+/g,'').toLowerCase();

function parseCsv(text) {
  if (!text) return [];
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = []; let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i+1]==='"'){cell+='"';i++;} else inQ=false; }
      else cell += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(cell); cell=''; }
      else if (ch === '\r') {}
      else if (ch === '\n') { row.push(cell); rows.push(row); row=[]; cell=''; }
      else cell += ch;
    }
  }
  if (cell.length || row.length) { row.push(cell); rows.push(row); }
  if (!rows.length) return [];
  const clean = s => String(s||'').replace(/[​‌‍﻿]/g,'').replace(/ /g,' ').trim();
  const headers = rows[0].map(clean);
  return rows.slice(1).filter(r => r.some(c => clean(c))).map(r => Object.fromEntries(headers.map((k,i) => [k, clean(r[i])])));
}

async function handleGoogleLogin(r) {
  showSpinner('กำลังตรวจสอบ...');
  try {
    const email = normalizeEmail(decodeJwtPayload(r.credential).email);
    const url = `https://docs.google.com/spreadsheets/d/${CFG.usersSheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(CFG.usersSheetName)}`;
    const res = await fetch(url);

    if (!user) { showLoginError('Email ไม่พบใน Users Sheet — แจ้ง Admin'); return; }

  } finally {
    hideSpinner();
  }
}

function saveSession(u) {
  const payload = { data: u, exp: Date.now() + 30*24*60*60*1000 };
  localStorage.setItem(SESSION_KEY, JSON.stringify(payload));
  localStorage.setItem(LEGACY_SESSION_KEY, JSON.stringify(payload));
}

function checkSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY) || localStorage.getItem(LEGACY_SESSION_KEY);
    if (!raw) return null;
    const { data, exp } = JSON.parse(raw);
    if (!data?.email || !exp || Date.now() > exp) {
      localStorage.removeItem(SESSION_KEY);
      localStorage.removeItem(LEGACY_SESSION_KEY);
      return null;
    }
    return data;
  } catch { return null; }
}

async function callGas(action, extra = {}) {
  if (CFG.gasUrl.startsWith('PASTE_')) {
    throw new Error('ยังไม่ได้ตั้ง gasUrl ใน CONFIG — ดู Code.gs');
  }
  const body = JSON.stringify({ action, email: currentUser.email, ...extra });
  const res = await fetch(CFG.gasUrl, {
    method: 'POST',
    body,
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    redirect: 'follow',
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'unknown error');
  return json;
}

/* ────────────────────────────────────────────────────────────
   CALENDAR
─────────────────────────────────────────────────────────────*/
function calPrev() { calDate = new Date(calDate.getFullYear(), calDate.getMonth() - 1, 1); renderCalendar(); }
function calNext() { calDate = new Date(calDate.getFullYear(), calDate.getMonth() + 1, 1); renderCalendar(); }

function renderCalendar() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const monthNames = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  document.getElementById('calTitle').textContent = `${monthNames[m]} ${y + 543}`;

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const today = todayYMD();
  const dows = ['อา','จ','อ','พ','พฤ','ศ','ส'];

  const tasksByDate = {};
  FILTERED.forEach(t => {
    if (t['Due Date']) {
      (tasksByDate[t['Due Date']] = tasksByDate[t['Due Date']] || []).push(t);
    }
  });

  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');
  // padding for first week
  for (let i = 0; i < firstDay; i++) {
    const d = new Date(y, m, -firstDay + i + 1);
    const ymd = ymdOf(d);
    html += `<div class="cal-day other-month" data-date="${ymd}" onclick="selectCalDay('${ymd}')">${d.getDate()}</div>`;
  }
  // current month
  for (let i = 1; i <= daysInMonth; i++) {
    const d = new Date(y, m, i);
    const ymd = ymdOf(d);
    const has = tasksByDate[ymd]?.length;
    const cls = ['cal-day'];
    if (ymd === today) cls.push('today');
    if (ymd === calSelected) cls.push('selected');
    if (has) cls.push('has-tasks');
    html += `<div class="${cls.join(' ')}" data-date="${ymd}" onclick="selectCalDay('${ymd}')">${i}${has?`<span style="font-size:10px;font-weight:700;color:var(--danger)">${has}</span>`:''}</div>`;
  }
  // trailing
  const totalCells = firstDay + daysInMonth;
  const trailing = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= trailing; i++) {
    const d = new Date(y, m + 1, i);
    const ymd = ymdOf(d);
    html += `<div class="cal-day other-month" data-date="${ymd}" onclick="selectCalDay('${ymd}')">${d.getDate()}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
  renderCalDayTasks();
}

function selectCalDay(ymd) {
  calSelected = ymd;
  renderCalendar();
}

function renderCalDayTasks() {
  const wrap = document.getElementById('calDayTasks');
  if (!calSelected) { wrap.innerHTML = '<div class="empty">เลือกวันเพื่อดูงาน</div>'; return; }
  const tasks = FILTERED.filter(t => t['Due Date'] === calSelected);
  const label = formatThaiDate(calSelected);
  if (!tasks.length) { wrap.innerHTML = `<div class="card"><div class="card-head"><h3>${label}</h3></div><div class="card-body"><div class="empty">ไม่มีงาน due วันนี้</div></div></div>`; return; }
  wrap.innerHTML = `
    <div class="card">
      <div class="card-head"><h3>${label} (${tasks.length} งาน)</h3></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:8px">
        ${tasks.map(t => taskCard(t)).join('')}
      </div>
    </div>
  `;
}

/* ────────────────────────────────────────────────────────────
   DASHBOARD
─────────────────────────────────────────────────────────────*/
function renderDashboard() {
  const me = currentUser.email;
  const myTasks = TASKS.filter(t => normalizeEmail(t['Assignee']) === me || normalizeEmail(t['Created By']) === me);
  const today = todayYMD();
  const weekStart = ymdOf(new Date(Date.now() - 7*86400000));

  const open = myTasks.filter(t => t['Status'] !== 'Done').length;
  const doing = myTasks.filter(t => t['Status'] === 'Doing').length;
  const overdue = myTasks.filter(t => t['Due Date'] && t['Due Date'] < today && t['Status'] !== 'Done').length;
  const myUpdatesThisWeek = UPDATES.filter(u => normalizeEmail(u['User Email']) === me && u['Timestamp'] >= weekStart);
  const doneThisWeek = myTasks.filter(t => t['Status'] === 'Done' && t['Updated At'] >= weekStart).length;

  document.getElementById('dashStats').innerHTML = `
    <div class="stat-card info"><div class="s-label">งานเปิด</div><div class="s-value">${open}</div><div class="s-sub">${doing} กำลังทำ</div></div>
    <div class="stat-card success"><div class="s-label">เสร็จ 7 วัน</div><div class="s-value">${doneThisWeek}</div><div class="s-sub">งาน</div></div>
    <div class="stat-card danger"><div class="s-label">เกินกำหนด</div><div class="s-value">${overdue}</div><div class="s-sub">งาน</div></div>
    <div class="stat-card"><div class="s-label">Updates 7 วัน</div><div class="s-value">${myUpdatesThisWeek.length}</div><div class="s-sub">ครั้ง</div></div>
  `;

  // 7-day chart: tasks marked Done per day (from Updated At)
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ymd = ymdOf(d);
    const count = myTasks.filter(t => t['Status'] === 'Done' && (t['Updated At']||'').slice(0,10) === ymd).length;
    days.push({ ymd, count, label: `${d.getDate()}/${d.getMonth()+1}` });
  }
  drawChart(days);

  // Due this week
  const weekEnd = ymdOf(new Date(Date.now() + 7*86400000));
  const dueWeek = myTasks.filter(t => t['Due Date'] && t['Due Date'] >= today && t['Due Date'] <= weekEnd && t['Status'] !== 'Done').sort((a,b) => (a['Due Date']||'').localeCompare(b['Due Date']||''));
  document.getElementById('dashDueList').innerHTML = dueWeek.length
    ? dueWeek.map(t => `<div class="dash-row" style="cursor:pointer" onclick="openTaskDetail('${t['ID']}')"><span class="title">${escapeHtml(t['Title'])}</span><span class="meta">${formatThaiDate(t['Due Date'])}</span></div>`).join('')
    : '<div class="empty">ไม่มีงาน due สัปดาห์นี้</div>';

  // Recent updates
  const myUpd = myUpdatesThisWeek.slice().sort((a,b) => (b['Timestamp']||'').localeCompare(a['Timestamp']||'')).slice(0, 10);
  document.getElementById('dashUpdatesList').innerHTML = myUpd.length
    ? myUpd.map(u => {
      const t = TASKS.find(x => x['ID'] === u['Task ID']);
      const title = t ? t['Title'] : u['Task ID'];
      return `<div class="dash-row" style="cursor:pointer" onclick="openTaskDetail('${u['Task ID']}')"><span class="title">${escapeHtml(title)}</span><span class="meta">${formatThaiDateTime(u['Timestamp'])}</span></div>`;
    }).join('')
    : '<div class="empty">ยังไม่มี update ใน 7 วัน</div>';
}

function drawChart(days) {
  const svg = document.getElementById('dashChart');
  if (!days.length) { svg.innerHTML = ''; return; }
  const w = 360, h = 140, pad = 24;
  const max = Math.max(1, ...days.map(d => d.count));
  const stepX = (w - pad*2) / (days.length - 1);
  const pts = days.map((d, i) => [pad + i*stepX, h - pad - (d.count / max) * (h - pad*2)]);
  const path = pts.map((p, i) => (i?'L':'M') + p[0] + ' ' + p[1]).join(' ');
  const area = `M ${pad} ${h-pad} ` + pts.map(p => `L ${p[0]} ${p[1]}`).join(' ') + ` L ${pad + (days.length-1)*stepX} ${h-pad} Z`;
  let html = `<defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--gold)" stop-opacity=".5"/><stop offset="100%" stop-color="var(--gold)" stop-opacity="0"/></linearGradient></defs>`;
  html += `<path d="${area}" fill="url(#grad)"/>`;
  html += `<path d="${path}" stroke="var(--gold)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
  pts.forEach((p, i) => {
    html += `<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="var(--gold)" stroke="var(--card-bg)" stroke-width="1.5"/>`;
    html += `<text x="${p[0]}" y="${h - 6}" text-anchor="middle" font-size="9" fill="var(--muted)">${days[i].label}</text>`;
    if (days[i].count) html += `<text x="${p[0]}" y="${p[1] - 8}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--text)">${days[i].count}</text>`;
  });
  svg.innerHTML = html;
}

/* ────────────────────────────────────────────────────────────
   TASK DETAIL MODAL
─────────────────────────────────────────────────────────────*/
function openTaskDetail(id) {
  const t = TASKS.find(x => x['ID'] === id);
  if (!t) return;
  viewingTaskId = id;
  document.getElementById('tdTitle').textContent = t['Title'];
  document.getElementById('btnDelTask').style.display = (currentUser.role >= 5) ? '' : 'none';

  const updates = UPDATES.filter(u => u['Task ID'] === id).sort((a,b) => (b['Timestamp']||'').localeCompare(a['Timestamp']||''));
  const img = coverImgUrl(t['Cover Image URL']);
  const overdue = t['Due Date'] && t['Due Date'] < todayYMD() && t['Status'] !== 'Done';

  document.getElementById('tdBody').innerHTML = `
    <div class="td-meta">
      <span class="status-pill ${escapeHtml(t['Status'])}">${STATUS_LABELS[t['Status']]||t['Status']}</span>
      <span class="tc-chip">🎯 ${escapeHtml(t['Priority']||'-')}</span>
      ${t['Project'] ? `<span class="tc-chip">📁 ${escapeHtml(t['Project'])}</span>` : ''}
      ${t['Assignee'] ? `<span class="tc-chip assignee">👤 ${escapeHtml(t['Assignee'])}</span>` : ''}
      ${t['Project Owner'] ? `<span class="tc-chip">👔 ${escapeHtml(t['Project Owner'])}</span>` : ''}
      ${t['Due Date'] ? `<span class="tc-chip ${overdue?'overdue':'due'}">${overdue?'⚠️ ':'📅 '}${formatThaiDate(t['Due Date'])}</span>` : ''}
      ${t['Tags'] ? `<span class="tc-chip">🏷️ ${escapeHtml(t['Tags'])}</span>` : ''}
    </div>
    ${img ? `<img src="${escapeHtml(img)}" class="td-img" onerror="this.style.display='none'">` : ''}
    ${t['Description'] ? `<div class="td-desc">${escapeHtml(t['Description'])}</div>` : ''}
    ${t['Link'] ? `<a href="${escapeHtml(t['Link'])}" target="_blank" class="td-link">🔗 เปิดลิงก์</a>` : ''}

    <div style="font-size:11px;color:var(--muted);margin-bottom:6px">
      สร้างโดย ${escapeHtml((t['Created By']||'').split('@')[0])} เมื่อ ${formatThaiDateTime(t['Created At'])}
    </div>

    <h4 style="margin:14px 0 8px;font-size:13px;color:var(--text)">📜 Timeline (${updates.length})</h4>
    <div class="timeline">
      ${updates.length ? updates.map(u => `
        <div class="tl-item">
          <div class="tl-head">
            <span class="tl-author">${escapeHtml(u['User Name'] || u['User Email'])}</span>
            <span>${formatThaiDateTime(u['Timestamp'])}${u['Status Change']?`<span class="tl-status-change">${escapeHtml(u['Status Change'])}</span>`:''}</span>
          </div>
          <div class="tl-msg">${escapeHtml(u['Message']||'')}</div>
          ${u['Image URL'] ? `<img src="${coverImgUrl(u['Image URL'])}" class="tl-img" onclick="window.open('${escapeHtml(u['Image URL'])}','_blank')" onerror="this.style.display='none'">` : ''}
          ${u['Link'] ? `<div style="margin-top:4px"><a href="${escapeHtml(u['Link'])}" target="_blank" style="font-size:12px;color:var(--info)">🔗 ${escapeHtml(u['Link'])}</a></div>` : ''}
        </div>
      `).join('') : '<div class="empty">ยังไม่มี update</div>'}
    </div>

    <div class="update-form">
      <h4>📝 เพิ่ม update</h4>
      <div class="field"><textarea class="input" id="upMsg" rows="2" placeholder="ทำอะไรไปแล้ว..."></textarea></div>
      <div class="field-row">
        <div class="field"><label>รูป (URL)</label><input class="input" id="upImg" placeholder="https://..."></div>
        <div class="field"><label>ลิงก์</label><input class="input" id="upLink" placeholder="https://..."></div>
      </div>
      <div class="field">
        <label>เปลี่ยน Status เป็น (ไม่เปลี่ยนก็ได้)</label>
        <select class="input" id="upNewStatus">
          <option value="">(คงเดิม)</option>
          <option value="Todo">📌 Todo</option>
          <option value="Doing">🔧 Doing</option>
          <option value="Review">🔎 Review</option>
          <option value="Done">✅ Done</option>
        </select>
      </div>
      <button class="btn btn-gold btn-block" onclick="submitUpdate('${id}','${escapeHtml(t['Status'])}')">💾 บันทึก update</button>
    </div>
  `;
  document.getElementById('taskModal').classList.add('open');
}

function closeTaskModal() {
  document.getElementById('taskModal').classList.remove('open');
  viewingTaskId = null;
}

async function submitUpdate(taskId, oldStatus) {
  const msg = document.getElementById('upMsg').value.trim();
  const img = document.getElementById('upImg').value.trim();
  const link = document.getElementById('upLink').value.trim();
  const newStatus = document.getElementById('upNewStatus').value;
  if (!msg && !img && !link && !newStatus) { showToast('ใส่ข้อความหรือ status', 'warning'); return; }
  showSpinner('บันทึก update...');
  try {
    await callGas('addUpdate', {
      update: {
        taskId,
        message: msg,
        image: img,
        link,
        newStatus: newStatus || '',
        statusChange: newStatus ? `${oldStatus}→${newStatus}` : ''
      }
    });
    await loadData();
    openTaskDetail(taskId);
    showToast('บันทึก update แล้ว', 'success');
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  } finally { hideSpinner(); }
}

async function deleteCurrentTask() {
  if (!viewingTaskId) return;
  if (!confirm('ลบงานนี้? (ลบไม่ได้แล้ว)')) return;
  showSpinner('กำลังลบ...');
  try {
    await callGas('delete', { id: viewingTaskId });
    closeTaskModal();
    await loadData();
    showToast('ลบแล้ว', 'success');
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  } finally { hideSpinner(); }
}

   NEW / EDIT TASK
─────────────────────────────────────────────────────────────*/

function openEditTask() {
  if (!viewingTaskId) return;
  const t = TASKS.find(x => x['ID'] === viewingTaskId);
  if (!t) return;
  editingTaskId = viewingTaskId;
  document.getElementById('ntTitle').textContent = '✏️ แก้ไข ' + t['ID'];
  document.getElementById('ntName').value = t['Title'] || '';
  document.getElementById('ntDesc').value = t['Description'] || '';
  document.getElementById('ntProject').value = t['Project'] || '';
  document.getElementById('ntPriority').value = t['Priority'] || 'Med';
  document.getElementById('ntOwner').value = t['Project Owner'] || '';
  document.getElementById('ntAssignee').value = t['Assignee'] || '';
  document.getElementById('ntStart').value = (t['Start Date']||'').slice(0,10);
  document.getElementById('ntDue').value = (t['Due Date']||'').slice(0,10);
  document.getElementById('ntStatus').value = t['Status'] || 'Todo';
  document.getElementById('ntImg').value = t['Cover Image URL'] || '';
  document.getElementById('ntLink').value = t['Link'] || '';
  document.getElementById('ntTags').value = t['Tags'] || '';
  closeTaskModal();
  document.getElementById('newTaskModal').classList.add('open');

function closeNewTaskModal() {
  document.getElementById('newTaskModal').classList.remove('open');
  editingTaskId = null;
}

async function saveTask() {
  const title = document.getElementById('ntName').value.trim();
  if (!title) { showToast('ใส่ชื่องาน', 'warning'); return; }
  const task = {
    title,
    description: document.getElementById('ntDesc').value.trim(),
    project: document.getElementById('ntProject').value.trim(),
    projectOwner: normalizeEmail(document.getElementById('ntOwner').value),
    assignee: normalizeEmail(document.getElementById('ntAssignee').value),
    priority: document.getElementById('ntPriority').value,
    startDate: document.getElementById('ntStart').value,
    dueDate: document.getElementById('ntDue').value,
    status: document.getElementById('ntStatus').value,
    image: document.getElementById('ntImg').value.trim(),
    link: document.getElementById('ntLink').value.trim(),
    tags: document.getElementById('ntTags').value.trim(),
  };
  showSpinner(editingTaskId ? 'กำลังบันทึก...' : 'กำลังสร้าง...');
  try {
    if (editingTaskId) {
      const patch = {
        'Title': task.title, 'Description': task.description, 'Project': task.project,
        'Project Owner': task.projectOwner, 'Assignee': task.assignee,
        'Priority': task.priority, 'Start Date': task.startDate, 'Due Date': task.dueDate,
        'Status': task.status, 'Cover Image URL': task.image, 'Link': task.link, 'Tags': task.tags,
      };
      await callGas('update', { id: editingTaskId, patch });
    } else {
      await callGas('create', { task });
    }
    closeNewTaskModal();
    await loadData();
    showToast(editingTaskId ? 'บันทึกแล้ว' : 'สร้างงานใหม่แล้ว', 'success');
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  } finally { hideSpinner(); }
}

/* ────────────────────────────────────────────────────────────
   HELPERS
─────────────────────────────────────────────────────────────*/
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function todayYMD() {
  const d = new Date();
  return ymdOf(d);
}

function ymdOf(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function formatThaiDate(input) {
  if (!input) return '-';
  const d = input instanceof Date ? input : new Date(input.length === 10 ? input + 'T00:00:00' : input);
  if (isNaN(d)) return String(input);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth() + 1).padStart(2,'0');
  const yy = d.getFullYear() + 543;
  return `${dd}/${mm}/${yy}`;
}

function formatThaiDateTime(input) {
  if (!input) return '-';
  const d = input instanceof Date ? input : new Date(input);
  if (isNaN(d)) return String(input);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth() + 1).padStart(2,'0');
  const yy = d.getFullYear() + 543;
  const hh = String(d.getHours()).padStart(2,'0');
  const mn = String(d.getMinutes()).padStart(2,'0');
  return `${dd}/${mm}/${yy} ${hh}.${mn}`;
}

function coverImgUrl(url) {
  if (!url) return '';
  const m = String(url).match(/drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?(?:export=view&)?id=)([^/?&]+)/);
  if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;
  return url;
}

function showSpinner(msg = 'Loading...') {
  document.getElementById('spinnerMsg').textContent = msg;
  document.getElementById('spinner').classList.add('show');
}
function hideSpinner() { document.getElementById('spinner').classList.remove('show'); }

function showToast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

window.addEventListener('scroll', () => {
  document.getElementById('backToTop').classList.toggle('show', window.scrollY > 300);
});
