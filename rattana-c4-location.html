<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Rattana C4 Location · v1.2</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#0d1b3e;--navy-mid:#1a2f5e;--navy-light:#243b73;--gold:#c9a84c;--gold-light:#e8c86a;
  --c4:#4ADE80;--success:#2ecc71;--danger:#e74c3c;--warning:#f39c12;--info:#3498db;
  --bg:#f4f6fb;--text:#0d1b3e;--card-bg:#ffffff;--border:#dde3f0;--muted:#6b7896;--row-alt:#fafbfd;
  --radius-sm:6px;--radius-md:12px;--radius-lg:16px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);--shadow-md:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(13,27,62,.12);--shadow-gold:0 4px 12px rgba(201,168,76,.35);
  --zone-bg:linear-gradient(135deg,rgba(201,168,76,.10),rgba(201,168,76,.02));
}
body.dark{
  --bg:#05080f;--text:#ffffff;--card-bg:#0d1b3e;--border:#1f3563;--muted:#b8c2dc;--row-alt:#0a1226;
  --zone-bg:rgba(201,168,76,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;min-height:100dvh;overflow-x:hidden;background:var(--bg);color:var(--text);transition:background .25s,color .25s;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input{font-family:inherit;font-size:16px}

/* Header */
header{background:var(--navy);color:#fff;padding:10px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;border-bottom:3px solid var(--gold);padding-top:max(10px,env(safe-area-inset-top))}
.logo-text{font-weight:700;letter-spacing:1px;font-size:16px;color:#fff;white-space:nowrap}
.logo-text span{color:var(--gold)}
.hver{font-size:10px;color:var(--gold-light);font-weight:600;letter-spacing:.3px;margin-top:1px}
.hsp{flex:1}
.hub-btn,.icon-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:var(--radius-sm);padding:0 10px;font-size:13px;font-weight:600;text-decoration:none;min-height:36px;transition:background .15s;white-space:nowrap}
.icon-btn{width:36px;justify-content:center;padding:0;font-size:16px}
.hub-btn:hover,.icon-btn:hover{background:rgba(255,255,255,.2)}

/* Sticky tools */
.toolbar{position:sticky;top:54px;z-index:90;background:var(--bg);padding:10px 12px 8px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid var(--border)}
.search-box{position:relative}
.search-box input{width:100%;height:46px;padding:0 14px 0 42px;border-radius:24px;border:1.5px solid var(--border);background:var(--card-bg);color:var(--text);outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--gold)}
.search-box .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:17px;opacity:.6}
.search-box .sc{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--border);color:var(--text);border-radius:50%;width:26px;height:26px;display:none;align-items:center;justify-content:center;font-size:15px}
.search-box .sc.show{display:flex}

/* Filter row */
.filter-row{display:flex;gap:6px;align-items:stretch;flex-wrap:wrap}
.dd{position:relative;flex:1 1 28%;min-width:0}
.dd-trig{width:100%;min-height:40px;padding:8px 10px;background:var(--card-bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-weight:600;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:4px}
.dd-trig.active{border-color:var(--gold);color:var(--navy)}
body.dark .dd-trig.active{color:var(--gold-light)}
.dd-trig span:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-pan{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card-bg);border:1.5px solid var(--border);border-radius:10px;z-index:200;box-shadow:var(--shadow-lg);max-height:280px;display:none;flex-direction:column}
.dd-pan.open{display:flex}
.dd-search{padding:9px 12px;font-size:16px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);outline:none;border-radius:10px 10px 0 0}
.dd-list{overflow-y:auto;flex:1;list-style:none;padding:4px 0;margin:0}
.dd-list li{padding:9px 12px;cursor:pointer;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-list li:hover,.dd-list li.sel{background:var(--navy-light);color:#fff}
.dd-list li.none{color:var(--muted);font-style:italic;cursor:default}
.filter-clear{background:var(--card-bg);border:1.5px solid var(--border);color:var(--muted);border-radius:10px;padding:0 12px;font-weight:600;font-size:13px;min-height:40px;flex:0 0 auto}
.filter-clear.show{color:var(--danger);border-color:var(--danger)}

.content{max-width:1100px;margin:0 auto;width:100%;padding:12px}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:640px){.stat-grid{grid-template-columns:repeat(4,1fr);gap:12px}}
.stat-card{background:var(--card-bg);border-radius:var(--radius-md);padding:12px 14px;border:1px solid var(--border);border-top:3px solid var(--gold)}
.stat-card .s-label{font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.3px;margin-bottom:4px}
.stat-card .s-value{font-size:22px;font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums}
.stat-card.c4{border-top-color:var(--c4)}.stat-card.c4 .s-value{color:var(--c4)}
.stat-card.warn{border-top-color:var(--warning)}.stat-card.warn .s-value{color:var(--warning)}

.act-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;border:1px solid transparent;min-height:42px;transition:opacity .15s,transform .1s}
.btn:hover{opacity:.9}.btn:active{transform:scale(.97)}
.btn-excel{background:linear-gradient(135deg,#10b981,#059669);color:#fff;flex:1;min-width:200px}

/* Zone */
.zone{margin-bottom:18px}
.zone-head{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--zone-bg);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:10px;cursor:pointer}
.zone-head .zt{font-weight:700;font-size:15px}
.zone-head .zc{font-size:12px;color:var(--muted);font-weight:600}
.zone-head .zchev{margin-left:auto;transition:transform .2s;color:var(--muted);font-size:13px}
.zone.collapsed .zchev{transform:rotate(-90deg)}
.zone.collapsed .shelf-grid{display:none}
.shelf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.shelf-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:11px 12px;text-align:left;box-shadow:var(--shadow-sm);transition:transform .1s,box-shadow .15s;display:flex;flex-direction:column;gap:3px;color:var(--text)}
.shelf-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:var(--gold)}
.shelf-card:active{transform:scale(.98)}
.shelf-card .sname{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px}
.shelf-card .sdot{width:8px;height:8px;border-radius:50%;background:var(--c4);flex-shrink:0}
.shelf-card .ssub{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}

/* Shelf detail */
.detail-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.back-btn{background:var(--card-bg);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:8px 14px;font-weight:600;font-size:13px;min-height:40px;display:flex;align-items:center;gap:6px}
.detail-title{font-size:20px;font-weight:700}
.detail-title small{display:block;font-size:12px;color:var(--muted);font-weight:500}

.loc-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm)}
.loc-card.hl{border-color:var(--gold);box-shadow:var(--shadow-gold)}
.loc-head{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--zone-bg);border-bottom:1px solid var(--border)}
.loc-head .lcode{font-family:'Courier New',monospace;font-weight:700;font-size:14px;color:var(--navy)}
body.dark .loc-head .lcode{color:var(--gold-light)}
.loc-head .lcount{margin-left:auto;font-size:11px;color:var(--muted);font-weight:600}
.plist{display:flex;flex-direction:column}
.prow{display:flex;align-items:center;gap:12px;padding:9px 13px;border-bottom:1px solid var(--border)}
.prow:last-child{border-bottom:none}
.pinfo{flex:1;min-width:0}
.pname{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbc{font-family:'Courier New',monospace;font-size:12px;color:var(--muted);margin-top:2px;letter-spacing:.3px}
.pqty{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap;flex-shrink:0;font-size:13px}
.pqty .ea{color:var(--muted);font-weight:600;font-size:11.5px}
.nf{color:var(--warning);font-size:11px}

/* Search results */
.sr-row{display:flex;align-items:center;gap:10px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 12px;margin-bottom:7px;box-shadow:var(--shadow-sm);text-align:left;width:100%;color:var(--text)}
.sr-row:hover{border-color:var(--gold)}
.sr-row .srl{flex:1;min-width:0}
.sr-row .srname{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-row .srmeta{font-size:11.5px;color:var(--muted);font-family:'Courier New',monospace;margin-top:2px}
.sr-row .srloc{background:var(--c4);color:#06381c;font-weight:700;font-size:11px;font-family:'Courier New',monospace;padding:4px 8px;border-radius:8px;white-space:nowrap}
.sr-row .srqty{font-weight:700;font-variant-numeric:tabular-nums;font-size:12.5px;white-space:nowrap;text-align:right}

.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .ico{font-size:40px;opacity:.5;margin-bottom:8px}

/* Spinner */
#spinner{display:none;position:fixed;inset:0;background:rgba(13,27,62,.55);align-items:center;justify-content:center;z-index:99999;backdrop-filter:blur(3px)}
#spinner.show{display:flex}
.spin-box{background:var(--card-bg);border-radius:var(--radius-lg);padding:30px 38px;text-align:center;border-top:4px solid var(--gold);min-width:230px}
.spin-ring{width:46px;height:46px;border:5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));right:16px;padding:12px 18px;border-radius:var(--radius-md);color:#fff;z-index:9999;font-weight:500;box-shadow:var(--shadow-lg);max-width:90vw;font-size:13px;animation:slin .3s ease}
@keyframes slin{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{background:var(--success)}.toast.error{background:var(--danger)}.toast.info{background:var(--navy-mid);border-left:3px solid var(--gold)}

#backToTop{position:fixed;bottom:max(20px,calc(14px + env(safe-area-inset-bottom)));right:max(14px,calc(12px + env(safe-area-inset-right)));background:var(--gold);color:var(--navy);border-radius:50%;width:46px;height:46px;display:none;align-items:center;justify-content:center;box-shadow:var(--shadow-gold);z-index:88;font-size:20px;font-weight:700}
#backToTop.show{display:flex}
.hidden{display:none}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-text">RATTANA <span>C4-LOC</span></div>
    <div class="hver" id="hver">v1.2 · 2026-06-17</div>
  </div>
  <div class="hsp"></div>
  <button class="icon-btn" id="btnRefresh" onclick="refreshData()" title="โหลดใหม่">⟳</button>
  <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="สลับธีม">🌙</button>
  <a href="https://rattanaphaiboon.github.io/app/rattana-hub.html" class="hub-btn" title="กลับ Hub">🏠 Hub</a>
</header>

<div class="toolbar">
  <div class="search-box">
    <span class="si">🔍</span>
    <input type="text" id="search" placeholder="ค้นหา ชื่อสินค้า / บาร์โค้ด / ตำแหน่ง" autocomplete="off" oninput="onSearch()">
    <button class="sc" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div class="filter-row">
    <div class="dd" id="dd-shelf">
      <button class="dd-trig" id="dd-shelf-trig" onclick="ddToggle('shelf')"><span id="dd-shelf-lbl">ทุกชั้น</span><span>▾</span></button>
      <div class="dd-pan" id="dd-shelf-pan"><input class="dd-search" placeholder="ค้นหาชั้น…" oninput="ddFilter('shelf',this.value)"><ul class="dd-list" id="dd-shelf-list"></ul></div>
    </div>
    <div class="dd" id="dd-bay">
      <button class="dd-trig" id="dd-bay-trig" onclick="ddToggle('bay')"><span id="dd-bay-lbl">ทุกช่อง</span><span>▾</span></button>
      <div class="dd-pan" id="dd-bay-pan"><input class="dd-search" placeholder="ค้นหาช่อง…" oninput="ddFilter('bay',this.value)"><ul class="dd-list" id="dd-bay-list"></ul></div>
    </div>
    <div class="dd" id="dd-level">
      <button class="dd-trig" id="dd-level-trig" onclick="ddToggle('level')"><span id="dd-level-lbl">ทุกชั้นที่</span><span>▾</span></button>
      <div class="dd-pan" id="dd-level-pan"><input class="dd-search" placeholder="ค้นหาชั้นที่…" oninput="ddFilter('level',this.value)"><ul class="dd-list" id="dd-level-list"></ul></div>
    </div>
    <button class="filter-clear" id="filterClear" onclick="clearFilter()">ล้าง</button>
  </div>
</div>

<div class="content" id="content"></div>

<button id="backToTop" onclick="scrollTo({top:0,behavior:'smooth'})">↑</button>
<div id="spinner"><div class="spin-box"><div class="spin-ring"></div><p id="spinMsg">กำลังโหลด…</p></div></div>

<script>
/* ════════════════════ CONFIG ════════════════════ */
const CONFIG = {
  CHECK_SHEET_ID: '1OmdfoSmPPA3ueKn624AU-WY6BJxS5iSS4e5YlPgl5nk', // master: location ↔ barcode (tab "check")
  CHECK_TAB: 'check',
  PROD_SHEET_ID: '16mYDqAqqJma-_0vCIAajy6bcjdOZ7F6VagxkdkqAB2I',  // Stocksync PDDT (product master)
  PROD_TAB: 'PDDT',
  CACHE_KEY: 'c4loc_data_v2',
  CACHE_TTL: 5*60*1000,
};

/* ════════════════════ STATE ════════════════════ */
let ITEMS=[];          // {loc, bc, name, stock, qtyCS, found, shelf, bay, level}
let SHELVES=new Map(); // shelf -> {shelf, zone, locs:Map<loc,{loc,bay,level,items[]}>}
let STATS={};
let VIEW={mode:'home', shelf:null};
let FILTER={shelf:'', bay:'', level:''};

/* ════════════════════ THEME ════════════════════ */
function applyTheme(t){document.body.classList.toggle('dark',t==='dark');const b=document.getElementById('themeBtn');if(b)b.textContent=t==='dark'?'☀️':'🌙';}
function toggleTheme(){const n=document.body.classList.contains('dark')?'light':'dark';localStorage.setItem('rattana_theme',n);applyTheme(n);}
applyTheme(localStorage.getItem('rattana_theme')||'light');

/* ════════════════════ UI HELPERS ════════════════════ */
const $=s=>document.querySelector(s);
function showSpinner(m){$('#spinMsg').textContent=m||'กำลังโหลด…';$('#spinner').classList.add('show');}
function hideSpinner(){$('#spinner').classList.remove('show');}
function toast(msg,type){const t=document.createElement('div');t.className='toast '+(type||'info');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3200);}
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmtN(n){return Number(n).toLocaleString('en-US');}

/* ════════════════════ CS.EA (สูตรเดียวกับ Stock-C4 fmtStock — ทศนิยม×100, defensive ด้วย QTY CS) ════════════════════ */
function csEa(v,qtyCS){
  const s=String(v==null?'':v).trim().replace(/,/g,'');
  if(!s||s==='-'||s==='—'||s==='#N/A')return {cs:null,ea:null,text:'—'};
  const n=parseFloat(s); if(isNaN(n))return {cs:null,ea:null,text:'—'};
  if(n===0)return {cs:0,ea:0,text:'0'};
  const sign=n<0?-1:1, abs=Math.abs(n), cs=Math.floor(abs);
  let ea=Math.round((abs-cs)*100);
  const per=parseInt(qtyCS,10)||0;
  if(per>1&&ea>=per){const ea1=Math.round((abs-cs)*10);if(ea1<per)ea=ea1;}
  const csN=sign<0?-cs:cs;
  const text=(sign<0?'-':'')+cs.toLocaleString('en-US')+' CS'+(ea?' '+ea+' EA':'');
  return {cs:csN, ea, text};
}
// HTML qty (EA part muted)
function csEaHtml(v,qtyCS){
  const e=csEa(v,qtyCS);
  if(e.text==='—')return '—';
  if(e.ea===0||e.cs===null)return esc(e.text);
  const sign=(String(v).trim().charAt(0)==='-')?'-':'';
  return sign+fmtN(Math.abs(e.cs))+' CS <span class="ea">'+e.ea+' EA</span>';
}

/* ════════════════════ DATA HELPERS ════════════════════ */
const bcKey=s=>String(s==null?'':s).replace(/[^0-9]/g,'');
function parseLoc(raw){
  const body=String(raw||'').trim().replace(/^c4/i,'').replace(/^[.\-\s]+/,'');
  const p=body.split('.');
  return {shelf:(p[0]||'').trim(), bay:(p[1]||'').trim(), level:(p[2]||'').trim()};
}
function zoneOf(shelf){if(/^\d+$/.test(shelf))return 'NUM';const m=shelf.match(/^[A-Za-z]+/);return m?m[0].toUpperCase():'OTHER';}
const ZONE_LABEL={NUM:'ชั้นหมายเลข (01–58)',B:'โซน B (B1 / B3)',F:'โซน F',GD:'โซน GD',TC:'โซน TC',TF:'โซน TF',TK:'โซน TK',TP:'โซน TP',OTHER:'อื่น ๆ'};
const ZONE_ORDER=['NUM','B','F','GD','TC','TF','TK','TP','OTHER'];
function shelfKey(s){s=String(s);if(/^\d+$/.test(s))return{cat:0,prefix:'',nums:[parseInt(s,10)]};return{cat:1,prefix:(s.match(/^[A-Za-z]+/)||[''])[0].toUpperCase(),nums:(s.match(/\d+/g)||[]).map(Number)};}
function cmpShelf(a,b){const ka=shelfKey(a),kb=shelfKey(b);if(ka.cat!==kb.cat)return ka.cat-kb.cat;if(ka.prefix!==kb.prefix)return ka.prefix<kb.prefix?-1:1;const n=Math.max(ka.nums.length,kb.nums.length);for(let i=0;i<n;i++){const x=ka.nums[i]??-1,y=kb.nums[i]??-1;if(x!==y)return x-y;}return 0;}
function numCmp(a,b){const aN=/^\d+$/.test(String(a).trim()),bN=/^\d+$/.test(String(b).trim());if(aN&&bN)return parseInt(a,10)-parseInt(b,10);if(aN)return -1;if(bN)return 1;return String(a).localeCompare(String(b),'th');}
function cmpLoc(a,b){let c=cmpShelf(a.shelf,b.shelf);if(c)return c;c=numCmp(a.bay,b.bay);if(c)return c;c=numCmp(a.level,b.level);if(c)return c;return String(a.name||'').localeCompare(String(b.name||''),'th');}

/* ════════════════════ FETCH ════════════════════ */
function gvizJson(url){return fetch(url).then(r=>r.text()).then(t=>JSON.parse(t.replace(/^[^(]*\(/,'').replace(/\);?\s*$/,'')).table);}
const cellVal=(c,i)=>{const x=c&&c[i];return x?(x.f!=null?x.f:x.v):'';};

async function fetchCheck(){ // all-text → read by position (0=location, 1=barcode)
  const url=`https://docs.google.com/spreadsheets/d/${CONFIG.CHECK_SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(CONFIG.CHECK_TAB)}`;
  const tbl=await gvizJson(url);const out=[];
  (tbl.rows||[]).forEach(r=>{const c=r.c||[];const loc=String(cellVal(c,0)||'').trim();const bc=bcKey(cellVal(c,1));if(loc&&bc)out.push({loc,bc});});
  return out;
}
async function fetchProdMap(){ // barcode → {name, stock, qtyCS}
  const tq=encodeURIComponent('select A,B,D,F,H,Q,BM,BR'); // NAME,CODE EA,PA,BP,CS,QTY CS,SHORT NAME,STOCK C4
  const url=`https://docs.google.com/spreadsheets/d/${CONFIG.PROD_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.PROD_TAB)}&tq=${tq}`;
  const tbl=await gvizJson(url);const map={};
  (tbl.rows||[]).forEach(r=>{
    const c=r.c||[];
    const name=String(cellVal(c,0)||'').trim();
    const qtyCS=String(cellVal(c,5)||'').trim();
    const stock=String(cellVal(c,7)||'').trim();
    for(const i of [1,2,3,4]){const k=bcKey(cellVal(c,i));if(k&&!map[k])map[k]={name,stock,qtyCS};}
  });
  return map;
}

async function loadData(useCache){
  if(useCache){try{const raw=JSON.parse(localStorage.getItem(CONFIG.CACHE_KEY));if(raw&&Date.now()-raw.ts<CONFIG.CACHE_TTL&&raw.items){ITEMS=raw.items;buildIndex();return true;}}catch(e){}}
  showSpinner('กำลังโหลดข้อมูลตำแหน่ง + สินค้า…');
  try{
    const [chk,pmap]=await Promise.all([fetchCheck(),fetchProdMap()]);
    chk.forEach(it=>{const p=pmap[it.bc];it.name=p?p.name:'';it.stock=p?p.stock:'';it.qtyCS=p?p.qtyCS:'';it.found=!!p;});
    ITEMS=chk;buildIndex();
    try{localStorage.setItem(CONFIG.CACHE_KEY,JSON.stringify({ts:Date.now(),items:ITEMS}));}catch(e){}
    return true;
  }catch(e){console.error(e);toast('โหลดข้อมูลไม่สำเร็จ — กด ⟳ อีกครั้ง','error');return false;}
  finally{hideSpinner();}
}

function buildIndex(){
  SHELVES=new Map();let found=0;
  ITEMS.forEach(it=>{
    const {shelf,bay,level}=parseLoc(it.loc);
    it.shelf=shelf;it.bay=bay;it.level=level;if(it.found)found++;
    if(!SHELVES.has(shelf))SHELVES.set(shelf,{shelf,zone:zoneOf(shelf),locs:new Map()});
    const sh=SHELVES.get(shelf);
    if(!sh.locs.has(it.loc))sh.locs.set(it.loc,{loc:it.loc,bay,level,items:[]});
    sh.locs.get(it.loc).items.push(it);
  });
  const locs=new Set(ITEMS.map(i=>i.loc));
  STATS={shelves:SHELVES.size,locs:locs.size,items:ITEMS.length,notFound:ITEMS.length-found};
}

/* ════════════════════ SHARED RENDER ════════════════════ */
function locCardHtml(l,hl){
  const items=l.items.slice().sort((a,b)=>String(a.name||'zzz').localeCompare(String(b.name||'zzz'),'th'));
  const rows=items.map(it=>`<div class="prow">
    <div class="pinfo"><div class="pname"${it.found?` title="${esc(it.name)}"`:''}>${it.found?esc(it.name):'<span class="nf">— ไม่พบใน PDDT —</span>'}</div><div class="pbc">${esc(it.bc)}</div></div>
    <div class="pqty">${it.found?csEaHtml(it.stock,it.qtyCS):'—'}</div></div>`).join('');
  return `<div class="loc-card ${hl?'hl':''}" id="loc-${esc(l.loc)}">
    <div class="loc-head"><span class="lcode">📍 ${esc(l.loc)}</span><span class="lcount">${l.items.length} รายการ</span></div>
    <div class="plist">${rows}</div></div>`;
}

function render(){
  if(VIEW.mode==='filter'){renderFilter();return;}
  if(VIEW.mode==='shelf'){renderShelf(VIEW.shelf);return;}
  renderHome();
}

/* ════════════════════ HOME ════════════════════ */
function renderHome(){
  const c=$('#content');const byZone={};
  for(const sh of SHELVES.values()){(byZone[sh.zone]=byZone[sh.zone]||[]).push(sh);}
  let zonesHtml='';
  ZONE_ORDER.forEach(z=>{
    const arr=byZone[z];if(!arr||!arr.length)return;
    arr.sort((a,b)=>cmpShelf(a.shelf,b.shelf));
    const cards=arr.map(sh=>{
      const prod=Array.from(sh.locs.values()).reduce((s,l)=>s+l.items.length,0);
      return `<button class="shelf-card" onclick="openShelf('${esc(sh.shelf).replace(/'/g,"\\'")}')">
        <div class="sname"><span class="sdot"></span>${esc(sh.shelf)}</div>
        <div class="ssub">${sh.locs.size} ตำแหน่ง · ${fmtN(prod)} สินค้า</div></button>`;
    }).join('');
    zonesHtml+=`<div class="zone" id="zone-${z}">
      <div class="zone-head" onclick="document.getElementById('zone-${z}').classList.toggle('collapsed')">
        <span class="zt">${esc(ZONE_LABEL[z]||z)}</span><span class="zc">${arr.length} ชั้น</span><span class="zchev">▼</span></div>
      <div class="shelf-grid">${cards}</div></div>`;
  });
  c.innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="s-label">ชั้น (Shelf)</div><div class="s-value">${fmtN(STATS.shelves)}</div></div>
      <div class="stat-card c4"><div class="s-label">ตำแหน่ง (Location)</div><div class="s-value">${fmtN(STATS.locs)}</div></div>
      <div class="stat-card"><div class="s-label">รายการสินค้า</div><div class="s-value">${fmtN(STATS.items)}</div></div>
      <div class="stat-card warn"><div class="s-label">ไม่พบใน PDDT</div><div class="s-value">${fmtN(STATS.notFound)}</div></div>
    </div>
    <div class="act-row"><button class="btn btn-excel" onclick="exportAll()">📊 Export Excel — เรียงตามตำแหน่ง (6 ชั้น/ชีท)</button></div>
    ${zonesHtml}`;
}

/* ════════════════════ SHELF DETAIL ════════════════════ */
function openShelf(shelf,hlLoc){VIEW={mode:'shelf',shelf};renderShelf(shelf,hlLoc);scrollTo({top:0});}
function backHome(){VIEW={mode:'home',shelf:null};$('#search').value='';$('#searchClear').classList.remove('show');renderHome();}
function renderShelf(shelf,hlLoc){
  const sh=SHELVES.get(shelf);const c=$('#content');
  if(!sh){c.innerHTML='<div class="empty">ไม่พบชั้นนี้</div>';return;}
  const locs=Array.from(sh.locs.values()).sort((a,b)=>numCmp(a.bay,b.bay)||numCmp(a.level,b.level)||String(a.loc).localeCompare(String(b.loc)));
  const totalProd=locs.reduce((s,l)=>s+l.items.length,0);
  const locsHtml=locs.map(l=>locCardHtml(l,hlLoc&&hlLoc===l.loc)).join('');
  c.innerHTML=`<div class="detail-head">
      <button class="back-btn" onclick="backHome()">← กลับ</button>
      <button class="back-btn" onclick="exportShelf('${esc(shelf).replace(/'/g,"\\'")}')">📊 Excel ชั้นนี้</button></div>
    <div class="detail-title">ชั้น ${esc(shelf)}<small>${locs.length} ตำแหน่ง · ${fmtN(totalProd)} รายการสินค้า</small></div>
    ${locsHtml||'<div class="empty">ไม่มีสินค้าในชั้นนี้</div>'}`;
  if(hlLoc){const el=document.getElementById('loc-'+hlLoc);if(el)el.scrollIntoView({block:'center'});}
}

/* ════════════════════ FILTER (shelf / bay / level) ════════════════════ */
function shelfOpts(){return Array.from(SHELVES.keys()).sort(cmpShelf);}
function bayOpts(shelf){const sh=SHELVES.get(shelf);if(!sh)return [];const set=new Set();sh.locs.forEach(l=>{if(l.bay)set.add(l.bay);});return Array.from(set).sort(numCmp);}
function levelOpts(shelf,bay){const sh=SHELVES.get(shelf);if(!sh)return [];const set=new Set();sh.locs.forEach(l=>{if(l.bay===bay&&l.level)set.add(l.level);});return Array.from(set).sort(numCmp);}

function renderDD(kind){
  let items,cur,allLabel;
  if(kind==='shelf'){items=shelfOpts();cur=FILTER.shelf;allLabel='ทุกชั้น';}
  else if(kind==='bay'){items=FILTER.shelf?bayOpts(FILTER.shelf):[];cur=FILTER.bay;allLabel='ทุกช่อง';}
  else {items=(FILTER.shelf&&FILTER.bay)?levelOpts(FILTER.shelf,FILTER.bay):[];cur=FILTER.level;allLabel='ทุกชั้นที่';}
  const ul=document.getElementById('dd-'+kind+'-list');
  let html=`<li class="${!cur?'sel':''}" onclick="pickFilter('${kind}','')">${allLabel}</li>`;
  if(!items.length&&kind!=='shelf')html+=`<li class="none">— เลือก${kind==='bay'?'ชั้น':'ช่อง'}ก่อน —</li>`;
  items.forEach(v=>{html+=`<li class="${cur===v?'sel':''}" onclick="pickFilter('${kind}','${String(v).replace(/'/g,"\\'")}')">${esc(v)}</li>`;});
  ul.innerHTML=html;
  const prefix=kind==='shelf'?'ชั้น ':kind==='bay'?'ช่อง ':'ชั้นที่ ';
  document.getElementById('dd-'+kind+'-lbl').textContent=cur?prefix+cur:allLabel;
  document.getElementById('dd-'+kind+'-trig').classList.toggle('active',!!cur);
}
function renderAllDD(){renderDD('shelf');renderDD('bay');renderDD('level');document.getElementById('filterClear').classList.toggle('show',!!(FILTER.shelf||FILTER.bay||FILTER.level));}
function ddToggle(kind){const pan=document.getElementById('dd-'+kind+'-pan');const open=pan.classList.contains('open');closeDD();if(!open){pan.classList.add('open');const s=pan.querySelector('.dd-search');if(s){s.value='';ddFilter(kind,'');setTimeout(()=>s.focus(),30);}}}
function closeDD(){document.querySelectorAll('.dd-pan').forEach(p=>p.classList.remove('open'));}
function ddFilter(kind,q){q=q.toLowerCase();document.querySelectorAll('#dd-'+kind+'-list li').forEach(li=>{li.style.display=li.textContent.toLowerCase().includes(q)?'':'none';});}
document.addEventListener('click',e=>{if(!e.target.closest('.dd'))closeDD();});

function pickFilter(kind,val){
  if(kind==='shelf'){FILTER.shelf=val;FILTER.bay='';FILTER.level='';}
  else if(kind==='bay'){FILTER.bay=val;FILTER.level='';}
  else FILTER.level=val;
  closeDD();
  $('#search').value='';$('#searchClear').classList.remove('show');
  renderAllDD();
  if(FILTER.shelf||FILTER.bay||FILTER.level){VIEW={mode:'filter'};renderFilter();}
  else {VIEW={mode:'home'};renderHome();}
  scrollTo({top:0});
}
function clearFilter(){FILTER={shelf:'',bay:'',level:''};renderAllDD();VIEW={mode:'home'};renderHome();}

function filteredItems(){
  if(!FILTER.shelf)return [];
  let items=ITEMS.filter(it=>it.shelf===FILTER.shelf);
  if(FILTER.bay)items=items.filter(it=>it.bay===FILTER.bay);
  if(FILTER.level)items=items.filter(it=>it.level===FILTER.level);
  return items;
}
function renderFilter(){
  const c=$('#content');const items=filteredItems();
  const byLoc=new Map();items.forEach(it=>{if(!byLoc.has(it.loc))byLoc.set(it.loc,[]);byLoc.get(it.loc).push(it);});
  const locs=Array.from(byLoc.entries()).map(([loc,arr])=>({loc,bay:arr[0].bay,level:arr[0].level,items:arr}))
    .sort((a,b)=>numCmp(a.bay,b.bay)||numCmp(a.level,b.level)||String(a.loc).localeCompare(String(b.loc)));
  const crumb=['ชั้น '+FILTER.shelf,FILTER.bay?('ช่อง '+FILTER.bay):'',FILTER.level?('ชั้นที่ '+FILTER.level):''].filter(Boolean).join(' · ');
  const locsHtml=locs.map(l=>locCardHtml(l)).join('');
  c.innerHTML=`<div class="detail-head">
      <button class="back-btn" onclick="clearFilter()">← ทั้งหมด</button>
      <button class="back-btn" onclick="exportFilter()">📊 Excel ที่กรอง</button></div>
    <div class="detail-title">🔎 ${esc(crumb)}<small>${locs.length} ตำแหน่ง · ${fmtN(items.length)} รายการ</small></div>
    ${locsHtml||'<div class="empty">ไม่พบสินค้าตามตัวกรอง</div>'}`;
}

/* ════════════════════ SEARCH ════════════════════ */
function onSearch(){
  const q=$('#search').value.trim();
  $('#searchClear').classList.toggle('show',!!q);
  if(q){ // search overrides filter
    FILTER={shelf:'',bay:'',level:''};renderAllDD();
  }else{render();return;}
  const toks=q.toLowerCase().split(/\s+/).filter(Boolean);
  const res=ITEMS.filter(it=>{const hay=(it.name+' '+it.bc+' '+it.loc).toLowerCase();return toks.every(t=>hay.includes(t));}).sort(cmpLoc);
  const c=$('#content');
  if(!res.length){c.innerHTML=`<div class="empty"><div class="ico">🔍</div>ไม่พบ "${esc(q)}"</div>`;return;}
  const cap=400;
  const rowsHtml=res.slice(0,cap).map(it=>`
    <button class="sr-row" onclick="openShelf('${esc(it.shelf).replace(/'/g,"\\'")}','${esc(it.loc).replace(/'/g,"\\'")}')">
      <div class="srl"><div class="srname">${it.found?esc(it.name):'<span class="nf">— ไม่พบใน PDDT —</span>'}</div><div class="srmeta">${esc(it.bc)}</div></div>
      <span class="srqty">${it.found?csEaHtml(it.stock,it.qtyCS):'—'}</span>
      <span class="srloc">${esc(it.loc)}</span></button>`).join('');
  c.innerHTML=`<div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600">พบ ${fmtN(res.length)} รายการ${res.length>cap?` (แสดง ${cap} แรก)`:''}</div>${rowsHtml}`;
}
function clearSearch(){$('#search').value='';$('#searchClear').classList.remove('show');VIEW={mode:'home'};renderHome();}

/* ════════════════════ EXCEL ════════════════════ */
const COL_HEAD=['ตำแหน่ง','ชื่อสินค้า','บาร์โค้ด','จำนวน','CS','EA'];
function itemRow(it){
  if(!it.found)return [it.loc,'(ไม่พบใน PDDT)',it.bc,'','',''];
  const e=csEa(it.stock,it.qtyCS);
  return [it.loc,it.name,it.bc,e.text,e.cs==null?'':e.cs,e.ea==null?'':e.ea];
}
function makeSheet(aoa){
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  const range=XLSX.utils.decode_range(ws['!ref']);
  for(let R=1;R<=range.e.r;R++){ // barcode col → TEXT (keep leading zeros / no 1.2E+12)
    const a=XLSX.utils.encode_cell({r:R,c:2});
    if(ws[a]){ws[a].t='s';ws[a].v=String(ws[a].v==null?'':ws[a].v);ws[a].z='@';}
  }
  ws['!cols']=[{wch:18},{wch:46},{wch:18},{wch:14},{wch:7},{wch:7}];
  return ws;
}
const sanitizeName=s=>String(s).replace(/[:\\/?*\[\]]/g,'-').slice(0,31);
function todayStr(){const d=new Date(),p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function rowsToWb(rows,sheetName){const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,makeSheet([COL_HEAD,...rows.map(itemRow)]),sanitizeName(sheetName));return wb;}

function exportAll(){
  if(!ITEMS.length){toast('ยังไม่มีข้อมูล','error');return;}
  showSpinner('กำลังสร้างไฟล์ Excel…');
  setTimeout(()=>{
    try{
      const shelvesSorted=Array.from(SHELVES.keys()).sort(cmpShelf);
      const wb=XLSX.utils.book_new();const used={};const toc=[['ชีท','ชั้น','ตำแหน่ง','รายการสินค้า']];
      for(let i=0;i<shelvesSorted.length;i+=6){
        const chunk=shelvesSorted.slice(i,i+6);let rows=[];const locSet=new Set();
        chunk.forEach(s=>{SHELVES.get(s).locs.forEach(l=>{l.items.forEach(it=>rows.push(it));locSet.add(l.loc);});});
        rows.sort(cmpLoc);
        let name=sanitizeName(chunk.length>1?`${chunk[0]}_${chunk[chunk.length-1]}`:`${chunk[0]}`);
        let base=name,k=2;while(used[name]){name=sanitizeName(base+'_'+k);k++;}used[name]=1;
        XLSX.utils.book_append_sheet(wb,makeSheet([COL_HEAD,...rows.map(itemRow)]),name);
        toc.push([name,chunk.join(', '),locSet.size,rows.length]);
      }
      const tocWs=XLSX.utils.aoa_to_sheet(toc);tocWs['!cols']=[{wch:18},{wch:40},{wch:12},{wch:14}];
      XLSX.utils.book_append_sheet(wb,tocWs,'สารบัญ');
      wb.SheetNames.unshift(wb.SheetNames.pop());
      XLSX.writeFile(wb,`C4-Location_${todayStr()}.xlsx`);
      toast(`Export สำเร็จ · ${wb.SheetNames.length-1} ชีท`,'success');
    }catch(e){console.error(e);toast('Export ไม่สำเร็จ','error');}
    finally{hideSpinner();}
  },60);
}
function exportShelf(shelf){
  const sh=SHELVES.get(shelf);if(!sh){toast('ไม่พบชั้น','error');return;}
  let rows=[];sh.locs.forEach(l=>l.items.forEach(it=>rows.push(it)));rows.sort(cmpLoc);
  XLSX.writeFile(rowsToWb(rows,shelf),`C4-${sanitizeName(shelf)}_${todayStr()}.xlsx`);
  toast('Export ชั้น '+shelf+' สำเร็จ','success');
}
function exportFilter(){
  const rows=filteredItems().slice().sort(cmpLoc);
  if(!rows.length){toast('ไม่มีข้อมูลให้ export','error');return;}
  const nm=['C4',FILTER.shelf,FILTER.bay,FILTER.level].filter(Boolean).join('-');
  XLSX.writeFile(rowsToWb(rows,nm),`${sanitizeName(nm)}_${todayStr()}.xlsx`);
  toast('Export ตัวกรองสำเร็จ','success');
}

/* ════════════════════ REFRESH / INIT ════════════════════ */
async function refreshData(){
  const b=$('#btnRefresh');b.style.transition='transform .6s';b.style.transform='rotate(360deg)';
  const ok=await loadData(false);
  setTimeout(()=>{b.style.transform='';b.style.transition='';},600);
  if(ok){renderAllDD();render();toast('อัพเดทข้อมูลแล้ว ✓','success');}
}
window.addEventListener('scroll',()=>{document.getElementById('backToTop').classList.toggle('show',scrollY>300);});

(async function init(){
  const ok=await loadData(true);
  if(ok){renderAllDD();render();}
  else $('#content').innerHTML='<div class="empty"><div class="ico">⚠️</div>โหลดข้อมูลไม่สำเร็จ<br><button class="btn btn-excel" style="flex:0;margin-top:12px" onclick="refreshData()">ลองใหม่</button></div>';
})();
</script>
