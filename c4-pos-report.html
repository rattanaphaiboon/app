<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>POS Rattana Mart Report v1.14</title>

<link rel="icon" type="image/png" href="icons/c4-pos-report.png"/>
<link rel="apple-touch-icon" href="c4-pos-report-icon-180.png"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
:root {
  --brand-50:#eff4ff; --brand-100:#dbe6ff; --brand-200:#bfd3ff;
  --brand-500:#2563eb; --brand-600:#1d4ed8; --brand-700:#1e40af;
  --brand-800:#1e3a8a; --brand-900:#172554;
  --gold:#c9a84c;

  --ok-50:#ecfdf5; --ok-100:#d1fae5; --ok-500:#10b981; --ok-600:#059669; --ok-700:#047857;
  --warn-50:#fffbeb; --warn-100:#fef3c7; --warn-500:#f59e0b; --warn-600:#d97706; --warn-700:#b45309;
  --bad-50:#fef2f2; --bad-100:#fee2e2; --bad-500:#ef4444; --bad-600:#dc2626; --bad-700:#b91c1c;

  --bg:#dbe7f5; --surface:#fff; --surface-2:#f1f5fb;
  --border:#e5e7eb; --border-2:#d1d5db;
  --ink:#0f172a; --ink-2:#334155; --muted:#475569; --muted-2:#64748b;

  --shadow-1:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.06);
  --shadow-2:0 4px 12px rgba(15,23,42,.06),0 2px 4px rgba(15,23,42,.04);
  --shadow-top:0 -4px 16px rgba(15,23,42,.08),0 -1px 4px rgba(15,23,42,.04);

  --fz-base:16px;
  --fz-xs:calc(var(--fz-base) - 3px);
  --fz-sm:calc(var(--fz-base) - 1px);
  --fz-md:var(--fz-base);
  --fz-lg:calc(var(--fz-base) + 3px);
  --fz-xl:calc(var(--fz-base) + 7px);
  --fz-2xl:calc(var(--fz-base) + 12px);

  --radius-sm:8px; --radius:12px; --radius-lg:16px; --radius-xl:20px;
}
[data-theme="dark"] {
  --brand-50:#1e2a4d; --brand-100:#243a6d; --brand-200:#2c4a8c;
  --brand-500:#4f8aff; --brand-600:#3b75e8; --brand-700:#2d62d4; --brand-800:#2552bd; --brand-900:#1e40af;
  --ok-50:#0d2a21; --ok-100:#0f3a2c;
  --warn-50:#2a1e08; --warn-100:#3a2a0d;
  --bad-50:#2a1414; --bad-100:#3a1d1d;
  --bg:#0b1220; --surface:#131a2b; --surface-2:#1a2236;
  --border:#25304a; --border-2:#344162;
  --ink:#f1f5f9; --ink-2:#e2e8f0; --muted:#cbd5e1; --muted-2:#94a3b8;
  --shadow-1:0 1px 2px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.3);
  --shadow-2:0 4px 14px rgba(0,0,0,.45),0 2px 4px rgba(0,0,0,.35);
  --shadow-top:0 -4px 16px rgba(0,0,0,.5),0 -1px 4px rgba(0,0,0,.3);
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: "IBM Plex Sans Thai","IBM Plex Sans","Noto Sans Thai",system-ui,-apple-system,sans-serif;
  font-feature-settings: "kern","tnum";
  color: var(--ink);
  background: var(--bg);
  font-size: var(--fz-base);
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; color: inherit; }
svg { width: 1em; height: 1em; flex-shrink: 0; }
.tab svg { width: 16px; height: 16px; }
.submit svg { width: 18px; height: 18px; }
.card-head .ic svg { width: 19px; height: 19px; }
.photo-hint .ic svg { width: 20px; height: 20px; }
.photo-act svg, .detail-act svg, .ovr-btn svg { width: 14px; height: 14px; }
.slot-remove svg { width: 16px; height: 16px; }
.add-slot svg { width: 16px; height: 16px; }
.detail-row .ic svg { width: 14px; height: 14px; }
.modal-icon svg { width: 26px; height: 26px; }
.toast svg { width: 14px; height: 14px; }
.dot svg { display: none; }

#root { height: 100%; }
.app { display: flex; flex-direction: column; height: 100%; background: var(--bg); position: relative; }

.app-top {
  position: relative; z-index: 3;
  background: linear-gradient(180deg,#0f2666 0%,#1d3a8a 100%);
  color: #fff;
  padding: calc(env(safe-area-inset-top, 0px) + 16px) 14px 0;
  flex-shrink: 0;
}
[data-theme="dark"] .app-top { background: linear-gradient(180deg,#0a1632 0%,#122251 100%); border-bottom: 1px solid var(--border); }
.app-brand { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-bottom: 14px; }
.brand-logo { display: flex; align-items: center; gap: 10px; min-width: 0; }
.brand-mark {
  width: 40px; height: 40px; border-radius: 11px;
  box-shadow: 0 2px 6px rgba(0,0,0,.18);
  flex-shrink: 0; overflow: hidden;
}
.brand-mark img { width: 100%; height: 100%; display: block; }
.brand-text { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
.brand-text .b1 { font-size: var(--fz-md); font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.brand-text .b2 { font-size: var(--fz-xs); color: rgba(255,255,255,.85); margin-top: 2px; font-weight: 500; }
.brand-text .b2 .ver { background: rgba(255,255,255,.18); padding: 1px 6px; border-radius: 5px; margin-left: 4px; font-weight: 600; }
.brand-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.hub-btn {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--gold); color: #2a1d00;
  border: 0; border-radius: 999px;
  padding: 7px 12px;
  font-size: var(--fz-xs); font-weight: 700;
  box-shadow: 0 2px 6px rgba(0,0,0,.2);
}
.hub-btn svg { width: 14px; height: 14px; }
.brand-user {
  display: flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.24);
  padding: 5px 10px 5px 5px; border-radius: 999px;
  font-size: var(--fz-xs); color: #fff; font-weight: 600;
  max-width: 130px;
}
.brand-user .avatar {
  width: 22px; height: 22px; border-radius: 50%;
  background: linear-gradient(135deg,#fcd34d,#f59e0b);
  display: grid; place-items: center;
  color: #422006; font-weight: 700; font-size: 10px;
  flex-shrink: 0;
}
.brand-user .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.logout-btn {
  appearance: none; background: transparent; border: 0;
  color: rgba(255,255,255,.6); padding: 0 4px;
  font-size: 14px; cursor: pointer;
}

.tabs {
  display: flex; gap: 4px; padding: 4px;
  background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.08);
  border-radius: 12px; margin-bottom: -14px; position: relative; z-index: 4;
}
.tab {
  flex: 1; appearance: none; border: 0; background: transparent;
  color: rgba(255,255,255,.88); padding: 10px;
  font-size: var(--fz-md); font-weight: 700;
  border-radius: 9px;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  transition: background .15s, color .15s;
}
.tab[data-active="true"] { background: #fff; color: var(--brand-800); box-shadow: 0 1px 3px rgba(0,0,0,.18); }
[data-theme="dark"] .tab[data-active="true"] { background: var(--brand-500); color: #fff; }
.tab .count {
  display: inline-grid; place-items: center;
  min-width: 18px; height: 18px; padding: 0 5px;
  border-radius: 9px; font-size: 11px; font-weight: 700;
  background: rgba(255,255,255,.28); color: #fff;
}
.tab[data-active="true"] .count { background: var(--brand-100); color: var(--brand-800); }

.app-scroll {
  flex: 1; overflow: auto;
  padding: 22px 12px calc(env(safe-area-inset-bottom, 0px) + 180px);
  -webkit-overflow-scrolling: touch;
}

.card {
  background: var(--surface); border-radius: var(--radius-lg);
  border: 1px solid var(--border); box-shadow: var(--shadow-1);
  overflow: hidden; margin-bottom: 10px;
}
.card-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px 8px; }
.card-head .ic {
  width: 34px; height: 34px; border-radius: 9px;
  display: grid; place-items: center;
  background: var(--brand-50); color: var(--brand-700); flex-shrink: 0;
}
.card-head .title { flex: 1; display: flex; flex-direction: column; line-height: 1.2; }
.card-head .title .t1 {
  font-size: var(--fz-lg); font-weight: 700; color: var(--ink);
  display: flex; align-items: center; gap: 6px; letter-spacing: -0.01em;
  flex-wrap: wrap;
}
.card-head .title .t2 { font-size: var(--fz-xs); color: var(--muted); margin-top: 3px; line-height: 1.4; }
.req-pill { font-size: var(--fz-xs); font-weight: 700; padding: 2px 7px; border-radius: 5px; background: var(--bad-100); color: var(--bad-700); }
.opt-pill { font-size: var(--fz-xs); font-weight: 700; padding: 2px 7px; border-radius: 5px; background: var(--surface-2); color: var(--muted); border: 1px solid var(--border); }
.card-body { padding: 2px 14px 14px; }
.card-body.tight { padding-top: 0; }

.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.field:last-child { margin-bottom: 0; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.label { font-size: var(--fz-sm); font-weight: 600; color: var(--ink); }
.label .req { color: var(--bad-600); margin-left: 2px; }
.help { font-size: var(--fz-xs); color: var(--muted); line-height: 1.5; }

.input, .select, .textarea {
  appearance: none; -webkit-appearance: none; width: 100%;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 11px 12px;
  font-size: var(--fz-md); font-weight: 500; color: var(--ink);
  transition: border-color .15s, box-shadow .15s;
}
.input:focus, .select:focus, .textarea:focus {
  outline: none; border-color: var(--brand-500);
  box-shadow: 0 0 0 4px rgba(37,99,235,.12);
}
.select {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path fill='none' stroke='%2364748b' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round' d='M4 6l4 4 4-4'/></svg>");
  background-repeat: no-repeat; background-position: right 12px center;
  background-size: 16px; padding-right: 36px;
}
[data-theme="dark"] .select {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path fill='none' stroke='%2394a3b8' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round' d='M4 6l4 4 4-4'/></svg>");
}

.amt-wrap { position: relative; }
.amt-wrap .input {
  padding-right: 52px; font-size: var(--fz-xl); font-weight: 700;
  font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
  text-align: right; color: var(--ink);
}
.amt-wrap::after {
  content: "บาท"; position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%); font-size: var(--fz-sm);
  color: var(--muted); font-weight: 600; pointer-events: none;
}

.seg {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 4px;
  background: var(--surface-2); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 3px;
}
.seg button {
  appearance: none; border: 0; background: transparent;
  padding: 10px 8px; font-size: var(--fz-md); font-weight: 600;
  color: var(--ink-2); border-radius: 9px;
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  transition: background .15s, color .15s;
}
.seg button[data-active="true"] {
  background: var(--brand-600); color: #fff;
  box-shadow: 0 2px 8px rgba(29,78,216,.35);
  font-weight: 700;
}
[data-theme="dark"] .seg button[data-active="true"] { background: var(--brand-500); color: #fff; }

.photo {
  position: relative; border-radius: var(--radius);
  border: 1.5px dashed var(--border-2); background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  padding: 14px 12px; text-align: center; min-height: 98px;
}
.photo.has-img { padding: 0; border-style: solid; border-color: var(--border); overflow: hidden; }
.photo .photo-hint { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--muted); }
.photo .photo-hint .ic {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--brand-50); color: var(--brand-700);
  display: grid; place-items: center; margin-bottom: 4px;
}
.photo .photo-hint .t { font-size: var(--fz-md); font-weight: 600; color: var(--ink); }
.photo .photo-hint .h { font-size: var(--fz-sm); color: var(--muted); }
.photo-actions { display: flex; gap: 8px; margin-top: 10px; }
.photo-act {
  flex: 1; appearance: none; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 9px 10px; font-size: var(--fz-sm); font-weight: 500;
  color: var(--ink-2); display: inline-flex;
  align-items: center; justify-content: center; gap: 6px;
}
.photo-act.primary { background: var(--brand-600); border-color: var(--brand-600); color: #fff; }
.photo-act svg { width: 16px; height: 16px; }
.photo-act:disabled { opacity: 0.5; cursor: not-allowed; }

.photo-preview { width: 100%; display: block; position: relative; }
.photo-preview .img {
  width: 100%; display: block; aspect-ratio: 4/3;
  object-fit: cover; background: #0f172a;
}
.photo-preview .ovr { position: absolute; top: 8px; right: 8px; display: flex; gap: 6px; }
.ovr-btn {
  appearance: none; background: rgba(15,23,42,.7); color: #fff;
  border: 0; border-radius: 999px; padding: 6px 10px;
  font-size: var(--fz-xs); font-weight: 500;
  display: inline-flex; align-items: center; gap: 5px;
  backdrop-filter: blur(8px);
}
.ovr-btn svg { width: 14px; height: 14px; }

.slot {
  position: relative; padding: 10px 12px;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  background: var(--surface); margin-bottom: 6px;
}
.slot:last-of-type { margin-bottom: 0; }
.slot-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.slot-no {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--brand-100); color: var(--brand-700);
  display: grid; place-items: center;
  font-size: var(--fz-sm); font-weight: 700;
}
.slot-title { flex: 1; font-size: var(--fz-md); font-weight: 600; color: var(--ink); }
.slot-remove {
  appearance: none; background: transparent; border: 0;
  width: 28px; height: 28px; border-radius: 8px;
  display: grid; place-items: center; color: var(--muted);
}
.slot-remove:hover { background: var(--bad-50); color: var(--bad-600); }

.add-slot {
  appearance: none; width: 100%; background: transparent;
  border: 1.5px dashed var(--border-2); color: var(--brand-700);
  font-weight: 700; font-size: var(--fz-md);
  padding: 11px 12px; border-radius: var(--radius);
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  margin-top: 6px;
}
.add-slot:disabled { color: var(--muted); cursor: not-allowed; opacity: .6; }
[data-theme="dark"] .add-slot { color: var(--brand-500); }

.sticky-bar {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: 8px 12px calc(env(safe-area-inset-bottom, 0px) + 10px);
  background: var(--surface); border-top: 1px solid var(--border);
  box-shadow: var(--shadow-top); z-index: 5;
  display: flex; align-items: center; gap: 10px;
}
.bar-progress {
  position: absolute; left: 0; right: 0; top: 0;
  height: 3px; background: var(--surface-2); overflow: hidden;
}
.bar-progress .bar-fill {
  position: absolute; inset: 0 auto 0 0;
  background: linear-gradient(90deg, var(--brand-500), var(--brand-600));
  transition: width .3s, background .3s;
}
.bar-progress.warn .bar-fill { background: linear-gradient(90deg, var(--warn-500), var(--warn-600)); }
.bar-progress.bad .bar-fill  { background: linear-gradient(90deg, var(--bad-500),  var(--bad-600)); }

.bar-info {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 2px;
  line-height: 1.2;
}
.bar-info .line1 {
  display: flex; align-items: baseline; gap: 6px;
  font-size: var(--fz-md); font-weight: 800;
  font-variant-numeric: tabular-nums;
  color: var(--ink); letter-spacing: -0.01em;
}
.bar-info .line1 .label { font-size: var(--fz-xs); font-weight: 600; color: var(--muted); }
.bar-info .line1 .baht { font-size: var(--fz-xs); color: var(--muted); font-weight: 600; }
.bar-info .line2 {
  display: flex; align-items: center; gap: 8px;
  font-size: var(--fz-xs); color: var(--muted-2); font-weight: 500;
  font-variant-numeric: tabular-nums;
}
.bar-info .line2 .diff-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 999px;
  font-weight: 700; font-size: var(--fz-xs);
}
.bar-info .reason {
  font-size: var(--fz-xs); font-weight: 700;
  margin-top: 1px; line-height: 1.2;
}
.bar-info .reason.warn { color: var(--warn-700); }
.bar-info .reason.bad  { color: var(--bad-700);  }
.diff-pill[data-state="ok"]   { background: var(--ok-50);   color: var(--ok-700);   }
.diff-pill[data-state="warn"] { background: var(--warn-50); color: var(--warn-700); }
.diff-pill[data-state="bad"]  { background: var(--bad-50);  color: var(--bad-700);  }
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot.ok   { background: var(--ok-500);   }
.dot.warn { background: var(--warn-500); }
.dot.bad  { background: var(--bad-500);  }

.submit {
  appearance: none; flex-shrink: 0; border: 0;
  background: linear-gradient(180deg, var(--brand-600) 0%, var(--brand-700) 100%);
  color: #fff; padding: 11px 16px; border-radius: 12px;
  font-size: var(--fz-md); font-weight: 700; white-space: nowrap;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  box-shadow: 0 4px 12px rgba(29,78,216,.25);
}
.submit:disabled { background: var(--surface-2); color: var(--muted); box-shadow: none; border: 1px solid var(--border); }
@media (max-width: 380px) {
  .submit .submit-shift { display: none; }
}

.history-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.summary-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; }
.summary-stat .s1 { font-size: var(--fz-xs); text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-2); font-weight: 700; }
.summary-stat .s2 { font-size: var(--fz-xl); font-weight: 800; font-variant-numeric: tabular-nums; color: var(--ink); margin-top: 2px; letter-spacing: -0.02em; line-height: 1.1; }
.summary-stat .s3 { font-size: var(--fz-xs); color: var(--muted); margin-top: 2px; font-weight: 500; }

.history-month { font-size: var(--fz-sm); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; color: var(--ink-2); padding: 2px 4px 8px; margin-top: 4px; }
.history-month:first-of-type { margin-top: 0; }

.hist-card {
  background: var(--surface); border-radius: var(--radius-lg);
  border: 1px solid var(--border); box-shadow: var(--shadow-1);
  margin-bottom: 10px; overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
}
.hist-card[data-expanded="true"] { border-color: var(--brand-200); box-shadow: var(--shadow-2); }
.hist-head { display: grid; grid-template-columns: 48px 1fr auto; align-items: center; gap: 12px; padding: 12px 14px; cursor: pointer; }
.hist-date {
  width: 48px; border-radius: 10px; text-align: center; padding: 6px 0;
  background: var(--brand-50); color: var(--brand-700);
  border: 1px solid var(--brand-100);
}
.hist-date .d { font-size: var(--fz-xl); font-weight: 800; line-height: 1.05; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.hist-date .m { font-size: var(--fz-xs); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; opacity: .9; margin-top: 1px; }
.hist-mid { min-width: 0; }
.hist-mid .row1 { display: flex; align-items: center; gap: 6px; font-size: var(--fz-md); font-weight: 700; color: var(--ink); margin-bottom: 3px; flex-wrap: wrap; }
.hist-mid .row1 .pos-chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: var(--fz-xs); font-weight: 700;
  padding: 2px 8px; border-radius: 999px;
  background: var(--brand-100); color: var(--brand-800);
}

// Photo compression
// ─────────────────────────────────────────────────────────────
async function compressImage(file, maxDim = window.APP_CONFIG.PHOTO_MAX_DIM, quality = window.APP_CONFIG.PHOTO_QUALITY) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          const reader2 = new FileReader();
          reader2.onload = (ev) => resolve({
            base64: ev.target.result.split(',')[1],
            dataUrl: ev.target.result,
            size: blob.size,
          });
          reader2.readAsDataURL(blob);
        }, 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function apiCall(payload) {
  const url = window.APP_CONFIG.GAS_URL;
  if (!url || url.includes('PASTE_')) throw new Error('ยังไม่ได้ตั้งค่า GAS_URL — กรุณา deploy Apps Script ก่อน');
  const res = await fetch(url, {
    method: 'POST',
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error('Network error: ' + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Unknown server error');
  return data;
}

async function fetchUsersFromSheet() {
  const { USERS_SHEET_ID, USERS_SHEET_TAB } = window.APP_CONFIG;
  const url = `https://docs.google.com/spreadsheets/d/${USERS_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(USERS_SHEET_TAB)}`;
  const res = await fetch(url);
  const text = await res.text();
  const lines = text.split(/\r?\n/).filter(Boolean);
  const parseCSVLine = (line) => {
    const out = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (c === ',' && !inQ) { out.push(cur); cur = ''; }
      else cur += c;
    }
    out.push(cur); return out;
  };
  const headers = parseCSVLine(lines[0]).map(h => h.trim());
  const rows = lines.slice(1).map(line => {
    const cells = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cells[i] || '').trim());
    return obj;
  });
  return rows;
}

        <label className="label">จำนวนเงิน</label>
        <AmountInput value={slot.amount} onChange={(v) => onChange({ ...slot, amount: v })}/>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Other slot
// ─────────────────────────────────────────────────────────────
function OtherSlot({ idx, slot, onChange, onRemove }) {
  return (
    <div className="slot">
      <div className="slot-head">
        <div className="slot-no">{idx + 1}</div>
        <div className="slot-title">รายการอื่นๆ</div>
        <button type="button" className="slot-remove" onClick={onRemove} aria-label="ลบรายการ">
          <Icon.X/>
        </button>
      </div>
      <div className="field" style={{ marginBottom: 8 }}>
        <label className="label">ชื่อรายการ</label>
        <input className="input" placeholder="เช่น คูปองส่วนลด, เครดิตค้างชำระ"
               value={slot.name || ''} onChange={(e) => onChange({ ...slot, name: e.target.value })}/>
      </div>
      <div className="field" style={{ marginBottom: 0 }}>
        <label className="label">จำนวนเงิน <span style={{ fontSize: 'var(--fz-xs)', fontWeight: 500, color: 'var(--muted)' }}>(ใส่ลบ - ได้ ถ้าหักออก)</span></label>
        <AmountInput value={slot.amount} onChange={(v) => onChange({ ...slot, amount: v })} allowNegative={true} placeholder="0.00 หรือ -50"/>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Report form
// ─────────────────────────────────────────────────────────────
function ReportForm({ user, onSubmit, sending }) {
  const [date, setDate] = React.useState(todayISO());
  const [salesPhoto, setSalesPhoto] = React.useState(null);
  const [sales, setSales] = React.useState('');
  const [cashPhoto, setCashPhoto] = React.useState(null);
  const [cash, setCash] = React.useState('');
  const [banks, setBanks] = React.useState([{ bank: '', amount: '' }]);
  const [transferPhoto, setTransferPhoto] = React.useState(null);
  const [credit, setCredit] = React.useState('');
  const [creditPhoto, setCreditPhoto] = React.useState(null);
  const [pracharath, setPracharath] = React.useState('');
  const [others, setOthers] = React.useState([]);
  const [confirmOpen, setConfirmOpen] = React.useState(false);

  const banksTotal = React.useMemo(() => banks.reduce((s, b) => s + (+b.amount || 0), 0), [banks]);
  const othersTotal = React.useMemo(() => others.reduce((s, o) => s + (+o.amount || 0), 0), [others]);
  const paid = (+cash || 0) + banksTotal + (+credit || 0) + (+pracharath || 0) + othersTotal;
  const salesNum = +sales || 0;
  const diff = paid - salesNum;
  const state = salesNum > 0 ? diffState(paid, salesNum) : null;
  const balanced = salesNum > 0 && Math.abs(diff) < 1;   // เกือบตรง (น้อยกว่า 1฿ ถือว่าตรง)
  const canSubmit = salesNum > 0 && !!salesPhoto && balanced && !sending;

  const updateBank = (i, next) => { const copy = [...banks]; copy[i] = next; setBanks(copy); };
  const addBank = () => banks.length < 5 && setBanks([...banks, { bank: '', amount: '' }]);
  const removeBank = (i) => {
    const copy = banks.filter((_, j) => j !== i);
    setBanks(copy.length ? copy : [{ bank: '', amount: '' }]);
  };
  const updateOther = (i, next) => { const copy = [...others]; copy[i] = next; setOthers(copy); };
  const addOther = () => others.length < 3 && setOthers([...others, { name: '', amount: '' }]);
  const removeOther = (i) => setOthers(others.filter((_, j) => j !== i));

  const reset = () => {
    setSalesPhoto(null); setSales(''); setCashPhoto(null); setCash('');
    setBanks([{ bank: '', amount: '' }]); setTransferPhoto(null);
    setCredit(''); setCreditPhoto(null);
    setPracharath(''); setOthers([]);
  };

  const confirmSend = async () => {
    setConfirmOpen(false);
    const record = {
      id: 'r-' + new Date().toISOString().replace(/[:.]/g,'-') + '-' + Math.random().toString(36).slice(2,6),
      date,
      userEmail: user.email,
      userName: user.name,
      branch: window.APP_CONFIG.COMPANY,
      sales: salesNum,
      salesPhotoBase64: salesPhoto ? salesPhoto.base64 : null,
      cash: +cash || 0,
      cashPhotoBase64: cashPhoto ? cashPhoto.base64 : null,
      banks: banks.filter(b => b.bank && +b.amount > 0).map(b => ({
        bank: b.bank, bankOther: b.bankOther || '', amount: +b.amount,
      })),
      transferPhotoBase64: transferPhoto ? transferPhoto.base64 : null,
      credit: +credit || 0,
      creditPhotoBase64: creditPhoto ? creditPhoto.base64 : null,
      pracharath: +pracharath || 0,
      others: others.filter(o => o.name && +o.amount > 0).map(o => ({ name: o.name, amount: +o.amount })),
      paid, diff,
      submittedAt: new Date().toISOString(),
    };
    const ok = await onSubmit(record);
    if (ok) reset();
  };

  const progressPct = salesNum > 0 ? Math.min(100, Math.round((paid / salesNum) * 100)) : 0;
  const progressClass = state === 'warn' ? 'warn' : state === 'bad' ? 'bad' : '';
  const diffSign = diff > 0 ? '+' : diff < 0 ? '−' : '±';
  const diffAbs = fmt(Math.abs(diff));

  return (
    <>
      <div className="card">
        <div className="card-head">
          <div className="ic"><Icon.Calendar/></div>
          <div className="title">
            <div className="t1">ข้อมูลรายงาน</div>
            <div className="t2">{thaiDate(date)} · สรุปสิ้นวัน</div>
          </div>
        </div>
        <div className="card-body tight">
          <div className="field-row">
            <div className="field">
              <label className="label">วันที่</label>
              <input type="date" className="input" value={date} onChange={(e) => setDate(e.target.value)}/>
            </div>
            <div className="field">
              <label className="label">พนักงาน</label>
              <div className="input" style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'var(--surface-2)' }}>
                <div style={{ width: 22, height: 22, borderRadius: '50%',
                  background: 'linear-gradient(135deg,#fcd34d,#f59e0b)',
                  display: 'grid', placeItems: 'center', color: '#422006', fontWeight: 700, fontSize: 11 }}>
                  {user.name[0]}
                </div>
                <span style={{ flex: 1, fontSize: 'var(--fz-sm)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{user.name}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <div className="ic"><Icon.Receipt/></div>
          <div className="title">
            <div className="t1">ยอดขายรวม <span className="req-pill">จำเป็น</span></div>
            <div className="t2">รูปสรุปยอดจากเครื่อง POS + จำนวนเงิน</div>
          </div>
        </div>
        <div className="card-body">
          <div className="field">
            <label className="label">รูปสรุปยอดขาย <span className="req">*</span></label>
            <PhotoInput value={salesPhoto} onChange={setSalesPhoto}
                        hint="แตะถ่ายรูปสรุปยอดจากเครื่อง POS" busy={sending}/>
          </div>
          <div className="field" style={{ marginBottom: 0 }}>
            <label className="label">จำนวนเงิน <span className="req">*</span></label>
            <AmountInput value={sales} onChange={setSales}/>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <div className="ic" style={{ background: 'var(--ok-50)', color: 'var(--ok-700)' }}><Icon.Cash/></div>
          <div className="title">
            <div className="t1">เงินสด <span className="opt-pill">ไม่บังคับ</span></div>
            <div className="t2">รูปสลิป (ถ้ามี) + จำนวนเงินสด</div>
          </div>
        </div>
        <div className="card-body">
          <div className="field">
            <label className="label">รูปสลิป / รูปกองเงินสด</label>
            <PhotoInput value={cashPhoto} onChange={setCashPhoto}
                        hint="แตะถ่ายรูปสลิป (ถ้ามี)" busy={sending}/>
          </div>
          <div className="field" style={{ marginBottom: 0 }}>
            <label className="label">จำนวนเงินสด</label>
            <AmountInput value={cash} onChange={setCash}/>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <div className="ic" style={{ background: '#dbeafe', color: '#1d4ed8' }}><Icon.Bank/></div>
          <div className="title">
            <div className="t1">Online Banking</div>
            <div className="t2">โอนผ่านธนาคาร / e-Wallet สูงสุด 5 รายการ</div>
          </div>
        </div>
        <div className="card-body">
          {banks.map((b, i) => (
            <BankSlot key={i} idx={i} total={banks.length} slot={b}
                      onChange={(next) => updateBank(i, next)} onRemove={() => removeBank(i)}/>
          ))}
          {banks.length < 5 && (
            <button type="button" className="add-slot" onClick={addBank}>
              <Icon.Plus/> เพิ่มรายการ ({banks.length}/5)
            </button>
          )}
          <div className="field" style={{ marginTop: 12, marginBottom: 0 }}>
            <label className="label">รูปสรุปเงินโอน (EDC) <span className="opt-pill" style={{ marginLeft: 4 }}>ไม่บังคับ</span></label>
            <PhotoInput value={transferPhoto} onChange={setTransferPhoto}
                        hint="แตะถ่ายรูปใบสรุปเงินโอนจากเครื่อง EDC" busy={sending}/>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <div className="ic" style={{ background: '#fef3c7', color: '#92400e' }}><Icon.Card/></div>
          <div className="title">
            <div className="t1">บัตรเครดิต / เดบิต</div>
            <div className="t2">ยอดรวมทุกเครื่องรูดบัตร + รูปสรุป EDC</div>
          </div>
        </div>
        <div className="card-body">
          <div className="field">
            <label className="label">จำนวนเงินรวม</label>
            <AmountInput value={credit} onChange={setCredit}/>
          </div>
          <div className="field" style={{ marginBottom: 0 }}>
            <label className="label">รูปสรุปบัตรเครดิต (EDC) <span className="opt-pill" style={{ marginLeft: 4 }}>ไม่บังคับ</span></label>
            <PhotoInput value={creditPhoto} onChange={setCreditPhoto}
                        hint="แตะถ่ายรูปใบสรุปบัตรเครดิตจากเครื่อง EDC" busy={sending}/>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <div className="ic" style={{ background: '#fce7f3', color: '#9d174d' }}><Icon.IdCard/></div>
          <div className="title">
            <div className="t1">บัตรประชารัฐ</div>
            <div className="t2">บัตรสวัสดิการแห่งรัฐ</div>
          </div>
        </div>
        <div className="card-body">
          <div className="field" style={{ marginBottom: 0 }}>
            <label className="label">จำนวนเงิน</label>
            <AmountInput value={pracharath} onChange={setPracharath}/>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <div className="ic" style={{ background: 'var(--surface-2)', color: 'var(--muted)' }}><Icon.Dots/></div>
          <div className="title">
            <div className="t1">อื่นๆ</div>
            <div className="t2">เพิ่มได้ถึง 3 รายการ (คูปอง, เงินทอน, เงินขาด, ฯลฯ)</div>
          </div>
        </div>
        <div className="card-body">
          {others.length === 0 && (
            <div className="help" style={{ marginBottom: 8 }}>ยังไม่มีรายการ — แตะปุ่มด้านล่างเพื่อเพิ่ม</div>
          )}
          {others.map((o, i) => (
            <OtherSlot key={i} idx={i} slot={o}
                       onChange={(next) => updateOther(i, next)} onRemove={() => removeOther(i)}/>
          ))}
          {salesNum > 0 && !balanced && others.length < 3 && (
            <button type="button" className="add-slot"
              style={{ borderColor: 'var(--warn-500)', color: 'var(--warn-700)', background: 'var(--warn-50)' }}
              onClick={() => setOthers([...others, {
                name: diff < 0 ? 'เงินขาด' : 'เงินเกิน',
                amount: (diff < 0 ? '' : '-') + Math.abs(diff).toFixed(2),
              }])}>
              <Icon.Plus/> ปรับสมดุล: เพิ่ม "{diff < 0 ? 'เงินขาด' : 'เงินเกิน'} {diff > 0 ? '-' : ''}฿{fmt(Math.abs(diff))}"
            </button>
          )}
          {others.length < 3 && (
            <button type="button" className="add-slot" onClick={addOther}>
              <Icon.Plus/> เพิ่มรายการ ({others.length}/3)
            </button>
          )}
        </div>
      </div>

      <div className="sticky-bar">
        <div className={`bar-progress ${progressClass}`}>
          <div className="bar-fill" style={{ width: progressPct + '%' }}/>
        </div>
        <div className="bar-info">
          <div className="line1">
            <span className="label">ชำระ</span>
            {fmt(paid)}<span className="baht">฿</span>
          </div>
          <div className="line2">
            <span>เทียบ {fmt(salesNum)}฿</span>
            <span className="diff-pill" data-state={state || 'ok'}>
              <span className={`dot ${state || 'ok'}`}/>
              ต่าง {salesNum === 0 ? '—' : `${diffSign}${diffAbs}`}
            </span>
          </div>
          {salesNum > 0 && !balanced && (
            <div className={`reason ${state}`}>
              ⚠ {diff < 0 ? `ยอดชำระขาด ${diffAbs}฿` : `ยอดชำระเกิน ${diffAbs}฿`} — ต้องตรงก่อนส่ง
            </div>
          )}
        </div>
        <button className="submit" disabled={!canSubmit} onClick={() => setConfirmOpen(true)}>
          <Icon.Send/>
          {sending ? 'กำลังส่ง...' : 'ส่งรายงาน'}
        </button>
      </div>

      {confirmOpen && (
        <div className="modal-backdrop" onClick={() => setConfirmOpen(false)}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="modal-icon" style={{ background: 'var(--brand-50)', color: 'var(--brand-700)' }}>
              <Icon.Send/>
            </div>
            <h3>ยืนยันการส่งรายงาน?</h3>
            <p>วันที่ <strong>{thaiDate(date)}</strong><br/>
               ยอดขายรวม <strong>{fmt(salesNum)} ฿</strong> · ส่วนต่าง <strong>{diffSign}{diffAbs} ฿</strong></p>
            {state !== 'ok' && state && (
              <div style={{
                background: state === 'bad' ? 'var(--bad-50)' : 'var(--warn-50)',
                color: state === 'bad' ? 'var(--bad-700)' : 'var(--warn-700)',
                padding: 10, borderRadius: 10, fontSize: 'var(--fz-sm)', marginBottom: 8, textAlign: 'left',
              }}>
                ⚠️ ส่วนต่างเกินเกณฑ์ปกติ — โปรดตรวจสอบยอดอีกครั้งก่อนส่ง
              </div>
            )}
            <div className="modal-row">
              <button className="photo-act" onClick={() => setConfirmOpen(false)}>ตรวจสอบอีกครั้ง</button>
              <button className="photo-act primary" onClick={confirmSend}>
                <Icon.Check/> ส่งเลย
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ─────────────────────────────────────────────────────────────
// Detail row
// ─────────────────────────────────────────────────────────────
function DetailRow({ icon, label, sub, amount, dot }) {
  const empty = !amount || amount === 0;
  const iconMap = { receipt: <Icon.Receipt/>, cash: <Icon.Cash/>, bank: <Icon.Bank/>, card: <Icon.Card/>, idcard: <Icon.IdCard/>, dots: <Icon.Dots/> };
  return (
    <div className="detail-row" data-empty={empty}>
      <div className="ic" style={dot ? { background: dot + '22', color: dot } : undefined}>{iconMap[icon]}</div>
      <div>
        <div className="name">{label}</div>
        {sub && <span className="sub">{sub}</span>}
      </div>
      <div className="val">{empty ? '—' : fmt(amount) + ' ฿'}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Photo viewer modal
// ─────────────────────────────────────────────────────────────
function PhotoViewer({ url, onClose }) {
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" style={{ maxWidth: 420, padding: 8 }} onClick={(e) => e.stopPropagation()}>
        <img src={url} alt="" style={{ width: '100%', borderRadius: 12, display: 'block' }}/>
        <button className="photo-act" style={{ marginTop: 8, width: '100%' }} onClick={onClose}>ปิด</button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Cash photo editor
// ─────────────────────────────────────────────────────────────
function CashPhotoEditor({ record, onClose, onSave, saving }) {
  const [photo, setPhoto] = React.useState(record.cashPhotoUrl ? { dataUrl: record.cashPhotoUrl, base64: null } : null);

  const handleSave = async () => {
    await onSave(photo);
  };

  return (
    <div className="modal-backdrop" onClick={saving ? null : onClose}>
      <div className="modal" style={{ maxWidth: 360, textAlign: 'left' }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
          <div className="modal-icon" style={{ width: 36, height: 36, marginBottom: 0, background: 'var(--ok-100)', color: 'var(--ok-700)' }}>
            <Icon.Cash/>
          </div>
          <div style={{ flex: 1 }}>
            <h3 style={{ margin: 0, fontSize: 'var(--fz-md)' }}>แก้รูปสลิปเงินสด</h3>
            <div style={{ fontSize: 'var(--fz-xs)', color: 'var(--muted)' }}>
              {thaiDate(record.date)} · {fmt(record.cash)} ฿
            </div>
          </div>
          <button className="ovr-btn" style={{ background: 'var(--surface-2)', color: 'var(--ink-2)' }} onClick={onClose} disabled={saving}>
            <Icon.X/>
          </button>
        </div>
        <PhotoInput value={photo} onChange={setPhoto} hint="แตะถ่ายรูปสลิป" busy={saving}/>
        <div className="modal-row">
          <button className="photo-act" onClick={onClose} disabled={saving}>ยกเลิก</button>
          <button className="photo-act primary" onClick={handleSave} disabled={saving || !photo || !photo.base64}>
            <Icon.Check/> {saving ? 'กำลังบันทึก...' : 'บันทึก'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// History card
// ─────────────────────────────────────────────────────────────
function HistoryCard({ record, expanded, onToggle, onEditCashPhoto, onViewSales }) {
  const state = diffState(record.paid, record.sales);
  const diffSign = record.diff > 0 ? '+' : record.diff < 0 ? '−' : '±';
  const diffAbs = fmt(Math.abs(record.diff));
  const time = new Date(record.submittedAt).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

  return (
    <div className="hist-card" data-expanded={expanded}>
      <div className="hist-head" onClick={onToggle}>
        <div className="hist-date">
          <div className="d">{new Date(record.date).getDate()}</div>
          <div className="m">{THAI_MONTHS_SHORT[new Date(record.date).getMonth()]}</div>
        </div>
        <div className="hist-mid">
          <div className="row1">
            <span style={{ color: 'var(--ink)', fontWeight: 700, fontSize: 'var(--fz-md)' }}>{record.userName}</span>
          </div>
          <div className="row2">
            <span>ส่งเมื่อ {time}</span>
            <span style={{ opacity: .4 }}>·</span>
            <span>{record.banks.length} โอน{record.others.length ? `, ${record.others.length} อื่นๆ` : ''}</span>
          </div>
        </div>
        <div className="hist-right">
          <div className="amt">{fmt(record.sales)} ฿</div>
          <div className="diff" data-state={state}>
            <span className={`dot ${state}`}/>
            {record.diff === 0 ? 'ตรง' : `${diffSign}${diffAbs}`}
          </div>
        </div>
      </div>
      {expanded && (
        <div className="hist-body">
          <div className="detail-grid">
            <DetailRow icon="receipt" label="ยอดขายรวม (POS)" sub="จากเครื่องบันทึก" amount={record.sales}/>
            <DetailRow icon="cash" label="เงินสด" sub={record.cashPhotoUrl ? 'มีรูปสลิป' : 'ไม่มีรูป'} amount={record.cash}/>
            {record.banks.map((b, i) => {
              const meta = BANK_BY_VALUE[b.bank] || { n: b.bankOther || b.bank };
              return <DetailRow key={'b' + i} icon="bank" label={meta.n} sub={`Online Banking #${i+1}`} amount={b.amount} dot={meta.c}/>;
            })}
            <DetailRow icon="card" label="บัตรเครดิต/เดบิต" sub={record.creditPhotoUrl ? 'รวมทุกเครื่อง · มีรูป EDC' : 'รวมทุกเครื่องรูด'} amount={record.credit}/>
            <DetailRow icon="idcard" label="บัตรประชารัฐ" sub="สวัสดิการแห่งรัฐ" amount={record.pracharath}/>
            {record.others.map((o, i) => (
              <DetailRow key={'o' + i} icon="dots" label={o.name} sub="อื่นๆ" amount={o.amount}/>
            ))}
          </div>
          <div className="detail-totals">
            <div className="ts">ยอดชำระรวม<strong>{fmt(record.paid)} ฿</strong></div>
            <div className="ts" style={{ alignItems: 'flex-end', textAlign: 'right' }}>
              ส่วนต่าง<strong style={{ color: `var(--${state === 'ok' ? 'ok' : state}-600)` }}>
                {record.diff === 0 ? 'ตรงพอดี' : `${diffSign}${diffAbs} ฿`}
              </strong>
            </div>
          </div>
          <div className="detail-actions">
            <button className="detail-act" onClick={onViewSales} disabled={!record.salesPhotoUrl}>
              <Icon.Eye/> ดูรูปยอดขาย
            </button>
            <button className="detail-act primary" onClick={onEditCashPhoto}>
              <Icon.Edit/> {record.cashPhotoUrl ? 'แก้รูปสลิป' : 'เพิ่มรูปสลิป'}
            </button>
          </div>
          <div style={{ fontSize: 'var(--fz-xs)', color: 'var(--muted)', marginTop: 8, textAlign: 'center' }}>
            แก้ไขได้เฉพาะรูปสลิปเงินสดเท่านั้น
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// History view
// ─────────────────────────────────────────────────────────────
function HistoryView({ records, user, onEditCashPhoto, loading, error }) {
  const [expanded, setExpanded] = React.useState(null);
  const [filter, setFilter] = React.useState('all');
  const [editing, setEditing] = React.useState(null);
  const [savingPhoto, setSavingPhoto] = React.useState(false);
  const [viewPhoto, setViewPhoto] = React.useState(null);

  const sorted = React.useMemo(() => {
    let filtered = records.slice();
    if (filter === 'mine') filtered = filtered.filter(r => r.userEmail === user.email);
    if (filter === 'offsets') filtered = filtered.filter(r => Math.abs(r.diff) >= 1);
    return filtered.sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));
  }, [records, filter, user.email]);

  const stats = React.useMemo(() => {
    const total = records.reduce((s, r) => s + (+r.sales || 0), 0);
    const offsets = records.filter(r => Math.abs(r.diff) >= 1).length;
    return { count: records.length, total, offsets };
  }, [records]);

  const groups = React.useMemo(() => {
    const g = {};
    sorted.forEach(r => { if (!g[r.date]) g[r.date] = []; g[r.date].push(r); });
    return Object.entries(g).sort((a, b) => new Date(b[0]) - new Date(a[0]));
  }, [sorted]);

  const handleSavePhoto = async (photo) => {
    if (!photo || !photo.base64) return;
    setSavingPhoto(true);
    try {
      await onEditCashPhoto(editing.id, photo.base64);
      setEditing(null);
    } catch (e) {
      alert('บันทึกไม่สำเร็จ: ' + e.message);
    } finally {
      setSavingPhoto(false);
    }
  };

  if (loading && records.length === 0) {
    return <div className="loading-screen"><div className="spinner"/><div style={{ marginTop: 14 }}>กำลังโหลดประวัติ...</div></div>;
  }
  if (error && records.length === 0) {
    return <div className="empty-history" style={{ color: 'var(--bad-600)' }}>โหลดประวัติไม่สำเร็จ<br/>{error}</div>;
  }

  return (
    <>
      {loading && records.length > 0 && (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, padding: '6px 0 10px', fontSize: 'var(--fz-xs)', color: 'var(--muted)' }}>
          <div className="spinner" style={{ width: 14, height: 14, borderWidth: 2 }}/>
          กำลังอัพเดต...
        </div>
      )}
      <div className="history-summary">
        <div className="summary-stat">
          <div className="s1">รายงานทั้งหมด</div>
          <div className="s2">{stats.count}</div>
          <div className="s3">ครั้ง</div>
        </div>
        <div className="summary-stat">
          <div className="s1">ยอดขายรวม</div>
          <div className="s2">{fmt(stats.total)}</div>
          <div className="s3">บาท</div>
        </div>
        <div className="summary-stat">
          <div className="s1">มีส่วนต่าง</div>
          <div className="s2" style={{ color: stats.offsets > 0 ? 'var(--warn-600)' : 'var(--ok-600)' }}>{stats.offsets}</div>
          <div className="s3">ครั้ง</div>
        </div>
      </div>

      <div className="seg" style={{ marginBottom: 14 }}>
        {[{ v: 'all', l: 'ทั้งหมด' }, { v: 'mine', l: 'ของฉัน' }, { v: 'offsets', l: 'มีส่วนต่าง' }].map(o => (
          <button key={o.v} data-active={filter === o.v} onClick={() => setFilter(o.v)}>{o.l}</button>
        ))}
      </div>

      {groups.length === 0 && (
        <div className="empty-history">ไม่มีรายงานในหมวดนี้</div>
      )}

      {groups.map(([date, rs]) => (
        <div key={date}>
          <div className="history-month">{thaiDate(date)}</div>
          {rs.map(r => (
            <HistoryCard key={r.id} record={r}
              expanded={expanded === r.id}
              onToggle={() => setExpanded(expanded === r.id ? null : r.id)}
              onEditCashPhoto={() => setEditing(r)}
              onViewSales={() => setViewPhoto(r.salesPhotoUrl)}/>
          ))}
        </div>
      ))}

      {editing && (
        <CashPhotoEditor record={editing}
          onClose={() => setEditing(null)}
          onSave={handleSavePhoto}
          saving={savingPhoto}/>
      )}

      {viewPhoto && <PhotoViewer url={viewPhoto} onClose={() => setViewPhoto(null)}/>}
    </>
  );
}

// ─────────────────────────────────────────────────────────────
// Login screen
// ─────────────────────────────────────────────────────────────
function LoginScreen({ onLogin, error }) {
  const btnRef = React.useRef(null);
  React.useEffect(() => {
    const tryInit = () => {
      if (!window.google || !window.google.accounts) {
        setTimeout(tryInit, 100); return;
      }
      window.google.accounts.id.initialize({
        client_id: window.APP_CONFIG.OAUTH_CLIENT_ID,
        callback: onLogin,
        auto_select: false,
        cancel_on_tap_outside: true,
      });
      if (btnRef.current) {
        window.google.accounts.id.renderButton(btnRef.current, {
          type: 'standard', size: 'large', theme: 'filled_blue',
          text: 'signin_with', shape: 'pill', logo_alignment: 'left',
        });
      }
    };
    tryInit();
  }, [onLogin]);

  return (
    <div className="login-screen">
      <div className="logo-big"><img src="icons/c4-pos-report.png" alt=""/></div>
      <h1>{window.APP_CONFIG.APP_NAME}</h1>
      <p className="sub">{window.APP_CONFIG.COMPANY}</p>
      {error && <div className="login-error">{error}</div>}
      <div className="gsi-wrap" ref={btnRef}></div>
      <div className="ver">{window.APP_CONFIG.VERSION}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App root
// ─────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = React.useState(null);
  const [loginError, setLoginError] = React.useState(null);
  const [tab, setTab] = React.useState('form');
  const [records, setRecords] = React.useState([]);
  const [historyLoading, setHistoryLoading] = React.useState(false);
  const [historyError, setHistoryError] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [sending, setSending] = React.useState(false);

  React.useEffect(() => {
    try {
      const cached = localStorage.getItem('c4PosUser');
      if (cached) {
        const obj = JSON.parse(cached);
        if (obj.exp > Date.now()) setUser(obj.data);
      }
    } catch (e) {}
  }, []);

  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => setToast(null), 2500);
  };

  const handleLogin = async (response) => {
    try {
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      const email = payload.email;
      setLoginError(null);
      const users = await fetchUsersFromSheet();
      const norm = (s) => String(s || '').trim().toLowerCase();
      const found = users.find(u => norm(u['E-mail'] || u['Email'] || u['email']) === norm(email));
      if (!found) {
        setLoginError('อีเมล ' + email + ' ไม่มีในระบบ — ติดต่อแอดมิน');
        return;
      }
      const name = (found['ชื่อ - สกุล'] || found['ชื่อ-สกุล'] || found['ชื่อสกุล'] || payload.name || '').trim();
      const u = { email, name: name || email, picture: payload.picture };
      setUser(u);
      localStorage.setItem('c4PosUser', JSON.stringify({ data: u, exp: Date.now() + 30*24*60*60*1000 }));
    } catch (e) {
      setLoginError('เข้าสู่ระบบไม่สำเร็จ: ' + e.message);
    }
  };

  const handleLogout = () => {
    localStorage.removeItem('c4PosUser');
    setUser(null); setRecords([]);
  };

  const loadHistory = async (silent = false) => {
    if (!silent) setHistoryLoading(true);
    setHistoryError(null);
    try {
      const data = await apiCall({ action: 'list' });
      const recs = data.records || [];
      setRecords(recs);
      try {
        localStorage.setItem('c4PosReports', JSON.stringify({
          data: recs, exp: Date.now() + 5*60*1000,
        }));
      } catch (e) {}
    } catch (e) {
      if (!silent) setHistoryError(e.message);
    } finally {
      if (!silent) setHistoryLoading(false);
    }
  };

  // Hydrate from cache + pre-fetch in background right after login
  React.useEffect(() => {
    if (!user) return;
    try {
      const cached = localStorage.getItem('c4PosReports');
      if (cached) {
        const obj = JSON.parse(cached);
        if (obj.data && obj.exp > Date.now()) setRecords(obj.data);
      }
    } catch (e) {}
    loadHistory(true);
  }, [user]);

  const handleSubmit = async (record) => {
    setSending(true);
    try {
      await apiCall({ action: 'submit', record });
      showToast('ส่งรายงานเรียบร้อย ✓');
      setTab('history');
      return true;
    } catch (e) {
      alert('ส่งรายงานไม่สำเร็จ: ' + e.message);
      return false;
    } finally {
      setSending(false);
    }
  };

  const handleEditCashPhoto = async (reportId, base64) => {
    const res = await apiCall({ action: 'editCashPhoto', reportId, cashPhotoBase64: base64 });
    setRecords(rs => rs.map(r => r.id === reportId ? { ...r, cashPhotoUrl: res.cashPhotoUrl } : r));
    showToast('แก้รูปสลิปเรียบร้อย ✓');
  };

  if (!user) return <LoginScreen onLogin={handleLogin} error={loginError}/>;

  return (
    <div className="app">
      <div className="app-top">
        <div className="app-brand">
          <div className="brand-logo">
            <div className="brand-mark"><img src="icons/c4-pos-report.png" alt=""/></div>
            <div className="brand-text">
              <div className="b1">{window.APP_CONFIG.APP_NAME}</div>
              <div className="b2">{window.APP_CONFIG.COMPANY}<span className="ver">{window.APP_CONFIG.VERSION}</span></div>
            </div>
          </div>
          <div className="brand-actions">
            <a className="hub-btn" href={window.APP_CONFIG.HUB_URL}>
              <Icon.Home/> Hub
            </a>
            <div className="brand-user" onClick={handleLogout} title="คลิกเพื่อออกจากระบบ" style={{ cursor: 'pointer' }}>
              <div className="avatar">{user.name[0]}</div>
              <span className="name">{user.name}</span>
            </div>
          </div>
        </div>
        <div className="tabs">
          <button className="tab" data-active={tab === 'form'} onClick={() => setTab('form')}>
            <Icon.Send/> ส่งรายงาน
          </button>
          <button className="tab" data-active={tab === 'history'} onClick={() => setTab('history')}>
            <Icon.Receipt/> ประวัติ {records.length > 0 && <span className="count">{records.length}</span>}
          </button>
        </div>
      </div>

      <div className="app-scroll">
        {tab === 'form'
          ? <ReportForm user={user} onSubmit={handleSubmit} sending={sending}/>
          : <HistoryView records={records} user={user}
                         onEditCashPhoto={handleEditCashPhoto}
                         loading={historyLoading} error={historyError}/>}
      </div>

      {toast && <div className="toast"><Icon.Check/> {toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
