<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SupplyLink — Rattana Phaiboon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Sacramento&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --brand: #0E2B5C; --brand-deep: #07193C; --brand-soft: #1B3D75; --brand-tint: #EEF1F8;
  --accent: #B68A2E; --accent-soft: #DCB559; --accent-tint: #FBF4DD;
  --bg: #F4F5F8; --surface: #FFFFFF; --surface-alt: #FAFAFB; --surface-sunk: #F1F2F5;
  --line: #E4E6EC; --line-strong: #C9CDD7; --divider: #EEF0F4;
  --ink: #0B1322; --ink-2: #2A344A; --ink-3: #5B6478; --ink-4: #8A92A4;
  --ink-on-brand: #E8EDF8; --ink-on-brand-dim: #A8B3CC;
  --ok: #1F7A4A; --ok-bg: #E6F2EB;
  --warn: #B5740E; --warn-bg: #FAF1DC;
  --err: #B33333; --err-bg: #F8E6E6;
  --info: #1F5FA6; --info-bg: #E5EEF8;
  --wh-W1: #B68A2E; --wh-W2: #1F5FA6; --wh-W3: #B33333; --wh-W4: #1F7A4A; --wh-SM: #6B5A3E;
  --r-1: 4px; --r-2: 6px; --r-3: 10px; --r-pill: 999px;
  --sh-1: 0 1px 0 rgba(11,19,34,.04), 0 1px 2px rgba(11,19,34,.04);
  --sh-2: 0 1px 0 rgba(11,19,34,.04), 0 2px 6px rgba(11,19,34,.06);
  --sh-pop: 0 8px 24px rgba(11,19,34,.16), 0 0 0 1px rgba(11,19,34,.06);
  --font-thai: "Noto Sans Thai","Sarabun",system-ui,sans-serif;
  --font-en: "Inter Tight","Inter",system-ui,sans-serif;
  --font-num: "JetBrains Mono","SF Mono",ui-monospace,monospace;
}

* { box-sizing: border-box; }
html, body { margin:0; padding:0; height:100%; font-family: var(--font-thai); color: var(--ink); background: var(--bg); font-size:13px; line-height:1.45; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
body { font-feature-settings: "ss01","cv11"; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size:13px; color: var(--ink); }
a { color: var(--brand); text-decoration: none; }
.mono, .num { font-family: var(--font-num); font-variant-numeric: tabular-nums; letter-spacing:-.01em; }
.en { font-family: var(--font-en); }
.muted { color: var(--ink-3); }
.muted-2 { color: var(--ink-4); }
.bold { font-weight: 600; }
.hidden { display: none !important; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap:6px; height:30px; padding:0 12px; border-radius: var(--r-2); border:1px solid var(--line-strong); background: var(--surface); color: var(--ink-2); font-weight:500; font-size:12.5px; white-space:nowrap; transition: background .12s, border-color .12s, color .12s; }
.btn:hover { background: var(--surface-alt); border-color: var(--ink-4); color: var(--ink); }
.btn:disabled { opacity:.5; cursor: not-allowed; }
.btn-primary { background: var(--brand); color:#fff; border-color: var(--brand); }
.btn-primary:hover { background: var(--brand-deep); border-color: var(--brand-deep); color:#fff; }
.btn-accent { background: var(--accent); color:#fff; border-color: var(--accent); }
.btn-accent:hover { background:#8e6a1d; border-color:#8e6a1d; color:#fff; }
.btn-ghost { background:transparent; border-color:transparent; color: var(--ink-3); }
.btn-ghost:hover { background: var(--surface-alt); color: var(--ink); border-color: transparent; }
.btn-danger { background: var(--err); color:#fff; border-color: var(--err); }
.btn-success { background: var(--ok); color:#fff; border-color: var(--ok); }
.btn-sm { height:24px; padding:0 8px; font-size:11.5px; }
.btn-lg { height:36px; padding:0 16px; font-size:13.5px; }
.btn-block { width:100%; justify-content:center; }
.btn-icon { width:30px; padding:0; justify-content:center; }
.btn-icon.btn-sm { width:24px; }
.btn-icon.btn-lg { width:36px; }

/* Inputs */
.input, .select, .textarea { height:30px; width:100%; border:1px solid var(--line-strong); border-radius: var(--r-2); padding:0 10px; background: var(--surface); color: var(--ink); transition: border-color .12s, box-shadow .12s; }
.textarea { height: auto; padding: 8px 10px; line-height: 1.4; resize: vertical; min-height: 60px; }
.input:focus, .select:focus, .textarea:focus { outline:none; border-color: var(--brand); box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 14%, transparent); }
.select { padding-right:28px; appearance:none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M3 5l3 3 3-3' stroke='%235B6478' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>"); background-repeat:no-repeat; background-position:right 8px center; background-size:12px; }
.input-sm { height:24px; font-size:12px; padding:0 8px; }
.input-lg { height:38px; font-size:14px; padding:0 12px; }
.label { display:block; font-size:11px; font-weight:600; color: var(--ink-3); margin-bottom:4px; letter-spacing:.02em; text-transform: uppercase; }
.label-plain { display:block; font-size:12px; font-weight:500; color: var(--ink-2); margin-bottom:4px; }

/* Cards */
.card { background: var(--surface); border:1px solid var(--line); border-radius: var(--r-3); overflow: hidden; }
.card-head { padding:12px 16px; border-bottom:1px solid var(--divider); display:flex; align-items:center; justify-content:space-between; gap:12px; }
.card-head h3 { margin:0; font-size:13px; font-weight:700; color: var(--ink); letter-spacing:-.01em; }
.card-head .sub { font-size:11.5px; color: var(--ink-3); margin-top:2px; }
.card-body { padding:16px; }
.card-body.flush { padding:0; }
.card-foot { padding:10px 16px; border-top:1px solid var(--divider); background: var(--surface-alt); display:flex; align-items:center; justify-content:flex-end; gap:8px; }

/* Chips */
.chip { display: inline-flex; align-items: center; gap:4px; height:20px; padding:0 8px; font-size:11px; font-weight:600; border-radius: var(--r-pill); background: var(--surface-sunk); color: var(--ink-2); white-space:nowrap; letter-spacing:.01em; }
.chip-dot::before { content:""; width:6px; height:6px; border-radius:50%; background: currentColor; flex-shrink:0; }
.chip-ok { background: var(--ok-bg); color: var(--ok); }
.chip-warn { background: var(--warn-bg); color: var(--warn); }
.chip-err { background: var(--err-bg); color: var(--err); }
.chip-info { background: var(--info-bg); color: var(--info); }
.chip-brand { background: var(--brand-tint); color: var(--brand); }
.chip-accent { background: var(--accent-tint); color:#7a5818; }
.chip-outline { background:transparent; border:1px solid var(--line-strong); color: var(--ink-3); }
.chip-sm { height:17px; padding:0 6px; font-size:10px; }

/* Tables — default center alignment */
.tbl { width:100%; border-collapse:separate; border-spacing:0; font-size:13px; }
.tbl th { text-align:center; font-weight:700; font-size:11px; letter-spacing:.04em; text-transform:uppercase; color: var(--ink-3); padding:10px 12px; background: var(--surface-alt); border-bottom:1px solid var(--line); white-space:nowrap; position:sticky; top:0; z-index:1; }
.tbl td { padding:11px 12px; border-bottom:1px solid var(--divider); color: var(--ink-2); vertical-align:middle; text-align:center; }
.tbl tr:last-child td { border-bottom:none; }
.tbl tbody tr { transition: background .08s; }
.tbl tbody tr:hover { background: var(--surface-alt); }
.tbl tbody tr.sel { background: var(--brand-tint); }
.tbl td.num, .tbl th.num { text-align:center; font-variant-numeric: tabular-nums; font-family: var(--font-num); }
.tbl td.text-left, .tbl th.text-left { text-align:left; }
.tbl td.text-right, .tbl th.text-right { text-align:right; }
.tbl td.actions, .tbl th.actions { text-align:center; white-space:nowrap; }
/* When td has a stacked block (vendor + PO number), wrap it inline-block so text-align centers it */
.tbl td .stack { display: inline-block; text-align: center; }
.tbl td.text-left .stack { text-align: left; }

/* Reusable search box with X clear (in-page) */
.search-box { position: relative; display: flex; align-items: center; gap: 8px; height: 36px; padding: 0 12px; background: var(--surface-sunk); border: 1px solid var(--line); border-radius: 8px; transition: border-color .12s, box-shadow .12s; }
.search-box:focus-within { border-color: var(--brand); background: var(--surface); box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 14%, transparent); }
.search-box input { background: transparent; border: 0; outline: 0; flex: 1; font-size: 13px; color: var(--ink); font-weight: 500; }
.search-box input::placeholder { color: var(--ink-4); font-weight: 400; }
.search-box .clear { width: 20px; height: 20px; border-radius: 50%; border: 0; background: var(--ink-4); color: #fff; cursor: pointer; display: none; align-items: center; justify-content: center; padding: 0; }
.search-box .clear:hover { background: var(--ink-3); }
.search-box.has-value .clear { display: flex; }

/* Smaller chip variants for inline filters */
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

/* PO line received-qty input: greyed when matches ordered (= 100% received), normal when edited */
.qty-input { width:80px; text-align:center; padding:0 6px; margin:0 auto; border:1px solid var(--line); border-radius:6px; height:30px; font-family: var(--font-num); transition: all .12s; }
.qty-input.untouched { color: var(--ink-4); font-style: italic; font-weight: 500; background: var(--surface-alt); }
.qty-input.modified { color: var(--ink); font-style: normal; font-weight: 700; background: var(--surface); border-color: var(--brand); }
.qty-input:focus { outline:none; border-color: var(--brand); box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 14%, transparent); }
.qty-input.over { color: var(--info); border-color: var(--info); background: var(--info-bg); }
.qty-input.short { color: var(--warn); border-color: var(--warn); background: var(--warn-bg); }

/* FOC / extra row in PO check-in */
.foc-line td { background: var(--accent-tint); }
.foc-line input.input { height: 28px; font-size:12px; }
.add-line-btn { width:100%; border:1px dashed var(--line-strong); background:transparent; color:var(--ink-3); height:44px; border-radius:0; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; transition: all .12s; }
.add-line-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-tint); }

/* Avatar */
.avatar { width:28px; height:28px; border-radius:50%; background: var(--brand-tint); color: var(--brand); display:inline-flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
.avatar-sm { width:22px; height:22px; font-size:10px; }
.avatar-lg { width:36px; height:36px; font-size:13px; }

/* Misc */
.kbd { font-family: var(--font-num); font-size:10.5px; padding:1px 5px; border-radius:4px; background: var(--surface); border:1px solid var(--line-strong); border-bottom-width:2px; color: var(--ink-3); }
.divider { height:1px; background: var(--divider); margin:12px 0; }
.scroll::-webkit-scrollbar { width:10px; height:10px; }
.scroll::-webkit-scrollbar-thumb { background: rgba(11,19,34,.18); border-radius:8px; border:2px solid transparent; background-clip: padding-box; }
.scroll::-webkit-scrollbar-thumb:hover { background: rgba(11,19,34,.32); }

.bar-stack { display:flex; height:8px; border-radius:4px; overflow:hidden; background: var(--surface-sunk); }
.bar-stack > * { height:100%; }

/* Warehouse pill */
.wh { display: inline-flex; align-items: center; gap:6px; font-size:11.5px; font-weight:700; letter-spacing:.02em; }
.wh::before { content:""; width:8px; height:8px; border-radius:2px; background: var(--wh-W1); }
.wh.W1::before { background: var(--wh-W1); }
.wh.W2::before { background: var(--wh-W2); }
.wh.W3::before { background: var(--wh-W3); }
.wh.W4::before { background: var(--wh-W4); }
.wh.SM::before { background: var(--wh-SM); }

/* App layout */
#app { width:100%; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* Login */
.login-page { width:100%; height:100vh; background: linear-gradient(180deg, var(--brand-deep) 0%, var(--brand) 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; color:#fff; }
.login-logo { width:64px; height:64px; border-radius:18px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%); color: var(--brand-deep); display:inline-flex; align-items:center; justify-content:center; font-family: var(--font-en); font-size:24px; font-weight:900; letter-spacing:-.04em; box-shadow:0 12px 32px rgba(0,0,0,.25); margin-bottom:18px; }
.login-title { font-family: var(--font-en); font-size:22px; font-weight:700; letter-spacing:-.01em; }
.login-sub { font-size:12px; color: var(--ink-on-brand-dim); margin-top:4px; }
.login-card { width:100%; max-width:380px; background:#fff; border-radius:16px; padding:20px; margin-top:32px; color: var(--ink); box-shadow:0 12px 40px rgba(0,0,0,.18); }
.login-foot { margin-top:24px; text-align:center; font-size:11px; color: var(--ink-on-brand-dim); }
.seg-tabs { display:flex; padding:3px; background: var(--surface-sunk); border-radius:8px; margin-bottom:16px; }
.seg-tab { flex:1; padding:8px 10px; border-radius:6px; border:0; font-size:12.5px; font-weight:700; background:transparent; color: var(--ink-3); cursor:pointer; }
.seg-tab.active { background:#fff; color: var(--brand); box-shadow: var(--sh-1); }

/* Desktop shell */
.shell { display:flex; flex:1; min-height:0; overflow:hidden; }
.sidebar { width:220px; background: var(--brand-deep); color: var(--ink-on-brand); display:flex; flex-direction:column; flex-shrink:0; border-right:1px solid rgba(255,255,255,.06); }
.sidebar-brand { padding:16px 18px 14px; display:flex; align-items:center; gap:10px; border-bottom:1px solid rgba(255,255,255,.06); }
.sidebar-logo { width:32px; height:32px; border-radius:8px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%); color: var(--brand-deep); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px; letter-spacing:-.04em; font-family: var(--font-en); flex-shrink:0; }
.sidebar-name { color:#fff; font-weight:700; font-size:13px; letter-spacing:.02em; font-family: var(--font-en); }
.sidebar-sub { color: var(--ink-on-brand-dim); font-size:10.5px; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sidebar-nav { flex:1; padding:8px 10px; overflow-y:auto; }
.sidebar-sec { padding:12px 10px 4px; font-size:9.5px; font-weight:700; color: var(--ink-on-brand-dim); letter-spacing:.08em; text-transform:uppercase; }
.sidebar-item { display:flex; align-items:center; gap:10px; width:100%; padding:7px 10px; border:0; background:transparent; color: var(--ink-on-brand); border-radius:6px; font-size:12.5px; font-weight:500; cursor:pointer; text-align:left; margin-bottom:1px; position:relative; }
.sidebar-item:hover { background: rgba(255,255,255,.05); }
.sidebar-item.active { background: rgba(255,255,255,.08); color:#fff; font-weight:600; }
.sidebar-item.active::before { content:""; position:absolute; left:-10px; top:6px; bottom:6px; width:2px; background: var(--accent); border-radius:2px; }
.sidebar-item .ic { color: var(--ink-on-brand-dim); display:flex; flex-shrink:0; }
.sidebar-item.active .ic { color: var(--accent-soft); }
.sidebar-item .lbl { flex:1; }
.sidebar-item .badge { font-size:10px; font-weight:700; padding:1px 6px; border-radius:999px; background: var(--accent); color:#fff; font-family: var(--font-num); }
.sidebar-item .badge.err { background: var(--err); }
.sidebar-user { padding:10px 12px; border-top:1px solid rgba(255,255,255,.06); display:flex; align-items:center; gap:10px; }
.sidebar-user .avatar { background: var(--accent); color: var(--brand-deep); }
.sidebar-user .nm { color:#fff; font-size:12px; font-weight:600; }
.sidebar-user .rl { color: var(--ink-on-brand-dim); font-size:10.5px; }

.main { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }
.topbar { min-height:64px; padding:10px 20px; background: var(--surface); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px; flex-shrink:0; flex-wrap:wrap; }
.topbar-title h1 { margin:0; font-size:17px; font-weight:700; color: var(--ink); letter-spacing:-.01em; }
.topbar-title .sub { font-size:12px; color: var(--ink-3); }
.topbar-search { display:flex; align-items:center; gap:8px; height:40px; min-width:320px; flex:1; max-width:520px; padding:0 14px; background: var(--surface-sunk); border:1px solid var(--line); border-radius:10px; color: var(--ink-3); transition: border-color .12s, box-shadow .12s; }
.topbar-search:focus-within { border-color: var(--brand); background: var(--surface); box-shadow:0 0 0 3px color-mix(in srgb, var(--brand) 14%, transparent); }
.topbar-search input { background:transparent; border:0; outline:0; flex:1; font-size:14px; color: var(--ink); font-weight:500; }
.topbar-search input::placeholder { color: var(--ink-4); font-weight:400; }
.topbar-search .clear-btn { width:22px; height:22px; border-radius:50%; border:0; background: var(--ink-4); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; }
.topbar-search .clear-btn:hover { background: var(--ink-3); }

/* Filter chips row */
.filter-bar { padding:8px 20px 10px; background: var(--surface); border-bottom:1px solid var(--line); display:flex; gap:6px; align-items:center; flex-wrap:wrap; flex-shrink:0; }
.filter-bar-label { font-size:11px; font-weight:700; color: var(--ink-3); letter-spacing:.06em; text-transform:uppercase; margin-right:4px; }
.filter-chip { display:inline-flex; align-items:center; gap:6px; height:30px; padding:0 12px; border-radius:999px; border:1px solid var(--line-strong); background: var(--surface); color: var(--ink-2); font-size:12.5px; font-weight:600; cursor:pointer; white-space:nowrap; transition: all .12s; }
.filter-chip:hover { border-color: var(--brand); background: var(--brand-tint); color: var(--brand); }
.filter-chip.active { background: var(--brand); color:#fff; border-color: var(--brand); }
.filter-chip .count { font-family: var(--font-num); font-size:11px; font-weight:700; padding:1px 6px; border-radius:999px; background: var(--surface-sunk); color: var(--ink-3); }
.filter-chip.active .count { background: rgba(255,255,255,.2); color:#fff; }
.filter-chip.ok { border-color: color-mix(in srgb, var(--ok) 40%, transparent); color: var(--ok); }
.filter-chip.ok.active { background: var(--ok); color:#fff; border-color: var(--ok); }
.filter-chip.warn { border-color: color-mix(in srgb, var(--warn) 40%, transparent); color: var(--warn); }
.filter-chip.warn.active { background: var(--warn); color:#fff; border-color: var(--warn); }
.filter-chip.err { border-color: color-mix(in srgb, var(--err) 40%, transparent); color: var(--err); }
.filter-chip.err.active { background: var(--err); color:#fff; border-color: var(--err); }
.filter-chip.info { border-color: color-mix(in srgb, var(--info) 40%, transparent); color: var(--info); }
.filter-chip.info.active { background: var(--info); color:#fff; border-color: var(--info); }
.content { flex:1; overflow:auto; padding:20px; background: var(--bg); }

/* KPI grid */
.kpi-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; margin-bottom:16px; }
.kpi { padding:14px 16px; }
.kpi-lbl { font-size:11.5px; color: var(--ink-3); font-weight:500; }
.kpi-val { font-size:22px; font-weight:700; color: var(--ink); letter-spacing:-.02em; line-height:1.1; margin-top:6px; font-family: var(--font-num); font-variant-numeric: tabular-nums; }
.kpi-sub { font-size:11px; color: var(--ink-3); margin-top:5px; display:flex; align-items:center; gap:8px; }
.kpi-delta { color: var(--ok); font-weight:600; font-family: var(--font-num); }
.kpi-delta.down { color: var(--err); }

/* Calendar */
.cal-head { display:grid; grid-template-columns: repeat(7, 1fr); border-bottom:1px solid var(--line); }
.cal-head > div { padding:8px 12px; font-size:10.5px; font-weight:700; color: var(--ink-3); text-transform:uppercase; letter-spacing:.06em; border-right:1px solid var(--divider); }
.cal-head > div:last-child { border-right:none; }
.cal-grid { display:grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(96px, 1fr); }
.cal-cell { border-right:1px solid var(--divider); border-bottom:1px solid var(--divider); padding:6px 8px; min-height: 96px; display:flex; flex-direction:column; gap:3px; position:relative; }
.cal-cell:nth-child(7n) { border-right:none; }
.cal-cell.other { background: var(--surface-alt); color: var(--ink-4); }
.cal-cell.today { background: var(--brand-tint); }
.cal-day { font-family: var(--font-num); font-size:12px; font-weight:600; color: var(--ink-2); display:flex; align-items:center; justify-content:space-between; }
.cal-cell.today .cal-day-num { background: var(--accent); color:#fff; padding:1px 6px; border-radius:10px; font-size:11px; }
.cal-event { font-size:10.5px; padding:2px 5px; border-radius:3px; border-left:2px solid; line-height:1.3; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family: var(--font-num); }
.cal-more { font-size:10px; color: var(--ink-3); padding:1px 4px; cursor:pointer; }

/* 2-pane layout */
.two-pane { display:flex; flex:1; min-height:0; background: var(--surface); border:1px solid var(--line); border-radius: var(--r-3); overflow:hidden; }
.two-pane-list { width:360px; border-right:1px solid var(--line); display:flex; flex-direction:column; flex-shrink:0; }
.two-pane-detail { flex:1; overflow:auto; padding:20px; background: var(--bg); }
.list-search { padding:12px 14px; border-bottom:1px solid var(--divider); }
.list-items { flex:1; overflow-y:auto; }
.list-item { padding:12px 14px; border:0; border-bottom:1px solid var(--divider); width:100%; text-align:left; cursor:pointer; background: var(--surface); position:relative; }
.list-item:hover { background: var(--surface-alt); }
.list-item.active { background: var(--brand-tint); border-left:3px solid var(--brand); padding-left:11px; }

/* Two-pane wider for vendor master */
.two-pane.wider .two-pane-list { width: 380px; }

/* Toast */
#toast-container { position:fixed; top:16px; right:16px; display:flex; flex-direction:column; gap:8px; z-index:9999; pointer-events:none; }
.toast { background: var(--surface); border:1px solid var(--line); border-left:4px solid var(--brand); border-radius:8px; box-shadow: var(--sh-pop); padding:12px 16px; min-width:260px; max-width:380px; pointer-events:auto; animation: toastIn .2s ease-out; }
.toast.ok { border-left-color: var(--ok); }
.toast.err { border-left-color: var(--err); }
.toast.warn { border-left-color: var(--warn); }
.toast-title { font-size:13px; font-weight:700; color: var(--ink); }
.toast-msg { font-size:12px; color: var(--ink-2); margin-top:2px; }
@keyframes toastIn { from { transform: translateX(20px); opacity:0; } to { transform:none; opacity:1; } }

/* Modal */
#modal-overlay { position:fixed; inset:0; background: rgba(11,19,34,.4); display:flex; align-items:center; justify-content:center; z-index:9000; padding:24px; }
.modal-box { background: var(--surface); border-radius:14px; box-shadow: var(--sh-pop); width:100%; max-width:560px; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; }
.modal-head { padding:14px 18px; border-bottom:1px solid var(--divider); display:flex; align-items:center; justify-content:space-between; }
.modal-head h3 { margin:0; font-size:14px; font-weight:700; }
.modal-body { padding:18px; overflow:auto; flex:1; }
.modal-foot { padding:12px 18px; border-top:1px solid var(--divider); background: var(--surface-alt); display:flex; gap:8px; justify-content:flex-end; }

/* Spinner */
.spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--line); border-top-color: var(--brand); border-radius:50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Timeline (GR appt) */
.tl-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:0; margin-bottom:18px; }
.tl-step { position:relative; padding-right:8px; }
.tl-step:not(:last-child)::after { content:""; position:absolute; left:14px; top:6px; right:-6px; height:2px; background: var(--divider); }
.tl-step.done:not(:last-child)::after { background: var(--ok); }
.tl-dot { width:14px; height:14px; border-radius:50%; background: var(--surface-sunk); border:2px solid var(--line-strong); position:relative; z-index:1; margin-bottom:6px; }
.tl-step.done .tl-dot { background: var(--ok); border-color: var(--ok); }
.tl-step.active .tl-dot { background: var(--info); border-color: var(--info); animation: pulse 1.5s ease-in-out infinite; }
.tl-step.active .tl-dot::after { content:""; position:absolute; inset:-4px; border-radius:50%; border:2px solid var(--info); opacity:.4; animation: pulseRing 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
@keyframes pulseRing { 0%,100% { transform: scale(1); opacity:.4; } 50% { transform: scale(1.4); opacity:0; } }
.tl-lbl { font-size:11px; font-weight:600; color: var(--ink-3); }
.tl-tm { font-size:13px; font-weight:700; color: var(--ink); font-family: var(--font-num); margin-top:2px; }
.tl-sub { font-size:10.5px; color: var(--ink-3); margin-top:2px; }
.tl-sub.ok { color: var(--ok); }
.tl-sub.err { color: var(--err); }
.tl-sub.info { color: var(--info); }

/* Wizard steps */
.wiz-bar { padding:12px 16px 14px; background: var(--surface); border-bottom:1px solid var(--divider); }
.wiz-track { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.wiz-step { display:flex; align-items:center; gap:6px; padding:5px 0; border-radius:999px; font-size:11px; font-weight:700; color: var(--ink-4); white-space:nowrap; }
.wiz-step.active { flex:1 1 auto; background: var(--brand); color:#fff; padding:5px 10px; }
.wiz-step.done { color: var(--ok); }
.wiz-dot { width:18px; height:18px; border-radius:50%; background: var(--surface-sunk); color: var(--ink-4); display:flex; align-items:center; justify-content:center; font-size:10.5px; font-weight:700; }
.wiz-step.done .wiz-dot { background: var(--ok); color:#fff; }
.wiz-step.active .wiz-dot { background: rgba(255,255,255,.2); color:#fff; }
.wiz-line { flex:1 1 auto; height:1px; background: var(--divider); min-width:6px; }
.wiz-line.done { background: var(--ok); }

/* Slot grid */
.slot-grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; }
.slot { padding:12px 6px; border:1.5px solid var(--line); background: var(--surface); border-radius:8px; font-family: var(--font-num); font-size:15px; font-weight:700; cursor:pointer; text-align:center; }
.slot:hover { border-color: var(--brand); }
.slot.sel { background: var(--brand); color:#fff; border-color: var(--brand); }
.slot.taken { opacity:.5; text-decoration:line-through; cursor:not-allowed; color: var(--ink-4); }
.slot.taken:hover { border-color: var(--line); }
.slot-sub { font-size:9px; font-weight:500; margin-top:2px; font-family: var(--font-thai); }

/* Mobile layout (supplier) */
.mobile-wrap { flex:1; display:flex; flex-direction:column; max-width:480px; width:100%; margin:0 auto; background: var(--bg); position:relative; min-height:0; overflow:hidden; }
.mobile-bar { height:50px; padding:0 14px; display:flex; align-items:center; gap:10px; background: var(--surface); border-bottom:1px solid var(--line); flex-shrink:0; }
.mobile-bar-logo { width:28px; height:28px; border-radius:7px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%); color: var(--brand-deep); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:11.5px; letter-spacing:-.04em; font-family: var(--font-en); }
.mobile-bar-title { flex:1; font-size:15px; font-weight:700; color: var(--ink); letter-spacing:-.01em; }
.mobile-content { flex:1; overflow-y:auto; padding:0 16px 16px; -webkit-overflow-scrolling: touch; }
.bottom-tab { height:58px; padding:6px 8px 6px; background: var(--surface); border-top:1px solid var(--line); display:grid; grid-template-columns: repeat(4, 1fr); gap:4px; flex-shrink:0; }
.tab-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; border:0; padding:0; background:transparent; cursor:pointer; color: var(--ink-3); }
.tab-btn.active { color: var(--brand); }
.tab-btn .tlbl { font-size:10px; font-weight:500; margin-top:3px; }
.tab-btn.active .tlbl { font-weight:700; }
.tab-btn.primary { position:relative; }
.tab-btn.primary .ticon { width:44px; height:44px; border-radius:22px; background: var(--accent); color: var(--brand-deep); display:flex; align-items:center; justify-content:center; margin-top:-16px; box-shadow:0 4px 12px rgba(182,138,46,.35); }
.tab-btn.primary .tlbl { font-weight:700; color: var(--ink-2); }

/* Mobile hero */
.m-hero { background: var(--brand); color:#fff; padding:16px 18px 20px; margin:0 -16px 12px; border-radius:0 0 18px 18px; }
.m-hero-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.m-hero-greet { font-size:11px; color: var(--ink-on-brand-dim); }
.m-hero-name { font-weight:700; font-size:14px; }
.m-next { background: rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:12px 14px; }
.m-next-lbl { font-size:11px; color: var(--ink-on-brand-dim); font-weight:600; letter-spacing:.04em; text-transform:uppercase; }
.m-next-time { font-size:26px; font-weight:800; color:#fff; letter-spacing:-.02em; font-family: var(--font-num); }

/* Mobile mini tiles */
.m-tiles { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
.m-tile { padding:10px 12px; }
.m-tile-lbl { font-size:10.5px; color: var(--ink-3); }
.m-tile-val { font-size:18px; font-weight:700; margin-top:3px; font-family: var(--font-num); color: var(--ink); }
.m-tile-val.ok { color: var(--ok); }

/* Mobile action tiles */
.m-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:18px; }
.m-action { background: var(--surface); border:1px solid var(--line); border-radius:10px; padding:12px; text-align:left; cursor:pointer; display:flex; flex-direction:column; gap:8px; color: var(--ink); }
.m-action.accent { background: var(--accent-tint); border-color: color-mix(in srgb, var(--accent) 30%, transparent); }
.m-action .ic-wrap { width:32px; height:32px; border-radius:8px; background: var(--brand-tint); color: var(--brand); display:flex; align-items:center; justify-content:center; }
.m-action.accent .ic-wrap { background: var(--accent); color: var(--brand-deep); }
.m-action-lbl { font-size:12.5px; font-weight:700; }
.m-action-sub { font-size:11px; color: var(--ink-3); margin-top:2px; }
.m-section { font-size:11px; font-weight:700; color: var(--ink-3); letter-spacing:.06em; text-transform:uppercase; margin:4px 0 8px; }

/* Alert */
.alert { display:flex; gap:10px; padding:12px 14px; border-radius:10px; margin-bottom:12px; align-items:flex-start; }
.alert-err { background: var(--err-bg); border:1px solid color-mix(in srgb, var(--err) 24%, transparent); }
.alert-warn { background: var(--warn-bg); border:1px solid color-mix(in srgb, var(--warn) 24%, transparent); }
.alert-info { background: var(--info-bg); border:1px solid color-mix(in srgb, var(--info) 24%, transparent); }
.alert-ic { flex-shrink:0; margin-top:1px; }
/* Consolidated notification card (รวมแจ้งเตือน) */
.notif-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-3); overflow:hidden; margin-bottom:12px; box-shadow:var(--sh-1); }
.notif-head { display:flex; align-items:center; gap:8px; padding:9px 14px; font-size:12.5px; font-weight:700; color:var(--ink-2); background:var(--surface-alt); border-bottom:1px solid var(--divider); }
.notif-head .notif-count { margin-left:auto; background:var(--warn); color:#fff; font-size:11px; min-width:20px; height:20px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; padding:0 6px; }
.notif-row { display:flex; align-items:center; gap:12px; width:100%; padding:12px 14px; border:0; background:transparent; border-bottom:1px solid var(--divider); cursor:pointer; text-align:left; transition:background .12s; }
.notif-row:last-child { border-bottom:0; }
.notif-row:hover { background:var(--surface-alt); }
.notif-ic { width:32px; height:32px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
.notif-ic.err { background:var(--err-bg); color:var(--err); }
.notif-ic.warn { background:var(--warn-bg); color:var(--warn); }
.notif-txt { flex:1; min-width:0; display:flex; flex-direction:column; }
.notif-lbl { font-size:13px; font-weight:600; color:var(--ink); }
.notif-detail { font-size:11.5px; color:var(--ink-3); margin-top:1px; }
.alert-ic.err { color: var(--err); }
.alert-ic.warn { color: var(--warn); }
.alert-ic.info { color: var(--info); }

/* Appt row mobile */
.m-appt { width:100%; padding:12px; text-align:left; border:1px solid var(--line); background: var(--surface); border-radius:10px; cursor:pointer; display:flex; gap:12px; align-items:center; margin-bottom:8px; }
.m-appt-time { text-align:center; min-width:44px; }
.m-appt-time .t { font-size:16px; font-weight:700; color: var(--ink); line-height:1; font-family: var(--font-num); }
.m-appt-time .d { font-size:10px; color: var(--ink-3); margin-top:3px; }
.m-appt-divider { width:1px; height:34px; background: var(--divider); }

/* PO card for wizard */
.po-card { width:100%; text-align:left; padding:12px 14px; border:1.5px solid var(--line); border-radius:10px; cursor:pointer; display:flex; gap:12px; align-items:flex-start; background: var(--surface); margin-bottom:8px; }
.po-card.sel { background: var(--accent-tint); border-color: var(--accent); }
.po-check { width:20px; height:20px; border-radius:5px; border:1.5px solid var(--line-strong); flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; color:#fff; }
.po-card.sel .po-check { background: var(--accent); border-color: var(--accent); }

/* Warehouse picker (wizard step 2) */
.wh-picker { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
.wh-pick { border:2px solid var(--line); background: var(--surface); padding:16px 12px; border-radius:12px; text-align:left; cursor:pointer; display:flex; flex-direction:column; gap:8px; }
.wh-pick-badge { width:32px; height:32px; border-radius:8px; color:#fff; font-family: var(--font-en); font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; }

/* Calendar mobile (wizard step 3) */
.cal-mini { padding:8px 8px 12px; }
.cal-dows { display:grid; grid-template-columns: repeat(7, 1fr); gap:2px; margin-bottom:4px; }
.cal-dows > div { text-align:center; font-size:10px; font-weight:600; color: var(--ink-3); padding:4px; }
.cal-mini-row { display:grid; grid-template-columns: repeat(7, 1fr); gap:2px; margin-bottom:2px; }
.cal-mini-cell { aspect-ratio:1/1; border:0; border-radius:8px; background:transparent; font-size:13px; font-weight:500; cursor:pointer; font-family: var(--font-num); color: var(--ink); position:relative; }
.cal-mini-cell.today { background: var(--brand-tint); color: var(--brand); font-weight:700; }
.cal-mini-cell.sel { background: var(--brand); color:#fff; font-weight:700; }
.cal-mini-cell:disabled { color: var(--ink-4); cursor:not-allowed; opacity:.5; }
.cal-mini-cell .dot-full { position:absolute; bottom:3px; left:50%; transform:translateX(-50%); width:3px; height:3px; border-radius:50%; background: var(--err); }

/* Sticky bottom action */
.sticky-foot { position:sticky; bottom:0; padding:12px 16px; background: var(--surface); border-top:1px solid var(--line); display:flex; gap:10px; align-items:center; margin:0 -16px -16px; z-index:5; }

/* New product form */
.form-section { background: var(--surface); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px; }
.form-section-title { display:flex; align-items:center; gap:8px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--divider); }
.form-section-num { width:24px; height:24px; border-radius:50%; background: var(--brand); color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; font-family: var(--font-num); flex-shrink:0; }
.form-section-name { font-size:13.5px; font-weight:700; color: var(--ink); }
.form-row { display:flex; gap:8px; align-items:center; }
.form-row > .input, .form-row > .select { flex:1; }
.form-grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap:8px; }
.form-grid-3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; align-items:center; }
.form-help { font-size:11px; color: var(--ink-3); margin-top:3px; line-height:1.4; }
.field-group { margin-bottom:12px; }
.field-group:last-child { margin-bottom: 0; }
.unit-tabs { display:flex; padding:3px; background: var(--surface-sunk); border-radius:8px; margin-bottom:12px; }
.unit-tab { flex:1; padding:8px 8px; border-radius:6px; border:0; font-size:12px; font-weight:600; background:transparent; color: var(--ink-3); cursor:pointer; }
.unit-tab.active { background: var(--surface); color: var(--brand); box-shadow: var(--sh-1); font-weight:700; }

/* Image uploader (one tile) */
.img-up { border: 1.5px dashed var(--line-strong); background: var(--surface-alt); border-radius: 10px; padding: 14px 8px; text-align: center; cursor: pointer; transition: all .12s; display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; aspect-ratio: 1/1; justify-content: center; }
.img-up:hover { border-color: var(--brand); background: var(--brand-tint); color: var(--brand); }
.img-up.has-img { border-style: solid; border-color: var(--brand); padding: 0; overflow: hidden; }
.img-up.has-img img { width: 100%; height: 100%; object-fit: cover; }
.img-up-lbl { font-size: 10.5px; font-weight: 600; color: var(--ink-3); }
.img-up-remove { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background: var(--err); color: #fff; border: 0; display: none; align-items: center; justify-content: center; cursor: pointer; padding: 0; z-index: 2; }
.img-up.has-img .img-up-remove { display: flex; }
.img-up input[type="file"] { display: none; }
.img-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* dim with unit suffix */
.input-suffix { position: relative; }
.input-suffix .input { padding-right: 36px; }
.input-suffix .suffix { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--ink-3); font-family: var(--font-num); pointer-events: none; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Submission Hub (topic picker)
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.hub-group { margin-bottom: 18px; }
.hub-group-head { display: flex; align-items: center; gap: 8px; padding: 8px 4px; }
.hub-group-icon { width:28px; height:28px; border-radius:8px; background:var(--brand-tint); color:var(--brand); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:14px; }
.hub-group-title { font-size:13.5px; font-weight:700; color: var(--ink); }
.hub-group-sub { font-size: 11px; color: var(--ink-3); margin-left: auto; }
.hub-grid { display:grid; grid-template-columns: 1fr 1fr; gap:8px; }
.hub-item { background: var(--surface); border:1px solid var(--line); border-radius:10px; padding:12px; cursor:pointer; text-align:left; display:flex; flex-direction:column; gap:6px; min-height: 92px; transition: all .12s; }
.hub-item:hover { border-color: var(--brand); background: var(--brand-tint); }
.hub-item.featured { background: var(--accent-tint); border-color: var(--accent); }
.hub-item-ic { width:30px; height:30px; border-radius:8px; background: var(--surface-sunk); color: var(--brand); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.hub-item.featured .hub-item-ic { background: var(--accent); color: var(--brand-deep); }
.hub-item-lbl { font-size:12.5px; font-weight:700; color: var(--ink); line-height:1.3; }
.hub-item-sub { font-size:10.5px; color: var(--ink-3); line-height:1.4; }
.hub-item .req-sig { font-size:9.5px; font-weight:600; color: var(--accent); display:inline-flex; align-items:center; gap:3px; margin-top:2px; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Schema-driven field types
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.tier-table { background: var(--surface); border:1px solid var(--line); border-radius:8px; overflow: hidden; }
.tier-row { display:grid; grid-template-columns: 1fr 1fr 28px; gap:8px; padding:8px 10px; border-bottom:1px solid var(--divider); align-items:center; }
.tier-row:last-child { border-bottom: none; }
.tier-head { background: var(--surface-alt); font-size:11px; font-weight:700; color: var(--ink-3); text-transform: uppercase; letter-spacing: .04em; padding: 8px 10px; }
.tier-add { width:100%; padding:10px; border:1px dashed var(--line-strong); border-radius: 0 0 8px 8px; background:transparent; color: var(--ink-3); cursor: pointer; font-size:12px; font-weight:600; }
.tier-add:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-tint); }

.sig-section { background: var(--surface); border: 2px dashed var(--accent); border-radius: 12px; padding: 14px; margin-top: 16px; }

function matchesSearch(a) {
  const q = (S.search.q || '').trim().toLowerCase();
  if (q) {
    const hay = [a.id, a.vendor && a.vendor.short, a.vendor && a.vendor.name, a.vendor && a.vendor.code, a.driver, a.plate, (a.pos||[]).join(' '), a.status, a.wh].filter(Boolean).join(' ').toLowerCase();
    if (hay.indexOf(q) === -1) return false;
  }
  if (S.search.status !== 'all' && a.status !== S.search.status) return false;
  if (S.search.wh !== 'all' && a.wh !== S.search.wh) return false;
  return true;
}

/* ───────────────────────── UTILITIES ───────────────────────── */
function $(sel, root) { return (root || document).querySelector(sel); }
function $$(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function fmtNum(n) { return Number(n || 0).toLocaleString('en-US'); }
function fmtMoney(n) { return Number(n || 0).toLocaleString('en-US'); }
function pad(n) { return String(n).padStart(2, '0'); }
function toBE(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return d + '/' + m + '/' + (Number(y) + 543);
}
function thaiMonth(m) {
  return ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][m - 1] || '';
}
function thaiMonthFull(m) {
  return ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'][m - 1] || '';
}
function statusChip(s) {
  const map = {
    'เสร็จสิ้น': 'chip chip-ok chip-dot',
    'กำลังรับ': 'chip chip-info chip-dot',
    'ยกเลิก': 'chip chip-err chip-dot',

    'รับทราบ': 'chip',

    'ปฏิเสธ': 'chip chip-err',
  };
  return '<span class="' + (map[s] || 'chip chip-outline') + '">' + esc(s) + '</span>';
}
function whName(code) {
  const w = DATA.warehouses.find(w => w.code === code);
  return w ? w.name : code;
}
function whPill(code) {
  return '<span class="wh ' + code + '">' + code + '</span>';
}
function avatar(text, opts) {
  opts = opts || {};
  const cls = 'avatar' + (opts.size === 'sm' ? ' avatar-sm' : opts.size === 'lg' ? ' avatar-lg' : '');
  return '<span class="' + cls + '"'+(opts.bg ? ' style="background:'+opts.bg+';color:'+(opts.color||'#fff')+'"' : '')+'>' + esc(String(text).slice(0, 2)) + '</span>';
}
function minDiff(a, b) {
  if (!a || !b) return '—';
  const [ah, am] = a.split(':').map(Number);
  const [bh, bm] = b.split(':').map(Number);
  const m = (bh * 60 + bm) - (ah * 60 + am);
  return Math.floor(m / 60) + ' ชม. ' + (m % 60) + ' น.';
}

/* Toast */
function toast(title, msg, type) {
  const div = document.createElement('div');
  div.className = 'toast ' + (type || '');
  div.innerHTML = '<div class="toast-title">' + esc(title) + '</div>' + (msg ? '<div class="toast-msg">' + esc(msg) + '</div>' : '');
  $('#toast-container').appendChild(div);
  setTimeout(() => { div.style.transition='opacity .3s'; div.style.opacity='0'; setTimeout(()=>div.remove(), 300); }, 3000);
}

/* ───────────────────────── E-SIGNATURE MODULE ───────────────────────── */
const SIG = {
  _key: () => 'sl_sig_' + ((S.session && (S.session.email || S.session.vendor?.code)) || 'anon'),
  load() {
    try {
      const raw = localStorage.getItem(this._key());
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  },
  hasSignature() { return !!this.load(); },
  save(dataURL, method) {
    try {
      localStorage.setItem(this._key(), JSON.stringify({ dataURL, method, savedAt: new Date().toISOString() }));
    } catch(e) {}
    callAPI('saveUserSignature', { dataURL, method });
  },
  reuse() { return this.load(); },
  revoke() {
    try { localStorage.removeItem(this._key()); } catch(e) {}
  },
  openPad(callback) {
    // Build pad
    const wrap = document.createElement('div');
    wrap.id = 'sigPad-overlay';
    wrap.innerHTML =
      '<div class="sig-modal">' +
        '<div class="sig-modal-head"><h3>เซ็นชื่อ</h3><button class="btn btn-ghost btn-icon btn-sm" id="sigClose">'+ic('x',16)+'</button></div>' +
        '<div class="sig-modal-body">' +
          '<div class="sig-mode-tabs">' +
            '<button class="sig-mode-tab active" data-mode="draw">วาดด้วยนิ้ว/เมาส์</button>' +
            '<button class="sig-mode-tab" data-mode="type">พิมพ์ชื่อ</button>' +
          '</div>' +
          '<div id="sigDrawWrap">' +
            '<canvas class="sig-canvas" id="sigCanvas" width="380" height="160"></canvas>' +
            '<div style="text-align:center;font-size:11px;color:var(--ink-3);margin-top:6px">วาดลายเซ็นในกรอบสีขาว</div>' +
          '</div>' +
          '<div id="sigTypeWrap" style="display:none">' +
            '<input class="sig-type-input" id="sigTypeInp" placeholder="พิมพ์ชื่อ-นามสกุล" autocomplete="off">' +
            '<div class="sig-canvas cursive-preview" id="sigTypePreview" style="height:120px"></div>' +
          '</div>' +
        '</div>' +
        '<div class="sig-modal-foot">' +
          '<label class="sig-save-check"><input type="checkbox" id="sigSaveCheck" checked> บันทึกไว้ใช้ครั้งต่อไป</label>' +
          '<button class="btn" id="sigClear">ล้าง</button>' +
          '<button class="btn btn-primary" id="sigSave">บันทึก</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(wrap);

    const canvas = wrap.querySelector('#sigCanvas');
    const ctx = canvas.getContext('2d');
    ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.strokeStyle = '#0B1322';
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);

    // Resize canvas to actual displayed size for crispness
    const r = canvas.getBoundingClientRect();
    canvas.width = r.width; canvas.height = r.height;
    ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.strokeStyle = '#0B1322';
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);

    let drawing = false, hasDrawn = false;
    const pos = (e) => {
      const rc = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: t.clientX - rc.left, y: t.clientY - rc.top };
    };
    const start = (e) => { e.preventDefault(); drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
    const move = (e) => { if (!drawing) return; e.preventDefault(); const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasDrawn = true; };
    const end = () => { drawing = false; };
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseleave', end);
    canvas.addEventListener('touchstart', start, { passive:false });
    canvas.addEventListener('touchmove', move, { passive:false });
    canvas.addEventListener('touchend', end);

    let mode = 'draw';
    wrap.querySelectorAll('.sig-mode-tab').forEach(b => b.addEventListener('click', () => {
      mode = b.dataset.mode;
      wrap.querySelectorAll('.sig-mode-tab').forEach(x => x.classList.toggle('active', x === b));
      wrap.querySelector('#sigDrawWrap').style.display = mode === 'draw' ? 'block' : 'none';
      wrap.querySelector('#sigTypeWrap').style.display = mode === 'type' ? 'block' : 'none';
    }));

    const typeInp = wrap.querySelector('#sigTypeInp');
    const typePrev = wrap.querySelector('#sigTypePreview');
    if (typeInp) {
      typeInp.addEventListener('input', () => { typePrev.textContent = typeInp.value || ''; });
      typeInp.value = (S.session && S.session.name) || '';
      typePrev.textContent = typeInp.value;
    }

    wrap.querySelector('#sigClear').addEventListener('click', () => {
      if (mode === 'draw') {
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); hasDrawn = false;
      } else {
        typeInp.value = ''; typePrev.textContent = '';
      }
    });
    const close = () => wrap.remove();
    wrap.querySelector('#sigClose').addEventListener('click', close);
    wrap.addEventListener('click', (e) => { if (e.target === wrap) close(); });

    wrap.querySelector('#sigSave').addEventListener('click', () => {
      let dataURL, method;
      if (mode === 'draw') {
        if (!hasDrawn) { toast('กรุณาวาดลายเซ็น','','err'); return; }
        dataURL = canvas.toDataURL('image/png');
        method = 'draw';
      } else {
        if (!typeInp.value.trim()) { toast('กรุณาพิมพ์ชื่อ','','err'); return; }
        // render the typed signature to a canvas to get a dataURL
        const c2 = document.createElement('canvas');
        c2.width = 380; c2.height = 120;
        const cx = c2.getContext('2d');
        cx.fillStyle = '#fff'; cx.fillRect(0,0,c2.width,c2.height);
        cx.fillStyle = '#0B1322';
        cx.font = '46px Sacramento, cursive';
        cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText(typeInp.value, c2.width/2, c2.height/2);
        dataURL = c2.toDataURL('image/png');
        method = 'type';
      }
      const shouldSave = wrap.querySelector('#sigSaveCheck').checked;
      if (shouldSave) SIG.save(dataURL, method);
      close();
      callback && callback(dataURL, method);
    });
  }
};

/* ───────────────────────── PromptPay QR utility (reused from Rattana Debt) ───────────────────────── */
const PROMPTPAY_RECEIVER = {
  bank: 'ธนาคารกรุงเทพ',
  accountNo: '5080116931',
  promptPayType: 'tax',
  promptPayId: '0755555000158',
  name: 'บริษัท รัตนไพบูลย์ จำกัด'
};
function ppCrc16(s){
  let crc = 0xFFFF;
  for (let i = 0; i < s.length; i++){
    crc ^= s.charCodeAt(i) << 8;
    for (let j = 0; j < 8; j++){
      crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1);
      crc &= 0xFFFF;
    }
  }
  return crc.toString(16).toUpperCase().padStart(4,'0');
}
function genPromptPayPayload(type, pid, amount){
  const id = (pid||'').replace(/\D/g,'');
  const tlv = (t,v) => t + String(v.length).padStart(2,'0') + v;
  let p = '';
  p += tlv('00','01');
  p += tlv('01', amount ? '12' : '11');
  const m = tlv('00','A000000677010111') + tlv(type === 'phone' ? '01' : '02', id);
  p += tlv('29', m);
  p += tlv('53','764');
  if (amount) p += tlv('54', parseFloat(amount).toFixed(2));
  p += tlv('58','TH');
  p += '6304';
  return p + ppCrc16(p);
}
function nowHHMM(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function nowFullTS(){
  const d = new Date();
  const yy = d.getFullYear(), mm = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return yy+'-'+mm+'-'+dd+' '+nowHHMM();
}

async function callAPI(action, args) {
  if (!GAS_API_URL || GAS_API_URL.startsWith('REPLACE_')) {
    console.warn('[API] GAS_API_URL not set — using mock');
    return { ok: true, mock: true, data: null };
  }
  try {
    const res = await fetch(GAS_API_URL, {
      method: 'POST',
      body: JSON.stringify({ action, token: S.session && S.session.token, args: args || {} }),
    });
    return await res.json();
  } catch (e) {
    console.error('[API]', e);
    toast('เชื่อมต่อ server ไม่ได้', e.message, 'err');
    return { ok: false, error: e.message };
  }
}

// Fetch every collection in one bootstrap call → replace mock arrays in DATA
async function hydrateData() {
  if (!GAS_API_URL || GAS_API_URL.startsWith('REPLACE_')) return false; // mock mode → keep mock DATA
  const res = await callAPI('getBootstrap', {});
  // Session expired/invalid → force re-login
  if (res && res.ok === false && /session|expired|login|token/i.test(res.error || '')) {
    try { localStorage.removeItem('sl_session'); } catch(e) {}
    S.session = null; S.view = 'login';
    return false;
  }
  if (!res || !res.ok || !res.data) return false;
  const d = res.data;
  const setArr = (k, v) => { if (Array.isArray(v)) DATA[k] = v; };
  setArr('vendors', d.vendors);
  setArr('buyers', d.buyers);
  setArr('warehouses', d.warehouses);
  setArr('appointments', d.appointments);
  setArr('submissions', d.submissions);
  setArr('newProducts', d.newProducts);
  setArr('promoRequests', d.promoRequests);
  setArr('returns', d.returns);
  setArr('backorders', d.backorders);
  setArr('extraFeeRates', d.extraFeeRates);
  setArr('salesTargets', d.salesTargets);
  setArr('openPOs', d.openPOs);
  DATA.updates = []; // no legacy updates in real mode
  if (d.today) DATA.today = d.today;
  DATA._hydrated = true;
  return true;
}

function wireSearchBar() {
  const inp = $('#globalSearch');
  if (inp) {
    let to;
    inp.addEventListener('input', () => {
      clearTimeout(to);
      to = setTimeout(() => { S.search.q = inp.value; renderContentOnly(); }, 150);
    });
    inp.addEventListener('keydown', (e) => { if (e.key === 'Escape') { inp.value=''; S.search.q=''; renderContentOnly(); } });
  }
  const clr = $('#clearSearch');
  if (clr) clr.addEventListener('click', () => { S.search.q = ''; renderContentOnly(); });
  $$('.filter-chip[data-status]').forEach(b => b.addEventListener('click', () => { S.search.status = b.dataset.status; renderContentOnly(); }));
  $$('.filter-chip[data-wh]').forEach(b => b.addEventListener('click', () => { S.search.wh = b.dataset.wh; renderContentOnly(); }));
  const rst = $('#resetFilters');
  if (rst) rst.addEventListener('click', () => { S.search = { q:'', status:'all', wh:'all' }; renderContentOnly(); });
  // Ctrl+K / Cmd+K shortcut
  document.onkeydown = (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); inp && inp.focus(); }
  };
}

function renderContentOnly() {
  // Re-render topbar (counts/active states) and content area only
  const main = $('.main');
  if (!main) { render(); return; }
  main.innerHTML = renderTopbar() +
    '<div id="content-area" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden">' +
    (pageMap()[S.page] || pageStub)() + '</div>';
  wireSearchBar();
  if (typeof afterPage === 'function') afterPage();
}

function afterDesktopRender() {
  $$('.sidebar-item').forEach(b => b.addEventListener('click', () => nav(b.dataset.page)));
  $('#btnLogout') && $('#btnLogout').addEventListener('click', logout);

}

function kpi(lbl, val, sub, delta, deltaUp, icon) {
  return '<div class="card kpi">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div class="kpi-lbl">'+esc(lbl)+'</div><span style="color:var(--ink-4)">'+(icon?ic(icon,14):'')+'</span></div>' +
    '<div class="kpi-val">'+esc(val)+'</div>' +
    '<div class="kpi-sub">' + (delta ? '<span class="kpi-delta'+(deltaUp?'':' down')+'">'+(deltaUp?'▲':'▼')+' '+delta+'</span>' : '') + (sub ? '<span>'+esc(sub)+'</span>' : '') + '</div>' +
  '</div>';
}

function sparkSVG(data, w, h) {
  const max = Math.max.apply(null, data), min = Math.min.apply(null, data);
  const range = max - min || 1;
  const stepX = data.length > 1 ? w / (data.length - 1) : w;
  const pts = data.map((v, i) => [i * stepX, h - ((v - min) / range) * (h - 4) - 2]);
  const lp = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const ap = lp + ' L'+w+','+h+' L0,'+h+' Z';
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="display:block">' +
    '<path d="'+ap+'" fill="var(--brand)" fill-opacity=".10"/>' +
    '<path d="'+lp+'" stroke="var(--brand)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>' +
  '</svg>';
}

function miniBarsHTML(rows, h) {
  const m = Math.max.apply(null, rows.map(r=>r.value).concat([1]));
  return '<div style="display:flex;align-items:flex-end;gap:6px;height:'+h+'px">' +
    rows.map(r => {
      const bh = Math.max((r.value/m)*(h-18), 2);
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px">' +
        '<div class="num" style="font-size:10px;color:var(--ink-3)">'+r.value+'</div>' +
        '<div style="width:100%;max-width:28px;height:'+bh+'px;background:'+r.color+';border-radius:3px 3px 0 0"></div>' +
        '<div style="font-size:10px;color:var(--ink-3);font-weight:500">'+esc(r.label)+'</div>' +
      '</div>';
    }).join('') +
  '</div>';
}

/* Reusable search box HTML + wiring */
function searchBoxHTML(id, placeholder, val) {
  val = val || '';
  return '<div class="search-box'+(val?' has-value':'')+'" id="'+id+'Wrap">' +
    ic('search',16,'var(--ink-3)') +
    '<input id="'+id+'" placeholder="'+esc(placeholder)+'" value="'+esc(val)+'" autocomplete="off">' +
    '<button class="clear" data-clear="'+id+'">'+ic('x',12,'#fff',2.5)+'</button>' +
  '</div>';
}
function wireSearchBox(sel, onChange) {
  const inp = $(sel);
  if (!inp) return;
  const wrap = inp.parentElement;
  const updateClass = () => wrap.classList.toggle('has-value', inp.value.length > 0);
  let to;
  inp.addEventListener('input', () => {
    updateClass();
    clearTimeout(to);
    to = setTimeout(() => onChange(inp.value), 150);
  });
  inp.addEventListener('keydown', (e) => { if (e.key === 'Escape') { inp.value=''; updateClass(); onChange(''); } });
  const clr = wrap.querySelector('.clear');
  if (clr) clr.addEventListener('click', () => { inp.value=''; updateClass(); onChange(''); inp.focus(); });
}

/* Smart detail renderer — picks right view based on item source */
function renderSubmissionDetailHTML(item) {
  if (item._source === 'submission') return submissionDetailHTML(item._raw);
  return updateDetailHTML(item);
}

function submissionDetailHTML(s) {
  const schema = FORM_SCHEMAS[s.type] || { title: s.type, fields: [] };
  const isPending = s.status === 'รอตรวจ';
  const isApproved = s.status === 'อนุมัติ';
  const isRejected = s.status === 'ปฏิเสธ';
  const needsBuyerSig = schema.signature === 'both' || schema.signature === 'buyer';

  // Header
  let html = '<div class="card mb-12">' +
    '<div class="card-body">' +
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
        '<span class="num bold" style="font-size:12.5px;color:var(--ink-3)">'+s.id+'</span>' +
        statusChip(s.status) +
        '<span class="chip chip-accent">'+esc(schema.title)+'</span>' +
        (schema.signature ? '<span class="chip chip-brand">'+ic('edit',11)+' ต้องลงนาม</span>' : '') +
      '</div>' +
      '<h2 style="font-size:17px;font-weight:700;margin:8px 0 2px;line-height:1.4">'+esc(s.title)+'</h2>' +
      '<div style="font-size:12px;color:var(--ink-3)">'+esc(s.vendor.short)+' → ส่งถึง '+esc(s.buyer ? s.buyer.name : '—')+' · ส่งเมื่อ '+esc(s.submittedAt)+'</div>' +
    '</div>' +
    (isApproved ? '<div style="background:var(--ok-bg);padding:10px 16px;border-top:1px solid var(--divider);font-size:12px;color:var(--ok);font-weight:600">'+ic('check',14)+' อนุมัติแล้ว</div>' : '') +
    (isRejected ? '<div style="background:var(--err-bg);padding:10px 16px;border-top:1px solid var(--divider);font-size:12px;color:var(--err)"><div style="font-weight:700">'+ic('x',14)+' ปฏิเสธ</div>'+esc(s.rejectReason||'')+'</div>' : '') +
  '</div>';

  // Render structured payload according to schema fields
  html += '<div class="card mb-12"><div class="card-head"><h3 class="ic-head">'+ic('list',15,'var(--brand)')+'รายละเอียด</h3></div><div class="card-body">';
  schema.fields.forEach(f => {
    let v = s.payload ? s.payload[f.name] : null;
    if (v == null) v = s[f.name]; // fallback to top-level
    if (v == null || v === '' || (Array.isArray(v) && v.length === 0)) return;
    html += '<div style="padding:8px 0;border-bottom:1px dashed var(--divider)">';
    html += '<div class="label">'+esc(f.label)+'</div>';
    if (f.type === 'tier-table' && Array.isArray(v)) {
      html += '<table class="tbl" style="margin-top:4px"><thead><tr><th>ยอดถึง</th><th>Rebate %</th></tr></thead><tbody>' +
        v.map(t => '<tr><td class="num bold">'+fmtMoney(t.target||0)+' ฿</td><td class="num bold" style="color:var(--accent)">'+t.percent+'%</td></tr>').join('') +
      '</tbody></table>';
    } else if (f.type === 'price-pair' && Array.isArray(v)) {
      html += '<table class="tbl" style="margin-top:4px"><thead><tr><th>SKU</th><th class="text-left">รายการ</th><th>ราคาเก่า</th><th>ราคาใหม่</th><th>เปลี่ยน</th></tr></thead><tbody>' +
        v.map(p => {
          const diff = ((p.newPrice - p.oldPrice) / p.oldPrice * 100).toFixed(1);
          return '<tr><td class="num bold">'+p.sku+'</td><td class="text-left">'+esc(p.name)+'</td><td class="num">'+fmtMoney(p.oldPrice)+'</td><td class="num bold" style="color:var(--accent)">'+fmtMoney(p.newPrice)+'</td><td class="num" style="color:'+(diff>0?'var(--err)':'var(--ok)')+';font-weight:700">'+(diff>0?'+':'')+diff+'%</td></tr>';
        }).join('') +
      '</tbody></table>';
    } else if (f.type === 'price-pair' && typeof v === 'object') {
      // form-submitted pairs: { sku_old: x, sku_new: y }
      const skus = Array.from(new Set(Object.keys(v).map(k => k.split('_')[0])));
      html += '<table class="tbl" style="margin-top:4px"><thead><tr><th>SKU</th><th>ราคาเก่า</th><th>ราคาใหม่</th></tr></thead><tbody>' +
        skus.map(sk => '<tr><td class="num bold">'+sk+'</td><td class="num">'+fmtMoney(v[sk+'_old']||0)+'</td><td class="num bold" style="color:var(--accent)">'+fmtMoney(v[sk+'_new']||0)+'</td></tr>').join('') +
      '</tbody></table>';
    } else if (f.type === 'daterange' && typeof v === 'object') {
      html += '<div class="num bold">'+toBE(v.start||'')+' → '+toBE(v.end||'')+'</div>';
    } else if (f.type === 'date') {
      html += '<div class="num bold">'+toBE(v)+'</div>';
    } else if (f.type === 'sku-multi' && Array.isArray(v)) {
      html += '<div class="chip-row" style="margin-top:4px">'+v.map(sk => '<span class="chip">'+sk+'</span>').join('')+'</div>';
    } else if (f.type === 'chip-multi' && Array.isArray(v)) {
      html += '<div class="chip-row" style="margin-top:4px">'+v.map(x => '<span class="chip chip-brand">'+esc(x)+'</span>').join('')+'</div>';
    } else if (f.type === 'textarea') {
      html += '<div style="font-size:13px;line-height:1.6;background:var(--surface-alt);padding:8px 10px;border-radius:6px;margin-top:4px">'+esc(v)+'</div>';
    } else if (f.type === 'number') {
      html += '<div class="num bold" style="font-size:15px">'+fmtMoney(v)+'</div>';
    } else if (f.type === 'checkbox') {
      html += '<div>'+(v ? ic('check',12,'var(--ok)')+' ใช่' : '— ไม่')+'</div>';
    } else {
      html += '<div style="font-size:13px">'+esc(typeof v === 'object' ? JSON.stringify(v) : v)+'</div>';
    }
    html += '</div>';
  });
  html += '</div></div>';

  // Signatures section
  if (schema.signature) {
    html += '<div class="card mb-12"><div class="card-head"><h3 class="ic-head">'+ic('edit',15,'var(--brand)')+'ลงนาม</h3></div><div class="card-body">' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
    html += '<div><div class="label">Supplier</div>' +
      (s.supplierSig ? '<div style="background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px;text-align:center"><img src="'+s.supplierSig+'" style="max-height:80px;max-width:100%"></div><div style="font-size:11px;color:var(--ok);text-align:center;margin-top:4px;font-weight:600">'+ic('check',12)+' เซ็นแล้ว</div>' : '<div style="background:var(--surface-alt);padding:20px;border-radius:8px;text-align:center;color:var(--ink-4);font-size:11px">ยังไม่ได้เซ็น</div>') +
    '</div>';
    if (needsBuyerSig) {
      html += '<div><div class="label">Buyer / จัดซื้อ</div>' +
        (s.buyerSig ? '<div style="background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px;text-align:center"><img src="'+s.buyerSig+'" style="max-height:80px;max-width:100%"></div><div style="font-size:11px;color:var(--ok);text-align:center;margin-top:4px;font-weight:600">'+ic('check',12)+' เซ็นแล้ว</div>' : '<div style="background:var(--surface-alt);padding:20px;border-radius:8px;text-align:center;color:var(--ink-4);font-size:11px">รอจัดซื้อเซ็น (เมื่ออนุมัติ)</div>') +
      '</div>';
    }
    html += '</div></div></div>';
  }

  // Action footer
  if (isPending) {
    html += '<div style="position:sticky;bottom:0;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px;display:flex;gap:8px;justify-content:flex-end;box-shadow:var(--sh-pop)">' +
      '<button class="btn btn-danger sub-reject" data-id="'+s.id+'">'+ic('x',13)+' ปฏิเสธ</button>' +
      '<button class="btn btn-primary sub-approve" data-id="'+s.id+'">'+ic('check',13)+(needsBuyerSig ? ' อนุมัติ + เซ็น' : ' อนุมัติ')+'</button>' +
    '</div>';
  }
  return html;
}

function approveSubmission(id) {
  const s = DATA.submissions.find(x => x.id === id);
  if (!s) return;
  const schema = FORM_SCHEMAS[s.type];
  const needsBuyerSig = schema && (schema.signature === 'both' || schema.signature === 'buyer');
  if (needsBuyerSig && !s.buyerSig) {
    const saved = SIG.load();
    if (saved) {
      // Confirm with user before reusing
      if (confirm('ใช้ลายเซ็นเดิม (เซ็นเมื่อ '+new Date(saved.savedAt).toLocaleDateString('th-TH')+') เพื่ออนุมัติ?')) {
        s.buyerSig = saved.dataURL;
        s.status = 'อนุมัติ'; s.reviewedAt = new Date().toISOString().slice(0,16).replace('T',' ');
        toast('อนุมัติแล้ว','ใช้ลายเซ็นเดิม','ok');
        renderContentOnly();
      } else {
        SIG.openPad((dataURL) => {
          s.buyerSig = dataURL; s.status = 'อนุมัติ'; s.reviewedAt = new Date().toISOString().slice(0,16).replace('T',' ');
          toast('อนุมัติแล้ว','เซ็นลายเซ็นใหม่','ok');
          renderContentOnly();
        });
      }
    } else {
      SIG.openPad((dataURL) => {
        s.buyerSig = dataURL; s.status = 'อนุมัติ'; s.reviewedAt = new Date().toISOString().slice(0,16).replace('T',' ');
        toast('อนุมัติแล้ว','บันทึกลายเซ็นไว้ใช้ครั้งหน้า','ok');
        renderContentOnly();
      });
    }
  } else {
    s.status = 'อนุมัติ'; s.reviewedAt = new Date().toISOString().slice(0,16).replace('T',' ');
    toast('อนุมัติแล้ว', s.title, 'ok');
    renderContentOnly();
  }
}
function rejectSubmission(id) {
  const reason = prompt('ระบุเหตุผลการปฏิเสธ (จะแจ้งกลับ supplier):');
  if (reason === null) return;
  const s = DATA.submissions.find(x => x.id === id);
  if (!s) return;
  s.status = 'ปฏิเสธ'; s.rejectReason = reason || 'ไม่ผ่านการพิจารณา';
  toast('ปฏิเสธแล้ว', s.title, 'warn');
  renderContentOnly();
}

function renderNewProducts() {
  if (!S.npSearch) S.npSearch = { q:'', status:'all' };
  const ns = S.npSearch;
  const filtered = DATA.newProducts.filter(p => {
    if (ns.status !== 'all' && p.status !== ns.status) return false;
    if (ns.q) {
      const q = ns.q.toLowerCase();
      const hay = (p.id+' '+p.vendor.short+' '+p.product.name+' '+p.product.brand+' '+p.product.cat).toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });
  const cnt = (st) => DATA.newProducts.filter(p => p.status === st).length;
  const selId = (S.selectedNPId && filtered.find(p=>p.id===S.selectedNPId)) ? S.selectedNPId : (filtered[0] ? filtered[0].id : null);
  const sel = filtered.find(p => p.id === selId) || filtered[0];

  afterPage = function() {
    wireSearchBox('#npSearch', (val) => { S.npSearch.q = val; renderContentOnly(); });
    $$('.np-status-chip').forEach(c => c.addEventListener('click', () => { S.npSearch.status = c.dataset.status; renderContentOnly(); }));
    $$('#npList .list-item').forEach(b => b.addEventListener('click', () => {
      S.selectedNPId = b.dataset.id;
      const target = $('#npDetail');
      if (target) target.innerHTML = newProductDetailHTML(DATA.newProducts.find(p => p.id === b.dataset.id));
      $$('#npList .list-item').forEach(x => x.classList.toggle('active', x.dataset.id === S.selectedNPId));
      wireNPActions();
    }));
    wireNPActions();
  };
  function wireNPActions() {
    $$('.np-approve').forEach(b => b.addEventListener('click', () => approveNP(b.dataset.id)));
    $$('.np-reject').forEach(b => b.addEventListener('click', () => rejectNP(b.dataset.id)));
    $$('.np-more-info').forEach(b => b.addEventListener('click', () => requestMoreNP(b.dataset.id)));
  }

  return '<div class="content" style="padding:0;display:flex;flex-direction:column;flex:1">' +
    '<div class="two-pane wider" style="margin:16px;flex:1">' +
      '<div class="two-pane-list">' +
        '<div class="list-search">' +
          searchBoxHTML('npSearch', 'ค้นหา ID, supplier, ชื่อสินค้า…', ns.q) +
          '<div class="chip-row" style="margin-top:8px">' +
            '<button class="filter-chip np-status-chip'+(ns.status==='all'?' active':'')+'" data-status="all" style="height:28px">ทั้งหมด<span class="count">'+DATA.newProducts.length+'</span></button>' +

            '<button class="filter-chip ok np-status-chip'+(ns.status==='อนุมัติ'?' active':'')+'" data-status="อนุมัติ" style="height:28px">อนุมัติ<span class="count">'+cnt('อนุมัติ')+'</span></button>' +
            '<button class="filter-chip err np-status-chip'+(ns.status==='ปฏิเสธ'?' active':'')+'" data-status="ปฏิเสธ" style="height:28px">ปฏิเสธ<span class="count">'+cnt('ปฏิเสธ')+'</span></button>' +
          '</div>' +
          '<div style="font-size:11px;color:var(--ink-3);margin-top:8px">พบ <span class="num bold">'+filtered.length+'</span> ราย</div>' +
        '</div>' +
        '<div id="npList" class="list-items scroll">' +
        filtered.map(p =>
          '<button class="list-item '+(p.id===selId?'active':'')+'" data-id="'+p.id+'">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="num" style="font-size:11px;color:var(--ink-3)">'+p.id+'</span><span style="margin-left:auto">'+statusChip(p.status)+'</span></div>' +

function adminTargetDetailHTML(g) {
  if (!g) return '';
  const isPending = g.status === 'รอตรวจ';
  const isApproved = g.status === 'อนุมัติ';
  const isRejected = g.status === 'ปฏิเสธ';
  // Group lines by scope for summary
  const sumByUnit = {};
  g.lines.forEach(l => { sumByUnit[l.unit] = (sumByUnit[l.unit] || 0) + Number(l.targetAmount || 0); });

  let html = '<div class="card mb-12">' +
    '<div class="card-body">' +
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
        '<span class="num bold" style="font-size:12.5px;color:var(--ink-3)">'+g.groupId+'</span>' +
        statusChip(g.status) +
        '<span class="chip chip-accent">เป้าหมายขาย</span>' +
        '<span class="chip">'+g.lines.length+' รายการ</span>' +
      '</div>' +
      '<h2 style="font-size:18px;font-weight:700;margin:8px 0 2px">'+esc(g.vendor.short)+'</h2>' +
      '<div style="font-size:12px;color:var(--ink-3)">'+esc(g.vendor.name)+' · ส่งเมื่อ '+esc(g.submittedAt)+'</div>' +
    '</div>' +
    (isApproved ? '<div style="background:var(--ok-bg);padding:10px 16px;border-top:1px solid var(--divider);font-size:12px;color:var(--ok);font-weight:600">'+ic('check',14)+' อนุมัติแล้ว — ทีมขายจะดึงไปใช้ follow up</div>' : '') +
    (isRejected ? '<div style="background:var(--err-bg);padding:10px 16px;border-top:1px solid var(--divider);font-size:12px;color:var(--err)"><div style="font-weight:700">'+ic('x',14)+' ปฏิเสธ</div>'+esc(g.rejectReason||'')+'</div>' : '') +
  '</div>';

  // Summary card
  html += '<div class="card mb-12"><div class="card-head"><h3 class="ic-head">'+ic('chart',15,'var(--brand)')+'สรุปยอดเป้าหมาย</h3></div><div class="card-body">' +
    '<div style="display:grid;grid-template-columns:repeat('+Math.min(Object.keys(sumByUnit).length || 1, 4)+',1fr);gap:10px">' +
      Object.keys(sumByUnit).map(u =>
        '<div style="background:var(--brand-tint);padding:14px;border-radius:10px;text-align:center">' +
          '<div style="font-size:10.5px;color:var(--brand);text-transform:uppercase;letter-spacing:.06em;font-weight:700">รวม</div>' +
          '<div class="num bold" style="font-size:22px;color:var(--brand);margin-top:4px">'+fmtMoney(sumByUnit[u])+'</div>' +
          '<div style="font-size:11px;color:var(--ink-3)">'+esc(u)+'</div>' +
        '</div>'
      ).join('') +
    '</div>' +
  '</div></div>';

  // Lines table
  html += '<div class="card mb-12"><div class="card-head"><h3 class="ic-head">'+ic('list',15,'var(--brand)')+'รายละเอียดเป้าหมาย ('+g.lines.length+' รายการ)</h3></div><div class="card-body flush"><table class="tbl"><thead><tr>' +
    '<th>#</th><th>Scope</th><th class="text-left">รายละเอียด</th><th>ช่วงเวลา</th><th>หน่วย</th><th>จำนวนเป้า</th><th class="text-left">หมายเหตุ</th>' +
  '</tr></thead><tbody>' +
  g.lines.map((l, i) => {
    let scopeDetail = '—';
    if (l.scope === 'รายกลุ่ม') scopeDetail = (l.scopeField || '') + ': ' + (l.scopeValue || '');
    else if (l.scope === 'รายสินค้า') scopeDetail = 'SKU ' + (l.scopeValue || '');
    else scopeDetail = l.scope;

    let periodStr = l.periodType;
    if (l.periodType === 'รายเดือน' && l.periodMonth) periodStr += ' ' + thaiMonth(Number(l.periodMonth)) + '/' + l.periodYear;
    else if (l.periodType === 'รายไตรมาส' && l.periodQuarter) periodStr += ' ' + l.periodQuarter + '/' + l.periodYear;
    else if (l.periodType === 'เลือกเดือน' && l.periodMonthsMulti && l.periodMonthsMulti.length) periodStr = (l.periodMonthsMulti||[]).map(m => thaiMonth(Number(m))).join(', ') + '/' + l.periodYear;
    else if (l.periodType === 'รายปี') periodStr += ' ' + l.periodYear;

    return '<tr>' +
      '<td class="num">'+(i+1)+'</td>' +
      '<td><span class="chip chip-sm chip-brand">'+esc(l.scope)+'</span></td>' +
      '<td class="text-left" style="font-size:12px">'+esc(scopeDetail)+'</td>' +
      '<td style="font-size:11.5px">'+esc(periodStr)+'</td>' +
      '<td><span class="chip chip-sm chip-accent">'+esc(l.unit)+'</span></td>' +
      '<td class="num bold" style="color:var(--ink);font-size:14px">'+fmtMoney(l.targetAmount)+'</td>' +
      '<td class="text-left" style="font-size:11px;color:var(--ink-3)">'+esc(l.notes || '—')+'</td>' +
    '</tr>';
  }).join('') +
  '</tbody></table></div></div>';

  // Action footer
  if (isPending) {
    html += '<div style="position:sticky;bottom:0;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px;display:flex;gap:8px;justify-content:flex-end;box-shadow:var(--sh-pop)">' +
      '<button class="btn btn-danger tg-reject" data-id="'+g.groupId+'">'+ic('x',13)+' ปฏิเสธทั้งชุด</button>' +
      '<button class="btn btn-primary tg-approve" data-id="'+g.groupId+'">'+ic('check',13)+' อนุมัติทั้งชุด</button>' +
    '</div>';
  }
  return html;
}

function approveTG(groupId) {
  const g = DATA.salesTargets.find(x => x.groupId === groupId);
  if (!g) return;
  g.status = 'อนุมัติ';
  toast('อนุมัติเป้าหมายแล้ว', g.lines.length+' รายการของ '+g.vendor.short, 'ok');
  renderContentOnly();
}
function rejectTG(groupId) {
  const reason = prompt('ระบุเหตุผลการปฏิเสธ (จะแจ้งกลับ supplier):');
  if (reason === null) return;
  const g = DATA.salesTargets.find(x => x.groupId === groupId);
  if (!g) return;
  g.status = 'ปฏิเสธ'; g.rejectReason = reason || 'ไม่ผ่านการพิจารณา';
  toast('ปฏิเสธแล้ว', g.vendor.short, 'warn');
  renderContentOnly();
}

function renderReturnsImpl() {
  if (!S.retSearch) S.retSearch = { q:'', status:'all' };
  const rs = S.retSearch;
  const all = DATA.returns;
  const filtered = all.filter(r => {
    if (rs.status === 'pending' && r.ack) return false;
    if (rs.status === 'done' && !r.ack) return false;
    if (rs.q) {
      const q = rs.q.toLowerCase();
      if ((r.id+' '+r.vendor.short+' '+r.sku+' '+r.desc).toLowerCase().indexOf(q) === -1) return false;
    }
    return true;
  });
  const pendingCnt = all.filter(r => !r.ack).length;
  const doneCnt = all.filter(r => r.ack).length;

  afterPage = function() {
    wireSearchBox('#retSearch', (val) => { S.retSearch.q = val; renderContentOnly(); });
    $$('.ret-status-chip').forEach(c => c.addEventListener('click', () => { S.retSearch.status = c.dataset.status; renderContentOnly(); }));
  };

  return '<div class="content scroll">' +
    '<div class="card">' +
      '<div class="card-head"><h3>สินค้าต้องคืน · รอ supplier ยืนยัน</h3><button class="btn btn-sm btn-primary">'+ic('plus',12)+' แจ้งคืนใหม่</button></div>' +

        '<div style="flex:1;min-width:240px;max-width:380px">'+searchBoxHTML('retSearch', 'ค้นหา ID, supplier, SKU, รายการ…', rs.q)+'</div>' +

          '<button class="filter-chip ret-status-chip'+(rs.status==='all'?' active':'')+'" data-status="all" style="height:30px">ทั้งหมด<span class="count">'+all.length+'</span></button>' +

          '<button class="filter-chip ok ret-status-chip'+(rs.status==='done'?' active':'')+'" data-status="done" style="height:30px">รับทราบแล้ว<span class="count">'+doneCnt+'</span></button>' +
        '</div>' +
      '</div>' +
      '<div class="card-body flush"><table class="tbl"><thead><tr><th>ID</th><th>Supplier</th><th>คลัง</th><th>SKU</th><th class="text-left">รายการ</th><th>จำนวน</th><th>แจ้งเมื่อ</th><th>สถานะ</th><th></th></tr></thead><tbody>' +
        filtered.map(r => '<tr>'+
          '<td class="num bold">'+r.id+'</td>'+
          '<td><span style="font-weight:600">'+esc(r.vendor.short)+'</span></td>'+
          '<td>'+whPill(r.wh)+'</td>'+
          '<td class="num">'+r.sku+'</td>'+
          '<td class="text-left">'+esc(r.desc)+'</td>'+
          '<td class="num bold" style="color:var(--ink)">'+r.qty+'</td>'+
          '<td class="num">'+r.posted+'</td>'+
          '<td>'+(r.ack?'<span class="chip chip-ok chip-sm">รับทราบ</span>':'<span class="chip chip-warn chip-sm">รอ ack</span>')+'</td>'+
          '<td><button class="btn btn-ghost btn-icon btn-sm">'+ic('more',12)+'</button></td></tr>').join('') +
        (filtered.length === 0 ? '<tr><td colspan="9" style="padding:40px;color:var(--ink-3)">ไม่พบรายการคืนที่ตรงเงื่อนไข</td></tr>' : '') +
