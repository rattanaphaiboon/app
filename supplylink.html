function renderNewProducts() {
  if (!S.npSearch) S.npSearch = { q:'', status:'all' };
  const ns = S.npSearch;
  const filtered = DATA.newProducts.filter(p => {
    if (ns.status !== 'all' && p.status !== ns.status) return false;
    if (ns.q) {
      const q = ns.q.toLowerCase();
      const hay = (p.id+' '+p.vendor.short+' '+p.product.name+' '+p.product.brand+' '+p.product.cat).toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });
  const cnt = (st) => DATA.newProducts.filter(p => p.status === st).length;
  const selId = (S.selectedNPId && filtered.find(p=>p.id===S.selectedNPId)) ? S.selectedNPId : (filtered[0] ? filtered[0].id : null);
  const sel = filtered.find(p => p.id === selId) || filtered[0];

  afterPage = function() {
    wireSearchBox('#npSearch', (val) => { S.npSearch.q = val; renderContentOnly(); });
    $$('.np-status-chip').forEach(c => c.addEventListener('click', () => { S.npSearch.status = c.dataset.status; renderContentOnly(); }));
    $$('#npList .list-item').forEach(b => b.addEventListener('click', () => {
      S.selectedNPId = b.dataset.id;
      const target = $('#npDetail');
      if (target) target.innerHTML = newProductDetailHTML(DATA.newProducts.find(p => p.id === b.dataset.id));
      $$('#npList .list-item').forEach(x => x.classList.toggle('active', x.dataset.id === S.selectedNPId));
      wireNPActions();
    }));
    wireNPActions();
  };
  function wireNPActions() {
    $$('.np-approve').forEach(b => b.addEventListener('click', () => approveNP(b.dataset.id)));
    $$('.np-reject').forEach(b => b.addEventListener('click', () => rejectNP(b.dataset.id)));
    $$('.np-more-info').forEach(b => b.addEventListener('click', () => requestMoreNP(b.dataset.id)));
  }

  return '<div class="content" style="padding:0;display:flex;flex-direction:column;flex:1">' +
    '<div class="two-pane wider" style="margin:16px;flex:1">' +
      '<div class="two-pane-list">' +
        '<div class="list-search">' +
          searchBoxHTML('npSearch', 'ค้นหา ID, supplier, ชื่อสินค้า…', ns.q) +
          '<div class="chip-row" style="margin-top:8px">' +
            '<button class="filter-chip np-status-chip'+(ns.status==='all'?' active':'')+'" data-status="all" style="height:28px">ทั้งหมด<span class="count">'+DATA.newProducts.length+'</span></button>' +
            '<button class="filter-chip warn np-status-chip'+(ns.status==='รอตรวจ'?' active':'')+'" data-status="รอตรวจ" style="height:28px">รอตรวจ<span class="count">'+cnt('รอตรวจ')+'</span></button>' +
            '<button class="filter-chip ok np-status-chip'+(ns.status==='อนุมัติ'?' active':'')+'" data-status="อนุมัติ" style="height:28px">อนุมัติ<span class="count">'+cnt('อนุมัติ')+'</span></button>' +
            '<button class="filter-chip err np-status-chip'+(ns.status==='ปฏิเสธ'?' active':'')+'" data-status="ปฏิเสธ" style="height:28px">ปฏิเสธ<span class="count">'+cnt('ปฏิเสธ')+'</span></button>' +
          '</div>' +
          '<div style="font-size:11px;color:var(--ink-3);margin-top:8px">พบ <span class="num bold">'+filtered.length+'</span> ราย</div>' +
        '</div>' +
        '<div id="npList" class="list-items scroll">' +
        filtered.map(p =>
          '<button class="list-item '+(p.id===selId?'active':'')+'" data-id="'+p.id+'">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="num" style="font-size:11px;color:var(--ink-3)">'+p.id+'</span><span style="margin-left:auto">'+statusChip(p.status)+'</span></div>' +
            '<div style="font-size:13px;font-weight:600;color:var(--ink);line-height:1.35">'+esc(p.product.name)+'</div>' +
            '<div style="font-size:11px;color:var(--ink-3);margin-top:3px">'+esc(p.product.brand)+' · '+esc(p.product.cat)+'</div>' +
            '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10.5px;color:var(--ink-3)"><span>'+esc(p.vendor.short)+'</span><span class="num">'+p.submitted.slice(5,16).replace('-','/')+'</span></div>' +
          '</button>'
        ).join('') +
        (filtered.length === 0 ? '<div style="padding:24px;text-align:center;color:var(--ink-3);font-size:12px">ไม่พบรายการ</div>' : '') +
        '</div>' +
      '</div>' +
      '<div id="npDetail" class="two-pane-detail scroll">' + (sel ? newProductDetailHTML(sel) : '<div style="padding:40px;text-align:center;color:var(--ink-3)">เลือกรายการจากด้านซ้าย</div>') + '</div>' +
    '</div>' +
  '</div>';
}

function approveNP(id) {
  const np = DATA.newProducts.find(p => p.id === id);
  if (!np) return;
  np.status = 'อนุมัติ';
  toast('อนุมัติแล้ว', np.product.name, 'ok');
  renderContentOnly();
}
function rejectNP(id) {
  const reason = prompt('ระบุเหตุผลการปฏิเสธ (จะแจ้งกลับ supplier):');
  if (reason === null) return;
  const np = DATA.newProducts.find(p => p.id === id);
  if (!np) return;
  np.status = 'ปฏิเสธ';
  np.rejectReason = reason || 'ไม่ผ่านการพิจารณา';
  toast('ปฏิเสธแล้ว', np.product.name, 'warn');
  renderContentOnly();
}
function requestMoreNP(id) {
  toast('ส่งข้อความถึง supplier แล้ว', 'ขอข้อมูลเพิ่มเติม', 'ok');
}

/* ───────────────────────── ADMIN: Promo Requests (ขอจัดโปรโมชั่น) ───────────────────────── */
function renderPromoRequests() {
  if (!S.prSearch) S.prSearch = { q:'', status:'all', type:'all' };
  const ps = S.prSearch;
  const filtered = DATA.promoRequests.filter(p => {
    if (ps.status !== 'all' && p.status !== ps.status) return false;
    if (ps.type !== 'all' && p.promoType !== ps.type) return false;
    if (ps.q) {
      const q = ps.q.toLowerCase();
      if ((p.id+' '+p.vendor.short+' '+p.title+' '+p.skus.map(s=>s.code+' '+s.name).join(' ')).toLowerCase().indexOf(q) === -1) return false;
    }
    return true;
  });
  const cnt = (st) => DATA.promoRequests.filter(p => p.status === st).length;
  const selId = (S.selectedPRId && filtered.find(p=>p.id===S.selectedPRId)) ? S.selectedPRId : (filtered[0] ? filtered[0].id : null);
  const sel = filtered.find(p => p.id === selId) || filtered[0];

  afterPage = function() {
    wireSearchBox('#prSearch', (val) => { S.prSearch.q = val; renderContentOnly(); });
    $$('.pr-status-chip').forEach(c => c.addEventListener('click', () => { S.prSearch.status = c.dataset.status; renderContentOnly(); }));
    $$('.pr-type-chip').forEach(c => c.addEventListener('click', () => { S.prSearch.type = c.dataset.type; renderContentOnly(); }));
    $$('#prList .list-item').forEach(b => b.addEventListener('click', () => {
      S.selectedPRId = b.dataset.id;
      const t = $('#prDetail');
      if (t) t.innerHTML = promoDetailHTML(DATA.promoRequests.find(p => p.id === b.dataset.id));
      $$('#prList .list-item').forEach(x => x.classList.toggle('active', x.dataset.id === S.selectedPRId));
      wirePRActions();
    }));
    wirePRActions();
  };
  function wirePRActions() {
    $$('.pr-approve').forEach(b => b.addEventListener('click', () => approvePR(b.dataset.id)));
    $$('.pr-reject').forEach(b => b.addEventListener('click', () => rejectPR(b.dataset.id)));
    $$('.pr-more').forEach(b => b.addEventListener('click', () => { toast('ส่งข้อความถึง supplier แล้ว','ขอข้อมูลเพิ่ม','ok'); }));
  }

  const typeChips = [
    {id:'all', lbl:'ทุกประเภท'},
    {id:'buyXgetY', lbl:'ซื้อแถม'},
    {id:'discount', lbl:'ลด %'},
    {id:'foc', lbl:'FOC %'},
    {id:'bundle', lbl:'แลกซื้อ'},
  ];

  return '<div class="content" style="padding:0;display:flex;flex-direction:column;flex:1">' +
    '<div class="two-pane wider" style="margin:16px;flex:1">' +
      '<div class="two-pane-list">' +
        '<div class="list-search">' +
          searchBoxHTML('prSearch', 'ค้นหา ID, supplier, SKU…', ps.q) +
          '<div class="chip-row" style="margin-top:8px">' +
            '<button class="filter-chip pr-status-chip'+(ps.status==='all'?' active':'')+'" data-status="all" style="height:28px">ทั้งหมด<span class="count">'+DATA.promoRequests.length+'</span></button>' +
            '<button class="filter-chip warn pr-status-chip'+(ps.status==='รอตรวจ'?' active':'')+'" data-status="รอตรวจ" style="height:28px">รอตรวจ<span class="count">'+cnt('รอตรวจ')+'</span></button>' +
            '<button class="filter-chip ok pr-status-chip'+(ps.status==='อนุมัติ'?' active':'')+'" data-status="อนุมัติ" style="height:28px">อนุมัติ<span class="count">'+cnt('อนุมัติ')+'</span></button>' +
            '<button class="filter-chip err pr-status-chip'+(ps.status==='ปฏิเสธ'?' active':'')+'" data-status="ปฏิเสธ" style="height:28px">ปฏิเสธ<span class="count">'+cnt('ปฏิเสธ')+'</span></button>' +
          '</div>' +
          '<div class="chip-row" style="margin-top:6px">' +
            typeChips.map(c => '<button class="filter-chip pr-type-chip'+(ps.type===c.id?' active':'')+'" data-type="'+c.id+'" style="height:24px;font-size:11px;padding:0 8px">'+esc(c.lbl)+'</button>').join('') +
          '</div>' +
          '<div style="font-size:11px;color:var(--ink-3);margin-top:8px">พบ <span class="num bold">'+filtered.length+'</span> รายการ</div>' +
        '</div>' +
        '<div id="prList" class="list-items scroll">' +
        filtered.map(p =>
          '<button class="list-item '+(p.id===selId?'active':'')+'" data-id="'+p.id+'">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="chip chip-sm chip-accent">'+promoTypeLabel(p.promoType)+'</span><span class="num" style="font-size:11px;color:var(--ink-3);margin-left:auto">'+p.id+'</span></div>' +
            '<div style="font-size:13px;font-weight:600;color:var(--ink);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+esc(p.title)+'</div>' +
            '<div style="display:flex;gap:6px;align-items:center;margin-top:6px;font-size:10.5px;color:var(--ink-3)"><span>'+esc(p.vendor.short)+'</span><span>·</span><span class="num">'+p.startDate.slice(5)+' – '+p.endDate.slice(5)+'</span><span style="margin-left:auto">'+statusChip(p.status)+'</span></div>' +
          '</button>'
        ).join('') +
        (filtered.length === 0 ? '<div style="padding:24px;text-align:center;color:var(--ink-3);font-size:12px">ไม่พบรายการ</div>' : '') +
        '</div>' +
      '</div>' +
      '<div id="prDetail" class="two-pane-detail scroll">' + (sel ? promoDetailHTML(sel) : '<div style="padding:40px;text-align:center;color:var(--ink-3)">เลือกรายการจากด้านซ้าย</div>') + '</div>' +
    '</div>' +
  '</div>';
}

function promoTypeLabel(t) {
  return ({buyXgetY:'ซื้อแถม', discount:'ลด %', foc:'FOC %', bundle:'แลกซื้อ', coupon:'คูปอง', other:'อื่นๆ'})[t] || t;
}
function promoTypeBig(p) {
  if (p.promoType === 'buyXgetY') return 'ซื้อ '+p.typeDetail.buy+' แถม '+p.typeDetail.get+' '+(p.typeDetail.unit||'');
  if (p.promoType === 'discount') return 'ลด '+p.typeDetail.percent+'% จากราคาขายส่ง';
  if (p.promoType === 'foc') return 'FOC '+p.typeDetail.percent+'%';
  if (p.promoType === 'bundle') return p.typeDetail.detail || 'แลกซื้อ / Bundle';
  return promoTypeLabel(p.promoType);
}

  return '<div class="card mb-12">' +

    (isRejected ? '<div style="background:var(--err-bg);padding:10px 16px;border-top:1px solid var(--divider);font-size:12px;color:var(--err)"><div style="font-weight:700">'+ic('x',14)+' ปฏิเสธ</div>'+esc(pr.rejectReason||'')+'</div>' : '') +
  '</div>' +

  const filtered = DATA.salesTargets.filter(g => {
    if (ts.status !== 'all' && g.status !== ts.status) return false;

      const q = ts.q.toLowerCase();
      if ((g.groupId+' '+g.vendor.short+' '+g.vendor.name+' '+g.lines.map(l=>l.scopeValue+' '+l.notes).join(' ')).toLowerCase().indexOf(q) === -1) return false;
    }

  });

  const selId = (S.selectedTGId && filtered.find(g=>g.groupId===S.selectedTGId)) ? S.selectedTGId : (filtered[0] ? filtered[0].groupId : null);

  afterPage = function() {
    wireSearchBox('#tgtSearch', (val) => { S.tgtSearch.q = val; renderContentOnly(); });

        '<div class="list-search">' +

          '<div class="chip-row" style="margin-top:8px">' +
            '<button class="filter-chip tgt-status-chip'+(ts.status==='all'?' active':'')+'" data-status="all" style="height:28px">ทั้งหมด<span class="count">'+DATA.salesTargets.length+'</span></button>' +
            '<button class="filter-chip warn tgt-status-chip'+(ts.status==='รอตรวจ'?' active':'')+'" data-status="รอตรวจ" style="height:28px">รอตรวจ<span class="count">'+cnt('รอตรวจ')+'</span></button>' +
            '<button class="filter-chip ok tgt-status-chip'+(ts.status==='อนุมัติ'?' active':'')+'" data-status="อนุมัติ" style="height:28px">อนุมัติ<span class="count">'+cnt('อนุมัติ')+'</span></button>' +
            '<button class="filter-chip err tgt-status-chip'+(ts.status==='ปฏิเสธ'?' active':'')+'" data-status="ปฏิเสธ" style="height:28px">ปฏิเสธ<span class="count">'+cnt('ปฏิเสธ')+'</span></button>' +
          '</div>' +
          '<div style="font-size:11px;color:var(--ink-3);margin-top:8px">พบ <span class="num bold">'+filtered.length+'</span> ชุด</div>' +
        '</div>' +
        '<div id="tgtList" class="list-items scroll">' +
        filtered.map(g => {
          const totalLines = g.lines.length;

            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="num" style="font-size:11px;color:var(--ink-3)">'+g.groupId+'</span><span style="margin-left:auto">'+statusChip(g.status)+'</span></div>' +
            '<div style="font-size:13px;font-weight:600;color:var(--ink);line-height:1.35">'+esc(g.vendor.short)+'</div>' +
            '<div style="font-size:11px;color:var(--ink-3);margin-top:3px">'+totalLines+' รายการ · '+g.submittedAt.slice(5,16)+'</div>' +
          '</button>';
        }).join('') +

function adminTargetDetailHTML(g) {
  if (!g) return '';
  const isPending = g.status === 'รอตรวจ';
  const isApproved = g.status === 'อนุมัติ';
  const isRejected = g.status === 'ปฏิเสธ';
  // Group lines by scope for summary
  const sumByUnit = {};
  g.lines.forEach(l => { sumByUnit[l.unit] = (sumByUnit[l.unit] || 0) + Number(l.targetAmount || 0); });

  let html = '<div class="card mb-12">' +
    '<div class="card-body">' +
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
        '<span class="num bold" style="font-size:12.5px;color:var(--ink-3)">'+g.groupId+'</span>' +
        statusChip(g.status) +
        '<span class="chip chip-accent">เป้าหมายขาย</span>' +
        '<span class="chip">'+g.lines.length+' รายการ</span>' +
      '</div>' +
      '<h2 style="font-size:18px;font-weight:700;margin:8px 0 2px">'+esc(g.vendor.short)+'</h2>' +
      '<div style="font-size:12px;color:var(--ink-3)">'+esc(g.vendor.name)+' · ส่งเมื่อ '+esc(g.submittedAt)+'</div>' +
    '</div>' +
    (isApproved ? '<div style="background:var(--ok-bg);padding:10px 16px;border-top:1px solid var(--divider);font-size:12px;color:var(--ok);font-weight:600">'+ic('check',14)+' อนุมัติแล้ว — ทีมขายจะดึงไปใช้ follow up</div>' : '') +
    (isRejected ? '<div style="background:var(--err-bg);padding:10px 16px;border-top:1px solid var(--divider);font-size:12px;color:var(--err)"><div style="font-weight:700">'+ic('x',14)+' ปฏิเสธ</div>'+esc(g.rejectReason||'')+'</div>' : '') +
  '</div>';

  // Summary card
  html += '<div class="card mb-12"><div class="card-head"><h3 class="ic-head">'+ic('chart',15,'var(--brand)')+'สรุปยอดเป้าหมาย</h3></div><div class="card-body">' +
    '<div style="display:grid;grid-template-columns:repeat('+Math.min(Object.keys(sumByUnit).length || 1, 4)+',1fr);gap:10px">' +
      Object.keys(sumByUnit).map(u =>
        '<div style="background:var(--brand-tint);padding:14px;border-radius:10px;text-align:center">' +
          '<div style="font-size:10.5px;color:var(--brand);text-transform:uppercase;letter-spacing:.06em;font-weight:700">รวม</div>' +
          '<div class="num bold" style="font-size:22px;color:var(--brand);margin-top:4px">'+fmtMoney(sumByUnit[u])+'</div>' +
          '<div style="font-size:11px;color:var(--ink-3)">'+esc(u)+'</div>' +
        '</div>'
      ).join('') +
    '</div>' +
  '</div></div>';

  // Lines table
  html += '<div class="card mb-12"><div class="card-head"><h3 class="ic-head">'+ic('list',15,'var(--brand)')+'รายละเอียดเป้าหมาย ('+g.lines.length+' รายการ)</h3></div><div class="card-body flush"><table class="tbl"><thead><tr>' +
    '<th>#</th><th>Scope</th><th class="text-left">รายละเอียด</th><th>ช่วงเวลา</th><th>หน่วย</th><th>จำนวนเป้า</th><th class="text-left">หมายเหตุ</th>' +
  '</tr></thead><tbody>' +
  g.lines.map((l, i) => {
    let scopeDetail = '—';
    if (l.scope === 'รายกลุ่ม') scopeDetail = (l.scopeField || '') + ': ' + (l.scopeValue || '');
    else if (l.scope === 'รายสินค้า') scopeDetail = 'SKU ' + (l.scopeValue || '');
    else scopeDetail = l.scope;

    let periodStr = l.periodType;
    if (l.periodType === 'รายเดือน' && l.periodMonth) periodStr += ' ' + thaiMonth(Number(l.periodMonth)) + '/' + l.periodYear;
    else if (l.periodType === 'รายไตรมาส' && l.periodQuarter) periodStr += ' ' + l.periodQuarter + '/' + l.periodYear;
    else if (l.periodType === 'เลือกเดือน' && l.periodMonthsMulti && l.periodMonthsMulti.length) periodStr = (l.periodMonthsMulti||[]).map(m => thaiMonth(Number(m))).join(', ') + '/' + l.periodYear;
    else if (l.periodType === 'รายปี') periodStr += ' ' + l.periodYear;

    return '<tr>' +
      '<td class="num">'+(i+1)+'</td>' +
      '<td><span class="chip chip-sm chip-brand">'+esc(l.scope)+'</span></td>' +
      '<td class="text-left" style="font-size:12px">'+esc(scopeDetail)+'</td>' +
      '<td style="font-size:11.5px">'+esc(periodStr)+'</td>' +
      '<td><span class="chip chip-sm chip-accent">'+esc(l.unit)+'</span></td>' +
      '<td class="num bold" style="color:var(--ink);font-size:14px">'+fmtMoney(l.targetAmount)+'</td>' +
      '<td class="text-left" style="font-size:11px;color:var(--ink-3)">'+esc(l.notes || '—')+'</td>' +
    '</tr>';
  }).join('') +
  '</tbody></table></div></div>';

  // Action footer
  if (isPending) {
    html += '<div style="position:sticky;bottom:0;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px;display:flex;gap:8px;justify-content:flex-end;box-shadow:var(--sh-pop)">' +
      '<button class="btn btn-danger tg-reject" data-id="'+g.groupId+'">'+ic('x',13)+' ปฏิเสธทั้งชุด</button>' +
      '<button class="btn btn-primary tg-approve" data-id="'+g.groupId+'">'+ic('check',13)+' อนุมัติทั้งชุด</button>' +
    '</div>';
  }
  return html;
}

// PO line items จริงของนัด — cache ต่อนัด (S._grLines[apptId]) · null = กำลังโหลด
function grPoLines(a) {
  if (!S._grLines) S._grLines = {};
  if (S._grLines[a.id]) return S._grLines[a.id];
  loadGRLines(a);
  return null;
}
async function loadGRLines(a) {
  if (!S._grLines) S._grLines = {};
  if (S._grLines[a.id] || S._grLinesLoading === a.id) return;
  S._grLinesLoading = a.id;
  try {
    S._grLines[a.id] = await loadPOLinesCached(a.pos);
  } catch (e) { console.error('[getPOLines]', e); S._grLines[a.id] = []; }
  S._grLinesLoading = null;
  if (S.page === 'gr-today' && S.selectedApptId === a.id) renderContentOnly();
}

  if (!a) return '';
  const elapsed = a.status === 'กำลังรับ' ? '00:42' : a.done ? minDiff(a.started, a.done) : null;
  // PO line items จริงจาก ERP — โหลด async (cache ต่อนัด ใน S._grLines)

// ยอดรวม PO ของนัด (จาก PO line จริงใน ERP) · null = ยังโหลดอยู่
function grPoValue(a) {
  const lines = (S._grLines && S._grLines[a.id]) || null;

  return Math.round(lines.reduce((s, l) => s + (Number(l.value) || 0), 0) * 100) / 100;

// ย่อรูปฝั่ง client (ยาวสุด 1280px · JPEG q0.78) → base64 — อัปเร็ว ไม่เปลือง Drive
function resizeImageToJpeg(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const MAX = 1280;
        let w = img.width, h = img.height;
        if (Math.max(w, h) > MAX) { const k = MAX / Math.max(w, h); w = Math.round(w * k); h = Math.round(h * k); }
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve({ data: cv.toDataURL('image/jpeg', 0.78), mime: 'image/jpeg' });
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ─── Extra Fee rate resolver (default + vendor override) ─── */
function getRatesForVendor(type, vendorCode) {
  const all = (DATA.extraFeeRates||[]).filter(r => r.type === type && r.active);
  const map = {};
  // Defaults first (apply ทุก vendor)
  all.filter(r => !r.vendorCode).forEach(r => {
    map[r.type + '|' + r.name] = Object.assign({}, r, { overridden:false });
  });
  // Vendor-specific overrides (by Name match)
  if (vendorCode) {
    all.filter(r => r.vendorCode === vendorCode).forEach(r => {
      map[r.type + '|' + r.name] = Object.assign({}, r, { overridden:true });
    });
  }
  return Object.values(map);
}

function wireExtraFees() {
  const card = $('#extraFeesCard');
  if (!card) return;
  // Toggle buttons
  card.querySelectorAll('.extra-row').forEach(row => {
    const detail = row.querySelector('[data-detail]');
    row.querySelectorAll('.extra-toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        row.querySelectorAll('.extra-toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (btn.dataset.val === 'yes') {
          detail.classList.remove('hidden');
        } else {
          detail.classList.add('hidden');
          // Clear inputs when toggled off
          detail.querySelectorAll('input').forEach(i => { if (i.type === 'number' || !i.dataset.field || i.dataset.field === 'qty' || i.dataset.field === 'amount') i.value = ''; });
        }
        recomputeExtraFees();
      });
    });
    // Input listeners
    row.querySelectorAll('select, input').forEach(el => {
      el.addEventListener('input', recomputeExtraFees);
      el.addEventListener('change', recomputeExtraFees);
    });
  });
  // QR button
  const qrBtn = $('#btnGenQR');
  if (qrBtn) qrBtn.addEventListener('click', () => {
    const ex = collectExtraFees();
    if (ex.total <= 0) { toast('ยอดรวมเป็น 0', 'กรอกค่าใช้จ่ายก่อน', 'err'); return; }
    const a = DATA.appointments.find(x => x.id === S.selectedApptId);
    openQRModal(ex.total, { apptId: a && a.id, vendor: a && a.vendor.short, breakdown: ex });
    if (a) {
      a.extra = Object.assign(a.extra || {}, ex);
      a.extra.qrGeneratedAt = nowFullTS();
    }
    callAPI('markQRGenerated', { apptId: a && a.id });
  });
  recomputeExtraFees();
}

function recomputeExtraFees() {
  let total = 0;
  $$('#extraFeesCard .extra-row').forEach(row => {
    const key = row.dataset.section;
    const yesBtn = row.querySelector('.extra-toggle-btn.active');
    const has = yesBtn && yesBtn.dataset.val === 'yes';
    const detail = row.querySelector('[data-detail]');
    const compute = detail.querySelector('[data-compute]');
    if (!has) {
      if (compute) compute.textContent = '฿0';
      return;
    }
    if (key === 'lumpsum') {
      const amt = Number(detail.querySelector('[data-field="amount"]').value) || 0;
      total += amt;
    } else {
      const sel = detail.querySelector('[data-field="rateId"]');
      const qty = Number(detail.querySelector('[data-field="qty"]').value) || 0;
      const opt = sel && sel.selectedOptions[0];
      const rate = opt ? Number(opt.dataset.rate) || 0 : 0;
      const line = rate * qty;
      total += line;
      if (compute) compute.textContent = '฿' + fmtMoney(line);
    }
  });
  const tot = $('#extraTotal');
  if (tot) tot.innerHTML = fmtMoney(total) + '<span class="cur">฿</span>';
  const qrBtn = $('#btnGenQR');
  if (qrBtn) qrBtn.disabled = total <= 0;
}

function collectExtraFees() {
  const out = { pallet:null, film:null, lumpsum:null, total:0 };
  $$('#extraFeesCard .extra-row').forEach(row => {
    const key = row.dataset.section;
    const yesBtn = row.querySelector('.extra-toggle-btn.active');
    const has = yesBtn && yesBtn.dataset.val === 'yes';
    const detail = row.querySelector('[data-detail]');
    if (key === 'lumpsum') {
      if (has) {
        const note = detail.querySelector('[data-field="note"]').value || '';
        const amount = Number(detail.querySelector('[data-field="amount"]').value) || 0;
        out.lumpsum = { has:true, note, amount };
        out.total += amount;
      } else {
        out.lumpsum = { has:false, note:'', amount:0 };
      }
    } else {
      if (has) {
        const sel = detail.querySelector('[data-field="rateId"]');
        const opt = sel && sel.selectedOptions[0];
        const rateId = sel ? sel.value : '';
        const rate = opt ? Number(opt.dataset.rate) || 0 : 0;
        const name = opt ? opt.dataset.name : '';
        const qty = Number(detail.querySelector('[data-field="qty"]').value) || 0;
        const lineTotal = rate * qty;
        out[key] = { has:true, rateId, name, qty, rate, total:lineTotal };
        out.total += lineTotal;
      } else {
        out[key] = { has:false, rateId:null, name:'', qty:0, rate:0, total:0 };
      }
    }
  });
  return out;
}

// ผลยิงรับ → เด้งจำนวนเข้าตาราง GR หลัก (read-only) + แปะปัญหา + ปิดปุ่มปิดงานถ้ามีปัญหายังไม่เคลียร์
function applyGRScan(a) {
  if (!a) return;
  const sr = S._grScanResult && S._grScanResult[a.id];
  if (!sr || !sr.length) return;
  const bySku = {}; sr.forEach(l => bySku[String(l.sku).trim()] = l);
  let unresolved = 0, total = 0;
  $$('#poTable tr.po-line').forEach(tr => {
    const sku = ((tr.children[1] && tr.children[1].textContent) || '').trim();
    const l = bySku[sku]; if (!l) return;
    total++;
    const inp = tr.querySelector('.qty-input');
    if (inp) {
      inp.value = l.perEA ? Math.round(l.recvEa / l.perEA * 100) / 100 : l.recvEa;
      inp.readOnly = true; inp.style.background = '#eef6ff'; inp.title = 'รับจากการยิง: ' + (l.recvDetail || (l.recvEa + ' ชิ้น'));
    }
    const sc = tr.querySelector('.po-status');
    if (sc) {
      if (l.problems && l.problems.length) {
        if (!l.supplierAccept) unresolved++;
        sc.innerHTML = '<span class="chip chip-sm" style="background:' + (l.supplierAccept ? '#fff7ed' : 'var(--err-bg)') + ';color:' + (l.supplierAccept ? '#b45309' : 'var(--err)') + '">📷 ' + esc(l.problems.join('·')) + (l.supplierAccept ? ' (รับผิดชอบ)' : ' ⚠') + '</span>';
      } else sc.innerHTML = '<span class="chip chip-ok chip-sm">📷 ยิงครบ</span>';
    }
  });
  $$('#poTable .po-variance-row').forEach(r => r.style.display = 'none'); // ยิงรับใช้ flag ปัญหาแทน variance เดิม
  const sb = $('#btnGRSubmit');
  if (sb) {
    sb.disabled = unresolved > 0; sb.style.opacity = unresolved > 0 ? '.5' : ''; sb.style.cursor = unresolved > 0 ? 'not-allowed' : '';
    sb.title = unresolved > 0 ? 'ปิดงานไม่ได้ — ปัญหายังไม่เคลียร์ ' + unresolved + ' รายการ' : '';
  }
  const tbl = $('#poTable');
  if (tbl && tbl.parentNode && !$('#grScanBanner')) {
    const b = document.createElement('div'); b.id = 'grScanBanner';
    b.style.cssText = 'margin:10px 16px 0;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700;background:' + (unresolved ? 'var(--err-bg)' : 'var(--ok-bg)') + ';color:' + (unresolved ? 'var(--err)' : 'var(--ok)');
    b.innerHTML = unresolved ? '⚠ ยิงรับแล้ว — มีปัญหา ' + unresolved + ' รายการ · ปิดงานไม่ได้จนกว่าจะเคลียร์ (เข้า 📷 ยิงรับ ติ๊กร่วมรับผิดชอบ)' : '✓ ยิงรับครบ ' + total + ' รายการ ไม่มีปัญหา — ปิดงานได้';
    tbl.parentNode.insertBefore(b, tbl);
  }
}
function collectGR() {
  const _a = _currentAppt(); const srMap = {};
  if (_a && S._grScanResult && S._grScanResult[_a.id]) S._grScanResult[_a.id].forEach(l => srMap[String(l.sku).trim()] = l);
  const lines = $$('#poTable tr.po-line').map(tr => {
    const inp = tr.querySelector('.qty-input');
    if (!inp) return null;
    const cells = tr.children;
    const sku = (cells[1].textContent || '').trim();
    const po = (cells[0].textContent || '').trim();
    const ordered = Number(inp.dataset.ordered) || 0;
    const received = inp.value === '' ? 0 : Math.max(0, Number(inp.value) || 0);   // กันค่าติดลบ/ไม่ใช่ตัวเลข
    const sc = srMap[sku]; // ผลยิงรับ → แนบ ปัญหา/อายุ/EA เพื่อบันทึกเป็นคอลัมน์ GR_Lines
    // Variance info
    let varianceType = null, expectedDate = null, varianceReason = null;
    if (received < ordered) {
      const varRow = $('#poTable .po-variance-row[data-for-sku="'+CSS.escape(sku)+'"]');
      if (varRow) {
        const activeBtn = varRow.querySelector('.pv-type-btn.active');
        varianceType = activeBtn ? activeBtn.dataset.vtype : null;
        const expInp = varRow.querySelector('.pv-expected-input');
        expectedDate = expInp ? expInp.value : null;
        const reasonInp = varRow.querySelector('.pv-reason-input');
        varianceReason = reasonInp ? reasonInp.value : null;
      }
    }
    return {
      po, sku,
      desc: (cells[2].textContent || '').trim(),
      ordered, received,
      varianceType, expectedDate, varianceReason,
      barcode: sc ? sc.pKey : '', orderedEa: sc ? sc.orderedEa : null, recvEa: sc ? sc.recvEa : null, recvDetail: sc ? sc.recvDetail : '',
      expiry: sc ? sc.expiry : '', remainingDays: sc ? sc.remainingDays : null, expiryOk: sc ? sc.expiryOk : undefined, isFood: sc ? sc.isFood : undefined,
      problems: sc ? sc.problems : [], supplierAccept: sc ? !!sc.supplierAccept : false, needApproval: sc ? !!sc.needApproval : false,
    };
  }).filter(Boolean);
  const foc = $$('#poTable tr.foc-line').map(tr => {
    const inputs = tr.querySelectorAll('input');
    const select = tr.querySelector('select');
    return {
      sku: inputs[0] ? inputs[0].value.trim() : '',
      name: inputs[1] ? inputs[1].value.trim() : '',
      qty: inputs[2] ? Math.max(0, Number(inputs[2].value) || 0) : 0,
      unit: select ? select.value : 'ลัง',
    };
  }).filter(f => (f.sku || f.name) && f.qty > 0);   // แถม: ต้องมีจำนวน > 0 ถึงนับ (กันแถม 0/ติดลบ)
  const extra = collectExtraFees();
  return { lines, foc, extra };
}

async function handleGRSubmit() {
  const a = _currentAppt(); if (!a) return;
  const scanned = !!(S._grScanResult && S._grScanResult[a.id] && S._grScanResult[a.id].length);
  const data = collectGR();
  let shortage = [], backorderLines = [];
  if (scanned) {
    // ยิงรับ = แหล่งจริง → ปิดงานไม่ได้ถ้ามีปัญหายังไม่ติ๊ก supplier ร่วมรับผิดชอบ
    const unresolved = S._grScanResult[a.id].filter(l => (l.problems || []).length && !l.supplierAccept);
    if (unresolved.length) { toast('ปิดงานไม่ได้ — มีปัญหายังไม่เคลียร์ ' + unresolved.length + ' รายการ', 'เข้า "ยิงรับ" ติ๊ก supplier ร่วมรับผิดชอบก่อน', 'err'); return; }
  } else {
    shortage = data.lines.filter(l => l.received < l.ordered);
    const missingType = shortage.filter(l => !l.varianceType);
    if (missingType.length) {
      toast('กรุณาระบุประเภทของขาด', missingType.length+' รายการยังไม่ได้เลือก (ค้างส่ง/ขาด/ปฏิเสธ)', 'err');
      return;
    }
    backorderLines = shortage.filter(l => l.varianceType === 'backorder');
    const missingExpected = backorderLines.filter(l => !l.expectedDate);
    if (missingExpected.length) {
      toast('ค้างส่งต้องระบุวันที่จะมาส่ง', missingExpected.length+' รายการขาดวันที่', 'err');
      return;
    }
  }

  if (S._grSubmitting) return;   // กันกดปิดงานซ้ำตอนกำลังส่ง
  S._grSubmitting = true;
  try {

  // ── ใบกำกับ/ใบส่งของ: ต้องแนบรูป + อัปขึ้น Drive สำเร็จก่อน ถึงปิดงานได้ ──
  const inv = _grInv(a.id);
  if (!inv.uploaded) {
    if (!inv.imgs.length) { toast('ต้องแนบรูปใบกำกับ/ใบส่งของก่อนปิดงาน', 'ถ่ายเอกสารจากขนส่ง แนบในการ์ด 📎 ด้านล่าง', 'err'); return; }
    if (!(Number(inv.total) > 0)) { toast('กรอกยอดรวมในใบกำกับ', 'ช่องยอดรวมในการ์ด 📎 ใบกำกับ/ใบส่งของ', 'err'); return; }
    const pv = grPoValue(a);
    showAppLoading('กำลังอัปรูปใบกำกับขึ้น Drive… ('+inv.imgs.length+' รูป)');
    let invRes = null;
    try {
      invRes = await callAPI('submitInvoice', { invoice: {
        apptId: a.id, poRef: (a.pos || []).join(', '), ibRef: '',
        vendorCode: (a.vendor && a.vendor.code) || '', vendorName: (a.vendor && (a.vendor.name || a.vendor.short)) || '',
        wlCode: a.wh || '', receivedDate: a.date || '',
        docType: inv.docType, poValue: pv || 0, invoiceTotal: Number(inv.total) || 0,
        amountMatch: !!inv.match, notes: inv.notes || '',
        images: inv.imgs.map(im => ({ data: im.data, mime: im.mime }))
      } });
    } catch (e) { console.error('[submitInvoice]', e); }
    hideAppLoading();
    if (!invRes || !invRes.ok) { toast('อัปรูปไม่สำเร็จ — ยังไม่ปิดงาน', (invRes && invRes.error) || 'ลองใหม่อีกครั้ง', 'err'); return; }
    inv.uploaded = true; // กันอัปซ้ำ ถ้า submitGR ล้มแล้วกดใหม่
  }

  // บันทึก GR หลังบ้านก่อน — สำเร็จแล้วค่อย commit state ในเครื่อง (กันเน็ตหลุดแล้วโชว์สำเร็จลวง/ข้อมูลเพี้ยน)
  const doneAt = nowHHMM();
  showAppLoading('กำลังบันทึก GR…');
  const grRes = await callAPI('submitGR', { apptId: a.id, ...data, doneAt: doneAt });
  hideAppLoading();
  if (!grRes || !grRes.ok) { toast('บันทึก GR ไม่สำเร็จ — ยังไม่ปิดงาน', (grRes && grRes.error) || 'เน็ตอาจหลุด · กดปิดงานอีกครั้ง (ใบกำกับอัปแล้วไม่ซ้ำ)', 'err'); return; }

  // Auto-create backorder records in DATA
  if (!DATA.backorders) DATA.backorders = [];
  backorderLines.forEach(l => {
    const id = 'BO-' + String(2400 + DATA.backorders.length + 1).padStart(4,'0');
    DATA.backorders.push({
      id,
      originalApptId: a.id,
      settleApptId: null,
      po: l.po, sku: l.sku, desc: l.desc,
      orderedQty: l.ordered, receivedFirst: l.received,
      pendingQty: l.ordered - l.received, settledQty: 0,
      varianceType: 'backorder', inInvoice: true,
      status: 'รอส่ง',
      vendorCode: a.vendor.code, vendorShort: a.vendor.short,
      reason: l.varianceReason || '',
      expectedDate: l.expectedDate, settledDate: null,
      createdBy: 'GR', createdAt: nowFullTS(),
    });
  });

  // Settle existing backorders if this appt was tied to them (matched in renderBackorderSettle)
  $$('.bo-settle-row').forEach(rowEl => {
    const boId = rowEl.dataset.boId;
    const inp = rowEl.querySelector('.bo-recv-input');
    if (!inp) return;
    const recvNow = Number(inp.value) || 0;
    if (recvNow <= 0) return;
    const bo = DATA.backorders.find(b => b.id === boId);
    if (!bo) return;
    bo.settledQty += recvNow;
    bo.pendingQty = Math.max(0, bo.orderedQty - bo.receivedFirst - bo.settledQty);
    bo.settleApptId = a.id;
    if (bo.pendingQty <= 0) {
      bo.status = 'ปิดแล้ว';
      bo.settledDate = nowFullTS();
    } else {
      bo.status = 'ส่งบางส่วน';
    }
  });

  let msg = 'รับสินค้าครบตามใบ';
  if (shortage.length) {
    const bo = shortage.filter(l => l.varianceType === 'backorder').length;
    const sb = shortage.filter(l => l.varianceType === 'short-billed').length;
    const su = shortage.filter(l => l.varianceType === 'short-unbilled').length;
    const rf = shortage.filter(l => l.varianceType === 'refuse').length;
    const parts = [];
    if (bo) parts.push('ค้างส่ง '+bo);
    if (sb) parts.push('ขาด-credit '+sb);
    if (su) parts.push('ขาด-ตัดทิ้ง '+su);
    if (rf) parts.push('ปฏิเสธ '+rf);
    msg = parts.join(' · ');
  }
  const over = data.lines.filter(l => l.received > l.ordered);
  if (over.length && !shortage.length) msg = 'เกิน '+over.length+' SKU';

  a.status = 'เสร็จสิ้น';
  a.done = doneAt;
  a.grLines = data.lines;
  a.focLines = data.foc;
  a.extra = Object.assign(a.extra || {}, data.extra);
  if (a.extra.total === undefined) a.extra.total = data.extra.total;
  toast('บันทึก GR สำเร็จ', msg + ' · ปิดงาน '+a.done, shortage.length?'warn':'ok');
  try { localStorage.removeItem('sl_gr_draft_'+a.id); } catch(e) {}
  renderContentOnly();
  } finally { S._grSubmitting = false; }
}

function wireSupplierBackorders() {
  $$('#mContent .bo-book-btn').forEach(b => b.addEventListener('click', () => {
    // Pre-fill booking wizard with this backorder
    const boId = b.dataset.id;
    const bo = (DATA.backorders||[]).find(x => x.id === boId);
    if (!bo) return;
    S.wizard = { step:1, pos:[bo.po], wh:null, day:null, slot:null, backorderId: boId };
    toast('เปิดฟอร์มจองส่ง', 'PO '+bo.po+' · ค้าง '+bo.pendingQty+' '+(bo.desc||''), 'ok');
    nav('book');
  }));
  $$('#mContent .bo-cancel-btn').forEach(b => b.addEventListener('click', async () => {
    const boId = b.dataset.id;
    if (!confirm('ยืนยันยกเลิก backorder นี้? (เปลี่ยนเป็น "ขาดส่ง" — admin จะออก credit note)')) return;
    const bo = (DATA.backorders||[]).find(x => x.id === boId);
    if (!bo) return;
    showAppLoading('กำลังยกเลิก…');
    const res = await callAPI('cancelBackorder', { id: boId });
    hideAppLoading();
    if (!res || !res.ok) { toast('ยกเลิกไม่สำเร็จ', (res && res.error) || 'เน็ตอาจหลุด · ลองอีกครั้ง', 'err'); return; }
    bo.status = 'ยกเลิก';
    bo.varianceType = 'short-billed';
    bo.settledDate = nowFullTS();
    toast('ยกเลิกแล้ว', 'admin จะออก credit note', 'warn');
    renderContentOnly();
  }));
}

function wireSupplierApptDetail() {
  // กดใบ PO → ขยายดูสินค้าข้างใน (โหลดจริงครั้งแรก + cache)
  $$('#mContent .appt-po-row').forEach(b => b.addEventListener('click', async () => {
    const po = b.dataset.po;
    if (!S._apptPoOpen) S._apptPoOpen = {};
    if (!S._apptPoLines) S._apptPoLines = {};
    S._apptPoOpen[po] = !S._apptPoOpen[po];
    if (S._apptPoOpen[po] && S._apptPoLines[po] === undefined) {
      S._apptPoLines[po] = null; // loading
      renderKeepScroll();
      S._apptPoLines[po] = await loadPOLinesCached([po]);
    }
    renderKeepScroll();
  }));
  const confirmBtn = $('#btnSupplierConfirm');
  const disputeBtn = $('#btnSupplierDispute');
  const qrBtn = $('#btnSupplierQR');
  if (confirmBtn) confirmBtn.addEventListener('click', async () => {
    const a = DATA.appointments.find(x => x.id === confirmBtn.dataset.id);
    if (!a || !a.extra) return;
    if (confirmBtn._busy) return; confirmBtn._busy = true; confirmBtn.disabled = true;
    const confirmedAt = nowFullTS();
    showAppLoading('กำลังบันทึก…');
    const res = await callAPI('confirmExtraFees', { apptId: a.id, confirmedAt: confirmedAt });
    hideAppLoading();
    confirmBtn._busy = false; confirmBtn.disabled = false;
    if (!res || !res.ok) { toast('ยืนยันไม่สำเร็จ', (res && res.error) || 'เน็ตอาจหลุด · ลองอีกครั้ง', 'err'); return; }
    a.extra.confirmedBySupplier = true;
    a.extra.confirmedAt = confirmedAt;
    a.extra.disputedReason = null;
    toast('ยืนยันยอดแล้ว', 'GR จะเห็นว่า supplier confirm ฝั่งคุณ', 'ok');
    renderContentOnly();
  });
  if (disputeBtn) disputeBtn.addEventListener('click', async () => {
    const reason = prompt('ระบุเหตุผลที่แย้งยอด:');
    if (!reason) return;
    const a = DATA.appointments.find(x => x.id === disputeBtn.dataset.id);
    if (!a || !a.extra) return;
    showAppLoading('กำลังบันทึก…');
    const res = await callAPI('disputeExtraFees', { apptId: a.id, reason });
    hideAppLoading();
    if (!res || !res.ok) { toast('แย้งยอดไม่สำเร็จ', (res && res.error) || 'เน็ตอาจหลุด · ลองอีกครั้ง', 'err'); return; }
    a.extra.disputedReason = reason;
    a.extra.confirmedBySupplier = false;
    toast('แย้งยอดแล้ว', 'แอดมินและ GR จะเห็นเหตุผล', 'warn');
    renderContentOnly();
  });
  if (qrBtn) {
    qrBtn.addEventListener('click', () => {
      const a = DATA.appointments.find(x => x.id === qrBtn.dataset.id);
      const amount = Number(qrBtn.dataset.amount) || 0;
      if (a && a.extra) {
        openQRModal(amount, { apptId: a.id, vendor: a.vendor.short, breakdown: a.extra });
      }
    });
  }
}

  const nextAppt = myAppts.find(a => a.status === 'จองแล้ว' || a.status === 'กำลังรับ');

    '<div class="m-hero-row">' + avatar(vendor.short.slice(0,2), { bg:'var(--accent)', color:'var(--brand-deep)' }) +

      '<div style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11.5px;color:var(--ink-on-brand)">' +
        '<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:2px;background:var(--wh-'+nextAppt.wh+')"></span>คลัง '+nextAppt.wh+' '+whName(nextAppt.wh)+'</span>' +
        '<span>·</span><span class="num">'+nextAppt.pos.length+' PO</span>' +
      '</div>' +
    '</div>';
  } else {
    html += '<div style="background:rgba(255,255,255,.06);border-radius:10px;padding:14px;text-align:center;font-size:12px;color:var(--ink-on-brand-dim)">ยังไม่มีนัดถัดไป — แตะ "จองส่ง" เพื่อนัดหมายใหม่</div>';
  }
  html += '</div>';

  // ═══ ACTION CENTER — การ์ด "ต้องดำเนินการ" (ศูนย์รวมแจ้งเตือนที่ supplier ต้องทำ) ═══
  // เพิ่มเรื่องใหม่ตรงนี้: push เข้า notifs[] · go='book' → เข้า flow จอง (เช็ค gate/block) · go=<page> → ไปหน้านั้น
  const myBackorders = (DATA.backorders||[]).filter(b => b.vendorCode === vendor.code && b.status !== 'ปิดแล้ว' && b.status !== 'ยกเลิก');
  const returnsPending = DATA.returns.filter(r => r.vendor.code === vendor.code && !r.ack);
  ensurePoConfirmData(); // โหลด openPOs + revisions เบื้องหลัง → นับ PO รอยืนยัน (เสร็จแล้ว re-render เอง)
  const pendingConfirm = poPendingConfirmCount(); // null = ยังโหลดอยู่
  const notifs = [];
  const dc = S._defectsCache; // ของเสีย (prefetch ตอน login)
  if (dc && dc.overdueCount > 0) notifs.push({ icon:'warn', tone:'err', label:'ของเสียเลยกำหนด', detail: dc.overdueCount+' รายการ · ติดต่อจัดซื้อก่อนยืนยัน PO', go:'po-confirm' });
  else if (dc && dc.pendingCount > 0) notifs.push({ icon:'rotate', tone:'warn', label:'ของเสียต้องเคลียร์', detail: dc.pendingCount+' รายการ · เคลียร์ก่อนยืนยัน PO', go:'po-confirm' });
  if (pendingConfirm) notifs.push({ icon:'edit', tone:'warn', label:'PO รอยืนยัน', detail: pendingConfirm+' ใบ · ตรวจ/แก้ราคา-จำนวน ก่อนส่งของ', go:'po-confirm' });
  if (returnsPending.length) notifs.push({ icon:'rotate', tone:'err', label:'สินค้าต้องคืนรอยืนยัน', detail: returnsPending.length+' รายการ · ยืนยันก่อนจองครั้งถัดไป', go:'returns' });
  if (myBackorders.length) notifs.push({ icon:'box', tone:'warn', label:'ของค้างส่ง', detail: myBackorders.length+' รายการ · รวม '+myBackorders.reduce((s,b)=>s+b.pendingQty,0)+' หน่วย', go:'backorders' });
  // ระหว่าง openPOs/revisions ยังโหลด → โชว์แถว "กำลังตรวจ…" ให้คนใช้รู้ (ไม่ใช่เงียบแล้วเด้งทีหลัง)
  const confirmLoading = pendingConfirm == null;
  if (notifs.length || confirmLoading) {
    html += '<div class="notif-card">' +
      '<div class="notif-head">'+ic('bell',15,'var(--warn)')+'<span>ต้องดำเนินการ</span>'+(notifs.length ? '<span class="notif-count">'+notifs.length+'</span>' : '')+'</div>' +
      notifs.map(n => '<button class="notif-row" data-go="'+n.go+'">' +
        '<span class="notif-ic '+n.tone+'">'+ic(n.icon,15)+'</span>' +
        '<span class="notif-txt"><span class="notif-lbl">'+esc(n.label)+'</span><span class="notif-detail">'+esc(n.detail)+'</span></span>' +
        ic('chevR',15,'var(--ink-4)') +
      '</button>').join('') +
      (confirmLoading ? '<div class="notif-row" style="cursor:default">' +
        '<span class="notif-ic" style="background:var(--surface-sunk)"><span class="spinner" style="width:13px;height:13px;border-width:2px"></span></span>' +
        '<span class="notif-txt"><span class="notif-lbl" style="color:var(--ink-3)">กำลังตรวจใบสั่งซื้อ…</span><span class="notif-detail">นับ PO รอยืนยันอยู่ เสร็จแล้วจะขึ้นตรงนี้</span></span>' +
      '</div>' : '') +
    '</div>';
  }

  const myDone = myAppts.filter(a => a.status === 'เสร็จสิ้น');
  const myOnTime = myDone.length ? Math.round(myDone.filter(a => !a.late).length / myDone.length * 100) + '%' : '—';
  html += '<div class="m-tiles">' +
    miniTile('นัดเดือนนี้', myAppts.length, false) +
    miniTile('ตรงเวลา', myOnTime, true) +
    miniTile('PO เปิดอยู่', DATA.openPOs.length, false) +
  '</div>';

  html += '<div class="m-section">ทางลัด</div>' +
    '<div class="m-actions">' +
      actionTile('truck', 'จองส่งสินค้า', 'เลือก PO และเวลา', true, 'book') +
      actionTile('edit', 'ยืนยัน PO', pendingConfirm == null ? 'กำลังโหลด…' : pendingConfirm + ' ใบรอยืนยัน', 'green', 'po-confirm') +
      actionTile('inbox', 'ส่งเรื่อง', 'ราคา · Rebate · FOC · สัญญา ฯลฯ', false, 'hub') +
      actionTile('calendar', 'นัดของฉัน', myAppts.length+' นัดหมาย', false, 'my-appts') +
      actionTile('box', 'ของค้างส่ง', myBackorders.length+' รายการ', false, 'backorders') +
    '</div>';

  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
    '<div class="m-section" style="margin:0">นัดที่จะถึง</div>' +
    '<button class="btn btn-ghost btn-sm" data-go="my-appts" style="font-size:11.5px;padding:0 6px;height:24px">ทั้งหมด '+ic('chevR',12)+'</button>' +
  '</div>';
  html += DATA.appointments.filter(a => a.status === 'จองแล้ว' || a.status === 'กำลังรับ').slice(0,3).map(a => mApptRow(a)).join('');

  return html;
}

function miniTile(lbl, val, good) {
  return '<div class="card m-tile"><div class="m-tile-lbl">'+esc(lbl)+'</div><div class="m-tile-val'+(good?' ok':'')+'">'+esc(val)+'</div></div>';
}
function actionTile(icon, lbl, sub, accent, goTo) {
  const cls = accent === 'green' ? ' green' : accent ? ' accent' : '';
  return '<button class="m-action'+cls+'" '+(goTo?'data-go="'+goTo+'"':'')+'>' +
    '<span class="ic-wrap">'+ic(icon,16,null,2)+'</span>' +
    '<div><div class="m-action-lbl">'+esc(lbl)+'</div><div class="m-action-sub">'+esc(sub)+'</div></div>' +
  '</button>';
}
function mApptRow(a) {
  return '<button class="m-appt" data-id="'+a.id+'">' +
    '<div class="m-appt-time"><div class="t">'+a.time+'</div><div class="d">'+a.date.slice(8)+' '+thaiMonth(Number(a.date.slice(5,7)))+'</div></div>' +
    '<div class="m-appt-divider"></div>' +
    '<div style="flex:1;min-width:0">' +
      '<div style="display:flex;align-items:center;gap:6px">'+whPill(a.wh)+'<span class="muted" style="font-size:11px">· '+esc(whName(a.wh))+'</span></div>' +
      '<div class="num" style="font-size:11px;color:var(--ink-3);margin-top:3px">'+a.pos.join(' · ')+'</div>' +
    '</div>' +
    '<span style="color:var(--ink-4)">'+ic('chevR',14)+'</span>' +
  '</button>';
}

      '<div style="text-align:center"><div style="font-size:10.5px;color:var(--ink-3)">ส่งแล้ว</div><div class="num bold" style="color:var(--ok)">'+(b.receivedFirst + b.settledQty)+'</div></div>' +
      '<div style="text-align:center"><div style="font-size:10.5px;color:var(--err)">ค้าง</div><div class="num bold" style="color:var(--err);font-size:18px">'+b.pendingQty+'</div></div>' +
    '</div>' +
    '<div style="font-size:11.5px;color:var(--ink-2);display:flex;justify-content:space-between;align-items:center;gap:8px">' +

/* ───────────────── SUPPLIER: Defect Clearance gate (ก่อนจอง) ───────────────── */
const DEFECT_HANDLE = ['เอาของมาแลก','ทำ CN','เปิดบิลชื่อบริษัท'];
const DEFECT_RETURN = ['คืนกับขนส่ง','เซลล์มาเก็บ','ทำลาย'];
const DEFECT_RETURN_ISRET = { 'คืนกับขนส่ง':1, 'เซลล์มาเก็บ':1 }; // วิธีที่ต้องส่งของกลับ vendor — เจ้าไม่รับคืนเลือกแล้วรออนุมัติ

// จอง — ของเสียเคลียร์ตั้งแต่ขั้น "ยืนยัน PO" แล้ว → จองเช็คแค่ว่า PO จัดซื้ออนุมัติ (โหลด revision สด)
async function goBooking() {
  S.wizard = { step:1, pos:[], wh:null, day:null, slot:null }; // เริ่มจองใหม่สะอาด
  nav('book');
  ensureOpenPOs();
  S._revsLoaded = false; // โหลดสถานะอนุมัติสด — จัดซื้ออนุมัติคนละเครื่อง cache เก่าจะค้าง
  loadPORevisions(true).then(() => { if (S.page === 'book') renderContentOnly(); });
}
window.goBooking = goBooking;
// เข้า "ยืนยัน PO" — ขั้นนี้บังคับเคลียร์ของเสียก่อน (ย้ายมาจากตอนจอง)
async function goPOConfirm() {
  showAppLoading('กำลังตรวจของเสียค้างเคลียร์…');
  let res;
  try { res = await callAPI('getDefects', {}); } catch(e) { console.error('[getDefects]', e); }
  hideAppLoading();
  const data = res && res.data;
  S._defectsCache = data || null;
  S._revsLoaded = false; // โหลดสถานะ revision สด (อนุมัติ/ปฏิเสธ จากจัดซื้อ)
  if (data && data.overdueCount > 0) {
    S._overdue = data.overdue; S._awaitMode = false;   // เลยกำหนดเคลียร์ → block ต้องให้จัดซื้ออนุมัติ
    nav('defect-block');
  } else if (data && data.pendingCount > 0) {
    S._defects = data.pending;
    S._dcSplit = []; S._dcMaster = null; S._dcItem = {};
    nav('defect-gate');
  } else if (data && data.awaitingCount > 0) {
    S._overdue = data.awaiting; S._awaitMode = true;   // ขอคืน (เจ้าไม่รับคืน) รอจัดซื้ออนุมัติ → จองไม่ได้จนกว่าอนุมัติ
    nav('defect-block');
  } else {
    nav('po-confirm');
    ensurePoConfirmData();
  }
}
window.goPOConfirm = goPOConfirm;

  let html = '<div style="padding:14px 0 90px">' +

        ? '<div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-3)"><span>ขอคืน: <b style="color:#b45309">'+esc(d.ret||'-')+'</b></span><span style="color:#b45309;font-weight:700">รออนุมัติ</span></div>'
        : '<div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-3)"><span>แจ้งจะเคลียร์: '+esc(d.handle||'-')+'</span><span style="color:var(--err);font-weight:600">เลยกำหนด '+toBE(d.clearDate)+'</span></div>') +
    '</div>';
  });
  html += '<div class="card" style="padding:16px;text-align:center;background:var(--brand-tint);border-color:var(--brand)">' +
    '<div style="font-size:12.5px;color:var(--ink-2);line-height:1.6">'+(aw

  html += '<button class="btn btn-lg btn-block" style="margin-top:14px" onclick="nav(\'dashboard\')">กลับหน้าหลัก</button>';
  html += '</div>';
  return html;

  const list = S._defects || [];
  const vendor = curVendor0() || {};
  const respText = (vendor.name || vendor.short || '') + (vendor.contact ? ' · ' + vendor.contact : '');
  const noReturn = !!(S._defectsCache && S._defectsCache.noReturn);   // เจ้าไม่รับคืน (Vendor_detail) → default ทำลาย + ถ้าขอคืน รออนุมัติ

  // bulk-clear state (เก็บค่าไว้ ไม่หายตอน re-render เมื่อ split/merge)

  if (!S._dcMaster) S._dcMaster = { handle:'', ret: noReturn ? 'ทำลาย' : '', date:'', notes:'' };
  if (!S._dcItem) S._dcItem = {};

  const splitSet = {}; S._dcSplit.forEach(b => splitSet[b] = true);
  const bulk = list.filter(d => !splitSet[d.barcode]);
  const splits = list.filter(d => splitSet[d.barcode]);

  const opt = (arr, v) => '<option value="">เลือก...</option>' + arr.map(o => '<option'+(o===v?' selected':'')+'>'+esc(o)+'</option>').join('');
  const retOpt = v => '<option value="">เลือก...</option>' + DEFECT_RETURN.map(o => '<option value="'+esc(o)+'"'+(o===v?' selected':'')+'>'+esc((noReturn && DEFECT_RETURN_ISRET[o]) ? o+' (รออนุมัติ)' : o)+'</option>').join('');

  const respChip = '<div class="field-group"><label class="label-plain">ผู้รับผิดชอบ</label>' +
    '<div style="display:flex;align-items:center;gap:8px;background:var(--brand-tint);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--ink-2);font-size:13px;font-weight:700">' +
    '🔒 <span style="flex:1;min-width:0">'+esc(respText || '—')+'</span>' +
    '<span style="font-size:10px;color:var(--ink-3);font-weight:500;white-space:nowrap">อัตโนมัติ · แก้ไม่ได้</span></div></div>';

  let html = '<div style="padding:14px 0 90px">' +
    '<div class="alert alert-err" style="margin-bottom:14px">'+ic('warn',18,'var(--err)')+
      '<div style="flex:1;font-size:12px"><div style="font-weight:700;color:var(--err)">มีของเสียค้างเคลียร์ '+list.length+' รายการ</div>' +
      '<div style="color:var(--ink-2);margin-top:2px;line-height:1.5">เลือก <b>วิธีรับผิดชอบ + วิธีคืน + วันที่</b> ครั้งเดียว ใช้กับทุกรายการ · ถ้าจะตั้งค่ารายตัว กด <b>＋ แยก</b> ที่รายการนั้น</div></div></div>';
  if (noReturn) html += '<div style="display:flex;gap:8px;margin-bottom:14px;background:#fff7ed;border:1px solid #f59e0b;border-radius:10px;padding:10px 12px">'+ic('warn',16,'#f59e0b')+
    '<div style="font-size:12px;color:#7c2d12;line-height:1.55"><b>เจ้านี้ปกติ "ไม่รับคืน" ของเสีย</b> — แนะนำเลือก <b>ทำลาย</b><br>ถ้าจำเป็นต้องคืน (คืนกับขนส่ง/เซลล์มาเก็บ) เลือกได้ แต่จะ <b>รอฝ่ายจัดซื้ออนุมัติ</b> ก่อนถึงจองส่งได้</div></div>';

        '</div>' +
        '<button type="button" class="dc-split" data-bc="'+esc(d.barcode)+'" style="flex:none;border:1px solid var(--brand);color:var(--brand);background:#fff;border-radius:8px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer">＋ แยก</button>' +
      '</div>').join('');
    html += '<div class="card mb-12" style="padding:14px;border:1.5px solid var(--brand)">' +
      '<div style="font-weight:800;font-size:14px;color:var(--brand);margin-bottom:8px">🧹 เคลียร์รวดเดียว '+bulk.length+' รายการ</div>' +
      '<div style="margin-bottom:12px">'+rows+'</div>' +
      fld('วิธีรับผิดชอบ (ทุกรายการ)', '<select class="select" id="dcm-handle">'+opt(DEFECT_HANDLE, S._dcMaster.handle)+'</select>') +
      fld('วิธีคืน (ทุกรายการ)', '<select class="select" id="dcm-ret">'+retOpt(S._dcMaster.ret)+'</select>') +
      fld('วันที่ดำเนินการ', '<input class="input" id="dcm-date" type="date" value="'+esc(S._dcMaster.date||'')+'">') +
      respChip +
      fld('หมายเหตุ (ทุกรายการ)', '<input class="input" id="dcm-notes" value="'+esc(S._dcMaster.notes||'')+'" placeholder="ระบุเพิ่มเติม (ถ้ามี)">') +
    '</div>';
  }

  // ── รายการที่แยกออกมา: ตั้งค่าเอง ──
  splits.forEach(d => {
    const it = S._dcItem[d.barcode] || {};

        '</div>' +

function wireDefectGate() {
  // auto-skip if empty (e.g., navigated directly)
  if (!S._defects || !S._defects.length) { nav('book'); return; }
  S._dcSplit = Array.isArray(S._dcSplit) ? S._dcSplit : [];
  S._dcMaster = S._dcMaster || { handle:'', ret:'', date:'', notes:'' };
  S._dcItem = S._dcItem || {};

  // เก็บค่าที่กรอกไว้ใน state ก่อน re-render (กด ＋แยก / ↩รวมกลับ ค่าจะไม่หาย)
  const saveState = () => {
    if ($('#dcm-handle')) S._dcMaster = {
      handle: $('#dcm-handle').value, ret: ($('#dcm-ret')||{}).value || '',
      date: ($('#dcm-date')||{}).value || '', notes: ($('#dcm-notes')||{}).value || ''
    };
    $$('#mContent .dc-split-card').forEach(c => {
      S._dcItem[c.dataset.bc] = {
        handle: (c.querySelector('.dcs-handle')||{}).value || '',
        ret:    (c.querySelector('.dcs-ret')||{}).value || '',
        date:   (c.querySelector('.dcs-date')||{}).value || '',
        notes:  (c.querySelector('.dcs-notes')||{}).value || ''
      };
    });
  };
  $$('#mContent #dcm-handle,#mContent #dcm-ret,#mContent #dcm-date,#mContent #dcm-notes,#mContent .dcs-handle,#mContent .dcs-ret,#mContent .dcs-date,#mContent .dcs-notes')
    .forEach(el => el.addEventListener('change', saveState));

  // ＋ แยกรายการออกจากกล่องหลัก (สืบค่ากล่องหลักมาเป็นค่าตั้งต้น)
  $$('#mContent .dc-split').forEach(b => b.addEventListener('click', () => {
    saveState();
    const bc = b.dataset.bc;
    if (S._dcSplit.indexOf(bc) === -1) S._dcSplit.push(bc);
    S._dcItem[bc] = { handle:S._dcMaster.handle, ret:S._dcMaster.ret, date:S._dcMaster.date, notes:'' };
    renderKeepScroll();
  }));
  // ↩ รวมรายการกลับกล่องหลัก
  $$('#mContent .dc-merge').forEach(b => b.addEventListener('click', () => {
    saveState();
    const bc = b.dataset.bc;
    S._dcSplit = S._dcSplit.filter(x => x !== bc);
    delete S._dcItem[bc];
    renderKeepScroll();
  }));

  const btn = $('#btnDcSubmit');
  if (!btn) return;
  btn.addEventListener('click', async () => {
    saveState();
    const vendor = curVendor0() || {};
    const respText = (vendor.name || vendor.short || '') + (vendor.contact ? ' · ' + vendor.contact : '');
    const splitSet = {}; S._dcSplit.forEach(b => splitSet[b] = true);
    const list = S._defects || [];
    const bulk = list.filter(d => !splitSet[d.barcode]);
    const splits = list.filter(d => splitSet[d.barcode]);

    let bad = false;
    if (bulk.length) {
      [['#dcm-handle', S._dcMaster.handle], ['#dcm-ret', S._dcMaster.ret], ['#dcm-date', S._dcMaster.date]].forEach(p => {
        const el = $(p[0]); if (el) el.style.borderColor = p[1] ? '' : 'var(--err)';
        if (!p[1]) bad = true;
      });
    }
    $$('#mContent .dc-split-card').forEach(c => {
      ['.dcs-handle','.dcs-ret','.dcs-date'].forEach(s => {
        const el = c.querySelector(s); const v = el ? el.value : '';
        if (el) el.style.borderColor = v ? '' : 'var(--err)';
        if (!v) bad = true;
      });
    });
    if (bad) { toast('กรอกให้ครบ', 'ต้องมี วิธีรับผิดชอบ + วิธีคืน + วันที่', 'err'); return; }

    const mk = (d, v) => ({ barcode:d.barcode, name:d.name, cs:d.cs, ea:d.ea, totalEa:d.totalEa, warehouses:d.warehouses,
      handle:v.handle, ret:v.ret, clearDate:v.date, responsible:respText, notes:v.notes });
    const items = [];
    bulk.forEach(d => items.push(mk(d, S._dcMaster)));
    splits.forEach(d => items.push(mk(d, S._dcItem[d.barcode] || {})));

    if (btn._busy) return; btn._busy = true; btn.disabled = true; btn.style.opacity = '.6';
    showAppLoading('กำลังบันทึก…');
    const res = await callAPI('submitDefectClearance', { items });
    hideAppLoading();
    btn._busy = false; btn.disabled = false; btn.style.opacity = '';
    if (!res || !res.ok) { toast('บันทึกไม่สำเร็จ — ยังไม่เคลียร์', (res && res.error) || 'เน็ตอาจหลุด · ลองอีกครั้ง (ข้อมูลยังอยู่ครบ)', 'err'); return; }
    const aw = (res && res.data && res.data.awaiting) || 0;
    toast(aw ? 'บันทึกแล้ว' : 'เคลียร์ของเสียแล้ว', aw ? aw+' รายการขอคืน รอจัดซื้ออนุมัติ' : 'จองส่งสินค้าต่อได้เลย', 'ok');
    S._defects = null; S._defectsCache = null;
    S._dcSplit = []; S._dcMaster = null; S._dcItem = {};
    goPOConfirm();   // re-check: เคลียร์ครบ→ยืนยัน PO · มีขอคืน→รออนุมัติ(block) · ยังเหลือ→gate
  });
}

// โหลด openPOs + revisions พร้อมกันเบื้องหลัง — เสร็จแล้ว re-render หน้าที่เกี่ยว

// เปิด editor — สร้าง state จาก PO แล้วโหลดบรรทัดจริงจาก ERP
async function startRevEditor(poId) {
  const po = (DATA.openPOs || []).find(p => String(p.id) === String(poId)) || {};
  const vendor = curVendor0() || {};
  S._revEdit = { po: String(poId), wh: po.wh || '', vendorCode: (po.vendor && po.vendor.code) || vendor.code || '',
    lines: null, discountType: 'none', discountValue: 0, discountNote: '', notes: '', deliveryDate: '', pickerOpen: false, pickQ: '', saving: false };
  nav('po-rev-edit');
  try {
    const raw = await loadPOLinesCached([String(poId)]);
    S._revEdit.lines = raw.map(l => {
      const qty = Number(l.qty) || 0, free = Number(l.free) || 0, val = Number(l.value) || 0;
      // บรรทัดของแถมจาก ERP: TRD_QTY=0 · จำนวนอยู่ TRD_Q_FREE · ยอด 0 → ติ๊ก FOC ให้อัตโนมัติ ใช้จำนวนแถมเป็นจำนวน
      const isFreeLine = qty === 0 && free > 0;
      const useQty = isFreeLine ? free : qty;
      // ราคา/หน่วย รวม VAT — backend ส่ง price มาให้ (TOTAL/QTY · fallback ครบ) · เผื่อ backend เก่า: คำนวณเอง
      const price = isFreeLine ? 0 : (Number(l.price) > 0 ? Math.round(Number(l.price) * 10000) / 10000 : (qty > 0 ? Math.round(val / qty * 10000) / 10000 : 0));
      return { type: 'original', sku: String(l.sku || ''), barcode: '', name: l.desc || '', unit: l.unit || '',
        origQty: useQty, origPrice: price, origTotal: val, newQty: useQty, newPrice: price, isFoc: isFreeLine, origFoc: isFreeLine, note: '',
        sellPrice: Number(l.sellPrice) || 0, sellUnits: l.sellUnits || [], unitCode: l.unitCode || '', img: l.img || '',
        wh: l.wh || '', avg60d: Number(l.avg60d) || 0, stockWh: Number(l.stockWh) || 0, perEA: Number(l.perEA) || 0,
        skuLife: Number(l.skuLife) || 0, isFood: !!l.isFood, expDays: Number(l.expDays) || 0, pKey: l.pKey || '' };
    });
  } catch (e) { console.error('[startRevEditor]', e); S._revEdit.lines = []; }
  if (S.page === 'po-rev-edit') renderContentOnly();
}

// ยอดสุทธิจาก state editor (FOC ไม่คิดเงิน + ส่วนลดท้ายบิล)
function revEditNet(E) {
  let sum = 0;
  (E.lines || []).forEach(l => { if (!l.isFoc) sum += (Number(l.newQty) || 0) * (Number(l.newPrice) || 0); });
  if (E.discountType === 'baht') sum -= (Number(E.discountValue) || 0);
  if (E.discountType === 'pct') sum *= (1 - (Number(E.discountValue) || 0) / 100);
  return Math.round(sum * 100) / 100;
}

// ขาดทุน = ต้นทุนที่กรอก ≥ ราคาขายรัตน (S03) ของหน่วยที่สั่ง · ไม่นับ FOC
function lineIsLoss(l) { return !l.isFoc && l.sellPrice > 0 && (Number(l.newPrice) || 0) >= l.sellPrice; }
// แถบราคาขายรัตน 1 บรรทัด — EA/PA/CS + ตัวคูณ QTY · แดงเมื่อขาดทุน
function sellRefHTML(units, loss) {
  const txt = (units || []).map(s => s.u + ' ฿' + fmtMoney(s.price) + (s.qty > 1 ? '<span style="opacity:.55">×' + s.qty + '</span>' : '')).join(' · ');
  return ic(loss ? 'warn' : 'tag', 13, loss ? 'var(--err)' : 'var(--brand)') + '<span class="num" style="font-size:10.5px;line-height:1.4">ขาย รัตน · ' + txt + '</span>';
}
// อัปเดตสถานะขาดทุนสด (ตอนพิมพ์ต้นทุน) — ไม่ re-render กันหลุดโฟกัส
function updateLossUI(i) {
  const E = S._revEdit; if (!E || !E.lines[i]) return;
  const l = E.lines[i], loss = lineIsLoss(l);
  const ref = $('.rv-sellref[data-i="' + i + '"]');
  if (ref) { ref.style.background = loss ? 'var(--err-bg)' : 'var(--brand-tint)'; ref.style.color = loss ? '#8a2727' : 'var(--ink-2)'; ref.innerHTML = sellRefHTML(l.sellUnits, loss); }
  const price = $('.rv-price[data-i="' + i + '"]');
  if (price) { price.style.borderColor = loss ? 'var(--err)' : ''; price.style.color = loss ? 'var(--err)' : ''; }
  const card = $('.rv-card[data-i="' + i + '"]');
  if (card) card.style.borderColor = loss ? 'var(--err)' : (l.type === 'added' ? 'var(--accent)' : 'var(--line)');
}

// Coverday — ขายเฉลี่ย/วัน + สต็อกของคลังปลายทาง · พอกี่วัน (ก่อน/หลังสั่ง) · ให้เซล+ซัพดูร่วมกันก่อนตัดสินใจปริมาณ
function coverFmt(d) { return !isFinite(d) ? '∞' : (d >= 100 ? String(Math.round(d)) : (d >= 10 ? d.toFixed(0) : d.toFixed(1))); }
function coverHTML(l, i) {
  const avg = Number(l.avg60d) || 0;
  if (avg <= 0) return ''; // ไม่มีข้อมูลขายเฉลี่ย (SKU ไม่อยู่ PDDT / คลังยังไม่ map) → ไม่โชว์
  const stock = Number(l.stockWh) || 0, perEA = Number(l.perEA) || 0;
  const orderedEA = (Number(l.newQty) || 0) * perEA;
  const whTxt = l.wh ? whFriendly(l.wh) : 'คลัง';
  return '<div class="rv-cover" data-i="' + i + '" style="display:flex;align-items:center;gap:6px;margin-top:7px;font-size:10.5px;color:var(--ink-2);background:var(--surface-sunk);border-radius:7px;padding:5px 9px;line-height:1.45">' +
    ic('box', 12, 'var(--ink-3)') +
    '<span class="num" style="flex:1;min-width:0">' + esc(whTxt) + ' · ขายเฉลี่ย <b>' + fmtNum(Math.round(avg)) + '</b>/วัน · สต็อก <b>' + fmtNum(stock) + '</b> ชิ้น · พอ <b>~' + coverFmt(stock / avg) + '</b> วัน' +
    (orderedEA > 0 ? ' <span style="color:var(--brand);font-weight:700">→ สั่งแล้ว ~' + coverFmt((stock + orderedEA) / avg) + ' วัน</span>' : '') +
    '</span></div>';
}
function updateCoverUI(i) {
  const E = S._revEdit; if (!E || !E.lines[i]) return;
  const el = $('.rv-cover[data-i="' + i + '"]');
  if (el) el.outerHTML = coverHTML(E.lines[i], i); // re-render สด ตอนเปลี่ยนจำนวน
}
// อายุสินค้า (SKU LIFE) + ของกิน/ของใช้ — ซัพแก้ได้ถ้าผิด → เก็บชีท Product_Info (ไม่แตะ PDDT)
function skuLifeHTML(l, i) {
  if (!l.pKey) return ''; // ไม่มีใน PDDT → ไม่โชว์
  const life = Number(l.skuLife) || 0;
  return '<div style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:10.5px;color:var(--ink-3)">' +
    ic('calendar', 11, 'var(--ink-3)') +
    '<span>อายุสินค้า: <b class="rv-skulife num" data-i="' + i + '">' + (life > 0 ? life + ' วัน' : '— ยังไม่มี') + '</b> · ' + (l.isFood ? 'ของกิน' : 'ของใช้') + '</span>' +
    '<button type="button" class="rv-skulife-edit" data-i="' + i + '" style="border:0;background:transparent;color:var(--brand);font-size:10.5px;font-weight:700;cursor:pointer;padding:0 2px">แก้</button>' +
    '</div>';
}

function rvLineCard(l, i) {
  // ของแถมที่มากับ PO เดิม (origFoc) ไม่นับเป็น "แก้" — นับเฉพาะที่ผู้ใช้เปลี่ยนจริง

      (l.type === 'added' ? '<button type="button" class="rv-del" data-i="'+i+'" style="border:0;background:transparent;color:var(--err);font-size:16px;cursor:pointer;padding:0 2px;line-height:1">✕</button>' : '') +

// ลิสสินค้าใน picker (แชร์ ซัพ+จัดซื้อ) — กรองด้วยชื่อ/แบรนด์/บาร์โค้ด · โชว์สูงสุด 30
function revPickerHTML(key, q) {
  const list = (S._vp || {})[key];
  if (!list) return '<div style="padding:20px;text-align:center;color:var(--ink-3)"><span class="spinner"></span><div style="margin-top:8px;font-size:12px">กำลังโหลดสินค้าของคุณ…</div></div>';
  if (!list.length) return '<div style="padding:16px;text-align:center;color:var(--ink-3);font-size:12px">ไม่พบสินค้าของ vendor นี้ใน PDDT</div>';
  const qq = String(q || '').toLowerCase().trim();
  const hit = (!qq ? list : list.filter(p => (p.name + ' ' + p.fullName + ' ' + p.brand + ' ' + p.units.map(u => u.barcode).join(' ')).toLowerCase().indexOf(qq) !== -1)).slice(0, 30);
  if (!hit.length) return '<div style="padding:16px;text-align:center;color:var(--ink-3);font-size:12px">ไม่พบ — ลองพิมพ์ชื่อ / แบรนด์ / บาร์โค้ด</div>';
  return hit.map(p =>
    '<div style="padding:9px 10px;border-bottom:1px solid var(--divider)">' +
      '<div style="font-size:12.5px;font-weight:600">'+esc(p.name)+(p.isNew ? ' <span class="chip chip-sm chip-info" style="font-size:9px">ใหม่</span>' : '')+'</div>' +
      (p.brand ? '<div style="font-size:10.5px;color:var(--accent);font-weight:600">'+esc(p.brand)+'</div>' : '') +
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:5px">' +
        p.units.map(u => '<button type="button" class="rv-pick" data-name="'+esc(p.name)+'" data-unit="'+esc(u.label || u.u)+'" data-barcode="'+esc(u.barcode)+'" style="border:1px solid var(--brand);color:var(--brand);background:#fff;border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer">+ '+esc(u.u)+(u.per > 1 ? ' ('+u.per+')' : '')+' <span class="num" style="font-weight:500;color:var(--ink-3)">'+esc(u.barcode)+'</span></button>').join('') +
      '</div>' +
    '</div>').join('');
}

function wireSupplierPORevEdit() {
  const E = S._revEdit;

  const wirePicks = () => {
    $$('#rvPickList .rv-pick').forEach(b => b.addEventListener('click', () => {
      E.lines.push({ type: 'added', sku: '', barcode: b.dataset.barcode, name: b.dataset.name, unit: b.dataset.unit,
        origQty: 0, origPrice: 0, origTotal: 0, newQty: 0, newPrice: 0, isFoc: false, note: '' });
      toast('เพิ่มแล้ว', b.dataset.name + ' — ใส่จำนวน + ราคาด้วย', 'ok');
      renderKeepScroll();
    }));
  };
  $$('#mContent .rv-qty').forEach(inp => inp.addEventListener('input', () => {
    const i = Number(inp.dataset.i); if (!E.lines[i]) return;
    E.lines[i].newQty = Number(inp.value) || 0;
    const lt = $('.rv-lt[data-i="'+i+'"]');
    if (lt) lt.textContent = '฿' + fmtMoney(E.lines[i].isFoc ? 0 : E.lines[i].newQty * (E.lines[i].newPrice || 0));
    updateCoverUI(i); // อัปเดต coverday สด ตามจำนวนที่สั่ง
    recompute();
  }));
  $$('#mContent .rv-price').forEach(inp => inp.addEventListener('input', () => {
    const i = Number(inp.dataset.i); if (!E.lines[i]) return;
    E.lines[i].newPrice = Number(inp.value) || 0;
    const lt = $('.rv-lt[data-i="'+i+'"]');
    if (lt) lt.textContent = '฿' + fmtMoney(E.lines[i].isFoc ? 0 : (E.lines[i].newQty || 0) * E.lines[i].newPrice);
    const ev = $('.rv-exvat[data-i="'+i+'"]'); // อัปเดตราคาก่อน VAT สดตามราคารวม VAT
    if (ev) ev.textContent = '฿' + fmtMoney(priceExVat(E.lines[i].newPrice));
    updateLossUI(i); // เช็คขาดทุนสด (ต้นทุน ≥ ราคาขายรัตน)
    recompute();
  }));
  $$('#mContent .rv-foc').forEach(b => b.addEventListener('click', () => {
    const i = Number(b.dataset.i); if (!E.lines[i]) return;
    E.lines[i].isFoc = !E.lines[i].isFoc; // ไม่ลบราคา — ติ๊กออกราคากลับมาเอง (FOC แค่ไม่คิดเงินตอนรวม)
    renderKeepScroll();
  }));
  $$('#mContent .rv-del').forEach(b => b.addEventListener('click', () => { E.lines.splice(Number(b.dataset.i), 1); renderKeepScroll(); }));
  $$('#mContent .rv-skulife-edit').forEach(b => b.addEventListener('click', async () => {
    const i = Number(b.dataset.i), l = E.lines[i]; if (!l) return;
    const v = prompt('อายุสินค้า SKU LIFE (วัน) — ถ้าผิดแก้ได้ ระบบจะใช้คำนวณวันหมดอายุตอนรับของ:', Number(l.skuLife) || '');
    if (v === null) return;
    const n = Number(v); if (!(n > 0)) { toast('ใส่จำนวนวันให้ถูก', '', 'err'); return; }
    const res = await callAPI('saveProductInfo', { info: { pKey: l.pKey, sku: l.sku, name: l.name, skuLife: n } });
    if (!res || !res.ok) { toast('บันทึกไม่สำเร็จ', (res && res.error) || 'เน็ตอาจหลุด · ลองอีกครั้ง', 'err'); return; }
    l.skuLife = n;   // commit หลังบันทึกสำเร็จเท่านั้น (กันโชว์ค่าใหม่ทั้งที่ยังไม่เซฟ)
    const el = $('.rv-skulife[data-i="' + i + '"]'); if (el) el.textContent = n + ' วัน';
    toast('บันทึกอายุสินค้าแล้ว', esc(l.name || l.sku), 'ok');
  }));
  const addBtn = $('#rvAddBtn');
  if (addBtn) addBtn.addEventListener('click', () => {
    E.pickerOpen = !E.pickerOpen;
    if (E.pickerOpen && !(S._vp || {})['self']) loadVendorProducts().then(() => { if (S.page === 'po-rev-edit') renderKeepScroll(); });
    renderKeepScroll();
  });
  const ps = $('#rvPickSearch');
  if (ps) ps.addEventListener('input', () => {
    E.pickQ = ps.value;
    const pl = $('#rvPickList');
    if (pl) { pl.innerHTML = revPickerHTML('self', E.pickQ); wirePicks(); }
  });
  wirePicks();
  const np = $('#rvGoNP'); if (np) np.addEventListener('click', () => nav('new-product'));
  const dcT = $('#rvDcType');
  if (dcT) dcT.addEventListener('change', () => { E.discountType = dcT.value; if (E.discountType === 'none') E.discountValue = 0; renderKeepScroll(); });
  const dcV = $('#rvDcVal'); if (dcV) dcV.addEventListener('input', () => { E.discountValue = Number(dcV.value) || 0; recompute(); });
  const dcN = $('#rvDcNote'); if (dcN) dcN.addEventListener('input', () => { E.discountNote = dcN.value; });
  const dv = $('#rvDelivery'); if (dv) dv.addEventListener('change', () => { E.deliveryDate = dv.value; });
  const nt = $('#rvNotes'); if (nt) nt.addEventListener('input', () => { E.notes = nt.value; });
  const sb = $('#rvSubmit'); if (sb) sb.addEventListener('click', () => submitRevision(false));
  const ai = $('#rvAsIs'); if (ai) ai.addEventListener('click', () => submitRevision(true));
}

async function submitRevision(asIs) {
  const E = S._revEdit;
  if (!E || E.saving || E.lines === null) return;
  let lines;
  if (asIs) {
    const orig = E.lines.filter(l => l.type === 'original');
    if (!orig.length) { toast('ใบนี้ไม่มีรายการเดิมให้ยืนยัน', '', 'err'); return; }
    const touched = E.lines.some(l => l.type === 'added' || l.isFoc || Number(l.newQty) !== Number(l.origQty) || Number(l.newPrice) !== Number(l.origPrice));
    if (touched && !confirm('ยืนยันตามเดิมทั้งใบ — รายการที่แก้/เพิ่มไว้จะไม่ถูกใช้ ต่อเลยไหม?')) return;
    lines = orig.map(l => ({ type: 'original', sku: l.sku, barcode: l.barcode, name: l.name, unit: l.unit,
      origQty: l.origQty, origPrice: l.origPrice, origTotal: l.origTotal, newQty: l.origQty, newPrice: l.origPrice, isFoc: false, note: '' }));
  } else {
    let bad = null;
    lines = E.lines.map(l => {
      const changed = (!!l.isFoc !== !!l.origFoc) || Number(l.newQty) !== Number(l.origQty) || Number(l.newPrice) !== Number(l.origPrice);
      if (!(Number(l.newQty) > 0)) bad = bad || 'ใส่จำนวน: ' + (l.name || l.sku);
      else if (!l.isFoc && !(Number(l.newPrice) > 0)) bad = bad || 'ใส่ราคา (หรือติ๊กแถม): ' + (l.name || l.sku);
      return { type: l.type === 'added' ? 'added' : (changed ? 'edited' : 'original'), sku: l.sku, barcode: l.barcode, name: l.name, unit: l.unit,
        origQty: l.origQty, origPrice: l.origPrice, origTotal: l.origTotal, newQty: Number(l.newQty) || 0, newPrice: Number(l.newPrice) || 0, isFoc: !!l.isFoc, note: l.note || '' };
    });
    if (!lines.length) { toast('ไม่มีรายการสินค้า', '', 'err'); return; }
    if (bad) { toast('ยังส่งไม่ได้', bad, 'err'); return; }
    if ((E.discountType || 'none') !== 'none' && !(Number(E.discountValue) > 0)) { toast('ใส่มูลค่าส่วนลด', 'หรือเลือก "ไม่มีส่วนลด"', 'err'); return; }
  }
  E.saving = true;
  showAppLoading('กำลังส่งยืนยัน…');
  const vendor = curVendor0() || {};
  let res = null;
  try {
    res = await callAPI('submitPORevision', { revision: {
      poRef: E.po, vendorCode: E.vendorCode || vendor.code || '', vendorName: vendor.name || '',
      wlCode: E.wh || '', deliveryDate: E.deliveryDate || '',
      discountType: asIs ? 'none' : (E.discountType || 'none'),
      discountValue: asIs ? 0 : (Number(E.discountValue) || 0),
      discountNote: asIs ? '' : (E.discountNote || ''),
      notes: E.notes || '', asIs: !!asIs, lines: lines
    } });
  } catch (e) { console.error('[submitPORevision]', e); }
  hideAppLoading();
  E.saving = false;
  if (!res || !res.ok) { toast('ส่งไม่สำเร็จ', (res && res.error) || 'ลองใหม่อีกครั้ง', 'err'); return; }
  toast(asIs ? 'ยืนยันตามเดิมแล้ว' : 'ส่งยืนยันแล้ว', 'รอจัดซื้อตรวจและอนุมัติ', 'ok');
  S._revEdit = null; S._revDetail = {};
  await loadPORevisions(true);
  nav('po-confirm');
}

function supplierPORevView() {
  const id = S._revSel;
  const r = id && S._revDetail && S._revDetail[id];
  if (!r) {
    if (id) loadRevDetail(id).then(() => { if (S.page === 'po-rev-view') renderContentOnly(); });
    return '<div style="padding:48px;text-align:center;color:var(--ink-3)"><span class="spinner" style="width:28px;height:28px;border-width:3px"></span><div style="margin-top:12px">กำลังโหลด…</div></div>';
  }
  const lineRow = l => {

function wizStep3() {

  const today = (DATA._hydrated && DATA.today) ? new Date(DATA.today + 'T00:00:00') : new Date();

  const start = new Date(today); start.setDate(today.getDate() - today.getDay()); // Sunday ของสัปดาห์นี้
  const fmt = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const monthLabel = thMo[today.getMonth()] + ' ' + (today.getFullYear()+543);
  let html = '<p style="font-size:12.5px;color:var(--ink-2);margin:0 0 14px">เลือกวันที่จัดส่ง · คลังปิดทุกวันอาทิตย์</p>';

      const isPast = cell < today;
      const isToday = ds === fmt(today);
      const disabled = isSun || isPast;
      const sel = w.day === ds && !disabled;
      const cls = 'cal-mini-cell' + (isToday?' today':'') + (sel?' sel':'');
      html += '<button class="'+cls+'" '+(disabled?'disabled':'data-day="'+ds+'"')+'>'+cell.getDate()+'</button>';

  '</div></div></div>';
  return html;
}

function wireWizard() {
  const back = $('#wizBack'), cancel = $('#wizCancel'), next = $('#wizNext');
  if (back) back.addEventListener('click', () => { S.wizard.step--; render(); });
  if (cancel) cancel.addEventListener('click', () => nav('dashboard'));
  if (next) next.addEventListener('click', async () => {
    if (S.wizard.step < 4) { S.wizard.step++; render(); return; }
    // step 4 → ยืนยันจอง → สร้างนัดจริง
    const w = S.wizard;
    if (!w.pos.length || !w.wh || !w.day || !w.slot) { toast('ข้อมูลไม่ครบ', 'เลือก PO / คลัง / วัน / เวลา ให้ครบ', 'err'); return; }
    if (next._busy) return; next._busy = true; next.disabled = true;   // กันกดจองซ้ำ
    showAppLoading('กำลังจองนัด…');
    const res = await callAPI('createAppointment', { pos: w.pos, wh: w.wh, date: w.day, time: w.slot });
    hideAppLoading();
    next._busy = false; next.disabled = false;
    if (!res || !res.ok) { toast('จองนัดไม่สำเร็จ — ยังไม่หาย', (res && res.error) || 'เน็ตอาจหลุด · ข้อมูลที่เลือกยังอยู่ครบ กดยืนยันใหม่ได้เลย', 'err'); return; }
    clearOpenPOCache();         // ล้าง cache → โหลด PO ใหม่รอบหน้า (ตัดใบที่เพิ่งจองออก)
    await hydrateData();
    S.wizard = { step:1, pos:[], wh:null, day:null, slot:null };
    toast('จองนัดสำเร็จ', 'ดูได้ที่ "นัดของฉัน"', 'ok');
    nav('my-appts');
  });
  // step-specific handlers
  if (S.wizard.step === 1) {
    $$('.po-card').forEach(b => b.addEventListener('click', () => {
      const id = b.dataset.po;
      const i = S.wizard.pos.indexOf(id);
      if (i >= 0) S.wizard.pos.splice(i, 1); else S.wizard.pos.push(id);
      const mc = $('#mContent'); const sc = mc ? mc.scrollTop : 0; // จำตำแหน่ง scroll — เลือกแล้วไม่เด้งขึ้นบน
      render();
      const mc2 = $('#mContent'); if (mc2) mc2.scrollTop = sc;
    }));
  }
  if (S.wizard.step === 2) {
    $$('.wh-pick').forEach(b => b.addEventListener('click', () => { S.wizard.wh = b.dataset.wh; render(); }));
  }
  if (S.wizard.step === 3) {
    $$('.cal-mini-cell[data-day]').forEach(b => b.addEventListener('click', () => { S.wizard.day = b.dataset.day; render(); }));
  }
  if (S.wizard.step === 4) {
    $$('.slot[data-slot]').forEach(b => b.addEventListener('click', () => { S.wizard.slot = b.dataset.slot; render(); }));
  }
}

      '<button class="btn btn-lg btn-danger">'+ic('x',16)+' ยกเลิก</button>' +
