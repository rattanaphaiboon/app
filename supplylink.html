function wirePOLineHandlers() {
  $$('#poTable .qty-input').forEach(inp => {
    const row = inp.closest('tr');
    const sku = row && row.dataset.sku;
    const varRow = sku && $('#poTable .po-variance-row[data-for-sku="'+CSS.escape(sku)+'"]');
    const updateState = () => {
      const ordered = Number(inp.dataset.ordered);
      const got = inp.value === '' ? 0 : Number(inp.value);
      const statusCell = row.querySelector('.po-status');
      inp.classList.remove('untouched','modified','over','short');
      const showVariance = (state) => {
        if (!varRow) return;
        if (state === 'short') {
          varRow.style.display = '';
          const shortEl = varRow.querySelector('.pv-short');
          if (shortEl) shortEl.textContent = (ordered - got);
        } else {
          varRow.style.display = 'none';
          // clear variance picks
          varRow.querySelectorAll('.pv-type-btn').forEach(b => b.classList.remove('active'));
          const ex = varRow.querySelector('.pv-extra'); if (ex) ex.style.display = 'none';
        }
      };
      if (got === ordered) {
        inp.classList.add('untouched');
        if (statusCell) statusCell.innerHTML = '<span class="chip chip-ok chip-sm">ตรงตามใบ</span>';
        showVariance('ok');
      } else if (got === 0) {
        inp.classList.add('modified','short');
        if (statusCell) statusCell.innerHTML = '<span class="chip chip-err chip-sm">ไม่ได้รับ</span>';
        showVariance('short');
      } else if (got < ordered) {
        inp.classList.add('modified','short');
        if (statusCell) statusCell.innerHTML = '<span class="chip chip-warn chip-sm">ขาด '+(ordered-got)+'</span>';
        showVariance('short');
      } else {
        inp.classList.add('modified','over');
        if (statusCell) statusCell.innerHTML = '<span class="chip chip-info chip-sm">เกิน '+(got-ordered)+'</span>';
        showVariance('ok');
      }
    };
    inp.addEventListener('focus', () => { if (inp.classList.contains('untouched')) inp.select(); });
    inp.addEventListener('input', updateState);
    inp.addEventListener('change', updateState);
  });
  // Wire variance type buttons
  $$('#poTable .po-variance-row').forEach(vr => {
    const extra = vr.querySelector('.pv-extra');
    const expWrap = vr.querySelector('.pv-expected');
    const statusCell = (() => {
      const sku = vr.dataset.forSku;
      const sibling = $('#poTable tr.po-line[data-sku="'+CSS.escape(sku)+'"]');
      return sibling ? sibling.querySelector('.po-status') : null;
    })();
    vr.querySelectorAll('.pv-type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        vr.querySelectorAll('.pv-type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (extra) extra.style.display = '';
        // Show expected date only for backorder
        if (expWrap) expWrap.style.display = (btn.dataset.vtype === 'backorder') ? '' : 'none';
        // Update status chip text
        if (statusCell) {
          const labels = {
            'backorder':       '<span class="chip chip-sm" style="background:#FAF1DC;color:#B5740E;border:1px solid #B5740E"><span class="vdot" style="background:#B5740E"></span>ค้างส่ง</span>',
            'short-billed':    '<span class="chip chip-sm" style="background:var(--err-bg);color:var(--err);border:1px solid var(--err)"><span class="vdot" style="background:var(--err)"></span>ขาด · เรียก credit</span>',
            'short-unbilled':  '<span class="chip chip-sm" style="background:#FDE9D3;color:#C97A1F;border:1px solid #C97A1F"><span class="vdot" style="background:#C97A1F"></span>ขาด · ตัดทิ้ง</span>',
            'refuse':          '<span class="chip chip-sm" style="background:#E5E5E5;color:#3D3D3D;border:1px solid #3D3D3D"><span class="vdot" style="background:#3D3D3D"></span>ปฏิเสธ</span>',
          };
          statusCell.innerHTML = labels[btn.dataset.vtype] || '';
        }
      });
    });
  });
}

/* ─── Extra Fee rate resolver (default + vendor override) ─── */
function getRatesForVendor(type, vendorCode) {
  const all = (DATA.extraFeeRates||[]).filter(r => r.type === type && r.active);
  const map = {};
  // Defaults first (apply ทุก vendor)
  all.filter(r => !r.vendorCode).forEach(r => {
    map[r.type + '|' + r.name] = Object.assign({}, r, { overridden:false });
  });
  // Vendor-specific overrides (by Name match)
  if (vendorCode) {
    all.filter(r => r.vendorCode === vendorCode).forEach(r => {
      map[r.type + '|' + r.name] = Object.assign({}, r, { overridden:true });
    });
  }
  return Object.values(map);
}

function wireExtraFees() {
  const card = $('#extraFeesCard');
  if (!card) return;
  // Toggle buttons
  card.querySelectorAll('.extra-row').forEach(row => {
    const detail = row.querySelector('[data-detail]');
    row.querySelectorAll('.extra-toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        row.querySelectorAll('.extra-toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (btn.dataset.val === 'yes') {
          detail.classList.remove('hidden');
        } else {
          detail.classList.add('hidden');
          // Clear inputs when toggled off
          detail.querySelectorAll('input').forEach(i => { if (i.type === 'number' || !i.dataset.field || i.dataset.field === 'qty' || i.dataset.field === 'amount') i.value = ''; });
        }
        recomputeExtraFees();
      });
    });
    // Input listeners
    row.querySelectorAll('select, input').forEach(el => {
      el.addEventListener('input', recomputeExtraFees);
      el.addEventListener('change', recomputeExtraFees);
    });
  });
  // QR button
  const qrBtn = $('#btnGenQR');
  if (qrBtn) qrBtn.addEventListener('click', () => {
    const ex = collectExtraFees();
    if (ex.total <= 0) { toast('ยอดรวมเป็น 0', 'กรอกค่าใช้จ่ายก่อน', 'err'); return; }
    const a = DATA.appointments.find(x => x.id === S.selectedApptId);
    openQRModal(ex.total, { apptId: a && a.id, vendor: a && a.vendor.short, breakdown: ex });
    if (a) {
      a.extra = Object.assign(a.extra || {}, ex);
      a.extra.qrGeneratedAt = nowFullTS();
    }
    callAPI('markQRGenerated', { apptId: a && a.id });
  });
  recomputeExtraFees();
}

function recomputeExtraFees() {
  let total = 0;
  $$('#extraFeesCard .extra-row').forEach(row => {
    const key = row.dataset.section;
    const yesBtn = row.querySelector('.extra-toggle-btn.active');
    const has = yesBtn && yesBtn.dataset.val === 'yes';
    const detail = row.querySelector('[data-detail]');
    const compute = detail.querySelector('[data-compute]');
    if (!has) {
      if (compute) compute.textContent = '฿0';
      return;
    }
    if (key === 'lumpsum') {
      const amt = Number(detail.querySelector('[data-field="amount"]').value) || 0;
      total += amt;
    } else {
      const sel = detail.querySelector('[data-field="rateId"]');
      const qty = Number(detail.querySelector('[data-field="qty"]').value) || 0;
      const opt = sel && sel.selectedOptions[0];
      const rate = opt ? Number(opt.dataset.rate) || 0 : 0;
      const line = rate * qty;
      total += line;
      if (compute) compute.textContent = '฿' + fmtMoney(line);
    }
  });
  const tot = $('#extraTotal');
  if (tot) tot.innerHTML = fmtMoney(total) + '<span class="cur">฿</span>';
  const qrBtn = $('#btnGenQR');
  if (qrBtn) qrBtn.disabled = total <= 0;
}

function collectExtraFees() {
  const out = { pallet:null, film:null, lumpsum:null, total:0 };
  $$('#extraFeesCard .extra-row').forEach(row => {
    const key = row.dataset.section;
    const yesBtn = row.querySelector('.extra-toggle-btn.active');
    const has = yesBtn && yesBtn.dataset.val === 'yes';
    const detail = row.querySelector('[data-detail]');
    if (key === 'lumpsum') {
      if (has) {
        const note = detail.querySelector('[data-field="note"]').value || '';
        const amount = Number(detail.querySelector('[data-field="amount"]').value) || 0;
        out.lumpsum = { has:true, note, amount };
        out.total += amount;
      } else {
        out.lumpsum = { has:false, note:'', amount:0 };
      }
    } else {
      if (has) {
        const sel = detail.querySelector('[data-field="rateId"]');
        const opt = sel && sel.selectedOptions[0];
        const rateId = sel ? sel.value : '';
        const rate = opt ? Number(opt.dataset.rate) || 0 : 0;
        const name = opt ? opt.dataset.name : '';
        const qty = Number(detail.querySelector('[data-field="qty"]').value) || 0;
        const lineTotal = rate * qty;
        out[key] = { has:true, rateId, name, qty, rate, total:lineTotal };
        out.total += lineTotal;
      } else {
        out[key] = { has:false, rateId:null, name:'', qty:0, rate:0, total:0 };
      }
    }
  });
  return out;
}

async function handleGRStart() {

function handleGRCloseAll() {
  $$('#poTable .qty-input').forEach(inp => {
    inp.value = inp.dataset.ordered;
    inp.dispatchEvent(new Event('change'));
  });

function collectGR() {
  const lines = $$('#poTable tr.po-line').map(tr => {
    const inp = tr.querySelector('.qty-input');
    if (!inp) return null;
    const cells = tr.children;
    const sku = (cells[1].textContent || '').trim();
    const po = (cells[0].textContent || '').trim();
    const ordered = Number(inp.dataset.ordered) || 0;
    const received = inp.value === '' ? 0 : Number(inp.value);
    // Variance info
    let varianceType = null, expectedDate = null, varianceReason = null;
    if (received < ordered) {
      const varRow = $('#poTable .po-variance-row[data-for-sku="'+CSS.escape(sku)+'"]');
      if (varRow) {
        const activeBtn = varRow.querySelector('.pv-type-btn.active');
        varianceType = activeBtn ? activeBtn.dataset.vtype : null;
        const expInp = varRow.querySelector('.pv-expected-input');
        expectedDate = expInp ? expInp.value : null;
        const reasonInp = varRow.querySelector('.pv-reason-input');
        varianceReason = reasonInp ? reasonInp.value : null;
      }
    }
    return {
      po, sku,
      desc: (cells[2].textContent || '').trim(),
      ordered, received,
      varianceType, expectedDate, varianceReason,
    };
  }).filter(Boolean);
  const foc = $$('#poTable tr.foc-line').map(tr => {
    const inputs = tr.querySelectorAll('input');
    const select = tr.querySelector('select');
    return {
      sku: inputs[0] ? inputs[0].value.trim() : '',
      name: inputs[1] ? inputs[1].value.trim() : '',
      qty: inputs[2] ? (Number(inputs[2].value) || 0) : 0,
      unit: select ? select.value : 'ลัง',
    };
  }).filter(f => f.sku || f.name);
  const extra = collectExtraFees();
  return { lines, foc, extra };
}

function handleGRSaveDraft() {
  const a = _currentAppt(); if (!a) return;
  const data = collectGR();
  try { localStorage.setItem('sl_gr_draft_'+a.id, JSON.stringify(data)); } catch(e) {}
  toast('บันทึกแบบร่างแล้ว', 'กลับมาแก้ภายหลังได้', 'ok');
}

function restoreGRDraft() {
  const a = _currentAppt(); if (!a) return;
  let draft = null;
  try { draft = JSON.parse(localStorage.getItem('sl_gr_draft_'+a.id) || 'null'); } catch(e) {}
  if (!draft) return;
  // Restore qty inputs
  (draft.lines||[]).forEach(line => {
    const row = $$('#poTable tr.po-line').find(tr => {
      const sku = tr.children[1] && tr.children[1].textContent.trim();
      return sku === line.sku;
    });
    if (row) {
      const inp = row.querySelector('.qty-input');
      if (inp) { inp.value = line.received; inp.dispatchEvent(new Event('change')); }
    }
  });
  // Restore FOC rows
  (draft.foc||[]).forEach(f => {
    addFOCRow();
    const tr = $('#poTable tr.foc-line:last-child');
    if (tr) {
      const inputs = tr.querySelectorAll('input');
      const sel = tr.querySelector('select');
      if (inputs[0]) inputs[0].value = f.sku;
      if (inputs[1]) inputs[1].value = f.name;
      if (inputs[2]) inputs[2].value = f.qty;
      if (sel) sel.value = f.unit;
    }
  });
  toast('โหลดแบบร่างกลับมาแล้ว', '', 'ok');
}

async function handleGRSubmit() {
  const a = _currentAppt(); if (!a) return;
  const data = collectGR();
  const shortage = data.lines.filter(l => l.received < l.ordered);
  const missingType = shortage.filter(l => !l.varianceType);
  if (missingType.length) {
    toast('กรุณาระบุประเภทของขาด', missingType.length+' รายการยังไม่ได้เลือก (ค้างส่ง/ขาด/ปฏิเสธ)', 'err');
    return;
  }
  const backorderLines = shortage.filter(l => l.varianceType === 'backorder');
  const missingExpected = backorderLines.filter(l => !l.expectedDate);
  if (missingExpected.length) {
    toast('ค้างส่งต้องระบุวันที่จะมาส่ง', missingExpected.length+' รายการขาดวันที่', 'err');
    return;
  }

  // Auto-create backorder records in DATA
  if (!DATA.backorders) DATA.backorders = [];
  backorderLines.forEach(l => {
    const id = 'BO-' + String(2400 + DATA.backorders.length + 1).padStart(4,'0');
    DATA.backorders.push({
      id,
      originalApptId: a.id,
      settleApptId: null,
      po: l.po, sku: l.sku, desc: l.desc,
      orderedQty: l.ordered, receivedFirst: l.received,
      pendingQty: l.ordered - l.received, settledQty: 0,
      varianceType: 'backorder', inInvoice: true,
      status: 'รอส่ง',
      vendorCode: a.vendor.code, vendorShort: a.vendor.short,
      reason: l.varianceReason || '',
      expectedDate: l.expectedDate, settledDate: null,
      createdBy: 'GR', createdAt: nowFullTS(),
    });
  });

  // Settle existing backorders if this appt was tied to them (matched in renderBackorderSettle)
  $$('.bo-settle-row').forEach(rowEl => {
    const boId = rowEl.dataset.boId;
    const inp = rowEl.querySelector('.bo-recv-input');
    if (!inp) return;
    const recvNow = Number(inp.value) || 0;
    if (recvNow <= 0) return;
    const bo = DATA.backorders.find(b => b.id === boId);
    if (!bo) return;
    bo.settledQty += recvNow;
    bo.pendingQty = Math.max(0, bo.orderedQty - bo.receivedFirst - bo.settledQty);
    bo.settleApptId = a.id;
    if (bo.pendingQty <= 0) {
      bo.status = 'ปิดแล้ว';
      bo.settledDate = nowFullTS();
    } else {
      bo.status = 'ส่งบางส่วน';
    }
  });

  let msg = 'รับสินค้าครบตามใบ';
  if (shortage.length) {
    const bo = shortage.filter(l => l.varianceType === 'backorder').length;
    const sb = shortage.filter(l => l.varianceType === 'short-billed').length;
    const su = shortage.filter(l => l.varianceType === 'short-unbilled').length;
    const rf = shortage.filter(l => l.varianceType === 'refuse').length;
    const parts = [];
    if (bo) parts.push('ค้างส่ง '+bo);
    if (sb) parts.push('ขาด-credit '+sb);
    if (su) parts.push('ขาด-ตัดทิ้ง '+su);
    if (rf) parts.push('ปฏิเสธ '+rf);
    msg = parts.join(' · ');
  }
  const over = data.lines.filter(l => l.received > l.ordered);
  if (over.length && !shortage.length) msg = 'เกิน '+over.length+' SKU';

  a.status = 'เสร็จสิ้น';
  a.done = nowHHMM();
  a.grLines = data.lines;
  a.focLines = data.foc;
  a.extra = Object.assign(a.extra || {}, data.extra);
  if (a.extra.total === undefined) a.extra.total = data.extra.total;
  toast('บันทึก GR สำเร็จ', msg + ' · ปิดงาน '+a.done, shortage.length?'warn':'ok');
  await callAPI('submitGR', { apptId: a.id, ...data, doneAt: a.done });
  try { localStorage.removeItem('sl_gr_draft_'+a.id); } catch(e) {}
  renderContentOnly();
}

        '</div>' +

  $('#qrMarkPaidBtn').addEventListener('click', () => {

function closeQRModal() {

    '<div class="tl-dot"></div>'+
    '<div class="tl-lbl">'+esc(lbl)+'</div>'+

  '</div>';
}

function afterSupplierRender() {
  $$('.tab-btn').forEach(b => b.addEventListener('click', () => nav(b.dataset.page)));
  const back = $('#mBack');
  if (back) back.addEventListener('click', () => {
    const backMap = { 'book':'hub', 'appt-detail':'my-appts', 'hub':'dashboard', 'new-product':'hub', 'new-promo':'hub', 'targets':'hub', 'schema-form':'hub', 'backorders':'dashboard', 'defect-gate':'dashboard' };
    nav(backMap[S.page] || 'dashboard');
  });
  const lo = $('#mLogout');
  if (lo) lo.addEventListener('click', logout);
  // page-specific handlers
  if (S.page === 'dashboard') {
    $$('#mContent [data-go]').forEach(b => b.addEventListener('click', () => {
      if (b.dataset.go === 'book') goBooking(); else nav(b.dataset.go);
    }));
  }
  if (S.page === 'book') wireWizard();
  if (S.page === 'defect-gate') wireDefectGate();
  if (S.page === 'my-appts') {
    $$('#mContent .m-appt').forEach(b => b.addEventListener('click', () => {
      S.selectedApptId = b.dataset.id; nav('appt-detail');
    }));
  }
  if (S.page === 'updates') {
    const newBtn = $('#newUpd'); if (newBtn) newBtn.addEventListener('click', () => nav('hub'));
  }
  if (S.page === 'update-new') {
    $('#submitUpd') && $('#submitUpd').addEventListener('click', () => { toast('ส่งเรื่องสำเร็จ','รอ buyer ตรวจสอบ','ok'); nav('updates'); });
  }
  if (S.page === 'returns') {
    $$('#mContent .ack-btn').forEach(b => b.addEventListener('click', () => {
      toast('ยืนยันรับคืนแล้ว', '', 'ok');
      b.outerHTML = '<span class="chip chip-ok chip-sm">รับทราบแล้ว</span>';
    }));
  }
  if (S.page === 'new-product') wireNewProduct();
  if (S.page === 'new-promo') wireNewPromo();
  if (S.page === 'hub') wireSupplierHub();
  if (S.page === 'schema-form') wireSchemaForm();
  if (S.page === 'targets') wireTargets();
  if (S.page === 'appt-detail') wireSupplierApptDetail();
  if (S.page === 'backorders') wireSupplierBackorders();
}

function wireSupplierBackorders() {
  $$('#mContent .bo-book-btn').forEach(b => b.addEventListener('click', () => {
    // Pre-fill booking wizard with this backorder
    const boId = b.dataset.id;
    const bo = (DATA.backorders||[]).find(x => x.id === boId);
    if (!bo) return;
    S.wizard = { step:1, pos:[bo.po], wh:null, day:null, slot:null, backorderId: boId };
    toast('เปิดฟอร์มจองส่ง', 'PO '+bo.po+' · ค้าง '+bo.pendingQty+' '+(bo.desc||''), 'ok');
    nav('book');
  }));
  $$('#mContent .bo-cancel-btn').forEach(b => b.addEventListener('click', async () => {
    const boId = b.dataset.id;
    if (!confirm('ยืนยันยกเลิก backorder นี้? (เปลี่ยนเป็น "ขาดส่ง" — admin จะออก credit note)')) return;
    const bo = (DATA.backorders||[]).find(x => x.id === boId);
    if (!bo) return;
    bo.status = 'ยกเลิก';
    bo.varianceType = 'short-billed';
    bo.settledDate = nowFullTS();
    toast('ยกเลิกแล้ว', 'admin จะออก credit note', 'warn');
    await callAPI('cancelBackorder', { id: boId });
    renderContentOnly();
  }));
}

function wireSupplierApptDetail() {
  const confirmBtn = $('#btnSupplierConfirm');
  const disputeBtn = $('#btnSupplierDispute');
  const qrBtn = $('#btnSupplierQR');
  if (confirmBtn) confirmBtn.addEventListener('click', async () => {
    const a = DATA.appointments.find(x => x.id === confirmBtn.dataset.id);
    if (!a || !a.extra) return;
    a.extra.confirmedBySupplier = true;
    a.extra.confirmedAt = nowFullTS();
    a.extra.disputedReason = null;
    toast('ยืนยันยอดแล้ว', 'GR จะเห็นว่า supplier confirm ฝั่งคุณ', 'ok');
    await callAPI('confirmExtraFees', { apptId: a.id, confirmedAt: a.extra.confirmedAt });
    renderContentOnly();
  });
  if (disputeBtn) disputeBtn.addEventListener('click', async () => {
    const reason = prompt('ระบุเหตุผลที่แย้งยอด:');
    if (!reason) return;
    const a = DATA.appointments.find(x => x.id === disputeBtn.dataset.id);
    if (!a || !a.extra) return;
    a.extra.disputedReason = reason;
    a.extra.confirmedBySupplier = false;
    toast('แย้งยอดแล้ว', 'แอดมินและ GR จะเห็นเหตุผล', 'warn');
    await callAPI('disputeExtraFees', { apptId: a.id, reason });
    renderContentOnly();
  });
  if (qrBtn) {
    qrBtn.addEventListener('click', () => {
      const a = DATA.appointments.find(x => x.id === qrBtn.dataset.id);
      const amount = Number(qrBtn.dataset.amount) || 0;
      if (a && a.extra) {
        openQRModal(amount, { apptId: a.id, vendor: a.vendor.short, breakdown: a.extra });
      }
    });
  }
}

    html += closed.map(boRow).join('');
  }

  html += '</div>';
  return html;
}

/* ───────────────── SUPPLIER: Defect Clearance gate (ก่อนจอง) ───────────────── */
const DEFECT_HANDLE = ['เอาของมาแลก','ทำ CN','เปิดบิลชื่อบริษัท'];
const DEFECT_RETURN = ['คืนกับขนส่ง','เซลล์มาเก็บ','ทำลาย'];

async function goBooking() {
  showAppLoading('กำลังตรวจของเสียค้างเคลียร์…');

  try { res = await callAPI('getDefects', {}); } catch(e) { console.error('[getDefects]', e); }

  if (data && data.pendingCount > 0) {
    S._defects = data.pending;
    nav('defect-gate');

function supplierDefectGate() {

function wireDefectGate() {
  // auto-skip if empty (e.g., navigated directly)
  if (!S._defects || !S._defects.length) { nav('book'); return; }
  const btn = $('#btnDcSubmit');
  if (!btn) return;
  btn.addEventListener('click', async () => {
    const items = []; let bad = false;
    $$('#mContent .dc-item').forEach(card => {
      const d = (S._defects || [])[Number(card.dataset.idx)] || {};
      const handle = card.querySelector('.dc-handle').value;
      const ret = card.querySelector('.dc-ret').value;
      const date = card.querySelector('.dc-date').value;
      const resp = card.querySelector('.dc-resp').value;
      const notes = card.querySelector('.dc-notes').value;
      card.style.borderColor = (!handle || !ret || !date) ? 'var(--err)' : '';
      if (!handle || !ret || !date) bad = true;
      items.push({ barcode:d.barcode, name:d.name, cs:d.cs, ea:d.ea, totalEa:d.totalEa, warehouses:d.warehouses, handle, ret, clearDate:date, responsible:resp, notes });
    });
    if (bad) { toast('กรอกให้ครบ', 'ทุกรายการต้องมี วิธีรับผิดชอบ + วิธีคืน + วันที่', 'err'); return; }
    showAppLoading('กำลังบันทึก…');
    await callAPI('submitDefectClearance', { items });
    hideAppLoading();
    toast('เคลียร์ของเสียแล้ว', 'จองส่งสินค้าต่อได้เลย', 'ok');
    S._defects = null;
    nav('book');
  });
}

function supplierBooking() {
  const w = S.wizard;
  const steps = ['เลือก PO','คลัง','วันที่','เวลา'];
  let bar = '<div class="wiz-bar">' +
    '<div class="wiz-track">';
  for (let i = 0; i < steps.length; i++) {
    const n = i + 1;
    const st = n < w.step ? 'done' : n === w.step ? 'active' : 'todo';
    bar += '<div class="wiz-step '+st+'"><span class="wiz-dot">'+(st==='done'?ic('check',12,'currentColor'):n)+'</span>'+(n===w.step?'<span>'+steps[i]+'</span>':'')+'</div>';

  }
  bar += '</div><div style="font-size:11px;color:var(--ink-3)">ขั้นที่ '+w.step+' จาก '+steps.length+' · '+steps[w.step-1]+'</div></div>';

    1: wizStep1, 2: wizStep2, 3: wizStep3, 4: wizStep4
  })[w.step]() + '</div>';

  const okNext = (w.step===1 && w.pos.length>0) || (w.step===2 && w.wh) || (w.step===3 && w.day) || (w.step===4 && w.slot);
  const foot = '<div class="sticky-foot">' +

      (w.step < 4 ? 'ถัดไป ' + ic('chevR',14) : 'ยืนยันการจอง '+ic('check',14)) +
    '</button>' +
  '</div>';

  return bar + body + foot;
}

function wireWizard() {
  const back = $('#wizBack'), cancel = $('#wizCancel'), next = $('#wizNext');
  if (back) back.addEventListener('click', () => { S.wizard.step--; render(); });
  if (cancel) cancel.addEventListener('click', () => nav('dashboard'));
  if (next) next.addEventListener('click', () => {
    if (S.wizard.step < 4) { S.wizard.step++; render(); }
    else {
      toast('จองนัดสำเร็จ', 'รหัส: APT-'+(2500+Math.floor(Math.random()*99)), 'ok');
      nav('my-appts');
    }
  });
  // step-specific handlers
  if (S.wizard.step === 1) {
    $$('.po-card').forEach(b => b.addEventListener('click', () => {
      const id = b.dataset.po;
      const i = S.wizard.pos.indexOf(id);
      if (i >= 0) S.wizard.pos.splice(i, 1); else S.wizard.pos.push(id);
      render();
    }));
  }
  if (S.wizard.step === 2) {
    $$('.wh-pick').forEach(b => b.addEventListener('click', () => { S.wizard.wh = b.dataset.wh; render(); }));
  }
  if (S.wizard.step === 3) {
    $$('.cal-mini-cell[data-day]').forEach(b => b.addEventListener('click', () => { S.wizard.day = Number(b.dataset.day); render(); }));
  }
  if (S.wizard.step === 4) {
    $$('.slot[data-slot]').forEach(b => b.addEventListener('click', () => { S.wizard.slot = b.dataset.slot; render(); }));
  }
}

function supplierExtraFeesHTML(a) {
  const ex = a.extra;

    if (a.status === 'เสร็จสิ้น') {
      return '<div class="card mb-12"><div class="card-head"><h3 class="ic-head">'+ic('coins',15,'var(--brand)')+'ค่าใช้จ่ายเพิ่มเติม</h3></div>' +
        '<div class="card-body" style="text-align:center;color:var(--ink-3);font-size:12.5px;padding:20px">GR ยังไม่ได้กรอกค่าใช้จ่ายเพิ่มเติม</div></div>';
    }
    return '';
  }
  const row = (label, body) => '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--divider);font-size:13px"><span style="color:var(--ink-2)">'+label+'</span><span class="num bold">'+body+'</span></div>';
  const lines = [];
  if (ex.pallet && ex.pallet.has) lines.push(row('พาเลท · '+esc(ex.pallet.name||''), ex.pallet.qty+' × ฿'+ex.pallet.rate+' = ฿'+fmtMoney(ex.pallet.total)));
  if (ex.film && ex.film.has) lines.push(row('ฟิล์ม · '+esc(ex.film.name||''), ex.film.qty+' × ฿'+ex.film.rate+' = ฿'+fmtMoney(ex.film.total)));
  if (ex.lumpsum && ex.lumpsum.has) lines.push(row('เหมา · '+esc(ex.lumpsum.note||'-'), '฿'+fmtMoney(ex.lumpsum.amount)));

  const total = ex.total || 0;
  const isConfirmed = ex.confirmedBySupplier;
  const isDisputed = !!ex.disputedReason;
  const isPaid = ex.qrPaid;

  return '<div class="card mb-12"><div class="card-head"><h3 class="ic-head">'+ic('coins',15,'var(--brand)')+'ค่าใช้จ่ายเพิ่มเติม</h3><div class="sub">GR กรอกเมื่อรับของ — ตรวจสอบและยืนยัน</div></div>' +
    '<div class="card-body">' +
      (lines.length ? lines.join('') : '<div style="text-align:center;color:var(--ink-3);font-size:12.5px;padding:14px">ไม่มีค่าใช้จ่ายเพิ่มเติม</div>') +
      (total > 0 ? '<div style="display:flex;justify-content:space-between;padding:10px 0;border-top:2px solid var(--brand);margin-top:6px;font-size:15px;font-weight:800"><span style="color:var(--brand)">รวม</span><span class="num" style="color:var(--brand)">฿'+fmtMoney(total)+'</span></div>' : '') +
      (isPaid
        ? '<div class="extra-confirm-bar">'+ic('check',14)+' ชำระแล้ว '+esc(ex.qrPaidAt||'')+' · ผ่าน PromptPay QR</div>'
        : isDisputed
          ? '<div class="extra-dispute-bar"><div style="font-weight:700;margin-bottom:4px">'+ic('warn',14)+' แย้งยอดแล้ว</div>'+esc(ex.disputedReason)+'</div>'
          : isConfirmed
            ? '<div class="extra-confirm-bar">'+ic('check',14)+' ยืนยันแล้ว '+esc(ex.confirmedAt||'')+'</div>' +
              '<div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-lg btn-primary" style="flex:1" id="btnSupplierQR" data-id="'+a.id+'" data-amount="'+total+'">'+ic('check',16)+' QR PromptPay จ่าย ฿'+fmtMoney(total)+'</button></div>'
            : total > 0
              ? '<div style="display:flex;gap:8px;margin-top:14px">' +
                  '<button class="btn btn-lg" style="flex:1" id="btnSupplierDispute" data-id="'+a.id+'">'+ic('warn',16)+' แย้งยอด</button>' +

                '</div>'
              : ''
      ) +
    '</div>' +
  '</div>';
}

function mTimeline(lbl, time, done, sub, tone) {
  const dotBg = done ? 'var(--ok)' : 'var(--surface-sunk)';
  const dotBd = done ? 'var(--ok)' : 'var(--line-strong)';
  const subColor = tone === 'ok' ? 'var(--ok)' : tone === 'err' ? 'var(--err)' : tone === 'active' ? 'var(--info)' : 'var(--ink-3)';
  return '<div style="display:flex;gap:12px;align-items:center"><div style="width:18px;height:18px;border-radius:50%;background:'+dotBg+';border:2px solid '+dotBd+';flex-shrink:0;'+(tone==='active'?'animation:pulse 1.5s ease-in-out infinite':'')+'"></div>' +
    '<div style="flex:1"><div style="font-size:12px;color:var(--ink-3);font-weight:500">'+esc(lbl)+'</div>' +
    '<div style="display:flex;align-items:baseline;gap:8px"><div class="num bold" style="font-size:14px">'+esc(time)+'</div>'+(sub?'<div style="font-size:11px;color:'+subColor+'">'+esc(sub)+'</div>':'')+'</div></div>' +
  '</div>';
}

function supplierUpdates() {
  const vendor = (S.session && S.session.vendor) || DATA.vendors[0];
  const myUpdates = DATA.updates.filter(u => u.vendor.code === vendor.code).map(u => ({
    id:u.id, title:u.title, status:u.status, submittedAt:u.submitted,
    catLbl: (DATA.updateCategories.find(c=>c.id===u.cat) || {}).name || '',
    buyerNick: u.buyer ? u.buyer.nick : '—'
  }));
  const mySubmissions = DATA.submissions.filter(s => s.vendor.code === vendor.code).map(s => ({
    id:s.id, title:s.title, status:s.status, submittedAt:s.submittedAt,
    catLbl: (FORM_SCHEMAS[s.type] || {}).title || s.type,
    buyerNick: s.buyer ? s.buyer.nick : '—'
  }));
  const myProductSubs = DATA.newProducts.filter(p => p.vendor.code === vendor.code).map(p => ({
    id:p.id, title:p.product.name, status:p.status, submittedAt:p.submitted,
    catLbl: 'เสนอสินค้าใหม่', buyerNick: '—'
  }));
  const myPromoSubs = DATA.promoRequests.filter(p => p.vendor.code === vendor.code).map(p => ({
    id:p.id, title:p.title, status:p.status, submittedAt:p.submitted,
    catLbl: 'ขอจัดโปรโมชั่น', buyerNick: p.buyer ? p.buyer.nick : '—'
  }));
  const myTargets = DATA.salesTargets.filter(g => g.vendor.code === vendor.code).map(g => ({
    id:g.groupId, title:'เป้าหมายขาย '+g.lines.length+' รายการ', status:g.status, submittedAt:g.submittedAt,
    catLbl: 'เป้าหมายขาย', buyerNick: '—'
  }));
  const mine = [].concat(myUpdates, mySubmissions, myProductSubs, myPromoSubs, myTargets)
    .sort((a,b) => (b.submittedAt||'').localeCompare(a.submittedAt||''));

  let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0 12px">' +
    '<div class="m-section" style="margin:0">เรื่องที่ส่ง <span class="num bold" style="margin-left:6px;color:var(--ink)">'+mine.length+'</span></div>' +
    '<button class="btn btn-sm btn-primary" id="newUpd">'+ic('plus',12)+' ส่งเรื่องใหม่</button>' +
  '</div>';
  if (mine.length === 0) html += '<div class="card" style="padding:24px;text-align:center;color:var(--ink-3);font-size:12px">ยังไม่มีเรื่องที่ส่ง</div>';
  else html += mine.map(u =>
    '<div class="card" style="padding:12px 14px;margin-bottom:8px">' +
      '<div style="display:flex;align-items:center;gap:8px"><span class="chip chip-sm chip-accent">'+esc(u.catLbl)+'</span><span class="num" style="font-size:10.5px;color:var(--ink-3);margin-left:auto">'+u.id+'</span></div>' +
      '<div style="font-size:13px;font-weight:500;color:var(--ink);margin-top:6px;line-height:1.4">'+esc(u.title)+'</div>' +
      '<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--ink-3)"><span>ส่งถึง '+esc(u.buyerNick)+' · '+(u.submittedAt||'').slice(11,16)+'</span>'+statusChip(u.status)+'</div>' +
    '</div>'
  ).join('');
  return html;
}

function wireNewProduct() {
  // Image uploaders
  $$('.img-up').forEach(box => {
    const fileInput = box.querySelector('input[type="file"]');
    const removeBtn = box.querySelector('.img-up-remove');
    const icArea = box.querySelector('.ic-area');
    const lblArea = box.querySelector('.img-up-lbl');
    box.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
      fileInput.click();
    });
    fileInput.addEventListener('change', () => {
      const f = fileInput.files && fileInput.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        const img = document.createElement('img');
        img.src = reader.result;
        box.classList.add('has-img');
        if (icArea) icArea.style.display = 'none';
        if (lblArea) lblArea.style.display = 'none';
        const existing = box.querySelector('img');
        if (existing) existing.remove();
        box.appendChild(img);
      };
      reader.readAsDataURL(f);
    });
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      box.classList.remove('has-img');
      if (icArea) icArea.style.display = '';
      if (lblArea) lblArea.style.display = '';
      const img = box.querySelector('img');
      if (img) img.remove();
      fileInput.value = '';
    });
  });

  // Shelf-life chips (single-select + custom number)
  const shelfChips = $$('#shelfLifeChips .filter-chip');
  const shelfInput = $('#shelfLifeInput');
  const shelfCustomWrap = $('#shelfLifeCustomWrap');
  const shelfCustom = $('#shelfLifeCustom');
  shelfChips.forEach(c => c.addEventListener('click', () => {
    shelfChips.forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    const v = c.dataset.life;
    if (v === 'custom') {
      if (shelfCustomWrap) shelfCustomWrap.style.display = '';
      if (shelfInput) shelfInput.value = (shelfCustom && shelfCustom.value) || '';
      if (shelfCustom) shelfCustom.focus();
    } else {
      if (shelfCustomWrap) shelfCustomWrap.style.display = 'none';
      if (shelfInput) shelfInput.value = v;
    }
  }));
  shelfCustom && shelfCustom.addEventListener('input', () => {
    if (shelfInput) shelfInput.value = shelfCustom.value || '';
  });

  // Plan-when-slow chips (multi-select → pipe-joined hidden input)
  const planChips = $$('#plan2mChips .filter-chip');
  const planInput = $('#plan2mInput');
  const syncPlan = () => {
    const arr = planChips.filter(c => c.classList.contains('active')).map(c => c.dataset.plan);
    if (planInput) planInput.value = arr.join('|');
  };
  planChips.forEach(c => c.addEventListener('click', () => {
    c.classList.toggle('active');
    syncPlan();
  }));

  const collect = () => {
    const data = {};
    $$('#mContent input, #mContent textarea, #mContent select').forEach(el => {
      if (el.type === 'file') {
        data[el.id] = el.files && el.files[0] ? el.files[0].name : '';
      } else if (el.name) {
        data[el.name] = el.value;
      }
    });
    return data;
  };

  $('#saveDraftProd') && $('#saveDraftProd').addEventListener('click', () => {
    const data = collect();
    try { localStorage.setItem('sl_new_product_draft', JSON.stringify(data)); } catch(e) {}
    toast('บันทึกแบบร่างแล้ว', 'กลับมาแก้ภายหลังได้', 'ok');
  });

  $('#submitProd') && $('#submitProd').addEventListener('click', async () => {
    const data = collect();
    if (!data.name) { toast('กรุณากรอกชื่อสินค้า', '', 'err'); return; }
    if (!data.bc_EA) { toast('กรุณากรอกบาร์โค้ดชิ้น (EA)', '', 'err'); return; }
    if (!data.shelfLife || !(parseInt(data.shelfLife,10) > 0)) { toast('กรุณาระบุอายุสินค้า', 'เลือก chip หรือกรอกจำนวนวันใน "อื่นๆ"', 'err'); return; }
    if (!data.plan2m && !data.plan2mDetail) { toast('กรุณาระบุแผนกรณีขายไม่ได้ 2 เดือน', 'เลือกอย่างน้อย 1 chip หรือกรอกรายละเอียด', 'err'); return; }
    const res = await callAPI('submitNewProduct', { product: data });
    toast('ส่งข้อมูลสินค้าใหม่สำเร็จ', 'ทีมจัดซื้อจะตอบกลับใน 5 วันทำการ', 'ok');
    try { localStorage.removeItem('sl_new_product_draft'); } catch(e) {}
    nav('updates');
  });

  // Restore draft if exists
  try {
    const draft = JSON.parse(localStorage.getItem('sl_new_product_draft') || 'null');
    if (draft) {
      Object.keys(draft).forEach(k => {
        const el = document.querySelector('[name="'+k+'"]');
        if (el && el.type !== 'file') el.value = draft[k];
      });
      // Restore shelf-life chip state
      if (draft.shelfLife) {
        const match = shelfChips.find(c => c.dataset.life === String(draft.shelfLife));
        if (match) match.classList.add('active');
        else {
          const custom = shelfChips.find(c => c.dataset.life === 'custom');
          if (custom) custom.classList.add('active');
          if (shelfCustomWrap) shelfCustomWrap.style.display = '';
          if (shelfCustom) shelfCustom.value = draft.shelfLife;
        }
        if (shelfInput) shelfInput.value = draft.shelfLife;
      }
      // Restore plan2m chip state
      if (draft.plan2m) {
        const picks = String(draft.plan2m).split('|').filter(Boolean);
        planChips.forEach(c => { if (picks.includes(c.dataset.plan)) c.classList.add('active'); });
        if (planInput) planInput.value = draft.plan2m;
      }
      toast('โหลดแบบร่างกลับมาแล้ว', '', 'ok');
    }
  } catch(e) {}
}

  const schemaId = S.currentSchema;

  const name = 'f_'+f.name;
  if (f.type === 'text') {
    inputHTML = '<input class="input" name="'+name+'" id="'+name+'" placeholder="'+esc(f.placeholder||'')+'"'+(f.required?' required':'')+'>';
  } else if (f.type === 'number') {
    inputHTML = '<input class="input num" type="number" name="'+name+'" id="'+name+'" placeholder="'+esc(f.placeholder||'0')+'">';
  } else if (f.type === 'textarea') {
    inputHTML = '<textarea class="input textarea" rows="'+(f.rows||3)+'" name="'+name+'" id="'+name+'" placeholder="'+esc(f.placeholder||'')+'"></textarea>';
  } else if (f.type === 'date') {
    inputHTML = '<input class="input" type="date" name="'+name+'" id="'+name+'">';
  } else if (f.type === 'daterange') {
    inputHTML = '<div class="form-grid-2"><input class="input" type="date" id="'+name+'_start" placeholder="เริ่ม"><input class="input" type="date" id="'+name+'_end" placeholder="สิ้นสุด"></div>';
  } else if (f.type === 'select') {
    inputHTML = '<select class="select" name="'+name+'" id="'+name+'"><option value="">เลือก...</option>'+f.options.map(o=>'<option>'+esc(o)+'</option>').join('')+'</select>';
  } else if (f.type === 'chip-single') {
    inputHTML = '<div class="chip-row" id="'+name+'_chips" data-field-type="chip-single" data-field="'+f.name+'">' +
      f.options.map(o => '<button class="filter-chip" type="button" data-val="'+esc(o)+'" style="height:30px">'+esc(o)+'</button>').join('') +
    '</div>';
  } else if (f.type === 'chip-multi') {
    inputHTML = '<div class="chip-row" id="'+name+'_chips" data-field-type="chip-multi" data-field="'+f.name+'">' +
      f.options.map(o => '<button class="filter-chip" type="button" data-val="'+esc(o)+'" style="height:30px">'+esc(o)+'</button>').join('') +
    '</div>';
  } else if (f.type === 'checkbox') {
    inputHTML = '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px"><input type="checkbox" id="'+name+'" style="width:18px;height:18px;cursor:pointer"> '+esc(f.label)+'</label>';
    return '<div class="field-group">'+inputHTML+'</div>';
  } else if (f.type === 'sku-multi') {
    const myskus = [
      { code:"88234", name:"ปลากระป๋อง 155g · รสมะเขือเทศ" },
      { code:"88235", name:"ปลากระป๋อง 155g · รสซอสพริก" },
      { code:"88240", name:"ปลากระป๋อง 290g · รสน้ำมัน" },
      { code:"77003", name:"ปลาทูน่าก้อน 185g" },
      { code:"77018", name:"ปลาทูน่าก้อน 95g · 3-pack" },
      { code:"22504", name:"ปูนซีเมนต์ถุง 50kg" },
      { code:"55102", name:"น้ำตาลทรายแดง 1 กก." },
    ];
    inputHTML = '<div id="'+name+'_skus" data-field-type="sku-multi" data-field="'+f.name+'" style="display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto">' +
      myskus.map(s => '<button class="po-card sku-pick" type="button" data-sku="'+esc(s.code)+'" style="padding:8px 10px">' +

function wireSchemaForm() {
  const schemaId = S.currentSchema;
  const schema = FORM_SCHEMAS[schemaId];
  if (!schema) return;
  const state = { values:{}, supplierSig:null };

  // Init chip handlers
  $$('[data-field-type="chip-single"]').forEach(box => {
    box.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
      box.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
      state.values[box.dataset.field] = b.dataset.val;
    }));
  });
  $$('[data-field-type="chip-multi"]').forEach(box => {
    box.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
      b.classList.toggle('active');
      const vals = Array.from(box.querySelectorAll('button.active')).map(x => x.dataset.val);
      state.values[box.dataset.field] = vals;
    }));
  });

  // SKU picker
  $$('[data-field-type="sku-multi"]').forEach(box => {
    const fieldName = box.dataset.field;
    state.values[fieldName] = [];
    box.querySelectorAll('.sku-pick').forEach(b => b.addEventListener('click', () => {
      const sku = b.dataset.sku;
      const list = state.values[fieldName];
      const i = list.indexOf(sku);
      if (i >= 0) list.splice(i, 1); else list.push(sku);
      b.classList.toggle('sel', list.indexOf(sku) !== -1);
      const ch = b.querySelector('.po-check');
      if (ch) ch.innerHTML = list.indexOf(sku) !== -1 ? ic('check',13,'#fff',2.6) : '';
      // Update price-pair section if exists
      const ppField = schema.fields.find(f => f.type === 'price-pair');
      if (ppField) updatePricePair('f_'+ppField.name+'_price', list);
    }));
  });

  // Tier table
  $$('[data-field="tiers"]').forEach(tbl => {
    const rowsBox = tbl.querySelector('.tier-rows');
    tbl.querySelector('.tier-add').addEventListener('click', () => {
      const row = document.createElement('div');
      row.className = 'tier-row';
      row.innerHTML = '<div class="input-suffix"><input class="input num tier-target" type="number" placeholder="0"><span class="suffix">฿</span></div><div class="input-suffix"><input class="input num tier-percent" type="number" step="0.1" placeholder="0"><span class="suffix">%</span></div><button type="button" class="btn btn-ghost btn-icon btn-sm tier-del">'+ic('x',12)+'</button>';
      rowsBox.appendChild(row);
      row.querySelector('.tier-del').addEventListener('click', () => row.remove());
    });
    tbl.querySelectorAll('.tier-del').forEach(b => b.addEventListener('click', () => b.closest('.tier-row').remove()));
  });

  // Image upload (file fields)
  $$('.img-up').forEach(box => {
    const fileInput = box.querySelector('input[type="file"]');
    const removeBtn = box.querySelector('.img-up-remove');
    const icArea = box.querySelector('.ic-area');
    const lblArea = box.querySelector('.img-up-lbl');
    if (!fileInput) return;
    box.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
      fileInput.click();
    });
    fileInput.addEventListener('change', () => {
      const f = fileInput.files && fileInput.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        const img = document.createElement('img');
        img.src = reader.result;
        box.classList.add('has-img');
        if (icArea) icArea.style.display = 'none';
        if (lblArea) lblArea.style.display = 'none';
        const existing = box.querySelector('img');
        if (existing) existing.remove();
        box.appendChild(img);
      };
      reader.readAsDataURL(f);
    });
    removeBtn && removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      box.classList.remove('has-img');
      if (icArea) icArea.style.display = '';
      if (lblArea) lblArea.style.display = '';
      const img = box.querySelector('img');
      if (img) img.remove();
      fileInput.value = '';
    });
  });

  // Signature actions
  const reuseBtn = $('#sigReuseBtn');
  const newBtn = $('#sigNewBtn');
  if (reuseBtn) reuseBtn.addEventListener('click', () => {
    const saved = SIG.load();
    if (saved) { state.supplierSig = saved.dataURL; toast('ใช้ลายเซ็นเดิม','พร้อมส่งฟอร์ม','ok'); reuseBtn.innerHTML = ic('check',13)+' ลายเซ็นพร้อมส่ง'; reuseBtn.disabled = true; }
  });
  if (newBtn) newBtn.addEventListener('click', () => {
    SIG.openPad((dataURL, method) => {
      state.supplierSig = dataURL;
      const prev = $('#sigPreview');
      if (prev) prev.innerHTML = '<img src="'+dataURL+'">';
      toast('เซ็นเรียบร้อย','','ok');
      // Re-render section state
    });
  });

  function collect() {
    const out = { ...state.values };
    schema.fields.forEach(f => {
      const el = $('#f_'+f.name);
      if (f.type === 'text' || f.type === 'textarea' || f.type === 'number' || f.type === 'date') out[f.name] = el && el.value;
      else if (f.type === 'daterange') out[f.name] = { start: $('#f_'+f.name+'_start')?.value, end: $('#f_'+f.name+'_end')?.value };
      else if (f.type === 'checkbox') out[f.name] = el && el.checked;
      else if (f.type === 'tier-table') {
        const rows = $$('#f_'+f.name+'_tiers .tier-row:not(.tier-head)');
        out[f.name] = rows.map(r => ({
          target: Number(r.querySelector('.tier-target')?.value || 0),
          percent: Number(r.querySelector('.tier-percent')?.value || 0)
        })).filter(t => t.target || t.percent);
      } else if (f.type === 'price-pair') {
        const inputs = $$('#f_'+f.name+'_price .pp-input');
        const pairs = {};
        inputs.forEach(i => { pairs[i.dataset.sku+'_'+i.dataset.field] = i.value; });
        out[f.name] = pairs;
      } else if (f.type === 'file') {
        const fi = $('#f_'+f.name);
        out[f.name] = fi && fi.files && fi.files[0] ? fi.files[0].name : null;
      }
      // chip-single, chip-multi, sku-multi already in state.values
    });
    return out;
  }

  $('#saveSchemaDraft') && $('#saveSchemaDraft').addEventListener('click', () => {
    try { localStorage.setItem('sl_draft_'+schemaId, JSON.stringify(collect())); } catch(e) {}
    toast('บันทึกแบบร่างแล้ว','','ok');
  });

  $('#submitSchema') && $('#submitSchema').addEventListener('click', async () => {
    const data = collect();
    // Validate required
    for (const f of schema.fields) {
      if (!f.required) continue;
      const v = data[f.name];
      const empty = v == null || v === '' || (Array.isArray(v) && v.length === 0) || (typeof v === 'object' && !Array.isArray(v) && (!v.start && !v.end && Object.keys(v).length === 0));
      if (empty) { toast('กรุณากรอก: '+f.label, '', 'err'); return; }
    }
    // Validate signature if required
    if ((schema.signature === 'both' || schema.signature === 'supplier') && !state.supplierSig) {
      toast('กรุณาลงนาม','ฟอร์มนี้ต้องเซ็นชื่อก่อนส่ง','err'); return;
    }
    await callAPI('submitForm', { type: schemaId, payload: data, supplierSig: state.supplierSig });
    // Push to local mock submissions
    const id = 'SB-' + String(Date.now()).slice(-4);
    DATA.submissions.unshift({
      id, type:schemaId, submittedAt: new Date().toISOString().slice(0,16).replace('T',' '),
      vendor: (S.session && S.session.vendor) || DATA.vendors[0],
      buyer: DATA.buyers[0], status:'รอตรวจ',
      title: data.title || schema.title,
      skus: data.skus || [],
      startDate: data.effectiveDate || (data.period && data.period.start) || data.startDate,
      endDate: (data.period && data.period.end) || data.endDate,
      reasonType: data.reasonType, reasonDetail: data.reasonDetail || data.reason || data.body,
      payload: data,
      supplierSig: state.supplierSig, buyerSig:null,
    });
    try { localStorage.removeItem('sl_draft_'+schemaId); } catch(e) {}
    toast('ส่งสำเร็จ','รหัส: '+id,'ok');
    nav('updates');
  });
}

function wireNewPromo() {
  const state = { ptype:null, skus:[], channel:'ทุกคลัง', target:'ทั่วไป', supports:[] };

  // Promo type chip picker → reveal type-specific inputs
  $$('#promoTypePicker button').forEach(b => b.addEventListener('click', () => {
    state.ptype = b.dataset.ptype;
    $$('#promoTypePicker button').forEach(x => x.classList.toggle('active', x === b));
    const det = $('#promoTypeDetails');
    if (state.ptype === 'buyXgetY') {
      det.innerHTML = '<div class="form-grid-3"><div><label class="label-plain">ซื้อ</label><input class="input num" type="number" id="ptBuy" placeholder="2"></div><div><label class="label-plain">แถม</label><input class="input num" type="number" id="ptGet" placeholder="1"></div><div><label class="label-plain">หน่วย</label><select class="select" id="ptUnit"><option>แพ็ค</option><option>ลัง</option><option>ชิ้น</option></select></div></div>';
    } else if (state.ptype === 'discount') {
      det.innerHTML = '<label class="label-plain">ลด %</label><div class="input-suffix"><input class="input num" type="number" id="ptPercent" placeholder="15"><span class="suffix">%</span></div>';
    } else if (state.ptype === 'foc') {
      det.innerHTML = '<label class="label-plain">FOC %</label><div class="input-suffix"><input class="input num" type="number" id="ptPercent" placeholder="5"><span class="suffix">%</span></div>';
    } else if (state.ptype === 'bundle') {
      det.innerHTML = '<label class="label-plain">รายละเอียด Bundle</label><textarea class="input textarea" rows="2" id="ptDetail" placeholder="เช่น ซื้อ A 1 ลัง ได้สิทธิ์ซื้อ B ลดราคา 20%"></textarea>';
    } else if (state.ptype === 'coupon') {
      det.innerHTML = '<label class="label-plain">รายละเอียดคูปอง</label><textarea class="input textarea" rows="2" id="ptDetail" placeholder="เช่น คูปอง 50฿ ใช้ครั้งถัดไปเมื่อซื้อเกิน 500฿"></textarea>';
    }
  }));

  // SKU picker (multi-select)
  $$('.sku-pick').forEach(b => b.addEventListener('click', () => {
    const sku = b.dataset.sku;
    const i = state.skus.indexOf(sku);
    if (i >= 0) state.skus.splice(i, 1); else state.skus.push(sku);
    b.classList.toggle('sel', state.skus.indexOf(sku) !== -1);
    const check = b.querySelector('.po-check');
    if (check) check.innerHTML = state.skus.indexOf(sku) !== -1 ? ic('check',13,'#fff',2.6) : '';
    const sum = $('#skuSummary');
    if (state.skus.length > 0) {
      sum.style.display = 'block';
      sum.innerHTML = 'เลือกแล้ว '+state.skus.length+' SKU';
    } else { sum.style.display = 'none'; }
  }));

  // Channel single-select
  $$('#channelPicker button').forEach(b => b.addEventListener('click', () => {
    state.channel = b.dataset.channel;
    $$('#channelPicker button').forEach(x => x.classList.toggle('active', x === b));
  }));
  // Target single-select
  $$('#targetPicker button').forEach(b => b.addEventListener('click', () => {
    state.target = b.dataset.target;
    $$('#targetPicker button').forEach(x => x.classList.toggle('active', x === b));
  }));
  // Support multi-select
  $$('#supportPicker button').forEach(b => b.addEventListener('click', () => {
    const s = b.dataset.sup;
    const i = state.supports.indexOf(s);
    if (i >= 0) state.supports.splice(i, 1); else state.supports.push(s);
    b.classList.toggle('active', state.supports.indexOf(s) !== -1);
  }));

  function collect() {
    const data = {
      title: $('[name="promoTitle"]').value,
      ptype: state.ptype,
      skus: state.skus,
      channel: state.channel,
      target: state.target,
      supports: state.supports,
      startDate: $('[name="startDate"]').value,
      endDate: $('[name="endDate"]').value,
      expectedLift: $('[name="expectedLift"]').value,
      budget: $('[name="budget"]').value,
      objective: $('[name="objective"]').value,
      reason: $('[name="reason"]').value,
    };
    // type-specific
    if (state.ptype === 'buyXgetY') {
      data.typeDetail = { buy: $('#ptBuy')?.value, get: $('#ptGet')?.value, unit: $('#ptUnit')?.value };
    } else if (state.ptype === 'discount' || state.ptype === 'foc') {
      data.typeDetail = { percent: $('#ptPercent')?.value };
    } else if (state.ptype === 'bundle' || state.ptype === 'coupon') {
      data.typeDetail = { detail: $('#ptDetail')?.value };
    }
    return data;
  }

  $('#savePromoDraft') && $('#savePromoDraft').addEventListener('click', () => {
    try { localStorage.setItem('sl_promo_draft', JSON.stringify(collect())); } catch(e) {}
    toast('บันทึกแบบร่างแล้ว','','ok');
  });

  $('#submitPromo') && $('#submitPromo').addEventListener('click', async () => {
    const d = collect();
    if (!d.title) { toast('กรุณากรอกชื่อโปร','','err'); return; }
    if (!d.ptype) { toast('กรุณาเลือกประเภทโปร','','err'); return; }
    if (d.skus.length === 0) { toast('กรุณาเลือกอย่างน้อย 1 SKU','','err'); return; }
    if (!d.startDate || !d.endDate) { toast('กรุณาระบุวันเริ่ม-สิ้นสุด','','err'); return; }
    if (!d.reason) { toast('กรุณาอธิบายเหตุผล','ยิ่งชัด ยิ่งอนุมัติเร็ว','err'); return; }
    await callAPI('submitPromoRequest', { promo: d });
    try { localStorage.removeItem('sl_promo_draft'); } catch(e) {}
    toast('ส่งคำขอโปรสำเร็จ','จัดซื้อจะตอบกลับใน 3 วันทำการ','ok');
    nav('updates');
  });
}

      '<div style="flex:1;font-size:12px"><div style="font-weight:700;color:var(--info)">เป้าหมายขาย เดือน/ไตรมาส/ปี</div>' +
      '<div style="color:var(--ink-2);margin-top:2px;line-height:1.5">ตั้งเป้าได้หลายรายการในครั้งเดียว · เพิ่ม/ลด row ได้ตลอด · ส่งครั้งเดียว → ทีมจัดซื้อจะอนุมัติทั้งชุด</div></div>' +
    '</div>' +
    '<div id="targetsList">' +
    _targetsBuf.map((t, i) => targetRowHTML(t, i)).join('') +
    '</div>' +
    '<button id="addTargetRow" class="btn btn-lg btn-block" style="height:46px;margin-top:8px;border:1.5px dashed var(--brand-soft);background:var(--brand-tint);color:var(--brand);font-weight:700">'+ic('plus',16)+' เพิ่มเป้าหมายอีก 1 รายการ</button>' +
    renderSignatureSection('targets') +
    '<div id="targetsSummary" style="margin-top:14px;padding:12px 14px;background:var(--surface-alt);border-radius:10px;font-size:12.5px;color:var(--ink-2);text-align:center"></div>' +
    '<div style="display:flex;gap:8px;margin-top:12px">' +
      '<button class="btn btn-lg" id="saveTargetsDraft" style="flex:1;height:46px">บันทึกแบบร่าง</button>' +
      '<button class="btn btn-primary btn-lg" id="submitTargets" style="flex:2;height:46px;font-size:14px">'+ic('check',16)+' ส่งทั้งหมด</button>' +
    '</div>' +
  '</div>';
  return html;
}

function targetRowHTML(t, idx) {
  const yearOpts = [2026, 2027, 2028].map(y => '<option value="'+y+'"'+(t.periodYear==y?' selected':'')+'>'+(y+543)+'</option>').join('');
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return '<div class="target-row" data-rid="'+t._rid+'" style="background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px dashed var(--divider)">' +
      '<div style="display:flex;align-items:center;gap:8px"><span style="width:24px;height:24px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--font-num)">'+(idx+1)+'</span><span style="font-size:12.5px;font-weight:700;color:var(--ink-2)">เป้าหมายที่ '+(idx+1)+'</span></div>' +
      '<button class="btn btn-ghost btn-icon btn-sm tgt-del" data-rid="'+t._rid+'" title="ลบ">'+ic('x',14,'var(--err)')+'</button>' +
    '</div>' +

    '<label class="label-plain">ขอบเขต (Scope)</label>' +
    '<div class="chip-row" style="margin-bottom:10px">' +
      ['ทั้งบริษัท','ทั้งหมด vendor','รายกลุ่ม','รายสินค้า'].map(o =>
        '<button class="filter-chip tgt-scope" type="button" data-val="'+o+'" data-rid="'+t._rid+'"'+(t.scope===o?' style="background:var(--brand);color:#fff;border-color:var(--brand)"':'')+'>'+o+'</button>'
      ).join('') +
    '</div>' +

    // scope-specific fields (revealed conditionally)
    '<div class="tgt-scope-detail" data-rid="'+t._rid+'">' +
      (t.scope === 'รายกลุ่ม' ?
        '<div class="form-grid-2" style="margin-bottom:10px">' +
          '<div><label class="label-plain">ประเภทกลุ่ม</label><select class="select tgt-field-input" data-rid="'+t._rid+'" data-field="scopeField"><option value="">เลือก...</option><option'+(t.scopeField==='Cat_Brand'?' selected':'')+'>Cat_Brand</option><option'+(t.scopeField==='Cat_Pack'?' selected':'')+'>Cat_Pack</option><option'+(t.scopeField==='Cat_Type'?' selected':'')+'>Cat_Type</option><option'+(t.scopeField==='Cat_Group'?' selected':'')+'>Cat_Group</option></select></div>' +
          '<div><label class="label-plain">ค่า</label><input class="input tgt-field-input" data-rid="'+t._rid+'" data-field="scopeValue" value="'+esc(t.scopeValue||'')+'" placeholder="เช่น Brand X"></div>' +
        '</div>' : ''
      ) +
      (t.scope === 'รายสินค้า' ?
        '<div style="margin-bottom:10px"><label class="label-plain">รหัสสินค้า (SKU)</label><input class="input num tgt-field-input" data-rid="'+t._rid+'" data-field="scopeValue" value="'+esc(t.scopeValue||'')+'" placeholder="เช่น 88234"></div>' : ''
      ) +
    '</div>' +

    '<label class="label-plain">ช่วงเวลา</label>' +
    '<div class="chip-row" style="margin-bottom:10px">' +
      ['รายเดือน','รายไตรมาส','เลือกเดือน','รายปี'].map(o =>
        '<button class="filter-chip tgt-period" type="button" data-val="'+o+'" data-rid="'+t._rid+'"'+(t.periodType===o?' style="background:var(--brand);color:#fff;border-color:var(--brand)"':'')+'>'+o+'</button>'
      ).join('') +
    '</div>' +

    '<div class="tgt-period-detail" data-rid="'+t._rid+'">' +
      '<div class="form-grid-2" style="margin-bottom:10px">' +
        '<div><label class="label-plain">ปี (พ.ศ.)</label><select class="select tgt-field-input" data-rid="'+t._rid+'" data-field="periodYear">'+yearOpts+'</select></div>' +
        (t.periodType === 'รายเดือน' ?
          '<div><label class="label-plain">เดือน</label><select class="select tgt-field-input" data-rid="'+t._rid+'" data-field="periodMonth"><option value="">เลือก...</option>'+months.map((m,i)=>'<option value="'+(i+1)+'"'+(Number(t.periodMonth)===i+1?' selected':'')+'>'+m+'</option>').join('')+'</select></div>' :
          t.periodType === 'รายไตรมาส' ?
          '<div><label class="label-plain">ไตรมาส</label><select class="select tgt-field-input" data-rid="'+t._rid+'" data-field="periodQuarter"><option value="">เลือก...</option>'+['Q1','Q2','Q3','Q4'].map(q=>'<option'+(t.periodQuarter===q?' selected':'')+'>'+q+'</option>').join('')+'</select></div>' :
          '<div></div>'
        ) +
      '</div>' +
      (t.periodType === 'เลือกเดือน' ?
        '<div style="margin-bottom:10px"><label class="label-plain">เลือกเดือน (เลือกได้หลายเดือน)</label><div class="chip-row">' +
          months.map((m,i)=>'<button class="filter-chip tgt-multi-month" type="button" data-rid="'+t._rid+'" data-month="'+(i+1)+'"'+((t.periodMonthsMulti||[]).indexOf(i+1)!==-1?' style="background:var(--brand);color:#fff;border-color:var(--brand)"':'')+' style="height:28px;font-size:11.5px;padding:0 10px">'+m+'</button>').join('') +
        '</div></div>' : ''
      ) +
    '</div>' +

    '<div class="form-grid-2" style="margin-bottom:10px">' +
      '<div><label class="label-plain">หน่วย</label>' +
        '<div class="chip-row">' +
          ['บาท','ลัง','ร้านค้า','SKU','ชิ้น'].map(o =>
            '<button class="filter-chip tgt-unit" type="button" data-val="'+o+'" data-rid="'+t._rid+'"'+(t.unit===o?' style="background:var(--brand);color:#fff;border-color:var(--brand)"':'')+' style="height:28px;font-size:11.5px;padding:0 10px">'+o+'</button>'
          ).join('') +
        '</div>' +
      '</div>' +
      '<div><label class="label-plain">จำนวนเป้า</label><div class="input-suffix"><input class="input num tgt-field-input" data-rid="'+t._rid+'" data-field="targetAmount" type="number" value="'+esc(t.targetAmount||'')+'" placeholder="0"><span class="suffix">'+esc(t.unit||'')+'</span></div></div>' +
    '</div>' +

    '<label class="label-plain">หมายเหตุ</label>' +
    '<input class="input tgt-field-input" data-rid="'+t._rid+'" data-field="notes" value="'+esc(t.notes||'')+'" placeholder="หมายเหตุเพิ่มเติม">' +
  '</div>';
}

function wireTargets() {
  function refreshSummary() {
    const count = _targetsBuf.length;
    const filled = _targetsBuf.filter(t => t.targetAmount && Number(t.targetAmount) > 0).length;
    const sumByUnit = {};
    _targetsBuf.forEach(t => {
      if (!t.targetAmount) return;
      sumByUnit[t.unit] = (sumByUnit[t.unit] || 0) + Number(t.targetAmount);
    });
    const sumStr = Object.keys(sumByUnit).map(u => '<span class="num bold">'+fmtMoney(sumByUnit[u])+'</span> '+u).join(' · ') || '—';
    $('#targetsSummary').innerHTML = 'มี <span class="num bold">'+count+'</span> รายการ · กรอกแล้ว <span class="num bold" style="color:var(--ok)">'+filled+'</span> · รวม: ' + sumStr;
  }
  function rerenderList() {
    const list = $('#targetsList');
    if (!list) return;
    list.innerHTML = _targetsBuf.map((t, i) => targetRowHTML(t, i)).join('');
    attachRowHandlers();
    refreshSummary();
  }

  function attachRowHandlers() {
    $$('.tgt-del').forEach(b => b.addEventListener('click', () => {
      const rid = Number(b.dataset.rid);
      _targetsBuf = _targetsBuf.filter(x => x._rid !== rid);
      if (_targetsBuf.length === 0) _targetsBuf.push(_newTargetRow());
      rerenderList();
    }));

    $$('.tgt-scope').forEach(b => b.addEventListener('click', () => {
      const rid = Number(b.dataset.rid);
      const row = _targetsBuf.find(x => x._rid === rid);
      if (row) { row.scope = b.dataset.val; row.scopeField = ''; row.scopeValue = ''; }
      rerenderList();
    }));

    $$('.tgt-period').forEach(b => b.addEventListener('click', () => {
      const rid = Number(b.dataset.rid);
      const row = _targetsBuf.find(x => x._rid === rid);
      if (row) { row.periodType = b.dataset.val; row.periodMonth = ''; row.periodQuarter = ''; row.periodMonthsMulti = []; }
      rerenderList();
    }));

    $$('.tgt-unit').forEach(b => b.addEventListener('click', () => {
      const rid = Number(b.dataset.rid);
      const row = _targetsBuf.find(x => x._rid === rid);
      if (row) row.unit = b.dataset.val;
      rerenderList();
    }));

    $$('.tgt-multi-month').forEach(b => b.addEventListener('click', () => {
      const rid = Number(b.dataset.rid);
      const m = Number(b.dataset.month);
      const row = _targetsBuf.find(x => x._rid === rid);
      if (!row) return;
      row.periodMonthsMulti = row.periodMonthsMulti || [];
      const i = row.periodMonthsMulti.indexOf(m);
      if (i >= 0) row.periodMonthsMulti.splice(i, 1); else row.periodMonthsMulti.push(m);
      rerenderList();
    }));

    $$('.tgt-field-input').forEach(el => {
      el.addEventListener('input', () => {
        const rid = Number(el.dataset.rid);
        const field = el.dataset.field;
        const row = _targetsBuf.find(x => x._rid === rid);
        if (row) row[field] = el.value;
        refreshSummary();
      });
    });
  }

  $('#addTargetRow').addEventListener('click', () => {
    _targetsBuf.push(_newTargetRow());
    rerenderList();
  });

  // Signature
  let supplierSig = null;
  const reuseBtn = $('#sigReuseBtn');
  const newBtn = $('#sigNewBtn');
  if (reuseBtn) reuseBtn.addEventListener('click', () => {
    const saved = SIG.load();
    if (saved) { supplierSig = saved.dataURL; reuseBtn.innerHTML = ic('check',13)+' ลายเซ็นพร้อมส่ง'; reuseBtn.disabled = true; toast('ใช้ลายเซ็นเดิม','','ok'); }
  });
  if (newBtn) newBtn.addEventListener('click', () => {
    SIG.openPad((dataURL) => {
      supplierSig = dataURL;
      $('#sigPreview').innerHTML = '<img src="'+dataURL+'">';
      toast('เซ็นเรียบร้อย','','ok');
    });
  });

  $('#saveTargetsDraft').addEventListener('click', () => {
    try { localStorage.setItem('sl_targets_draft', JSON.stringify(_targetsBuf)); } catch(e) {}
    toast('บันทึกแบบร่างแล้ว','','ok');
  });

  $('#submitTargets').addEventListener('click', async () => {
    const valid = _targetsBuf.filter(t => t.scope && t.periodType && t.unit && Number(t.targetAmount) > 0);
    if (valid.length === 0) { toast('กรุณากรอกอย่างน้อย 1 รายการให้ครบ', 'ต้องเลือก Scope + Period + Unit + จำนวน', 'err'); return; }
    if (!supplierSig) { toast('กรุณาลงนาม', 'ฟอร์มนี้ต้องเซ็นก่อนส่ง', 'err'); return; }
    const res = await callAPI('submitTargets', { targets: valid, supplierSig: supplierSig });
    // Add to local mock
    const groupId = 'TG-' + String(Date.now()).slice(-6);
    valid.forEach((t, i) => {
      // Could push to DATA.salesTargets if we want to display in admin local view
    });
    try { localStorage.removeItem('sl_targets_draft'); } catch(e) {}
    toast('ส่งเป้าหมายสำเร็จ','รหัส: '+groupId+' · จำนวน '+valid.length+' รายการ','ok');
    _targetsBuf = []; // reset
    nav('updates');
  });

  refreshSummary();
  attachRowHandlers();
}

function supplierReturns() {
  const vendor = (S.session && S.session.vendor) || DATA.vendors[0];
  const mine = DATA.returns.filter(r => r.vendor.code === vendor.code);
  const pending = mine.filter(r => !r.ack);
  let html = '';
  if (pending.length > 0) {
    html += '<div class="alert alert-err"><span class="alert-ic err">'+ic('warn',18)+'</span><div style="flex:1;font-size:12px"><div style="font-weight:700;color:var(--err)">มี '+pending.length+' รายการรอยืนยัน</div><div style="color:var(--ink-2);margin-top:2px">กรุณายืนยันทุกรายการก่อนจองนัดถัดไป</div></div></div>';
  }
  html += mine.map(r =>
    '<div class="card" style="padding:14px;margin-bottom:8px">' +
      '<div style="display:flex;justify-content:space-between"><span class="num bold" style="font-size:12px">'+r.id+'</span>'+whPill(r.wh)+'</div>' +
      '<div style="font-size:13px;font-weight:500;margin-top:6px">'+esc(r.desc)+'</div>' +
      '<div style="display:flex;justify-content:space-between;margin-top:10px;font-size:11px;color:var(--ink-3)"><span>SKU '+r.sku+' · จำนวน '+r.qty+'</span><span class="num">'+r.posted+'</span></div>' +
      '<div style="margin-top:10px">' +
        (r.ack ? '<span class="chip chip-ok chip-sm">รับทราบแล้ว</span>' : '<button class="btn btn-block btn-primary ack-btn" data-id="'+r.id+'">'+ic('check',13)+' ยืนยันรับคืน</button>') +
      '</div>' +
    '</div>'
  ).join('');
  if (mine.length === 0) html += '<div class="card" style="padding:24px;text-align:center;color:var(--ink-3);font-size:12px">ไม่มีรายการต้องคืน</div>';
  return html;
}

/* ═══════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════ */
async function init() {
  loadSession();
  if (S.session) {
    S.view = S.session.role === 'gr' ? 'gr' : S.session.role === 'supplier' ? 'supplier' : 'admin';
    if (GAS_API_URL && !GAS_API_URL.startsWith('REPLACE_')) {
      showAppLoading('กำลังโหลดข้อมูล…');
      try { await hydrateData(); } catch(e) { console.error('[init hydrate]', e); }
      hideAppLoading();
    }
  } else {
    S.view = 'login';
  }
  render();
}

// Run init when DOM is ready (script is at end of body so DOM is ready)
init();
</script>
