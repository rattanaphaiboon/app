<style>
:root{
  --navy:#0d1b3e;--navy-mid:#1a2f5e;--navy-light:#243b73;--gold:#c9a84c;--gold-light:#e8c86a;
  --success:#2ecc71;--danger:#e74c3c;--warning:#f39c12;--info:#3498db;
  --bg:#f4f6fb;--text:#0d1b3e;--card-bg:#fff;--border:#dde3f0;--muted:#6b7896;--row-alt:#fafbfd;
  --radius-sm:6px;--radius-md:12px;--radius-lg:16px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);--shadow-md:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(13,27,62,.12);--shadow-gold:0 4px 12px rgba(201,168,76,.35);
}
body.dark{--bg:#05080f;--text:#fff;--card-bg:#0d1b3e;--border:#1f3563;--muted:#b8c2dc;--row-alt:#0a1226}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;font-size:14px;line-height:1.5;min-height:100dvh;overflow-x:hidden;background:var(--bg);color:var(--text);transition:background .25s,color .25s}
button{font-family:inherit;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input,select,textarea{font-family:inherit;font-size:16px}
a{color:inherit}

/* Header */
header{background:var(--navy);color:#fff;padding:10px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;border-bottom:3px solid var(--gold);padding-top:max(10px,env(safe-area-inset-top))}
.logo-text{font-weight:700;letter-spacing:1px;font-size:16px;color:#fff;white-space:nowrap}
.logo-text span{color:var(--gold)}
.ver-chip{background:rgba(201,168,76,.18);color:var(--gold);border:1px solid rgba(201,168,76,.45);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700}
.spacer{flex:1}
.icon-btn{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.2);width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:16px}
.icon-btn:hover{background:rgba(255,255,255,.12)}
.user-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:12px;color:#fff;max-width:150px}
.user-chip b{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hub-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:var(--radius-sm);padding:5px 10px;font-size:13px;font-weight:600;text-decoration:none;white-space:nowrap;min-height:36px}
.hub-btn:hover{background:rgba(255,255,255,.18)}

/* Tabs */
.tab-nav{display:flex;background:var(--navy);border-bottom:3px solid var(--gold);padding:0 8px;gap:4px;overflow-x:auto;scrollbar-width:none;position:sticky;top:55px;z-index:90}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{background:transparent;color:rgba(255,255,255,.6);padding:11px 18px;font-size:13px;font-weight:600;border-bottom:3px solid transparent;white-space:nowrap;flex-shrink:0;margin-bottom:-3px;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.tab-btn:hover{color:#fff;background:rgba(255,255,255,.06)}
.tab-btn.active{color:var(--navy);background:var(--gold);font-weight:700}

/* Layout */
.content{flex:1;padding:14px;max-width:900px;margin:0 auto;width:100%}
.view{display:none;animation:fadeIn .2s ease}.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Card */
.card{background:var(--card-bg);border-radius:var(--radius-md);border:1px solid var(--border);box-shadow:var(--shadow-md)}
.card-gold{border-top:3px solid var(--gold)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);background:linear-gradient(to right,rgba(201,168,76,.07),transparent)}
.card-head h2{font-size:16px;font-weight:700}
.card-body{padding:16px}

/* Form */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.field label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.3px}
.field label .req{color:var(--danger)}
.field .hint{font-size:11px;color:var(--muted);font-weight:400}
.input{height:46px;padding:0 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card-bg);color:var(--text);font-size:16px;outline:none;width:100%;transition:border-color .15s}
.input:focus{border-color:var(--gold)}
textarea.input{height:auto;min-height:90px;padding:11px 14px;resize:vertical;line-height:1.55}
.img-add-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 14px;border:1.5px dashed var(--gold);color:var(--navy);background:rgba(201,168,76,.08);border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;width:fit-content}
body.dark .img-add-btn{color:var(--gold);background:transparent}
.img-preview{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.img-thumb{position:relative;width:74px;height:74px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.img-thumb button{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(13,27,62,.78);color:#fff;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
.img-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.img-row a{display:block;width:88px;height:88px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.img-row img{width:100%;height:100%;object-fit:cover;display:block}

/* Context chips */
.ctx-strip{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:var(--radius-md);margin-bottom:18px}
body.dark .ctx-strip{background:transparent}
.ctx-chip{font-size:12px;background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:4px 11px;display:flex;align-items:center;gap:5px}
.ctx-chip b{font-weight:600}

/* Dropdown */
.dd-wrap{position:relative;width:100%}
.dd-trigger{width:100%;min-height:46px;padding:10px 14px;background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:16px;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:8px}
.dd-trigger.placeholder{color:var(--muted)}
.dd-panel{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);z-index:500;box-shadow:var(--shadow-lg);max-height:280px;display:none;flex-direction:column}
.dd-panel.open{display:flex}
.dd-search{padding:11px 14px;font-size:16px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);outline:none}
.dd-list{overflow-y:auto;flex:1;list-style:none;padding:4px 0;margin:0}
.dd-list li{padding:11px 14px;cursor:pointer;font-size:15px}
.dd-list li:hover{background:var(--navy-light);color:#fff}
.dd-list li.no-result{color:var(--muted);cursor:default;font-style:italic}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;border:1px solid transparent;min-height:44px;transition:opacity .15s,transform .1s}
.btn:hover{opacity:.9}.btn:active{transform:scale(.98)}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{background:var(--gold-light)}
.btn-primary{background:var(--navy);color:#fff}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 11px;font-size:12px;min-height:32px;border-radius:var(--radius-sm)}
.btn-block{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* Badges */
.badge{display:inline-block;padding:3px 9px;border-radius:11px;font-size:11px;font-weight:600;white-space:nowrap}
.b-new{background:#e3f0fd;color:#1a6fb8}
.b-triaged{background:rgba(201,168,76,.2);color:#a87800}
.b-fixed{background:#e8f7ee;color:#1e8449}
.b-deployed{background:#dcd6ff;color:#5b3fc4}
.b-archived{background:#e7eaf0;color:#5a6b85}
body.dark .b-new{background:#13283f;color:#7fc0ff}
body.dark .b-triaged{background:#3a2e15;color:#e8c86a}
body.dark .b-fixed{background:#173a25;color:#7be0a3}
body.dark .b-deployed{background:#241d4d;color:#b9a8ff}
body.dark .b-archived{background:#1c2535;color:#9fb0cf}
.sev{font-size:13px}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--card-bg);border-radius:var(--radius-md);padding:13px;border:1px solid var(--border);border-top:3px solid var(--gold);text-align:center}
.stat-card .s-value{font-size:24px;font-weight:700;line-height:1.1}
.stat-card .s-label{font-size:11px;color:var(--muted);font-weight:600;margin-top:3px}
.stat-card.blue{border-top-color:var(--info)}.stat-card.blue .s-value{color:var(--info)}
.stat-card.gold .s-value{color:var(--gold)}
.stat-card.green{border-top-color:var(--success)}.stat-card.green .s-value{color:var(--success)}

/* Filter bar */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;position:sticky;top:96px;z-index:50;background:var(--bg);padding:8px 0}
.filter-bar .input{height:40px;font-size:14px}
.filter-bar .search{flex:1;min-width:160px}
.chip-row{display:flex;gap:6px;flex-wrap:wrap}
.fchip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card-bg);font-size:12px;font-weight:600;color:var(--muted)}
.fchip.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* Bug list */
.bug-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:13px 14px;margin-bottom:10px;cursor:pointer;border-left:4px solid var(--border);transition:box-shadow .15s}
.bug-card:hover{box-shadow:var(--shadow-md)}
.bug-card.s-new{border-left-color:var(--info)}
.bug-card.s-triaged{border-left-color:var(--gold)}
.bug-card.s-fixed{border-left-color:var(--success)}
.bug-card.s-deployed{border-left-color:#5b3fc4}
.bug-card.s-archived{border-left-color:#8a98b5;opacity:.8}
.bug-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
.bug-app{font-weight:700;font-size:14px}
.bug-meta{font-size:11px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.bug-text{font-size:13px;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bug-thumbs{display:flex;gap:6px;margin-top:8px}
.bug-thumbs img{width:52px;height:52px;object-fit:cover;border-radius:6px;border:1px solid var(--border);background:var(--row-alt)}
.flag-analyze{font-size:11px;color:var(--gold);font-weight:700}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,62,.65);z-index:9000;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px);overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--card-bg);border-radius:var(--radius-lg);max-width:520px;width:100%;max-height:92dvh;overflow-y:auto;border-top:4px solid var(--gold)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:16px;font-weight:700}
.modal-close{background:transparent;font-size:24px;color:var(--muted);padding:2px 8px;line-height:1}
.modal-body{padding:18px}
.detail-row{margin-bottom:13px}
.detail-row .dl{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:2px}
.detail-row .dv{font-size:14px;white-space:pre-wrap;word-break:break-word}
.diag-box{background:rgba(201,168,76,.09);border:1px solid rgba(201,168,76,.3);border-radius:var(--radius-md);padding:13px;margin-top:6px}
body.dark .diag-box{background:transparent}
.diag-box .dv{font-size:13px;font-family:'Courier New',monospace}

/* Login */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center;background:linear-gradient(160deg,var(--navy),#08122b)}
.login-card{background:#fff;border-radius:var(--radius-lg);padding:34px 28px;max-width:380px;width:100%;border-top:5px solid var(--gold);box-shadow:0 20px 50px rgba(0,0,0,.4)}
.login-emoji{font-size:46px;margin-bottom:10px}
.login-card h1{font-size:22px;color:var(--navy);margin-bottom:4px}
.login-card .sub{font-size:13px;color:var(--muted);margin-bottom:22px}
.login-card .ver{font-size:11px;color:var(--muted);margin-top:18px}
#loginError{color:var(--danger);font-size:13px;margin-top:14px;min-height:18px}

/* Spinner + toast */
#spinner{display:none;position:fixed;inset:0;background:rgba(13,27,62,.6);align-items:center;justify-content:center;z-index:99999;backdrop-filter:blur(3px)}
#spinner.show{display:flex}
.spin-box{background:#fff;border-radius:16px;padding:30px 40px;text-align:center;border-top:4px solid var(--gold)}
.spin-ring{width:46px;height:46px;border:5px solid #dde3f0;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));right:16px;padding:12px 18px;border-radius:var(--radius-md);color:#fff;z-index:9999;font-weight:500;box-shadow:var(--shadow-lg);max-width:90vw;font-size:13px;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-success{background:var(--success)}.toast-error{background:var(--danger)}.toast-info{background:var(--navy-mid);border-left:3px solid var(--gold)}
#backToTop{position:fixed;bottom:max(20px,calc(14px + env(safe-area-inset-bottom)));right:16px;background:var(--gold);color:var(--navy);border-radius:50%;width:44px;height:44px;display:none;align-items:center;justify-content:center;box-shadow:var(--shadow-gold);z-index:80;font-size:18px;font-weight:700}
#backToTop.show{display:flex}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .e-emoji{font-size:40px;margin-bottom:10px}
.config-warn{background:#fff4e0;border:1px solid var(--warning);color:#8a5a00;border-radius:var(--radius-md);padding:12px 14px;font-size:13px;margin-bottom:14px}
body.dark .config-warn{background:#3a2e15;color:#e8c86a}
.triage-banner{border-radius:var(--radius-md);padding:11px 14px;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-weight:600}
.triage-banner.running{background:rgba(201,168,76,.14);border:1px solid var(--gold);color:#8a6d1a}
body.dark .triage-banner.running{background:transparent;color:var(--gold)}
.triage-banner.idle{background:var(--row-alt);border:1px solid var(--border);color:var(--muted);font-weight:500}
.triage-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);flex-shrink:0;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
</style>
</head>
<body>

<!-- Spinner -->
<div id="spinner"><div class="spin-box"><div class="spin-ring"></div><p id="spinnerMsg">กำลังโหลด...</p></div></div>

<!-- Login -->
<div class="login-screen" id="loginScreen">

          <div class="field">
            <label>แนบรูป / สกรีนช็อต <span class="req">*</span> <span class="hint">— บังคับ อย่างน้อย 1 รูป (สูงสุด 3 · ย่อให้อัตโนมัติ)</span></label>

        <button class="btn btn-outline btn-sm" onclick="refreshBugs()" id="refreshBtn">🔄 รีเฟรช</button>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
/* ====================== CONFIG ======================
   ⚠️ Surat ต้องกรอก 2 ค่านี้หลังสร้าง Sheet + deploy Apps Script:
   1. BUG_SHEET_ID  = ID ของ Google Sheet "Rattana Bug Tracker"
   2. BUG_API_URL   = Web App URL ที่ deploy จาก Code.gs (ลงท้าย /exec)
   (NOTIFY_EMAIL อยู่ใน Code.gs ฝั่ง Apps Script ไม่ใช่ที่นี่)
====================================================== */
const BUG_SHEET_ID = '1KOwC6zoAxwo5w3fnZfChb73eNpFTMLqDMFhDGp2HcP4';
const BUG_API_URL  = 'https://script.google.com/macros/s/AKfycbz5FO1Gb67spURtqAC2hxmVeHkp2fxXKEaFRc19dkYmU00uiOVDXU5IdXGblJMYcbSqSQ/exec';
const BUG_TAB      = 'Bugs';
const BUG_STATUS_TAB = '_Status';

const AUTH_CONFIG = {
  usersSheetId: '1M6HdISsLN684qRWyQ73CA4AmUzmYtZaOlffDJXZZIXQ',
  usersSheetName: 'Rattana Users for apps',
};

const APP_OPTIONS = [
  'Sales App (แอปขาย)','Rattana Inv (สต็อก/จัดซื้อ)','Stock C4','Rattana Mart',
  'Rattana Hub','Debt (ลูกหนี้)','HR Eval (ประเมิน)','Work Management (R-Link)','อื่นๆ'
];

let currentUser = null;
let allBugs = [];
let statusFilter = 'all';
let listMode = 'active';
let selectedApp = '';
let pendingImages = [];

/* ---------- utils ---------- */
const showSpinner = (m='กำลังโหลด...') => { document.getElementById('spinnerMsg').textContent=m; document.getElementById('spinner').classList.add('show'); };
const hideSpinner = () => document.getElementById('spinner').classList.remove('show');
function showToast(msg,type='info'){const t=document.createElement('div');t.className=`toast toast-${type}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);}
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function decodeJwtPayload(token){
  const parts=String(token||'').split('.');if(parts.length<2)throw new Error('JWT invalid');
  let b64=parts[1].replace(/-/g,'+').replace(/_/g,'/');const pad=(4-b64.length%4)%4;if(pad)b64+='='.repeat(pad);
  const bin=atob(b64);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return JSON.parse(new TextDecoder('utf-8').decode(bytes));
}
const normalizeEmail = s => String(s||'').replace(/[\u200B\u200C\u200D\uFEFF]/g,'').replace(/\s+/g,'').toLowerCase();

function parseCsv(text){
  if(!text)return[];if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const rows=[];let row=[],cell='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){if(ch==='"'){if(text[i+1]==='"'){cell+='"';i++;}else q=false;}else cell+=ch;}
    else{if(ch==='"')q=true;else if(ch===','){row.push(cell);cell='';}else if(ch==='\r'){}else if(ch==='\n'){row.push(cell);rows.push(row);row=[];cell='';}else cell+=ch;}}
  if(cell.length||row.length){row.push(cell);rows.push(row);}
  if(!rows.length)return[];
  const clean=s=>String(s||'').replace(/[\u200B\u200C\u200D\uFEFF]/g,'').replace(/\u00A0/g,' ').trim();
  const headers=rows[0].map(clean);
  return rows.slice(1).filter(r=>r.some(c=>clean(c))).map(r=>Object.fromEntries(headers.map((k,i)=>[k,clean(r[i])])));
}
async function loadFromSheets(sheetId,sheetName){
  const url=`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const res=await fetch(url);if(!res.ok)throw new Error('fetch failed');return parseCsv(await res.text());
}
async function apiPost(payload){
  const res=await fetch(BUG_API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
  try{return await res.json();}catch(e){return {ok:true};}
}
const cfgReady = () => BUG_SHEET_ID!=='YOUR_BUG_SHEET_ID' && BUG_API_URL!=='YOUR_DEPLOYED_WEBAPP_URL';

/* ---------- theme ---------- */
function applyTheme(t){document.body.classList.toggle('dark',t==='dark');const b=document.getElementById('themeBtn');if(b)b.textContent=t==='dark'?'☀️':'🌙';}
function toggleTheme(){const n=document.body.classList.contains('dark')?'light':'dark';localStorage.setItem('rattana_theme',n);applyTheme(n);}
applyTheme(localStorage.getItem('rattana_theme')||'light');

/* ---------- auth (SSO) ---------- */
function checkRattanaSession(){
  try{const raw=localStorage.getItem('rattana_session');if(!raw)return null;
    const p=JSON.parse(raw);if(!p?.data?.email||!p.exp||Date.now()>p.exp)return null;return p.data;}catch{return null;}
}
function saveSharedSession(d){
  const payload={data:d,exp:Date.now()+30*24*60*60*1000};
  localStorage.setItem('rattana_session',JSON.stringify(payload));
  localStorage.setItem('rattanaUser',JSON.stringify(payload));
}
function showLoginError(m){document.getElementById('loginError').textContent=m;}
async function handleGoogleLogin(r){
  showSpinner('กำลังตรวจสอบ...');
  try{
    const email=normalizeEmail(decodeJwtPayload(r.credential).email);
    const users=await loadFromSheets(AUTH_CONFIG.usersSheetId,AUTH_CONFIG.usersSheetName);
    const u=users.find(x=>normalizeEmail(x['E-mail'])===email);
    if(!u){showLoginError('ไม่พบอีเมลนี้ในระบบ ติดต่อแอดมิน');hideSpinner();return;}
    if(String(u['Status']||'').trim().toLowerCase()!=='active'){showLoginError('บัญชีถูกระงับ ติดต่อแอดมิน');hideSpinner();return;}
    currentUser={email,name:u['ชื่อ - สกุล']||'',role:parseInt(u['User Role'])||1,
      dept:u['แผนก']||'',company:u['บริษัท']||'',warehouse:u['W']||'',empId:String(u['รหัสพนักงาน']||'')};
    saveSharedSession(currentUser);
    enterApp();
  }catch(e){showLoginError('เกิดข้อผิดพลาด ลองใหม่');}
  finally{hideSpinner();}
}
function enterApp(){
  document.getElementById('loginScreen').style.display='none';
  const a=document.getElementById('appScreen');a.style.display='flex';
  initApp();
}
function logout(){localStorage.removeItem('rattana_session');localStorage.removeItem('rattanaUser');location.reload();}

/* ---------- init ---------- */
function initApp(){
  document.getElementById('userName').textContent=currentUser.name||'-';
  // role gating
  document.querySelectorAll('[data-min-role]').forEach(el=>{
    el.style.display=(currentUser.role>=+el.dataset.minRole)?'':'none';
  });
  buildCtxStrip();
  buildAppDD();
  if(currentUser.role>=5){ if(cfgReady()){ buildChips(); loadBugs(); loadTriageStatus(); if(!window._triagePoll) window._triagePoll=setInterval(loadTriageStatus,20000); } }
}
function buildCtxStrip(){
  const dev=/iPhone|iPad/i.test(navigator.userAgent)?'iPhone/iPad':(/Android/i.test(navigator.userAgent)?'Android':'คอม/อื่นๆ');
  document.getElementById('ctxStrip').innerHTML=
    `<span class="ctx-chip">👤 <b>${esc(currentUser.name||'-')}</b></span>`+
    (currentUser.warehouse?`<span class="ctx-chip">🏬 <b>${esc(currentUser.warehouse)}</b></span>`:'')+
    `<span class="ctx-chip">📱 <b>${dev}</b></span>`+
    `<span class="ctx-chip" style="color:var(--muted)">เก็บข้อมูลผู้แจ้งให้อัตโนมัติ</span>`;
}

/* ---------- app dropdown ---------- */
function buildAppDD(){
  document.getElementById('appList').innerHTML=APP_OPTIONS.map(a=>`<li onclick="selectApp('${esc(a)}')">${esc(a)}</li>`).join('');
}
function toggleAppDD(){const p=document.getElementById('appPanel');const open=p.classList.contains('open');document.querySelectorAll('.dd-panel').forEach(x=>x.classList.remove('open'));if(!open){p.classList.add('open');p.querySelector('.dd-search').focus();}}
function filterAppDD(inp){const q=inp.value.toLowerCase();let any=false;
  document.querySelectorAll('#appList li').forEach(li=>{if(li.classList.contains('no-result'))return;const m=li.textContent.toLowerCase().includes(q);li.style.display=m?'':'none';if(m)any=true;});
}
function selectApp(a){selectedApp=a;const t=document.getElementById('appTrigger');document.getElementById('appLabel').textContent=a;t.classList.remove('placeholder');document.getElementById('appPanel').classList.remove('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.dd-wrap'))document.querySelectorAll('.dd-panel').forEach(x=>x.classList.remove('open'));});

/* ---------- images ---------- */
function compressImage(file,maxDim=1280,quality=0.7){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{const img=new Image();img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
      else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',quality));
    };img.onerror=reject;img.src=e.target.result;};
    reader.onerror=reject;reader.readAsDataURL(file);
  });
}
async function handleImgPick(e){
  const files=[...e.target.files];e.target.value='';
  for(const f of files){
    if(pendingImages.length>=3){showToast('ใส่ได้สูงสุด 3 รูป','error');break;}
    if(!f.type.startsWith('image/'))continue;
    try{showSpinner('กำลังย่อรูป...');pendingImages.push(await compressImage(f));}catch(_){showToast('รูปนี้ใช้ไม่ได้ ลองรูปอื่น','error');}finally{hideSpinner();}
  }
  renderImgPreview();
}
function renderImgPreview(){
  document.getElementById('imgPreview').innerHTML=pendingImages.map((d,i)=>`<div class="img-thumb"><img src="${d}"><button type="button" onclick="removeImg(${i})">×</button></div>`).join('');
  const add=document.getElementById('imgAddBtn');if(add)add.style.display=pendingImages.length>=3?'none':'';
}
function removeImg(i){pendingImages.splice(i,1);renderImgPreview();}

/* ---------- submit ---------- */
async function submitBug(){
  const screen=document.getElementById('fScreen').value.trim();
  const what=document.getElementById('fWhat').value.trim();
  const fix=document.getElementById('fFix').value.trim();
  if(!selectedApp){showToast('เลือกแอปก่อน','error');return;}
  if(!screen){showToast('กรอกหน้าจอที่เจอ','error');return;}
  if(!what){showToast('กรอกอาการที่เกิดขึ้น','error');return;}
  if(!pendingImages.length){showToast('แนบรูปอย่างน้อย 1 รูป','error');return;}
  if(!cfgReady()){showToast('ยังไม่ได้ตั้งค่า API (แจ้ง Surat)','error');return;}
  const btn=document.getElementById('submitBtn');btn.disabled=true;showSpinner('กำลังส่ง...');
  const payload={action:'reportBug',
    reporter_name:currentUser.name||'',reporter_email:currentUser.email||'',
    reporter_role:currentUser.role,reporter_warehouse:currentUser.warehouse||'',
    app:selectedApp,screen,what_happened:what,desired_fix:fix,
    user_agent:navigator.userAgent,app_version:'1.0',images:pendingImages};
  try{
    const res=await apiPost(payload);
    if(res&&res.ok===false)throw new Error(res.error||'failed');
    document.getElementById('fScreen').value='';document.getElementById('fWhat').value='';document.getElementById('fFix').value='';
    selectedApp='';document.getElementById('appLabel').textContent='-- เลือกแอป --';document.getElementById('appTrigger').classList.add('placeholder');
    pendingImages=[];renderImgPreview();
    showToast('ส่งแจ้งบั๊คเรียบร้อย ขอบคุณครับ ✓','success');
  }catch(e){showToast('ส่งไม่สำเร็จ ลองใหม่อีกครั้ง','error');}
  finally{btn.disabled=false;hideSpinner();}
}

/* ---------- admin: load + render ---------- */
async function loadBugs(){
  if(!cfgReady()){document.getElementById('cfgWarn').innerHTML='<div class="config-warn">⚙️ ยังไม่ได้ตั้งค่า <b>BUG_SHEET_ID</b> และ <b>BUG_API_URL</b> — รายการจะแสดงหลัง Surat กรอกค่า + deploy Apps Script</div>';return;}
  try{allBugs=(await loadFromSheets(BUG_SHEET_ID,BUG_TAB)).reverse();renderStats();renderBugs();}
  catch(e){document.getElementById('bugListWrap').innerHTML='<div class="empty"><div class="e-emoji">⚠️</div>โหลดข้อมูลไม่ได้ — เช็คว่าแชร์ Sheet เป็น Viewer แล้ว</div>';}
}
async function refreshBugs(){const b=document.getElementById('refreshBtn');b.disabled=true;await loadBugs();await loadTriageStatus();b.disabled=false;showToast('อัพเดทแล้ว ✓','success');}
let _lastTriageState='';
async function loadTriageStatus(){
  if(!cfgReady())return;
  const el=document.getElementById('triageBanner');if(!el)return;
  try{
    const rows=await loadFromSheets(BUG_SHEET_ID,BUG_STATUS_TAB);
    const st=rows[0]||{};const state=String(st.state||'idle').toLowerCase();
    if(state==='running'){
      el.className='triage-banner running';
      el.innerHTML=`<span class="triage-dot"></span><span>🤖 Claude กำลังวิเคราะห์บั๊ค: ${esc(st.message||'...')} ${st.total&&st.total!=='0'?`(${esc(st.current||'0')}/${esc(st.total)})`:''} — อย่าเพิ่งปิดคอม</span>`;
    }else{
      el.className='triage-banner idle';
      el.innerHTML=`<span>🤖 ระบบตรวจบั๊คอัตโนมัติ · ล่าสุด ${esc(st.updated_at||'-')}${st.message?` · ${esc(st.message)}`:''}</span>`;
    }
    el.style.display='flex';
    if(_lastTriageState==='running'&&state!=='running')loadBugs();
    _lastTriageState=state;
  }catch(e){ el.style.display='none'; }
}
function setStatusFilter(s,el){statusFilter=s;document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderBugs();}
const POOL_ACTIVE=['new','triaged','fixed'];
const POOL_DONE=['deployed','archived'];
function buildChips(){
  const chips=listMode==='archive'
    ?[['all','ทั้งหมด'],['deployed','🚀 ขึ้นจริง'],['archived','📦 เก็บเข้าคลัง']]
    :[['all','ทั้งหมด'],['new','🆕 ใหม่'],['triaged','🔍 วิเคราะห์แล้ว'],['fixed','✅ แก้แล้ว']];
  statusFilter='all';
  document.getElementById('filterChips').innerHTML=chips.map((c,i)=>`<span class="fchip ${i===0?'active':''}" data-status="${c[0]}" onclick="setStatusFilter('${c[0]}',this)">${c[1]}</span>`).join('');
}

function renderStats(){
  const c={new:0,triaged:0,fixed:0,deployed:0};
  allBugs.forEach(b=>{const s=(b.status||'new').toLowerCase();if(c[s]!=null)c[s]++;});
  document.getElementById('statGrid').innerHTML=
    `<div class="stat-card blue"><div class="s-value">${c.new}</div><div class="s-label">🆕 ใหม่</div></div>
     <div class="stat-card gold"><div class="s-value">${c.triaged}</div><div class="s-label">🔍 วิเคราะห์แล้ว</div></div>
     <div class="stat-card green"><div class="s-value">${c.fixed}</div><div class="s-label">✅ แก้แล้ว</div></div>
     <div class="stat-card"><div class="s-value">${c.deployed}</div><div class="s-label">🚀 ขึ้นจริง</div></div>`;
}
const sevIcon = s => ({high:'🔴',medium:'🟡',low:'🟢'}[String(s||'').toLowerCase()]||'');
const statusBadge = s => {const m={new:['b-new','🆕 ใหม่'],triaged:['b-triaged','🔍 วิเคราะห์แล้ว'],fixed:['b-fixed','✅ แก้แล้ว'],deployed:['b-deployed','🚀 ขึ้นจริง'],archived:['b-archived','📦 เก็บแล้ว']};const x=m[String(s||'new').toLowerCase()]||m.new;return `<span class="badge ${x[0]}">${x[1]}</span>`;};

function renderBugs(){
  const q=document.getElementById('searchBox').value.toLowerCase().trim();
  const pool=listMode==='archive'?POOL_DONE:POOL_ACTIVE;
  let list=allBugs.filter(b=>{
    const s=(b.status||'new').toLowerCase();
    if(!pool.includes(s))return false;
    if(statusFilter!=='all'&&s!==statusFilter)return false;
    if(q){const hay=`${b.app} ${b.reporter_name} ${b.screen} ${b.what_happened}`.toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  const wrap=document.getElementById('bugListWrap');
  if(!list.length){wrap.innerHTML='<div class="empty"><div class="e-emoji">🎉</div>ไม่มีบั๊คในหมวดนี้</div>';return;}
  wrap.innerHTML=list.map((b,i)=>{
    const s=(b.status||'new').toLowerCase();
    const idx=allBugs.indexOf(b);
    const flag=s==='new'?'<span class="flag-analyze">⏳ รอวิเคราะห์</span>':'';
    const thumbs=String(b.image_url||'').split(',').map(u=>u.trim()).filter(Boolean);
    const thumbHtml=thumbs.length?`<div class="bug-thumbs">${thumbs.slice(0,3).map(u=>`<img src="${esc(u)}" loading="lazy" alt="">`).join('')}</div>`:'';
    return `<div class="bug-card s-${s}" onclick="openBugModal(${idx})">
      <div class="bug-top"><span class="bug-app">${sevIcon(b.severity)} ${esc(b.app||'-')}</span>${statusBadge(s)}</div>
      <div class="bug-text">${esc(b.what_happened||'')}</div>
      ${thumbHtml}
      <div class="bug-meta"><span>👤 ${esc(b.reporter_name||'-')}</span><span>📍 ${esc(b.screen||'-')}</span><span>🕐 ${esc(b.submitted_at||'-')}</span>${flag}</div>
    </div>`;
  }).join('');
}

/* ---------- modal ---------- */
function openBugModal(idx){
  const b=allBugs[idx];if(!b)return;
  const s=(b.status||'new').toLowerCase();
  const diag=(b.claude_diagnosis||'').trim();
  const cfix=(b.claude_fix||'').trim();
  const analyzeReq=String(b.analyze_requested||'').toLowerCase()==='true';
  const imgs=String(b.image_url||'').split(',').map(u=>u.trim()).filter(Boolean);
  const isDone=(s==='deployed'||s==='archived');
  document.getElementById('bugModalBody').innerHTML=`
    <div class="detail-row"><div class="dl">สถานะ</div><div>${statusBadge(s)} ${b.severity?`<span class="sev">${sevIcon(b.severity)} ${esc(b.severity)}</span>`:''}</div></div>
    <div class="detail-row"><div class="dl">แอป / หน้าจอ</div><div class="dv">${esc(b.app||'-')} → ${esc(b.screen||'-')}</div></div>
    <div class="detail-row"><div class="dl">เกิดอะไรขึ้น</div><div class="dv">${esc(b.what_happened||'-')}</div></div>
    ${b.desired_fix?`<div class="detail-row"><div class="dl">ผู้แจ้งอยากให้แก้</div><div class="dv">${esc(b.desired_fix)}</div></div>`:''}
    ${imgs.length?`<div class="detail-row"><div class="dl">รูปแนบ (${imgs.length})</div><div class="img-row">${imgs.map(u=>`<a href="${esc(u)}" target="_blank" rel="noopener"><img src="${esc(u)}" loading="lazy"></a>`).join('')}</div></div>`:''}
    <div class="detail-row"><div class="dl">ผู้แจ้ง</div><div class="dv">${esc(b.reporter_name||'-')} · ${esc(b.reporter_warehouse||'-')} · ${esc(b.submitted_at||'-')}</div></div>
    ${diag?`<div class="detail-row"><div class="dl">🤖 Claude วิเคราะห์สาเหตุ</div><div class="diag-box"><div class="dv">${esc(diag)}</div></div></div>`:''}
    ${cfix?`<div class="detail-row"><div class="dl">🛠️ Claude เสนอวิธีแก้</div><div class="diag-box"><div class="dv">${esc(cfix)}</div></div></div>`:''}
    ${s==='new'?`<div class="detail-row" style="margin-top:14px"><div class="config-warn">⏳ รอ Claude วิเคราะห์อัตโนมัติ (รอบ 08:00 / 13:00 / 17:00 หรือเมื่อเปิดแอป)</div></div>`:''}
    ${!isDone?`<div class="detail-row">
      <div class="dl">อัพเดทสถานะ</div>
      <div class="chip-row" style="margin-top:6px">
        <button class="btn btn-outline btn-sm" onclick="updateStatus('${esc(b.id)}','triaged')">🔍 วิเคราะห์แล้ว</button>
        <button class="btn btn-outline btn-sm" onclick="updateStatus('${esc(b.id)}','fixed')">✅ แก้แล้ว</button>
        <button class="btn btn-gold btn-sm" onclick="updateStatus('${esc(b.id)}','deployed')">🚀 ขึ้นจริง → เก็บ</button>
      </div>
    </div>`:''}
    ${currentUser.role>5&&!isDone?`<button class="btn btn-primary btn-block" style="margin-top:10px" onclick="updateStatus('${esc(b.id)}','archived')">📦 ปิดเรื่อง — เก็บเข้าคลัง (ไม่ deploy)</button>`:''}
    ${currentUser.role>5&&isDone?`<button class="btn btn-outline btn-block" style="margin-top:10px" onclick="updateStatus('${esc(b.id)}','fixed')">↩️ นำกลับมาที่รายการ</button>`:''}
    ${currentUser.role>5?`<button class="btn btn-danger btn-block" style="margin-top:10px" onclick="deleteBug('${esc(b.id)}')">🗑️ ลบถาวร</button>`:''}`;
  document.getElementById('bugModal').classList.add('open');
}
function closeBugModal(){document.getElementById('bugModal').classList.remove('open');}
document.getElementById('bugModal').addEventListener('click',e=>{if(e.target.id==='bugModal')closeBugModal();});

async function requestAnalyze(id){
  showSpinner('กำลังส่งคำขอ...');
  try{await apiPost({action:'requestAnalyze',id});showToast('ขอวิเคราะห์แล้ว ✓','success');closeBugModal();await loadBugs();}
  catch(e){showToast('ส่งไม่สำเร็จ','error');}finally{hideSpinner();}
}
async function updateStatus(id,status){
  showSpinner('กำลังอัพเดท...');
  try{await apiPost({action:'updateStatus',id,status});showToast('อัพเดทสถานะแล้ว ✓','success');closeBugModal();await loadBugs();}
  catch(e){showToast('อัพเดทไม่สำเร็จ','error');}finally{hideSpinner();}
}
async function deleteBug(id){
  if(!confirm('ลบบั๊คนี้ถาวร? กู้คืนไม่ได้'))return;
  showSpinner('กำลังลบ...');
  try{await apiPost({action:'deleteBug',id});showToast('ลบแล้ว ✓','success');closeBugModal();await loadBugs();}
  catch(e){showToast('ลบไม่สำเร็จ','error');}finally{hideSpinner();}
}

/* ---------- tabs + scroll ---------- */
function switchTab(t){
  const onList=(t==='list'||t==='archive');
  document.getElementById('view-form').classList.toggle('active',t==='form');
  document.getElementById('view-list').classList.toggle('active',onList);
  document.getElementById('tabFormBtn').classList.toggle('active',t==='form');
  document.getElementById('tabListBtn').classList.toggle('active',t==='list');
  document.getElementById('tabArchiveBtn').classList.toggle('active',t==='archive');
  if(onList&&currentUser.role>=5){
    listMode=(t==='archive')?'archive':'active';
    document.getElementById('statGrid').style.display=(listMode==='archive')?'none':'';
    buildChips();
    loadBugs();
    loadTriageStatus();
  }
}
window.addEventListener('scroll',()=>document.getElementById('backToTop').classList.toggle('show',window.scrollY>300));

/* ---------- boot ---------- */
window.onload=function(){
  const sess=checkRattanaSession();
  if(sess&&sess.email){currentUser=sess;enterApp();}
};
</script>
